body:
  text: 春秋集傳詳説卷十宋家鉉翁撰僖公二是嵗惠王二十五年齊桓公三十三年八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮榖梁曰王人之先諸侯貴王命也朝服雖敝必加于上辨冕雖舊必加于首周室雖衰必先諸侯公羊曰王人者何微者也曷為序乎諸侯之上先王命也案左氏惠王崩襄王惡太叔帶之難懼不立不發喪而告難于齊齊為此會以定王位故王人下臨盟于洮以王事而盟也或曰春秋王朝公卿出會諸侯者同會而不同盟葵丘之盟宰周公不與盟踐土之盟王子虎盟諸侯于王庭宣七年諸侯盟于黑壤王叔桓公臨之哀十三年公會單平公晉定公吳夫差于黃池王臣皆不與盟特以王命監臨之耳今王人與諸侯同盟其可乎曰此以王室有難會而盟辭曰以奬王室王事也春秋無譏故皆爵自是女栗雞澤翟泉則有譏鄭伯乞盟前日首止之會王世子下臨而鄭伯逃之今鄭伯乞盟亦以王人在會彼內屈而來服知前日之逃為罪是以自請預盟而不以為辱由桓公有以大服其心故耳前會書逃春秋所以誅鄭伯今而書乞春秋所以赦鄭伯然盟而書乞亦所以貶也賤鄭伯使不得列於諸侯也此諸侯敗盟即楚之始故屢書以見意夏狄伐晉齊晉匹也齊桓公以尊天子安中夏為己任德聲溥乎宇內諸侯小大俱至而晉獻詭諸自外於中國怙其強大滅虞虢而有其土此諸侯之大賊罪當討者也書狄伐晉著晉人有可伐之罪也以前後事而求聖人之意知其然耳秋七月禘于大廟用致夫人榖梁曰用者不宜用也致者不宜致也書夫人而不以姓氏立妾之辭也劉向釋之曰夫人成風也致之大廟立之為夫人也三傳為説不同愚獨有取榖梁之説成風者莊公之妾僖公之母也莊公正妃哀薑以淫亂死于齊僖公尊其母為夫人以配其父違禮以卑其父也春秋書禘于大廟用致夫人榖梁所謂用不宜用致不宜致者是也夫人不氏眀其為妾無當尊之理也成風以文公四年薨春秋書夫人風氏薨又書葬我小君成風聖人非謂成風可以僭夫人也非謂妾母可以配先君也正以僖公嘗為非禮之禮致其母為夫人及文公立又以祖母事之以夫人卒之以夫人葬之舊史既以夫人書聖人於魯先君之母不得黜之為妾是以於此先書禘于大廟用致夫人僖公既致之於今日則聖人不容黜之於異日用致夫人者所以開卒葬夫人之端也故愚於此義獨有取榖梁之説公羊謂僖公本聘楚女為嫡齊女為媵先致薑女脅公使用為嫡愚謂齊桓必有所不為楚人亦有所不受此齊東之語不足信也左氏以為致哀薑於廟夫哀薑者雖見殺於齊而固魯之夫人也僖公不忍於其嫡母欲違禮而祔之斯祔之矣何以致為謂僖公因哀薑之死而致其母為先君夫人則有之矣謂僖公禘而致哀薑則未必然也若夫仲子之例不與此同愚既於隱元年而辨之兹不重舉義又見文四年夫人風氏薨冬十有二月丁未天王崩襄王立據傳惠王以去年閏月崩襄王以子帶謀為亂不發喪而告難於齊至是一年而後以訃於諸侯惠王固有以召亂而襄王之喪其親者其不能如禮乎桓王崩七年而後葬惠王崩一年乃發喪其一年中衣服飲食皆變常乎仍其吉乎縱曰以難故亦何必閲一年之久而後以赴之方國乎此殆有不可曉者襄王東周之令主其喪若是大本不立何以正天下無怪周之自是愈衰而不可作也九年春王正月丁丑宋公御説卒宋襄公立此宋桓公也國無內難而不以葬書傳者謂襄公不當背殯出會不書葬譏其喪親不能如禮然晉襄公亦嘗墨衰絰以從戎而春秋不去文公之葬豈晉襄所就者大而宋襄可以不會而猶會歟公羊於宣元年大夫待放特發此義曰古者臣有大喪則君三年不呼其門已練可以辨冕服金革之事君使之非也臣行之禮也閔子要絰而服事既而曰若此乎古之道不即人心退而致事孔子善之禮父母之喪三年不從政若有金革之事則墨衰絰而從戎謂己練而辨冕者時俗之變耳榖梁亦曰禮柩在堂上孤無外事今背殯出會以宋子為無哀矣公榖去古未逺猶於此而致意焉自是有書子而預盟會者有書爵而預盟會者書子為其猶知變其常書爵為其辨冕即吉書以絶之非與之也夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘并見下盟秋七月乙酉伯姬卒魯女之未嫁者也榖梁曰內女未適人不卒此何以卒許嫁笄而字之死則以成人之喪治之九月戊辰諸侯盟于葵丘桓公九合諸侯葵丘為盛人知誦桓公之美而不知所以成就桓公之美者周襄王也周自東遷歷五王率皆暗弱不君惟襄王稍更憂患動心忍性可與有為故即位之始即命宰周公會諸侯于葵丘孟子所稱載書五命之辭乃文武周公垂世遺後之法襄王命冢宰以告于會曰誅不孝無易樹子無以妾為妻尊賢育才以彰有德士無世官無專殺大夫無有封而不告綱領宏大法度嚴正有王道氣象伯國君臣豈能及此故曰此文武周公垂世遺後之法王以命之於會而齊桓公則代王言者也是時襄王始繼世而書命之行於天下者如此充而上之宣王中興之業可以馴致惜也宰非其人不能奉宣王命反以私意媢嫉霸功先歸遇晉侯沮其來會與首止之盟惠王語鄭伯使叛齊即晉楚者同意若宰孔者必王朝之小人子帶之逆儔使周室不競亂亡相尋者若人所為也宰周公者榖梁曰天子之宰通乎四海公羊曰天子之為政者也其説謂天官冢宰兼三公之事任尊職隆不當下為諸侯所會然周自東遷宰咺宰渠以賵妾聘逆而出況此大會乃夷夏具瞻宰周公銜命而臨之不為細事出春秋無譏也學者觀葵丘五命則知宰周公之出春秋無譏諸侯自為盟王人不與尊王也自是王人下預諸侯之盟皆有貶甲子晉侯詭諸卒此晉獻公也恣情縱欲違道敗常殺嫡長樹庶孽以此召亂春秋特去其葬冬晉里克殺其君之子奚齊榖梁曰其君之子云者國人不子也國人不子何也不正其殺世子申生而立之也榖之義善矣但奚與卓均不當得立而春秋於里克兩殺書法不同何哉蓋君臣之分未定以前則書曰殺殺篡立之公子耳君臣之分既定以後則其殺為弒矣春秋於奚齊之死書曰晉里克殺其君之子奚齊至卓子之死則曰晉里克弒其君卓嘗求其故奚齊死於喪次君臣之分猶未定也卓子死於詭諸既葬則君臣之分已定是以書法不同或曰君薨子立君臣之分猶有未定乎曰奚齊之立荀息一人立之耳非臣民之所共戴奚其定使里克於奚齊之既死即率國人迎立公子在外長且賢者以主社稷則事正理順國人無不服今乃坐視荀息遂非從邪更立卓子於卓己君父已葬之後而殺之則為弒矣劉原父謂里克嘗傅申生驪姬將廢太子使人飲克酒而告以其故克知之而不能諫成獻公殺嫡立庶之禍者克也放成其君臣之名正其弒逆之罪吁罪在不救申生而加以弒卓之戮春秋其不然歟蓋既君之而又殺之此春秋所以明分而垂法似不必他求也十年春王正月公如齊狄滅溫溫子奔衛狄自滅衛滅邢以來浸以盛強與荆楚交為諸侯患今又滅溫溫乃近畿之地司寇蘇公世有之蘇子叛王即狄又不能于狄是以為狄人所并蘇子信有罪矣而溫近于王狄伐而滅之豈非霸主之責乎桓公日以伐戎為事置狄弗問豈非霸業之衰乎晉里克弒其君卓及其大夫荀息弒義己見里克殺奚齊春秋録大夫死節凡三孔父仇牧荀息是也孔父仇牧之死與其君皆死死之正也荀息者從獻公於昏為驪戎女任託孤之寄復不能其事以身死之曾何足恤而與孔父仇牧俱見録于春秋諸儒未得其説愚觀公羊子之義而有取焉公羊於孔父曰可謂義形于色矣於仇牧曰可謂不畏強禦矣至荀息則曰可謂不食其言矣蓋荀息之死以為合乎義則未也然其既許獻公以死雖欲不死不可也使荀息早知二子之立國人不與而力辭託孤之寄以悟其君其君不能用則是時有不必死矣既不能正諫於其始又為之任託孤之寄雖欲臨難苟免其可得乎聖人所取特在於能不食言若以事君大節而觀不免猶有所愧夏齊侯許男伐北戎或曰莊三十年書齊人伐山戎貶也此書齊侯許男伐北戎其褒之乎曰否有書爵而非褒者矣齊為盟主伸霸討於四方乃與許男微國共為此行此自為逐利之計耳狄自比嵗洊為諸侯患今年春掠及近畿以溫為滅無忌甚矣齊桓置不問而逺伐北戎捨王畿之近寇而為伐戎之逺役此自為逐利計非為中國計故不與其伐書齊侯許男伐北戎著其私也晉殺其大夫里克晉惠公夷吾入榖梁曰里克弒二君與一大夫其以纍上之辭言之何也其殺之不以其罪也里克所為弒者為重耳也夷吾曰是又將殺我故殺之不以其罪愚謂里克之殺奚齊也春秋不坐以弒君之罪書曰殺其君之子為其因衆怒而殺之君臣之分未定故也克於是時當率諸大夫迎文公而立之則髙國之納齊桓不是過也今既不能然乃聼荀息立卓子而又殺之居於位俟夷吾之入蓋將持二弒以市寵於新君乃卒死於夷吾之手故春秋於其後弒而正其君臣之公為其既君之而復殺之耳雖然里克之弒視宋督公子翬襄仲之為弒有不得同而奚卓之為君亦與宋殤魯閔子赤異是以春秋不以討賊書稱國以殺榖梁所謂殺之不以其罪者是也自奚卓之弒至里丕之死春秋於晉之君臣父子咸有責焉耳附見夷吾之入春秋不書為其以弟而先兄也且入而不能君喪師亡身幾至失國是以略其入而不書至獲於秦乃書獲晉侯貶也秋七月冬大雨雪冬而雪時也冬而大雨雪異也此槩三冬而言故不著月雨雪而以大書必傷人敗物異乎常嵗不得不書耳傳者謂周正之冬為夏正之秋此變易四時而求合乎周正者十二月次猶可以己私而紊四時之春夏秋冬斷斷乎其不可紊今之秋猶古之秋也八九月間縱或雨雪必無連月大雪之理以是而觀益知春秋用夏時無可疑者十有一年春晉殺其太夫丕鄭父始謀納文公者里克丕鄭也里克既死丕豈能獨存夷吾之殺之亦為其私耳夷吾始入而殺二大夫里克猶有罪至於丕鄭之殺是謂濫刑左氏謂秦伯使人召吕郤冀芮晉疑丕鄭與之有謀殺之以及七輿大夫夷吾忌刻少恩一朝殺兩大夫併及其黨專殺之罪大矣再稱國以殺不與其殺也凡殺大夫有稱國以殺者有稱人以殺者權衡輕重之所在也至於殺直諌殺有功殺無罪殺人不以其罪又當隨事而見不可以稱國稱人之故而強求其功罪之所在夏公及夫人薑氏會齊侯于陽榖桓公之始霸也憤齊女之無度以哀薑為首戮諸夏肅然知先王所以貴乎有别者實在於是齊襄衛宣汚染之習為之一掃庶乎古方伯之遺烈矣及其暮年志得而驕乃復與僖薑為陽榖與卞之會霸業其衰矣乎或曰此齊侯之女禮有歸寧今往會不亦可乎曰歸寧當在國中此疾馳於通道大都非所謂寧也霸者一舉動諸夏之所視儀可不謹乎故春秋書法與禚會祝享同所以垂戒于後秋八月大雩大雩義己見桓五年凡書雩皆旱而禱也旱而禱必書以見人君之憂民也或曰旱而禱亦有益於旱歟曰成湯桑林之禱是也通天地間一氣耳一理耳理行而氣從之有感斯有應謂之無益不可蓋所謂禱者以我之誠而格物理之應誠有未至則感有未孚誠與感非外求者也豈惟旱禱為然凡理之所在氣即應之致中和而天地以位萬物以育此聖賢道學之功用亦不過理行而氣從之耳若謂禱為無益旱而雩無以見憂民之心則雩也特具文應故事而講之奚若勿講冬楚人伐黃十有二年春王三月庚午日有食之夏楚人滅黃榖梁曰貫之會管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聼遂與之盟仲死楚伐江滅黃桓公不能救君子閔之嗟夫管仲之慮患為逺矣方江黃之始來盟而已憂異時之不能救其深思逺慮豈與小智淺識之士朝不及夕者同日語乎齊不得江黃無以制楚故楚人憾江黃為最深既滅弦以蕩其藩牆遂以兵潰其心腹自冬徂夏歷三時之久齊人卒不能遣偏師之援坐視其亡然則滅黃者齊也非楚也陽榖之會貫澤之盟本以求中國之援反以是速其亡悲夫自是而後諸侯日散霸業日衰無足稱者矣秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衛義併見下狄侵鄭夏四月葬陳宣公公會齊侵宋公陳侯衛侯鄭伯許男曹伯于鹹案左氏會于鹹淮夷病杞且謀王室也王事為重而杞次之左氏從文之便先杞而後王則桓公之美不見矣蓋揚拒泉臯伊雒諸戎自十一年夏為子帶所召同伐王城秦晉伐戎以救周子帶奔齊齊侯平戎于王今二年矣王室略定乃為鹹之會謀王室而致諸侯之戍是秋諸侯戍周齊仲孫湫致之則是會也所以勤王故齊侯以下皆爵秋九月大雩冬公子友如齊十有四年春諸侯城緣陵左氏曰城緣陵而遷杞焉不書其人有闕也榖梁曰其曰諸侯散辭也聚而曰散何也諸侯城有散辭桓德衰矣公羊曰曷為城杞滅也徐莒脅之也杞不聞受兵而公羊以為既滅蓋前此城衛城邢皆在於既亡既潰之後故亦以杞為己亡左氏所謂病杞者得其實矣但桓公城三小國均為恤災救患而書法不同者有譏焉耳城邢猶能及未亡救之最力者也城楚丘衛已亡矣城緣陵桓公之意怠諸侯亦散是故書諸侯城緣陵言其合之不易而城之難矣陳止齋曰但曰諸侯者不繫之霸主之辭夏六月季姬及鄫子遇于防使鄫子來朝案左氏鄫季姬來寧公怒止之以鄫子之不朝也遇于防使來朝乃已嫁之女來寧見止既而與其夫遇使之來朝因是季姬復歸于鄫公羊以為僖公鍾愛厥女使自擇配故得與鄫子遇而遂以妻之如左氏則季姬乃掃寧之婦如公羊則季姬乃淫佚失行之女二説不同但眀年九月季姬歸于鄫以書法而觀則始嫁也魯女為文薑所染疾驅於通道大都自鬻以求婚僖公號賢君略無正家之法魯之不競實由乎此春秋書及書遇書使來朝而李姬之惡狀見矣僖公何以辭其責秋八月辛卯沙鹿崩公羊曰外異不書此何以書為天下記異也榖梁曰林屬於山曰鹿沙鹿者山名也此晉地而不繫之於晉為其為異駭常關乎中國之廢興存亡故也或曰名山大澤不以封故不繫之於晉義亦通狄侵鄭桓公既存邢衛雖未能大懲創于衆狄狄知懼矣及狄人滅溫憑陵畿輔桓志已怠不復加詰彼益無所憚前年侵衛今又放兵直出汜虎牢之間幾與楚合此豈小變而桓公年邁德衰管子又死無有能為天丁深長思者矣冬蔡侯肸卒十有五年春王正月公如齊楚人伐徐三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐或曰狄侵衛侵鄭楚滅黃齊莫之救徐未嘗預會盟今楚伐之而齊亟合諸侯以救之何哉曰齊之救徐非專為存徐計亦自為也徐近於齊楚之伐之所以震齊之鄰其為謀深矣前日齊桓伐楚先侵蔡楚之有蔡猶齊之有徐使楚人得志於徐則必乘勝造齊之南境是以齊桓急合諸侯以赴之又别出師伐厲以攻其所必救其為徐也甚切亦自為計耳然以救而出師春秋善之故皆書爵或曰救徐急矣而次于匡奈何曰豈惟次抑為之盟而後敢進蓋齊桓霸業至是已衰桓之志既怠而諸侯之心亦不能皆協臨敵而為之盟疑之而盟之也既盟而進復次于匡未敢遽前乃使大夫帥師以往是役也其不為楚乘者幾希然桓公不善戰而長於計救邢救許皆以虛聲聳動敵人使之自退今救徐也以疑畏之兵當方張之寇會于牡盟于牡進而復次示人以不可測故楚師雖盛亦復疑畏而不敢前徐得以無事婁林之敗亦偏敗耳於徐無傷則亦救之功也曰春秋其無譏乎曰春秋雖爵之而書盟書次而後書救君不進而使大夫帥師以前抑亦見志不能帥氣上下偷惰不為楚乘者幸矣夏五月日有食之秋七月齊師曹師伐厲八月螽九月公至自會季姬歸于鄫義見鄫子來朝己卯晦震夷伯之廟榖梁曰晦冥也震雷也夷伯魯大夫也因此以見天子至于士皆有廟天子七廟諸侯五廟大夫三廟士二故德厚者流光德薄者流卑是以貴始德之本也始封必為祖左氏以夷伯為展氏之祖父有隱慝焉為雷所震公羊以為季氏之孚孚微者愚謂此時季氏始為政於魯其微者不應遽僭大夫之廟三説中榖左為長冬宋人伐曹自桓公之霸諸夏之以兵擅相加者鮮矣至是宋襄伐曹左傳以為修舊怨以莊十四年宋背北杏之會齊帥諸侯伐之曹預伐以此為怨此乃霸國之討咎不在曹何怨之可言桓公志怠宋見間而起愚於此知宋襄之為人外靜內躁於桓之方存己有圖霸之心其後執滕圍曹張本于此春秋所譏也楚人敗徐于婁林春秋初年猶未外徐至此以後徐以號舉為公羊之學者以徐滅杞為滅先代之後是故外之然杞未嘗滅也十七年徐與齊皆書人公羊所載尤疑十有一月壬戌晉侯及秦伯戰于韓獲晉侯榖梁曰韓之戰晉侯失民矣以其民未敗而君獲也公羊曰何以不言師敗績君獲不言師敗績也愚謂此秦伯伐晉也春秋不書秦伐晉而書晉侯及秦伯戰于韓獲晉侯罪晉也春秋之法列國與吳楚交兵辨內外之分齊桓伐楚是也諸侯大國以其私怨交兵眀曲直之理則秦晉今日之戰是也惠公因秦人之力而得返其國許賂以河外列城既而不與秦穆不以為怨及其飢而輸之粟則秦為直矣晉飢秦輸之粟秦飢則晉閉之糴則秦又直矣秦直而晉曲則兵端在晉是以不書秦伯伐晉夫戰猶訟也春秋書法則聼訟之筆而曲直之權衡也或曰訟有曲直而二君皆爵何耶曰有書爵以為褒者有書爵以為貶者晉侯及秦伯戰言二君自以其私怨而戰非為中國而戰也書獲晉侯曲在晉也或曰楚敗蔡以蔡侯獻舞歸不書獲不與楚人執諸侯鄭滅許以許男斯歸滅曹以曹伯陽歸不書獲不與諸侯相為獲也今秦獲晉侯惠固有以自取責之無乃太重乎曰此不惟著晉惠背德棄義敗國殄民之罪亦以彰秦穆後來歸君之美晉之負秦甚矣秦猶歸其君此秦穆所以為賢也十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都三傳為説不同左氏曰隕石于宋五隕星也六鷁退飛過宋都風也星者諸侯人臣之象是時諸侯強僭王國微弱天之隕星所以示警戒於強國使知率德改行尊事天子五者其數也不必強求其説前乎此常星不見星隕而雨星至地而沒也今則隕而為石其象見矣警戒之道至矣風者自上而下人君號令風化之及于天下者皆風也今而水鳥隂類逆風而行此強國侵陵不稟王化之象異雖見於宋不專為宋而示異宋爵為公在諸夏為最長天示譴于諸侯故災見於宋警宋則以警諸夏與常星不見星隕而雨同其咎證天之眷周未艾也三月壬申公子季友卒劉炫謂春秋時魯卿有生而賜氏者季友仲遂是也生而賜氏者命之世為卿也胡氏從之愚謂生而賜氏者華督也彼自以弒君罪大賂諸侯求生立華氏若季友者魯之純臣何嫌何疑求生立季氏乎若曰求世其卿則當時侯國卿大夫有不待賜氏而莫不皆世為卿矣乃若公子遂之書仲遂以弒君故討而去其族不得與季友同也二君雖各以私意厚於二臣而春秋録善誅姦之筆則有衮斧之異豈容比而同之乎閔元年書季子來歸嘉之也是時魯國純臣惟一季友故書以美之今書季友卒著季氏自是世秉政為魯國無窮之患前之歸季子後之卒季友褒貶抑揚義各有在不容以槩觀也劉氏曰書季友卒譏世卿言自是世季氏也此説得春秋之旨夏四月丙申鄫季姬卒秋七月甲子公孫兹卒冬十有二月公會齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮左氏以為謀鄫又曰城鄫不果杜注淮夷病鄫也桓公霸業至是衰矣然猶為淮之會者所以備楚也是時中國與楚以淮為限淮以外皆楚之與國長江之險則楚人所有也故於是而會淮必不專為鄫故或又以為是役也桓公以諸侯伐淮夷魯預有功故魯頌及之十有七年春齊人徐人伐英氏夏滅項公榖以為滅項齊人滅之謂齊人及徐伐英而遂滅項耳案左傳滅項者魯也公在會齊人以是止公聲薑以公故會齊侯于卞非齊事也或曰內滅國書取不書滅取鄟取邿是也此何以書滅曰據傳公有諸侯之事未歸而取項此魯之執政者所為非出公意是以不為公諱所以著強臣擅興之罪而垂履霜之戒是時季友初死行父繼秉政擅興兵滅國者非行父而誰由僖公德季氏擁佑之私假之以權待以不疑其後遂至不可制襄在楚而宿取卞昭在晉而意如納邾莒叛人每乘公出而肆其無忌行父滅項實有以啓之耳有國家者視此當知所戒春秋特於滅項而發其義耳秋夫人薑氏會齊侯于卞九月公至自會為滅項故齊侯止公薑氏以公故會齊侯于卞至是乃得歸書至云者危公之不得歸也愚謂僖公賢君也然以私恩厚於季氏友死未幾嗣子間公之出擅興兵滅國陷其君於危地而弗之恤也公既免曽不討其擅興之罪魯之威權自此下移於強家僖公豈得而辭其責嗟夫始之不忍治而遂至於不可治魯季衛孫齊田晉韓魏趙皆是也冬十有二月乙亥齊侯小白卒或曰子謂伯者霸也古者二伯任幹方之寄周召嘗分陜矣何以不言霸齊桓晉文乃言霸何邪曰周公召公王者之佐純乎王道不雜之以他術也且是時天子威令行於諸侯周召雖居二伯之位舉其常職而已及周之東遷歷平桓逮惠襄王綱盡弛桓公掖天子以令諸侯假王命而施霸政時使之然耳而霸者之處心行事純疵半焉公矣而不能不私仁矣而不能不暴信矣而不能純乎信義矣而不能純乎義烏可與王者之佐同日語乎且以齊桓之行事而言存三亡國近乎仁也滅談滅遂降鄣遷陽何有於仁會單伯宰周公翼王近乎義也而天王出居于鄭不能以一兵勤王受命伐衛則取賂而亟返何有於義哀薑以淫預弒誅之公也而聲薑復為陽榖之會昵于私而不能禁徐許被兵率諸侯往救信也黃被兵歷三時之久而坐視其滅而不問信安在乎是謂純疵相半伯所以異於王也然自齊桓之霸諸侯始復尊周臣弒君下篡上強併弱與諸侯之黨篡輔逆者自是始知所戢而有所畏如楚如狄其先皆有憑陵中國之心及桓之興震之以威武御之以長算莫不有所憚而不敢肆而其行事紆徐不迫當戰而不輕於戰當伐而不輕於伐當會而會諸小國之至不至不深加責也而其事功之著於當世者尊王也攘楚也晉文則踵其行事而俱以霸稱者也孟子曰堯舜性之也湯武身之也五霸假之也久假而不歸惡知其非有南軒張子釋之曰假仁義者未有能久之者也使其假之而能久久之而能不歸孰曰非其有乎有之者不係於假而係於不歸深得孟子與人為善之意自桓文殁未有能繼之者降而戰國春秋所謂哀也降而秦而其亂伊於胡底乎豈惟王風頓邈而霸者之行事不復可見矣漢宣帝自謂漢家行事本以王霸道雜之烏乎若宣帝者吾見其不足於霸又何王之有哉十有八年春王正月宋公曹伯衛人邾人伐齊夏師救齊五月戊寅宋師及齊師戰于甗魚輦切齊師敗績狄救齊公羊曰曷為不使齊主戰與襄公之征齊也曷為與襄公之征齊桓公死豎刁易牙爭權不葬為是故伐之也案左傳齊桓公無嫡子有庶子六人無虧者長衛姬之子昭者鄭姬之子桓公中嵗與管仲共謀立昭為世子且屬之宋襄以為外援世子之位定矣桓公死豎刁易牙因內寵殺羣吏而立無虧世子昭奔宋宋襄為之出師納昭以嘗受託孤之寄也劉氏胡氏以宋襄為奉少奪長故春秋書及書救以責之立論固為據正然以當時之事而言君與大臣既樹太子於無事之時而宦官嬖人擅廢置於倉猝之頃無乃非所當立乎且如魯隱公者繼室之子長且賢當立而立者也程子胡氏猶以為不承國於父而疵其非正今無虧之為長非若魯隱之明著為國人大夫之所共推而昭者實厥父謀之大臣屬之鄰國以為太子非若魯惠有意立而未立之比以為宋襄不當為昭出師則豎刁易牙所立者遂居君位而太子廢矣可乎不可且是時齊諸大夫猶有髙國等輩預聞政事若謂昭不當立扳無虧而立之猶諸大夫之立君也今也大臣無異辭內豎忽生變則無虧者黨於易豎者也桓公管仲之不以為嗣豈無故宋襄之受託出師未為不義謂春秋深責宋襄愚竊未以為然也論者每以及戰為褒貶豫奪之所在率變亂事理以從之夫所謂及戰云者或以分主客或以别先後師之曲直初不在是又謂師救齊狄救齊者善此之救以貶彼之伐愚竊猶有疑也城濮之戰晉文公救宋而不書救楚人救衛而書救謂春秋善楚人之救衛不與文公以救宋可乎而况齊魯本仇讐之國前日莊公為仇國納糾春秋深不與之今僖公復出師定無虧之位是豈春秋之所與書師救齊不與魯以救齊也狄者齊桓公終身之所攘却今以救齊為名突如其來蓋易豎餌以厚賂召之自救彼豈知救之為義而赴人之急乎以救為善而知伐之不善拘而不可通者也愚非苟求異於前輩也蓋無虧之為長經傳初不明見春秋垂法後世必不以豎刁易牙所立者為是而桓公管子所素定者為非於宋襄之師其無責乎李唐季世宦官用事廢太子而立所善之諸王大亂數世唐卒以是而亡此後世之事可為深鑒者也讀春秋者於聖人書法宜加權衡庶幾臨大事而無惑或曰齊桓之入子糾之死春秋書之今昭之入無虧之死春秋皆不書何歟曰桓公之入子糾之死是有關係不容不書若無虧者易豎所擁立非所當立昭雖君齊庸愚罔所知桓公霸業隳於是無足録者奚其書秋八月丁亥葬齊桓公冬邢人狄人伐衛狄始人榖梁以為善狄之救齊而進之果善之何不於救齊之際而善之今乃於伐衛而進之蓋榖梁不深考當時之事謂宋襄伐喪以圖霸故其説如此夫宋衛曹皆齊桓平日之所厚者世子為二豎所擯為之伐之所以報桓之惠今謂三國報惠為伐喪謂邢狄伐衛為救齊愚不喻其説蓋春秋書邢人狄人伐衛者責邢不當與狄比而伐國也狄嘗滅邢邢與狄為仇國今乃比而伐衛義理之心無復存者邢尚能國乎春秋以邢儕狄正所以疾邢而謂之進狄害義豈不甚乎僖公元年荆革號為楚以師伐鄭亦書楚人伐鄭憂其漸盛為諸侯患何進之有哉春秋集傳詳説卷十
