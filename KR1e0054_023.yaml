body:
  text: 春秋集傳詳説卷二十三宋家鉉翁撰昭公一名裯襄公子母齊歸十周景王四年立是歲晉平七年元年春王正月公即位入春秋即位以正者四君文成襄哀也皆繼先君而立承國於父昭公乃子野之弟母齊歸乃子野母敬歸之娣季氏越次而立之魯大夫穆叔謂太子死有母弟則立之無則立長子野非嫡夫人之子不當立其娣子季氏不從則襄公諸子蓋有年長而當立者季氏利昭公之幼弱而立耳隱公之立正也先儒猶以為內無所承上不稟命故春秋不書即位今子野死昭公越次而立內無所承上不稟命者也春秋何猶書即位乎嘗竊觀聖人之微旨昭公所以特書即位者正季氏逐君之罪也季氏竊魯國之柄犯上作亂漸至不制昭公起而誅之此人君之所得為事不克濟殞身於外嗣子復為賊臣所擯不得有國春秋若不書即位無以明君臣之分而正亂賊之戮故於昭公特書即位為其有討亂之心與夫為大夫所立而俯首屏氣受制於賊臣者不可同日而語矣此書即位之變例蓋昭公之立與文成襄哀異矣叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢義已見襄二十七年會盟于宋宋之盟虢之會夷之利而非中國福也愚前已論之因木訥所評有云趙武為宋盟而弭天下之兵諸侯安之於是復率諸侯之大夫而為天下之利甚大故春秋褒之吁誤矣木訥每以利害而談春秋愚恐為後人之惑不容己於言也夫夷夏有常分中國之尊不與夷狄對峙並存於宇宙之內也帝王盛時事不復可談於衰世自入春秋以來百七十年楚僻居南服雖崛強自大而不得與晉齒也中國諸侯依盟主以自存其有屈於夷者暫也非其常也宋向戌持弭兵之説以內交於二國辭曰弭兵始謀未嘗欲驅中國諸侯而為楚役也趙武不明內外之分苟偷目前之安于宋之盟首紊常經倒置冠履俾晉楚之與國交相見而中國諸侯宋魯鄭衛咸北面於夷楚之庭為辱實大其甚悖義者始以弭兵而合晉楚之成既而楚盛兵以臨諸侯滅陳滅蔡滅賴芟夷小國憑陵諸夏人有左衽之憂夷狄之禍至是為烈而陋儒苟見目前之暫安遂以盟楚為天下之大利是之謂邪説有國有家者所當深懲而痛絶雖加以正卯之戮殆不為過也所謂讀舊書不歃血者楚再為長而晉不敢與爭中國之恥也而謂春秋與之豈非誣乎蓋春秋為中國惜不使夷得以僭華是故長晉夫豈謂晉人所行為是褒之而無貶乎會盟于中原遜裔夷以為長此豈小失而謂晉人以信為本故春秋每書必先豈不大失春秋之本旨乎蓋榖梁左傳倡之後之儒者借説經以迎合時論愚讀書至此不能不為憤歎也三月取鄆公羊作運公羊曰內邑也其言取之何不聽也注謂運叛而魯討之不當書取左氏以為莒之鄆魯伐而取之諸儒多從左氏但鄆有東西之異文十二年城諸及鄆者魯鄆也成九年楚入鄆襄十二年季宿救台入鄆者莒鄆也傳謂魯莒爭鄆為日久矣蓋地相接而名偶同此為莒鄆何疑不書某帥師伐莒取鄆者為魯諱亦以貶也諸侯方為會而魯以兵取人之邑此與盜竊何以異是時昭公新立豈知為此皆季氏所為也蓋救台入鄆之時欲取而未得至是遂取而有之楚人欲治其罪趙武反曲為辭説謂封疆之削何國蔑有主齊盟者誰能辨之自武為是言當時諸侯益無所憚小國幾不能以自存楚亦用是輕中國韓之會所以肆行而罔忌武實有以召之夏秦伯之弟針出奔晉義初見隱七年公羊曰仕諸晉也有千乘之國而不能容其母弟故君子謂之出奔也榖梁曰諸侯之尊弟兄不得以屬通其弟云者親而奔之惡也此秦后子也有寵於桓如二君於景其母懼其及於禍使之奔晉傳謂針適晉有車千乘夫以千乘之國而區區母弟車之多伉其君針之汰亦甚矣書秦伯之弟出奔晉不惟譏秦伯亦貶針也其母使之奔母亦智矣使如叔段之母則亂作於內誅不旋踵其所以卒得返國由母賢故爾后子豈得無罪三傳專責秦伯過矣六月丁巳邾子革卒晉荀吳帥師敗狄于大鹵公榖以為太原大鹵太原也狄來冦晉敗之於太原本無譏也據左傳晉人於是始毁車以為行誘狄而敗之胡氏曰使後世車戰法亡崇尚步卒以變詐相高皆此等啓之書敗譏之也秋莒去疾自齊入于莒莒展輿出奔吳義已見襄公三十年莒人弒君左傳以展輿為弒君父之賊前既辨其不然矣但展輿者因國人弒君而得立不能為父討賊莒之罪人也去疾乃密州之長子厥父舍長立少去疾則當立者也今去疾自外而入展輿出奔春秋皆繫之以國者展輿為君不得不繫之以國繫而奔之耳去疾為長則繫以國而入之雖然地居長當立而其父未嘗命之以為世子則其立也為挾大國之力非立之正優於衆公子之自外而入者不得不以世子自居矣故鄭忽在春秋之世獨得以世子而入所以存其為長異乎庶孽之干正者也叔弓帥師疆鄆田前此取邑多矣未有疆其田者今而書帥師書疆鄆田何哉蓋魯之鄆與莒之鄆壤地相接名雖同而二國之境截然不可紊也今魯乘莒之有亂伐而兼之又懼莒人來爭不已故出師往疆其田疆之者不宜疆者也周之建國疆理具在取他人之有又從而疆之重貶魯也葬邾悼公冬十有一月己酉楚子麇卒左傳謂公子圍弒之諡曰郟敖圍改名為虔春秋書卒而左傳以為公子圍弒之凡弒而書卒者有之如襄七年鄭伯髠頑如會未見諸侯丙戌卒于鄵不書弒而弒之義見今麇死惟書楚子麇卒愚竊觀經旨疑傳所載之未實也蓋圍所弒者楚之嗣君麇之世子如魯子般子赤之類而非弒麇也何以言之麇病革圍聞其將死自外急歸乘君之殞戕其子而篡其位是亦弒也而非弒其君麇當時諸國傳聞之誤有以為弒君者耳不然圍之罪顯著春秋何以不正其弒君之戮而惟以卒書乎自昭公之後夫子年在弱冠親見一時之事故據實而書之胡文定纍數百千言求以通左氏之説辭雖繁而終未可通不若據經之為實楚公子比出奔晉二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黑公孫黑之死當其罪矣稱國以殺何哉殺不以其罪耳黑之攻良霄也其罪固已當誅子産畏之而不能正也兄弟爭室其罪均當逐子産又畏之而不能裁也今因其傷疾作始克明正典刑亦云晚矣以纍上書言鄭國之無政也冬公如晉至河乃復季孫宿如晉榖梁曰公如晉而不得入季孫宿如晉而得入惡季孫宿也十二年傳又曰季氏不使遂乎晉與此互文以見義公凡六及河而復惟二十三年書至河有疾乃復者實以疾復愚謂昭公之立至此曽未兩年雖無可稱之善亦未有顯然可指之惡晉平拒而不見晉平甚庸豈知為此斯皆晉之強大夫黨於季氏疏絶其君以從季氏之欲愚意魯昭是時已有鋤治強宗之意將謀之晉君藉盟主之力而去之為季氏所先故屢及河而不得進春秋書之深著晉人黨臣抑君之罪亦以垂人臣外交之戒云三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公襄公之葬滕子來會故叔弓如滕特書秋小邾子來朝八月大雩冬大雨雹此著時而書雨雹又加以大字頻見於一冬也明年春正月又著月而書雨雹亦加大字頻見於一月也隂陽和而為雨露霜雪隂陽爭而為雹厯時彌月而未巳臣干君下陵上其兆見矣傳載申豐之言歸咎于藏冰之失胡氏駁之曰山谷之冰藏之也周用之也遍亦古者本末備舉燮調之事耳謂能使四時無愆伏淒苦之變雷出不震無災霜雹則亦誣矣申豐季氏之黨故為諂辭以塞人君遇災之懼左傳之録之過矣胡氏駁之甚當北燕伯欵出奔齊燕初見桓十二年北燕姬姓在晉之北召公奭之後也稱北燕所以别於南燕北燕為山戎所隔齊桓公伐戎開道乃與中國通國君出奔有書名以奔者有不書名以奔者衛侯衎為孫寧所逐奔而不名北燕伯欵為諸大夫所脅奔而名之亦各以當時事為書法之抑揚耳據傳北燕伯多嬖寵欲去諸大夫而立其所嬖燕大夫比以殺公之外嬖公懼而奔則其奔也亦有以自取與孫寧作亂逐君其事差若不同此所以有名不名之異耳或曰嬖寵固不可任羣卿有若齊田魯季衛孫氏者其必任之可乎曰是所謂權臣非所謂公卿大夫也所貴乎國君者選賢拔能布在有位信之任之與之共圖國政近習不得聞也國有公卿大夫而以近習間之亂也若夫控御權姦固自有道不可與近習謀義已見襄十四年衛侯出奔四年春王正月大雨雹義已見去年冬大雨雹夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚書爵義見前楚人執徐子宋之盟虢之會晉楚同之猶以紊夷夏內外之辨春秋譏焉今楚虔新立逞其狂悖從晉人求諸侯晉之君臣不知為中國惜輕以許楚遂合夷夏之君十有三國而為此會夷主夏盟會盟之一大變也趙武韓起叔向無以辭其責武起不學倚叔向以決大議而晉楚之從交相見與今茲求諸侯而為此會議皆從叔向而決而輕徇夷楚坐失夏盟遺中國以恥人謂叔向為忠且智吾但見其委曲順從以苟目前之安而已是會也夷主之夷會之是之謂夷會中國諸侯預於夷會者辱也魯以時祭辭衛以疾辭曹邾以難辭皆不至惟鄭伯先至于申宋世子後至宋向戌鄭子産又從而獻禮焉嗚呼曹邾魯衛猶有羞惡之心子産鄭國之良伍於夷而不自以為恥豈非利害所迫失其本心者歟春秋序鄭於頓沈胡之前齒宋於淮夷之列夷之也秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴公榖作滅厲始向戌合晉楚之成曰以弭兵也今楚虔既得諸侯遂動兵伐吳吳雖與楚為仇而預於中國會盟姬姓同盟之國也楚輒以兵加吳是之謂背盟晉之為政者當召向戌責以楚人背盟首禍之故執而歸之京師遣使詰楚期以罷兵守境彼若不從我奉辭以問其罪師直為壯未至遽出楚下而晉平荒淫不度其臣各為其私坐視夷楚流毒中原略無所問春秋聯書會盟伐國辭繁而不殺哀晉人之失霸夷狄之禍方來而未已也或曰執齊慶封非討有罪乎曰楚虔弒嗣君而篡有其國賊之未討者也今伐吳執齊慶封而聲其弒君之罪是謂以賊討賊春秋之義用賢治不肖不以亂治亂也遂滅賴著楚之暴也齊桓公侵蔡蔡潰遂伐楚為中國攘夷狄遂事之正也今楚虔怙其強大劫中國之諸侯而滅無罪之國書遂所以誅也遂之為義要當隨事而觀以求經意執一例則拘矣九月取鄫先是莒人滅鄫左傳以為莒實滅鄫公榖以鄫人取莒甥為後是以著義為滅愚從公榖之説今書取鄫左傳以為魯取之於莒公榖無文考之傳魯人常請屬鄫于晉鄫故魯之附庸其後莒以其子為後于鄫視鄫為彼之私屬魯莒既有積憾乘晉霸之不綱爭鄫于莒而遂取之耳前曰莒人繼鄫鄫之廟社猶存今為魯所得而鄫於是始滅春秋書取鄫責魯也魯滅鄫而晉不問晉亦重可責矣冬十有二月乙卯叔孫豹卒昭子立五年春王正月舍中軍義已見襄十一年作三軍舍中軍榖以為復正公羊以為復古皆非也左傳曰舍中軍卑公室也初作三軍三分公室而各有其一今舍之四分公室季氏擇二孟叔氏各一皆盡征之而貢於公蓋舍中軍非復為二軍乃析三軍為四而季氏獨有其二孟叔氏各有其一於是魯國兵權盡屬季氏昭公莫之能正不得正也而孟則羯亡而貜始立叔氏則豹卒而婼未安于位皆惟季氏所欲為當是時諸侯大夫狂恣犯上未有若季氏父子之甚者使非家臣內叛有以掣其篡弒之肘則田常所為不在齊而在魯禍不止於乾侯之出也或曰春秋何以無貶曰兵有常制今季氏專魯作之未幾旋復舍之春秋書作於前書舍於後季氏變更軍制之罪不待貶斥而見矣左傳曰舍中軍卑公室也得書法之旨楚殺其大夫屈申楚靈以屈申為二於吳而殺之殺之不以其罪也劉氏曰屈申之為人臣也君弒而不能討國亂而不能去北面而事寇讎足以殺其身而已矣責之甚當楚靈之圖篡也羣臣從者風靡不過為保身保家之計既而卒不獲免為人臣子者觀是知所鑒矣公如晉夏莒牟夷以牟婁及防兹來奔義見襄二十一年邾庶其來庶其牟夷邾莒之盜也季孫宿魯之盜也襄二十一年公如晉庶其以地來奔季氏納之今公如晉在行牟夷復以地來奔季氏又納之季氏乘魯君之出招納邾莒之叛人叛邑以為己之私有不曰魯之納盜可乎中間襄公如楚還及方城季宿取卞使人以告公懼不敢入幾欲適諸侯今公在晉而宿所為復爾蓋置其君於陷穽罟擭之地將使晉人執之已得以遂其竊國之計意如逐君之謀實兆於宿宿實有無君之罪左傳承魯之諂史以為昭公造釁殆不然也義又見昭二十一年秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉公羊作濆泉秦伯卒左傳以為未同盟故不名公羊曰何以不名夷秦也匿嫡之名也注謂子生不以名令於國惟擇勇猛者立之嬰稻以嫡得立故名愚謂秦自穆公以來遵禮守法未甘於夷也不應尚循弊俗如公羊所云但吉凶慶弔之事少通中國故史失其名春秋因之而書非貶也或曰秦人告不以名故略之亦恐未然前已辨之矣冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越始見而書人論者疑之而未得其説愚以為人之於夷之會非進之中國之會與襄三年吳人會戚不同也胡文定以為楚伐吳克朱方戮齊慶封討罪也吳不當興師以報楚於是復為此役師出有名是故從之者皆進而稱人愚竊以為未然也楚虔篡弒之賊罪之當討者也已有罪未討乃云為齊討賊春秋不以亂治亂以賊治賊也吳之報楚楚之伐吳夷狄自相攻耳其從之者皆迫於威力烏知曲直義利之辨今謂其師出有名春秋併其從之者皆進而人之春秋進夷狄未有若是之驟者此人之於夷之會何疑若中國會盟則決無可進之理胡氏議論或過於峻輕於與關繫春秋條貫不容己於言也六年春王正月杞伯益姑卒葬秦景公夏季孫宿如晉葬杞文公宋華合比出奔衛宋平公以寺人伊戾之讒害其太子而誅之矣既誅之則太子為無罪而寺人可不必信今以合比之事觀之則伊戾死而寺人栁繼之復以伊戾所以譖太子者而譖其大臣坎用牲埋書以售其險謀後先如出一轍而華亥之比栁與向戌之比伊適以相似而平公不之悟也嗟夫閹宦禍人國家有自來矣然必外廷臣與之合而其譖乃售伊栁戌亥之事後世往往有之可不懼哉可不戒哉秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕齊侯伐北燕將納其君書爵書伐為其師出有名也不書所以伐則貶也前此衛侯為孫林父所逐晉不能討春秋貶焉今齊侯為北燕伯出師實行霸討之事晉人有愧多矣春秋是以貴之而齊景公立心不剛仗義而往納賂而還是以春秋書伐不書所以伐著其不能成功也是時晉平愚暗楚靈狂暴中國無霸人有左衽之憂齊固霸國景亦賢君而志不能以帥氣每欲有為輒為近幸小人所沮優遊不斷以逮終老而國非其國矣惜哉七年春王正月暨齊平左傳以為燕暨齊平承去年齊侯伐燕而為説也榖梁以為魯暨齊平以書法當從榖梁定十年及齊平夏公會齊侯于夾谷約而後會耳此先書暨齊平約之也繼書叔孫婼如齊涖盟往盟之也但春秋有書及書暨之不同公羊曰及猶汲汲也暨猶暨暨也我欲之曰及不得已曰暨是時魯婚於吳睦於晉而又附楚無意與齊為盟齊欲之也故書暨然亦不可執一例而求三月公如楚叔孫婼如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒榖梁曰鄉曰衛齊惡今曰衛侯惡何為君臣同名也君子不奪人名不奪人親之所名重其所以來也注謂親之所名臣雖欲改君不當聽也君不聽臣易名者欲使人重父命也榖梁此義其必有所授矣蓋所謂諱者特諱之於廟耳未聞生者而為之諱衛之君臣同名乃其明證後之人以諂事君諱其所不當諱是故春秋每因事而垂法九月公至自楚冬十有一月癸未季孫宿卒自季友至行父雖專魯國猶善事其君無悖於臣節至于宿乘主幼盡盜兵權擅伐國取地以自私襄公幾為所逐自後世而言司馬懿其人也至昭師遂移宗社意如逐君宿所命也其魯國之大盜歟十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒案左傳陳哀公以溺愛之故欲廢太子偃師而立其孽子留屬留於司徒招招由是殺太子立留哀公縊如傳所言廢太子本哀公意何為憂懼以至於縊以春秋書法而觀招實為之耳意者招與二姬謀廢嫡立庶如敬嬴襄仲之所為而哀公未之知是故書招殺不然將目君如晉獻宋平之殺矣木訥云春秋書弟有二義其責皆在兄弟而賢乃至於不相容兄之過也弟而不賢乃至於不能制亦兄之過也不相容是不友也不能制是失教也惟鄭之段則兄之過為輕而逆在段故不書弟如陳侯之弟黃出奔楚是不相容者也若宋公之弟辰入于蕭以叛是不能制者也今陳公子招至于殺陳世子偃師尚為能制之者乎故書陳侯之弟而不書公子以陳侯不能教其弟而禍及其子也然招之惡亦既貫矣上抗其兄下殺其姪卒之召楚人之虐陳以不祀皆招之罪也雖然非陳侯寵任之過不至於是故前書公子招此書陳侯之弟木訥春秋惟鄭段一節講明至到諸説皆不能及叔弓如晉楚人執陳行人干徴師殺之陳人作亂殺其太子致其君死不以正命罪在一招楚不能討而縱之于越干徴師何罪而以為首戮乎蓋楚靈因陳亂以為利賊殺不辜欲以震怖陳國而墟其宗社殺人以行其詐者也春秋先書招之罪繼書干徴師之死繼書孔奐之死言當討者縱無罪者死傷夷誅之行乎中原莫得而正也陳公子留出奔鄭留為招所立未成君秋搜于紅搜者搜簡軍政之總名常事不書此所以書者憂季氏挾兵權盜有魯國漸至不制而書之耳傳稱大搜于紅自根牟至商衛革車千乘魯兵初不為少井邑甸丘盡為強家所專制作三軍未幾復舍中軍四分公室而季氏竊有其二兵皆季氏之兵將皆季氏之將號令政事一出於季氏日搜簡何益哉自是迄於定哀之世凡四搜入春秋以來搜事未有如此頻者春秋備書於䇿著季氏專魯國挾兵權以脅制其上是搜也蓋季氏之搜國何有焉書搜書大搜為魯憂耳或以為搜春事而秋興之是故譏淺哉陳人殺其大夫公子過過與招同為亂招其首也春秋既於今年春正招首惡之罪今招委罪於過而殺之春秋復於此而正過同為亂之罪招與過皆當有罪但首從之不同耳不去其官而書殺其罪亞也過以從而死招以首而放著夷楚之失制也大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐陳舜後也自晉悼公鄬之會逃盟而歸楚逮今三十四年甘為夷役而不恥彼謂夷可託國而無復慮外之憂矣今夷為不道乘陳招殺太子而掩取其國挾義聲以行其大不義與楚莊之討夏徴舒後先一轍莊取之而旋舍之靈則遂取為己有明德之後百年之間再有夷禍此春秋所以動色而書之自春徂冬凡七見書皆陳事言之重辭之復閔陳而罪楚也責中國諸侯不能治陳之亂使夷得以行詐而滅人之國也招自知罪在不貸卻兵開門以納虔虔德之而免其死孔奐者陳之舊臣拒虔不受為所殺春秋於陳亡招放之後而書奐死録奐也杜氏以為招黨誤矣吁留則奔之招則放之干徴師無罪而殺之孔奐守節而害之春秋備書以見楚靈之不道夷狄之禍方熾而未已為中國憂也葬陳哀公或曰陳哀公之葬傳以為衆嬖人殺馬毁玉以葬之春秋之書之何歟曰此書葬之變例也讎未復賊未討而以葬書國既亡無與任討賊之事者也國既亡而書葬亦所以存陳也孫泰山曰陳已滅此言葬陳哀公如未滅之辭者楚子葬之也不言楚子葬之者不與楚子滅陳而葬哀公故以陳人自葬為文所以存陳也春秋集傳詳説卷二十三
