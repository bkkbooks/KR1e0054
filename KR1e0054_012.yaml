body:
  text: 春秋集傳詳說卷十二宋家鉉翁撰僖公四襄王二十一年晉文五年二十有八年春晉侯侵曹晉侯伐衛侵曹伐衛以救宋也救宋而翦楚晋文所以造霸業也去年冬春秋書楚人偕陳蔡鄭許圍宋又書公㑹諸侯盟于宋著宋之急也今年春繼書晋侯侵曹晉侯伐衛言晉侯之侵曹伐衛攻楚人之必救以救宋也不言救宋其事關繫乎中國甚大非特救宋而存宋也自宋襄之敗强楚威行中原諸侯厥角稽首惟恐服從之後宋既屈服預楚盟㑹而楚猶攻圍未已是必欲為併兼之計列國為楚有可立而待也幸而文公繼興首以救宋攘楚為事春秋書之曰晉侯侵曹晉侯伐衛不間事而重舉晉侯所謂言之不足而重言之為其先天下之所難有以慰中國諸侯之望耳然春秋於霸者之行事褒之中每見責備之意以其未受命于王而先行霸討雖與其救宋不與其專伐是故重舉晋侯而見意焉正如衛人殺州吁衛人立晉與其能誅弒賊而不與其専立君書法與此相類責備賢者之道也方宋人告急狐偃言於文公曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是作三軍謀元帥始出而侵曹自曹而及衛專為齊宋計耳論者惑於左傳之浮辭乃云晉侯侵曹伐衛以報奔亡不禮之憾既不深考當時之事又不原聖人書法之本旨輕易貶斥實失經意胡吕氏為甚愚不可以無辨也蓋齊桓晉文之行事有適相類者桓公之伐楚也先侵蔡蔡潰而後伐楚左傳謂桓以一姬之故而動兵伐蔡其實非也當是時中國諸侯惟蔡最親於楚是以先侵蔡而後伐楚晋文之侵曹伐衛亦猶是耳左氏乃曰文公之為亡公子也曹衛不為之禮故以二國為首伐實亦非也觀狐偃始所以告其君者則知侵曹伐衛實為齊宋不為其私左氏雜記所聞讀春秋者要當擇而取之烏可棄人之善而専録其疵以是窮春秋失褒貶之正矣蓋齊宋二國皆楚人之所忌而曹之與衛乃楚人之所最親是以晋文侵之伐之攻楚人之必救以解齊宋之急其事最為明著夫豈動大衆釋私憾汲汲報復如傳者所云乎聖人嘉其伐楚之功中寓専伐之貶此乃責備霸者之道於齊桓晉文之行事皆然諸儒以傳汨經失春秋用法之權衡故不得不辨公子買戍衛不卒戍刺之魯之戍衛以楚故也晉方伐衛魯人懼其併及乃以不撤戍為買之罪而殺之將以自解于晋耳殺無罪之大夫以求說而自解春秋之所深惡也故不書殺而書刺蓋明知其無罪而殺之於幽暗之中云耳與周禮三刺之義不同又見成十六年刺公子偃楚人救衛書救有二有善其能救者有不與之以救者中國諸侯見侵於強暴盟主救之春秋之所善也中國諸侯去順效逆盟主伐之同惡救之非春秋所善也楚自去年率諸侯圍宋將為必取之計晉文公起而圗之侵曹伐衛皆所以救宋也春秋不以救宋書者為文公此舉關乎天下之存亡盛衰救宋不足以盡之耳晉不書救而楚之於衛乃以救書夫豈善楚之能救衛乎衛以中國諸侯而甘於從楚霸者之師已興而執迷不復春秋之書之賤衛也夫豈與楚之能救乎或者謂凡救皆善楚之救衛亦以為春秋所與誤矣義又見襄十年楚救鄭三月丙午晉侯入曹執曹伯畀宋人執曹伯畀宋人言晉侯入曹而執其君為救宋也諸侯從於楚盟主伐而執之固當其罪不以歸之京師而執以畀宋人則貶也或曰此執曹伯春秋爵晉侯是嵗執衛侯歸之京師春秋人晉何歟曰執曹伯為伐楚而執之也所以明王法而伸霸討也執衛侯以元咺訟而執之也衛侯固有罪以臣之訴而執其君理逆而辭弗順雖歸之京師猶為有責是以人之夏四月己巳晋侯齊師宋師秦師及楚人戰于城濮楚師敗績城濮之戰為救宋而戰也豈惟救宋尊天子安諸夏郤强楚在此一舉是以聖人爵晉侯序於齊宋秦之上胡文定乃謂楚子玉請復衛侯封曹亦釋宋圍未有必戰之意而先軫獻謀以怒楚而求與之戰故楚雖請戰而及在晋侯誅其意也吁以左傳之浮辭而汨聖人之書法過矣自入春秋迄今九十餘年中國諸侯與楚人戰者有矣然各為其私計孰有如晉文城濮之戰中國以安王室以尊楚氛甚惡為之大挫者乎當是時賊入我之腹心潰決我之堂奧橫行中原憂在天下晋文雖欲坐視不問有不可得也然猶退三舍以避楚子玉不為止而後與之戰謂楚無必戰之心晋激之而與之戰殆不然也春秋爵晋侯於三國之上貴之也奚貶哉凡戰我為主而彼為敵則書某及某戰于某褒貶初不在是也晉人及楚三大戰皆以晋為及先儒謂城濮邲鄢陵外楚而內晉柏舉內蔡而外楚者是也列國及楚人戰書法固當爾持一及字為例而謂春秋不與晋之攘楚何其偏之甚歟及戰義詳見莊公二十八年或曰齊桓以不戰而服楚晋文以戰勝而服楚二公優劣其在是乎曰否時不同也敵之強弱異也當齊桓之霸楚始窺伺中夏侵二三小國以撓我之藩籬故齊桓以諸侯之師次于陘受盟而返春秋與之今晋文之霸也楚伐齊矣圍宋矣中國諸侯即安于楚而不以為恥矣晉文若斂衽退避如齊桓晚嵗坐視黃滅而莫之救則楚飲馬河洛問鼎大小周其亡矣胡文定乃曰文公一戰勝楚遂長夏盟以功利言誠亦髙矣語道義則三王之罪人是故春秋於城濮之功所書如此之略吁論則美矣非聖人意也春秋命德討罪賞善罰惡尊中國正諸夏遏寇亂皆道義中所當為之事諸侯有功有善者褒之録之有罪者討之强暴之慿陵諸夏者攘而郤之如元氣行乎四時春生秋殺各中其度而不忒者春秋之教也夫豈曰我為道義是謀置刑賞功罪於不言乎蓋仲尼之門主於明王道故羞稱五霸春秋之教主於垂王法諸侯有能以職分自見者固在所與道即法也法即道也非道之所棄法之所取也學者觀乎堯舜禹湯之行事而得春秋用法之意矣胡氏之學矯枉過正恐失春秋之旨楚殺其大夫得臣成敗利鈍兵家之常違命者有誅逗撓者必斥而敗軍者不皆死也楚殺得臣秦穆不棄孟明視二君之賢否於此可見學者觀聖人之録秦誓則知楚殺得臣之為非矣楚前此不書大夫今於得臣之死始書大夫惡其專殺之不當也劉氏曰此殺有罪而以纍上之辭言之惡楚子也楚子知其不可使也而不能勿使知其不可敵也而不能勿敵是亦棄其師之道也此說甚當愚謂晉文退三舍以避楚而子玉不為止是亦有死之道故書大夫而去族衛侯出奔楚晉文公才有餘而量不足於處置衛事而見之衛固當有比楚之罪伐之未為過也及齊晉盟于斂盂衛侯請盟而弗許致衛人出其君以求說則為已甚矣元咺相叔武聽命於踐土以臣禮進之可也文公既列之於㑹經書衛子則待之如君矣未幾復衛侯致衛侯移怒於叔武而殺之晉實殺之也及元咺訟衛侯乃以臣之訴而執其君執之未幾而釋之致衛侯復移怒於公子瑕又殺之晉實殺之也夫使衛之君臣兄弟更相殘殺則文公不善處事有以致之竊嘗妄謂晉文才有餘而量不足齊桓量有餘而才不足與其為晋文寧若為齊桓衛侯奔不名春秋所以責晋五月癸丑公㑹晋侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹公朝于王所晉侯返自城濮王嘉其郤楚之勳自往勞師蓋古有勞師之禮王舉而行之耳晉侯作宫踐土合諸侯朝王王享醴命之宥策為侯伯此殊禮也而春秋書公朝于王所不書天王下勞諸儒未有的說項平甫謂天王避狄難出居于鄭亦既五年諸侯未嘗救天王未嘗歸也文公因破楚之威還過鄭土先㑹諸侯朝王然後導王北出諸侯解甲而講朝㑹之禮乃從王入京師論則新矣但二十五年文公納王乃霸業之所造端可盡廢乎晋侯召王三傳皆書可盡沒乎蓋王自出勞軍所以嘉攘楚奬有功王之所得為也既䇿命晉侯待以殊禮而文公猶以為未足乃於是冬復召王為河陽之狩為其既拜寵命於先猶欲要王以出有挾功傲上之意故春秋削其勞軍之禮以貶之繼書王狩河陽以著其召王之僣有功則褒之有罪則貶之此春秋懲勸並行而不相悖者也三傳之說其可盡廢乎陳侯如㑹與其棄楚而歸晉也書公朝王所以見王之自出勞軍亦以明君臣之分也六月衛侯鄭自楚復歸于衛衛元咺出奔晉衛侯之奔也元咺奉叔武如㑹此亦征繕輔孺子之意叔武非敢以君位自居也晋人列之於㑹待以君禮衛人謂晉文將立叔武矣俄而衛侯來歸無以泄其逃廢之憾殺叔武焉怒于晉而移之於其弟衛侯之罪大矣故其奔也不名其復也名之繼書元咺奔晉著其有未討之罪也或曰叔武之攝居君位是乎否乎曰否君位非人臣所可攝也當是時衛侯有子則當使其太子如㑹聽命無子則當以上卿往叔武居嫌疑之地其可攝乎故為人臣不可以不知春秋復歸者穀梁曰復於其國而歸其所也衛侯鄭曹伯襄之得歸也皆書名書復歸及衛侯之執而再歸也名之而不復之為其怙終長惡無復國之理故也此又歸而不復之例復歸義初見桓十五年歸而不復義見三十年陳侯欵卒秋杞伯姬來伯姬莊公之女來寧成風許氏曰常事不書此所以書志入杞之怨釋也中國有霸諸侯弛兵於是族姻之恩始録而鄰國之好交修以是為晉侯之澤也公子遂如齊冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫天王狩于河陽壬申公朝于王所公榖以為晉侯再致天子左傳以五月公朝為天王勞軍此河陽之狩為晋侯召王當從左傳天子巡狩諸侯即其地而朝焉古也今晉侯挾其郤楚之功屈天王下臨河陽率諸侯而往朝禮雖巡狩之舊而意則非矣夫霸者所以號召天下以其能尊王也晋文之始入以定襄王誅子帶為首務諸侯義之人心歸之用能成其霸業今新立大功當率諸侯朝王于京請職事焉乃以臣召君倡為不度春秋書諸侯為溫之㑹經以王狩公朝以明君臣之分著晉侯召王之愆非為文公諱過也吁齊桓㑹王世子于首止猶曰吾以尊王室也孰知繼桓而霸者遂至屈天王之尊就而朝焉蓋㑹世子不已必至召王積習之漸使之然耳啖子乃謂是時晉已强大率諸侯而入王城亦有自嫌之意原其自嫌之心嘉其尊王之意則晉侯屈王河陽忠亦至焉故春秋原情而書狩此為霸者委曲回護非春秋道名分之本旨也晉人執衛侯歸之于京師衛元咺自晉復歸于衛人臣復歸之例元咺衛之臣也衛侯雖有罪非元咺所宜訴也衛侯執而元咺歸名分掃地矣春秋於晉文治衛一事再三見之書法至是書晉人執衛侯衛元咺自晉復歸于衛君執而臣歸責晉深矣此比事而見豫奪褒貶者也然則治此獄宜何歸曰執衛侯治其殺弟之罪也執元咺正其訴君之戮也衛侯自楚而歸曾無悔過自艾之意乃逞忿以殺其弟是為怙終烏得無討縱元咺無訴晉豈當置而不問執而歸之京師是也但因元咺之訴而執衛侯則非也故衛侯不名以著晉人頗於用刑之罪元咺得歸遂立公子瑕而專其國晉實使之文公自城濮之勝志得而驕初見於召王再見於執衛侯而歸元咺三則盟諸侯大夫於王城之內皆驕矜妄行不率法度狐趙諸人略無正救之力惜哉春秋書復歸者謂復其國而歸其所若咺之復歸非與其歸也為君之見執而臣乃得復歸以責晉也所責乎比事以求聖人意謂此耳夫豈例之云乎諸侯遂圍許許嘗預於齊桓之㑹盟矣今天王狩河陽諸侯皆朝而許獨不至怙於楚春秋於朝事既畢即書諸侯遂圍許言諸侯奉王命征不服事雖微猶曰征伐自天子出故特貴之耳公以㑹溫而出以圍許而至春秋所以貴王命也曹伯襄復歸于曹遂㑹諸侯圍許此因天王狩於河陽而伸王法行誅賞示不敢專也而衛侯之執曹伯之歸元咺之復許之圍所行有公私粹駮之不同霸政所以異於王也曹伯以名歸結正其即楚之前罪而返之於國耳書遂㑹諸侯圍許言得列於諸侯無他罪矣或曰曹與衛罪有輕重之不同今皆名之何邪曰衛侯之自楚歸也名之以治其殺弟之罪非返之於國也及自京師得釋而歸夫然後返之於國故書名以結正之但衛侯怙終不改罪至於再故書法與曹伯異義又見衛侯鄭歸于衛二十有九年春介葛盧來或曰此遐荒小國而來朝于魯春秋不言朝不與其朝乎曰不言朝者諸侯不當受遐荒之朝也王者無外蠻夷鎮蕃皆有朝位明堂位所言是也諸侯無域外之觀故不當受逺國之朝此盛時制也春秋之世戎蠻錯居侯服之內其大者預中國㑹盟微者來見有不得拒也春秋書來不言朝示內外之辨也公至自圍許夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉是㑹也其失有三翟泉在王城之內而諸侯之大夫㑹盟于斯僭也王人下盟列國大夫大夫又伉於國君亦僣也葵丘之㑹宰周公不預盟踐土之㑹王子虎盟諸侯於王庭天子卿士不與列國為盟其來尚矣晉文志得而驕不自知其為僭春秋譏焉或以王人為周之微者是不然據傳王人即王子虎周之元老宿德位望甚隆非微者也書王人而不著其爵氏言王人不當下預於諸侯大夫之盟書王人所以譏也大夫僣盟於王城之內不能裁正其禮王亦有責焉耳公預於㑹不書公㑹為公諱也此固晉大夫之罪而諸侯惟魯君在當陳義力爭期王人之勿預猶可損二過之一乃依違其間以成僭禮故諱公不書亦責公也秋大雨雹冬介葛盧來介葛盧慕義而來一嵗再至春秋書以褒之春秋有大國相朝而不書者有微國來朝而一再書者皆褒貶之所在介君今春來不與公遇冬而又來其禮勤春秋録其慕義之誠是以書或曰介人之來有窺覘中國之意故明年遂伐蕭彼小國僅足以自全何窺覘之有哉此科場穿鑿之論不足言也三十年春王正月夏狄侵齊齊桓之霸也重在攘楚而忽於待狄狄之兵日強與強楚交為諸侯之患至是而愈張非復春秋始年之比矣晉文亦復置而不問蓋以其無僭王圖大之心而楚之志不在小故專意治楚而不及於狄雖然晉侯之志稍衰矣厥後作三行五軍以禦之毋乃自貽伊戚乎秋衛殺其大夫元咺及公子瑕或曰元咺訟君既勝而歸立子瑕焉咺固衛之賊也衛人討賊而與專殺大夫同例何哉曰衛侯不君元咺不臣公子瑕不弟皆名教之罪人咺固當死衛侯亦不可以言君矣故從專殺大夫之例曰子瑕既立為君凡衛之臣皆瑕之臣也今而殺之不以弒書以衛殺衆公子書又序元咺之下何邪曰子瑕之立元咺立之非以王命立也非衛人共立之也衛侯在而子瑕立瑕乃篡國之人元咺為篡之首子瑕為篡之從是故其死也序咺之次非與周歂冶厪以殺蓋不與子瑕以君也曰寧喜弒剽何以書弒其君乎曰剽者寧殖立之寧喜事之以為君既立之事之而又殺之此所以書弒若周歂冶厪者固亦盜也但春秋不成子瑕為君故二人者不得從盜弒其君之例耳衛侯鄭歸于衛或曰衛侯奔于楚而不名執于晉而不名今而名之何歟曰春秋之義開悔過之門致怙終之罰衛侯背華即楚見伐於晉及聞楚敗不自歸於中國棄其廟祏而逃於楚其罪固已當討幸而得歸乃逞忿以殺其弟是之謂怙終國已非其國矣今魯人為之納賂以請又幸而得釋幸至於再不當復而復者也不當復而復是以名而歸之不與之以復此春秋一字之權復歸例見桓十五年僖二十八年晉人秦人圍鄭左傳謂秦晉圍鄭以其無禮於晉且二于楚也鄭之二楚固有之矣以為晉文為舊怨而率秦圍鄭恐不然也晉文之始入猶曰舊怨未忘今幾年矣鄭既預於㑹盟不應猶以舊怨而加兵蓋翟泉之㑹鄭獨不至是以疑其二於楚而伐之耳左傳於侵曹伐衛皆以執舊怨為言今圍鄭亦曰以其無禮於晉愚以為傳者傅㑹之辭非事之實然則春秋何貶焉曰鄭伯去年始㑹于溫相與朝王今一不預翟泉之盟即以兵加之春秋是以貶秦伯既與晋連兵伐鄭苟知義之不可則當相率俱去不當背晉而私及鄭盟舍之徑歸秦亦有過焉耳二國自此告絶以至交兵終春秋之世故兩下俱貶而人之介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晋孫氏謂禮雖有天子聘諸侯之義然不當使三公下聘春秋譏焉論固甚正但自入春秋宰咺歸妾賵宰渠聘逆人積習之漸已非一日今周公來聘蓋舉行故事耳前日公及諸侯僅朝王於河陽今天子之宰銜命下臨魯國王之寵魯亦云至矣為僖公者自當躬朝于京以拜王命之辱乃偃然受宰周公之聘而俾公子遂報聘焉抑又二事如晉是之謂大不恭春秋垂法示後豈容盡為魯諱書公子遂如京師遂如晉貶也或曰宰咺宰紏皆書名以見責相之義今周公下聘其無責乎曰咺紏之來其責在周故名今大王使周公下聘猶曰厚往薄來吾以懷諸侯也魯乃以一公子報謝且二事如晉罪在魯非周之責三十有一年春取濟西田左傳謂晉分曹地以與魯自洮以南東傅于濟公羊謂晉執曹伯班其所取侵地於諸侯濟西者魯之舊疆成二年取汶陽與此書法全同此為魯之舊疆何疑木訥乃云因公子遂如晉晉人歸我侵疆以為晉所侵魯田今而歸之訥排斥三傳而以己意揣摩當時之事而為之說似此甚多愚不敢謂然也或曰此本魯地不曰復不曰歸而謂之取何哉曰魯自以兵力復其故疆是之謂復曹以義而歸之於魯是之謂歸魯不能復曹不以歸晉人自以威力取之於曹當禀命于王分正疆理示有所尊今取之曹歸之魯惟所欲為春秋不與魯以歸疆不與晉以伯討是故書取蓋貶也或曰晉為盟主諸侯擅相侵奪晉討而歸之正也其猶有貶乎曰此春秋責備晉文之意也夫土地皆王之所有諸侯擅相侵奪無王也盟主治其侵奪之罪固職分之所宜為更能禀命于王還以錫魯夫然後盡尊君之義春秋以是責晉文責其所可責也若夫跋扈之侯强僣之國春秋不以是而責之矣餘義見成二年取汶陽田襄十九年取邾田公子遂如晉夏四月四卜郊不從乃免牲猶三望魯之郊僣郊也成王之賜而魯公之受之也明堂位曰周公有大勳勞於王室既沒成王賜魯公以天子之禮樂俾祀周公是以魯君孟春祀帝于郊配以后稷蓋當時矜以為榮而聖門每不謂然故禮運載夫子所以語言偃者曰魯之郊禘非禮也周公其衰矣杞之郊禹也宋之郊契也是天子之事守也故天子祭天地諸侯祭社稷皆為魯之僭郊僭禮而言也杞宋二王之後於禮得郊意成王以杞宋用郊之故併錫之於魯故夫子譏其不然暨修春秋因魯之卜郊不從而特書以見意自是屢書而不以為繁著僣郊之無饗也公羊子曰卜郊非禮也卜郊何以非禮魯郊非禮也天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封內者則不祭也公羊有得於聖人之意後之言僣郊者祖之或曰魯之僣郊肇自魯公以迄於僖其來非一日矣而隱桓莊之世春秋皆不書至僖公而後書之其故何歟曰春秋因乎魯史者也魯史缺書也無考證則亦缺之而已矣隱桓莊之世國多內難是諸僭禮或廢而不講史用是亦缺書至僖公始修明舊典故史於禮文之事亦備書之卜郊於是始見非於隱桓莊無譏至僖公而後有譏也曰左傳謂啓蟄而郊而魯之郊皆無定期何歟曰啓蟄而郊者夏正建寅正月也漢初猶以啓蟄為正月中雨水為二月節及太初以後更改氣名以雨水為正月中驚蟄為二月節左傳所謂啓蟄而郊者夏正正月之郊也易緯所載三王之郊皆用夏正建寅之月啓蟄之郊是也古之郊有冬日至祀帝於圜丘者焉見之周禮春官及禮記之郊特牲有孟春正月祈榖於上帝者焉有季秋大饗帝者焉見之月令及周頌之噫嘻而孝經又曰郊祀后稷以配天宗祀文王於明堂以配上帝則郊與明堂其地不同昊天有成命曰郊祀天地也我將曰祀文王於明堂也則郊與明堂其禮亦異先儒謂祈榖之郊即啓蟄之郊大饗之禮即明堂之禮春以祈秋以報理或然也周家盛時每嵗舉行郊饗之禮圜丘以冬至祈穀以孟春大饗以季秋此外又有雩禖四時迎氣不以郊言也凡郊皆天子親行如人子之見父母身不親而以臣下攝慢也古之為禮簡而質故嵗屢行而不以為難後之為禮侈而繁故三嵗一行而猶以為不易此古今郊祀㳂革之變也今魯郊或以正月或以四月或以五月或以九月初無定期蓋魯人自知郊之為僭而卜以觀天意故卜之之頻若此春秋所以備書亦謂非禮之禮可以毋講而魯人猶行不輟是故書以譏之鄭氏謂三王之郊皆用夏正而以日至之郊為魯禮此因周正之訛而推言之耳魯之僣郊初無定時日至之郊夏正之郊皆周制也周人每嵗二郊而饗皇氏以為嵗大祀凡以八合四時迎氣之五而言也言郊祀當本之五經緯文不足據三望者舊以為海岱淮近代儒者謂魯惟當祭泰山今不郊而三望猶為僭故春秋於祭泰山不書三望則書之其說有理公羊左傳釋猶字之義亦不過如此猶者通可以已之辭譏不郊而猶望也王介甫乃曰不郊矣幸其猶望則失之逺矣劉原父似有取其說曰不郊矣謂三望通可以已猶逐其父而謂母為可併逐者也不告朔矣謂朝廟為猶愈乎已紾兄而徐者也三復其說殆不可曉蓋僣郊禮之可毋講者也郊僭則望亦僭故謂三望為通可以已告朔禮之不可廢者也故幸其猶朝于廟劉氏合而言之不其舛乎愚謂猶字之義所施不同此經猶字當如公羊之說乃若閏月不告朔猶朝于廟彼猶字乃譏其廢告朔之禮幸其猶朝于廟耳故讀春秋者不可執一字以為例乃能得聖人之意郊義又見襄七年配饗見襄三年秋七月冬杞伯姬來求婦義已見二十五年蕩伯姬來逆婦春秋於內女之適人來歸必謹記其事者示有别逺嫌疑也杞伯姬自為其子求婦於魯非請㛰之道也五年以其子來朝至是復為其子求婦愛子之情切矣以姑求婦則為非禮春秋直書其事譏也狄圍衛十有二月衛遷于帝丘去年狄侵齊晉不問以齊為大國無懼乎狄也今狄圍衛衛遷國以避之其危甚矣而晉文終不以介意視齊桓公存三亡國有愧多矣夫叛而討之服而綏之理之常也今叛者不討而服者不加存恤失其為霸之道矣齊桓晚年不能救黃猶曰黃逺而力不逮也衛近於晉非其力之不及而休戚不相關尚何以盟主為哉春秋書法如此責晉也比齊桓之行事而觀則知其為責晉三十有二年春王正月夏四月己丑鄭伯捷卒衛人侵狄秋衛人及狄盟案左傳狄有亂衛人侵狄狄請平秋衛人及狄盟衛小國也嘗為狄滅而遷於楚丘矣至是狄患未已又遷於帝丘後先三十年間國凡再遷衛之為衛抑亦微弱甚矣一旦狄有內亂衛從而侵之狄於是請平自是而後狄患稍舒北鄙不聳衛可謂能自强矣孟子曰能治其國家孰敢侮之衛其有焉盟不地者杜注謂即其廬帳而與之盟如中國所謂城下之盟狄至是始知畏然則春秋何以無褒曰書衛人侵狄衛人及狄盟言侵之盟之皆制於衛衛猶有人也凡書人連文再舉有嘉其人而書以見意者有惡其人而書以示貶者衛人殺州吁衛人立晉及此衛人侵狄衛人及狄盟嘉之也如齊人執單伯齊人執子叔姬惡之也學者以經旨而揆當時之事則知所折衷矣冬十有二月己卯晉侯重耳卒晉文公才有餘而德不足先儒論之備矣愚嘗比桓文之規模氣象與其行事而觀竊謂齊桓優游不迫猶有周家盛時氣象至晉文則淺狹迫急漸有戰國秦漢之風蓋申商之萌蘖也如城濮之役左傳所謂三罪而民服者皆失刑也顛頡從亡十九年勞亦甚矣以爇僖負羈之宫而殺之私也中軍風于澤亡大斾之左旃亦細故耳而祁瞞坐以戮舟之僑為戎右戰城濮有功未賞乃以及河先歸而殺之是三人者皆當在議勳議能之科雖有罪猶當宥況罪不至死而殺之乎蓋晉文執心不𢎞而狐趙諸人濟以深刻故其見之於事每每若此最是顚頡之死尤為少恩左氏以為三罪而民服愚以為三罪皆不當人心何服之有周家忠厚氣象當齊桓而未替及晉文則所存鮮矣善讀書者勿為史傳所惑三十有三年春王二月秦人入滑義併見敗秦于殽齊侯使國歸父來聘左傳曰自郊勞至贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉公從之愚謂臧文仲魯之賢大夫必有高見逺識異乎庸衆人者今以國歸父敏於容止辭令之間遽勸其君以朝齊禮之大節止於是而已乎前日宰周公下聘公不朝于京師以拜天子之寵命文仲曾不一言及之今國歸父修交聘之常事遽勸其君以朝以是為諂可也乃曰服於有禮社稷之衛豈非欺乎夏四月辛巳晋人及姜戎敗秦師于殽左傳榖梁作敗秦師公羊無師字殽之師不言戰而言敗惡秦也晉人者晉子也其曰人微之也不正其釋殯而主乎戰也其所以謂之秦者乃外之也晉襄親之而稱人貶也君在殯而用師危不得葬是以貶也秦始以兵戍鄭將以存鄭也至是乃因戍以為襲鄭人覺之秦兵轉而入滑晉君臣聞秦師之來䇿其將不利於己出師以邀之敗於殽三帥皆為獲春秋惡秦人之用詐而外之惡晋侯之背惠而人之是固俱責而責秦之意重於責晉矣或曰殽之敗秦與城濮之郤楚其事可得同日語乎曰不得同也晉之郤楚以天下大勢而言晉之狄秦以二國曲直而言城濮之戰功在天下者也殽之戰功在其國者也然則孰為曲孰為直曰皆曲也秦為甚前日秦晉圍鄭秦伯私與鄭盟引兵而去之此其所以啓釁今晉文以去年十二月死而秦穆即以今年春出師襲鄭非襲鄭人之虛蓋乘晉人之喪其志將以得諸侯繼桓文之霸業其不專為鄭滑亦明矣使晉之君臣稍不自强秦將觀兵中原脅從魯衛諸小國以遂其欲霸之素心猶反掌易耳幸而文公有子遽發兵扼而北之楚既畏服秦亦疲敝晉得以世其霸業是雖一國之功不得與城濮同日而語然亦庶幾幹父承考者矣齊桓在位四十年身死名滅無子也晉文居位十八年餘威行乎中夏子孫繼主夏盟付託得人之效也論者類曰文公受秦穆大惠而其嗣不能繼好事秦遽興師薄人於險以是為非春秋所與其實秦晉之隙兆於合兵圍鄭之時至是晉文身死未寒秦忽以兵襲鄭滅滑蓋將循楚成圍宋之軌晉襄苟欲置而不問不為亡親事楚之齊孝則為束手就執之宋襄中原且以是多故謂之師出無名薄人於險不可也但文公城濮之戰退三舍而報楚之惠今晉襄身在戎行略無下秦之意殱秦師且盡自是亟戰屢勝得已而不已是故春秋人以責之或曰子墨從戎其無譏乎曰金革變禮古人所不能廢也國有大喪敵乘我之喪以危我之國憂在宗社墨而即戎未傷於孝若邉鄙小警非存亡安危之所繫釋喪而起罪也晉襄之禦秦師將以繼父之志身不親則師必敗楚攻其南秦撓其西晉之衰可立而待夫豈㑹侯從戎小小利害之比乎後世之事有類此者五代周髙祖殁北漢人乘其喪大舉來寇世宗釋殯御戎一戰而郤之中國得以無事使世宗畏避退縮付禦敵於諸將則長驅深入周遂亡矣仁人孝子權時度宜以決大計而安宗社亦春秋所與也癸巳葬晉文公狄侵齊義併見晋人敗狄于箕公伐邾取訾婁秋公子遂帥師伐邾此魯人乘晋文之殁而用師小國為逐利之計書伐書取所以貶也夫晉霸國也魯望國也霸國諸侯之長望國諸侯之師望國當以德義為重豈待霸國率之而後正乎齊桓之殁宋楚爭霸魯於是乘之而伐邾嵗至于再今晉文告歿秦晉交兵魯復於是時乘之而伐邾嵗至于再魯不能崇望國之體每乘霸國之多事而侵陵小國雖以此受霸國之摧辱百謫而終不以為悔由君無自强之德為之大夫者皆保權固位之人望國之不能望職此故也晉人敗狄于箕或曰狄伐晉晉人與戰而敗之獲白狄子此禦侮也春秋人晉何歟曰晉為盟主但知自救而不知拯諸侯之急春秋所以譏也前年晉搜于清原作五軍曰欲以禦狄自是狄侵齊圍衛衛遷于帝丘而晉皆不救今狄以其兵犯晉然後與戰僅得一勝焉知自救而已視齊桓公之存邢復衛得不有愧乎故春秋人之或曰春秋記戰伐侵入甚詳而於外兵未有言戰者何歟曰此以明內外之分也或以為及其未陳而敗之故以敗直書則拘矣夫戰亦何常之有陳而敗之者矣豈必皆詐戰而以直敗書乎蓋謂國小勢微非中國諸侯之敵故不書戰而書敗耳然則於楚子何以書戰曰楚本先代之後以僭王故外之與此少異矣冬十月公如齊十有二月公至自齊書公如齊公至自齊責公也三十年天王使宰周公來聘公不往朝而使公子遂如京師遂如晉無王之罪大矣今年二月齊侯使國歸父來公乃躬如齊報謝其施於天王者甚慢所以事大國者則過乎恭積習之漸使之然耳僖公號賢君諂强國以慢天子律以王誅是當有罪春秋備書其事不加貶而義自見矣乙巳公薨于小寢公羊子曰小寢非正也左氏曰即安也君薨不於路寢而於小寢殁不以其地也魯史志之聖人因而存之以垂法於後世當春秋之世先王禮教漸衰而君歿不以其地史臣猶謹而志之此古意之猶存者是故春秋因之魯諸君殁於路寢者三殁於小寢臺下楚宫高寢者四公羊曰路寢正寢也疾而居正寢以齊終也何氏謂天子諸侯皆有三寢一曰髙寢二曰路寢三曰小寢與周禮所載六寢制度不同蓋路寢為正寢乃人君聽政之地當疾革而居于路寢所謂以齊終者也成王將終洮頮水被冕服慿玉几以發命於其公卿大臣俾輔元子𢎞濟多艱此人君殁於正寢之事也非夫存養有素神明不亂豈能盡將終之禮隕霜不殺草李梅實此槩一冬而言耳上書乙巳公薨于小寢一日事也此書隕霜不殺草李梅實一冬事也杜氏長歷以此月為周十一月乃夏正之九月今九月草之不殺者多矣豈得謂之異乎蓋是月乃建丑月夏正之嵗杪也魯史記是冬之異槩而言曰隕霜不殺草李梅實隕霜不殺氣燠也氣之燠於是李梅有實者嘗見十月桃李開嵗暮時有實者然不能成果此以異而書尚何疑焉必以是為夏正九十月之交則隕霜固有未盡殺者何足為異乎晉人陳人鄭人伐許或曰晋文公之霸也許獨後服今文公殁未幾許則二于楚伐之宜也春秋人三國何歟曰許當伐也而襄公則未宜伐襄繼文之業郤秦于殽敗狄于箕不患無威而所少者德聲之未布耳即位之始當朝王于京聽命而後行事弱者綏之危者拯之使德意至義孚於諸侯猶有未服者然後奉王命以討之其孰敢不率今摟三國以伐許非當務之急也吁晉襄有可霸之基有可霸之時而其氣量不足以霸僅能續桓文之氣脉而已厥後乃用先且居之計朝王于溫惜乎其已晚而又蹈河陽之失以臣致君其餘不足觀矣春秋集傳詳說卷十二
