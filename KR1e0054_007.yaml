body:
  text: 春秋集傳詳說卷七宋家鉉翁撰莊公下惠王六年齊桓公十五年二十三年春公至自齊公羊於其納幣也曰納幣不書此何以書親納幣非禮也及是又曰桓之盟不致此何以致危之也何危爾公一陳他也何休注公之納幣實以為淫不譏喪娶而譏納幣舉淫為重也又曰公如齊淫與陳他相似故危之公羊之說必有所授納幣猶曰為強國屈觀社則淫矣父沒於齊而子不戒其不為陳他者幸而免耳是以再出而再至祭叔來聘隱元年祭伯來非王命也是以譏其外交此祭叔之來書來聘必有使之來者非王使之而誰使與祭伯之來辭若同而義則異何休以為不與天子下聘淫人近之矣魯莊春而如齊納幣自齊來返夏又如齊觀社中間祭叔下聘威顔咫尺如在其上而彼不知怍也春秋以淫人之辱王命是故不書王使若祭叔之自來與夏公如齊觀社公至自齊榖梁以是行為尸女尸之云者盛其車華其服炫惑婦人而蠱其心要其從已是之謂無别春秋書以責之納幣未幾而以觀社再出此誨淫也濡染其母霑漬厥舅有自來矣使桓公管子伸其霸討執而歸之周孰曰不然桓亦弗克自檢其能以此律人乎公羊謂魯莊之為陳他殆有深意荆人來聘荆始書人為公榖之學者皆以為春秋因其慕義來聘進之而書人愚以為春秋之外楚為其僭王大號而外之非無其事而直鄙逺之也況自比嵗入蔡侵鄭漸肆憑陵春秋憂之方深必不以其一來聘於魯遂進之同於中國之諸侯此說其未然歟且春秋之待楚乃帝王待要荒之道叛而威之服而柔之內外之辨截乎其不相干未聞進要荒於侯甸而紊內外之辨者也是聘也杜元凱謂不書荆子使某來聘者君臣同辭始通未成其為禮也乃若書荆書楚書楚人書楚子每書輒異者著其漸盛與中國爭衡非進之也聖人固樂於與人為善楚方憑陵諸夏無一善之可録以為春秋進之殆不然也義又見僖元年楚人伐鄭文九年楚子使椒來聘公及齊侯遇于榖自入春秋諸侯有遇禮略去繁文共圖國政遇之善者也今魯莊之為此遇繼納幣觀社而書著其急於得偶而求之惟恐其未至也說者謂榖之遇齊人要魯以盟而後與之為昏故是嵗冬復為扈之盟明年乃以姜氏歸孟子謂無羞惡之心非人也其莊公之謂歟或曰如強弱弗敵何曰齊桓之始入柯之未盟魯未嘗一往㑹齊亦無責乎魯意者齊桓猶知義之所在念其父讐未雪而不敢責之以常人之禮及髙傒來盟以大夫伉君公反因是而納幣以請昏焉齊人愈傲而公愈卑自是受欺於齊益甚蓋有以自取矣蕭叔朝公榖梁曰蕭叔微國之君未爵命者其不言來於外也朝于廟正也於外非正也蕭叔本來朝于魯因公為榖之遇就而朝焉朝者受者皆非也魯莊皇皇乎艷治之求何暇問禮春秋書之責之也秋丹桓宫楹義并見下刻桓宫桷冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈義見上榖之遇二十有四年春王三月刻桓宫桷鳥獸知有母而不知有父人知有父而復㳂其父之從出而知有祖焉有曽焉有髙焉又㳂其祖曽髙之所從出而有始祖焉皆為之廟以祀之聖人因為之制宗廟祀享之禮自天子至諸侯公卿大夫士隆殺有等夫然後盡於禮不以踰禮而為榮也不以僭禮而為孝也今莊公忘父之讐徇母之欲娶讐女以為夫人知有母而不知有父既又自知其非丹桓宫之楹而刻其桷欲以蓋其無父之愧不思廟有常制獨丹桓宫之楹而刻其桷是悖禮也以悖禮施之親廟不足以榮其親適足以悖其祖知有母而不知有父無父也隆於其父而薄於其祖無祖也無父無祖禽獸之道也是以春秋書丹桓宫楹刻桓宫桷以見五廟並列而桓廟獨以丹飾以著莊公無祖之罪欲救無父之過而無祖矣葬曹莊公夏公如齊逆女秋公至自齊八月丁丑夫人姜氏入榖梁曰親迎常事也不志此其志不正其親迎於齊也秋公至自齊先至非正也八月丁丑夫人姜氏入入者內弗受也宗廟弗受也娶讐人子弟以薦舍於前其義不可受也榖梁得之矣夫親迎禮也魯莊親迎讐國則禮之悖也公與夫人偕至而見于廟禮也今公以七月至而夫人姜氏八月乃入倡而不和行而不隨則禮之悖也自納幣于始至用幣于卒春秋備書以責之彼愚婦人何責哉彼魯莊亦何責哉實備書以責齊桓也桓為盟主方將秉法以示諸夏謂魯莊不當請昏襄女則明義以斥絶之孰曰不然苟欲鎮撫魯國而許之以昏則當謹於用禮飭齊女以行婦道毋使為二國羞今也不然納幣未幾要以觀社觀社未幾而有榖之遇扈之盟最後逆女姜乃不與公偕歸是孰使之然哉不責之齊桓而誰責之哉及哀姜驕淫不婦通于二叔以害兩君然後取而戮之亦云晚矣愚故謂春秋有責齊桓也戊寅大夫宗婦覿用幣不書入而見于廟書大夫宗婦覿用幣何哉入而見于廟者常也大夫宗婦覿而用幣者非禮之常蓋失禮也或謂其娶讐女而歸不敢以見于廟彼丹楹刻桷崇奢麗以誇示讐女何以能知愧而不使見于廟乎榖梁之云謂宗廟有弗受焉爾禮夫人至大夫有見禮今書失禮則以大夫宗婦之俱見俱用幣而譏其無别耳御孫以男女同贄為無别不但用贄之無别俱覿尤為不可蓋宗婦者大夫之妻與大夫俱見春秋所以為譏也大水冬戎侵曹曹羈出奔陳赤歸于曹公羊以羈為曹大夫戎來侵諫於君母自敵三諫不從而去考之經似不然也賈逵謂羈是曹君赤乃戎之外孫戎侵曹逐羈而立赤必有所本今從之先君既葬而不稱爵者微弱不能自定故也劉氏意林曹羈出奔陳赤歸于曹赤之為赤與鄭突無以異突因宋赤因戎皆奪其君然而春秋一貶之無上下之異者春秋治治不治亂者也使鄭忽曹羈事親而孝為上而禮在喪而哀將事而恭大夫順之國人信之雖有宋戎之衆突赤之孽何緣而起劉氏之論正矣然謂春秋一貶之無上下之異者似未然也忽與羈皆繫之於國以其為當立者也突挾亂臣赤挾戎皆去其公子之號所以誅也郭公公榖以為郭國之君名赤外歸于曹其義不通先儒引齊桓問郭何以亡父老對善善不能用惡惡不能去是以亡事與時實相近然必有闕誤不容強通二十有五年春陳侯使女叔來聘左氏曰始結陳好也嘉之故不名注曰原仲季友之舊也季友相魯女叔相陳二人有舊故春而女叔來聘冬而季友報聘以為交聘之始故書然前此諸侯使之來魯未必無報聘而春秋皆略之不書今女叔之來季友之往獨得書者著人臣無外交原季以私相善之故而假公聘以為私㑹其後又以葬原仲而出於朋友之道則盡於人臣之義則非春秋防微杜漸故不與也然原仲女叔為名為字有不容辨以是為褒貶則鑿矣義又見二十七年季友如陳葬原仲夏五月癸丑衛侯朔卒朔以篡兄而立既為國人所逐復與叛黨共敗王師以返其國周之叛侯也去葬所以討六月辛未朔日有食之鼓用牲于社左氏周正之說至是亦不能守之矣以周正而言此六月乃夏正四月正陽之月也而左氏乃云唯正月之朔慝未作日有食之於是用幣于社伐鼓于朝明是月非正陽之月也杜氏求以通周正之說乃云以長歷推此乃七月朔置閏失所故致月錯夫左氏豈為歷之有誤而為此說彼以是月非正陽之月而用正陽之禮是以譏耳愚以是觀益知春秋行夏之時王正月非周正審矣然救日而鼓以充陽也夏書季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走此季秋日食而舉行舊典初不專在正陽之月左傳謂唯正月之食而後舉行亦僻說耳榖梁曰鼓禮也用牲非禮也天子設鼓五諸侯三大夫擊門士擊柝皆所以充其陽充陽之說有得於古者救日之意春秋於此年及文十五年兩書皆同者譏不鼓于朝而鼓于社又用牲為失禮也雖然伐鼓用牲乃救日之常典有司之事也天子諸侯因天災見異而講求缺失思所以上答天譴有實政在非徒治其禮文之常而巳也春秋於夏日食書鼓用牲于社於秋大水書鼓用牲于社于門譏實政不講僅從事於有司之常典也義又見文十五年六月日食伯姬歸于杞杜注不書逆女逆者微也杞小國自應遣命卿蓋舊史缺書耳秋大水鼓用牲于社于門榖梁曰既戒鼓而駭衆用牲可以巳矣救日以鼓兵救水以鼓衆左氏謂凡天災有幣無牲非日月之眚不鼓愚謂日月之眚天以此示象於人有救而無祈也鼓于朝救日之禮也若夫水旱之災則必有祈祈則必以牲雲漢之詩曰靡神不舉靡愛斯牲水旱用牲其來逺矣救水而鼓衆則鼓以警衆共治捍防之事公榖所言是矣救日之鼓與救水而鼓事雖近而義不同冬公子友如陳義見今春女叔來聘二十有六年春公伐戎夏公至自伐戎伐戎以報濟西之役也木訥以其與曹殺大夫聨書遂為之說曰為曹伐也前年曹羈奔陳及陳女叔來聘言必有以及於羈也故公子友如陳報聘而遂伐戎為曹可知矣公甫至自伐戎而曹遂殺其大夫是戎必有辭于曹曹殺其大夫以說戎且以塞魯之辭木訥之於春秋好揣摩傅㑹以為之說此類是也陳使大夫來聘於魯何關於曹魯也有戎患不得巳而伐之非其力之有餘而為曹伐也學者生乎數千載之後即傳以求經猶恐傳之未信何必鑿空而為說當時無此事聖經無此㫖科場師以穿鑿為新奇最說經之大病曹殺其大夫殺大夫始見凡殺大夫皆譏專殺也葵丘之㑹曰無專殺大夫此周家盛時法制而襄王舉之於㑹以訓飭諸侯者也諸侯與其卿大夫雖有君臣之分皆王臣也故其命上大夫必請於王有罪當殺亦必稟命於王不得專也自東遷諸侯既專命卿大夫而復專殺之無王也凡書殺大夫有稱國以殺者有稱人以殺者稱國以殺者十之八九大率皆譏專殺而復有殺無罪者焉殺有功者焉殺直諫者焉隨事而觀可以得聖人之意此曹殺其大夫不惟譏其專殺又誅其濫殺曹赤挾戎援以篡兄之國又挾戎威以去兄之黨所殺者必皆無罪而又不止一人是以佚其姓名魯史官聞其事而書之不得其姓名是以闕之耳吁蕞爾小國挾戎援以篡其兄而又殺人不忌齊桓坐視而莫之討其有憚於戎歟殺大夫不名又見僖二十五年文七年八年秋公㑹宋人齊人伐徐劉氏意林曰伐徐小事也而亂王者之制諸侯不得專征是以屬之方伯連帥今齊為霸而使宋主兵則是人自為政與諸侯無霸奚異劉說固善但先宋後齊乃春秋所以責備霸者非齊人諉宋人以主此兵也胡氏謂魯自伯禽以來世有徐戎之患今春伐戎秋伐徐必戎與徐表裏為病於魯魯請於齊宋而伐之耳愚謂齊為霸而以宋先之者貶也是時戎侵曹逐其嗣子納亡公子為君戎之不忌甚矣齊不能討乃為魯出師伐徐緩其所當急是故不與之以霸討而以宋先齊冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮杜氏以伯姬為莊公之女即二十五年歸于杞者陸氏謂春秋時有子叔姬者三皆時君之女稱子者以别先君之子公榖以為同母姊妹非也則此伯姬未必是莊公之女藉是莊女于洮亦非歸寧之地安有女子來寧父母疾驅於通道大都略無所禁忌者乎春秋書公㑹杞伯姬于洮非歸寧之義也義又見冬杞伯姬來夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽義已見十六年十六年于幽之㑹始書同盟至是再㑹于幽復書同盟榖梁曰同尊周也於是而後授之諸侯蓋春秋嘉齊桓霸業之始成善其得衆而許之以同盟也是㑹也陳鄭始服不討而服服之上也或曰前此㑹者九國而書同盟宜也今㑹者才五國亦書同盟何哉曰聖門所以許齊桓為其合諸侯不以兵革庶幾以德服人者不為其甲兵盛強小大畢至而後許之以同也不然異時有合十八國之君以甲車四千乘誇示諸侯而霸業自是日衰者烏在其為衆乎秋公子友如陳葬原仲或曰前此人臣外交如祭伯之來尹氏之赴春秋雖有譏而不書所以來之故今季友如陳直書葬原仲春秋其許之以不遺故舊是故直書其事以垂訓於後歟曰子可謂善問矣君臣之分朋友之義皆人之大倫而於用禮之際有當隨事而為之權衡者此類是也季友與原仲有舊前此原仲來魯季友報聘假公事而為私行春秋猶有譏焉今原仲死季友躬如陳㑹其葬身為魯大夫有官守焉而越國以㑹交游之葬春秋之所不與也然以其篤於倫類之愛故直書其事曰此為葬原仲而出雖微取其不遺故舊實深貶其越國㑹葬此春秋意也縣子所謂古大夫束修之問不出境正為居位之大夫而言今大夫交政於中國如原仲季友猶曰交游之情死喪之戚有不容自巳比至衰世人臣外交強國歸而脅制其君犯上作亂靡不畢為禍亂之原實兆於此是故春秋謹之冬杞伯姬來義已見今年春前㑹于洮公與伯姬特為此㑹也歸未幾日復為此來書杞伯姬來非所當來而來者也女歸寧父母常事不書惟其來之不以禮是故一嵗而再書然則伯姬非魯莊之女亦明矣莒慶來逆叔姬杜氏以叔姬為莊公女莒慶自為逆愚竊疑之宣公挾齊之援以篡魯國事齊無所不至最後齊侯止公而為髙固求婚魯人以為大辱莒小國也慶莒之卿而娶時君之女又云其與公伉禮其無是乎蓋叔姬必非莊公之女莒慶自為逆其事猶在可疑耳杞伯來朝杞二王後爵惟上公桓二年書杞侯來朝公榖以杞為紀至是乃書杞伯杜氏范氏皆以為時王黜之無明證也此亦文之闕誤不必深辨義見綱領明五始公㑹齊侯于城濮二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績及戰之例或曰案左傳王使召伯廖賜齊侯命使之伐衛討其立子頽也則齊桓此伐奉王命以討諸侯之有罪者而春秋書曰齊人伐衛衛人及齊人戰不與齊桓以奉王命而伸霸討何哉曰立子頽者衛侯朔也朔之罪甚大齊不能討王弗及朔之尚存而命之以討今歷十年其身巳死而致伐於其子非刑也曰若爾則其責在王今方伯與罪人皆以人稱何哉曰朔之存也嘗預齊桓㑹盟桓庇之而不討今其嗣子不預於後幽之盟齊是以伐之蓋受命於朔未死之前至是激以私憾始克往伐故公榖皆以衛為無罪左傳又謂桓公奉命而往取賂而還故不為春秋所與是以有貶以是而觀則春秋人齊之意可見矣及戰之例公羊謂春秋伐者為客被伐者為主故是役也以衛主戰以衛為無罪然僖十八年春秋書宋曹衛邾伐齊宋師及齊師戰于甗則伐者為主被伐者為客公羊又以為春秋與宋襄之能討齊亂是故以宋為及其意以及戰為春秋所與此亦公羊氏一家之說耳嘗考之經此一及字或著之客或繫之主初未嘗立為一定之例楚人侵伐中原晉及之戰晉以盟主而為主也蔡侯吳子伐楚及楚人戰則蔡吳又以客而為主疏家又謂城濮鄢陵與邲外楚而內晉柏舉內蔡而外楚則又以內外而為及鄭氏謂凡書及戰所以别異客主不施之直與不直直與不直自在事也此論校諸說為通愚以當時事考之有以客而為及者有以主而為及者義繫於一時之事褒貶豫奪初不在是也如衛之及戰以其不受齊討而與之戰是以書衛為及如宋之及戰宋自以受託孤之寄帥師而往志在納君是以書宋為及如城濮之戰晉文志在救宋却楚仗義而前不使晉主戰將使誰主之乎又如柏舉之戰春秋書蔡侯以吳子及楚人戰大其伐楚之功而特書以奬之謂春秋不與蔡侯其可乎而近代諸儒專以及戰為主戰者皆非春秋之所與每有及戰曲為之說以求其可貶之罪如城濮柏舉二三大戰義正辭直春秋無貶而乃傍採傳辭變亂曲直以合於主戰之例其所見之頗歟其為私意而發歟故既述之綱領復隨事辨明蓋以所關者大不容巳於言也夏四月丁未邾子瑣卒秋荆伐鄭公㑹齊人宋人救鄭或曰先儒謂書救未有不善者此書救善齊桓之能救也公自行必齊桓宋公之皆在而春秋書人何哉曰此與其救而譏其救之不力也楚窺中國久矣至是使其令尹子元帥車六百乘伐鄭入于桔柣之門陷其外郭及於逵市鄭將奔桐丘楚兵退乃止鄭之危甚矣齊宋魯救之未至而楚去蓋以虛聲却敵者也使子元稍為持久則鄭棄其國而存亡未可知也故春秋書人以譏救之不力凡救有二强國侵暴諸侯盟主興師救之救之正也諸侯敗賢黨惡盟主伐同惡救之救之逆也推此義以觀庶得聖人之意若盟主之救同惡之救槩以為善曲為說以通之則是否紛錯失聖人修經之本㫖義又見僖二十八年楚救衛襄十年楚救鄭齊桓公霸之盛者推亡固存霸政之所先也經見凡五此救鄭其始救也閔元年僖元年兩救邢六年伐鄭移師救許十五年㑹諸侯盟牡丘命諸大夫救徐蓋孳孳以救為務者桓公之本心也然其再救邢也以三國之師而次于聶北其救徐也以八國之師而次于匡救而書次則譏其救之緩也不書師而書人則譏其師少而救之不力也春秋雖善其能救復譏其緩而不力此責備霸者之道耳至如召陵之師本以救鄭而不以救書為其關乎天下之盛衰一救不足以盡之亦猶晉文公城濮之役本以救宋而不以救書亦為其關乎天下之盛衰一救不足以盡之此春秋書救不書救之大略也冬築郿冬而築時也時則不書此何以書為嵗無麥禾而興作不急之役所以譏也大無麥禾蘇氏曰是嵗未嘗有水旱螟蟲之災而書大無麥禾何也劉向春秋說曰土氣不養稼穡不成也沈約宋志言吳孫皓時書有之苖稼豐美而實不成百姓以飢合境皆然連嵗不巳此則所謂大無麥禾也此以天災而釋其義也愚案是嵗春秋不書饑饉蟲螟至嵗終而書大無麥禾譏在人事也莊公外事興作內煽浮淫費用無度至嵗終㑹計所儲麥禾盡缺是以春秋書大無麥禾以著規戒書大無云者非天時使然由人事之不飭也臧孫辰告糴于齊公羊曰請糴也何以不稱使以為臧孫之私行也曷以為臧孫之私行君子之為國也必有三年之委一年不熟告糴譏也榖梁亦曰古者稅什一豐年補敗不外求而上下皆足也雖纍凶年民弗病也一年不艾而百姓饑君子非之不言如為內諱也其意謂春秋為魯諱告糴故臧孫之出不書如齊若臧孫自以其私而為此行愚以為諸侯無粟諸侯相歸粟亦事理之當然魯無麥禾告糴同盟之國春秋何諱乎內大夫出使例不言使不必以此為異書臧孫告糴于齊見魯人卑辭有求亦以善齊人之能恤災也春秋始年禮義消亡國自為計無救災恤患之心齊桓公起弊俗頓革臧孫告糴必桓公許之而後往故異時㑹于葵丘申遏糴之禁其善意巳兆於此時矣春秋書以嘉之二十有九年春新延廄新延廄傳曰新作延廄延廄云者廄之名也或曰新其舊而又延廣之義亦通榖梁曰延廄法廄也其言新有故也有故則何以書古之君人者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢冬築郿春新延廄以其用民力為巳悉矣公羊曰修舊不書此何以書譏凶年不修皆得春秋之意夏鄭人侵許許與鄭為讐國許不能伸復讐之義更為鄭所侵書鄭人侵許責鄭也是時桓公霸諸侯而鄭猶侵許者許未預於㑹盟故也秋有蜚隱元年左傳曰有蜚不為災杜注以為負蠜疏引郭璞云蜚即負盤洪範五行傳云蜚南方之物越之所生其為蟲臭惡能害人又云詩草蟲負蠜嵗時常有非災蟲也以為負盤者是負蠜乃傳録之誤劉原父曰蜚狀若牛而白首一目蛇尾行水則竭行草則死見則國大疫與傳注所言蓋兩物也原父之學亦博矣冬十有二月紀叔姬卒滅國不葬此以賢叔姬故特書葬娣媵不葬此以賢叔姬故與伯姬俱得葬春秋以叔姬秉節守義不為國亡而變其所守特録之以垂訓於後世耳嗟夫以此防民猶有儷體宸居國亡不能死委身以事軌如晉之惠后者可為痛哭流涕者矣城諸及防左氏以為書時非也魯國比嵗凶饑而莊公輕於用民力不惟城一邑而又併城二邑故雖時而必書所以譏也三十年春王正月夏師次于成趙子曰魯蓋欲㑹齊圍鄣至成待命聞鄣巳降故不行耳然疑事無質但當存而勿解榖梁曰次止也有畏也欲救鄭而不能不言公恥不能救鄣愚以趙說為然魯必不敢與齊爭鄣秋七月齊人降鄣公羊以鄣為紀之遺邑杜氏以為附庸啖子曰鄣者小國不言伐而言降脅而降之也齊魯圍郕郕降於齊師降於力既屈之後此書齊人降鄣畏威而降降於兵未加之前其為降一也但郕雖降而猶存其後復見鄣則不復見矣是時紀亡近三十年遺邑必無存者啖子以為小國是也此蓋滅國之異名春秋書以貶之八月癸􅕀葬紀叔姬九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟傳以為謀伐山戎彼計巳定何事於謀許氏謂齊桓伐郳伐鄭伐徐皆以宋人主兵而伐衛伐戎皆先與魯公為㑹為遇以謀之以是知齊桓用人之能以為能愚謂齊桓謙恭不伐誠有足稱但以宋主兵前後三四則譏其狥人伐國師出無名不與之以霸討故序之宋下遇于魯濟㑹于城濮魯莊因其出而侯之於途耳齊桓玩莊如嬰兒不從之謀也齊人伐山戎榖梁曰桓內無因國外無從諸侯而越千里之險北伐山戎危之也則非之乎善之也何善乎爾燕周之分子也職貢不至則山戎為之伐矣愚謂當齊桓之始霸為中國患者楚也山戎不聞為中國患桓以其病燕而伐之戎之病燕無甚於楚之病鄭桓未能伸大義於楚而逺伐山戎亦非當務之急也此齊侯自出而書齊人伐山戎譏也三十有一年春築臺于郎凡築臺與囿不以時不時皆譏也是嵗三築臺三見書重譏之也公羊于郎之築曰臨民之所漱浣于薛之築曰逺也于秦曰臨國也國者槩國中而言宗廟社稷在焉故也何休注曰天子有靈臺以侯天地諸侯有時臺以侯四時登髙望逺人情之所樂動而無益於民雖樂不為也莊公暮年驕恣尤甚天災見於上嵗比不登而或新或城或築無虛嵗今又以三築臺見書其違禮敗度可以想見魯之衰實由莊公始夏四月薛伯卒築臺于薛義見上于郎六月齊侯來獻戎捷左傳曰諸侯有四裔之功則獻于王王以警于裔諸侯不相遺俘公羊曰齊大國也曷為親來獻戎捷威我也其威我奈何旗獲而過我也合二說而觀乃見春秋之意齊為霸伐戎有功當躬獻之于王以展職分之常今乃以俘獲分遺諸侯此不過欲威示同盟之國失其所以為霸之道矣此齊侯使人獻捷于魯書齊侯來獻卑之也楚人獻捷僖公二十一年與此義異秋築臺于秦義見上于郎冬不雨是嵗告旱而三築臺明年春又城小榖譏也與二十八年大無麥禾而築郿書法相類三十有二年春城小榖左氏以為魯為管仲而城杜注公感齊桓之德故為管仲城私邑范氏謂小榖魯邑蓋齊有榖城魯亦有榖故左氏之言如此然謂魯公與齊之用事者城其賜邑揆之人情恐未必然故諸儒多以為疑蓋魯國所城者小榖非齊之榖冬不雨春而書城譏也夏宋公齊侯遇于梁丘前此齊桓偕宋人伐郳伐鄭伐徐春秋皆序齊于宋之下貶也今遇于梁丘宋公序齊侯上則以爵序與前日㑹伐異矣左傳謂齊桓以楚人伐鄭故欲㑹諸侯宋公請先見為此遇則是遇也齊宋謀所以捍楚而救鄭者霸主能虛己以求人宋公能悉力以輔霸故春秋特以爵序以彰齊桓謙恭盡下之美其後諸侯之師先救邢存衛郤狄然後出大師以臨楚而中國之威伸矣蓋定計於榖遇之時若宋桓公者其亦深思逺慮之人乎秋七月癸巳公子牙卒公羊曰何以不稱弟殺也殺則曷為不言刺為季子諱殺也莊公病將死召季子季子至而授之以國政曰寡人即不起吾將焉致乎魯國季子曰般也存君何憂焉公曰庸得若是乎牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎俄而弒械成季子鴆之君親無將將而誅焉然則善之與曰然曰殺世子母弟直稱君者甚之也季子殺母兄何善爾誅不得辟兄君臣之義也案左氏公疾問後於叔牙對曰慶父材季子使以君命鴆牙辭簡略不能盡當時之事公羊所言者其實也愚嘗有疑於此夫誅不得辟兄曰君臣之義也然罪有首從謀篡魯國者慶父其首也為之言於公而圗謀非望者牙也其從也今季友毅然以牙為戮而置慶父於不問彼謂殺牙則可杜慶父之姦乎抑亦以其權盛而莫如之何也使季友當君之尚存暴慶父之罪縱不殺亦當逐而逺之併其黨類而奔之則魯國可無後日之禍而般之位定矣今鴆牙而存慶父吾不知其用意果何如也春秋於公子牙之死不以刺書惟曰公子牙卒意其在是歟八月癸亥公薨于路寢冬十月己未子般卒公子慶父如齊魯莊驕盈不君晚嵗滋甚得沒牖下幸矣身雖幸免二子卒不免焉二南之詩周公所以造周而基王業也子孫不令隆於齊女以此殺身以此禍子孫三綱掃地幾危魯國桓與莊也真周公魯公之罪人哉季友身受託孤之寄不能以死奉般立未幾日乃為慶父所斃復與慶父俱奔異國慶如齊將以求其所大欲友適陳此不過為避禍計耳託六尺之孤寄百里之命臨大節而不可奪者顧如是乎春秋書子般卒公子慶父如齊責魯國臣子以討賊之義也捨季友而誰責乎狄伐邢春秋集傳詳說卷七
