body:
  text: 春秋集傳詳說卷十四宋家鉉翁撰文公下頃王二年晉靈四年楚商臣穆王九年十年春王三月辛卯臧孫辰卒臧文仲夏秦伐晋秦伐晋春秋狄之論者疑貶秦太甚以為有缺文其說是矣程子曰晋舍嫡嗣而外求君罪也既而悔之正矣秦不顧義禮是非惟以報復為事故春秋貶之也愚竊疑焉趙盾諸臣始以靈公幼弱不克負荷求君於秦其事雖非其用心未為盡非也既而背先蔑變初議立靈公猶曰吾立嫡也當以善意諭秦使之自退遽乘人之不戒而覆其軍秦之受欺甚矣興兵以報亦常情之不容己者而傳又謂晋取少梁以啓之致秦人略北徴以報焉晋實不道春秋何事遽貶秦乎以為經有缺文者是也必强求其罪而貶之過矣陳止齊謂楚所以霸秦之力也自滅庸以後秦為楚役是以春秋貶之但春秋褒貶隨事而見今只為伐晋而書未暇責以他事此說固善施之伐晋似乎太早楚殺其大夫宜申案左傳宜申謀弒穆王為所殺此謀弒君也而稱國以殺何哉蓋穆王者商臣也負覆載所不容之罪凡楚國之人皆得而誅之而未有能討之者宜申於楚成為弟其為此謀安知不為先君討賊事不獲成以死史遂以謀弒君書春秋原其有討賊之心不以無將之罪罪之是故稱國以殺此聖人之特筆非因乎舊史者也自正月不雨至于秋七月義見二年及蘇子盟于女栗蘇子周卿士也今來盟於魯王命也而不書王使公及之盟而不書公及為天王諱過亦為魯諱惡也諸侯盟於王庭旅盟也天子上公出盟諸侯蒞之而不與之偕盟也此乃名分之所係未聞王遣使出盟諸侯者也今頃王即位諸侯莫有朝京師者王命蘇子來盟文公倘知事君之道當躬拜王命之辱辭不敢盟朝於京師而請職事焉可也今及蘇子盟於女栗不共甚矣春秋諱王不稱略公不書雖為魯諱惡而貶魯之義亦在其間矣或疑蘇子外交恐不然外交者如祭伯來是也何以盟為蘇子本畿內諸侯國於溫為狄所滅奔衛王復之於周乃流離困躓之人何有於外交此實奉王命而來耳冬狄侵宋楚子蔡侯次于厥貉公羊作屈貉厥貉之次楚商陳兵重地虎視中原以脅從諸小國陳鄭宋皆望風而靡宋復導之以田孟諸晋失霸矣楚窺伺中夏七八十年桓文嗣興志不獲逞文公殁襄公猶能勉自植立以不墜其已成之基今趙盾秉政而晋始失霸楚由是愈强大非盾之責而誰責是役也宋鄭陳蔡皆從於楚春秋獨書楚子蔡侯次於厥貉宋陳鄭預㑹而不預次故也預㑹者脅而從者也預次者同惡者也書不書著其罪之輕重云耳前日越椒之來諸儒謂春秋褒其來聘魯進之而書爵今厥貉之㑹麇之伐皆以楚子書亦謂進之而書爵可乎凡書楚子皆辨分也彼僭號為王憑陵中夏春秋懼其擬子王也故自盂以後多書楚子所以削其僭名而辨內外之分奚其為進乎次而不伐例自是有五氏垂葭渠蒢在定公九年十三年十五年十有一年春楚子伐麇左傳謂厥貉之㑹麇子逃歸楚人伐之麇微國也猶恥從孟諸之田宋先代之後乃與鄭伯分左右盂夙駕載燧而不以為恥由是言之楚之伐麇之榮也春秋是以表而出之夏叔仲彭生㑹晋郤缺于承筐叔仲惠伯楚伐麇叔仲彭生㑹晋比事而觀見聖人意矣楚商次於厥貉宋陳鄭望風欵附麇獨逃之春秋書楚子伐麇褒麇也晋郤缺為㑹於承筐諸侯之大夫莫有至者魯獨遣彭生如㑹不以蠻荆强盛而替於從晋春秋書叔仲彭生㑹晋郤缺於承筐亦褒魯也此不待褒貶而見者也其後諸侯再合卒藉魯之力夫楚非驟强晋非卒弱也使趙盾能於此時禀王命合諸侯討二國楚豈不知所懼乎彼次厥貉而三國奔走聽命盾坐視不顧乃徐遣郤缺為此㑹具文應敵而諸侯自是散矣叔仲彭生叔牙之孫惠伯始見義又見十三年公如晉十四年同盟新城秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹七年狄侵我西鄙公使告于晋趙宣子使因賈季問酆舒且讓之而狄之侵暴自若也至是鄋瞞侵齊遂伐我叔孫得臣敗之於鹹獲長狄僑如春秋書以嘉之蓋魯之弱非果弱也由君臣無自强之志齊霸則求援於齊晋霸則求援於晋楚强則折節於楚積弱不競以至於此中間一二能臣為國自奮亦足以警强鄰而威外侮如長勺之戰鹹之師是也故有國者不可以不自強十有二年春王正月郕伯來奔左傳郕太子宋儒自安於夫鍾國人弗徇郕伯卒郕人立君太子以夫鍾與郕邽來奔公以諸侯逆之故書伯趙氏駁之曰諸侯嗣位未踰年猶稱子豈有君父病而不視死而不喪身未即位以邑出奔而稱伯且鄭忽曹羈莒展皆已即位及其出奔猶名之況於郕未嗣位者乎春秋正名之書乃謂魯君以諸侯逆之故書郕伯必無是也此駁甚當孫泰山云莊八年師及齊師圍郕郕降於齊自是入齊為附庸此為齊所迫而來奔蓋齊之附庸而奔魯春秋以其本為伯爵故雖附庸而存其本封以正之不書名閔郕之無罪齊人之無道也合二說而觀得春秋之意矣杞伯來朝杞先代之後自春秋所爵或升或降此經疑也姑置勿論二月庚子子叔姬卒書子叔姬之例公羊曰此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之其義正矣左傳乃謂杞桓公來朝請絶叔姬而無絶㛰揆以人情未有絶一姬而復請一姬者也杞何敢爾此叔姬許嫁未行而卒故杞人復求其次公羊之說是也但公羊謂凡稱子皆貴之母弟也穀梁亦曰公之母姊妹也而趙氏謂時君之女故曰子以别之非先君之女二說不同愚謂稱子者别異之辭非公之同母姊妹則公之女異乎其他姑姊妹矣是時有兩字叔姬故知非獨時君之女公羊趙氏之說當並存夏楚人圍巢使越椒來而書楚子次于厥貉而書楚子今圍巢而書楚人或者疑焉愚謂椒之聘窺伺中國也厥貉之次脅從諸夏也書楚子所以削其僭名辨內外之分今圍巢楚之屬國也蠻荆自戰其地可略故書人此春秋抑揚之微㫖所謂婉而成章者也秋滕子來朝秦伯使術來聘公羊曰秦無大夫此何以書賢穆公也是時穆公己卒經不書使術來者乃康公也或曰秦伯使術來聘與楚使之來同例否歟曰否春秋書法有似同而實異者椒來而楚師踵於其後書椒來志其窺中國也若術來乃康公之善意春秋無貶也左傳以河曲之戰繼其後傅㑹而為說曰術來言伐晋夫秦晋交兵其來已久於魯何預術豈為是故來歟曰術去族何哉曰術者始開兵端之人也秦晋爭戰二十餘年皆術與孟明之所為嘗為晋獲矣今而使魯春秋惡之是故不著其族以為秦使之不當也冬十有二月戊午晋人秦人戰于河曲殽之憾未釋而令狐之怨繼之此秦晋所以交兵而未釋也愚謂殽之憾曲在秦令狐之戰曲在晋秦乘晋之喪而潛師伐鄭兵端所以始也晋人求君於秦秦以兵衛而納之趙盾輒變初議不以一乘使諭秦遽出兵禦之於境晋之曲為甚而更興少梁之役是以秦人復有河曲之師論者反謂秦人遂非積怨以秦為曲此愚之所未喻也蓋殽之憾未平而令狐之怨再結咎實在晋故春秋不書秦人伐晋而書晋人秦人戰于河曲言二國皆有可責而晋為甚也季孫行父帥師城諸及鄆杜注二邑莒魯所爭者也魯之患不在莒而魯人每詳於備莒者睥睨弱小以為侵漁之計耳城一邑已為勞民今一朝城二邑其勞民為甚書城諸及鄆貶也春秋之法城非其時貶城非其地貶興兵以城尤在所貶魯興兵而城三襄十五年季孫宿叔孫豹城成郛哀三年季孫斯叔孫州仇城啓陽與此為三皆譏也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月大室屋壞公羊作世室公羊曰世室者魯公之廟也周公稱大廟魯公稱世室羣公稱宫此魯公廟也曷為稱世室世世不毁也周公何以稱大廟于魯封魯公以為周公也周公拜前魯公拜後然則周公之魯乎曰不之魯也欲天下之一於周也世室屋壞何以書譏久不修也榖梁曰大室猶世室也周公曰大廟伯禽曰大室羣公曰宫為社稷主而先君之廟壞極稱之志不敬也左傳杜注大室者大廟之室也孔注引明堂位為說曰天子之廟上為重屋此大廟當中之室是室之最尊者也故知是周公之廟三傳為說不同愚以杜說為正魯用王禮故廟有大室有文世室武世室周公廟居中魯公武公為兩世室經書大室謂大廟當中最尊之室非周公廟而何公羊經作世室者傳録之誤耳周公為魯大祖百世不毁之廟今而傾圮不治以至於壞此變之大者魯君臣略不知戒懼視新宫火三日哭者猶為知所變而變矣春秋重有譏冬公如晋衛侯㑹公于沓義併見下公還自晋狄侵衛十有二月己丑公及晋侯盟公還自晋鄭伯㑹公于棐義已見十一年承筐之㑹魯望國也諸夏所視儀而聼倡者也方楚人為厥貉之次宋鄭衛皆背晋而即楚獨魯使叔彭生㑹郤缺于承筐魯可謂知所從矣今文公復如晋及晋侯盟於是衛侯於其往而㑹之于沓鄭伯及其還而㑹之于棐俱以魯為介而求成於晋彼非有懼於晉也魯君介然不忍即楚而有以感其羞惡之心也是時晋已失諸侯因叔仲之往㑹魯君之特盟而諸侯散者復合明年遂㑹于新城魯為之倡也春秋於公之往復詳記而備言之褒魯也十有四年春王正月頃王崩匡王立左傳是歲頃王崩匡王立周公閲與王孫蘇爭政故不赴不赴是以不書烏乎臣之於君猶子之於父也子聞父喪豈必待赴而後奔乎臣聞君喪以不赴而不臨不賻不奔猶子而不喪其父也三綱淪廢風教大壞天下諸侯幾於無王春秋不書王崩著天下諸侯之無王也公至自晉邾人伐我南鄙叔彭生帥師伐邾魯以七年伐邾取須句邾人不能報至是忽興南鄙之師左傳乃謂邾人有喪魯弔之不敬邾以是來討其不然歟彼小國安敢責禮於大國亦修怨耳春秋書所以交致其責夏五月乙亥齊侯潘卒昭公也卒不葬齊孝之死潘殺其嗣子而自立為君齊之篡賊也今潘死其子舍立復為弟商人所殺出爾反爾物理之當然春秋之不葬討其篡也六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城義已見十一年㑹于承筐十三年公還自晉或曰新城之盟諸侯既散而復合春秋書同盟與齊桓公于幽之同盟同歟否歟曰其事雖異所以為同則一也幸諸侯猶同於中國也晉君幼趙盾專無意於霸諸侯去而從楚徒以魯君執義不回介然頽波之中不為楚屈中國欣慕之是以諸侯之散者復合非有畏於晉也亦非趙盾强求其合也去逆效順人心天理之同然是以春秋與之特書同盟與諸侯之同乎中國也秋七月有星孛入于北斗公羊曰孛者彗也其言入于北斗斗有中也榖梁曰孛之為言茀也其曰入北斗斗有環域也注謂斗有規郭入其魁中也以北書所以别乎南也北斗居天之中密拱宸極綱維萬象妖氣欃槍干而入之此楚氛被乎中夏王綱陵遲中國失霸之象也經書孛凡三見言有星者謂非常見之星不當有而有也異之大者也公至自㑹晉人納捷菑于邾弗克納三傳所載略同左氏以為趙盾納之公羊以為郤缺納之捷菑晉出也貜且齊出也邾人之言曰子以大國壓之則未知齊晉孰有之也雖然貜且長郤缺曰非吾力之不能納也義弗克也引師而去君子大其弗克納榖梁亦曰人之何也微之也長轂五百綿地千里入人之國至其城下然後知何知之晚也弗克納者弗克於義也愚謂晉為盟主諸侯立子有弗善當馳一乘之使問其孰為少長孰當立不當遽興兵入人之國此趙盾始謀之不審也郤缺以諸侯之師次于城下始知貜且為長而還輕動大衆者盾也知義之弗克引而還者郤缺也春秋書人以責趙盾書弗克納與郤缺之能克於義也九月甲申公孫敖卒于齊敖名教之罪人也其死也卒之其喪歸也復書之於冊非録敖也教孝也案左傳齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之齊人送之杜預曰大夫喪還不書善魯人感子以赦父敦公族之恩崇教孝之義故特録之得其說矣齊公子商人弒其君舍舍未踰年之君也未踰年之君當稱子今稱君此春秋所以明君臣之分而正商人弒君之戮榖梁之義盡之矣或曰自入春秋弒君篡國如衛州吁齊無知皆去族以示誅今商人猶書公子何歟曰州吁無知未成君而見討舊史故直著其弒君之罪是以聖人因其已書而去其族若商人者篡弒之罪雖與州吁同但考之世家舍之父昭公潘者亦以篡弒而得國今商人殺潘之子潘與商人皆篡賊之當討者也書法之不同以是故歟宋子哀來奔左傳宋髙哀卿也不義宋公而出遂來奔書曰子哀貴之也杜氏謂諸侯之大夫來奔未有不名者子哀書字故曰貴之此以子哀為字强求其可貴而言也諸儒多從左說謂奔亡之美無過子哀愚竊惑焉夫委質為臣在卿大夫之位見君之危委而去之乃曰不義宋公而出何其誣乎昭公雖非令主然自即位以來羣下再為亂襄夫人者君之祖母復黨於公子鮑輔之以圖篡君之黨盡死亂賊之手昭不能君亂且作矣子哀者若不在其位潔身而去猶之可也苟為卿矣臨難自免為臣不忠罪莫大焉而以為春秋貴而不名豈聖人因事垂法之㫖哉公榖二傳皆以為失其氏族無所考置不論後儒不必强為之說胡氏引微子之事為言此尤不可聖賢制行豈與衰世大夫同日語哉或曰若子所言易稱見幾而作者其不可行於衰亂之世乎曰見幾而作為耽寵懷祿可以去而不去者言之也非為臨難履變當死不死委而去者而言也子哀若無官守言責去之無悖於義若在卿大夫之位義不當偷生苟免以苟免為見幾則名教之罪人也學者不可以不辨子哀者黎錞以為宋公之子如子糾子同之類若宋公子見父之危舍而去之去非春秋所與孫泰山以為子者宋之姓哀其名然皆未有的論姑置俟考冬單伯如齊齊人執單伯齊人執子叔姬左傳襄仲使告于王請以王寵求昭姬于齊單伯如齊齊人執之又執子叔姬春秋於商人弒君之後而繼書執單伯執子叔姬所以著商人弒君篡國拒王命執君母之大惡公榖不深考乃謂單伯為魯大夫以淫故為齊所執其義大舛或曰隱七年戎執凡伯于楚丘春秋書伐凡伯于楚丘以歸公羊子曰執者上執下之辭不言戎執而言戎伐以天子之使見執於戎人而為之諱也今齊商人以中國諸侯而執天子使者春秋不為王諱何歟曰譏也商人弒君篡國王當命諸侯大國總師徂征正逆人之戮今既不能然乃為魯遣使以叔姬為請此非王之所得為也當討而不討不當使而使王失馭臣之柄致逆商敢於犯上悍然自肆而不以為非春秋直書其事誅商人也不言王使為王諱亦譏王有以召逆商之侮也胡文定謂春秋再書齊人者罪齊人之黨惡也商驟施而得衆齊人懷其私惠而忘其大惡弒君既不討執君母又無有能救者則舉國之人皆有不赦之罪書齊人者窮逆賊之黨而治之也論則徑矣愚以齊人未必皆從商於逆也其公卿用事者與商人同其謀故商得以行其所大欲謂公卿用事者皆有黨賊之罪則可國人何罪而云皆在不可赦之城無乃非春秋用法之意乎漢人每當諸侯王有反謀根連株逮遍及國中正緣刀筆吏以窮竟黨與為能事故其禍至於如此春秋之治黨與治公卿用事者之與於逆治鄰國諸侯之黨於逆必無遍及國人之理愚恐後之酷吏借經義以為殺人張本故不得不辨耳十有五年春季孫行父如晋義見行父㑹齊侯于榖公子遂盟齊侯于郪丘三月宋司馬華孫來盟宋穆襄之族連歲為亂翦君之羽翼幾盡遂奉公子鮑因襄夫人大樹黨與為篡奪之計華元為右師公孫友為左師華耦為司馬鱗鱹為司徒亂黨參錯其君僅擁虛器而已華孫者華耦也實子鮑之私人亂黨使之歷使諸侯豫自結以免討春秋書宋司馬華孫來盟言不以君命至也左傳乃謂與其官屬偕來故貴之以字書其不然與榖梁曰以其官稱無君之辭得之矣書華孫者著其為華督之孫如武氏子仍叔之類蓋譏也華督負弒君之大惡其孫復為亂黨出使將歸而共成篡弒之事故春秋因以華孫目之閔其不能蓋前人之愆又將預於亂也夏曹伯來朝齊人歸公孫敖之喪公孫敖以淫亂死于異國魯之罪人也喪無可歸之理其子請於魯請於齊而歸之春秋書齊人歸公孫敖之喪善齊人之能歸也公羊乃曰齊人脅我而歸之筍將而來此恐所傳之妄左氏所記者其實也六月辛丑朔日有食之鼓用牲于社義已見莊二十五年春秋日食三十六惟莊二十五年六月辛未朔及文十五年六月辛丑朔書鼓用牲于社左傳于莊則云是月非正陽之月而用正陽之禮所以譏於文則云諸侯當用鼓于朝而鼓于社且天災有幣無牲是以亦譏其實春秋于二食所書全同左傳前後異辭者雜記所聞也單伯至自齊義已見單伯如齊晉郤缺帥師伐蔡戊申入蔡晉文之霸也踐土于溫翟泉㑹蔡皆與及晉襄殁楚有厥貉之次從之者亦蔡而已蔡從而後宋衛鄭皆從蔡實為罪首伐之是也然捨强大而治細弱晉之用事者能不愧於心乎齊桓公潰蔡而後臨楚意不在蔡也晉文公侵曹伐衛而後及楚戰意不在曹衛也今趙盾為晉政南不能敵楚西不能輯秦東不能制齊乃使郤缺以師伐蔡入其郛避强梗而侮細弱雖入蔡益見其無能為也其入而不有懼楚師之來追耳秋齊人侵我西鄙季孫行父如晉義併見後齊人再侵冬十有一月諸俟盟于扈扈之盟八國之君來㑹謀討齊也夫討齊非為魯也討齊人之弒其君者也齊商人弒其君執其君之母又執天王之使躬三大惡晉之討之師直辭壯何患不克今以討召諸侯以賂釋篡賊由晉靈幼弱不君趙盾怙權自私利黨賊不利討賊故導其君以賄晉靈豈知為此乎春秋於是㑹不書晉㑹諸侯于扈而書諸侯盟于扈削晉霸而同之於諸侯其貶晉也大矣胡文定乃曰八國之君何以不序略之也春秋於外國君臣同辭略之也曷為略八國狄之也齊人弒君不能討受賂而還是故狄之書諸侯盟于扈分其惡於諸侯也愚謂春秋用法誅其首而略其從今晉人以討賊召諸侯諸侯莫敢不至晉自受賂而止乃分其惡以及諸侯舍其首而議其從其非春秋書法之本㫖乎十有二月齊人來歸子叔姬或曰婦人有三從之義叔姬既喪其夫子又為亂賊所殞魯人請而歸之是乎否邪曰有一家之私情有天下之大義父母志歸其女情之不容己者也國君志討鄰賊義之所不容己者也而况魯甥以弒殞魯女以執辱霸國不能討魯國所當問文公誠能赫然發憤請命天王大興師徒問齊人弒舍之罪縱未能以商為戮亦足以伸大義于天下乃卑躬下氣慿王寵以請昭姬置討賊之公義篤歸女之私情國以是見侵姬以是見執不惟辱其女抑亦辱王命書齊人執子叔姬齊人歸子叔姬其執其釋皆在齊人閔姬而病魯也齊侯侵我西鄙遂伐曹入其郛此由扈之盟辭曰為魯討齊既而逡巡引退反以益商人之暴春秋書侵我伐曹著齊人之無忌憚也晉人之無能為也或曰魯非齊之匹也子責以討賊之義母乃非所責乎曰否義之所得為即事之所可為魯哀公亦孱君也田恆弒簡公孔子沐浴而朝告哀公請討之聖人必知其事之克有濟而後以告於君聖人非徒言也前日齊桓之伐魯昭之侵魯魯未嘗避之不與戰今商人愈無道文公愈卑屈自入春秋七八十年魯之卑屈未有甚於此時者也夫當討而不討當禦而不禦乃惟請盟之為務一請不從至於再三略無有彊立之志尚何以君其國而子其民乎十有六年春季孫行父㑹齊侯于陽榖齊侯弗及盟甚哉魯無君子國家坐受其敝也春秋始年齊魯强弱無以大相逺齊得一管仲而霸歷數傳國猶未艾魯自僖公託國于季氏至文公委政于襄仲平居無事怙權恣睢其君莫能制一旦有急倉皇失圖不乞援於晉楚之庭則請命於仇讎之國曽無一人以討賊明義為其君告所謂肉食者鄙纍數千百何能有益於人國哉春秋備書行父襄仲如齊如晉請援乞盟辭繁而不厭者哀魯國之無人坐視逆商慿陵莫如之何也夏五月公四不視朔或曰魯文四不視朔惰歟病歟春秋書之譏之歟閔之歟曰公榖以為無疾不視朔左氏以為實有疾不書也蓋畏也齊商人既歸子叔姬於魯隨以兵加之且欲邀公自為盟公懼為齊所辱趦趄莫敢前託疾堅卧使二臣更請春秋前書行父陽榖之㑹後書襄仲郪丘之盟其間書公四不視朔著公所以託疾堅卧者不欲自出盟齊焉耳嗟夫强臣我之臣也强國我之與也文公內不能正其强臣屈伸俯仰惟季仲之所欲為故外無以控制强國卑屈求服猶恐敵人之不受其亦甚可鄙矣四不視朔而使行父襄仲乞盟于敵春秋之書之志魯文之不能君也不惟貶公并行父襄仲而誅斥之矣六月戊辰公子遂及齊侯盟于郪丘公羊作犀丘榖梁作師丘此以賂得盟也齊魯皆千乘之國齊能伐魯魯豈不能扞齊而况直而壯者在魯曲而老者在齊彼以其力我以吾義吾何慊於彼而行父襄仲乞盟不得至納賂以求盟視長勺乘丘之大夫真可以愧死矣秋八月辛未夫人姜氏薨僖公夫人文公母聲姜也毁泉臺公羊曰泉臺者郎臺也先祖為之而已毁之不如勿居而已胡文定以為毁泉臺者此履霜之漸弒父與君之萌立論太過恐為後人之惑木訥乃謂先君築之是則今日毁之非先君築之非則今日毁之是以為文公毁之為莊公滅惡孝之大何得為非二說過不及愚謂臺之作事逸游以勞民可譏也然事在已往更三世矣毁不毁無關於國之存亡理亂亦何以毁哉勿葺可也据左傳文公毁泉臺實為妖言所惑非謂築臺之非而毁之以是為文公之孝非其實也公羊立論平正有得春秋之意楚人秦人巴人滅庸此楚庸相攻也而秦與焉春秋序秦於楚之下外秦也秦詩列于國風秦誓列于書篇之末聖人固不欲外之也而秦人不以成周建國自重儕於僭號之狂楚與之連兵伐國異乎小國之脅從於楚者矣春秋書楚人秦人巴人滅庸外秦也自是春秋始外秦冬十有一月宋人弒其君杵臼昭公也或曰宋昭公之死襄夫人使帥甸攻而殺之春秋書宋人弒其君何也曰人之者同之於衆人也與衆弒書人之例不同國君所為不道君祖母與大臣更議所立猶曰為宗社計也今乃不然据傳襄夫人欲通於公子鮑不可則助之施助之施所以入之也穆襄之族所以敢於犯上作亂子鮑所以敢於謀篡以夫人主之於上耳則夫人之弒昭公正坐淫故與慶父哀姜之弒閔公其事適同非為宗社計也非為宗社計則衆人之弒君也舊史必謂襄夫人以祖母殺孫義之不得為春秋正之書人書弒人之者待之衆人之道不與襄夫人以殺孫所以正其預弒之罪耳魯哀姜通於慶父而弒閔公閔公雖弒而慶父未之敢篡也齊桓伸其霸討哀姜死慶父戮春秋書夫人氏之喪至自齊夫人不氏貶也以魯事而觀宋事可以類見左氏乃云書宋人弒君君無道也吁有是哉愚觀宋昭之為君始者固不能無召亂之愆其後穆襄之族怙亂再三翦君之黨樹己之私昭公栖栖然孤立以待於亡傳載其將死之言曰不能其大夫至於君祖母以及國人諸侯誰納我是亦可憫焉耳公子鮑首惡襄夫人主之使當齊桓之世執鮑歸之京師明正典刑襄夫人亦有罰焉耳十有七年春晉人衛人陳人鄭人伐宋左傳晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還卿不書失其所也自齊桓之霸中國久無篡弒之禍及齊商人宋鮑後先弒君霸國無討又從而輔翼之自是以後篡弒之禍接跡於中原晉靈魯赤皆死於强臣世大夫之手趙盾實為之也人以為盾有無君之心故黨弒賊而不問盾何以辭其責故春秋於扈之盟而不序諸侯於宋之伐而人四國皆所以致其誅於盾也身為晉政以主夏盟庇弒賊而不討謂諸侯何吾於扈之盟宋之伐而知盾之心矣夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于榖魯當討齊者也魯不能討齊反坐受逆商之侮盟其臣以為未厭復伐之而求盟其君齊之無道亦極矣魯之不自振亦甚矣嗟夫齊商傲而日益盈魯文卑而日益索盈與索皆將死之證而商又惡之稔歟冝其及於難諸侯㑹于扈兩扈之盟諸侯不序春秋所以削晉霸而著其黨逆之罪也齊商人弒其君盾為㑹于扈曰將以討之卒之取賂而遂止今宋弒君盾復合四國之大夫曰將以討之既而立鮑而亟還鮑既立矣位既定矣乃復為㑹于扈扈之山川鬼神亦將為之切齒而况于在㑹之諸侯乎故春秋特削其霸書曰諸侯㑹于扈或曰桓二年宋督弒其君齊魯陳鄭為㑹于稷春秋書曰以成宋亂今晉人兩扈之盟視稷無以相逺春秋不書成齊亂成宋亂何哉曰督之弒霸事未興齊魯陳鄭相率而往共奬篡賊也故春秋書曰成亂並責在㑹之人也今晉主夏盟商與鮑後先弒君皆納賂而無討更要討篡之諸侯共定篡賊之位罪浮于稷故春秋削晉霸以示討事雖同而書法異罪有輕重故也秋公至自榖冬公子遂如齊十有八年春王二月丁丑公薨于臺下義見僖公之殁秦伯罃卒左傳書秦穆公卒在文六年何休注公羊乃以秦伯罃為穆公曰為其賢而卒之當從左傳此蓋康公也穆公名任好夏五月戊戌齊人弒其君商人邴歇閻職弒之也閻邴微賤小臣法當書盜今而書人以商人有當討之罪也弒君篡國執先君之夫人拒違王命辱天子之使罪大惡稔舉齊國之人皆得討之雍廩之殺無知是其例也故不以盜書但閻邴不能討之於篡弒之初既戴之為君又從而弒之故不得從討賊例而以弒君書或曰此二人者實殺商人今書齊人疑於衆人之弒之歟曰否商人齊之獨夫也殺獨夫者衆也非二人獨能殺之也二人者因衆怒而殺是亦衆人殺之耳故書齊人六月癸酉葬我君文公秋公子遂叔孫得臣如齊書遂得臣如齊繼書子卒著二臣挾强國之援歸弒其君也亦以著齊惠納土田之賂忍於伐其甥而立他人也遂自僖公之世始用事專盟專㑹專兵見于經凡十有五六書中值文公庸暗怠於政事仲繇此威福自恣內交嬖寵外結强鄰權勢頓出諸臣之右卒之弒嗣君黜君之母立庶孽襄仲倡之得臣行父輔之中立不倚者惟叔仲惠伯一人乃殞命賊臣之手由文公無正家之法嬖妾得交用事之臣預為奪嫡之計赤之死接之立此乃賊臣嬖妾之本謀特文公惛而不悟耳凡使書正不書介此書介見得臣預於逆謀春秋著討賊之義故併使介書冬十月子卒左傳子名惡公羊名赤子般之弒也名以卒之時莊公未葬也今子赤之弒不名以文公既葬成其為君是以不名此春秋特筆也或曰齊侯舍之弒以先君既葬稱君以正弒賊之罪今文公既葬而子赤不得書薨奈何曰史臣為篡賊諱也赤為君則宣為弒此為賊諱夫豈為君諱乎隱之弒史臣為桓諱不書桓之弒史臣為姜諱不書子赤之弒史臣為宣公母子諱是皆沒其弒而不以實書聖人之修經也革而正之則桓與宣皆有篡弒之罪故因舊史而書不曰弒而曰卒卒而不名則夫子書法之權衡也然而先之以二賊臣之使齊繼之以夫人姜氏之歸于齊而其弒君之跡與弒賊之情狀亦無以自隱矣夫人姜氏歸于齊此正宣公母子及襄仲得臣弒君逐嫡之罪也姜氏文公正妃子赤之母宣公之嫡母也敬嬴者文之嬖妾外交襄仲共謀篡弒又不能尊事嫡母迫而歸之于齊躬天下之大惡是時風教大壞亂賊披猖齊人弒其君舍而歸叔姬于魯魯人弒其君赤而歸姜氏于齊弒君出母後先一轍王綱隳頽霸政掃地莫有聲其罪而討之者吾意聖人把筆至此重為三嘆云魯人名之曰哀姜左傳以為出姜緣魯有兩哀姜今名之曰文夫人季孫行父如齊宣十八年左傳載行父之語曰使我殺嫡立庶以失大援仲也夫然後知子赤之死季氏亦與其謀蓋襄仲倡之得臣行父輔之春秋於夫人大歸之後繼書行父如齊以見其亦預於弒或曰是三家者亦有憾而為此乎曰利而為之耳君薨太子立正也國之福非姦臣之利也舍嫡立庶姦臣之利非國家之福也强家殺嫡立庶欲以市恩於新君而久魯國之權推是心以往亦何所不為乎當宣成之世有以行父為社稷臣者史臣之諂辭耳莒弒其君庶其公羊曰稱國以弒衆弒君之辭范寧注榖梁曰稱國以弒其君君惡甚矣而陸氏纂例乃以自大臣為言見之經傳不皆自大臣亦不皆出衆弒此例之所以不容拘而左傳乃謂莒紀公廢嫡立庶太子僕因國人作亂以弒愚尤不謂然也左傳所書莒之兩弒此庶其之死與襄三十一年密州之弒皆以為子禍兩事又大略相類此傳疑傳信之辭耳楚雖蠻商臣之弒聖人不以其為蠻荆而遂略之不書莒雖小邦諸夏也使紀公之死世子預聞春秋書法當視商臣以為準必無稱國以弒之理左傳所引雜出諸書有如莒之二弒乃中國大惡關係甚重不可無辨當從公羊此庶其稱國以弒乃衆弒之辭夫何疑春秋集傳詳說卷十四
