body:
  text: 春秋集傳詳説卷三宋家鉉翁撰桓公上名允惠公子隱公弟桓王九年即位元年春王正月榖梁曰桓無王其曰王何也謹始也其曰無王何也桓弟弒兄臣弒君天子不能定諸侯不能救百姓不能去以為無王之道可以至焉爾元年有王所以治桓也伊川曰桓弒君而立不天無王之極書春王正月公即位以天道王法正其罪也合榖梁程子之説而見聖人意矣此春秋誅討亂賊始見於魯事者也桓以臣弒君以弟篡兄罪大惡極而魯之先君也夫子修春秋雖以誅討亂賊為事而於魯之先君不容直正其罪故特立為此法以垂示萬世書王書正書即位皆所以討也桓在位十有八年書王者四年不書王者十有四年書王明王法也不書王著桓無王與王不能以王法正天下也誅魯也亦責王也元年書王謂王誅當即加位非篡賊所當久居也二年書王憤魯誅之未及而宋亂又作也至三年而王朝不聞有誅殛之命而宰渠伯糾又將下聘焉王法於是掃地天下為無王矣自是不書王者七年至十年正月書王則以天道一周三國又以兵向魯意其奉王命來討而復不能也至十八年桓見殺於齊乃復書王正月言王誅雖不加於篡賊而天理未嘗終泯其死於齊是亦討也聖人於桓之弒隱以為中國一大變故是以書法特異於他曰或者以不書王為簡編之脫誤春秋無深意不亦鹵乎或曰宣之弒赤與桓之弒隱皆弒也而春秋書法不同何哉曰春秋初年王室雖衰王綱猶未盡弛故聖人以討賊望周歷三四傳中國愈亂弒君篡國者相踵王卒不能問而齊晉之霸業興矣征伐之權在霸討賊之事在霸魯慶父宋南宫萬之誅皆齊桓命之誅而後即正典刑故春秋許之以霸討而望之以維持世道之事自是而後見之書法以責王者而責之霸與初年少異且宣之為弒與桓事亦有不同具著于下餘義又見二年正月公即位義已見隱元年不書即位榖梁曰繼故不書即位正也先君不以其道終則子弟不忍即位也繼故而書即位則是與聞乎弒也先君不以道終已正即位之道而即位是無恩於先君也范氏曰推其無恩則知其與弒與弒尚然況親弒者乎愚謂春秋比事以見褒貶隱不書即位所以明隱之能讓也桓書即位所以著桓之為篡也桓弒君篡國不當即位亦明矣春秋所以書即位絶之也絶之於名教所以大誅斥之也是時衛州吁齊無知皆以公子而弒君篡國與桓同惡者也春秋於其弒也去族而書弒於其誅也去族而書殺名其為賊所以大誅斥之也學者比事而觀可以見春秋用法之權衡矣或曰桓弒君篡國之罪固無逃於戮然其為君也非受命於厥父乎曰否桓非有父命也魯惠公暮年溺於私愛或有立桓之意而未見於事也故惠卒而隱遂立左氏謂生桓公而惠公薨是以隱公立而奉之奉之者隱公也非惠公嘗有治命曰以桓為嗣榖梁謂既勝其邪心以與隱者事之實也特隱公為矯激之行欲以讓桓榖梁所謂探其邪心成父之惡是也使惠公確有立桓之志必將明示意向於生存之時隱將有蒲屈之難國可得乎今惠終隱立魯國之人不聞有非議之者而謂桓公以父命當立決無是也此義惟榖梁得之已詳見隱元年三月公會鄭伯于垂鄭伯以璧假許田春秋初年弒君篡國者皆求援於強鄰以庇其身而免於討桓之為此會求援於鄭莊也是時宋齊鄭為強國而鄭莊者以善用兵之故尤為諸侯所畏服故桓於篡位之始首以是求之書公會鄭伯于垂魯乞盟也書鄭伯以璧假許田著鄭莊乘魯有急要賂而與之盟也隱八年鄭伯使宛來歸祊傳者謂鄭人以祊易許田非也是時鄭宋搆兵無寧嵗鄭急於得魯為援故渝平於前歸祊於後而無所靳至是魯桓弒君篡國懼四鄰仗義致討卑屈以有求於鄭鄭莊入璧假田以鴻毛之微要鈞石之重因其有罪脅而取之非以祊求易也歸祊假田後先五載歸祊之罪在於以天王之壤地而結私好假田之罪在於庇鄰國之亂賊而邀厚利兩書皆討其事實異若以易田為言則合二事而為一鄭莊受田黨逆之罪晦而未明失春秋書法之本旨故不得不辨或曰此割地賂人而以假田書其無譏乎曰田非璧之所可假也不以賂書而以假書為魯諱割地也餘義又見宣元年取濟西田夏四月丁未公及鄭伯盟于越三月會于垂可以盟矣而未與之盟歸未一月乃為此盟春秋繼假田而書及盟譏賂之以田求為此盟也魯桓割地賂人以逭篡弒之討鄭莊受地與盟而庇其篡弒之罪春秋比書其事不加貶斥而義自見矣嗟夫衛州吁之弒其君也魯隱宋殤為之出師會伐鄭以定其位今魯隱見弒於其弟鄭莊逼弒賊取其田而與之盟宋殤見弒於其臣魯率三國受弒賊之賂而成其亂出爾反爾後先一轍又其後魯桓斃於齊襄其子事讐終厥身而不敢報鄭莊雖僅克自全而嗣子忽終殞於賊臣之手國大亂幾亡黨賊為利者亦知所懲戒矣秋大水秋不著月而書大水槩一秋而言也書大者變常之辭也傷民害物而後書凡旱乾水溢飢饉螽螟異乎常災是以書大冬十月二年春王正月戊申宋督弒其君與夷與夷立初見隱公三年葬宋穆公再見隱五年宋人伐鄭圍長葛榖梁曰桓無王其曰王何也正與夷之卒也春秋初年聖人猶望天王以討賊之事故於書法而深注意焉元年書王所以正魯桓篡弒之罪也二年書王則以魯之篡賊未討而宋亂又作篡弒之禍接迹而起深有望於天王赫然發憤正二賊之戮而桓王略不以是為意而魯允宋馮同惡相濟乃為會于稷以定篡竊之位上而天王既不能伸王法以正天下次而方伯連帥皆黨凶怙逆惟利是謀亂臣賊子肆然無忌聖人為此懼既於嵗首書王以正之復於是年三月書公會齊侯陳侯鄭伯于稷以成宋亂篡弒之賊與預會之諸侯咸在所討春秋書法可謂深切而著明矣或者乃曰周自東遷巳不能號召方國今春秋以討賊之事責之桓王其如諸侯之不稟命者何曰是不然五年桓王伐鄭以師從者猶有蔡衛陳使是時王能以誅討二篡號召天下名之正言之順諸侯大國必將來會允馮督翬可坐而翦也惟其無志於此王綱日壞主威曰削凶彚日繁曲沃以支宗而篡晉陳他以庶孽而干嫡鄭突挾強臣之援而逼逐其君兄衛朔挾五國之援而拒違王命無知弒襄渠彌弒昭傅瑕弒子儀宋萬弒犍文薑弒桓慶父弒般及閔綱常掃地君父兄岌岌乎不能以自保春秋所為作為是故耳及其大夫孔父此春秋誅亂賊崇死節之始事也公羊謂孔父正色而立於朝則人莫敢過而致難於其君者督將弒君先攻孔父而殺之君尋及焉得春秋表章死事之意矣左氏乃謂督慕孔妻之美而殺其夫公怒督懼因是弒君杜氏從而為之説曰孔父內不能正家外取怨於百姓禍及其君是以春秋名之此以書名書字為拘而強求其説雖排陷死節而不顧失之逺矣劉原父曰父者名也君前臣名禮之大節較杜説為通然名之與字千載之下本不可深辨以是為拘而強求其説恐失聖人修經之本旨巳於綱領明例詳及之滕子來朝小國朝於魯滕以侯爵稱子杞以公爵稱侯或稱伯或稱子薛以侯爵稱伯諸儒為説不同杜氏范氏以為時王所黜是時王綱巳頽陟者有之未聞其能黜也胡氏謂魯桓負篡弒之大惡凡民罔不憝已不能討又先鄰國而朝之是反天理肆人欲與亂賊同惡而春秋之所深惡也故滕以侯爵降而稱子此一説也伊川謂滕本侯爵後服屬於楚降稱子外之也服楚者多矣而滕獨見黜何耶木訥謂諸侯自貶損其爵以事大國不欲與大國抗禮也審如是春秋何不為之正名乎此説尤不然東萊吕氏曰此録春秋者之誤也借使聖人修春秋之時黜陟諸侯以為賞罰何以置強國不問而獨區區於小國哉蓋晉楚齊秦諸大國顯者也故無誤小國微也故多誤此説較他説為通當從之程子胡氏之論有益世教但當時諸侯大國犯上干紀者甚衆春秋未聞有所降黜而獨施之於一二小國以是知其猶有可疑耳三月公會齊侯陳侯鄭伯于稷以成宋亂此春秋誅討亂賊併及其黨明正刑書以示後世聖人之特筆也榖梁曰以者內為志焉爾公為志乎成是亂也此成矣取不成事之辭而加之焉於內之惡而君子無遺焉爾四國為會于稷以成宋亂而春秋責魯之意居多則為此會者魯志也魯桓負弒君之大惡王誅不加乃復因宋之有亂同惡相濟以為此會故魯桓之罪視三國為重夫宋之亂巳成而春秋書會于稷以成宋亂者何哉蓋督雖弒君而馮之位未定也今三國為此會將以謀宋而徼利而馮之位於是始定督之罪始得無討故成宋亂者三國也所以使三國之成此亂者魯也榖梁曰以者內為志又曰公為志乎成此亂深得聖人之意聖人於魯之大惡不得為之諱也陳止齋曰向也合五國之君大夫以定州吁而州吁迄于討今也合四國之君以立華督督相宋自是而弒君之禍接迹於天下四君所為也春秋褒貶至於變文而嚴矣向也五國之君大夫書之復書之終春秋僅一再見焉以變文為未足而直言其所為舍此無復見者矣陳説善矣春秋二百年會而書所以為會之故唯此與澶淵而巳而澶淵之會特曰宋災故論者以為舍蔡之大惡不討而以宋之常事會諸侯故春秋責焉今四國之會直書曰以成宋亂其誅斥之法嚴矣夏四月取郜大鼎于宋戊申納于大廟榖梁曰桓內弒其君外成人之亂受賂而退以事其祖非禮也其道以周公為弗受也郜鼎郜之所為也曰宋取之於宋也孔子曰名從主人物從中國故曰郜大鼎公羊曰此取之宋而謂之郜鼎何器從名地從主人宋始以不義取之故謂之郜鼎戊申納于大廟何以書譏遂亂受賂納于大廟也愚謂前書成宋亂者兼責四國也此書取郜大鼎納之于大廟專責魯也魯取鼎於宋而春秋目之曰郜鼎言宋始以不義取之故正其名而係其器於郜今魯復以不義取之故原其器之所從來而係之於宋取之宋非所當取而取也納之大廟非所當納而納也魯桓身弒其君大惡未討乃成人之亂取賂而退復陳其賂於廟廟者祖宗神靈之所宅周公魯公之典章法制於是乎在郜之鼎宋之賂胡為乎至哉是之謂納不受而強致之義也當是時周室衰微刑誅不加於亂賊聖人秉筆誅姦以一字為衮斧曰成宋亂曰取郜鼎曰納于大廟所以明刑書而示後世皆聖人之特筆孰謂春秋因魯史之舊而無所損益乎秋七月杞侯來朝公榖作紀公榖以杞作紀隱二年紀稱子此稱侯范寧以為時王所進何休以為天子將娶於紀而封之竊以為簡册之誤周娶紀女未必封也榖梁謂朝時此其月者桓內弒其君外成人之亂於是為齊侯陳侯鄭伯討數日以賂已即是事而朝之惡之故謹而月之惡之當削其爵以示貶如滕子來朝是也今以子升侯非貶也胡氏曰是時齊欲滅紀紀求魯為之主非為桓立而朝之是以無貶然以子升侯竟未得其説其簡册之誤也蔡侯鄭伯會于鄧左氏曰始懼楚也楚芉姓顓頊之後有鬻熊事周文王成王封其曽孫熊繹于楚居丹陽熊通十九年隱之元年徙居郢使人請于周求加爵王弗許遂僭號稱王是為熊通武王自是始為中國患蔡鄭與之為鄰懼而謀焉以為此會楚日益強大莊十年敗蔡執獻舞十六年滅鄧不三十年與中國爭衡鄭被兵無寧嵗以迄于春秋之終鄧侯者熊通之舅而首滅之是尚有人心乎是會也春秋著楚人得志之始故書義又見莊十年荆敗蔡九月入杞來朝者紀也今入之者杞也紀方自託於魯以為存亡之計必不失禮於魯魯胡為伐之此書入乃杞也左氏以入杞在來朝之後遂謂杞侯來朝不敬故歸而伐之似出傅會書入杞必自有故傳所不載姑缺其疑餘義見明年會杞侯于郕所會之杞即今所入之杞魯桓以篡弒得國今即位二年方伯連帥未聞有聲其罪而討之者而篡賊反以兵加於二王後其無忌憚亦甚矣此入杞公之入也不書貶也不與篡賊以兵入人之國也公及戎盟于唐冬公至自唐榖梁曰桓無會而其致何也逺之也范寧曰桓會甚衆而曰無會無致會也弒逆之罪非可以致宗廟而今致者危其逺會于唐喜其得還也愚謂前此桓出會諸侯其返也不致今而會戎特為之致非喜之也為其幸而獲免特書以志之耳陳夏蔡般之弒其君中國無能討之者楚則討之今魯桓弒君天王微弱列國諸侯皆預於亂無有能討賊者矣桓會戎于唐戎若有人猶將討之今而得歸幸也故特為之致春秋以地致者四而已此及文十七年定八年十年説者以為皆魯地三年春正月義已見元年二年嵗首不書王或以周家不班歷或以為文之脫誤非褒貶所存而桓公三年以後歷十四年不書王謂為缺文不可也謂為不班歷亦不可也胡氏推本程子之説曰桓弒君篡國于今三年諸侯之喪事既畢是入見受命于天子之時而王朝司馬不施殘執之刑鄰國大夫不聞有沐浴之請亂臣賊子肆其凶逆而無所憚人倫滅矣故自是不書王見桓之無王與天王之失政而不王其説正矣或乃曰周既衰矣天王失政不王不自桓王始矣以是責王無乃非所可責乎曰王室微弱不能誅討亂賊春秋望之而未責也元年二年猶書王望之也今魯隱喪事既終逆桓未能入見天子而明年春宰糾銜命下聘自是再三聘當誅而奬王綱盡壞天下不復知有王自是併不書王示天下之無王也孰云非所可責而責乎公會齊侯于嬴左傳曰成昏于齊也杜注公不由媒介自與齊侯會而成昏非禮也魯桓以篡弒得國懼方伯之有討而乞昏于齊以為此會夫昏姻之有媒妁所以别嫌明微重大昏之始今魯桓親為此會以締好於強齊匪媒而昏昏不以正也越竟而會會不以正也使其私人往逆逆不以正也為齊侯而親迎迎不以正也是以春秋於嬴之會歡之會謹而書之以見禍敗之所從始是時鄭莊善用兵齊為強國故桓以賂結鄭以昏求齊所以逭弒君之討而終殞于齊天也非人所能為也其後莊公躬納幣於齊以盛飾而尸女恣為淫行無復羞惡造端實始此父之行子之效以致敗倫亂國厯數傳而未巳可不謹哉夏齊侯衛侯胥命于蒲榖梁曰胥之為言猶相也相命而信諭謹言而退以是為近古也是必一人先其以相言何也不以齊侯命衛侯也公羊曰何言相命近正也此其為近正奈何古者不盟結言而退愚謂自入春秋書會書盟者有矣書會而不盟書盟而不會者亦有矣此忽變文書齊衛胥命其必有異乎為會為盟者矣荀卿言春秋善胥命與公榖近正近古之意同蓋胥命者以王事胥相命而莫或敢先也莊二十一年傳王室有子頽之亂虢公鄭伯胥命于弭是其義也方霸之未興人自為謀無所統一私相會盟非春秋所貴也及霸之既興盟主以其威力相控制諸侯以方伯而行天子之事亦非春秋所貴也是故胥命而不敢有先為春秋之所貴此出於聖人之特筆非因舊史而書也劉氏謂諸侯不請于天子自相命非正也恐非經意六月公會杞侯于郕左氏曰杞求成也去年九月魯以兵入杞今而求成為此會案左傳注杞乃二王之後爵為上公而經稱杞伯或稱杞侯諸家俱未有的説何休輩為公羊之學以為夫子黜周王魯以杞宋為二王後降杞同於庶國繆妄不經然終春秋之世杞未嘗稱公經之一疑也公羊以杞為紀亦未知孰是秋七月壬辰朔日有食之既義已見隱三年日食義已見隱之三年此書食既之始也歷家謂日月交會月掩日故日食食既者正相當而相掩也春秋書日有食之既志其異之大者也隂盛于陽太陽為之失光晝晦其為異大矣嘗聞長老言日食既京師見之千里外不皆既或千里外見其既京師不之見以為君德時政之所感至乙亥丁丑二嵗親見食之既先是太史定為食五六分已而食既晝晦星見及有自四方逺外來者乃云食及五六分不既不晦然後知天文示異巧歷有不能知者或言朔或不言朔或書日或不書日傳曰失之前或失之後也失之前者朔在前也謂朔日食失之後者朔在後也謂晦日食不書朔不書日夜食也其説謂日始出而有虧傷處知其食於夜愚謂日未有食於夜者縱在子丑時食亦當為朔食何以謂之晦食或書朔或不書朔或日或不日或朔日俱缺歷官廢職國史廢書春秋因之而書亦以譏其國之無政不必強求其説公子翬如齊逆女翬者桓所與共為弒篡之人為桓謀所以定其位者乞昏於齊今而逆女豈無他人而使翬逆焉使之重自結也春秋於隱公世去翬族以正其弒君之罪於桓公世乃復稱公子非録之也明其與桓共為逆也若曰翬者國之大賊而桓之私人也此春秋用法於魯之始事後多倣此所謂不誅之誅不斥之斥特用之於魯其旨微矣內逆女有親迎於其國者莊也文也有以大夫逆者成也宣也有以大夫逆而公親迎于途者此也得於禮者是為常事不書其書者皆違於禮者也九月齊侯送薑氏于歡公會齊侯于歡義已見隱二年紀裂繻逆女榖梁曰禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申言曰謹慎從爾父母之言送女踰竟非禮也或曰齊侯送女于歡非禮也公會齊侯于歡不曰古親迎之遺意乎曰翬之往迎公固無親迎之意及聞齊侯親送薑氏乃遽往會于歡則公之出也為齊侯而出非為親迎而出於禮則似是而用禮之意則非也親迎之禮或往其國或在吾館送于歡會于歡齊與魯胥失之是故書夫人薑氏至自齊榖梁曰不言翬之以來何也公親受之于齊侯也孫泰山曰公受薑氏于歡不以歡至者不與公受薑氏于歡也冬齊侯使其弟年來聘書弟義已見隱七年此仲年之來為致女故書杜注古者女嫁使大夫隨加聘問存謙敬敘殷勤也成九年季孫行父如宋致女與此同在魯曰致女在他國曰聘書使其弟者因隱七年而書也有年公羊曰有年何以書以喜書也大有年何以書亦以喜書也榖梁曰五榖皆熟為有年傳注多以為春秋為年豐故書惟後漢賈逵景伯云桓惡而有年豐異之也言有非其所宜有伊川取之曰書有年紀異也人事順於下則和氣應於上桓弒君而立逆天理亂人倫天地之氣為之繆戾水旱凶災乃其宜也今乃有年故書其異宣公為弒君者所立其惡有間故大有年亦書深得聖人書有年之意公榖陋矣蓋春秋二百四十二年有年大有年必不止此舊史往往悉書之聖人以其為常事削而不録特存二君之有年大有年者言有非其所宜有此所以謂之異也四年春正月公狩于郎左氏曰公狩于郎書時禮也杜注冬獵曰狩行三驅之禮得田狩之時故曰書時禮也周之春夏之冬田狩從夏時甚哉元凱之曲徇丘明也春秋常事不書非時及越禮而為之則書以示譏凡搜狩不書公書公皆譏此書公狩譏以夏正之春而狩狩非其時也愚於此又得夏時之一證夏天王使宰渠伯糾來聘義已見隱元年宰咺來隱元年宰咺賵仲子此宰渠伯糾來聘魯桓惟劉原父胡文定著義為正劉氏曰春秋於大夫莫書其官至冢宰獨書之以此見任之最重宰天下者莫名至糾獨名之以此見責之最備周公作周禮冢宰固以賞善誅惡進賢退不肖為職今銜命下聘逆人書名所以貶也胡氏之論與此同且曰咺賵仲子糾聘桓公其事皆三綱之所係然咺獨稱官糾兼稱爵者咺初得政未受封爵而糾則諸侯之入相者也任之重責之深於此可見或曰隱元年之責咺春秋欲以天起義故於王無責今也復責糾而不及王義何居乎曰春秋之義君有過先責其宰咺與糾居大臣之位既不能正諫又將命以出重有責也乃若莊元年王使榮叔來錫桓公命王不稱天責在王也榮叔非宰故不與咺糾同其責是嵗秋冬闕左氏杜注曰春秋有空時而無事者今不書秋冬首月闕文也公羊何休注乃曰桓無王天子不能誅又下聘焉故闕二時以示貶論雖正或以為求經太過胡氏頗有取焉曰桓弒隱而立周天子不能正大司馬九伐之法乃於四年命宰渠伯糾下聘逆人故去秋冬二時以見王不能用刑猶天道有春夏之發生而無秋冬肅殺此猶可言也又七年榖伯鄧侯來朝皆書名是嵗亦闕秋冬胡氏曰桓弒隱雖方伯連帥環視而未之恤猶有望也及榖鄧自逺來朝則天下諸侯莫有可望者矣故特去秋冬二時以見諸侯不能舉職吁春秋編年四時具而後為年如使是嵗秋冬更有大事當書豈以一國一人之為非併削二時而不載聖人編年之書無乃闕略而不備乎此闕文也自可存而勿論五年春正月甲戌己丑陳侯鮑卒左氏曰陳侯疾病文公子他殺太子免而代之是以再赴而其日不同榖梁曰春秋之義信以傳信疑以傳疑陳侯以甲戌之日出己丑之日得不知死之日故舉二日以包也公羊怴呼述反也蓋以狂疾出而死於道路故不得其日或曰甲戌之下有闕事似為書陳他殺世子免而簡册脫誤是以聨書二日此説得之義又見六年蔡人殺陳他夏齊侯鄭伯如紀外相如不書此何以書貶也案左氏齊侯鄭伯朝紀欲以襲之紀人知之無功此齊人滅紀初見於經者也春秋有復仇之義齊於紀有纍世之仇義不容已而加之以兵固禮教之所許今為盜竊之謀而潛師以襲人國是以春秋責之書齊侯鄭伯如紀而盜竊之狀見矣此書爵非爵也目其人而貶之也天王使仍叔之子來聘公羊曰仍叔之子天子之大夫也其稱仍叔之子譏父老子代從政也左氏曰弱也杜注仍叔天子之大夫稱仍叔之子本於父字幼弱之辭也周衰卿大夫世其官必父死而子繼今仍叔子武氏子皆及其父之尚存而代居父處大臣耽寵固位惟恐失之欲及其尚存而見子孫之貴此春秋所以特書某之子來聘譏其父以及其子也或曰春秋比事之書每比事以見意去年書宰糾來聘名之所以貶也今茲書仍叔之子來聘不名亦所以貶也貴者以書名為貶少且賤者以不名為貶皆所以著其奬逆之罪也臣弒其君弟賊其兄王不能討又從而奬之以一聘為未足復再聘焉故春秋於貴者則名之於賤者則微之以深致其意其論據正而無鑿故併録之葬陳桓公城祝丘夏而城非時也故書秋蔡人衛人陳人從王伐鄭此王師伐鄭不書王師伐鄭為王諱也何諱諱敗也敗績於茅戎不諱此而諱之何也茅戎外域敗王師不足為諱鄭諸侯姬姓之國也以其兵侵犯王略叛也王討叛而不能勝反為所敗此王室之一大變春秋是以變文書三國從王伐鄭存君臣之義以示天下後世亦褒三國之能以師從王也褒三國之從王所以責齊宋魯大國之不能從王者也胡氏謂王奪鄭伯政而怒其不朝以諸侯伐焉非天討故不稱天愚考當時之事桓王伐鄭亦有不容己者自周室之東諸侯不稟王命者有之而未有叛王者也鄭莊以周人畀虢公政命祭足帥師取成周之麥禾以人臣而稱兵犯上不曰叛可乎左氏謂鄭不朝王王怒而伐之舍其大罪舉其小愆故讀史者類以桓王不當輕於伐鄭不思稱兵犯上非特一不朝再不朝而可略未可專咎王而恕鄭也然王不稱天不得謂之非譏譏王失馭臣之柄以致諸侯之叛又不能於師以是取敗以是而譏非謂鄭莊無罪而不當伐也春秋誅亂賊之書豈有不責臣子而專責其君者乎大雩春秋常祀不書書雩皆旱而雩也月令仲夏大雩帝用盛樂常雩也周官旱暵則舞雩旱而雩也左氏所謂龍見而雩者常雩也春秋所書雩二十有一皆旱雩也夫豈以龍見為拘譏不時乎公羊曰書雩則旱見書旱則雩不見其説是矣但春秋書法每變文以示異凡祀郊則言郊禘則言禘不以大言惟雩則書大雩蓋大雩帝天子事也雩山川百神諸侯事也魯既僭郊禘因亦僭而雩帝是故書大以譏之耳或曰郊禘亦僭何以不書大曰郊禘一而巳矣故不言大若雩則諸侯之雩與天子之雩為禮各異是故書大以譏其僭耳義已見僖十一年螽書大雩見其旱也繼雩而書螽見旱蝗之並作也冬州公如曹六年春正月實來周制唯二王之後封公今州公以公爵書説者謂外諸侯入為三公者虞公虢公之類是也左傳謂淳于公如曹度其國危遂不復明年來魯春秋書實來謂其始如曹末乃自曹適魯閔其失國亦所以責之也夫以外諸侯入備王國之大臣外侮侵陵不能自存當請于王思所以為圗存之計勢窮理極死之可也今奔曹適魯擅去其封守託身於諸侯之國春秋書公書如曹又書實來皆所以責州公而著人臣為天子守四封之法實來二字傳記中儘多有之成二年傳王曰所使來撫豫一人而鞏伯實來者乃當時人之常言似不必過求或以實為州公名非也此與春秋初年書祭伯來事雖不同意實相似皆惡人臣之外交也夏四月公會紀侯于郕左氏曰紀來咨謀齊難也前年齊鄭以盜竊之兵襲紀而弗遂因是啓釁且將大加兵於其國紀睦于魯越境而謀公往會之義之不容巳者春秋無譏也是冬紀復來朝胡氏謂魯桓弒君之賊人人得而討之而紀主之以求援其何以能國然紀實危迫而有求於魯當時諸侯之國未有能與齊為敵者惟魯望國紀之求之亦有弗獲已焉是以春秋無譏至冬而復來則不能無譏矣秋八月壬午大閲書大閲者其非常事所當講者耳孫泰山謂大雩大閲禘郊雉門兩觀之類皆魯之僭禮夫子修春秋不斥言故因事而見意愚謂武備亦國事之所不可廢與其他僭禮不同春秋之譏恐不在是榖梁曰蓋以觀婦人也時當淫薑煽艷之始魯君以是為悅故特書以譏之榖必有所本當從之蔡人殺陳他陳他殺嗣子而自立為君再更嵗矣今死于蔡春秋書蔡人殺陳他名以殺之討賊之義也書蔡人殺陳陀與蔡人之能討鄰賊也臣弒其君子弒其父夫人皆得而討前此陳人為衛討州吁今蔡人為陳殺他此鄰國之二討春秋所深與也治鄰賊者有褒則黨鄰賊者在所誅斥五國之定州吁四國之成宋督齊鄭之輔魯桓宋魯之扶鄭突春秋皆深誅而痛斥之此與國之四逆所以屢形之特筆者也夫使鄰國明討賊之義與國絶輔篡之姦則亂賊何自而作雖作無以成其亂此春秋所以書也而又有所謂特筆之三罪者焉衛人殺州吁蔡人殺陳他齊人殺無知是也彼篡國弒君列於諸侯之會或既立踰年而春秋惟以討賊書不成其為君此皆出於聖人之特筆非因乎舊史者也故曰春秋成而亂臣賊子懼或曰三罪之誅固然矣亦有賊討而不明正其罪者何歟曰討賊而不正其罪不以本罪討也齊之商人蔡之般魯乏桓既為國人所君及其死也曠嵗歷年假手於盜賊蠻荆而後即正天討春秋雖欲奪其爵土同之於賊有不可得也公羊云他淫于蔡蔡人殺之左氏謂陳厲公蔡出也故蔡人殺五父而立之皆未得春秋書法之意齊田常弒其君夫子沐浴而朝告於哀公請討之此亦為鄰國討賊之義哀公不能用異時修春秋書法間時時見之九月丁卯子同生左氏公羊胥以子生為當時之盛事故聖人見之特筆吁此魯國一大變聖人動色而書之乃以為喜有正也何不思之甚歟惟榖梁曰疑故志之時曰同乎人也范注莊公母文薑淫于齊襄人疑其非魯桓之子故僉曰齊侯之子同於他人也榖梁此義與猗嗟序合此魯國禍敗之始桓所以弒由乎此也不然羣公何以不書子生惟此獨得書乎杜注謂十一公皆無嫡夫人子故子同得書以傅會左傳之説然亦無明證可考愚從榖梁之説餘義見莊元年不書即位冬紀侯來朝左氏紀侯來朝請王命以求成于齊公告不能是嵗夏會于郕以咨謀齊難及冬又來朝紀之求於魯者至矣卒不能有益坐待滅亡春秋之書之責紀不能自治其國苟焉圗存責魯不能憂人之憂急人之急坐受鄰國之朝而莫之或拯也七年春二月己亥焚咸丘公榖皆以咸丘為邾邑曰不言邾咸丘者疾其火攻也左氏杜注以為火田咸丘魯地巨野南有咸亭諸儒多從杜説然春秋於田即書田於狩則書狩今直書焚咸丘似非為火田書也火攻之説為是然疑有闕文夏榖伯綏來朝鄧侯吾離來朝公榖以為失國之君故名以朝之失國而來未有以朝書者也胡氏謂桓負弒君之大惡榖鄧越國而朝之春秋為其黨惡書名以貶之此論固正但當時諸侯黨篡逆為會盟以定其位者齊鄭宋實為首春秋雖因事誅斥未有以名書者此小國似不足深責歟或曰春秋初年魯最強而又僭用王禮榖鄧之君循用王朝之禮自通某伯某某侯某故春秋因而書之以見賓主皆有罪滕薛之並朝榖鄧之名通邾牟葛之旅見由魯人僭用王禮故諸侯以王禮朝之春秋因而貶之當從此義是嵗闕秋冬伊川謂臣而弒君天理滅矣宜天下所不容而天子聘之諸侯朝之逆亂天道嵗功不能成故不書秋冬與四年同曰然則十五年邾人牟人葛人來朝何以書秋冬曰四年與此明其義矣三國之來别立義胡氏亦祖此説愚於此不能無疑杜氏以為史之闕文東萊吕氏以為春秋以後之闕文據傳是冬曲沃伯誘晉小子侯弒之自是遂篡有晉國此亦事之大者春秋未必不書其不見者亦闕文歟不容強求其説八年春正月己卯蒸義已見綱領明夏正中篇春秋之春夏時也春秋之正寅正也愚既於篇首辨之矣此春正月而書蒸謂冬事而春興之是以書譏蒸之不以時也榖梁亦知聖人行夏時之説矣故於此明言冬事春興之為不時而諸儒之説或有未然胡氏謂春秋以夏時冠周月引周禮大司馬仲冬田而蒸者以證正月之為建子月則此正月為夏時十一月十一月而蒸常事也春秋常事不書此何以書乎則曰春秋非以不時書為五月再蒸見瀆書也若五月之蒸為瀆而書止須五月而一書可也何必再書而況五月之蒸亦為冬事而夏興之聖人何以不譏其不時但譏其為瀆乎由是觀之是嵗再蒸皆以不時書愚於此得春秋用夏時之一證乃若周官制度不與五經孟子所言同先儒固謂書成而未及施用於天下至於政令所施率本夏時仲冬之田亦夏時也田而蒸者仲冬事也今以孟春失時之蒸為仲冬常事之蒸不過求合左氏周正之説而非聖人行夏時之本旨也既詳著綱領復於此申述其義焉天王使家父來聘或曰天王下聘逆人至於再而春秋無貶何耶曰初而貶以正法也再而貶申著其義也至於三義盡於前雖不貶猶貶也春秋立義大率如此學者以是求之夏五月丁丑蒸蒸冬事也春蒸之夏又蒸論者謂桓公弒君篡國懼宗廟神靈之有討是以一嵗而再蒸欲以是諂於宗廟而不知瀆祀之無福也春秋再書以示貶秋伐邾伐不書公貶也若大夫行亦當書帥師不書亦貶也木訥謂邾儀父知義者也隱有遜千乘之心則即位三月儀父來盟桓有篡逆之惡則定位八年儀父不至桓憤其然故伐之責其不至也迄十五年乃來儀父厚於隱而薄於桓可謂知所惡矣冬十月雨雪是嵗春正月蒸冬事而春興也而春秋所以譏愚既辨之於前則此十月乃夏時之十月何疑或曰十月冬也冬而雨雪常也春秋所以書何哉曰春秋記異有著年者有著時者有著月者有著日者有年大有年著年也秋大水夏大旱冬大雨雪著時也此冬十月雨雪與定元年冬十月隕霜著月也不書日而書月言是月雨雪之頻隕霜之繁傷人敗物而特記之耳范氏注引月令孟冬行秋令則霜雪不時必以此十月為周正之十月是春夏秋冬可得而變易萬萬無是理其詳具見綱領明夏正祭公來遂逆王后于紀公羊曰祭公者何天子之三公也何以不稱使昏禮不稱主人遂事者何成使乎我也使我為媒可則因用是往逆也女在其國稱女此稱王后何王者無外其辭成矣昏禮不稱主人者謂天子雖尊不自為主人也有母則稟命於母無母猶當謀之諸父兄白於禰廟乃行古之義也然母命不可以行之於天下諸父兄亦不得稱於國中故祭公之來不言王使公羊子此義其必有所受矣左氏莊十八年虢公晉侯鄭伯使原莊公逆王后于陳陳媯歸于亰師不言王使而曰虢晉鄭使之逆此不稱主人之明證也祭公何以來乎周制天子與諸侯為昏則使同姓之國為之主為諸侯非王之匹也魯以周公之後為王主禮其來舊矣榖乃云不正其以宗廟之大事即謀於我其未然歟是時紀困於齊請昏於王室以為圗存之計魯實主之王使祭公下詢於魯亦以是故耳祭公為逆后而來無譏也祭公以遂事而往則有譏也大昏萬世之嗣王后天下之母藉令魯以為可猶當復命于王告之禰廟先之以幣聘然後往逆禮之序也今桓王之命祭公乃令決其議於魯曰魯以為可即用是往逆其簡禮而易昏豈不甚哉是以春秋一書而再譏譏王也亦責祭公也祭公身為大臣任兼師傅不以禮正王甫問昏于魯即逆后于紀此春秋所以兼責之耳劉原父謂三公乃師傅之官與天子坐而論道其任重矣今其來魯乃命魯以昏姻之事若是則大夫可也何必三公以為任之重使之輕愚謂周之三公即宰相也天子不行親迎之禮而使其宰往逆所以重大昏之始其未為失歟蓋祭公為逆后出過魯審議乃行春秋譏其遂事而簡於禮非謂其以三公出為譏也當是時賵妾聘逆皆以命其宰宗廟重事而使三公於禮不為過春秋其無譏歟春秋集傳詳説卷三
