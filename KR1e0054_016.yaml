body:
  text: 春秋集傳詳說卷十六宋家鉉翁撰宣公下定王八年晉景元年楚莊十五年十年春公如齊公至自齊齊人歸我濟西田或曰齊人歸疆於經凡三見惟此書法特異以我繫田春秋殆亦有意乎曰此為賂田來歸而書故與其他歸疆書法特異蓋天道十年而一周人事十年則必變魯桓之篡隱也歷十年而無討春秋於是歲始書王以正之其冬三國來伐春秋爵以褒之為其能以兵向逆人之國也今魯宣之篡赤至此十年矣天王無討方伯不問齊人忽以賂田來歸春秋書齊人歸我濟西田非為賂田來歸而逭齊人之討也亦非為賂田來歸而釋魯人之罪也蓋以十年之久天理必復齊人知罪之所在而自舉元田以復於魯天實使之非人力所能為也自是不數月齊惠忽以死告天道至是一周彼其惡亦稔矣春秋書法所以特異於他者明天討也或曰魯宣其無討乎曰魯宣其首惡者也齊惠其黨惡者也春秋之討罪也必誅黨惡之人天道之禍淫也亦必誅黨惡之人襄仲敬嬴雖內蓄篡弒之謀然非齊惠主之彼無以成其惡赤齊之甥也殺之而立接姜齊之女也出之而立嬴凡皆齊惠之所為反道敗常絶滅人理今十年之久迄正天誅春秋於賂田來歸之後書齊侯元卒著其伏辜而死也論者乃謂春秋録齊侯之改過夫既黨人之亂臣使之弒君篡國罪盈惡稔天誅將加乃欲以歸賂田自解是猶盜賊殺人而歸其財得謂之改過乎春秋討之而非録之也夏四月丙辰日有食之已巳齊侯元卒義見上歸濟西田齊崔氏出奔衛左傳以為崔杼有寵於惠公髙國畏其逼因惠死而逐之書崔氏非其罪也愚以其歲月考之是歲至杼弒君蓋五六十年使杼得年七十此時方在弱冠不應權勢已盛為人所畏疑非崔杼之身或其父或其族皆未可知春秋繼齊惠之死書崔氏出奔誅髙國也君身未寒而逐君之黨併及其族無君也推是心以往亦何不為宣殁而魯人逐歸父惠死而齊人棄崔氏皆無君也春秋之書之乃防微杜漸之意不為崔氏與歸父而書也傳家以為書氏者志其無罪非經意也公如齊五月公至自齊此奔齊喪也天王之喪魯不奔不賻今也懷輔篡之私恩為齊奔喪事之悖也春而書公如齊公至自齊曾未數月又書公如齊公至自齊備書所以貶也春秋於魯之大惡每備書以見義不加貶斥而義自見此類是也癸巳陳夏徴舒弒其君平國或曰君無道見弒稱國以弒傳例也齊懿奪閻職之妻則邴歜之父以是見弒春秋書齊人弒其君商人陳靈朋淫殺諫罪浮於商人弒者以氏名書何邪曰不著徴舒氏名無以見禍亂之所從生討徴舒亦所以治平國也杜元凱以為陳靈惡不加於百姓故稱臣以弒此為例所拘强求其說失之逺矣或曰是時諸侯弒君者四國魯之宣宋之鮑罪兼篡弒者也鄭歸生以一朝之忿犯上作亂夏徴舒不堪朋淫之辱以取覆亡是四人者使當夫子之世沐浴請討宜當何之曰宋鮑魯宣宜先討者也歸生其次也徴舒雖有弒君之罪亦有可憫之情楚莊苟欲伸討弒之義當先討宋魯之二弒否亦當正歸生之戮今捨其大而治其細末又因以為利此逐利之師非討逆之師也學春秋者當首辨乎此義又詳見楚入陳六月宋師伐滕宋鮑聞晉之多故而用師於滕圍之未服又從而伐之未必無宋襄執嬰齊之心襄且不能有成而況於鮑乎春秋之書之所以貶也胡文定謂宋大國爵上公霸之餘業鄰有弒逆不能聲罪致討乃用大衆以伐小國論則美矣而非所以責宋也夫仗義者可以伐不義無瑕者可以戮人宋鮑乃弒賊之未討者責弒賊以討弒賊非春秋垂法示後之意也鮑弒其君而篡之罪浮於徴舒而望其能討徴舒萬萬無是理也公孫歸父如齊葬齊惠公晉人宋人衛人曹人伐鄭四國伐鄭以其二於楚也春秋皆人之人四國所以人晉也夫躬天下之難而後可以責人之從己未聞躬天下之易而責人以難從也齊桓晉文所以得諸侯以其內奬王室外攘荆楚救災恤患汲汲乎躬天下之難諸侯有所恃荆楚有所畏是以得成其霸業自晉襄之殁靈成景三君皆不克負荷而楚莊日以盛强北向而爭諸侯今日侵陳明日侵鄭甚者觀兵中原將逞其所大欲晉人僅出偏師復畏避退縮不敢輕犯楚鋒惟伺楚轍之南釋憾於一二小國今又合諸侯以臨鄭縱能得鄭保楚師之不再出乎是所謂躬天下之易而責人以難者也或曰當是時何者為難何者為先曰翦篡鋤凶霸政之最先者也自趙盾為政宋齊魯皆嘗弒其君而篡國盾內有所慊一切置而弗問今郤缺為政苟有志於求諸侯當先治諸侯國之弒其君夫然後名正而辭直義立而威行不知出此乃率三國以伐鄭而以討逆遺楚遂使楚國挾仗義之名以風示天下晉之霸業從是愈衰國無人焉耳秋天王使王季子來聘公羊曰稱王季子貴也母弟也魯宣即位于今十年僅一遣蔑如京師而王隨使貴介弟報之王之遇魯可謂厚矣而宣也惟知屈已於齊所以事王者蔑如也胡文定曰宣公不朝周而朝齊不奔王喪而奔齊侯之喪不遣貴卿㑹匡王葬而使歸父㑹齊侯葬縱未舉法勿聘可也而使季子來王靈益不震矣此論固正愚以為魯則有罪而不可以此責王也周自惠襄而降日趨於削介弟聘魯猶曰厚往薄來吾以懷諸侯也王益謙魯益慢魯實可誅春秋比事而書責魯也公孫歸父帥師伐邾取繹滕何負於宋而宋伐之邾何負於魯而魯侵之皆由中國無盟主强陵弱衆暴寡而莫之或禁也胡文定於宋之伐滕魯之伐邾皆責以不能討陳人之弒君者愚以為非所當責而責也宋鮑之弒昭魯宣之弒赤皆弒其君而篡其國有帝王在上必誅而不以赦者也陳靈淫於夏氏為徴舒所戕陳靈固有以自取徴舒之罪猶下於宋魯之二弒賊今責二弒賊以討徴舒是為以亂治亂其無乃不可行乎大水義併見後饑季孫行父如齊冬公孫歸父如齊行父未返而歸父復如齊左氏以為伐邾故非也行父如齊以頃公初立而往禮之常也歸父如齊則宣公使其私昵臣布腹心於齊侯非禮之常也歸父者襄仲之子厥父弒齊甥而立宣公齊惠實為外主今頃公新立懼有討焉故使仲之子如齊重致卑屈以逭篡弒之討春秋比書二使之出誅其姦也非為伐邾故齊侯使國佐來聘未踰年之君不得以父道自居也故稱子不得已而交於鄰國稱子不稱侯今國佐之來致命為侯春秋為其以父道自居故書以貶之饑自宣公即位以來六年書螽七年書大旱今書大水復書饑咎證頻仍未有甚於此時者也旱而書大旱水而書大水以變常書也水旱所及者廣是為變常宣以臣而弒其君以子而逐其母罪大惡極天討未加發而為水旱之災百姓重受其虐春秋書之以垂戒於後楚子伐鄭胡文定謂九年楚子伐鄭稱爵者為貶辭此年楚子伐鄭稱爵者為直辭愚謂經固有辭同而義異者此楚子兩伐鄭無不同也春秋自比歲以來憂强楚之遂霸中國是以正其名曰子所以抑其僭號示天下共主在周楚人不得干也故其慿陵中國也自將則書楚子其臣將兵以出則書楚人非褒貶之所在也蓋書爵書人在中國諸侯則為褒貶楚既僭號自絶於王春秋書爵以正之非所以褒之也此兩伐鄭皆貶辭非直辭也若曰九年郤缺救而得書此年士㑹救而不得書則義各有在郤缺始為晉政而出師救鄭敗楚桞棼與其能救也士㑹用偏師無益於救鄭是歲鄭即從楚是故略而不書耳十有一年春王正月夏楚子陳侯鄭伯盟于辰陵榖作夷陵此陳鄭俱服于楚中國之憂也而陳止齊乃云序楚子於陳侯鄭伯之上初與楚以霸愚竊未敢以為然也春秋以正僭竊為先不與僭竊者主齊盟也而楚僭竊之尤甚者春秋攘斥之不暇孰云與之以霸乎序楚子於陳侯鄭伯之上著南蠻之子國而僭居中國侯伯之上紊內外之辨也赤以卑從楚之二國也蓋齊桓晉文所以大有功於當世以其內奬王室外攘僭竊有以大服諸夏之心是故與之以霸楚日以僭王窺周為事春秋大經大法在於斥絶之而已矣何與霸之有哉而況是時陳人專意從楚怙凶䣊惡有年數矣今而陳國有難楚當為之討賊彼徴舒特一匹夫耳即辰陵之㑹召而戮之何難乃特為是滅國之端利而為之詐而成之夫豈春秋之所與乎大率僭王之楚不可以霸中夏彼僭王而許之以霸是二王也讀春秋者謹之公孫歸父㑹齊人伐莒前伐邾取繹與此㑹齊伐莒皆以歸父將此歸父為國生患求多於小國春秋之書之所以誅也秋晉侯㑹狄于櫕函楚何為而盟陳鄭于辰陵求霸中國也晉霸國也不能輯和諸侯乃㑹狄于櫕函比事而觀晉之卑亦甚矣或曰晉自靈成以來非楚之敵度德量力無亦春秋所與乎愚以為楚固前日之楚晉亦文襄之晉也文襄用之霸中夏而有餘靈成用之自保其國而不足亦存乎人耳由趙氏秉政諸大夫各私其私莫有以國事為己任者君庸臣專如負烏獲之力而弗克舉鼎非其力之不足也春秋書楚子陳侯鄭伯盟于辰陵繼書晉侯㑹狄于櫕函比事以見貶斥其義甚明也春秋中年多比事以見義冬十月楚人殺陳夏徴舒丁亥楚子入陳納公孫寧儀行父于陳孔寧儀行父于君弒之後懼罪奔楚或曰楚莊以諸侯之師伐陳討夏徴舒弒君之罪春秋不書楚人伐陳直書楚人殺陳夏徴舒繼書楚子入陳又繼書納孔寧儀行父于陳曰殺曰入曰納其㫖安在曰春秋不與楚以討賊之義也夫所謂討仗義而往奉辭而伐誅其人定其國而去之已無所利焉是之謂討今楚莊入孔寧儀行父之邪謀以詐而襲陳以利而出師縣其土不能得則納其首禍之人始乎詐終乎悖春秋書殺書入書納不與楚以討賊之義也蓋陳者楚之與國怙凶黨惡幾年于兹晉人招之不來伐之不屈託國於楚者也今陳靈見弒為之討賊非楚而誰乃仗義以為利幾欲覆亡人之國討賊者不如是也而況夏徴舒陳之一匹夫本非秉權用事之人君無道汚於其家彼不勝忿起弒之非若魯襄仲鄭歸生晉趙盾弒君立君威行中國必待外兵而後可克也楚莊有意為陳討賊即辰陵之㑹召徴舒而戮之陳無事矣乃於既盟之後遽興掩襲之師入陳而遂縣之仗義以濟利假信以行詐此春秋之所甚惡也幸而從申叔之言事弗獲逞猶納其朋淫首禍之人俾復為政於陳國則其區區本心猶在於利特畏晉兵之來救是以亟舍之而去非知其不義悔之而不為也故曰楚之入陳乃逐利之師非討逆之師也是役也楚以諸侯之師伐陳春秋不書楚人伐陳直書楚人殺陳夏徴舒言徴舒不待兵而可取也繼書楚子入陳言徴舒已死楚猶入陳其志不在徴舒也又繼書納孔寧儀行父于陳言其黨惡崇姦以亂濟亂非真能討賊者也書法較然甚明而諸儒競謂春秋與楚莊以討賊何偏見若是乎齊桓晉文靳靳以明義自見徒以執心不純聖門學者猶羞稱之楚莊乃以亂濟亂者而謂春秋與之以霸無乃辨之有未明乎其後楚靈滅陳與蔡一踵莊之所為仗義以行其大不義祖宗之所為子孫胥而效之以是殞身覆國其所由來者漸矣十有二年春葬陳靈公賊討書葬固春秋所以垂法然亦有不容例觀者陳靈之葬是也靈死逮今二年始以葬書蓋孔寧儀行父為之葬之彼以淫亂見弒今復為淫黨所葬非國人葬之也春秋繼孔寧儀行父之歸而書葬義蓋在此非為賊討而書也楚子圍鄭比歲晉楚爭鄭春秋皆不與也晉不能宗主夏盟恤災救患惟欲小國之從已楚不能削去僭號守禮尊王惟求稱霸於中夏春秋實交責之而責楚為甚故數歲以來楚用師於陳鄭宋春秋一以楚子書志楚莊負恃才智窮兵日夜不息目其身而責之非爵也是役也左傳謂楚克鄭入之鄭伯肉袒牽羊以逆楚莊退三十里而與之盟蓋晉師已起楚聞之而亟去非得鄭而不取也夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績論者謂邲之敗春秋遂與楚以霸愚竊以為不然也春秋固責晉矣而未嘗與楚也是役也晉出師救鄭而春秋書晉荀林父帥師及楚戰不以救鄭書以其緩不及事鄭既屈服於楚無救鄭之實故不與之以救鄭之名蓋責晉也非與楚也晉前此救鄭及陳僅出偏師實無戰楚之心今也諸侯卿皆行兵勢甚壯而林父逗撓不進惟譽楚之强盛倡衆退師於是諸卿之在行者皆無戰情兵未交而氣已索其稍知自奮者先縠一人耳傳所載先縠之語辭直而氣壯國之良也羣帥嫉之此外魏錡趙旃鼓勇欲戰亦謂其以求卿不得怒而欲敗晉師此皆林父及諸欲遁者疾之而加之以罪左傳紀之後人信之變亂曲直甚矣春秋正林父失律之誅書荀林父及楚戰于邲晉師敗績責林父也非與楚也召陵之師城濮之戰齊桓晉文躬擐甲胄為諸侯先是以克濟有功晉自靈成迄景童騃無知仰成羣下日底於削今楚子自將圍鄭而晉僅以諸卿當之諸卿復人自為謀不相統一欲戰者二三欲遁者六七以此衆戰烏得不敗春秋責晉諸卿之不忠所事是以書法特峻夫豈以晉一敗之故遂與楚以霸乎齊桓存三亡國義士猶或非之況僭王之楚可使之遂霸中夏乎止齊名儒立論如此恐為後人之惑不得不辨秋七月冬十有二月戊寅楚子滅蕭蕭宋之附庸也楚莊入陳圍鄭敗晉于邲窮兵力以威上國志得而驕睥睨於宋故滅蕭以動之自是宋始多事易子析骸之禍權輿於此春秋之書之不惟罪楚亦以憂中國晉人宋人衛人曹人同盟于清丘幽之同盟內外小大翕然來同齊霸之方興也新城之同盟諸侯之散者復合晉霸之漸衰也清丘之同盟異者衆而同者鮮晉不復可言霸矣而春秋於四國之為此盟猶以同盟書嘉其不以勝負而為從違舍燎原强盛之楚從喪敗方新之晉是故猶許之以同盟然視於幽之同盟則不可同日語矣宋師伐陳衛人救陳伐人者多不為春秋所與此之伐春秋無譏救人者多為春秋所尚此之救春秋有貶蓋宋伐陳義之所得為也前日楚子滅蕭滅宋之附庸也今宋人出師伐陳亦伐楚之與國何為而不可衛之救陳以晉師新敗謀自結於楚非知義之當救而救之也胡氏謂陳有弒君之亂宋不能討而楚討之既縣陳而復封之其德於楚而不二未足多責宋不能內自省德遽以大衆伐之非義舉也衛以救書者見宋師之非義陳為可恤也愚竊以為未然楚挾仗義之名以行其大不義用詐入陳幾欲亡人之國春秋不與也宋先代之後乃心中國出師伐楚之與國為人所難謂之非義不可衛甫受盟于清丘乃救陳以求媚於楚謂其救之為義亦不可也春秋之義在於攘楚胡氏以楚莊縣陳為討賊主張太過似據正而實不然前既備論復於此而窮其說十有三年春齊師伐莒公羊作伐衛夏楚子伐宋或曰楚子伐宋義乎否乎春秋與之乎否邪曰春秋不與也蓋宋可伐也而楚之伐之則自為其私也宋鮑弒其君而篡國逮今十有餘年獨鄭人與之為大棘之戰稍能治其篡弒之罪楚不能親用師於宋也去年冬忽鼓其入鄭之餘勇滅宋附庸欲以威示宋人使之從已宋不為動兹遂以兵伐宋左右望而罔市利齊晉桓文有不為也春秋自數歲以來楚有侵伐一以子書不但正其始封之名亦以著楚莊黷於用武當服善戰之刑孰云其為爵乎秋螽公羊作􅏑冬晉殺其大夫先縠榖梁作榖邲之敗荀林父身為主帥逗撓畏怯甫及河即議退師士㑹而次莫不皆為避楚自全之計獨先縠毅然請戰曰成師以出聞敵强而退非夫也又曰由我失霸不如死忠憤激壯惟敵是求而諸帥黨於荀氏惟恐退之不速坐是故敗林父當服上刑先縠不惟無罪猶可奬也蓋退師者衆人之所欲進戰者衆人之所忌故逗撓畏怯者得無事而忠憤激壯者反受戮由晉景昏庸不君以致用刑舛錯晉自是愈不競矣春秋稱國以殺而不去其官著先縠之無罪也胡氏乃謂先縠違命元帥不能用刑以此致敗此以左傳之浮辭而為春秋之豫奪愚竊未敢謂然也自先縠死晉大夫各為其私計莫有身任國事者晉坐是日削讀春秋者試以是觀十有四年春衛殺其大夫孔達據傳孔達自以其身紓衛國之患非衛人殺之也春秋書衛殺孔達著其有罪也孔達為政於衛不能輔其君以從中國而背清丘之盟救陳以諂楚謂之無罪不可也夏五月壬申曹伯夀卒晉侯伐鄭邲之役楚莊身履戎行晉景畏懦不出諸卿自荀林父以下望風震怖是以取敗晉人知之此行勸其君自將伐鄭以示其整雖無能有為逡巡引退而春秋猶書晉侯伐鄭嘉其稍能自强庶幾復振之耳嗟夫自晉襄之殁靈以汰而殞身成以庸而失霸景以暗而致敗晉非前日之晉矣而春秋猶拳拳於晉不欲事楚之遂霸中國故於清丘之盟則書同盟此行伐鄭晉以爵書為中國喜也論者以春秋霸楚蓋考之未精耳秋九月楚子圍宋併見下宋人及楚人平葬曹文公冬公孫歸父㑹齊侯于榖歸父襄仲之子也厥父外交强齊弒君專國罪大而莫之討雖於魯宣有援立之恩而人臣外交强國漸不可長亦魯宣之所宜以戒者也前使之㑹齊人伐莒今復使之㑹齊侯于榖賊臣孽子世濟其姦推是以往將何所不為春秋書歸父㑹齊侯繼書歸父㑹楚子比事而書深著履霜之戒非謂大夫伉諸侯而書也十有五年春公孫歸父㑹楚子于宋或曰魯公始盟楚于齊春秋為之諱及盟于宋不盡諱也今歸父㑹楚于宋不復為公諱何歟曰始而盟魯人猶或恥之為之諱所以存其羞惡之心至於再至於三魯人不復以事楚為恥直書其事不加貶斥而義存於其間矣楚自伐宋於魯本無所預而魯人震悸若禍之已至正由宣公以篡弒得國十有五年未有能討之者今見楚人戮陳夏徴舒懼而往㑹將以逭弒君之討此必公孫歸父為之謀也彼為襄仲之子故內自慊而為此傳者以為仲孫蔑所請恐非夏五月宋人及楚人平春秋於晉楚盛衰之際書法極為謹嚴諸儒解說雖多愚以為未盡得聖人意也自齊桓之殁荆楚之兵始橫行於天下當時與之立敵者一宋襄而已春秋序宋公於楚子之上深與宋襄能以攘楚為己任不以其見執於晉楚遂棄之而弗録也今也晉政日衰又敗于邲威望日損與齊桓殁時事有相類者宋文乃能於此時抗楚而即晉不改其平日楚滅我附庸吾則伐其與國楚過我而不假道吾則戮其使人毅然特立有宋襄之風楚莊以是伐而圍之勢雖危迫猶不肯為城下之盟春秋是以嘉之書曰宋人及楚人平貴宋也著宋之義足以敵楚之强也論者惑於公羊之說以為子反華元私以兩國情實相告而罷兵此齊東之語必無是事左傳所記者乃其實也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸公羊傳例曰滅者亡國之善辭上下之同力為當時諸侯强暴侵陵滅無罪之國者言也若赤狄為肆侵略患芟而夷之亦義之所不容巳者滅例不為此輩設也武王之有天下滅國五十皆紂黨之為人害者而況潞氏之輩日以肆為侵暴為事嘗滅我列國諸侯矣今中國諸侯討而滅之愚以為春秋無譏也胡文定乃謂赤狄未嘗侵犯晉境非門庭之寇而恃强暴以滅之不仁甚矣以為春秋責晉其不然歟狄之侵暴中國抑亦久矣自齊桓之霸狄已强盛桓公之憂在楚欲治之而未皇也自是以來狄楚交為中國患至宣公之世赤狄始見經傳所書齊楚晉皆嘗被其侵擾晉景之姊有為潞子夫人者其臣酆舒殺之强暴可以想見晉之伐之亦有不容巳者陸渾無罪而滅胡氏以為春秋録楚之有功赤狄有罪而滅胡氏乃以為春秋責晉之為暴此愚之所未喻也或曰先儒以赤狄為唐叔之後若何曰春秋初年三綱雖淪中國諸侯未有以女嫁同姓國者潞子娶晉景之姊其非唐叔之後歟秦人伐晉王札子殺召伯毛伯杜氏為王子札文之誤王札子者王之昆弟挾王寵作亂專殺大臣春秋之書之譏王室之無政日趨於亂亡也左傳謂王孫蘇與毛召爭政使札子殺毛召則首亂者孫蘇然非札子則無以成其亂非王寵札子而假之以權則札子亦無以為亂故書王札子殺召伯毛伯譏在王也若札子孫蘇之罪不待貶斥而自見秋螽公羊作􅏑義併見下蝝生仲孫蔑㑹齊髙固于無婁公羊作牟婁髙固挾齊侯輔篡之恩娶宣女以為妻魯之大辱而宣不以為辱也今髙固自以其國事而出宣使大夫候之於途諂事外臣而自削其國體春秋書之所以貶初稅畝公羊曰稅畝者何始履畝而稅也古者什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣榖梁曰古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民初稅畝者非公之去公田而履畝十取一也以公之與民為已悉矣此譏井田之法至此始壞也夏后五十而貢一夫受田五十畝每夫計其五畝之入以為貢校數歲之中以為常法之未盡善者也殷人七十而助以六百三十畝為九區每區七十畝中為公田其外八家各授田七十畝但借其力以助耕公田而不復稅其私田此井田之始也孟子謂耕者助而不稅是也周制九百畝為井田八家同井其中為公田一夫授田百畝耕公田十畝餘公田二十畝為廬舍及場圃民出其力以耕公田是之謂藉蓋推廣商家之助法雖曰什一實什一分而取一又輕於商家之助矣井田之制至周而大備助而不稅者也今宣公以篡弒得國旱乾水溢蟲螟之變無歲無之用度不給乃變周家盛時之制履畝而征之是之謂稅夫助而不稅周制所以為善也今以稅易助不計歲之豐凶公田私田所收之多寡立為定數而取焉後之言稅者昉乎此此成王周公之罪人也井田之法自此始壞春秋書以責之冬蝝生宣公六年螽七年大旱十年大水十三年螽十五年又螽自入春秋魯之先公水旱螟蝗未有若此其頻者也用度不足乃復變井田之古法而稅畝焉蝝生之應繼之胡文定曰秋螽未息冬又生子災重及民也髙郵孫氏乃曰蝝者螽之子也春秋之秋夏時之夏春秋之冬夏時之秋螽為災於夏而蝝生於秋一歲而再為災耳孫氏之說惑於周正者也螽為嘉榖之害既見於夏矣乃復遺種於冬將為嗣歲之災故書蝝生為嗣歲耳饑春秋於稅畝之後既書蝝生又書饑以見宣公率意妄行輕變古制上天示異應之以災蝝生自一時而言也饑自一歲而言也公羊以為宣公輕變古制應是而有災故書蝝生范注榖梁乃曰蝝者緣也緣宣公稅畝故生此災以責之意與榖同蝝緣之義鑿螽蝝饑皆變古之應故繼稅畝而書之十有六年春王正月晉人滅赤狄甲氏及留吁晉師滅赤狄潞氏討有罪也既滅之矣而復用師未已是必欲窮極其黨類盡夷滅之而後已夫豈仁人之所忍為故書人以貶之前日楚人圍宋晉坐視不救諉曰鞭長不及馬腹今滅潞氏矣又滅甲氏可己而不巳志存乎逐利而不能赴人之急謂諸侯之從我者何夏成周宣榭公羊作謝火公榖作災公羊曰成周者東周也宣榭者宣宫之榭也何言乎成周宣榭災樂器藏焉爾其說以為宣王廟藏樂器之所宣王有中興之功世世不毁故其廟至此尚存榖梁亦以為藏樂處惟杜元凱得之其說曰榭者講武屋别在洛陽者爾雅無屋曰榭楚語云榭不過講軍實是其證也宣者服䖍以為宣揚威武之處恐未然嘗聞之師宣王㑹諸侯於東都因田獵而選車徒東都洛陽也其講武之處至是猶存乃燬於火聖人傷修車選徒之事不復見於衰世故書公羊曰外災不書此何以書新周也何休因是謂孔子以春秋當新王上黜杞下新周而故宋因天災中興之樂器示周不復興故繫宣榭於成周使若國文黜而新之從為王者後記災也此為公羊之學者造為怪僻之論非經意學者不必惑秋郯伯姬來歸左傳曰出也女生而願為有家故嫁者謂之歸人道之常也見出而曰來歸著其變也內女之嫁必書嫁而不書郯之伯姬與杞之叔姬是也始嫁不書不與之以夫婦之道出者與出之者皆有罪焉耳義見成五年杞叔姬來歸冬大有年義已見桓公三年書有年十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之已未公㑹晉侯衛侯曹伯邾子同盟于斷道同盟春秋之所貴也而晉景清丘斷道兩盟皆以同盟書何哉聖人幸中國之猶能自振喜諸侯不忍遂從於夷特書同盟以褒之既書同盟而五國之君並著其爵貴之也是時楚莊之氣焰大張晉景之孱庸日甚而聖人於清丘斷道之兩盟深致其嘉奬拳拳於望晉而論者不察遽謂春秋與楚以霸其害義豈不甚哉榖梁曰同盟者同外楚也或謂諸侯同欲伐齊非也伐齊之議出於郤克一人之私春秋尚不與其伐豈以是故而與之以同盟乎明年晉侯衛世子臧伐齊諸侯不預有以見斷道之同盟欲外楚春秋是以貴之清丘斷道兩盟皆幸其猶能同也秋公至自㑹冬十有一月壬午公弟叔肸卒榖梁曰公弟叔肸賢之也宣弒而非之也非之胡為而不去曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以是取貴乎春秋愚謂大夫卒而書者以其為大夫而得書也叔肸不為大夫其卒也特見書以其人可書而書也自入春秋母弟氏名登於簡册者率以驕盈致亂惟叔肸以節行見稱卓然榮利之外而不廢親親之恩非學問君子而能之乎十有八年春晉侯衛世子臧伐齊或曰楚方為中國患而晉率衛以伐齊春秋之無貶何哉曰齊自懿惠以來比世再篡怙其强大猖狂妄行漁獵小國其罪亞於强楚莫有能治之者今晉景一旦發憤躬履戎行偕衛人以為此役伐其所當伐也春秋之義强者抑之下者舉之晉景懦無立志自甘於削者也忽興師伐齊亦足以聳諸夏之聽春秋何貶焉公伐杞夏四月秋七月邾人戕鄫子于鄫榖梁作繒邾人當宋襄之世執鄫子用之于社左傳歸罪於宋襄愚竊疑焉嘗辨之於前矣今之邾人復戕鄫子于鄫鄫之受禍烈矣邾之無道甚矣蓋復讎天下之大義鄫之先世殞命次雎子孫偷生苟完無有能以復讎為事者至於今日重遭仇邾之毒彼亦有所侮而動耳昔也戕之于邾臣子欲救之而莫可今戕之于鄫臣子亦復坐視而莫救春秋書邾人戕鄫子于鄫言其空國無人盜賊橫行至於殺其君莫有為之討賊復讎者鄫之臣子皆有罪焉耳甲戌楚子旅榖梁作吕卒莊王也共王立楚非書卒之例此其卒之何卒之以子也前是不卒此而始卒之何為其愈僭而卒之以子也楚自入春秋以來逮今百年武文成穆更起旋仆未有窺周室之心也至楚莊觀兵中原睥睨周鼎挾智任詐欲遂其僭王之夙心故春秋書法至此為之一變方其存也正其始封之名㑹盟征伐一書之曰子抑之也逮其沒也復正其始封之名卒之曰子而不與之以葬亦抑之也抑狂楚之僭名示海內共主在周楚雖盛强欲僭而莫得也論者乃謂春秋進之是以爵之貴之是以終之非知春秋者也公羊謂吳楚不書葬所以避僭王之號得聖人正名之㫖矣或曰楚莊書子如爾所言固春秋所以抑其僭楚莊之功其併不録乎曰春秋所謂功安中國也尊天子也楚莊用兵不戢志在僭王彼所謂功乃彼之功也於中國何有哉於天王何有哉乃若今年伐陳明年伐鄭又明年滅蕭圍宋愚見其為罪而不知其為功也春秋何取焉秦穆藹然賢君尚不得與桓文俱霸而況於楚之不軌者乎公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙公榖作柳遂奔齊文公之殁春秋書公子遂如齊子卒夫人姜氏歸于齊志襄仲敬嬴之弒謀成于齊也今宣公之殁春秋書公孫歸父如晉公薨于路寢歸父還自晉奔齊著宣公之終歸父之逐謀泄於晉也歸父襄仲之子為宣謀去三家以張公室其心雖未可知其事未為不是而謀之不臧乃欲因大國之力鋤而去之豈不思晉之諸卿自趙盾秉權而後怙黨植私漸至不制魯宣欲去强宗夫豈晉卿之所願必有以其謀馳告季氏者歸父未及返命魯宣忽焉告終豈罪之盈而天討及之邪抑謀之泄而為其下所先也季氏不以君薨為戚肆出悖言追仇既往首逐其腹心用事之臣此時此心犯上作亂何所不為春秋於公薨之後繼書歸父奔齊所以著季氏不臣之跡其㫖微矣自兹以降政在强家魯君不復能君禍端亂本實肇於此時彼篡人之國季氏亦竊其國出爾反爾尚復誰尤春秋之書之所以致亂賊之討垂將來之戒云春秋集傳詳說卷十六
