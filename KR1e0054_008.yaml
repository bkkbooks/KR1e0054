body:
  text: 春秋集傳詳説卷八宋家鉉翁撰閔公名開一名啓方莊公子母叔薑以惠王十六年立是嵗齊桓公二十三年元年春王正月不書即位公榖皆以為繼弒君不言即位其説曰親之非父也尊之非君也繼之如君父者受國焉耳此論不為不正然春秋不書即位之意隨事而見不可執一例而求也閔公所以不書即位直以其非嫡非長越次而立是以削其即位非為繼弒而不書也何以言之子般者莊之太子雖非嫡夫人之子而受命於其父其立也未為無所稟般而見弒魯之大臣當以莊公諸子之長者聞於王朝請所以立今也驟扳幼子而授之以國以其為齊之甥奉桓公意而立之其立非正也春秋不書即位端以是故及閔見弒魯大臣復不稟命於王扳僖而授之以國由成風私事季友友乘般啓後先見弒擁僖以為君既非父命亦非王命春秋是以亦削其即位而不書與閔之不書同義及文公之立乃書即位者不惟受命於父王實命之耳文元年王使叔服會僖公葬又使毛伯來錫公命既葬其父復命其子以君魯此受命於王而得立春秋與之以即位者也及成公立八年而後得錫命為其少也故久而後錫其餘雖無王命而以父命得立春秋皆與之以即位惟昭公之立上無王命下無父命而春秋特書即位者是有深意不容以例言也義見昭元年齊人救邢救國義已見莊二十八年救鄭或曰莊二十八年荆伐鄭春秋書公會齊人宋人救鄭今狄伐邢春秋書齊人救邢夫救事之善者也而皆人之春秋其有譏乎曰然春秋之於救也善其救之力而每譏其救之緩前日齊侯率二國救鄭救之緩鄭幾亡今邢有狄難齊能救之春秋所與也而救之不力又春秋所譏也狄在當時雖其類甚繁然非若荆楚之盛強所以敢於憑陵諸夏正以方伯連帥未有能眀義盛兵一大創治之耳自齊桓之興狄宜知所憚而睥睨邢衛將為必取之計桓以偏師具文而往何能使之震讋而逺遁故自是狄蹶邢覆衛肆其禍賊乃已及二國既亡然後為之遷為之城曷若救之於狄患方至之始乎是故春秋譏其救之不力夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑季子來歸案左氏請復季友也齊侯許之使召諸陳公次于郎以待之是時閔公幼諸大夫從國人之望請復之耳木訥謂左氏先書季友奔陳今乃云請于齊而復之為前後相反以為因落姑之盟與季子來歸文相連屬左氏強合之木訥好排左氏而當時事實不容盡廢也蓋閔公之立慶父在齊季友在陳皆無所預實諸大夫奉齊意而立之既又從國人之望請於齊桓而復季友必請於齊桓者以慶父在齊懼其以讒説先入故也季友不得齊桓之召亦安敢遽歸故落姑朝盟而季子暮至此諸大夫從國人之望請於齊而復之何疑木納以為慶父順國人之欲而復之非也閔公之立非慶父哀薑之意故作難於後孰謂慶父而能請復季子乎或曰慶父之入當在何時而齊仲孫之來已有不去慶父魯難未巳之語乎曰經傳不載愚竊意齊桓因季子之歸亦遣慶父自齊還魯並執國政其在此時乎慶父之奔也春秋書之其歸也不書惡其歸也季友之奔也春秋不書其歸也書之喜其歸也是故特書閔公初年齊魯之三大夫皆字而不名季子也仲孫也髙子也此諸侯大夫書字之著者也然不可執此為例冬齊仲孫來公穀皆以仲孫為慶父繫之齊者外之也左氏以為齊遣其大夫來省魯難且具載仲孫與齊桓相酬答之語藹然仁人之言魯國實受其賜是以春秋嘉之字而不名左氏所紀者乃其實也仲孫之來不稱齊使以齊桓本使之因事覘國而非有省難恤鄰之實心是故不以使書而仲孫秉義據正導其君於善以存魯國是故嘉之而不名與季子髙子皆以字書此出於聖人之特筆非因乎舊史者也二年春王正月齊人遷陽齊桓遷邢遷衛義也為其有狄難輔而遷之别擇善地以為之國都霸者之所得為也遷陽事不見於傳以書法而觀亦宋人遷宿之類蓋遷小國以為彼之附庸并兼之異名春秋所惡書以貶之曰降曰遷強其所不欲之辭也或曰許其霸而屢貶之何哉曰責僃賢者之道也夏五月乙酉吉禘于莊公公羊曰言吉者未可以吉也曷為未可以吉未三年也杜氏曰三年喪畢致新死者之主于廟廟之逺主遷入祧廟於是大祭於大廟以審昭穆謂之禘莊公之喪未除時别立廟而吉祭又不於大廟故書以示譏愚謂此一書而再譏者也禘必除喪而後舉行今未除喪而禘故曰吉禘言未可以吉而吉公羊之説是也又禘禮當舉行於太祖廟今禘於莊公將屈太祖羣廟而就莊公以行禮乎則為屈尊從卑悖於禮者也若特禘於莊而不及太祖羣廟烏在其為審禘昭穆乎此又失禮中之失禮春秋所譏其在是矣若夫以諸侯而用天子之禮魯國行之已久春秋至此有不暇譏而聖門平日議論亟言其不可者也禘之為説鄭康成所言與趙伯循不同康成謂天子諸侯皆有禘禮趙伯循引大傳為證則禘非諸侯禮特魯以成王之賜而僭用之耳木訥著論謂禘有二有郊禘之禘有禘祫之禘郊禘直郊天耳王者禘其祖之所自出以其祖配之此謂郊禘非祫禘也禘其祖之所自出以其祖配天也不然禘祫之禘安得配侑之禮哉又曰諸儒不稽禘祫之義謬曰天子則禘諸侯不得用禘諸侯固不得郊禘而禘祫則宗廟之祭天子諸侯同之三年一祫五年一禘常典也若曰諸侯得祫不得禘則諸侯當間廢一祭天子當禘不當祫則天子亦間廢一祭是天子諸侯五年始一祭也此皆木訥之説使木訥别有援據以為之説則可以自異於諸儒其所言亦只本之鄭氏鄭氏每以讖釋經亦未足多據也夫大傳曰不王不禘王者禘其祖之所自出以其祖配之鄭注謂大祭曰禘大祭其先祖所由生謂郊祀天也王者之先祖皆感太微五帝之精以生皆用正嵗之正月郊祭之孝經郊祀后稷以配天配感生帝也此本之讖緯周人木德配靈威仰宗祀文王於眀堂以配上帝配五帝也木訥所謂郊天而禘其祖之所自出以配天者本諸此也此合郊禘而為一者也趙伯循之説則不然其言曰禘王者之大祭王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之虞夏商周皆然而周家則以后稷為始祖推始祖所自出之帝而祀帝嚳以后稷為之配此王者之大祭其説以為鄭氏見祭法所説禘在郊上謂禘為郊之大者故其言如此而不知禘自禘郊自郊禘特用之太廟以尊事其始祖之所自出非郊也郊天禘祖自是二事不得合而為一伯循之論既出而康成之言幾於廢豈木訥猶未見之邪只如眀堂位所言魯用天子禮樂孟春祠帝于郊季夏禘祀周公于太廟郊之與禘固别而言之豈得并指郊禘為祀天之大禮歟此姑置但木訥謂禘祫之禘天子諸侯皆得通用愚意其亦本之鄭氏耳鄭王制注云天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常夏殷禮四時祭有春礿夏禘秋嘗冬蒸周人改之春曰祠夏曰礿以禘為殷祭魯禮三年喪畢而祫于太祖眀年春禘于羣廟自是而後五年而再殷祭一祫一禘此鄭注之見於王制者鄭既以大傳不王不禘者為郊天之祀則宗廟之禘郊天之禘兩禘相混而無别木納之誤亦本諸此耳但謂天子諸侯三年之喪畢合先君之主於祖廟而祭之謂之祫眀年乃禘自是之後五年再殷祭一祫一禘此謂天子諸侯皆有禘祫者因魯禮而言也夫豈周家盛時之禮又如襄十六年穆叔如晉言齊故晉人答以寡君之未禘祀此亦衰世之僭禮魯既僭之而晉亦僭之以為諸侯皆得用禘必非平世之令典不足引為證也若夫不王不禘則禮之大傳乃眀證也喪服小記曰王者禘其祖之所自出所言與大傳同而周頌雍篇乃禘于太祖之樂歌其辭曰相維辟公天子穆穆是豈諸侯祖廟所得而歌乎觀乎雍篇而知禘非諸侯所可僭用魯以成王之賜而用之於周公廟耳謂禘為天子諸侯通用之祭斷斷乎非篤論矣子曰魯之郊禘非禮也周公其衰矣又曰禘自既灌而往吾不欲觀之大率謂魯之郊禘為僭先儒既辨之審矣愚今所言特以木訥之僻論頗為人惑不得不為之辨郊之與禘乃禮中之大節目亦學者所宜講也訥又謂天子七廟諸侯五廟太祖之廟百世不毁而三昭三穆二昭二穆之外則迭毁故其外曰壇曰墠三年一祫則合壇墠之鬼而并祭之故曰祫壇墠之外則有所謂配所自出之帝者如商於契周於后稷是也五年則審禘而祭之故曰禘但所自出之祖惟天子得祭之諸侯不得祭也今魯人以周公為始祖而以文王為所自出之祖蓋僭禮也如使諸侯而皆得用大禘之禮則姬姓之國皆可以祀文王異姓之國皆得以推其所自出之祖而祭之大傳不王不禘者幾為虛語聖人制禮必不若是之無等也論至是諸侯得祫不得禘亦明矣不然别當有諸侯禘祫之禮不僭祀其所自出之帝不歌雍而後可耳餘義見文二年秋八月辛丑公薨閔公之立慶父在齊季友在陳皆無所預實諸大夫奉齊桓意而立之既而季友自陳來歸慶父亦自齊亟返共執國政其弒般之罪猶未暴白於魯國故得無討而慶父怙惡不悛復與哀薑共弒閔公實欲篡有魯國而齊桓不之許且將治其弒君之罪於是皆懼而逃慶父之誅桓公實誅之也季友身為大臣受魯莊託孤之寄子般死不能救閔公死又不能救其志則在於立僖公也初成風聞卜楚丘之繇知季友將世秉魯國之政私事之而屬僖公焉故季友以僖公奔莒聞慶父已逃而後立之季友之報成風厚矣擁僖公忠矣其如莊公託孤之寄何哉嗚呼閔公始立為落姑之會請復季友次于郎以待其歸正以強臣在側懼弗克自全惟季友是依閔卒以弒死季友奉僖公而立之受上賞執政於魯閔公不負季友季友實負閔公悲夫閔不書葬榖梁曰不以討母葬子也義見下九月夫人薑氏孫于邾公子慶父出奔莒案左氏共仲通於哀薑哀薑欲立之閔公之死哀薑與知之故孫于邾齊人取而殺之慶父所以弒二君欲篡國耳君已弒乃與哀薑俱奉身亟逃若不可一朝居者彼非有憚於季友也聞齊桓之怒知必不免是以不敢迹州吁無知之轍遽爾出奔不然彼忍於弒二君何憚而不為篡乎齊桓之伸霸討自入春秋以來始見耳是故聖人豫之嗟夫薑氏於慶父君夫人也嫂也慶父於薑氏臣也叔也始由嫌疑之不謹馴致亂倫犯分手弒二君謀篡不遂君母與公子俱逃魯大亂國幾亡夫豈一朝一夕之故哉或曰般閔之弒賊皆討矣而春秋不正其弒君之罪何哉曰此哀薑慶父之所為也在哀薑為以母戕子在慶父為以臣弒君將以慶父為戮乎將歸獄哀薑乎此舊史所以不容直正其事而惟以公薨書至聖人修春秋於公薨之下書夫人薑氏孫于邾公子慶父出奔莒而哀薑慶父之罪始無以自隱矣此春秋書法用之於魯者也非舊史書之聖人為之諱之也胡氏引父攘子證為喻以為春秋為魯國諱弒君且有及於五服相容隱之事愚細思其説實未可通蓋攘羊者公子翬慶父襄仲之徒而證羊者魯人也史臣則有司治攘羊之盜者而非子證其父也若公子翬慶父襄仲之子為吏臣而書其父之罪乃得為證攘羊矣春秋為魯國誅討亂賊而以為暴揚國惡必無是理也此其義甚眀不待智者而後識冬齊髙子來盟公羊曰齊大夫也何以不稱使我無君也何以不名喜之也莊公薨子般弒閔公又弒比三君死曠年無君設以齊取魯不興師徒以言而已矣桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門至於爭門者是也或曰自爭門至於吏門者是也魯人至今以為美談曰猶望髙子也或曰自魯國有難齊使再至於魯仲孫之來月齊仲孫來髙子來曰齊髙子來盟皆不以使書若二子自至云者何哉曰此春秋所以録二子亦以著桓公不吝改過而大夫之出疆者皆能納君於善也始仲孫之來桓公因使之覘國而仲孫之歸也以魯秉周禮為對不惟存魯於亡又能納君於善而非使事之指也及髙子來盟率甲與俱至人疑其將不利於魯而髙子立僖公而盟之又以其甲城魯魯於是始定而亦非使事之指也然齊桓不以失指為怒反因是而伸哀薑之討即慶父於戮有以見桓公善用人樂從諫始而覘魯卒而存魯利欲不足以蝕其本心霸之猶有德者也然二子之來不以使書而稱字以貴之貴其能納君於善不愧大夫出疆之義也或曰二子不以使書桓公其無貶乎曰始者因人之亂而窺覘其國公之本心固不能純乎義春秋寧無譏卒而因二子之言以鎮定魯國返之於義又聖門所許自是而往無譏也十有二月狄入衛狄侵邢桓公用管子之諫出師以極之春秋屢書救邢善其救也狄伐衛齊不能救衛遂亡比事而觀愚以為春秋有譏于桓也或曰力之不足奈之何哉曰桓能逺伐山戎而不能近禦狄非其力之不足也桓有憾於衛所以救之者不能如邢故耳雖然衛大國也每不出諸侯下今也狄一攻之遂亡由大本不立亡形先見其來非一日矣詩於邶風而存新臺乘舟等篇於鄘風而列牆茨鶉奔之刺繼之以定之方中狄滅衛宗社為墟而營新國焉龜山楊氏推原衛國禍亂之所從始以為肇於晉而成於朔其禮先亡而國隨之矣義又見救邢城邢鄭棄其師此鄭人禦狄之師也禦狄國之重事用其平日所信所重之人猶恐弗克勝任今乃取其素所惡欲逺之而不能者而使之禦狄是棄其師也匪惟棄其師抑棄其國也左傳與鄭風清人序所載略同此鄭文公與公子素之所為春秋書鄭棄其師不責髙克而責鄭君與其用事之臣以髙克為不足責也春秋集傳詳説卷八
