body:
  text: 春秋集傳詳說卷一宋家鉉翁撰隱公上名息姑惠公之子母聲子惠公繼室以周平王四十九年立元年元年者因魯史之舊文也或曰諸侯紀元古與曰非古也人君即位之始年書元年天子事也故曰體元以居正諸侯人臣也受命於天子以君其國居位之年可一二數而不可以稱元年也王道衰而諸侯國自為元諸侯之僭也曰春秋書元年其與魯以紀元乎曰不與也夫子魯人因魯史而修春秋不存魯之元年無以紀事非為魯得紀元而為之書元年也故下文即書王正月以正之正朔必自王者出諸侯人臣必無紀元之理其著義甚明也為公羊之學者亦知惟王者然後改年立號但不當為黜周王魯之說怪誕不經學者不必為之惑可也詳著其義於綱領明五始春王正月春者何夏正之寅卯辰也正月者何建寅之月也王正月者何著百王不易之正在此建寅之月也前此作史者未有書年書時而繫之以正月者至夫子修春秋年之下繫之以春春之下繫之以王正月夫子所以行夏之時也顔淵問為邦夫子告之以行夏之時乘殷之輅服周之冕樂則韶舞行夏之時聖人平日之志三千之徒惟顔子得聞其義及晚年修春秋以夏時冠篇首垂百王不刋之典以示天下後世聖人之意若曰嵗必首寅以為春春必首寅以為正春在是正在是而後為正也左傳不達此㫖釋之曰周王正月自是以來孔鄭說經皆承此之誤汨亂四時變易冬夏至謂子丑寅為春建子為正月左傳誤於前鄭孔誤於後杜元凱注左傳又承此二誤既不能改復撰為長厯以證之失聖人行夏時之本㫖矣愚嘗考案詩書易二禮凡言春者皆寅卯辰也凡言正月者皆夏正正月也商周之嵗首雖用子丑而四時十二月次無不同也左傳雖誤釋王正為周正然傳所紀載從夏正者八九從周正者一二以是知周人四時十二月次皆從夏正其建子為嵗首者特以為發號施令之旦天時不可得而紊也分至啓閉不可得而汨也此不待智者而後知也而況春秋王者之事當因而因當革而革斷自聖心垂法於後其行夏時者特王法之一事耳蓋自羲皇繼天立極因天道之循環定一嵗為春夏秋冬因日月之交㑹定四時為十有二月建寅為春首建丑為冬終乃天地自然之理非聖人自以己意為之區别也自是以來厯幾千萬年迄堯舜禹皆同此四時十二月次所謂百王不易之正也商革夏而建丑周革商而建子不過以是為嵗首而新民之視聽非所謂正月也或曰如五經證據周人既知夏時之為正胡不革嵗首從夏時而於正月之外復立以嵗首何哉曰周禮之經月令之篇先儒皆以為周公遺書中遭流言之變未及施用於天下其間命官布政大率皆用夏時有以見周公之心即夫子之心夫子之春秋即周公之行事前聖後聖其揆一耳使周公之經而得施用於當時則夏時之行已久有不待春秋為之革之矣或者重難余曰子謂春秋行夏之時是固以其理而言耳今以厯術泝而上之至於春秋之世其得合乎曰凡治厯者莫不遷就以求其合得諸此或遺諸彼合於前則舛於後杜元凱撰長厯改變閏法以求合周正有七十餘月而置一閏者猶不得合則以經誤為言學者窮經惟理是從厯法有不必泥也或又引近代儒先夏時冠周月之說以為春秋冠周月以夏時之意但夏時周月有不得並存也時夏時則寅卯辰為春月周月則子為嵗首時自時月自月不相為謀聖人行夏時之意果若是乎經有時之下無月而繫之以事者以為夏時乎以為周月乎此則窒而未通者也春秋本行夏時似不必他為之說學者知五經之明證而左孔鄭杜不足為之惑夏正可坐判矣只如秦人事不師古先王法制掃地殆盡然於四時十二月次猶循其舊史記秦紀年之下繫之以冬十月而春正乃在一嵗中彼建亥為嵗首而四時十二月次皆從夏時而不敢改也蔡氏書傳辨此一節極為精詳其言曰秦建亥矣而史記始皇三十一年十二月更名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也至三十七年書十月癸丑始皇出逰十一月行至雲夢繼書七月丙寅始皇死九月葬先書十月十一月繼書七月九月知其以十月為嵗首而寅月起數未嘗改也漢初史氏猶仍其舊書元年冬十月皆嵗首改而月數不改之明證傳者乃謂周家變易四時十二月次以建子為春正月由考之未精為異說所惑焉耳其詳具見綱領公不書即位春秋十二公或書即位或不書即位出於聖人之特筆所以垂法後世義各不同隱公不書即位惟榖梁得聖人之意左氏所紀亦事之實也榖之說曰公何以不書即位成公志也言君之不敢為公將以讓桓也讓桓正乎曰不正不正而成之何也將以惡桓也隱將讓而桓弒之則桓惡矣桓弒而隱讓則隱善矣善則其不正何孝子揚父之美不揚父之惡先君之欲與桓非正也邪也既勝其邪心以與隱矣已探先君之邪志欲以與桓則是成父之惡也兄弟天倫也為子受之父為諸侯受之君已廢天倫而忘君父以行小惠曰小道也若隱者可謂輕千乘之國蹈道則未也愚謂此春秋垂世之法榖梁子得之孔門髙弟述之為傳千古一大條貫也案魯惠公元妃無嫡子繼室以聲子生隱公在禮諸侯內職具備后夫人亡嬪御以次攝治內事不得再娶聲子攝內主者也仲子以禎祥之故歸於魯非夫人非繼室與衆妾何以異若以先後為崇卑則聲子實貴於仲子隱公聲子之子也長且賢桓公仲子之子尚幼隱當立奚疑意惠公早年立隱之志已定及至莫年溺於私愛有意屬桓榖梁子所謂邪志之未形者也使惠公果若廢長立幼必託之大臣如晉獻之欲立奚齊謀之鄰國如齊桓之欲立孝公而隱公亦將見屏於外矣今咸無焉則榖梁所謂既勝其邪心以與隱者是也位乃隱公之位何嫌何疑乃欲為此讓今日而考仲子之宫明日使營菟裘務為矯激之行反以啓賊臣悖弟之姦春秋所不與也故不書即位以正之亦以明公欲讓之志榖梁子所謂成公志者是也雖成公志不與公以讓也非謂父欲與桓而隱之立不當而貶也左氏謂惠公元妃孟子卒繼室以聲子生隱公則聲子為繼室攝主內事而隱公於序為長當立者也又曰仲子以手文為異曰為魯夫人則非惠公立之以為夫人也又曰生桓公而惠公薨隱公立而奉之則奉之欲以為君者隱公也而非惠公立桓以為太子左氏所紀皆得其實但謂隱為攝則非耳夫堯老而舜攝攝者為君之漸也周公位冢宰相成王踐阼而治非攝也未聞君位而可以攝言也蓋隱公志在乎讓亦猶宋宣公不傳之子而傳之弟是所謂讓而非攝也未聞既居君位而可退就臣位者也公羊則曰桓幼而貴隱長而卑立子以貴不以長又曰子以母貴母以子貴流傳之誤衰世弊俗有欲立嬖妾子為君必曰子以母貴尊妾母為夫人必曰母以子貴往往以公羊藉口其誤後學為甚此則三傳之得失而榖梁之義無以加矣或曰胡氏從伊川之說謂隱公內不承國於先君上不稟命於天王諸大夫扳已立而遂立故春秋絀焉不書即位今子從榖梁之義無乃與胡氏背馳乎曰上不稟命於王春秋諸侯固皆然矣若隱公者乃讓國之賢君非有心於得國者使無父命彼肯冒然以君位自居乎善乎榖梁之言曰已探先君之邪志欲以讓桓則所謂立桓者乃惠公未形之邪志未嘗以此屬之大臣託之鄰國曰當以允為嗣魯之社稷桓焉得而有之隱探厥父未形之志欲以讓桓是所謂矯激之行夫豈與春秋諸侯乘時竊位者同日而語謂之內無所承上不稟命非所以加於讓國之君也聖人存心忠厚而況魯之先君有善可書而貶黜同於衆人必無是也義又見昭公元年書即位三月公及邾儀父盟于蔑內盟之始此春秋書盟之始事也榖梁子曰誥誓不及五帝盟詛不及三王交質不及二伯春秋不與諸侯之相為盟也論者引周禮秋官司盟掌盟載之法天官玉府夏官戎右及曲禮涖牲曰盟者以為證反以榖梁為迂愚謂當周道之盛明推至誠以相及未施信而人信之何至引鬼神要盟詛而後足以蘄人之信盟詛必非文武成康盛時事縱或有之亦在周道之既衰諸侯不睦而後有盟盟于王庭且不可而況諸侯自為盟者乎周禮後出以為周公之書而其制度典章與五經孟子所言不同先儒固謂書成而未及施用於天下者也要之二禮之書雖皆帝王成法聖賢格言然不免雜以漢儒附益釋經者所宜謹擇如盟詛之事斷斷乎其非古無可疑矣然春秋之盟有二有公天下而為之盟者有私一國而為之盟者齊桓晉文合諸侯奬王室是雖衰世之事聖人猶或與之為其近於公也若春秋初年諸侯自相為盟各為其私計則春秋之所惡于蔑以後于蔇以前皆盟之私者甚而黨篡朋凶怙惡濟虐復要鬼神以為之盟誓是謂天地神明而可以邪辭干也此盟之尤無忌憚者也公及邾儀父盟于蔑譏也不惟譏盟譏其始即位而為此盟也國君繼世之初上而尊天子下而交四鄰撫百姓豈無他事隱公即位之初惟此為先務春秋之書之示非所宜先也春秋常事不書細故不書必有所關係而後書以後皆準此魯君以侯爵而書公論者以為因其僭爵愚以為公者諸侯在國之通稱亦猶大夫之稱子非爵也何以言之周家盛時齊魯諸大國固有稱公者齊之丁公乙公癸公魯之考公幽公煬公皆生以為名殁以繫諡不自東遷始矣若魯侯僭爵稱公春秋必將為之正名必不仍其僭遂以公書之也自是五等諸侯殁而皆稱公者因其存時在國之通稱而繫之以諡也亦猶大夫之有文子武子懿子宣子簡子之類皆以諡繫子夫豈僣爵而稱子乎愚以子非子男之子而知公非公侯之公耳及字之義榖梁曰內為志也公羊曰㑹及暨皆與也及我欲之暨不得已也愚謂及字之義所施不同春秋有以尊及卑之及此及邾儀父盟與及莒人盟于浮來之類是也有兩尊者相為及公及齊侯盟于落姑是也有兩微者之及及宋人盟于宿是也有强國之大夫以卑伉尊而為及者及髙傒盟及陽處父盟是也要當隨事而觀以求聖人之意公榖一斷之曰內為志我所欲則拘矣魯望國也何求於附庸小國今即位之始及儀父為盟必非魯有求於邾此儀父願自附於魯或修先君之好而求為此盟耳推是以觀其他可以類見必以例拘恐失聖人褒貶之意書名書字傳者皆以為褒貶所關而名之與字實有不容不辨者及儀父盟傳者曰書字所以褒也儀父在當時初不見其可褒之善或曰附庸之君未得列於諸侯故稱字以為别蕭叔朝公是其例也然莊五年郳犂來來朝亦附庸也而傳乃以為書名郳之與邾同所自出均為附庸其後皆以預齊桓㑹盟之故得封為子邾與小邾是也儀父以書字之故說者謂春秋褒之犁來以書名之故說者謂春秋貶之儀父無可褒之善犁來無可貶之惡大率書父書仲書叔即以為字否則皆以為名因字而求褒因名而求貶此說經之一大弊也然亦有名字顯然見之經傳如公子友之歸髙傒仲孫湫之來春秋書季子髙子仲孫云者則褒之僅見者也若夫冢宰以名書則貶之僅見者也不可以此律春秋之常法各辨於後綱領中已著此義今復隨事見之盟不于國中而必以其地者兩相下之義也意周家中世以後有盟於王庭之禮其後愈衰諸侯自相為盟各去其國都而為㑹盟莫適相下故也逮桓文之興其權力雖足以號召諸侯然不敢盟於國都而必以其地者懼其擬於王故耳夏五月鄭伯克段于鄢榖梁曰段者鄭伯弟也殺世子母弟目君以其目君知其為弟也段弟也而弗謂弟公子也而弗謂公子貶之也段失子弟之道賤段而甚鄭伯也甚鄭伯之處心積慮存乎殺也于鄢逺也猶曰取之其母之懷中而殺之云爾甚之也然則為鄭伯者其奈何緩追逸賊親親之道也公羊曰克之者何殺之也殺之則曷為謂之克大鄭伯之惡也左氏曰段不弟故不言弟如二君故曰克愚謂榖梁之說忠厚惻怛處人道之變者不可廢也然三傳公榖以為鄭伯實殺其弟故責鄭伯也重左氏謂叔段出奔而未死故責鄭伯也輕以愚觀之段實未死彼專責鄭莊而恕段者非通論也春秋二百年國君以母弟故而召亂者多矣見於始年則晉文侯之弟成師及鄭莊之弟叔段是也成師挾父之愛以陵其兄劫其兄之子而受封於曲沃曲沃浸以盛强晉國浸以微弱昭孝哀三立而三見弒至於武公遂篡有晉國禍亦烈矣段之京猶成師之曲沃武公篡弒之禍不旋踵而作矣春秋書鄭伯克段于鄢蓋交責之去公子所以誅段目君所以貶鄭伯愚觀曲沃之篡而知鄭莊克段亦有不容己者蜀人木訥趙君春秋說有曰鄭莊及叔段均為名教之罪人而段為重論者皆甚鄭伯而恕段段何可恕乎君雖不君臣不可以不臣父雖不父子不可以不子兄雖不兄弟可以悖逆耶豫段之說本於序詩者之誤後學叔于田大叔于田之辭皆刺段也而序詩者乃曰刺莊也是兄不可以不兄弟可以不弟也聖人責臣之過常重責君之過常輕非苟加輕重也長幼之分也尊卑之義也分義定而天下定吾不信鄭伯之罪重於其弟木訥此論頗得經意故備録之或曰胡氏推衍伊川之意以為鄭莊內忌叔段故與之大邑縱使叛逆失道然後討之春秋推見至隱故首誅鄭莊之意如子之言訥之說其與胡氏異乎曰春秋之用法亦平其心而已矣方鄭莊封叔段于京以其母故耳請制弗與請京而後與之此時此心亦豈有殺弟之意而曰與之大邑縱使失道以至於叛然後以叛逆之罪討之無乃失當時之事實乎据傳叔段得京之後收二以為已邑繕甲兵且將襲鄭夫然後不得不討莊不克段段則克莊彼成師之封於曲沃亦豈晉侯有以稔其惡而甚其罪積習之漸遂至於此耶善讀春秋者觀聖人用法之心罪未形而曰春秋推見至隱首誅其意此秦所以毒天下而謂聖人為之乎胡氏解經多有此病讀者謹之或曰如子所言鄭莊其無過乎曰君人者制與奪者也與奪在我而使人得以請之請之而遂與之則將何所不至矣曰姜氏欲之不與則傷慈母之心則將若何曰否鄭莊始也從母之命封段于京彼以是為孝卒之以段之故誓母於潁曰不及黃泉無相見也孝安在哉使鄭莊於請制請京之時裁之以義諭之以禮感之以誠豫其所當豫勿豫其所不可豫則段不至於逆公不煩於討而鄭無事矣吁惟知孝弟之道者而後可語之以此愚於鄭莊何責餘義見隱七年齊侯使其弟年來聘襄三十年天王殺其弟佞夫秋七月天王使宰咺來歸惠公仲子之賵或曰君之為天義見於經其來逺矣而前乎此未有以天子為天王者春秋之始稱之何與曰天之為天人皆知其尊而無二上也君之擬乎天人皆知其尊而無二上也惟夫有擬乎君者而後天之名始立周之盛時外薄四海以迄於遐方殊俗知有王而已矣至於衰世乃有蠻荆而僭王號者焉乃有諸侯而僭王章者焉春秋首明大分以天加於王示天下所共主而其尊不可以上此春秋正名之先務也然亦因以寓褒貶焉故書天所以明分去天亦所以示貶此以天王之尊下賵藩妾貶也何以猶書天乎曰春秋之義君有過先責其宰名咺所以責也宰為王下賵責宰所以責王也使而非宰則其責乃在王矣周官有大宰小宰宰夫三傳不抗言何宰至劉氏而其論始定劉氏意林謂春秋於大夫莫書其官至冢宰則書之以此見任之最重宰天下者莫名今而名以此見責之最備胡氏曰王朝公卿書官大夫書字上士中士書名下士書人咺位六卿之長而名之何也天王紀法之宗也六卿紀法之守也議紀法而修諸朝廷之上則與聞其謀頒紀法而行諸邦國之間則專掌其事而承命以賵諸侯之妾是壞法亂紀自王朝始也春秋重嫡妾之分故特貶而書名以見宰之非宰矣仲子者惠公之妾桓公之母也榖梁以仲子為惠公之母孝公之妾非也隱將讓桓母為惠公之嫡室而赴於周致天王為之遣使下賵春秋書以譏之譏周也亦責隱也隱以夫人赴於周周以夫人之禮賵於魯而春秋書曰惠公仲子不與仲子以僭夫人之稱也或曰春秋不與仲子以僭夫人而與成風以僭夫人何耶曰僖公尊其妾母成風為夫人隱公尊公子允之母為夫人其事異也聖人亦非謂成風可以配先君妾母可以為夫人蓋以僖公夫人之文公以夫人卒葬之夫子於魯先君之母不容黜其僭號是以因舊文而書曰夫人及秦人歸禭則仍書成風以正之此春秋書法用之於魯不得不然者也或曰成風之卒之葬王使榮叔歸含且賵使召伯來㑹葬榮叔召伯何以無貶曰榮召非冢宰之官六卿之長其責視咺為輕王不稱天則榮召之貶從可知謂之無貶不可也或曰此隱元年春秋之始年也見之書法者數事而已是嵗魯乃諸侯之國豈無他事而春秋所録僅止此何與曰録其可以垂訓於後者耳於克段著人道之變明兄弟之義於賵妾垂正家之法明嫡妾之分於祭伯來謹內外之辨而元年正月之下即書及邾為盟譏非初政所宜先惡當時諸侯之汲汲為盟耳推是而觀書法之詳略可得而知彼謂春秋為斷爛朝報者惟不知此義故耳九月及宋人盟于宿盟義己見今年三月榖梁曰及者何內卑者也宋人外卑者也意林以為此公及宋人盟不書公恥公之及宋人盟也愚謂公及强國之大夫盟則諱不書及晉處父盟之類是也罪在晉故為公諱公及小國之大夫為盟則不諱公及莒人盟于浮來之類是也事在魯故不為公諱宋雖非弱小之國而亦非如晉人挾其强大俾其臣盟魯君以屈辱之者也案左氏惠公之季年敗宋師于黃公立而求成盟于宿魯欲之也稱及稱人兩微者之為盟也或曰兩微者之為盟春秋不書此何以書曰譏也春秋始年世道雖降然尤重先君之怨不肯輕於相下甚者尋兵於易世之後尋兵者固非而乞盟於怨國者亦非也隱公父喪未終而乞盟於先君之怨國寧免忘親之嫌我欲盟而彼僅使其微者至則無盟可也及之盟是以譏則將何如曰息民保境無為戎先國君繼世之先務也何以盟為冬十有二月祭伯來公羊曰來奔也曷為不言奔王者無外言奔則有外之辭也榖梁曰來朝也寰內諸侯非有天子之命不得出㑹諸侯不正其外交故弗與其來朝也祭伯周之卿士不稟王命而自以其私至於魯書祭伯來惡其外交也公羊云王者無外榖梁云人臣無外交皆春秋經世之法三代而下有國有家者得知此義實自公榖發之伊川謂天下有道諸侯順軌豈有內外之限不以王臣無外交之說為然愚謂當春秋之世天子微弱諸侯盛强諸侯微弱大夫盛强其外交者皆擇利而趨植黨以抗其君是故特著此法以為之間其可廢乎祭國也伯爵也榖梁以為寰內諸侯諸說皆從之黎氏淳謂王臣惟三公稱爵非如外諸侯有公侯伯子男之列五等也故定四年劉卷卒不書子以為祭伯單伯劉子單子之類皆以字書而非爵愚謂禮天子縣內諸侯祿也外諸侯嗣也寰內之有諸侯非獨榖梁言之劉文公卷相周室有大功蓋周之宰相也天子三公卒而以名書非例也杜氏謂天王為之告故名而不爵愚竊疑劉字之下缺一子字祭伯單伯劉子之類皆內諸侯爵然食采而已非若外諸侯之有封國子孫得以襲也公子益師卒春秋之義天子諸侯內卿大夫崩薨卒皆書示尊卑貴賤莫不有終也然而或日或不日舊史記載之有詳略而非褒貶所係左氏以為公不與小斂故不書日公不與小斂而日者公孫敖叔婼叔詣公孫嬰齊是也榖梁以書日為正不書日為惡有罪惡顯著而日卒之者公孫敖公子牙仲遂季孫意如是也惟公羊之說近之曰何以不日逺也所見異辭所聞異辭所傳聞異辭本謂愈逺則不得其詳故有所見所聞所傳聞之異而何氏乃以為恩有厚薄義有淺深辭有詳略則拘矣聖人作經垂王法於後代魯子孫之於父祖曽髙恩固有厚薄而春秋筆削公天下不為此而厚薄也然所見異辭所聞異辭所傳聞異辭不特卿佐之卒為然事在春秋初年者與中年不同事在春秋中年者與末年不同以是而求庶乎近之矣或曰卿佐之卒不書其官而惟書公子公孫何耶曰孫泰山以為惡世卿者是也古者諸侯之卿大夫博選賢能請於天子而命之周室衰微此制遂廢魯之叔仲季臧皆公族也春秋不書其官而惟書公子公孫者譏也外之世卿何以無譏曰外之為卿者猶有他姓間厠其間惟魯純公族故直書公子公孫以寓戒焉耳二年春榖梁曰隱十年無正隱不自正也元年有正所以正隱也木訥不然其說愚謂元年書正而不著其事欲見隱公所以不書即位之意二年至十一年無正恐當如榖梁之說不然何以十年皆不書正月乎公㑹戎于潛此春秋列戎于㑹之始事也書戎以號舉示不得與列國諸侯均敵也書公㑹戎譏隱公以望國之君與戎特㑹非所當㑹而㑹也國君即位之次年不聞朝京請命受服兄弟甥舅之國亦未得交相見而以㑹戎為首務又春秋之譏也春秋凡書魯事皆備載其實不加貶斥而義自見者此類是也或曰禹貢五服之要荒周官九服之有蠻夷鎮蕃所以辨內外也而春秋之世四裔之人錯居九州之內民皆王民土皆王土其君長皆王臣也而外之同於殊俗可乎曰此正春秋所以辨內外也中國者禮樂政教法度之所從出乃有外王而僭號肆亂者錯居於侯服之內故自周公以來懲荆舒斥徐戎截淮浦不使之得以僭號肆亂其為後世之慮深矣逮至春秋之世魯比於戎晉鄰於戎齊旅於戎彚連族興日以强盛考其派系之所從來有姜姓之戎姬姓之戎甚者如吳如楚如越皆稱明德之裔而僭王大號強暴自恣聖人因而貶之明內外之辨以示其别辨其紊乎內者而九州以外荒服殊俗不期正而自正矣木訥趙君屬春秋之老手而其言乃曰為僭㑹之說者不度時論勢而責人以難魯與諸戎有疆場之交幸其不以戈㦸相舂而惠然尋㑹魯何辭而拒之吁此以利害談春秋至此內外之分安在哉若曰文王之事昆夷太王之事獯鬻其時不同其事不同未可以律春秋趙君生於紹淳之世目擊夫當時之姦臣小人不恥事仇以請和為至計邪說鄙論淪浹骨髓入人也深老師宿儒至用是釋經誤後學為甚是以不能忘言非敢僭也夏五月莒人入向此春秋諸侯擅相侵伐之始也曰伐曰侵曰圍曰取曰入曰滅皆貶也所以異其名者以其用師有小大淺深竒正之不同耳凡伐人之國入其國都毁其廟祏遷其重器是之謂入春秋之所甚惡其罪下滅國一等然入有二例有入之而遂有之者宋入曹魯入邾及下文入極之類是也有入之而不有之者衛入郕鄭入許魯入杞之類是也入之而遂有之蓋滅國也此莒人入向左氏謂莒子娶於向向姜不安莒而歸莒子入向以姜氏還則其入也志在於復其去妻未必遂滅其國故春秋書入而不書滅及宣四年公伐莒取向終為莒所併但此役也入之而未取其取之又當在此後愚於春秋書入不書滅而知之耳或曰此莒君入向其書人何哉曰貶也夫婦人倫之始國君所與共承祭祀刑家以治其國者也姜不安於莒自必有故莒子當知所以自反今也遽以兵入人之國都而奪其去妻以還此非還妻之道也終又因以滅其國焉賊倫害教非中國所宜有春秋書人外之也莒自是終春秋之世貶而稱人其禮先亡矣義又見是嵗鄭人伐衛無駭帥師入極此魯滅國也書入不書滅為內諱滅國也然有以入書者焉有以取書者焉以入書此及昭七年入邾是也以取書成六年取鄟襄十三年取邿是也惟僖十七年滅項直書誅季氏擅兵也故不為魯諱公羊曰無駭何以不氏疾始滅也愚案隱桓莊之大夫不書族者無駭也翬也挾也柔也溺也翬以弒君去族示貶宜也無駭入極固當有貶未應與逆人同其科蓋無駭挾柔溺皆大夫之未賜族者春秋初年大夫未賜族者猶多故皆名而不氏或曰有罪去族與未賜族者皆無别乎曰春秋比事之書比事而觀乃見聖人之意翬在隱之世則去其族者凡再明為隱之罪人也在桓之世則加以公子之號以其與桓同惡也此有罪者所以異於未賜族者也公羊目無駭為展無駭是時無駭實未有氏及其死乃以展為氏耳凡公之子稱公子公之孫稱公孫公之曽孫不言曽孫而命之氏蓋有當氏而未氏者必世其官或為大夫然後有氏及春秋中年無不世官無不命氏權移於下國君孤立矣餘義見無駭卒仲遂卒秋八月庚辰公及戎盟于唐盟義己見元年三月魯望國之君諸夏所視儀而聽倡者也春而㑹戎秋而盟戎既為特㑹又為特盟春秋一嵗再書所以貶也蓋盟非盛世之美事中國諸侯不能恪守王度擅相為盟固春秋之所惡而況望國之君與戎特㑹特盟虧削國體紊王制內外之辨尤春秋之所不與書公及戎盟不加貶斥而義自見是之謂非所當及而及此春秋書魯事之凡也及戎之及又與及儀父及莒人之及異矣此一及字要當隨事而觀以求春秋之意胡氏曰成於日者必以事繫日前此盟于蔑則不日盟于宿則不日後此盟于密則不日盟于石門則不日獨盟于唐而書日謹之也愚謂胡氏此義可以施於此一時而不可通於他日或日或不日見於㑹盟者多矣春秋褒貶初不盡在是也不特㑹盟為然凡書日不書日不皆褒貶所係也然亦有因書月書日而見意者不以例言也如十年公㑹齊鄭伐宋六月壬戌敗宋師于菅辛未取郜辛巳取防一月之間敗人之師取人之邑書日以見其殘暴謂之非貶不可又如桓十四年八月壬申御廩災乙亥嘗災甫三日而嘗譏其不易災餘非書日則其義不見故耳外此或日或不日因舊史而書不皆褒貶所係二傳以是為拘不必惑也九月紀裂繻來逆女此外逆女始見於經者卿為君逆也公羊子曰外逆女不書此何以書譏始不親逆也榖梁子曰逆女親者也使大夫非正也魯哀公問冕而親迎不已重乎孔子對曰合二姓之好以為宗廟社稷主君何謂已重乎此諸侯親逆之所本也伊川謂親迎者迎於所館有親御授綏之禮豈有委宗廟社稷逺適他國以迎婦者乎詩稱文王親迎于渭未嘗出疆也伊川之說得用禮之中此書逆女重大昏之始未必專責親迎裂繻不稱君使則公羊子所謂昏禮不稱主人以存亷恥之節者也有母則稟命於母無母則稟命於諸父兄俾稱之以行古之義也成八年宋公使公孫夀來納幣所以稱使無母也無母而自命可乎或曰諸侯臣其諸父兄故不得稱不得稱而遂專行其可乎愚謂使諸父兄請命於宗廟遂稱之以行禮之權也宋公使公孫夀非禮也公羊此義授之孔門不可廢也冬十月伯姬歸于紀春秋於內女之出適紀載特詳所以明人倫正婦道何穠列於二南是其義也婦人謂嫁曰歸其所從來逺矣泰六五帝乙歸妹雖天子女下嫁亦以歸言而况於諸侯卿大夫願為有家人道所從以始是故言歸然必公女或姑姊妹為諸侯夫人其尊乃曰歸否則不書其書者皆譏莒慶宋蕩齊髙固皆譏也義又見七年三月叔姬歸紀紀子帛莒子盟于密于蔑內盟之始也于密外盟之始也內外盟必書志東遷諸侯無所統一自相為盟也榖梁曰紀子伯莒子盟于密公羊曰紀子伯者何無聞焉耳此經疑也左氏以與裂繻逆女連文子帛又類裂繻之字而曰為魯故所謂傳聞異辭也春秋大夫無加於諸侯之禮孫泰山亦以為闕姑置外盟義又見三年十二月齊鄭盟于石門十有二月乙卯夫人子氏薨子氏者左傳以為惠公仲子謂元年歸賵為豫凶誣矣公羊以為隱公之母亦非也仲子聲子均非正嫡仲子不得稱夫人聲于烏得而僭小君之號彼成風敬嬴所以稱夫人以僖宣二公僭名以尊其妾母春秋不得而削非春秋與之以此名也隱公不以君位自居故聲子無僭名此子氏者從榖梁義隱之夫人也陳止齊曰隱桓之母俱不得為夫人則嫡庶之義明隱妻得為夫人則君臣之分定嫡庶義明則桓非太子君臣分定則隱非攝主隱不以夫人喪其妻故不敢葬榖梁曰不葬從君者也隱弒賊不討故君與夫人皆不書葬合榖陳而其義備鄭人伐衛此春秋書伐之始征伐天子之事而春秋諸侯專之罪也然有早嵗之爭伐齊霸未興以前是也有晚嵗之爭伐晉霸既衰以後是也惟中嵗之爭伐有奉王命而討不庭者齊晉二霸之師是也春秋與之以霸討褒貶隨事而見學者諦觀書法而求聖人垂訓之本㫖則春秋行事可得而識矣侵伐二義三傳為說不同左氏謂有鐘鼓曰伐無曰侵榖梁謂包人民驅牛馬曰侵斬樹木壞宫室曰伐其說皆拘公羊謂精曰伐粗曰侵者近之蓋具軍容而往整齊嚴肅為精帥偏師而出淺攻疾馳為粗自周家盛時易詩書周官所述有是二名矣而春秋因舊史而為之筆削舊史因來告而為之書有先侵後伐者焉有聲侵實伐者焉此不可以定例求也鄭叔段之子滑以衛師伐鄭取廩延啓釁者衛也去嵗鄭人以王師虢師魯師伐衛南鄙亦足以報廩延之役矣今鄭復伐衛則罪在鄭矣蓋鄭莊必欲窮叔段之黨而夷之是以用師不已書人書伐貶也至中年以後又有變例之侵伐動大師勤諸侯而無討罪救亂之實書侵以貶之出偏師而能伸大義當人心書伐以奬之是之謂變例於齊桓晉文兩召陵見之三年春王二月春秋二月三月皆繫之於王者明夏時之春也何休乃云二月殷正月也三月夏正月也王者存二王之後使統其正朔尚其服色行其禮樂通三統也此說大不然春秋明百王公共之法以示後世所以春之三月皆繫之於王者正所以行夏之時言春之三月在此寅卯辰彼子丑為冬而非春也王者體天道布德教如陽春生意之流洽夫然後盡其體長之事豈為二王後故而繫之以王乎四時之春猶四德之元春加王而三時可以類舉矣己巳日有食之日太陽之精君象也月來交㑹與日同度月掩日光是之謂蝕隂干陽也故為災或曰日月之行有常度交㑹則必食而聖人謹書之謂之天變何哉曰有當食而不食者矣有不當食而食者矣杜氏謂日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不食者或有頻交而頻食者夫所謂盈縮則君德之感也人事之應也常而變者也不然何以帝王盛時三光平寒暑調星不隕日不食而衰亂之世變異紛紛無虛嵗者乎為周髀之說者曰周天三百六十五度四分度之一日月皆右行於天日日行一度月日行十三度十九分度之七是月行疾日行遲二十九日有餘而月行一周天追及於日而與之㑹是之謂交此古說也近代諸儒則謂天體至圓繞地左旋一日一周而過一度日月亦左旋日行天稍遲亦一日一周而在天不及一度月行尤遲一日不及天十三度二十九日而與日㑹則日行速而月行遲今治左旋厯者此說也日月之行每月必㑹而月或在日道表或在日道裏故不食必月與日同道乃食又一說云日月行天各自有道雖云朔相遇而道有表裏若月光在裏依限而食者多若月光在表雖依限而食者少杜氏見其參差故云行度有大量不能不少有盈縮故有雖交㑹而不食或有頻交而頻食斯皆指君德之感人事之應而言也自漢以來厯家每以百七十有三日為一交㑹未有頻月交食者而襄二十一年九月十月二十四年七月八月頻月頻食此天度之變其常巧厯所不能知者也至漢髙帝即位之三年十月十一月頻食以後至今千餘年未有頻月食者因是疏家厯家或指為簡冊傳寫之誤夫誤固有之未有誤至於再者況漢祖初年又嘗頻食此在秦火之後謂之誤亦可乎故知天度有時而變其常兹所以為異其可以定術求之乎嘗考厯代天文書日月五星變常之事更多有之唐人有妙於厯者謂日食星變不可以定術求援據精博足以憂治世而危明主彼謂交㑹有常躔次一定置人事於不言者星翁厯家學而非春秋記異之㫖也凡日食必書朔此不書史失之也由厯紀錯亂日官廢職或失之前或失之後是以或失其朔或失其日三月庚戌天王崩平王也王崩不書葬義見後左氏謂王以三月壬戌崩赴以庚戌故書杜謂欲諸侯速至故逺日以赴春秋不書實崩日而書逺日者即傳其僞以懲臣子之過愚謂春秋據舊史而書非即傳其僞也或曰萬國至衆封疆之守至重故天子之喪諸侯不得越境而奔修服於其國卿共弔葬之事愚以為此以後世郡縣之禮而律古者封建之國恐不得同也胡氏引周書康王之誥為說曰太保率西方諸侯入應門左畢公率東方諸侯入應門右以為天子之喪諸侯皆當奔赴豈得修服於國此正論矣但康王之誥所云西方諸侯東方諸侯指畿內諸侯而言耳是時成王始崩赴告未能及逺四方諸侯未能皆在列若曰諸侯各以逺近來奔庶乎其可行也或曰平王東遷之始王書崩不書葬公羊以為舉天下而葬一人其事不疑也故不書其說何如曰葬終事之大者而況天子之葬而可無書是蓋有深意而諸儒未之言耳周家東遷以避戎也戎患既平天子將還歸舊京復文武成康之宇以號召天下平王即安於洛舉豐鎬故壤鞠為黍離莫之或恤其後遂殁於東失纘祖承家之道矣自後傳十有三王皆不克返葬春秋書崩不書葬言葬之非其地猶望子孫有能返舊都而葬之者耳其間有崩葬皆書者則譏也或以緩葬而書或以不及時葬而書隨事而觀可以得聖人之意夏四月辛卯君氏卒公羊作尹氏左氏曰君氏者聲子也聲子隱公之母以為公欲讓故不成夫人之禮是以不著氏愚謂審若左氏之說亦當如定十五年書姒氏卒今書君氏非名也公羊曰尹氏者天子之大夫也其稱尹氏譏世卿也外大夫不卒此何以卒天王崩諸侯之主也公羊之說似得之惟是王朝卿大夫卒不書而春秋二百四十二年特書尹氏王子虎劉卷之卒其餘未有登於簡牘者此為不可曉耳或曰王子虎劉卷以功故書名尹氏以世族譏故略其名但周之大臣柄國怙權而世其官者猶多有之何以獨責一尹氏乎以經文前後而觀三月書天王崩四月書尹氏卒豈非在諒隂百官總己以聽於冢宰王崩未幾冢宰繼卒春秋危之故特識之乎然此乃經疑姑置秋武氏子來求賻武氏子來求賻不稱王使左氏曰王未葬也公羊曰當喪未君也劉原父曰嗣子定位於初喪其曰未君何百官總己以聽於冢宰三年胡氏從之愚以為當喪未君謂父喪在殯嗣子未稱元年故不成其為君此天子諸侯所同也惟此時不以王命行事故遣使不稱使武氏子仍叔子銜命而出必皆有位於朝今乃以某氏之子書公榖於仍叔之子曰父老子代從政世其祿位者也於武氏子乃曰父卒子未命也蓋以仍叔為尚存之人以武氏為已死之大夫諦觀經㫖皆父在而子世其官者也不然王朝公卿大夫莫非世官世祿之家何獨於此二子而書法異乎曰某氏之子云者有父在焉故也至於求賻之書則責在魯矣仲子諸侯之妾其死也天子特遣宰咺為之致賵今王崩而魯隱不奔不賻致王人銜命下徴魯之罪大矣書王人求賻春秋所以誅魯或曰貶王非也求賻與求車求金異矣八月庚辰宋公和卒或曰春秋常事不書而於諸侯之卒葬必書其故何耶曰卒而書示人以謹終之道也葬而書示為人臣為人子事君事親之終也是故春秋於國君之卒葬必書不以正斃亦必書不得其葬或葬之不以其禮則雖葬而不以葬書俾天下後世之為君者兢兢自持常懼弗克終而圖所以善其終為人臣為人子者事死若生事亡若存時平而共其窀穸之常國亂而盡其託孤之寄君死不以其道則為之任討賊復讎之事而後為能葬其君夫豈謹月日記卒葬之謂哉或曰天子曰崩諸侯曰薨禮也降而書卒春秋其無意乎曰胡氏以為周氏東遷諸侯放恣不禀命享有其國故春秋於其告喪特示貶黜而以卒書不與之為諸侯也此論固正但當時諸侯未必人人皆放恣無王今一切俱貶恐非春秋用法之意杜氏謂內稱公而書薨所以自尊其君故不得不略外以自異蓋春秋書法書魯者常異於他國以例而求恐當如杜之說或又曰宋公稱公爵也五等諸侯崇卑有序比及其葬一以公爵而係之於諡春秋之不削之何與曰公者臣子之在國稱其君亦猶大夫在國而人稱之曰子此亦美名之通稱者而非所謂僭爵也及其死遂以公之名係之於諡臣子之稱之云耳考之史周家盛時諸侯殁而稱公如魯之考公煬公幽公齊之丁公乙公癸公陳之胡公申公皆以公係諡者也此五等諸侯一以公稱者舊史書之春秋因之亦以存臣子之孝敬云耳非許之以僭名也或又曰生而名貶也死而名何與曰舊說謂古不諱名故以名赴愚謂臣子赴君父以名夏殷以前或然至周人則諱名矣其赴必不以名春秋卒諸侯以名示諸侯之卒不得與天子等耳王一而已可不名諸侯衆也烏得不名其不名者史失之或外國之君不以名通非例也冬十有二月齊侯鄭伯盟于石門盟義已見元年于蔑二年于密外盟常事也春秋何以書著東遷而後諸侯無所統一而自相為盟也案左傳齊鄭盟于石門尋盧之盟也盧盟在春秋之前則諸侯之私相為盟有自來矣陳止齊謂齊鄭合天下始多故又曰書齊鄭盟于石門以志諸侯之合愚謂自王室之東天子威令不行於諸侯於是諸侯無所統一而自相為盟蓋散而後自相為盟春秋以前有之矣自入春秋魯盟邾盟宋紀莒之盟于密齊鄭之盟于石門皆散而後自相為盟非合也霸國興而諸侯始合夫子謂齊桓紏合諸侯一正天下者蓋諸侯散於東遷至霸國興而復合石門何足道哉癸未葬宋穆公或曰賤不誄貴少不誄長天子崩誄於郊諸侯薨誄于王大夫卒誄于君春秋初年諸侯臣子之諡其君者或不請於王而私為之諡春秋之不削之何與曰無以易其名也死而為之諡先王之令典然必即行以為之諡或表其勳或旌其庸或稱其德其有罪者則加以醜名亦先王之制也東遷以後諸侯臣子不請於王私為之諡其意欲諡美於君而不知諡不出於王朝豈足為死者之榮乎是則臣子之罪若遂削之則戮及死者聖人秉筆至公而存心忠厚有不為也然當時亦有請命於王而榮其親於身後者一二間見春秋之不削之亦以是故與初宋宣公舍其子與夷而立其弟和是為穆公穆公將終復以國而歸之與夷而出其子馮於鄭公羊子謂宋國大亂三世宣公實為之諸儒或有取其說者愚竊以為未然讓美德也不當讓而讓以讓召亂魯隱公是也若宣公之讓穆公穆公之讓殤公兄以傳弟弟復以歸兄之子此盛德也聖門所許春秋無譏也左氏曰宋宣公可謂知人矣立穆公其子饗之命以義夫有得於聖人之意公羊乃曰君子大居正宋之禍宣公為之謂宣公不當讓以啓後人之爭愚謂宋之亂由殤公不仁以怨報德兵連不解賊臣因而作難弒殤而納馮傳者謂宋殤立十年十一戰民不堪命宋督因以為亂於宣穆之讓果何關乎此公羊僻說而木訥取焉其說曰其後有啓之賢而不以傳務過大禹無朱均之子而苟遜以僭擬堯舜吁是豈君子之言乎堯舜而上大道為公不獨親不獨子使朱均而賢聖人亦必以天下授之至禹薦益於天矣禹殁啓以臣民戴已而踐天子位雖時使之然愚於啓不能無遺憾木訥乃云禹傳啓而不授益豈禹之不能遜哉杜亂源也如木訥之論是禹陽薦益而隂以與啓也堯舜之讓湯武之繼此乃古今一大議論豈與後世陽豫隂奪者可同日語哉恐誤後學不得不辨餘義見宋公和卒葬衛桓公滕侯卒春秋集傳詳說卷一
