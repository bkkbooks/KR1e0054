body:
  text: 春秋集傳詳説卷四宋家鉉翁撰桓公下桓王十七年九年春紀季薑歸于京師公羊曰前既稱王后則其辭成矣今復稱季薑紀父母之於子雖為天王后猶曰吾季薑愚謂自王國而逆則曰王后女雖在紀而后之名已正自紀國而往則曰紀季薑后雖在途而女之出必本其所自此諸侯女歸于京師之例也伊川曰書王國之事不可用無王之月故書時而已或曰借如正月日食則如何書之曰書春日食則其義尤明東萊吕氏似不以為然曰史失季薑歸月春秋不得而增也獨記其春耳當從吕氏夏四月秋七月冬曹伯使其世子射姑來朝春秋於射姑來朝之後繼之以曹伯終生卒此責射姑以事親之終也禮著文王有疾武王不脫冠帶而養文王一飯亦一飯文王再飯亦再飯夫所以詳記而備言者垂後世事親之法也今終生之疾已革而射姑朝于鄰邦廢視膳嘗藥之事修奉幣相朝之禮其不憂親之疾可以見矣或曰以父命而出奈何曰此非存亡安危之所繫父命猶可辭也榖梁以世子伉諸侯之禮為曹伯失正愚謂曹世子之來必不敢伉諸侯之禮魯亦必不待以諸侯之禮春秋所譏在於廢子職而治常事是以繼書曹伯終生卒以見其當親病而出失為子之道耳許止亦世子也不謹於嘗藥幾麗大刑可不謹哉可不戒哉十年春王正月庚申曹伯終生卒榖梁曰桓無王其曰王以正終生之卒非也陳侯鮑卒在五年正月曷不書王以正其卒此書王不為終生也胡氏曰十者盈數天道十年則一周人事十年則必變桓篡弒以來數周于十其數已盈宜見誅於天人十年書王紀常理也木訥云是嵗齊衛鄭來戰于郎雖未能聲罪致討而聖人以迹取之是以復書王於正月之上冀王法之可伸耳合二説而觀庶得聖人之意餘義見三國戰于郎夏五月葬曹桓公秋公會衛侯于桃丘弗遇此魯桓有求於衛侯欲為此會衛人拒而不許春秋與之諸説皆以為譏衛侯失信非也自入春秋弒君者衛州吁魯桓宋督三人耳州吁迄正天討而宋督以賂故免魯桓者請昏以結齊割許以賂鄭故得逭討至今而諸侯實不盡與也衛之於魯親而非黨自弒君未嘗受其要結之賂今魯人請以為會衛侯獨介然不從未幾遂與三國之兵偕至戰于郎愚意郎之師乃衛侯所倡安知是時不以討亂為辭而左氏乃以為三國來戰以鄭忽之故忽一怒而連三國之兵必無是也春秋書公會衛侯于桃丘弗遇繼書三國來戰于郎夫豈譏衛侯之失信蓋幸其猶存一分天理以兵向逆人之國夫豈以失信為貶乎榖伯鄧侯朝桓於篡弒七年之後先儒猶謂春秋書名以貶此斥絶逆人不與為會而謂春秋貶其失信必不然也善觀春秋者須通前後文以求聖人之意不可以一句為一事冬十有二月丙午齊侯衛侯鄭伯來戰于郎自魯桓篡逆迄今十年始則鄭伯受許田之賂而與之盟繼而齊侯昏之滕子朝之甚而天王之尊亦遣宰渠下聘天理民彝幾泯滅而無餘矣今適當十年之期以人事而觀而知天心禍盈桓之惡亦將稔矣今桃丘不遇而三國之師不旋踵俱至天也左氏乃謂魯以周班後鄭鄭忽怒請于齊以有郎之師所爭亦細故耳何遽三國連兵而來愚以為是師也不專以鄭忽之故彼齊僖鄭莊亦豈以一忽之怒而為之輕動大兵伐人之國蓋衛連齊鄭以問魯桓弒君之罪齊姻也鄭賄也非有討亂之實心不過誅求弗遂脅之以兵然春秋猶幸其以兵向逆有以讋亂賊之膽故於是年特書王正月而秋之與冬惟書此二事不及他事方治篡賊不暇及其他此春秋意也戰不言勝負勝負未分也公羊以為為魯諱敗恐不然餘義見于惡曹之盟宋之戰十有一年春正月齊人衛人鄭人盟于惡曹戰于郎三國皆爵冀其能討亂也卒無成功倐忽俱退以為此盟是以春秋貶之三國皆人此三國之君也而書人豈得謂之無貶左氏謂齊衛鄭宋盟于惡曹春秋不書宋責不在宋也或曰三國既戰于郎而為此盟宋不預戰而預盟何耶曰宋亦將有討於魯故耳方督之弒君魯桓實取郜鼎之賂宋莊豈無憾于魯是以求預此盟且將偕三國之師更為後舉魯人知之故自是兩年之間兩盟四會以有求于宋左氏莫測其故以為魯為鄭而請宋非也詳辨于下夏五月癸未鄭伯寤生卒春秋初年諸侯如魯桓衛宣齊襄晉獻皆禽犢無知不足深責惟莊公者則猶知名義之可貴既克其弟而曰寡人有弟不能教訓使糊其口於四方既入許矣而曰許大嶽之後吾其能與許爭既稱兵犯上矣而曰君子不欲多上人況敢陵天子乎然而黨于宋魯之篡賊而怙其亂終身弗悔豈非利欲之心不勝其義理之心者歟故不得為賢君然此一鄭也在莊公用之而有餘及其子孫迫于強國顛沛隕越不能自振以迄于春秋之終是以有國有家者必貴自強孟子曰能治其國家誰敢侮之鄭之謂矣秋七月葬鄭莊公九月宋人執鄭祭仲盟主執諸侯之大夫以王事而執之也宋非方伯連帥而擅執鄭之為執政者鄭之執政非其臣屬而甘於受其執而不以為怒蓋相與共為盜姦外示執而中則同也左傳謂宋莊誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲以厲公歸而立之愚三復當時事竊以為仲與莊內外合謀而為此本非執也仲為鄭卿柄其國者也豈得一旦輕行為宋所執又與突俱歸而遂立之當是時立弗立其權在仲彼迫脅而為之盟又何足以要我而仲也出君納君若是之易耶蓋忽者鄭莊公嫡子嘗有功于齊剛傲自大祭仲忌之故與宋莊合謀更立弱君為固位之計突既篡兄復不假仲以權仲又出之而復以忽歸若仲者鄭之大盜周若有王誅死而不以赦者也春秋先書宋人執鄭祭仲繼書突入忽出著祭仲為首惡也突非祭仲無以遂其篡奪之謀仲非首惡而何公羊乃謂春秋賢仲是以字而不名因是傅會而為之辭有權者反經合道之説誤天下後世豈不甚哉義又見十五年突出忽歸突歸于鄭鄭有君而突自外歸篡也削其公子之號不繫之鄭所以討也凡書歸有宜歸而歸之者有不宜歸而歸者考其前後乃見突不繫之鄭去公子而書歸明其為篡也祭仲執而突歸突由仲而入也仲名而突去公子皆所以誅也劉氏曰鄭突內因強臣之力曹赤外挾戎狄之援以奪其嫡而禍其宗春秋所惡也專治突則祭仲之罪不明專治赤則戎狄之禍不見故挈其上而易其下正謂褒貶非一歸字所可見考其前後乃識本旨鄭忽出奔衛鄭昭之立四閲月矣不稱鄭子而書鄭忽譏不能君也忽以嫡長君鄭名正而位定者也權臣悖弟內外合謀逐之曽無難焉其不克負荷亦甚矣是故名以奔之或曰詩人刺忽辭昏於齊以致失援而見逐忽之罪其在是乎曰否詩序雜出於後儒之手未可盡據以為不刊之論也案傳魯桓之未昏於齊也齊僖欲以文薑妻忽忽曰人各有耦齊大非吾耦也辭之及其敗戎師也齊侯又請妻之曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸民其謂我何其持論據正在當時未易多得厥後齊女之嫁於魯桓莊者曰文薑曰哀薑皆以淫亂而弒其夫斃其子忽之辭昏可謂有過人之先識但其才器淺薄不足以君國馭臣始立而為權臣所逐再入而死於亂臣之手亦其所遇然耳要亦無大惡之可書詩人惜其無大國之助可也謂齊女賢而不取則非也齊女淫亂失道如此尚何賢之有哉或曰然則詩人奚刺曰詩人之刺固當有之何至以狡童而目其君乎蓋鄭風刺狡童狂童者凡三山有扶蘇之序刺所美非美其詩云不見子充乃見狡童言君子見棄小人獲用子充以目君子狡童以目小人也狡童之詩序刺不能與賢人圗事權臣擅命也其詩云彼狡童兮不與我言兮正是刺擅命之權臣如祭仲等輩夫豈刺其君乎鄭風諸詩作於公子五爭之時突以少賤而篡其君兄有不可勝誅之罪詩人必不偏刺其君兄而獨遺其悖弟褰裳之序云狂童恣行國人思大國之正已狂童云者正是指突之猖狂妄行日以篡兄為事而當時諸侯無有能舉方伯連帥之職者而説詩諸公考之未精皆以為刺忽愚讀詩至此不能無疑嘗為説以辨正之詩人用意忠厚豈有目其君為狡童狂童之理味詩之旨蓋刺突也或曰如子所言忽為無過何以顛沛若是卒不能君以死乎曰剛傲而自大已見為冢嗣之日則其為君也必以是而失衆但考之經傳不見其有大惡之可指詩人之刺不應遽至是故欲為之一辨焉耳柔會宋公陳侯蔡叔盟于折或曰大夫會盟公侯禮歟曰諸侯更相會盟此衰世事三代盛時所未嘗有也而公侯復不自行俾大夫往尸其事是之謂瀆盟何禮之足言然傳家以為會伯子男可會公侯不可又曰在會更有諸侯則可以盟大夫其意以大夫特盟諸侯為不可此亦傳家隨事而推之以為之説耳大夫盟諸侯豈足言禮強國行之則為伉弱國行之則為僭而末流之弊諸侯大夫因是而外交強國以脅制其君如魯季衛孫宋華之所為此其權輿春秋不與也柔者魯未賜族之大夫叔者蔡大夫叔其名也義已見隱二年無駭入極莊三年溺帥師公會宋公于夫鍾冬十有二月公會宋公于闞義已見惡曹之會二年之間兩盟四會惟宋之故春秋書盟會未有若是頻數者也而左氏乃謂宋莊挾其納突之功多責賂于鄭鄭不堪命魯欲平之會至五六宋卒不許於是魯鄭合而與宋戰愚謂魯為鄭有求固人情之所不免何至二嵗中再會三會盟而復盟情狀迫切乃至於此乎蓋惡曹之會宋將不利於魯魯知之故二年之間兩盟四會備其事宋之禮求為自免之計非為鄭也然求者愈卑應者愈傲故卒至於戰春秋備書以責之責魯也亦責宋也十有二年春正月夏六月壬寅公會杞侯莒子盟于曲池公榖作紀侯公榖以杞為紀是也愚考隱二年紀子帛莒子盟于密左氏曰魯故也注謂莒魯有怨紀侯既昏於魯使大夫盟莒以和解之紀帛字前輩以為疑然紀莒以魯故而為盟有自來矣秋七月丁亥公會宋公燕人盟于榖丘盟義併見下戰于宋此燕人南燕也南燕姞姓在鄭衛之間姞女為后稷元妃周王業所以基也北燕姬姓在晉之北召公奭之後也昭三年北燕伯欵奔齊稱北所以别於南二燕皆周家建國而俱以燕為號豈受封之始便有南北之異乎史記謂北燕為山戎所隔至齊桓伐戎開道而後與中國通故其見於春秋獨後此二燕之辨八月壬辰陳侯躍卒左傳謂蔡人殺陳他而立厲公厲公即躍公羊何氏注乃以躍為他子故削其葬疑他子未必為君史記世家躍乃太子免之弟殺他而立與左傳所載不同姑存俟考公會宋公于虛併見下戰于宋冬十有一月公會宋公于龜丙戌公會鄭伯盟于武父前此與齊衛伐魯戰于郎者忽也此與魯桓會盟者突也突篡忽者也故務與忽相反而獨善於魯自是魯鄭遂合丙戌衛侯晉卒重書丙戌傳録之誤十有二月及鄭師伐宋丁未戰于宋魯桓兩年之間兩為之盟四為之會以有求于宋左氏謂魯為鄭故請于宋以求息肩宋不之許乃連鄭以伐宋蓋因魯鄭連兵傅會而為之説非其實也夫為人有求固鄰好之不能免何至奔走道途汲汲無寧日若此者乎蓋其盟也其會也皆魯所以自為也愚於惡曹之盟闞之會既辨之詳矣魯事宋無所不至而宋莊乃不肯降心以相從其志在於責賂耳宋莊之篡也魯嘗取其郜鼎之賂今宋人乘三國伐魯願自附以責郜鼎之償其合也以利而已矣鄭突者篡忽者也忽魯之讐也突既篡忽亦願自附於魯以塞宋莊無厭之欲故武父之盟一請而遂獲以篡從篡自為樹黨計其合也亦為利而已矣春秋初年王綱已弛霸政未興宋魯齊鄭各立黨與喜而會會而同盟相與四顧而罔利怒而叛盟叛盟而戰復相對峙而爭利今日為附明日為禦率皆肆情於法度之外中國之大紛然靡所統攝幾底於亂故春秋於宋魯齊鄭之會盟爭戰詳記而備書皆所以貶也春秋之始五六十年盟會爭戰大率皆貶宋魯齊鄭為罪之首故於其戰皆目其君而責之論者或以為春秋爵之失其旨矣是役也魯君在而不書若為之諱實亦貶也十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績及戰義見莊二十八年三傳為説不同左氏以為鄭與宋戰公羊以為宋與魯戰穀梁以為紀與齊戰愚以經旨而觀此兩相遇之戰也是時魯與紀鄭為黨宋與齊衛燕為黨齊之所惡者紀宋之所惡者魯與鄭齊率三國而來非襲紀則攻魯而困鄭魯人諜知之率紀鄭待之境上伐其謀一戰而却之彼來伐此逆擊適相遇而戰故不書戰處齊侯序宋公之上齊為之倡也或曰春秋何所與乎曰春秋皆所不與而責齊為甚矣宋馮魯允鄭突皆篡國之君其罪皆當討齊方伯之國也仗義而討之夫誰曰不然今乃儕宋人以治魯鄭失其為方伯之道矣春秋先書及齊侯宋公衛侯燕人戰目其君也又書齊師宋師衛師燕師敗績哀其民也齊以侯序宋公上坐兵首也或曰前日三國伐魯以有郎之戰而春秋與之今四國伐魯而春秋不與何哉曰前日三國之來衛為之倡主於討亂故春秋與之今四國之來齊為之倡主於治其私非義戰也是以不為春秋所與春秋有事同而褒貶異者此類是也三月葬衛宣公衛宣死未葬而嗣子朔從諸侯及魯紀鄭戰敗績而歸乃葬其親甚哉衛朔之不仁也春秋不書衛子而以爵書絶之於名教也夫所謂金革變禮者不得已而用之今朔之從諸侯戰非為社稷計亦相與逐利焉耳衛宣淫亂失道行同犬彘教之行於家者可想而知是不足深責而春秋垂法後世不容無責也金革變禮義又見僖三十三年晉襄殽之戰夏大水大水紀災也謂夏時之四五六月或以為周正則夏時之二三四月失之矣秋七月冬十月十有四年春正月公會鄭伯于曹無冰春秋書無冰者凡三皆在春月以冰政不舉而書也詩七月二之日鑿冰沖沖謂十二月取冰三之日納于凌隂謂正月藏冰四之日其蚤獻羔祭韭謂二月開冰月令周禮藏冰開冰與此略同春秋於正月二月而書無冰者謂藏冰薦冰之月而無冰故書以譏之耳夏五胡氏以為聖人因舊史而闕之此闕文也愚以為此修經以後之闕文若舊史有闕聖人必修之矣何必傳疑以為後世之惑蓋有舊史之疑而聖人因之而不革者將以垂法於後若夏五闕文實闕文也聖人何以不修故曰此修經以後之闕文也鄭伯使其弟語來盟榖梁作禦義已見隱七年齊侯使其弟年來聘秋八月壬申御廩災乙亥嘗義已見綱領夏正中公羊曰御廩者粢盛積委之所藏也御廩災何以書記災也乙亥嘗譏嘗也御廩災不如勿嘗而已矣榖梁亦曰未易災之餘而嘗志不敬也孫泰山胡氏以春秋用周正紀事此八月嘗乃夏之六月書不時愚以為春秋行夏之時此八月嘗時也常事不書此書為其不易災餘而嘗志不敬也御廩所以藏天地宗廟之粢盛今前期三日告災天示之譴為國君者當恐懼貶損以答天戒改卜而嘗可也今不改卜而嘗是以天戒為不足畏又不易災餘則祭其鹵率可知故春秋於災後三日而書嘗所以譏其不敬夫豈為不時書乎愚於此又得春秋用夏時之一證冬十有二月丁巳齊侯祿父卒僖公也宋人以齊人蔡人衛人陳人伐鄭或曰榖梁子謂以者不以者也然則凡書以皆為貶乎曰否有以貶者有以褒者此宋人以齊蔡衛陳伐鄭貶也去年宋齊衛燕之君動大師伐魯報宋之戰敗北而回實鄭人來救之力宋不知自反移怒于鄭復以四國伐鄭春秋坐宋以兵首書之曰以責宋也亦責四國也四國以其民為宋人役賊其民者也僖二十六年魯以楚師伐齊取榖乞外兵伐同好亦貶也惟定四年蔡昭侯以吳師伐楚獨為春秋所與為其復世讐摧強楚大有功於中國故蔡雖小國而許之以吳吳雖強而命之以從蔡此春秋褒善録功之筆因事而見者也故以之一字不可以例觀讀春秋者謹之其詳已著之綱領明例十有五年春二月天王使家父來求車求之為言下之人有求於上也不足者求之有餘者也上之於下不以求言也今以天王之尊而徴需猥及於不稟命之侯始之求賻猶曰求其所當求諸侯不膊天子求之以愧之也繼而求車繼而求金非所當求而求而春秋以求書者見成周號令不行於當時而遜辭以有求非特責王深責諸侯之無王也職貢不供致勞王命下徴諸侯之罪大矣公穀以為專責王未盡經意三月乙未天王崩王崩葬義見隱三年桓王之始立周雖衰而紀綱法制猶未盡壞及宋魯相繼弒君王不能討又從而寵奬之天下於是始不知有王矣周之東遷晉鄭是依曲沃之支奪宗圗篡王不能討更使尹氏武氏以兵助之晉由是不克振以逮於亡鄭於周最睦王始即位奪鄭伯政以畀虢公鄭由是叛鄭當親而疏之曲沃當討而輔之坐此二失威令遂不行於天下至是崩嗣子不克負荷七年而後葬是雖諸侯無王而王亦有以自取焉莊僖二君繼之崩葬皆不見録於史周自是不復能國賴霸者興而祭號僅保焉耳夏四月己巳葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭或曰前此突入忽出春秋書曰突歸于鄭鄭忽出奔衛所以誅篡賊而奔出君也今也忽入而突出忽嘗君鄭矣而書世子突實篡忽者也而書鄭伯何哉曰此舊史所書春秋存而不削示君不能君位雖嫡長終不能自保焉耳蓋忽之為君曽不數月為賊臣悖弟所逐以奔凶徒逆儔既戴突為君反以忽為未成君之世子舊史因其來告而書春秋存而不革一以示君不能君者之戒亦以見忽以世子而君鄭異乎庶孽之干正者耳乃若忽書復歸于鄭突則名以奔之則出於聖人之特筆書復歸見位乃世子之當得復而歸之於其所書名以奔著突之為篡也春秋因舊史而垂戒戒之中而寓深意一字之褒貶存乎其間似此更多惟潛玩乃能識之耳項平甫謂是時忽為君突在外忽止稱世子突反稱君見突雖不正國人君之忽雖正嫡而國人不以為君也此論似是而非者也忽雖不能君無失衆之大惡突雖以狡險竊位無及人之盛美今謂忽不為國人所君謂突雖不正國人君之實不然也春秋辨分之書彼篡人之國違道以干百姓之譽人懷其惠而戴篡賊為君皆春秋之所不與而況突者實無一善之可書乎此因舊史而垂君不能君之戒書世子正所以别異庶孽之為篡者其間自有微旨也或曰突之入春秋書執祭仲以見其所以入今突之出祭仲實逐之春秋無討於仲何哉曰入而書祭仲所以志祭仲之外交鄰國突之內結強臣以篡其兄皆所以誅也出而不書祭仲以見君位非突之所宜居舉國之人皆欲逐之不書臣逐討篡之義也而祭仲之罪亦併見矣曰祭仲之納君可得而補出君之過乎曰否忽之出祭仲之所為而假手於宋也忽之入祭仲惡突謀已出突而納之非為忽為正而彼納之以反乎正直反覆為利耳出君納君繫乎反掌有帝王在上若仲者必誅而不以赦者也復歸之例公羊曰復歸者出惡歸無惡復入者出無惡入有惡入者出入惡歸者出入無惡考之經實不皆然也蓋有失國而得歸曰復歸者此是也有以罪見執而復歸者衛侯鄭曹伯襄是也有書歸不書復者衛侯鄭之再入不與之以復歸也蓋復有牽復之義出而得復復之於其所也若書歸不書復則徒歸而已此國君復歸例人臣之復歸不與此同復歸義又見僖二十八年及三十年許叔入于許隱十一年齊魯鄭入許既得之矣齊以讓魯魯不取以與鄭鄭不敢有而使許大夫奉莊公之弟叔居許東偏而鄭大夫獲居其西偏其意亦欲有之而未敢遽以為己有懼衆之不與也至是死已五年突入忽出忽入突出鄭國多故許叔乘之復有其宗社非若逃亡公子自外而得入者比蓋有善之可録無過之可書者許叔也或者乃謂許叔不告之天王請之方伯伸大義以復其國乃乘鄭亂而得之以是為春秋所貶其不然歟是時天王之令不行於諸侯方伯連帥皆黨凶怙亂之人許叔將以誰告其入之也甚難春秋其無貶乎蓋入一也有入之善者有入之惡者許叔之入入之善也衛朔之入鄭突之入入之惡也春秋書許叔入于許既繫之於國復書字以入之與其能入無貶辭也若以一字為例而不深考當時之事則失春秋之旨矣公會齊侯于艾左氏謂謀定許也愚以為非十三年魯及齊交兵未之有合而齊僖忽以死告今襄始立復與魯通雖曰修婚姻之好而彭生之禍實權輿於此春秋書以示警焉耳邾人牟人葛人來朝邾牟葛之朝為公羊之學者曰桓行惡而三國相率以朝之是故賤之而並外之此論不為不正但前是來朝若滕若榖若鄧猶存其爵此併爵而去之後朝者罰過於前不無可疑耳董子曰為天王崩而相朝故貶得其旨矣此不惟相朝又纍數俱至僭朝王之禮不奔王喪罪也以朝王之禮而朝魯亦罪也是故去爵以貶魯君不奔王喪而受三國之旅朝魯亦有責責三國即所以責魯謂魯君無貶不可也餘義又見上滕子來朝榖伯鄧侯來朝秋九月鄭伯突入于櫟或曰忽復歸而君鄭鄭有君矣突自外竊入亦以鄭伯書何歟曰此亦因舊史之已書而存之以示戒焉耳魯桓與鄭突同惡相濟出師輔篡至於再三故魯史崇突而卑忽以鄭伯書春秋因之以示戒程子所謂書爵以戒居君位者已不能保則人將取之是其義也夫君之位一而已矣國有君則自外入者賊也君不能君則自外入者寇也突者忽之賊也鄭之寇也今自外竊入櫟人納之諸侯之無道者與之忽為君居內曽不能聲罪致討以致臣民懷二忽與子亹子儀後先死突卒篡有鄭國甚矣夫忽之不能君也春秋雖存爵以示戒然於突之出則名以奔之突之入則名以入之所以著其篡兄攘國之罪也木訥有得於此其言曰諸侯再入不至於國者惟鄭突入于櫟與襄二十五年衛侯入于夷儀而已鄭伯突名而衛侯衎不名衎書復歸于衛而鄭伯突不書歸于鄭此正與不正之辨也衛衎之出國固其國也林父逐之而立剽不正也衎入于夷儀待剽之死非篡也故聖人不名以别之突之出也位固非其位乃篡也突入于櫟將迫兄而出之謀再篡也故聖人名以見其惡其後衛衎自夷儀復得衛春秋書之以明衎之當有衛也鄭突居于櫟終亦入鄭春秋不書明突不當有鄭也得春秋之意故備録之冬十有一月公會宋公衛侯陳侯于袲伐鄭十有六年春正月公會宋公蔡侯衛侯于曹夏四月公會宋公衛侯陳侯蔡侯伐鄭自去冬迄今夏三書公會再書伐鄭不間以他事誅宋魯之輔篡而干正也人孰無義理之心忽之正突之不正皎乎如白黑方圓之易辨忽在外五年莫有仗義而復之者突甫入櫟五國之君翕然來會如蟻之慕羶蚋之集醯其故何哉蓋宋馮魯允以其所以篡者而輔人之篡不惟同惡相濟抑亦惟利是趨鄭之土田鄭之重器有以蕩搖其方寸故雖黨篡而隳義彼亦有所不恤矣蓋自東遷以後王章掃地人紀廢絶至是大亂之極黨州吁輔魯允成宋亂納鄭突傳所謂四逆四黨者其去於禽獸也蓋無幾矣幸二霸出而正之此風稍戢彼二霸者雖非純乎為義之人然猶欲仗義理以濟其權術如拂順助逆之事彼有不為矣嗚呼當桓莊之世其王霸之交乎王道熄而霸業興亦時使之然耳會于曹蔡先衛及伐鄭蔡序衛陳之下此蓋以兵之多寡而為先後耳不然何以會居先而伐居後班序變於俄頃哉舊史據實而書聖人存而弗革以譏宋魯擅廢周班倡亂而無紀也秋七月公至自伐鄭榖梁曰桓無會其致何也危之也范氏曰桓公再助篡伐正危殆之甚春秋幸其得歸而致之愚以為非幸其歸乃所以著其過也自去年十一月會而伐師未及息今年正月又會又伐歷三時之久乃歸暴師一年為是逆理悖常之事桓之惡亦稔矣已篡弒未討前既會諸侯于稷以成宋之亂此復合三國以輔鄭突之篡謂天下無王而敢為此也物極必復天討將加濼之禍且將作矣附見明年十月鄭昭為其臣髙渠彌所弒立公子亹又明年齊侯討鄭之亂殺子亹轘髙渠彌祭仲逆子儀于陳而立之春秋不書其後子儀死鄭突自櫟入春秋亦不書或以為缺文殆不然也蓋君不能君者於其弒也略之不書所以垂戒於後篡而得國者於其入也廢而不書所以示討或曰齊襄討亂併不書何耶曰春秋不以亂討亂也齊襄躬為獸行怙淫薑以弒其夫名教之大賊也十八牟夏賊殺魯君其秋乃師于首止為鄭人討亂已之罪當討而未討乃討鄭國之亂春秋削而不書不與亂賊以討亂云耳冬城向左傳曰書時也若以周正而言則此冬乃夏正之八月八月非水星昏正之時何以謂之時有以見左傳自不能守其周正之説周家四時十二月不改於夏此一證也或曰時則不書此何以書曰為城非其地將以啓釁故書以譏爾宣四年乃伐莒取向此城向必魯莒中間壤地相接處其名偶同立城於此必將以是召釁故春秋書以譏十有一月衛侯朔出奔齊公羊曰朔何以名絶曷為而絶之得罪於天子也榖梁之説亦同惟左氏具述所從來朔之父宣公躬獸行納急子之妻生朔朔與其母譖殺其兄而居其處因是有國衛人不義朔之所為左公子泄右公子職因衆怒逐之而立黔牟此朔所為奔也春秋不書所逐之人以朔殺兄篡國其罪固當逐是故名以奔之蓋討之也其後諸侯納朔而天王命子突救黔牟則知朔以有罪見黜於王而黔牟之立王實命之則黔牟不得謂之篡而朔非君矣十有七年春正月丙辰公會齊侯紀侯盟于黃案左傳以為平齊紀且謀衛魯紀甚睦魯為紀謀所以為自全之計蓋十餘年矣今齊僖死襄始立且將用師于紀故魯為會以平之猶曰恤患救鄰之義而魯桓為義之心不勝其為利之心方為紀求成乃因而謀衛謀衛者助朔而攻黔牟以抗王命為利謀耳義利不並行出乎此則入乎彼魯桓之用心既不能出乎正何以要齊侯之降心於紀為之解讐而戢兵乎故夏五月丙午遂及齊師戰于奚烏在其為盟也二月丙午公會邾儀父盟于趡翠軌切説者謂隱公立之始年即及儀父為蔑之盟桓公立十有七年始為是盟蓋隱公賢君也故儀父願相附於魯桓公篡國之君儀父惡而逺之八年為魯所伐十五年乃與牟葛俱朝至是始會而盟猶曰尋蔑之盟儀父之髙風雅懷不苟於有所附從是可見至秋桓遂偕宋衛以伐之隱之所善桓之所惡有以知其為人矣書公會儀父盟于趡魯欲親之而不可得也夏五月丙午及齊師戰于奚今年春魯及齊紀會盟于黃曽幾何日遽戰於此齊無信也魯桓自齊僖存時為紀有求及襄之立繼伸前請遂為黃之會盟襄不惟不從乃遽以兵加于魯襄之慢魯甚矣書及不書公為公諱也凡書及而不書公有為公諱者有惡其事而不欲書者隨事而觀可見六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡左氏謂蔡桓侯無子蔡人召蔡季于陳而立之公羊則以季為歸而非立何氏注封人無子季次當立封人欲立獻舞而疾害季季避而之陳封人死歸而奔喪思慕三年卒無怨心故賢而字之以獻舞與季為兩人左氏則謂季即獻舞諸儒多從公羊之説謂季以讓國而出獻舞既立季乃自陳來歸春秋所以貴而書之與閔元年季子來歸義同皆字而歸之褒之也獻舞失國之君蔡季讓國之賢春秋二人之賢否具見書法而左氏乃謂季獻舞為一人使賢者讓德隱而不揚愚竊惑焉木訥是左氏而非公羊舛矣癸巳葬蔡桓侯義已見隱元年公及邾儀父盟及三年宋公和卒春秋五等諸侯葬皆稱公惟蔡桓侯書本爵啖子曰蔡季之賢為之請諡于王故仍其爵凡請諡天子錫之䇿書為某侯史因而紀之東遷諸侯不請諡于王而僭稱公爵春秋因而書之臣子送終之不以禮也其論雖正然二百四十二年諸侯葬者皆稱公不應此獨異蓋公者諸侯在國臣子以是稱之美名也非爵亦猶大夫稱子死而皆繫之於諡美名之通稱者也以子之非爵而知公之非爵無可疑矣蔡桓侯之稱侯此簡册傳録之誤不必強為之説及宋人衛人伐邾義已見上盟于趡冬十月朔日有食之左氏曰不書日日官失之謂是日不書甲子為日官之咎此亦缺文耳然其説謂日官居卿以底日日官雖非正卿而其位望視卿所以重其事也後世為日官者僅同卜祝何以使之任底日之事必使士大夫明歷知天文者居卿以底日其職乃舉耳十有八年春王正月魯桓弒兄篡國至是十有八年天王不能討因而善之彼篡賊者亦忘其為篡久矣孰知亂自內作送死強鄰以迄天誅而春秋乃於是年始復書王正月者何哉蓋所謂王正月者春秋所以垂一王之法非時王之法也其賞善也為天命有德其懲惡也為天討有罪討而曰天乃物理之必至人事之當然雖假手於他人而實天討之所在天討行而王誅亦伸矣春秋為誅亂賊而作奉天討而明王法者也是以於正月之上復書王以正篡賊之罪而垂法於後世夫然後知不書王者十有四年春秋殆有深意論者以為衍文過矣是嵗由正月迄於嵗終惟書魯桓所以死不間以他事於此見聖人之經為誅亂賊而作公會齊侯于濼公與夫人薑氏遂如齊夏四月丙子公薨于齊丁酉公之喪至自齊案公羊夫人譖公于齊侯謂公嘗有言同非吾子齊侯之子也齊侯怒與之飲酒於其出使彭生害之齊與魯雖為婚姻之國盟會未幾而戰爭相尋蓋敵國也公一旦與薑氏如齊殆天所以致其篡逆之誅非人所能為也方子同之生人已疑為齊侯之子則齊襄淫亂獸行實兆於未君國之先而魯桓辨之不蚤以至此極蓋國君未有與夫人俱寧者也今魯桓敗度違禮挾淫艷以適他國遂送死焉春秋書公會齊侯公與夫人遂如齊公薨于齊先書會繼書與書遂書薨夫人之淫亂失道桓之死襄之殺併見而無以自隱矣秋七月冬十有二月己丑葬我君桓公賊未討而書葬公榖皆以為讐在外也愚謂賊苟當討不以內外廢也蓋桓之葬與隱異隱讓國之賢君而為悖弟亂臣所弒魯國臣子皆有討賊之義賊未討不書葬責臣子也桓篡國之賊魯臣子為隱復讐則桓在所討今而送死鄰國受斃艷妻自其身而言固為不幸自天討而言與州吁之死於陳子亹之死於齊陳他之死於蔡殆無以異魯之臣子尚不能為隱復讐則於篡賊乎何有故春秋誅薑氏葬桓公明桓之死與隱異也若曰讐在外而非臣子之責石碏之殺州吁又豈以內外而間乎雖然聖人為魯諱微見意而不盡其討賊之辭也誅薑氏葬桓公子同不書即位是聖人用法之深意也春秋初年魯為望國以周公魯公之威德在焉故也及桓公以篡弒得國務卑屈以逭諸侯之討魯自是始卑莊倚讐襄以自樹立魯益不振僖以權假季氏賢人君子無在位者自是國非其國降而愈下春秋集傳詳説卷四
