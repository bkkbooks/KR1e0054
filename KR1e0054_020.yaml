body:
  text: 春秋集傳詳説卷二十宋家鉉翁撰襄公二周靈王八年晉悼十年九年春宋災公羊作火公羊曰曷為或言災或言火大者曰災小者曰火內何以不言火內不言火甚之也外災不書此何以書為王者之後記災也左傳謂人火曰火天火曰災人之與天何以致其辨二傳所言亦強求其説耳蓋書災者正也書火者傳録之誤也外災所以書以來告故其不告者史亦略之而已矣夏季孫宿如晉五月辛酉夫人薑氏薨秋八月癸未葬我小君穆薑成之母襄之祖母穆薑始與僑如謀去季氏事不克為行父所幽在廢宫十餘年與鄭莊之母武薑居於城潁無以異也鄭莊雖有黃泉之誓未幾復為母子如初成與襄父子以暗庸相踵穆薑終為季氏所幽不得出以逮於死魯國之大曽無有如潁考叔之悟其君者畏季氏也傳謂行父取穆薑之喪具以葬齊薑虧姑而成婦其用心為可誅矣嗟夫行父幽穆薑宿取卞意如逐昭公自後世而言懿師昭之類也有國者其以是為戒冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲戲許宜切桓文之霸也皆有以大服諸侯之心諸侯心服而楚知所憚而不敢肆此所以霸也晉悼始立為宋圍彭城得其諸叛以歸義聲由是遠暢故鄭陳先後來歸有可霸之望及鄬之會不能為鄭討賊陳侯觀其無政逃去不盟晉之為晉亦可想矣尚何霸之足言乎夫不能救人之災恤人之患以伸其霸討惟欲強其從我今日而會明日而盟又明日而伐或一歲而再會再伐諸侯疲於奔命自文襄以來所未有也盟于戲鄭實未嘗服其載書曰自今既盟之後鄭國而不惟有禮與強可以庇民者是從而敢有異志者亦如之鄭固侮其無能矣師未出境楚人伐鄭鄭及楚平所幸吳子來會有以壯中國之威而褫鄭人之魄不然晉楚交兵殆未有巳也然則春秋猶以同盟書何哉曰此遍責諸侯之同乎是盟者也晉人不能為鄭討賊諸侯無忿嫉之心而猶預於伐鄭以為此盟是故書同以責之書伐鄭書同盟皆貶也非所當同而同者也楚子伐鄭胡氏謂善為國者不師善師者不陳善陳者不戰知武子明於善陳之法以佐晉悼公屢與諸侯伐鄭楚輒救之而不與之戰楚師遂屈得善勝之道愚謂此論雖美非事實也晉悼之失在於不能庇鄭而惟強鄭人以從己所幸吳師擬楚人之後楚不得以逞鄭卒服從今乃以善避寇者為善陳楚若不退鄭之存亡未可知也十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光會吳于柤義已見成十五年會吳于鍾離是會夀夢實來或曰柤之殊會固鍾離之前比尊吳所以抗楚也自是楚始知畏鄭亦來附春秋其與之乎曰春秋貴分而不貴勢貴義而不貴權尊吳以抗楚待吳以會王世子之禮屈分而從勢略義而從權春秋不與也故序會于戚吳以人進殊會于柤吳以號舉此春秋垂世之法也或曰不殊會而吳不至則將若何曰吳固願通於中國晉人當率之與俱朝王寵以王命而隆其爵秩彼將踴躍自勵以與楚敵雖不殊會可也夏五月甲午遂滅逼陽妘姓國祝融之孫晉人率中國諸侯會吳于柤為服鄭也為攘楚也壽夢甫預於會晉乃率之以滅逼陽嘗讀左傳至此殆不可曉及觀榖梁傳則曰遂滅逼陽不以中國從夷狄也范氏注時實吳會諸侯滅逼陽恥以中國之君從蠻吳之役也何氏注公羊亦曰惡諸侯不崇禮義為強吳開道以滅中國故疾録之觀公榖二説則知逼陽之滅蓋吳意也逼陽近於彭城乃吳入中國之路必吳人與之有怨而欲滅之非晉意也晉方會吳以謀楚乃以諸侯之師久頓逼陽而滅之曰以封向戌非事之所急實吳人之意而晉為之役如公榖之説可無疑矣春秋書遂滅逼陽責晉深矣公至自會楚公子貞鄭公孫輒帥師伐宋案傳鄭弒君者公子騑其執政也晉所以不敢加問何懼騑之勇於從楚而亂臣賊子反因是肆行罔所忌既動師從楚伐宋又伐衛且侵魯西鄙晉坐視莫如之何談春秋者亟稱晉悼之賢稽之於事不知其所以賢晉師伐秦春秋於楚鄭伐宋之後繼書晉師伐秦責晉也諸侯惟宋事晉最謹是以為楚所疾今宋人受兵晉不能急救猶可諉曰力之不及乃更出師伐秦秦雖與晉有憾孰若宋人受兵之為急乎置宋之急而治己之私春秋所以責也不書大夫帥師微之也秋莒人伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭世子序諸侯之上左傳謂晉悼三駕而楚不能與爭此其一也是役也鄭不服乃戍虎牢以逼之鄭暫及晉平楚師至即從之欒黶欲戰荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨而還遂還楚亦歸罃雖不武然其言如此可謂能自反矣蓋必有以制楚而後可以服鄭今望敵輒走而強鄭以必從晉之從政者亦妄而已矣然則厥咎安在曰鞍之戰鄢陵之役郤氏之功居多羣卿忌而陷之三郤既死於是無復以身殉國者每遇楚至則相率引避以為得計晉自是日削卿族日強陵僭之萌自悼而始齊世子光序於滕薛把邾之上晉為之也四國諸侯也國弱而卑齊強國也光復樹黨以伉其君故晉悼以前日諂諸大夫者而諂之序之四國諸侯之上紊周班以結強梗春秋不與也故直書以志其過義又見亳城北蕭魚冬盜殺鄭公子騑公子發公孫輒公子騑者子駟也案左傳弒鄭僖公于會賊其首也晉人謬為聾瞶以行姑息之政反為子駟所侮叛而服服而又叛視晉無有也至是惡稔罪盈假手于盜以迄刑誅春秋書盜殺公子而削其大夫之稱貶也騑為首發輒為從所以著弒君之罪終無逃於刑誅者耳或曰此逆人也何以不去其族曰盜實殺之討不以其罪也戍鄭虎牢城虎牢不書鄭今戍之而書鄭虎牢奪之於晉復以與鄭也虎牢內外之限前城虎牢而鄭服城之效也晉不能綏鄭以德又不能震楚以威用兵無寧歲及是以楚師方盛避而去之乃姑戍虎牢以蓋其避敵之羞故春秋奪之而歸於鄭楚公子貞帥師救鄭救固春秋所善也然施之於內與施之于外不同諸夏為外裔所侵陵同盟之國帥師往救春秋所善也同妵之諸侯叛而從楚盟主伐之而楚人救之非同盟之福也春秋何取焉夫春秋明內外之辨正冠履之防以尊周室攘僣亂則彼之救不救於我何有胡文定謂春秋善楚之能救殆不然也唐之叛將有乞援於蕃部而抗其君者與諸侯乞援於楚而敵中國者亦何以相逺即是而觀楚救之善不善可以坐判矣公至自伐鄭襄陵許氏曰書楚救鄭而致公知諸侯之避楚也避楚侵鄭不書諱也此説深得經意是役晉之諸卿自知不能避楚而侵鄭北鄙以歸其不潰敗者幸也論者以為善陳者不戰豈不誣乎十有一年春王正月作三軍左傳季武子作三軍三分公室而季孟叔孫氏各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征注使軍乘之人率其邑役入季氏無公室之征不入者倍征不入季氏者使公家倍征之設利病驅公民使歸己孟氏使半為臣若子若弟取其子弟之半四分其乘之人以三歸公而取其一叔孫氏使盡為臣盡取子弟以其父兄歸公不然不舍愚案作三軍諸説不同杜氏謂魯本無中軍惟上下二軍皆屬於公有事三卿更帥以征伐季氏欲專其民人故假立中軍以改作其説是矣但疏家又引魯頌閟宫僖公復周公之宇者云公徒三萬鄭氏謂大國三軍合三萬七千五百人言三萬者舉成數也以為僖公復古制作三軍矣至文公以來霸國以軍多而貢重遂自減為二軍至此復作三軍此亦揣摩而為説非有所本也愚謂魯頌所云公徒三萬公車千乘者出於詩人歌頌之辭當時未必果備三軍之制至此季氏乘襄公之幼弱盜竊兵權始作三軍盡改舊制以魯國丘甸卒乘為孟叔季之私有春秋書作三軍著季氏犯上作亂之漸實始作也蓋三軍者舊雖有之每遇出征則大夫帥之以行事已則兵歸於甸大夫不得而私也今析二軍以為三而三家各有其一為國君者僅擁虛器於上國非其國矣乾侯之禍權輿於此春秋書城費於前作三軍於後所以垂人臣負固擁強之戒夏四月四卜郊不從乃不郊義已見僖三十一年鄭公孫舍之帥師侵宋左傳謂鄭侵宋以致晉師且將從晉愚謂鄭欲從晉則俟晉至而盟之可也不待侵宋以怒之此受命於楚而侵宋耳是秋復從楚子伐宋一歲再犯宋境彼於宋何憾直奉楚命不得自己何必曲為之説公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北公羊作京城北左傳謂諸侯伐鄭觀兵于鄭南門鄭人行成秋七月同盟于亳城北以為鄭亦預盟諸侯反斾未及國而鄭復從楚與楚子俱伐宋自二霸以來百餘年間小國之叛服固不常未有若鄭人今日之從於晉楚蓋朝暮變不曰侮晉可乎良以晉之羣卿實出楚大夫之下鄭人窺覘其無能故來則從之去則背之實侮晉也然楚人內困於吳欲息肩而不可故鄭終服從於晉勢使之然悼與其諸卿何能為哉同盟義已見九年于戲公至自伐鄭楚子鄭伯伐宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會于蕭魚或曰自晉悼始與楚爭鄭今始得之鄭自是不復叛者二十餘年春秋其與晉以霸乎曰否舜文王聖人也所以自治者豈有未善當苗之未格崇之未下則班師而敷德修政而復伐務求其在我者安有十年用武困天下諸侯而毒一國必其服而從己而謂春秋與之乎曰舜之格苗文王之降崇帝王事也以此望衰世之君其亦難哉曰非為是也晉之於鄭亦頗有所愧乎鄭僖棄楚而即晉卻諸臣之請而從諸侯之會不勝其臣見弒而死晉明知之而不為討賊惟連兵伐鄭責鄭以必從夫亦當自反乎楚伐鄭無寧歲晉之諸大夫望敵輒走莫敢攖其鋒惟驅諸侯之人用之於鄭不能制楚之強惟欲責鄭以服夫亦知自反乎今楚人內懼於吳救鄭不力鄭知楚之不足恃是以叛而復來而晉有愧於鄭多矣更以服鄭為功而欲尸盟主之事乎齊桓在位四十餘年用諸侯曽不二三晉文在位十八年城濮大戰僅從齊秦宋之師至於末年不復再以諸侯伐國春秋僅與之以霸今悼公在位十五年無歲不興師律以春秋之法是當有黷武之罪何霸之足言乎或曰桓文之霸也少有不善則春秋人之厲悼之伐國春秋始終不去其爵何邪曰與之霸則責之也備此春秋待賢者之道直書其事而無所隱此春秋待衆人之道也蓋春秋以備書而無貶歲會歲伐春秋猶或貶之今也或一歲而再會再伐春秋備書其事而皆目其人貶之深矣先儒謂晉悼以至誠待人而鄭來服自是不背晉者二十四年吁悼之服鄭亦因其時而已矣使楚人不內懼於吳鄭雖欲不背晉可乎愚觀晉悼以聲音笑貌而結諸侯之強臣卑其君而抗其臣實諂道耳誠安在哉左傳雜引諸侯之史以示其博彼皆國之私史何足盡信學者當原聖人之書法傳辭不足惑也公至自會楚人執鄭行人良霄左傳諸侯悉師欲伐鄭鄭人使良霄如楚告將服于晉楚人執之啖子曰凡稱行人而執以其事執也不稱行人而執以已執也許氏曰書執良霄見楚力盡於此矣冬秦人伐晉據左傳秦人伐晉以救鄭為楚也士魴禦之為秦所敗春秋略敗而不書不與秦人之為楚而救鄭也十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆榖作邰榖梁曰遂繼事也受命而救邰不受命而入鄆惡季孫宿也公羊曰大夫無遂事此其言遂何公不得為政也何氏謂季宿取鄆以自益也或曰大夫出疆有可以安國家者專之可也春秋之不與季氏何哉曰此春秋用法之變不可以例言者也宿始繼其父即首城賜邑繼而作三軍取公室之丘甸以為己之私有今而救台遂事入鄆取邑以自廣其心非為國也是故春秋雖許大夫以出疆遂事於季孫特變文而示戒抑權姦也夏晉侯使士魴來聘秋九月吳子乘卒壽夢也公羊注以為賢季子始卒其父非經意也楚方盛而吳獨能與之為敵有功於中國甚大是故春秋特卒之壽夢之嗣子諸樊讓國於少弟季札季札辭之兄弟更讓不以傳其子是雖太伯之遺化而壽夢所以齊其家訓飭其子者從可想矣餘義見二十九年季札來聘冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿公作詩內滅國義已見隱元年無駭入極此魯滅國也內滅國書取公羊以邿為邾邑左傳謂邿小國有亂分為三師救邿遂取之今從左傳春秋雖為魯諱書取不書滅然亦責晉人之無討也秋九月庚辰楚子審卒共王也康王立冬城防十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人會吳于向義已見成十五年會鍾離襄十年會柤是會也左傳謂吳為楚所敗會于向為吳謀楚范鞅數吳人之不德而退之甚哉晉人之逐利而忘義也急而求吳以抗楚也緩而退吳求以內交於楚也自是吳雖與晉作疏然其與楚也兵連已久勢不得為之下更勝迭負四五十年楚無一日之寧居晉所以服鄭而楚不能與之爭實隂受吳之賜不然晉悼君臣雖欲避楚而苟安有不能得也內大夫未有二卿俱使者此叔老與季孫俱得書志二卿之不當並行也左傳謂自是晉人輕魯幣而重其使恐非春秋所以聯書之旨晉亦未嘗加重魯使二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦晉悼用十年之力率中國諸侯爭鄭于楚僅乃得鄭而又率之伐秦其勞諸侯而敝中國前所未有也蓋荀罃嘗持兵禦秦有櫟之敗至是荀偃以諸侯之師出欲刷前恥而罷愞之佐強梗之大夫率之而不能進鼓之而不可作濟涇而次不得秦成遂大潰以歸自秦晉交兵五六十年出師無紀未有甚於此者據傳荀偃下令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶下軍帥也乃曰晉國之命未是有也余馬首欲東乃歸衆於是皆還偃為大將而其下擅引兵以還失律甚矣是行晉悼待於境上而諸帥略無所稟姑息之弊也晉自是始不能軍日趨於削奚其為霸己未衛侯出奔齊衛侯衎獻公也此孫林父寧殖作亂而逐其君杜氏注左傳云諸侯之䇿皆書孫林父寧殖逐君春秋以其自取奔亡故不名逐君之賊先儒或有取焉愚竊疑之蓋君雖不君而臣不可以不臣林父以其私怒作亂逐君乃謂春秋歸過其君置賊於不討是豈聖人意乎蓋春秋於弒君賊則明著其誅死之罪於逐君賊則每垂人君失馭之戒故多以自奔為文只以衛事而言林父者自衛定公時以罪奔晉挾盟主之令而返其國跋扈之萌已兆於此時衛獻繼世不深思按御之道防患於未萌乃又從而激之方其命師曹歌巧言卒章吾謂其必有以為先事之備及林父稱兵犯上一朝殺四公子衛獻請盟不從遂委宗社以出其不能君甚矣春秋以自奔為文者著人君失馭之戒非謂林父所為為是歸過其君略賊氏名而不書也春秋自林父歸衛至入戚以叛具書不遺皆所以討也此雖書衛侯奔而不以名書見君之過微賊之罪大非謂林父猶有可原之情也若夫師曠所以告晉侯者彼為其君諷耳安可以此律春秋之法胡氏責君太過恐非聖人垂訓之本旨莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚愚觀春秋經而知晉悼心術之微矣邢丘之會國君在而奬其臣彼謂諸國之權皆在大夫是故以諂其大夫而陵替之漸遂遍於中國至戚之會而其心術之微者著於事矣孫林父逐君賊也乃使之得預於會是奬其逐君而教諸侯之大夫俾胥而為逆吁其險哉自悼用師于鄭衛衎無會不在無戰不從今為其臣所逐晉當會諸侯納衛君誅孫寧以伸霸討乃盟主職分之所宜為既不能然反聽賊臣立君已為會以定其位前既置鄭賊而不討此復奬衛盜以成其篡此豈特桓文之所甚惡楚雖無道猶未至隳壞名檢苟以恱人若晉悼君臣之所為也説經者惑於左傳之浮辭過為稱譽愚稽之於事質之於經可褒者不二三可貶者十六七而其罪之最大者奬鄭駟扶衛林父尊魯季氏亂人君臣之分苟焉以盟主自居左傳與之而春秋實不與也或曰自入春秋諸侯之輔篡黨逆者多矣子何獨責一悼公乎曰桓文之未興也固多輔篡之人逮齊晉繼霸此風頓息今悼身為盟主威不足以震強暴德不足以懷小弱惟黨篡輔逆以媚道結諸侯之強大夫霸政自是始壞猶得謂之賢君乎義又見襄二十六年澶淵之會十有五年春宋公使向戍來聘二月己亥及向戌盟于劉聘而為盟義見七年諸侯之大夫聘而為盟者有矣今向戌來聘公及盟于劉出國都而與之盟於禮為伉然臧孫嘗及晉侯盟于赤棘晉欲懷魯不嫌其伉也劉夏逆王后于齊公羊曰劉夏者何天子之大夫也劉者邑也其稱劉以邑氏也外逆女不書此何以書過我也左傳曰官師從單靖公逆王后于齊卿不行非禮也注官師劉夏也天子官師非卿也劉夏獨過魯告昏故書劉不及單禮天子不親昏使上卿逆而公監之故以卿不行為非禮愚案桓八年祭公來遂逆王后于紀謀之於魯也今劉夏逆王后與單公俱行而夏獨至魯其亦詢度而後往歟周天子每有昏姻之事多以命魯單公為逆王后而出不當更適他國故使其屬來有所咨訪春秋非譏其來譏其以官師而行卿事言王使之不當夏以官師而尸卿事夏亦有罪焉耳是故以名書春秋厯十有三王書逆后凡再祭公譏遂事劉夏譏非卿其合禮者不書夏齊侯伐我北鄙圍成公救成至遇齊於魯本無憾忽以兵加魯自是四年之間北鄙再被其虐左傳以為齊欲叛晉故侵魯以致晉師其説是矣愚謂魯本非弱國所以不能強於自治無臣也無民也四鄰交侵莫知所以為計也自季氏專政務豐植其私門城費矣又取魯國之丘甸卒乘自歸其私於是魯君拱手於上邾莒交侵齊亦見間而起譬之百金之家猶足自植而盜起於內莫知所以制之則外寇之來亦付之無可奈何而已書救成至遇譏可進而不能進也季孫宿叔孫豹帥師城成郛前書齊侯圍成公救成至遇言救之之緩而成為齊所毁也此書二大夫帥師城成郛城之於既毁之後也寇之未至也無先事之備及其見圍救之又緩逮其亡去乃帥師而城之魯之所以自治其國者於此可見矣秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒悼公也平公立十有六年春王正月葬晉悼公晉厲以剛愎而殞其身考之於經猶有可書之事晉悼以和謹而得終譽考之於經實多可指之疵諸儒或未之察也鄭人弒君于會而不能為之討賊惟黷於用師責以必從衛孫林父寧殖逐其君而立剽不能為之明正典刑反列林父于會而為之定新君之位奬弒君賊春秋所貶也輔逐君賊又春秋所誅也至於隆諸侯之大夫俾伉其君于會自禍其國又禍人之國皆晉悼之為也桓文以尊王而植霸業悼自得國曽不見其以尊王為事何霸之足言最後蕭魚之會受鄭人工師女樂之賂而左傳更以為美談良可怪也夫諸侯以伐鄭之故轍不及息者十餘年今受鄭賂分以賜其臣曰子教我和諸戎以正諸華今享其成願與子分之鄭之服楚之屈於和戎果何關乎不曰諸侯之功而曰和戎之效其謂諸侯何吁晉悼而不死吾不知其所以終三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁戊寅大夫盟溴古闃字公羊曰諸侯皆在是而書大夫盟信在大夫也何書乎信在大夫遍刺天下之大夫也君若贅旒然榖梁曰溴梁之會諸侯失政也諸侯會而大夫盟政在大夫也大夫不臣也公榖之義盡矣夫信在大夫由權在大夫也權在大夫始不過用於其國中既而預於盟會伉其君則霸主實許之以伉也雞澤之會大夫始盟袁僑猶曰君盟其君臣盟其臣未甚失也邢丘之會國君在而與其大夫為盟奬臣以伉君也至是會則君不盟而大夫自為盟彼謂權在大夫則信在大夫矣大夫既盟則國君可無盟崇大夫而卑其君甚哉晉君臣之任術而不誠也平公孱君豈知為此此皆厥考悼公與知范諸人之所為豈惟諸侯病之三家所以分晉實造端於悼平之世或曰孫寧逐衎而立剽衎君也剽篡國賊也自是剽以爵而預於會春秋其與篡賊以為君乎曰此以著其篡國之罪耳衛侯鄭之奔也叔武攝位不敢以君位自居故春秋如其志而書衛子今剽也受國於賊臣即以君位自居而預於盟會故春秋亦如其志而書衛侯以著其篡竊之罪為異日見殺之張本餘義見二十五年衛侯入于夷儀晉人執莒子邾子以歸邾莒數侵魯疆魯訴之於晉晉人為之執之邾莒信有罪矣而魯之滅邿何獨無討乎豈惟滅邿當討而晉之滅逼陽不當自反乎但知責小國之相侵而不知自反於義愚以為邾莒力雖屈而心未必服也況執諸侯不以歸京師而執以自歸是無王也春秋書以貶晉齊侯伐我北鄙義併見明年秋齊帥師兩伐夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許據傳許男請遷于晉諸侯遂遷許許大夫不可晉人以諸侯之師伐之鄭子蟜聞將伐許遂相鄭伯以從諸侯之師春秋之書之貶也始晉人謀遷許將以全安之也今而伐之又聽鄭伯以其師從鄭與許為仇晉以鄭師伐許將全安之乎抑覆亡之乎春秋以鄭先晉誅鄭也亦責晉也秋齊侯伐我北鄙圍郕大雩冬叔孫豹如晉齊高厚既逃溴梁之盟一歲之間再以師伐魯欲致晉而與之戰其志在於求霸而已矣齊固無狀而魯之不能亦甚矣齊大國也魯亦望國也齊敢於伐魯魯豈不能禦齊而豹之告晉者其辭窮迫有朝不及夕之慮國無人焉耳春秋於齊侯圍成之後書叔孫豹如晉著魯人不為自治之計事急則求於晉以是而存亡定傾亦甚可鄙矣春秋集傳詳説卷二十
