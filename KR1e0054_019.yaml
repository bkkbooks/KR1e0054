body:
  text: 春秋集傳詳說卷十九宋家鉉翁撰襄公一名午簡王十四年即位母定姒成公妾是歲晉悼二年元年春王正月公即位仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城左傳曰非宋地追書也杜注成十八年楚取彭城以封魚石故曰非宋地夫子作春秋追書繫之宋胡文定亦曰圍彭城者魯史舊文圍宋彭城者仲尼親筆其義正矣愚謂繫彭城於宋者不與楚以得彭城也魚石自宋奔楚楚以兵納之彭城則彭城既為楚所得矣由常情而觀必謂彭城已非宋之有春秋正名之書於魚石則曰宋魚石於彭城則曰宋彭城不以列國叛人列國境土而屬之於楚所以辨逆順內外之分也書諸侯之大夫圍宋彭城褒之也為宋圍彭城而不私其有同盟之義也晉悼公在位十五年惟此事可書故當時諸侯翕然歸之外是實多可疵論者惑於左傳之浮辭譽過其實甚者以為悼優於文襄讀書不具眼其弊至此具論於下夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人把人次于鄫齊桓公糾合諸侯不以兵車最後次于召陵問楚之罪不戰而楚服矣晉文自城濮一戰之後未嘗輕用諸侯之師霸者豈以屢戰為功聖人亦不以屢戰而許人以霸晉厲既勝于鄢用師不戢以逮於亡悼之立自當息民安諸侯先為自治之計伐鄭非所急也今彭城之師始班而伐鄭之役繼起自此以後十三年之間十以諸侯之師伐鄭或連歲而再舉或一歲而兩興師既得鄭又伐秦諸侯之大夫無寧居之日齊桓晉文之用諸侯不如是之甚也至於輔强臣以抗其君奬篡賊以成其亂自是而後中國之政皆自大夫出其君拱手而不敢問篡弒相踵晉悼實啓之儒者惑於左傳之浮辭而不原春秋書法此最讀經一大病耳餘義見雞澤邢丘溴梁及晉悼之卒秋楚公子壬夫帥師侵宋楚納宋之叛人悖於義也晉以諸侯之師克彭城執五叛以歸伸霸討也楚不知自反復以兵加於宋將以雪前恥而恥益甚焉左傳以為侵宋救鄭其實不專為鄭是以春秋不書九月辛酉天王崩簡王也靈王立邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘案禮曽子問諸侯相見揖讓入門不得終禮廢者幾孔子曰六天子崩太廟火日食后夫人之喪雨霑服失容則廢今天王崩而諸侯講朝聘之常儀不異平日無王也泰山孫氏曰天王崩邾子來朝衛侯使公孫剽來聘晉侯使荀罃來聘皆不臣也左傳乃曰衛子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉知朝聘之為禮而不知喪王之禮為尤重此左傳之失也杜元凱為說以通之曰未聞喪故得行朝聘之禮考以其時王赴亦當聞於中國久矣春秋繼王喪而書朝書聘朝者聘者受之者皆當有誅孫泰山之義正二年春王正月葬簡王杜氏曰五月而葬速也自入春秋葬天子不書義已見隱三年其有書崩書葬者或以譏其緩或以譏其速或以魯奔會不如禮而書以責之鄭師伐宋義見下鄭伯睔卒夏五月庚寅夫人姜氏薨左傳以為齊姜成公夫人襄之嫡母齊氏也春秋書夫人姜氏薨以著定姒之非嫡春秋於魯先君之妾母不容黜其僭號每微見意焉齊姜與定姒並書卒葬而嫡妾之分見矣餘義見四年七月定姒薨六月庚辰鄭伯睔卒自晉楚爭鄭以來鄭之從楚猶有不獲已之心惟睔也背夏最勇從楚最堅之死靡悔其言曰楚君以鄭故親集矢於其目非異人任寡人也夫楚共所以力戰而不能戢亦自為爭諸侯計夫豈為鄭故而睔之言若此甘於從楚者也春秋特去其葬晉師宋師衛寧殖侵鄭伐喪春秋之所甚惡也他人伐喪猶欲盟主仗義以正之而況為盟主而伐人之喪者乎晉侯始立伐鄭諸侯有鄫之次今復乘鄭之喪而侵之失其為盟主之道矣其後鄭人弒其君而從楚以伐喪為說晉何以辭其責春秋繼睔之卒而書三國伐鄭貶其動大師伐人之喪也衛寧殖獨書名范氏述榖梁之意曰初衛侯速卒鄭人侵之故舉寧殖之報以明稱前事木訥乃謂晉欲得鄭固無問其伐喪此以後世權謀智詐而律春秋鹵矣秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚義并見下城虎牢己丑葬我小君齊姜義已見五月姜氏薨叔孫豹如宋冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢自秋及冬再㑹于戚春秋備書以見晉政之繁然遂城虎牢則春秋無譏也自晉厲季年不務德以懷諸侯惟汲汲㑹伐鄭晉悼繼之用師無寧歲幸而魯有賢大夫孟獻子首建虎牢之議控扼險要以制鄭之死命鄭於是始屈蓋力屈非心服也春秋何取焉曰春秋辨天下內外之分者也虎牢諸夏之藩表得之以興失之以亡內外之限界在焉邑雖繫於鄭險則關乎中國故城虎牢不繫之鄭明虎牢非鄭之所宜有也鄭之封疆嘗受之天子曷以不繫之鄭乎曰鄭叛而從楚以天子之侯度甘為楚屬辱天子之封守罪當削書諸侯城虎牢不曰鄭虎牢削之於鄭也削之於鄭曷以歸乎歸之於中國也歸之中國所以正天下內外之分故書曰遂城虎牢蓋舊史書城鄭虎牢聖人削之書城虎牢故曰春秋非聖人不能修楚殺其大夫公子申義備見五年楚殺壬夫三年春楚公子嬰齊帥師伐吳吳楚交兵久矣春秋不書至是始書此著天下迭為盛衰中國安危存亡於此乎係也楚自成穆始憑陵諸夏至於莊而其焰益搧而晉之霸業及是乃衰幸而吳日以大為楚之內梗諸夏得以小康以吳故也晉悼公之興適當斯時以服鄭而楚不敢爭者非畏晉也以吳人之議其後也自周東遷大勢已去天為生二霸以整頓之霸政既弛而大伯之後繼興相與扶持姬籙以不墜於地天實為之豈偶然哉厥後吳亡而春秋終晉大夫篡其君而周不復可興矣公如晉夏四月壬戌公及晉侯盟于長樗公至自晉杜注晉侯出其國都與公盟于外也諸侯會盟不於其國都而必盟於外謙也魯君以童稚之年往朝於晉悼公於其歸也出長樗而與之盟勤於用禮故春秋書以美之六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟是㑹也鄭服而陳亦來㑹之盛者也而其失有二盟大夫也盟王人也盟大夫大夫張也盟王人諸侯僭也故雖盛會而有貶辭諸侯盟于雞澤既盟而陳侯使袁僑如會受而禮之需其君至而及之盟雖後會可也乃以一袁僑之故命諸侯之大夫别為之盟君盟於前臣盟於後不足以結袁僑實開大夫伉君之漸榖梁謂雞澤之盟大夫張諸侯始失正得經意矣葵丘踐土天子之宰在焉不下預諸侯之盟也翟泉柯陵屈王人共歃春秋皆譏晉悼欲植霸業而不能以尊王為事俾單子下預列國之盟諸侯僭王人大夫僭諸侯一舉而二失隨之書同盟非所當同而同也或曰先儒以同外楚而書同其然歟曰時有不同未容執例以為同也當晉積弱之世楚焰方張諸侯預于夏盟曰同外楚可也自鄢陵既勝楚人內困于吳諸侯之從晉者畏威而同盟謂之非譏不可也或曰陳鄭久叛而來服其不謂之同乎曰此厲之所為而悼享其成耳晉自邲敗幾不能以國厲之始立躬擐甲胄率先羣卿以與楚戰鄢陵之勝不在城濮下又會吳楚交兵收吳人與之盟遂斷楚之右臂其立志實未可量而器小易盈驕以取敗悼繼之未幾陳鄭來㑹鄢陵一戰之功也其後三駕而楚莫能與爭本無他技特以楚人內困於吳自救之不給是以置鄭於不爭正如漢武用兵胸奴海內為之虛耗宣帝坐享其成見謂中興之主若以呼韓欵塞盡為漢宣之功則不然耳世人以成敗論事毁厲過刻與悼過優而春秋書法公若權衡讀者識之或曰盟于女栗及蘇子也而不書同盟于洮于翟泉會王人也而不書同此盟王人而書同何也曰女栗之盟魯公自及蘇子非衆盟也故不言同然不書公及不書王命則譏也于洮之盟王室有難而為此盟故不以同盟為譏翟泉則王人及諸侯大夫盟于王城之內王不能正之以禮王亦有責焉耳故不書同盟義又見僖二十一年于幽成五年蟲牢十七年柯陵襄二十五年同盟于重丘秋公至自會冬晉荀罃帥師伐許四年春王三月已酉陳侯午卒胡文定謂午襄公名也孔子作春秋在哀公之世襄公乃哀之皇祖考曷為不諱夫子兼帝王之道參文質之中見之春秋如莊公名同而書同盟僖公名申而書戊申定公名宋而書宋人與襄名午而書午之類從其質也愚謂夏殷以前不為諱周人以諱事神始為之易名之典廟中稱諡不稱名乃所以諱外是初無所諱詩書不為文武諱是其明證至於衰世無所往而不諱如申繻答桓公之問晉廢司徒宋廢司空魯廢具敖二山皆臣下以陷為忠非盛時之制也檀弓云既卒哭以木鐸狥曰舍故而諱新此以神事之故於其死而為之諱未聞生者而為之諱而況於嫌名則諱二名則偏諱如後世之所為此皆戰國亡秦之弊典律以春秋之法則在所當革也夏叔孫豹如晉秋七月戊子夫人姒氏薨公作弋氏或曰此成公妾襄公母非嫡夫人也自齊姜卒而定姒始僭夫人之稱春秋何以無譏曰先君夫人一而已矣春秋既於前年書夫人姜氏薨葬我小君齊姜以明成公廟有兩夫人兩小君以著襄躋妾母配先君之罪不加貶而義自見謂春秋無貶不可也葬陳成公八月辛亥葬我小君定姒冬公如晉陳人圍頓左傳楚使頓間陳而侵伐之故陳人圍頓頓楚之使也陳人既遣袁僑如會故為楚所惡陳之圍頓為中國也春秋著陳人之從中國故書凡書圍皆貶此以中國之與國而治荆楚之屬國則非貶讀者謹之五年春公至自晉夏鄭伯使公子發來聘叔孫豹鄫世子巫如晉榖作繒公羊曰外相如不書此何以書為叔孫豹率而與之俱也曷為率而與之俱舅出也莒將滅之故相與往殆乎晉殆猶言疑而讞取後乎莒也莒女有為鄫夫人者欲立其所出也左傳則以為魯請屬鄫于晉故偕鄫世子以往二說未知孰是然公羊之義必有所從授春秋因鄫莒之事以垂異姓涖後之戒餘義見莒人滅鄫仲孫蔑衛孫林父會吳于善道公羊作善稻案左傳吳子使壽越如晉辭不會于雞澤之故且請聽諸侯之好晉將為之合諸侯使魯衛先會吳且告會期故孟獻子孫文子會吳于善道甚矣夫晉人求吳之急也求之急故用禮過於卑而有所不憚然內外之辨內外之分斷斷乎其不可紊也故吳以號舉不與晉之虧禮而求吳也秋大雩楚殺其大夫公子壬夫案左傳楚人討陳叛之故以為令尹子辛實侵欲焉乃殺之前日殺公子申曰多受小國之賂今日殺公子壬夫又以侵欲於陳而使之叛楚猶有政二大夫不得為無罪但連歲殺大夫用刑過慘春秋不與也故皆稱國以殺乃若晉景之殺同括晉厲之殺三郤皆為讒邪所陷殺人雖多而晉國日趨於削殺非其罪也楚之用刑雖慘而國猶能强豈非權出於上猶有辭於殺歟公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚或曰內外有辨春秋所以垂法前此及戎狄會盟春秋未嘗無譏今會吳于戚進而人之何歟曰義之所可與也勢之所宜交也吳太伯之後無可外也以其僭王之號而外之今吳請預于會春秋矜其為太伯之後而收之以附於諸侯之末義之所當與也中國之人同欲外楚吳與楚連歲交兵其外楚之心與中國諸侯同之又勢之所宜交也故戚之會吳始書人進之也吳可進而春秋進之無傷乎內外之辨其後吳卒去僭號同於中國諸侯春秋進之自此始公至自㑹冬戍陳義并見下救陳楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月公至自救陳戍者戍之於無事之時救者救之於被兵之日戍陳矣而又救之春秋書以善晉也公羊曰孰戍之諸侯戍之不言諸侯離至不可得而序故言我也穀梁曰內辭也以為魯獨戍之恐不然蓋戍之者諸侯也救之者亦諸侯也前是有戍者救者今晉悼既以諸侯之師戍之及楚師之來以戍為未足又動大兵往救焉書戍書救褒也辛未季孫行父卒義見文十六年晉人執行父舍于苕丘又見襄九年穆姜薨六年春王三月壬午杞伯姑容卒夏宋華弱來奔據左傳華弱與樂轡少相狎長相優又相謗也轡以弓梏華弱於朝平公見之曰司武而梏於朝難以勝矣遂逐之司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐樂轡春秋不書轡奔著宋公用刑之不能平也秋葬杞桓公滕子來朝莒人滅鄫公穀大條貫數十皆洙泗高弟親聞之聖人以授其門弟子惟公穀有傳於後如莒人滅鄫亦其一也周衰倫教不競有以他姓為繼嗣者滅人之國而人自以為非滅如鄫事者往往有之聖人特於此垂訓焉諸儒多從左氏之說謂莒實滅鄫是時晉悼主夏盟豈有莒人滅同盟之國而全置不問愚以為當從公羊之說庶不失聖人因事垂法之意冬叔孫豹如邾季孫宿如晉十有二月齊侯滅萊或曰滅國惡也而齊以爵書何歟曰有以爵書為褒者有以爵書為貶者隨事而可見滅國惡之大者而目其君所以誅也齊為無道利人之土地殘暴而賊虐之必為滅之之計萊未嘗有犯於齊也目其君書曰齊侯滅萊責之深矣尚何爵之有哉七年春郯子來朝夏四月三卜郊不從乃免牲義已見僖三十一年左傳桓五年著例曰啓蟄而郊兹又述孟獻子之言曰吾乃今而後知有卜筮郊祀后稷以祈農也故啓蟄而郊郊而後耕今既耕而郊宜其不從杜注於桓五年及今皆曰啓蟄者夏正之正月祀天南郊疏家引夏小正正月啓蟄其傳曰言始發蟄也漢氏之始猶以啓蟄為正月中雨水為二月節及太初以後更改氣名以雨水為正月中驚蟄為二月節以迄于今其實古驚蟄在正月始雨水則在仲春以是知啓蟄而郊郊必在夏正正月者周制也左傳謂周人以建子為歲首而啓蟄之郊必以夏正之正月此又周家四時十二月次一用夏正之明證也然周禮冬日至禮天神於地上之圜丘郊特牲亦曰郊之祭也迎長日之至大報天而主日此又南至之郊周人蓋兼舉之說者謂夏正之郊以后稷配南至之郊以帝嚳配皆報本反始之義不專為祈農也孟獻子之言與月令之制皆以孟春祈榖為說蓋以啓蟄為東作將興之候故目夏正為祈穀之郊亦無害於義大率經傳一歲而祀天者三南至也孟春也季秋大饗也南至專主報本而孟春季秋以祈焉以報焉聖人制禮之意其在是乎若夫魯人僭郊初無定時卜吉而後舉行是以羣公之郊有先後早晚之不同春秋因其卜之不吉以示戒云耳禮記又載孟獻子之言謂正月日至可以有事於上帝七月日至可以有事於祖此又以周正之建子月為春建午月為秋古有冬夏至者矣未聞有春秋至者也此恐非孟獻子之言與傳所載啓蟄異矣禮記中似此多出漢儒之傅會小邾子來朝城費或曰左傳謂季孫行父相三君無衣帛之妾無食粟之馬無藏金玉無重器備而厥嗣甫得襲爵即首以城費為事父子所為何相逺至是乎余曰不然行父之亷之儉信如傳者所言則當遠權而弗即舉魯國賢人代居已之處請于君飭其子毋使預聞魯政夫然後得為忠今而身死子繼首城其賜邑是將以伉君而專國宿之罪大矣行父亦有責焉春秋書城費以著季氏犯上作亂之漸義己見成十七年晉人執行父秋季孫宿如衛八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟列國之大夫相聘因為之盟非伉也蓋自霸國之興諸侯惟事盟主魯衛宋鄭不相朝也其為盟又與盟主偕盟列國之君復不自為盟也不相朝不自為盟故因大夫來聘而尋盟是不為伉楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侵曹伯莒子邾子于鄬鄭伯髠頑如會未見諸侯丙戌卒于鄵陳侯逃歸榖梁曰鄭伯將會中國其臣欲從楚不勝其臣弒而死公羊曰此大夫弒之曷為不言大夫弒之為中國諱也曷為為中國諱鄭伯將會諸侯于鄬其大夫諫曰中國不足歸也則不若與楚鄭伯曰不可其大夫曰以中國為義則伐我喪以中國為彊則不若楚於是弒之左氏則以為子駟自以其私憾而弒君疏矣嗟夫子駟之惡極矣君有善謀沮之不得而遂動其惡其罪直不容死而要之其必有所授矣鄭伯雖死不失為列國之諸侯陳侯既逃遂終為外裔之役屬以逮於亡春秋比而書之一衮一斧較然可見而晉人黨姦庇盜之罪亦無以自逃矣或曰雞澤之會鄭伯至而陳亦來今會于鄬鄭伯死而陳亦去何邪曰觀公榖之書鄭事與左傳之書陳事而春秋書法見矣蓋鄭之見弒陳之所以叛也榖梁謂鄭伯將會中國其臣欲從楚不勝其臣弒而死左氏書陳事亦謂陳之執政有二慶者與楚人謀使公子黃如楚而執之道告于會曰楚執黃矣君不來羣臣不忍宗廟社稷懼有二圖陳侯逃歸是陳與鄭之臣皆不樂其君之從晉或以弒或以劫一朝俱往斯固其臣之罪然亦目見從晉之無益也是亦晉之恥亦晉之責也鄭賊之不討陳侯所以逃也使鄭之賊臣弒其君於國中晉之君臣猶可謬為不知以自解今弒之於如會未見諸侯之先謂晉而不知不可也知而不討其失政刑甚矣由晉之羣卿皆前日弒厲之餘孽內有所慊是以置鄭賊而不問諸侯如會見弒於其臣此中國一大變也而悼乃邈然若無所知恬然略不介意何以慰鄭僖九原之憾而服在會諸侯之心陳侯觀晉無政君臣相與謀逃之而歸鄭伯之死陳侯之逃其實一事耳公羊何氏注鄭伯欲與中國卒逢其禍諸侯莫有痛疾之心陳侯於是懼而逃歸書以刺中國之無義此數語深得經意春秋於此一事責晉為深書曰鄭伯如會未見諸侯卒于鄵所以明正晉人失賊之罪黜其霸而同之於諸侯也繼鄭伯之死而書陳侯逃歸著陳侯之逃為晉無政而逃使晉人能為鄭討賊陳侯必不無故而逃盟春秋責晉之旨極為明著諸儒雷同稱譽許晉悼過其實失春秋垂訓之旨矣八年春王正月公如晉夏葬鄭僖公公羊曰賊未討何以書葬為中國諱也義詳見上鄭人侵蔡獲蔡公子燮鄭人之弒其君所以說楚也乃復出師侵楚之與國何哉蓋晉人僞為不知鄭之弒君者從而撫之鄭亦僞若不欲從楚故侵蔡以求說於晉此皆以僞相從耳鄭之為僞姑以逃晉人之來討晉之為僞亦苟焉而已矣身為盟主不能救人之災恤人之患以討殘賊以大服天下之心乃欲掩藏覆護苟示羈縻豈不為鄭人所鄙笑乎春秋書侵書獲蔡鄭皆不與也蔡甘於從楚鄭僞於從晉夫豈春秋所與乎季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘君在而大夫為會榖梁曰君在而大夫為會見魯之失正也泰山孫氏曰邢丘之會公在晉也晉侯不與公㑹而與季宿會襄公微弱政在季氏故也晉為盟主棄其君而與其臣何以宗諸侯晉侯之惡亦可見矣愚謂此一書而三示貶也以霸主之尊而會諸侯之大夫諂也是時諸侯之大夫皆怙權以陵制其上正望盟主有以裁之乃復諂而與之㑹鄭人弒君不為之討賊更使新君立於衆大夫之間魯君身在晉而復會季氏奬其臣而卑其君遂使季日益橫魯日益削凡皆晉悼之所為而春秋之所深貶也自入春秋百五十年未有國君在會而大夫亦預於盟者雞澤之不戒而邢丘抑又甚焉晉悼務以聲音笑貌恱人而悖義害禮有所不恤亦由晉之羣卿以其所以專晉者而施之他國遂亂人君臣之分至於溴梁而濫觴者滔天矣愚故謂春秋未嘗與晉悼以霸公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭始鄭人弒其君於會以說楚也既而侵蔡欲以自結於晉論者謂其介於二國之間苟為自全之計然其從楚者本謀也其未遂與晉絶者僞也子駟之徒志在從楚楚至而服惟恐其後矣使晉人能為鄭討賊駟可戮貞可卻而鄭之與陳先後偕至矣晉悼諂以媚其大夫復諂以結諸侯之强大夫當為者不能為當正者不能正當討者反與之厚霸國之紀綱至是而盡替徒以吳壽夢乃心中國故楚人稍知所畏憚鄭卒來歸外是豈有一事之可稱哉讀春秋勿為左傳浮辭所惑晉侯使士丐來聘春秋集傳詳說卷十九
