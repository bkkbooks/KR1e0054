body:
  text: 春秋集傳詳說卷三十宋家鉉翁撰哀公下周敬王三十二年晉定二十三年八年春王正月宋公入曹以曹伯陽歸此宋滅曹也而春秋不書滅乃從魯入邾之例何邪諸家多據左傳為說不責宋之滅國而强求曹人之罪為一入字故耳蘇氏謂宋公入曹而不書滅曹如執虞公之例言自滅也胡文定從之吁曹小國也朝夕自保之不暇豈容怙惡不悛如虞公之所為彼公孫彊者雖冒犯不韙亦無顯然可書之罪謂之自滅不亦寃乎宋為不道滅人之國不責宋而責曹是豈聖人修經之本㫖乎嘗反覆而觀竊意聖人所以書入而不書滅猶有望於當時諸侯能舉方伯連帥之職治宋之罪如齊人所以伐魯存邾者故下文即書吳伐我齊人取讙及闡歸邾子益于邾以邾之得復亦望曹之得復是故未遽以滅國書乎是時鄭救曹與宋交兵互為勝負諸姬莫有能輔鄭而救曹者曹卒不復而春秋終矣悲夫吳伐我或曰吳伐我以救邾也救邾義舉也而春秋無襃辭其與吳之伐我乎曰否春秋之貴救貴義也茅夷鴻之請救于吳也動吳子以利吳子悅於利而動是以來師造於魯之城下不責魯以存邾遽受盟而返何救之足言其後邾以齊而得存吳責報不已執其君而擾亂其國存亡國者顧如是乎故春秋不與之以救伐我而不書四鄙舊說以盟于城下故然十一年齊師來伐非城下之盟亦不書四鄙葢伐我云者我自有以致寇垂後王臨難省躬之戒前書公伐邾此書吳伐我責在魯譏哀公也髙郵孫氏謂春秋之始内魯而外諸夏故魯為他國所侵必曰某鄙及哀公八年十一年再書伐我同魯於諸侯也愚謂伐不書四鄙固所以示貶然亦豈遂同之諸侯餘義又見下夏齊人取讙及闡公羊穀梁以為邾子葢齊之甥齊人為邾故謀伐魯故以地賂之左傳則以為季康子嘗以女妻陽生陽生既君齊而女未以歸故齊人來伐愚以經㫖而觀齊之兵端當從公榖非以女故取讙及闡伐而取之非賂也或曰内失二邑春秋不諱何也曰為齊人取之而能歸也齊取二邑要魯以存邾故春秋於取邑之後即繫之以存邾魯既歸邾子齊即歸侵疆春秋與齊以存亡之義也歸邾子益于邾取之復以歸之義也春秋不與之以義為其無遷善改過之實特畏威而復之耳據左傳齊雖取二邑而邾子猶在魯齊未得志乞師于吳将以伐魯魯人聞二强國合兵以來懼而亟以邾子歸非知義之不可而幡然以悔是故不為春秋所貴學者觀吳伐我而春秋不與之以救邾齊取二邑而春秋繫之以存邾而聖人之意可識矣然齊之力自足以制魯何至召吳而與之俱伐存亡國義也召夷兵而伐與國則不得謂之義其事雖是其心則非所以卒召外寇而有殞身䘮師之悔齊實有以自取也秋七月冬十有二月癸亥把伯過卒齊人歸讙及闡左傳謂齊侯使如吳請師将以伐我乃歸邾子則齊之取讙及闡本為邾故前所云季氏不以女歸者左傳所載自為舛也魯人甫歸邾子于邾齊人即以讙闡歸于我其取之也以邾子之未復其歸之也以邾國之既存齊之取之歸之可謂允於義是故春秋不與吳而繫之于齊左傳以為季姬嬖故來歸侵疆誣矣但歸我濟西田有一我字此惟言歸讙及闡則以取之賂之有義利之不同耳宣公以濟西賂齊而齊復以歸我我之所固有也魯為不義滅人之國齊伐而取之復以歸之地已非魯之所有齊之歸之義也是故不書我貴齊人之能歸也九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘取師義初見隐十年宋之圍曹也鄭人救之鄭有救曹之義宋有滅國之愆比事而觀書法可見今鄭師在雍丘必以曹故亦如齊人伐魯存邾存之於既亡之後也春秋書鄭救曹於曹未亡之前書鄭䘮師於曹已亡之後録鄭所以誅宋也左傳乃謂鄭武子之嬖人求邑無以與之伐宋圍雍丘将取以與其嬖以是䘮師愚謂宋大國也鄭之所畏不應易視若此鄭以救曹而及宋交兵具見於經復何所疑鄭雖䘮師春秋無貶也凡書取師誅取者之不仁夏楚人伐陳陳人不預夏盟專意從楚有年于兹矣今而去楚即吳為楚所伐春秋其與之乎曰中國之盛也陳專意從楚顛沛百罹無所愧悔今晉衰而不振楚敗而未復吳雖屢勝而驕盈不戢陳於此當中立而不倚可也去楚適吳亦非義之所止春秋何取焉秋宋公伐鄭既滅曹又取鄭師于雍邱怙其驕盈親御戎以鄭為伐書宋公伐鄭非爵也貶也明年夏書宋人伐鄭亦貶也何以知其為貶宋滅曹者也鄭救曹者也鄭自救曹以來與宋有隙連嵗交兵雖更勝迭負不能存曹人之傾覆而鄭於義為直春秋與之比事而觀可以見矣或曰此書宋公伐鄭明年書宋人伐鄭同乎否乎曰此宋公親行故目公明年之伐殆非親出書人不書帥亦貶也冬十月十年春王二月邾子益來奔邾子得返其國曽未期年而復以奔告責吳也左傳謂邾子又無道吳人囚之栫之以棘使太子革為政愚謂邾子原無立志之人非怙惡不悛者也豈失國而返猶能無道者乎此吳人責賂不得而加之以罪也夫差有可霸之才而不能将之以徳威震宇内終以無成惜哉公㑹吳伐齊甚矣夫差之不仁也齊請兵伐魯為邾故耳邾子既得返國齊人辭吳師齊魯無事吳亦得以息其民夫豈不善乃以是為怒移伐魯之兵而伐齊遂使齊之亂臣假外寇以弑其君愚於此知夫差之将亡夫以太伯之後起而圖霸使之率循於義固春秋之所與而負才矜力日尋干戈聞伐國則喜而勇往聞止師則怒而移伐是故春秋惡之書㑹吳伐齊公與吳皆有貶也孫泰山謂齊中國而公乃㑹呉伐齊其惡可知此固春秋經世之常法然據左傳齊先召吳以伐魯魯復㑹吳以伐齊事有曲直理有是非吳人不擇於義兩從二國之請齊魯不惟義之所在各藉强國以求勝兩有罪焉耳三月戊戌齊侯陽生卒陽生之死春秋書卒書葬而左傳乃以為齊人聞吳師之來弑其君以說諸儒因是立義以為陽生之死與鄭僖髠頑同其實不同也鄭僖之卒春秋書曰鄭伯髠頑如㑹未見諸侯卒于鄵閔之深也而陽生之卒僅書齊侯陽生卒其辭與常卒無以異何以見其為弑乎又以當時之事而觀齊人果有畏於强吳之來伐為之弑君以說不當於吳師方退之後即以兵伐魯其伐魯乃所以報吳彼豈甘出吳下至於弑其君以求說乎又簡公壬者乃齊悼陽生之子齊人既弑其父必不立其子今悼死壬立是為簡公君臣之閒兩無猜阻疑悼公之死適當吳師之至逺方傳聞有以為弑者史得之而書未必果以弑死乎且是時陳乞父子秉齊之權肆為不道果弑君陳乞父子其首惡也而史記乃謂鮑牧與其君有隙因吳師之來弑之以說左傳則謂牧於前年之冬已為齊悼所殺且牧之專政不及陳氏牧之姦兇智詐亦不及陳氏若之何遽能弑其君反覆一時事實有可疑從經所書則陽生非弑從傳所書以為弑則弑君者非陳乞父子而誰葢始終禍齊而竊取其國者陳氏也豈容以疑似之傳歸過於鮑若夫鄭伯髠頑之例不與此同髠頑去楚而不得死於亂臣之手陽生者與諸侯之國皆受令於吳今也首請吳師以伐魯卒之自蹈其禍是豈可與髠頑之死同日語乎左傳凡書弑君必著弑賊之名氏今惟書齊人聞吳師之來弑君以說略名氏而不書彼亦有疑於此是以闕書云爾愚謂陽生果弑罪在陳乞父子難以歸其過于他人義又見下夏宋人伐鄭晉趙鞅帥師侵齊夫差伐齊聞陽生之死為之哭而旋師彼用夷禮猶知伐䘮之不可趙鞅乃於此時出師伐齊取犂及轅毁髙唐之郭侵及頼而還視夫差有愧矣或曰春秋何以無貶曰書齊侯卒而繼以鞅侵所以貶也五月公至自伐齊葬齊悼公義見上陽生卒衛公孟彄自齊歸于衛薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳或曰吳之救陳其與齊之救邢救衛晉之救宋同乎否乎曰救邢救衛救宋義之不容已勢之所必争也霸主以推亾固存為事義之不容已則必救勢之所必争則亦必救皆春秋之所與也今中國無霸主列國植其私黨陳從楚則吳伐之楚救之陳從吳則楚伐之吳救之皆為其私於中國之利害初無相闗不得與二霸同也曰楚昭之救陳春秋不書救今吳之救陳得書何歟曰陳之從於楚也乆矣改而從吳猶曰太伯之後也吳之本心猶在中國吳之救陳固有以異乎楚之為救也況是役也延州來季子約與楚人俱罷兵有救患之實春秋是以書或云季札此時幾百嵗将兵者乃其裔也十有一年春齊國書帥師伐我吳夷也聞齊之䘮為齊退師齊不知自反乃以吳師既退之後釋憾於魯以為此役是欲再致吳師而及之戰也愚於此而知簡公墮陳常術中而不悟也及吳師再至常乃諉其責於國書敗而死焉髙國鮑後先俱亡而常之志獲逞矣然則簡公者宜當何先曰進用忠賢與之共圖國政而陳氏可翦也簡以舊恩任一闞止闞非陳之敵亦猶魯昭任郈孫公若而圖季氏非其敵也烏得不敗夏陳轅頗出奔鄭頗為陳司徒賦封田以嫁公女其餘以為已之大器國人逐之故奔此以聚歛媚上者也聚歛媚上者固當有討然國不能自討致衆怒而逐之是衆為政也而可哉五月公㑹吳伐齊兩年之間書公㑹吳伐齊者凡再責魯深矣當闔廬之世春秋嘗進吳書子自夫差之立迨今十有三年春秋皆以號舉之為其用兵不戢而夷之也伐齊至再尤春秋之所深惡而再書公㑹吳伐齊因責吳而并責魯也魯為不義伐邾而入其國執其君以齊人來討之之故既得之復以歸之既歸之而挾此為憾導吳伐齊是春秋所深責也㑹呉師伐中國至於再呉不足多責正所以責魯是固强家之所為而公躬預於㑹自将而出豈得不責公乎甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書或曰吳伐齊國書禦之敗而書獲何也曰責國書不能討内賊以伐魯而召吳師也國書齊之世卿為中軍元帥國之存亡繋於掌握而坐視陳氏弑君專國而不能討又從而受令焉其亦可鄙甚矣敗而獲貶也曰為書者當何如夫賊在内國幾亡何暇禦外寇書也當於受命之日陳三軍取陳乞父子明正典刑夫然後鼓衆以前士氣自倍吳人聞之不待戰而可以走今乃不然歌虞殯具含玉未戰而魄先褫兵敗於外賊乗於内簡公之弑齊國之亡自兹以始不責書而誰責歟秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋世叔齊之奔不足紀也春秋所以書譏在孔文子春秋之義每責備賢者孔文子衛之賢大夫論語所謂敏而好學不恥下問者也而於世叔有二大過焉既使之出其妻而妻之又以其通於初妻之娣奪其妻而逐之復使世叔之弟遺烝於嫂瀆倫亂敎至於再三夫子為是而去衛書齊出奔齊不足多責責在文子十有二年春用田賦用田賦者始用田而為之賦也用者非所當用而用也周制方里為井四井為邑四邑為丘丘出馬一牛三四丘為甸出馬四牛十有二是為革車一乗今以用田賦書諸說不同賈逵以為賦一井以一丘之賦井出馬一牛三一丘十有六井當出馬十有六牛四十有八比舊増十六倍恐不可行杜氏謂丘賦之法因其所授田及家之資財通出馬一匹牛三頭今别其田與財各出一賦則出馬二牛六倍於舊愚觀二説賈謂井出丘賦恐無此理杜說雖酌中似未得田賦之意用田賦者其視田以為之賦乎古者四井為邑四邑為丘賦以馬一牛三不盡取也今不待及丘視其井以為之賦豈非賦四井以一丘之賦乎魯自宣公履畝為稅而什一之法漸壊然所稅者止於米粟而馬牛之賦尚如舊也今計井為賦葢一邑而取一丘之賦一丘而取一甸之賦馬四牛十有二視舊増三倍矣古者田有稅丘有賦稅以足食賦以足兵今計井而賦以馬牛故言用田賦成元年始作丘甲十六井而出一甲比舊増多一甲耳今此用田賦每邑四井而出馬一牛三四邑為丘十六井出馬四牛十有二比舊増多三倍甲數至此亦必増此春秋末年魯之軍政賦於民者盡矣夏五月甲辰孟子卒或曰此昭公夫人而書孟子卒昭公既夫人之春秋可不夫人之乎曰春秋垂法於後世者也前此仲子成風敬嬴以子為君而僭夫人之號春秋猶為之辨分不輕以與之今魯娶同姓瀆倫犯禮必不可傳之後世者也春秋若遂以小君書是娶同姓而何可以垂萬世法乎觀陳司敗之問則昭公固自以為諱故魯人亦為之諱也謂之吳孟子舊史固嘗書夫人孟子薨春秋從其所諱書曰孟子卒不書夫人而書卒示天下後世娶同姓之必不可也左傳謂季氏不以小君禮䘮昭夫人所以不赴不反哭因不稱葬小君愚謂季氏不君小君春秋固将革而正之夫豈遂因以書葢昭公諱之魯人諱之春秋因其已諱而書之耳卒而不葬亦以是故昭公之娶於吳必在既立之後夫人之始至也不書于䇿何哉曰舊史固書夫人孟子至自吳聖人為魯諱削而不書及其終也有不容盡諱是以直書孟子卒雖為之諱而不沒其實所以存其羞惡之心也劉氏以為孟子之立不受命于天子不可以稱夫人愚謂周之既衰立夫人不稟命于天子者多矣史未嘗不書夫人此以娶同姓故春秋特變常法而為之書似不必别求其說公㑹吳于橐臯㑹于柤㑹于鄫及今三㑹皆以號舉夷之也或曰太伯之後奚其不可以霸而春秋夷之乎曰當進而進當夷而夷春秋之用法權衡在焉前日之進闔廬以其功也今日之退夫差以其罪也柏舉有攘夷之功艾陵有猾夏之罪此春秋所為進退也其後自貶僭號㑹于黄池於是進之春秋何私焉秋公㑹衛侯宋皇瑗于鄖據左傳宋衛㑹吳公因與之為㑹且盟時無盟主故諸侯各自為㑹魯以望國㑹諸侯講睦鄰之好春秋無譏也傳以為㑹且盟其不然歟葢是役吳人請尋盟魯力辭之既不與吳為盟不應及二國盟葢㑹而不盟經所書正也宋向巢帥師伐鄭義見明年取師于嵒冬十有二月螽書螽記異也此夏正十二月天地閉息之時而猶螽亦如窮冬李梅實之類耳左傳謂季孫問於夫子子曰火伏而後蟄者畢今火猶西流司歴過也愚以為非聖人之言季冬而螽氣燠也是以書今左傳託為聖人之言歸過於魯歴失閏果爾則凡蟄皆奮豈獨螽之為異乎又云明年復螽乃置閏而塞天變尤為可闕宣十五年冬蝝生蝝亦蝗子之類以冬而生與此記同亦可指為司歴之過乎十有三年春鄭罕達帥師取宋師于嵒鄭以救曹之故與宋交兵更勝迭負迨今未已去年冬向巢伐鄭圍嵒鄭人大出師圍向巢于嵒盡取其師宋固有罪然春秋書取師誅取者之不仁以多殺為功也先書宋取鄭師于雍丘責宋也今書鄭取宋師于嵒亦責鄭也責在取師則兵端有不論矣夏許男成卒公㑹晉侯及吳子于黄池榖梁曰黄池之㑹吳子進乎哉遂子矣王尊稱也子卑稱也辭尊稱而居卑稱以㑹諸侯以尊天王春秋進之公羊曰吳何以稱子吳主㑹也其言及吳子何兩伯之辭也或以兩伯為疑曰伯可兩乎曰伯者霸也整領諸夏之名也周家盛時周公居東召公居西分陜而治是為二伯此兩伯之從始幹方之任也自入春秋齊桓始霸中夏晉文繼之中國諸侯未有與之伉者楚自莊共挾其强大欲與晉俱霸春秋不與也彼僭王之大號常懐睥睨周鼎之心春秋用是抑之不使之得抗衡於諸夏此聖人繼世之大法論者謂春秋與楚莊以霸愚固不謂然也吳太伯之後自壽夢以來輔晉攘楚至闔廬以兵入郢成攘楚之大功春秋常進而書吳子矣闔廬死夫差立始者用兵不戢春秋貶之今而自請削去僭號預於衣冠之㑹楚之不能而吳能之春秋是以亟加奨進書公㑹晉侯及吳子于黄池其義甚明也或曰進而書子進之矣而又與之以霸何哉曰二伯云者乃周家承平之盛典是時晉衰不能號召諸侯吳子在是諸侯畢至前既有功此又削去僭號踐尊王之實且太伯之後使之齒晉庶幾夏盟之猶有主此春秋末年聖人拳拳望治之意公羊兩伯之說其必有所授矣諸儒喜為異說楚莊之强僭不軌憑陵上國則謂春秋與之以霸夫差削去僭號率循周爵則謂春秋擯之於夷愚讀書至此每為之不能平故於此而獨有取公榖之說不然吳楚僭號百年吳革偽而無襃楚怙終而無貶豈春秋垂法之本㫖乎髙郵孫氏謂天王之事見於經者必曰京師昭三十二年書城成周不曰城京師天王竟衰而同之列國也魯為他國侵伐必曰某鄙而哀公八年十一年再書伐我不言四鄙魯竟無道而同之諸侯也外國之㑹稱國而離春秋之常法也而公㑹晉侯及吳子于黄池進吳稱子又書晉侯及之諸夏竟弱而呉主夏盟也是三書皆非春秋本㫖不可不辨也春秋書法當貶則貶當削則削自外于禮則貶之未聞天子衰而同之列國魯衰而同之諸侯霸國衰而同之荆蠻者也前輩或以為名言愚三復而未喻當與知春秋者共講焉楚公子申帥師伐陳於越入吳胡氏謂吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人争長自謂莫之敵而越已入其國都吳侵中國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之春秋初書於越入吳在柏舉之後再書於越入吳在黄池之後所以垂戒後世此論善矣然春秋之意則有在也葢自晉政不綱而楚人横行於中原不有柏舉之勝中國之存亡未可知也而越乗其後闔廬卒以是死夫差繼之雖用兵不戢自取覆亡而與楚人為水火者惟夫差而已矣㑹魯伐齊至於再固有好鬭之罪翦楚摧越有功於中國甚大末又去其僭名以為此㑹修職貢而尊天子襲衣冠而自同於諸夏皆其可書之實春秋是以進之而越復乗其不戒而議其後遂入其國都吳以是不能國春秋深為太伯之後惜是以爵而進之居晉之亞是謂末年之兩伯再書於越入吳賤越而貴吳也論者不原春秋之本㫖以成敗而論一時之事於書爵而曰正名於書及而曰不與呉以主中國有功者無襃有罪者無貶非春秋垂法之意也秋公至自㑹晉魏曼多帥師侵衛公羊作魏多此春秋霸國侵伐之終事也晉之盛威令行於天下不待加兵而人知服從今其衰也趙鞅魏曼多更迭用兵侵伐小國數修怨於衛衛卒不服豈其力之不足邪鞅曼多志不在於求諸侯霸中國志於怙權自私而已矣春秋書黄池之㑹繼以楚伐陳越入吳閔夏盟之無主强暴迭興周室日㣲桓文之功遂息天下将趨於亂是故於鞅曼多之用師深注意焉公羊以魏多為譏二名今不取葬許元公九月螽冬十有一月有星孛于東方平旦衆星皆沒孛乃見孛彗也邪惡之氣鍾而為彗彗者埽故置新之象前此入于北斗孛于大辰見以夜也今書孛于東方天欲旦太陽将升而孛見焉太陽升于東孛見于東妖星干太陽駭常之變也春秋降而戰國世道至此大變後此變爲争雄七國並興皆以號僭舉哀哉盜殺陳夏區夫傳例以為㣲者殺大夫謂之盜然亦有不盡然者盜殺而不曰盜責在死者非盜殺而曰盜責在生者齊商人之弑盜殺而不曰盜也蔡昭侯之死非盜殺而目之曰盜也此無傳姑闕疑十有二月螽義見去年十有四年春西狩獲麟或曰諸儒之說有謂春秋感麟而作者有謂春秋成而麟應至者杜元凱以為感麟而作胡文定以為春秋成而麟應至其說援引詳備子以為如何曰二義皆通愚以為春秋感麟而作也宇宙間惟理與氣而已理行氣從固當有自然之應而況聖心之妙貫乎三極致中和而天地可位萬物可育此作彼應固其理也然愚以當時之事而觀春秋葢感麟而作以麟而終也夫子嘗曰鳳鳥不至河不出圖吾已矣夫葢麟鳳龜龍帝王之瑞夫子抱帝王之道将以大拯於斯世今也轍環天下而無所遇自衛反魯刪詩定書繋易正禮将載其道以垂之後世而麟應適至獲而傷焉夫子知道之終不行夫然後修春秋以明一王之法春秋天子事也春秋成而聖人不復有用世意矣故春秋之修獨後於五經葢感麟而作以麟而終也或曰然則春秋之書之絶皆以麟故其不繋於當時之事乎曰固繋於當時事也春秋誅亂賊明王法之書也始於隐魯大亂君以弑死者三世終於哀十四年齊大亂君以弑死者亦三世是嵗陳恒弑簡公孔子沐浴而朝告于哀公請討之聖人為世道慮也深矣而公不能用吁使陳恒即正天討則魯之三家晉之六卿皆有所憚而不敢肆齊不亡晉不亂魯不削世道未至日趨於下哀公未必不知此而制於强臣弗獲展而春秋於是終矣葢以討亂賊而始亦以討亂賊而終此春秋所以作亦春秋所以止孟子知之故曰春秋作而亂臣賊子懼敬王崩在獲麟後四年魯哀公以二十七年孫于邾悼公立而春秋傳終春秋集傳詳說卷三十
