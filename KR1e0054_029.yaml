body:
  text: 春秋集傳詳説卷二十九宋家鉉翁撰哀公上名蒋定公之子母定姒定公妾也敬王二十六年立是嵗晉定十七年元年春王正月公即位楚子陳侯隨侯許男圍蔡左傳曰報柏舉也或曰柏舉之戰蔡昭以復其父祖之讎也春秋襃之今楚之圍蔡亦曰雪鞭墓之辱而春秋書法不與之以復何哉曰入郢者吳也鞭乎者亦吳也楚不能報之於强吳而乗中國之無霸摟二三小國以釋憾於蔡謂之復讎而讎卒不能復也前年滅頓去年滅胡今又以兵加蔡其志在於蠶食小國以為利春秋奚取哉左傳謂蔡人男女以辨而出降楚使之疆于江汝之間則蔡既為楚所得楚何以得之而不有蔡人乃於楚退之後復請遷於吳乎葢其民有下楚而逃生者其君實嬰城固守而不為之屈是故春秋書圍不書入鼷鼠食郊牛改卜牛義已見僖三十一年夏四月辛巳郊秋齊侯衛侯伐晉據傳齊衛伐晉以救范中行也魯師預伐而不書為魯諱也齊景公有可霸之資而不知正禮明分以修乃祖榦方之業嵗嵗出師或輔范中行以抗其君或奨衛輒以捍其父所謂日暮途窮倒行而逆施者也魯從齊為㑹盟尊王室禦外侮豈無他事今與齊人連兵黨叛而伐晉夫豈魯之所得為乎葢春秋季年亂臣賊子同惡相濟此皆季氏之所勇為其君略不覺悟可為悲慨者矣冬仲孫何忌帥師伐邾或曰邾魯之争有年矣春秋備載魯人之曲不為少諱何邪曰春秋垂王法於萬世夫豈私於一魯國而曲筆以狥之乎魯受邾叛人納邾土田由漆閭邱以至漷濫春秋備載其實不加貶斥而義自見所以存魯人羞惡之心而垂法於後也且如定公之薨邾子親為之奔䘮戚死者以感動生者冀其不為侵暴耳今也曽未幾日何忌即以兵伐之自是三家者更将迭出殆無虚嵗哀公新立未能更事斯皆季氏不令子孫濟其祖父之惡利邾人之土疆期盡取乃已宿始之意如斯成之仲與叔從而羽翼之不奪不饜葢當時諸侯之貪利忘義者豈特齊晉為然魯之亡邾宋之亡曹鄭之亡許皆百年同盟之國而一朝滅之其不謂之新夷狄乎附見據左傳哀公元年吳夫差敗越于夫椒遂入越越子以甲楯五千保于㑹稽使大夫種因太宰嚭以行成吳子将許之伍貟力諫不從退而告人曰越十年生聚十年敎訓二十年之外吳其為沼乎春秋不書或曰春秋貴復讎夫差始立即厲復讎之志今而入越讎既復矣事亦難矣春秋何以不書曰復讎大義也力之不逮者猶欲因人之力以伸已之志力可以為而不能盡用其力其志怠矣怠而驕而失其初心不能斃讎反為讎所斃併太伯仲雍所以遺其子孫者而失之身死宗社為墟尚何復讎之有哉是以春秋略而不書嗟夫夫差父子以一國之力用兵制勝無敵於宇内由得子胥而用之爾子胥既復其父兄之讎以師入郢又為夫差復其父讎以師入越古大丈夫秉義據正志其所志為無不成者子胥其人也惜乎生於夷國行於楚荆不獲大展布於當世天實靳之使之身佐桓文管狐趙不足多遜二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田三帥俱書義見成二年昭十年三卿俱書著三家者覆出為惡擅兵權為己之私有其主不得而制也定公十四年夫子攝政於魯道化之所感孚彼三家者束手受令惟聖人之所欲為魯國大權且将復歸於君季氏間之於内齊人間之於外夫子去而三家復張定沒哀繼政權仍在季氏擅兵專國一踵宿意如之舊至是大舉伐邾三卿自将以出不假他族為帥兵皆其兵将皆其将國愈不可為矣書取漷東田及沂西田著魯人之逐利而不知止也襄公因晉之力取邾田自漷水本以復舊疆因漷移而侵取邾地取非其有也魯人知得漷之利於是併漷東及沂西皆取以為已有而其慾猶未饜也必盡其國乃已春秋先後四十年再書取漷所以貶也癸巳叔孫州仇仲孫何忌及邾子盟于句繹取人之田而及之盟春秋直書其事不為魯諱也三家俱出而二氏猶獨及邾盟見叔仲欲盟而罷兵季氏怙終期滅邾乃已春秋書之所以誅也左傳七年入邾大夫不欲季氏違衆以行於是盟見之矣夏四月丙子衛侯元卒靈公也義見定十四年蒯瞶奔滕子來朝晉趙鞅帥師納衞世子蒯聵于戚義已見定十四年春秋書納者三魯之納子糾晉之納捷菑與今趙鞅納衛世子蒯聵皆書納而納之正否有不得同日語也納糾書子糾子糾於次為長也已於莊七年辨之納捷菑書不克納非所當納而納也至於衛世子蒯聵者其奔也書世子其納也復書世子愚觀聖人書法存其世子之號而書納知蒯聵之逐乃南子陷而逐之而靈公始者不之察耳已於定十四年辨之自蒯聵之逐三年於兹不聞衛人别立太子至其終也乃立輒焉揆以人情既惡其子而逐之不當立其子之子以為世嗣蓋衛靈暮年知蒯聵之無罪有意復之衛之羣臣奉輒以主宗祀而非南子意也衛靈死南子失怙故輒得不廢為輒者能承王父之意逆其父而君之事之正也為蒯聵者能反躬自咎以已既得罪於先君無君國之理脫屣千乗而莫之顧理之順也乃皆不然父不父子不子更為争國之計左傳謂靈公欲立公子郢辭而南子立輒南子淫虐之婦忌聵方甚而肯立聵之子以為君乎此衛靈之意衛之羣臣奉以從事何疑漢武之暴隋文之忍至暮年作思子宫興悔不立勇之歎孰謂衛靈而無此心乎或曰春秋存蒯聵世子之號其許蒯聵以復入乎曰存其世子之號以見其逐之不以其罪示後世人主崇重國本無惑於婦寺之讒耳至於入而君國非有父命王命其無可入之理秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績鞅圍范中行鄭罕達以師救之鞅為主罕達以師來戰客也鞅雖自伐其仇然奉君命討叛者也罕達與齊連兵黨於范中行黨亂也非春秋所與書及所以辨主客謂春秋以趙鞅為兵首而書及其不然歟晉國盛時兵威行於天下莫之敢攖今也鄭人以偏師至鞅與蒯聵望其顔行膽落魄褫唯恐不能勝幸而勝之自以雋功相與誇詫不已晉之衰乃至是邪春秋書晉趙鞅帥師及鄭罕達帥師戰言其敵也卑晉而罪鄭也冬十月葬衛靈公十有一月蔡遷于州來或曰昔衛邢有狄難齊桓公救之遷其國春秋與之今蔡人有楚難吳遷之而春秋無襃何歟曰桓公之遷邢遷衛也率諸侯救而遷之為之城久而其國乃定今吳遷蔡于州來乃吳楚要害必争之處不聞為之城戌復以威力迫而遷之至殺一大夫以求說哭而遷墓得謂之義舉乎是可與邢衛之遷同日語乎或謂蔡既降楚不當背楚而即吳其不然歟夫蔡與楚為不共戴天之讎背楚正也事楚非也楚人滅頓滅胡不遺餘力豈有得蔡而不取如左傳所云者葢圍之不能下幾亡而得存其君固未嘗屈也夫豈降楚背楚之謂哉士大夫以利害而談春秋雖老師宿儒猶不免有此失是故讀春秋者當明經㫖大條貫庶不為左傳記載之所惑蔡殺其大夫公子駟其君欲避楚而求遷其臣欲事楚而不利於遷君所守者為正臣則夷也昭侯因吳師之至討其異論者而戮之謂公子駟無罪見殺不可也但春秋之義不與諸侯以專殺大夫例皆貶之不獨公子駟為然也其後蔡昭侯卒坐是為羣下所戕使吳人遷蔡能如齊桓之遷衛遷邢則公子駟不死蔡遷如歸矣三年春齊國夏衛石曼姑帥帥圍戚榖梁曰此衛事也其先國夏何也子不圍父也不繫戚于衛者子不有父也公羊曰輒之義可以立乎曰可其可奈何不以父命辭王父命以王父命辭父命是父之行乎子也不以家事辭王事以王事辭家事是上之行乎下也二說不同榖梁正矣公羊舛矣論語垂正名之訓冉有子貢嘗共發夷齊之問而知聖人之意矣公羊不應猶有是說此其門人髙弟流傳之失不足惑也在禮太子死立嫡孫為世嗣未聞子在而孫可繼王父而立者也衛靈之終也知蒯聵無罪且将復之故其臣奉輒以主祭如晉惠在秦而國人輔孺子鄭成在晉而國人輔髠頑是也輒不能承王父之意以君位為已之所當得遽𤼵兵以拒其父齊為不道又出師以輔之反常逆理乃至於是齊其亡乎春秋推國夏為兵首罪齊深矣輒之罪不待貶絶而自見或曰近代儒者持祖孫相為昭穆之說謂公羊不以父命辭王父命為合於禮其然乎曰否此廟中之昭穆豈以是而廢父子之天倫乎蒯在輒無可立之理以王父命而辭父命所就者小所損者大豈聖人垂法後代之意乎故輒可為晉之孺子鄭之髠頑而不可以君位自居也今以君位自居而又乞援强鄰以兵加於其父是所謂無父之人齊景不度於義遽為之出師有帝在上景與輒皆有誅曰然則孰為當立者周有王晉有霸命公子郢主社稷而衛無事矣夏四月甲午地震五月辛卯桓宫僖宫災左傳謂夫子在陳聞火曰其桓僖乎以為親盡而不毁故為火所災愚以為非夫子之言也哀公於桓為九世於僖七世廟之不毁所從來逺矣何以至今日而後災葢三家者出於桓自僖以來世用事於魯宿意如悖禮僭上逐君立君有不可勝誅之罪故天災桓僖廟以示警戒非謂廟不毁而災以毁也季孫斯叔孫州仇帥師城啓陽義併見城邾瑕宋樂髠帥師伐曹義見七年宋圍曹秋七月丙子季孫斯卒季桓子蔡人放其大夫公孫獵于吳義見下盜殺蔡侯冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾義見下滅邾四年春王二月庚戌盜殺蔡侯申公榖作弑弑蔡侯者蔡大夫公孫翩非賤者而書之曰盜討之也志存乎事楚弑其君以求說于楚是所謂盜也首惡者不以名書亂黨衆不容悉書㮣而目之曰盜也蔡昭侯隱太子之子憤其父為荆楚所戕事吳以圖報卒以吳師伐楚入郢復不共戴天之讎為中國刷百年之恥春秋所深與也哀元年楚人修怨於蔡諸侯莫有救之者求徙于吳遷之州來其地迫近於楚懼楚師之又至復適吳以求遷諸大夫皆不欲其不欲者将以圖與楚蔡之賊也君之從吳猶曰太伯之後嘗為蔡人出師入郢蔡之從之義也臣之從楚甘事仇而不以為恥者也其事與鄭僖髠頑略相似天下之亂臣賊子未有再甚于此者春秋直書曰盜而不著其名志諸大夫之皆當討也故自州來之遷公子駟之戮公孫獵之放蔡昭侯之弑具載始末不遺傷蔡侯以復讎大義之故卒死於亂臣之手而胡文定專責蔡侯以背楚誑吳委罪執政信義俱亡以殞厥身此愚之所未喻也楚而可事則父兄之讎可不必報天經地義泯滅而無餘矣或曰髠頑之弑春秋書卒不書弑今蔡侯之死春秋直以弑書何哉曰髠頑之弑賊終不討是天下之亂臣賊子未有再甚于此者今昭侯雖見弑而從於楚者誅勦略盡則賊既討矣是故書弑書討書葬春秋幸蔡賊之即刑有辭以垂法於後世故不得用髠頑之例蔡公孫辰出奔吳義見下葬秦惠公宋人執小邾子宋非方伯連帥之當用霸討者也小邾之君非有擅兵無王之罪宋以私怒擅執諸侯不歸之京師其罪大矣書人書執誅宋之無道也夏蔡殺其大夫公孫姓公孫霍蔡人討弑君賊戮公孫翩逐公孫辰殺公孫姓公孫霍賊既討是以書葬於下自蔡遷州來至葬蔡昭公凡六見書於春秋閔昭侯也彼謂春秋責昭侯背楚者不明於復讎討賊之義者也晉人執戎蠻子赤歸于楚公羊曰其言歸于楚何辟伯晉而京師楚也春秋之法諸侯有罪執而歸于王書執某侯歸于京師霸主不敢專其威福是以歸之于王所以尊京師也戎蠻雖邇于楚亦嘗服屬諸夏昭十六年楚乗其亂誘其君而殺之楚實無道戎之叛之宜也於是自拔歸晉晉人儻畏楚之盛强拒而弗納可也聼其去而適他國亦可也乃許而執之以歸于楚執人而歸之于楚是以事京師者而事楚也晉之罪大矣書晉人執戎蠻子赤歸于楚坐晉以從逆之罪黜之同於列國也城西郛六月辛丑亳社災武王克商以其社班諸侯各立之以戒亡國故魯有亳社傳所謂閒于兩社者是也說者以為立社于廟門之外以為屏蔽使人君視之而知戒屋之不得受天陽故火得以災天以警魯亦以警周也或曰此周之亳社災為天下記異義亦通秋八月甲寅滕子結卒冬十有二月葬蔡昭公義已見上殺公孫姓葬膝頃公五年春城毗義併見城邾瑕夏齊侯伐宋定十四年齊宋㑹于洮至是甫六年忽興師以伐之傳不言其故考之於經宋實有當討之罪前年伐曹去年執小邾子自是三以兵加于曹卒滅之而後已齊之伐之或以是故歟春秋爵而書伐與其能討有罪也然景公耄矣未幾沒無救於曹之亡晉趙鞅帥師伐衛或曰輒以子拒父齊國夏為之圍戚逆也蒯以父伐子晉趙鞅為之伐衛其順矣乎曰齊固失矣晉亦未為得也晉人儻欲修明霸業陳大義以示天下當請之天王召諸侯伐衛取輒歸之京師更議立君夫然後於義為允今私於蒯聵必求其入亦非春秋所許也秋九月癸酉齊侯杵臼卒公孫丑謂管仲以其君霸晏子以其君顯嘗竊疑焉景桓固霄壤之不侔晏之於管徳過之而才則不及也愚謂左傳考景公行事無一可稱魯昭在難而不能納也天王出居而不之問也范中行叛其君則連諸侯以救之衛輒拒父則出師以奨之見義不能勇為逐利常若不及在位五十八年紀綱壊亂嬖寵並興末乃舎長樹幼階以召亂子曰齊景公有馬千駟死之日民無得而稱焉彼謂晏子以其君顯殆不然歟冬叔還如齊閏月葬齊景公公羊曰閏不書此何以書䘮以閏數也喪曷為以閏數喪數略也愚謂喪不數閏月禮也故閏月卒者不書閏月卒襄公二十八年十二月甲寅天王崩乙未楚子昭卒自甲寅至乙未四十二日則楚子之卒乃閏月也閏月不書閏者三年之喪不計閏也今齊景之葬以閏月書豈當時計閏以為喪春秋書以譏之歟六年春城邾瑕或曰魯人既隳三都而繕治城邑無虚嵗何也曰三家張也前日峻城藏甲私其所封之邑其害猶小今而峻城藏甲徧於中國其為患益大春秋所為書也自夫子去位繼以定沒哀立季氏恣睢益張出師伐國三家自将以行不參以他族之帥視魯甲兵皆已之甲兵魯城邑皆已之城邑内而城西郛外而城莒父城霄城啓陽城毗城邾瑕其包括愈廣蓄謀愈深春秋書之不遺憂魯季之為齊田氏耳晉趙鞅帥師伐鮮虞吳伐陳吳伐陳将以求霸也號而舉之所以貶是時晉號衰亂齊復不能自振吳以太伯之後求主夏盟使其循桓文之軌仗義以行視中國諸侯有放棄典章率作妄行者奉王命以討之如衛輒之拒父宋之謀曹魯之謀邾鄭之滅許晉所不能討者吳則討之夫然後有以大服人心今皆不能而欲争陳於楚非霸政所宜先也是故春秋不與其伐舉號以夷之夏齊國夏及髙張來奔齊景公老而益悖放逐其長子而樹嬖妾子以為之嗣國髙世臣之任事者不能諫又受其託孤之寄荀息之流也陳乞因衆怒作亂而逐之葢有無君之心而後動於惡者也景公葬甫歴時而亂作髙國從君於邪又不能以死奉荼曽荀息之不若名而奔之所以誅也然髙國百年之舊族一旦為疏逺賊臣所傾髙國逐而孺子死孺子死而陽生立齊國之命制於陳氏自是三弑其君國隨以亡由景公辨之不蚤辨以至此極亡齊者景公乎叔還㑹吳于柤義見七年㑹于鄫秋七月庚寅楚子軫卒昭王楚軫敗而知懼是以不亡闔廬夫差勝而驕是以終敗左傳載昭王将終舎其子以國讓於諸大夫及答周太史移災之辭藹然有人君之度其因禍變之來動心忍性増益其不能者乎齊陽生入于齊齊陳乞弑其君荼或曰桓公之入書齊小白入于齊陽生之入亦書齊陽生入于齊同乎否乎曰否齊桓之入齊無君也陽生之入齊有君也陽生先荼之弑而入既入而後陳乞弑荼弑雖在陽生既入之後謀實定於陽生未入之前不與小白同也晉獻公戕其世子而立嬖妾之子其事與此略相似荼則卓也陽生則夷吾也陳乞則里克也然夷吾不預弑而陽生實預於弑則陽生又不得與夷吾同也但弑荼立陽生乃陳乞之本謀陽生非陳乞不得入故弑君之罪專在陳乞此春秋書法輕重之權衡傳謂乞不預於弑殆不然也或曰楚比弑靈春秋書公子比弑其君䖍此不坐陽生以弑何哉曰比非當立而見擯於外者也入而弑而立所弑者又其兄也非弑而何陽生於諸子為長以序當立景公黜長立幼以是召亂陽生實未嘗事荼為君故春秋不坐以首惡之罪示人君立子以長不以愛其寓戒之意深矣若荼之死在陽生未入之前則陽生可以免預弑之罪今陽生入而荼死則其預弑明矣餘義又見陽生卒冬仲孫何忌帥師伐邾併見明年入邾宋向巢帥師伐曹併見八年入曹七年春宋皇瑗帥師侵鄭左傳以為鄭叛晉宋為晉討非也是時諸侯無從晉者宋之侵鄭豈為晉乎宋人連嵗有事於曹諸侯無救之者意鄭人與曹為援宋疾而侵之故是嵗冬宋圍曹鄭救之自是宋鄭交兵互取師焉于雍邱于嵒是也春秋書宋侵鄭責宋也晉魏曼多帥師侵衛伐有罪而書侵為其能伐也衛輒以子拒父齊景不道黨其子而攻其父此人倫之大變霸國奉王命而致討之正也趙鞅前日再以師加衞為其助范中行故復私憾也然猶納蒯聵于戚師不為無名今魏曼多又為此役傳不言其故是時齊景新沒衛失大國之援晉人姑為此侵以葢其不能之愧是故春秋不與之以伐夏公㑹吳于鄫或曰吳比嵗再與魯為㑹可進也而春秋於去年書叔還㑹吳于柤今復書公㑹吳于鄫其與之乎其貶之乎曰不與也自柏舉而後夫差既立以來吳以號舉彼自安其本俗耳非春秋之貶之也是㑹吳人徴百牢百牢者非禮也先王制禮尚物牢不過十二非不能共也以是為制而不得過也吳徴百牢魯人陳義以争吳卒不從狃于習也曰魯之㑹吳是歟否歟曰晉衰而去晉即齊景公死則舍齊而事吳趨利棄信春秋之所惡也是時春秋未與吳以霸亦不與魯以㑹秋公伐邾八月己酉入邾以邾子益來自入春秋魯人滅國如滅項滅邿皆以取書為魯諱也至是滅邾而春秋書法頓異不復為魯諱矣定公季年書邾子來㑹來奔喪見邾所以事魯於禮無違也至哀公之始年書魯三家更迭用師于邾伐之而取其地要之以盟既盟復伐以見邾無負于魯而强臣擅命逐利以亡人之國過不在其君也及是書公伐邾入邾以邾子益來而責始在公伐而入之入之而執其君其惡著不容為之諱矣或曰權在季氏哀公徒擁虚器可得而責乎曰公身親其事而不知其惡謂之無責不可也據傳季孫饗大夫謀伐邾子服景伯持不可而季孫違衆出師則魯猶有臣也魯猶有臣則公論未泯國猶其國使哀公能𤼵强自立不為之親行則邾猶可全也以邾子益來賤之也卑屈已甚終不克自全是故名言來不言歸謂明年歸邾子故開魯人以改過之途耳宋人圍曹冬鄭駟𢎞帥師救曹宋無憾於曹也哀三年忽以兵加曹至是復圍曹左傳謂曹背晉而奸宋為宋所伐此强求其罪耳諸侯之棄晉者多豈惟一曹魯之入邾鄭之入許宋之圍曹由中國無盟主諸侯擅侵伐更相吞噬不奪不饜春秋之書之皆所以誅也書宋圍曹罪宋也書鄭駟𢎞救曹與鄭也春秋季年晉衰而楚不競鄭始能國出師救曹此方伯連帥之能事而鄭能行之春秋與鄭之能救所以愧齊晉諸大國之不能救也春秋集傳詳説卷二十九
