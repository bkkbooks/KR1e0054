body:
  text: 春秋集傳詳說目録春秋類卷首序綱領卷一隱公上卷二隱公下卷三桓公上卷四桓公下卷五莊公上卷六莊公中卷七莊公下卷八閔公卷九僖公一卷十僖公二卷十一僖公三卷十二僖公四卷十三文公上卷十四文公下卷十五宣公上卷十六宣公下卷十七成公上卷十八成公下卷十九襄公一卷二十襄公二卷二十一襄公三卷二十二襄公四卷二十三昭公一卷二十四昭公二卷二十五昭公三卷二十六昭公四卷二十七定公上卷二十八定公下卷二十九哀公上卷三十哀公下臣等謹按春秋詳說三十卷宋家鉉翁撰鉉翁號則堂官至端明殿學士簽書樞密院事龔璛跋曰至元丙子宋亡以則堂先生歸置諸瀛者十年成此書自瀛寄宣托于其友肅齊潘公從大藏之今考宋史本傳元兵次近郊鉉翁方為祈請使留館中聞宋亡不食飲者數日改館河間以春秋教授弟子則是書信為北遷以後所作矣鉉翁之說以為春秋主乎垂法不主乎說事其或詳或略或書或不書大率皆豫奪抑揚之所繫宏綱奧旨絶出語言之外說之者要當探得聖人心法之所寓然後參稽衆說而求其是故其論平正通達與廢傳解經袪舊說闢私論者殆不可同年語非孫復諸人所能及也况其立身本末亦宋季之錚錚者因其人而重其言則是書不可不亟録矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋集傳詳說原序春秋非史也謂春秋為史者後儒淺見不明乎春秋者也昔夫子因魯史修春秋垂王法以示後世魯史史也春秋則一王法也而豈史之謂哉陋儒曲學以史而觀春秋謂其間或書或不書或書之詳或書之略或小事得書大事缺書遂以此疑春秋其尤無忌憚者至目春秋為斷爛朝報以此誤天下後世有不可勝誅之罪由其不明聖人作經之意妄以春秋為一時記事之書也或曰春秋與晉乘楚檮杌並傳皆史也子何以知其非史而為是言乎曰史者備記當時事者也春秋主乎垂法不主乎記事如僖公二十八年晉文始霸是嵗所書者皆晉事莊九年齊桓公入是嵗所書者皆齊事隱四年衛州吁弒君是嵗所書者皆衛事昭八年楚滅陳是嵗所書者皆陳事有自春徂秋止書一事者自今年秋冬迄明年春夏閲三時之久而僅書二三事者或一事而纍數十言或一事而屢書特書或著其首不及其末或有其義而無其辭大率皆豫奪抑揚之所繫而宏綱奧㫖絶出語言文字之外皆聖人心法之所寓夫豈史之謂哉蓋晉乘楚檮杌魯春秋史也聖人修之則為經昧者以史而求經妄加擬議如蚓蝸伏乎塊壤烏知宇宙之大江海之深是蓋可憫不足深責也鉉翁早讀春秋惟前輩訓說是從不能自有所見中年以後閲習既久粗若有得乃棄去舊說益求其所未至明夏時以著春秋奉天時之意本之夫子之告顔淵原託始以昭春秋誅亂賊之心本之孟子之告公都子不敢苟同諸說之己言不敢苟異先儒之成訓三傳之是者取焉否則參稽衆說而求其是衆說或尚有疑夫然後以某鄙陋所聞具列於下如是再紀猶不敢輕出示人將俟晚暮輯而成編從四方友舊更加訂證㑹國有大難奉命起家無補於時坐荒舊學既遂北行平生片文幅書無一在者憂患困躓之久覃思舊聞十失五六巳而自燕來瀛又為暴客所剽然以地近中原士大夫知貴經籍始得盡見春秋文字因答問以述己意卒舊業焉書成撮為綱領揭之篇端一原春秋所以託始二推明夫子行夏時之意三辨五始四評三傳五明霸六以經正例凡十篇俾觀者先有考於此庶知區區積年用意之所在若夫僭躐之罪則無所逃眉山後學寓古杭家鉉翁謹書欽定四庫全書春秋集傳詳說綱領宋家鉉翁撰原春秋託始上或曰黍離降於國風詩亡然後春秋作自孟子以來有是言矣然平王東遷在魯孝公之季年厯孝踰惠至於隱而春秋始作其故何與曰是其為說多矣杜元凱以為平王東遷之始主隱公讓國之賢君考乎其時而相接者此一說也近代儒先有以為天王不當下賵諸侯之妾春秋因是而始或又以為春秋為桓王而始不為平王愚以當時之事而觀是數說猶未能盡得聖人之意蓋讓雖美德隱公不當讓而讓以致召亂非聖門之所深取而賵妾特一事之失非一經所以始也以為為桓不為平尤非確論蓋春秋之作所以垂王法於後代明君臣之分正亂賊之誅乃王法之大者是故春秋以此始魯自隱公而降臣弒其君弟弒其兄妻賊其夫篡弒之事比世四見聖人為此隱憂故因魯史而修春秋首正王法於亂賊孟子知之故其言曰春秋成而亂臣賊子懼此聖人託始於隱之意也雖然春秋天子事也明一王法以示後世為魯而始亦為周而始也幽王死於犬戎之禍固有以自取而平王者乃幽王之太子母子被讒見逐逃奔於申申侯其舅也為之結援犬戎伐周而殞其君於是平王乃得立申侯犬戎皆平王不共戴天之讎也平王因父讎而得國不思人君之位天位也巳以元子纘文武成康之緒殆天所與而與申侯何有哉而乃銜得國之恩廢復讎之義律以盾止書法平王何以自容於覆載之內三綱淪九法斁莫甚此時聖人於其始年猶望其有志復讎以伸天下之大義義明本正而後有以大服人心振起頽綱號召海內而平王因循茍且終不能以此自厲而戍申戌甫忘親奬讎揚水之刺興焉故夫子於序詩則降黍離於國風於春秋則始隱之元年平之末造始於隱所以誅魯國之亂賊始於平為其忘親奬讎絶滅天理不子不君鄰於亂賊之事聖人為萬世王法春秋作焉春秋為誅亂賊而始夫復何疑不寧惟是衛州吁弒桓魯翬弒隱宋督弒殤鄭突篡昭皆春秋初年事方伯連帥不能奉王命以討亂賊而宋魯齊鄭更㑹諸侯興兵以定篡賊之位反道敗常略無所忌聖人於鄰國之二討陳討衛賊蔡討陳賊屢書以奬之於與國之四逆明法以誅之四逆謂宋魯齊鄭不但誅討亂賊而又併其黨賊怙亂者加以斧鉞之戮將使天下後世之為惡者無復黨與以成其惡此又春秋撥亂反正遏人欲存天理見之始年者也孟子謂禹抑洪水而天下平周公驅猛獸而百姓寧孔子成春秋而亂臣賊子懼真知言哉故嘗謂非聖人不能修春秋惟孟子能知春秋原春秋託始下或曰子謂春秋託始於隱所以討亂賊也而隱桓之弒春秋皆諱而不書其故何與曰史官諱之而春秋為之白之也夫弒君之賊非其國之大臣世卿則貴介公子之用事而有權任者彼弒其君而自立為君或為政於國史官能舉其職而正其罪者幾人哉趙盾之弒董狐書之崔杼之弒太史書之董狐僅自免而太史之死者三人乃克書則為史官而正亂賊之罪者亦難矣魯桓之弒隱弒君而自立為君也文姜之弒桓敬嬴之弒赤弒君而樹其子為君也又有賊臣為之羽翼强國為之外援史臣欲正其罪必將以死爭之乃可而魯無董狐南史之直則亦為之諱之而以正斃書矣故隱桓之書薨魯史為權臣諱耳及聖人作經欲直正其罪則為播魯先君之惡故因其已書而示微意焉隱之死不地不葬桓之死曰薨於齊又曰夫人姜氏孫於齊赤之弒曰襄仲如齊子卒而隱桓赤之弒狀乃白此出於聖人之特筆者也杜元凱謂實弒而書薨者史策所諱謂魯史臣諱之而春秋因之雖因之而實正之也春秋為萬世立法以誅討亂賊為首務臣而弒其君豈容盡為之諱乎而近代諸儒乃曰魯史官固直書其事聖人隱避其惡而修之曰君薨嗚呼君不幸見弒史臣既書之於䇿稍正賊臣之罪而春秋又從而削之聖人亦何心而為此哉每見近代諸儒不以明白正大而求春秋務以迂回曲折而求春秋顯者或索之於隱直者或揆之以迂聖人修經之㫖反因是鬱而不通蓋春秋書法雖有微辭奧㫖之所在至於命德討罪賞善罰惡春秋之心猶帝王之心也似不必専以隱奧迂曲求之也或又曰子般閔公之弒賊既討矣舊史猶以不弒書何哉曰子般閔公之弒公子慶父哀姜為之也前之史官既為魯桓文姜諱後之史官踵其書法而書之亦有所憚而不敢直正其罪耳慶父雖死子孫用事列為三家世秉政於魯史官不以弒君書固其所也慶父之奔哀姜之孫則聖人為之白之以著其預弒之罪也豈惟魯國為然當時諸侯國有君見弒而賊即其罪以討賊來告如衛州吁齊無知等輩曽不數人魯史官得以直書其事其不以告而史失書者多矣如楚商臣齊商人弒君自立為君齊崔杼陳乞陳恆弒君立君而握其國政彼必不號於人曰我實弒君而鄰國之史官得之傳聞亦未敢遽書或又畏其强大憚其為盟主不敢直書其事故齊晉楚之弒其君者舊史類皆不以實書及聖人作經然後以所聞所見裁而正之書某弒其君某此春秋書法所以加於亂賊者也夫豈舊史書之聖人為之諱之乎此外又有國君以弒死而春秋書之曰卒如鄭伯髠頑之類蓋有深意存焉而非所謂隱也又有舊史得之傳聞非弒而以弒書如許世子止之類聖人因之以垂人子事親之法復為之葬之以釋後代之疑是則春秋微辭奧義之所在學春秋者所當深致其思諸儒人自為見有不必惑也或又曰子謂春秋以誅亂賊而始吾既聞其說矣春秋所以終亦可得而言乎曰以誅亂賊而始亦以誅亂賊而終也田恆弒君孔子沐浴而朝告哀公請討之公不能用是嵗春秋以獲麟絶筆矣蓋魯大亂君以弒死者四世春秋所以始齊大亂君以弒死亦三世田氏因以篡齊而春秋終矣故曰以誅亂賊而始亦以誅亂賊而終原夏正上寅卯辰為春寅為嵗首此百王不易之正也虞夏而上春首寅嵗首寅天時王正兩得其正自商人以建丑為嵗首周人復以建子為嵗首而百王之正與二代之嵗首始判為二夫子行夏之時欲正與時皆以寅為首革二代之嵗首而從百王不易之正此夫子平日之志故筆之於春秋曰元年春又曰王正月春之下著正以見天時在是王正在是垂萬世不刋之法也前乎此未嘗無史而紀事者年之下未必皆書時時之下未必皆書月乃今以時繫年以月繫時此夫子修春秋特立為此法以見嵗必當首寅以為春春必當首寅以為正春在是正在是夫然後為正此夫子所以行夏之時也或曰夫子無其位而革時王之正其可乎曰否春秋王法也當因而因當革而革所以垂王法於後代然春秋之法亦不外乎文武成王周公之法周雖建子為嵗首不過發號施令自此而始而周家所以揆時授功者夏時夏正也彼謂周家以建子首十一月者左氏之誤也以為周家變易四時以子丑寅為春卯辰巳為夏午未申為秋酉戌亥為冬者孔安國鄭康成之大誤也蓋自羲皇肇立人極仰觀天運之常俯察氣化之變分隂陽以序四時而春秋冬夏之位以定十二月之次以立皆因其自然之理非聖人以己之私智而為之區别也以窮冬為春而非生物之候也以夏為秋物之方長而未成也以秋為冬而嵗功未畢欲閉藏而莫可也商周聖人之心亦虞夏聖人之心其欽若天道敬授人時一而已矣夫豈變易四時貿亂寒暑而曰吾以是新民聽者哉蓋嵗首者特以發號施令而正月則以紀年授時嵗首可改正月不可改也見之書伊訓元祀十有二月乙丑伊尹奉嗣王祗見厥祖太甲中篇三祀十有二月朔伊尹奉嗣王歸於亳此十二月乃商家之嵗首而但謂之十二月以見商家雖以建丑為嵗首未嘗改十二月為正月也又如臨卦之彖辭曰元亨利貞至於八月有凶指觀而言也臨二陽四隂之卦直十二月觀四隂二陽之卦直八月蓋自今年十二月指明年八月而言當二陽之浸長豫憂四隂之將盛以臨觀相為反對云爾此卦下之辭文王所為是時商人以丑為嵗首而文王之彖惟從夏正此商家月次不易之明證也周書泰誓一月戊午師渡孟津武成一月壬辰旁死魄一月者建寅之正月也春大㑹于孟津者夏時孟春建寅之月也不言正月而言一月者先儒謂商人建丑為嵗首故避正之名而謂之一月理或然也孔氏乃以一月為建子之月其意以為三代改正朔必改月數改月數必以其正為四時之首夫豈知改正朔者不過更其嵗首春秋冬夏可得而變易乎十二月次可得而紊乎又考之詩及二禮其義益明傳注不足惑矣詩豳風七月流火九月授衣者夏時也小雅六月北伐四月維夏六月徂暑等詩與周頌臣工維莫之春者皆夏時也臣工之詩乃諸侯助祭及暮春遣之歸國告戒之辭也曰維莫之春亦又何求如何新畬於皇來牟將受厥明言暮春則當治耕作之事牟麥將熟可以受上帝之明賜夫牟麥將熟則建辰之月夏正之季春也而鄭氏箋詩乃指周之暮春為夏之孟夏則四時為之易位其舛豈不甚乎周官冬日至祀圜丘夏日至祀方澤季春出火季秋納火仲夏斬隂木仲冬斬陽木皆指夏時而言也凌人掌冰正嵗十二月令斬冰傳者云夏正十二月今之季冬也若以為周正十二月今之孟冬水始凍冰未及堅冰可藏乎內宰仲春詔內外命婦始蠶夏仲春也若以為周之仲春今十二月而可蠶乎天官正月始和布治於邦國都鄙者亦夏正正月也而傳乃以為周正建子月此一時而從周從夏之不同其實正月布治者亦夏正也論者謂周公將行夏時故其見之周官者如此特其書以遭變未及施用於當時耳又如禮記月令一篇純乎用夏時者也王肅蔡雍皆以為周公遺書呂不韋稍加傅㑹以行於世實則周公之書彼不韋豈知為此乎汲冢書者不知何所從來要之亦古書也其周月解時解訓等篇四時中節大率與月令相似且其言曰夏數得天百王所同我周改正易械以垂三統至於敬授人時巡守蒸享猶自夏焉又有嘗麥解曰成王四年孟夏初謁宗廟乃嘗麥於太祖若以卯月為孟夏安有麥可嘗乎必如鄭孔之說錯亂四時變易冬夏則所謂分至啓閉十有二候十有二律乃不與天氣物化相應吾知商周聖人必不為此也雜記載孟獻子之語曰正月日至可以有事於帝七月日至可以有事於祖此一節乃漢儒記禮者傳聞之誤耳愚於中篇辨二至二分正謂此蓋古有冬日至夏日至者未聞有春日至秋日至者也今指周正建子為春為正是春而日至也其可乎又指周正建午為秋為七月是秋而日至也其可乎二至既舛二分亦隨之而舛必將以夏正十二月半為春分六月半為秋分隂陽可得中乎寒暑可得平乎此不待智者而後知其不然也又如魯論曽㸃舍瑟一章所謂暮春者亦可指為夏正之正月乎今之正月寒意猶凛既非春服可成之候其浴其風皆不當在此時則此暮春非夏時而何孟子十一月徒杠成十二月輿梁成云者本言修治橋梁必在冬深水涸之時徒杠十一月可成澗水先涸也輿梁必十二月乃成河水後涸至是時乃可施工云耳傳者引夏令為證則非本㫖此又月次不易見之魯論孟子者也自左傳一失以春王正月為周王正月孔鄭再失以周正說詩傳書杜元凱三失撰為長厯以從左傳於訛自是以來千有餘年諸儒議論膠固未能致辨乎此逮河南程先生謂春秋假天時立義有夏時冠周月之說胡文定傳春秋祖述其說一以夏時周月為斷時夏時則寅卯辰為春月周月則子為嵗首時自時月自月不相為謀夫子春王正月之意果若是乎嘗竊觀程子之意似謂夫子以夏時冠周月以見行夏時之意但春秋有年之下書時而紀事者如隱二年春公㑹戎於潛之類自舊已然蓋史失其月僅著其時而春秋因之耳聖人之意正謂周家以建子為嵗首降而至於衰世王正不修厯紀廢壞民聽惶惑有以冬為春以春為夏者如絳縣之年虢童之謡百姓於二代之正莫知所從故修春秋行夏時以正之今以為夫子冠以夏時猶存周月其不然與蓋左傳目王正為周正本非確然一定之論後人以元凱為之長厯而厯法有未易知者故依違而不敢議而不知厯務遷就以求其合唐人善厯者固嘗非之謂日子或不在其月則改易閏餘曲為遷就故閏月相距近者十餘月逺或七十餘月如是而求合果何益於經乎或曰然則用夏正泝而上之至春秋之世可得合乎曰天運有常有變只如日月之行雖云度數一定不能不稍有盈縮有交㑹而不食者有頻交而頻食者故自古無不差之厯是可以定數求乎元凱務遷就求合周正卒不得合每為之遁辭曰此經誤也此厯誤也後人捨五經之明證而從事於厯固當有一二合者然得諸此而遺諸彼合於前則爽於後是亦偶合而已矣是故窮經者不必論厯詳著其義於中篇右述春秋行夏時之義及五經所言商周時序月次不改夏時之明證原夏正中言春秋用周正者左氏傳也羽翼左氏之說為之厯以傳於後者杜元凱也愚未能學厯豈敢輕議前人之非然欲發明夏正之說不容己於言也僖公五年左傳書王正月辛亥朔日南至記者以為周正建子之明證此乃傳之南至而非經之南至豈得置而勿論乎夫閏法自虞夏以來未之有改也厯家置閏率以三十二月為準而長厯自僖元年閏十一月至五年閏十二月相去凡五十月不與古厯術同此杜氏曲為遷就以求合傳五年之南至是嵗南至實不在此月何以言之所謂冬日至夏日至者乃日行極南極北之驗未聞春之首秋之初而可以至言也今左傳於此年春書春王正月日南至是以建子月為孟春春而日至古有是乎春可以書日南至秋可以書日北至乎二至既舛二分亦可從而舛乎左傳於分至啓閉每謹記而備言之今既以子丑寅為春則必以午未申為秋四序分錯中節皆隨之而紊建子月立春則建丑月可得為春分乎建午月立秋則建未月可得為秋分乎春秋分本謂晝夜等寒暑中今以窮冬盛夏為春秋分晝夜可得而均乎寒暑可得而中乎推是以往天氣物化悉皆舛紊愚不知孔鄭謂商周變易四時者至此何以為之說乎此以厯而言也考之𫝊文左氏自不能固守周正之說每每雜引周夏正以揆一時之事而杜氏曲為說以通之有終不可得而通者聊舉一二以釋學者之疑隱三年左傳云四月鄭祭足帥師取溫之麥秋又取成周之禾夏之言麥秋之言禾其為夏時固宜而杜氏乃以此四月為周之四月以此秋為周之夏謂是芟踐成周未成之禾麥何其用意區區若此乎晉伐虢圍上陽問之卜偃曰吾其濟乎對曰童謡云云其九月十月之交乎冬十二月丙子朔晉滅虢左傳以周正紀事卜偃以夏正釋童謡從左傳乎從卜偃乎卜偃生於當時世典晉卜若周家以建子為正月卜偃何為以十二月為夏正之十月乎絳縣老人云臣生之嵗正月甲子朔四百四十五甲子矣師曠士文伯以嵗考之定為七十三嵗老人蓋生於魯文公十一年夏正建寅之正月朔至襄公二十九年夏正十二月為二萬六千六百六十日為嵗七十三而左氏乃載此事於三十年之三月則老人乃生於文公十一年三月甲子而非正月甲子至是七十有四矣藉令老人隱者誤舉夏正師曠士文伯博極精詣不當與之俱誤周家以建子為正而二子以夏正計老人始生之嵗必無是也莊二十五年六月辛未朔日有食之鼓用牲於社左傳云惟正陽之月慝未作日有食之用幣伐鼓則以是月非正陽之月不當用正陽之禮故經以是為譏耳夫既非正陽之月則是月乃夏正之六月奚疑杜元凱求以通周正之說乃曰以長厯推此六月朔乃七月朔置閏失所以致月錯此借厯法之不可知者以為遁辭非經意亦非左傳所以立例之本意是不可無辨也又如城築興作之事或以地利所在而書或以輕用民力而書左氏一以周正為斷曰此時也此不時也宣八年十月城平陽傳曰書時也夫以水昏正為興作之候者傳例也以周正而言此十月乃夏正之八月是時北方七星何由昏正而左氏乃以城平陽為得時而書則十月乃夏正而非周正亦明矣左傳自不守其周正之說後先矛盾不相為同後人乃依違避就而不敢改遂使春秋夏時著義鬱而不揚愚竊恨焉學者知左傳之訛則孔鄭杜之說可以坐判夫然後可與言春秋矣請即經之正文而槩論之夫冬而蒸禮之常也春秋常事不書桓八年正月書蒸五月又書蒸再書之以譏蒸之不以時榖梁子似亦知聖人行夏時之說其言曰蒸冬事也而春興之夏又興之春秋所以譏胡文定又引周官大司馬仲冬田而蒸者以證正月為建子月其可哉周禮仲冬固是夏時十一月十一月而田維其時矣十一月而蒸亦其時矣而春秋之正月乃夏時之正月正月而書蒸謂其過時而書豈得反以周禮仲冬之田而證春秋正月之蒸必指春秋正月為周正建子月謂春秋以一嵗再蒸而書不以不時而書若然則春秋於夏五月一書蒸以譏不時可也正月之蒸既得其時又何以書為哉桓十四年八月辛未御廩災乙亥嘗八月而嘗時也常事不書此所以書為御廩災甫三日而嘗所以譏爾御廩者粢盛之所藏今而告災不知戒懼且不易粢盛而嘗春秋是以譏公榖二傳皆同而孫泰山胡文定乃謂此八月乃周正之八月周正之八月乃夏正之六月六月而嘗不時所以書失春秋繼災書嘗示警之意矣嗟夫蒸之不時者以為時嘗之時者以為不時不過以證夏時冠月周正紀事之說而非夫子平日行夏時志也且以春秋所書寒暑災變而言於夏時大槩可通其不可通者小有疑而未定焉耳隱九年三月癸酉大雨震電庚辰大雨雪記異也震電非異震電而雪所以為異僖十年冬大雨雪書冬不書月且加以大字記是冬寒氣大盛屢雪之為災耳若以此冬為八月九月是時秋氣始肅餘暑未艾安有連三月之雨雪乎又如僖三十三年十二月隕霜不殺草李梅實嚴冬不殺草氣燠也若謂此十二月為建亥月則夏時之十月草未盡殺猶或有之春秋何以遽書為災乎竊詳經文十二月乙巳公薨之下書隕霜不殺草李梅實此於嵗終併書一冬之異非専為此月書也杜氏以其長厯而推謂此十二月乃周之十一月今九月也指此為舊史記録之誤春秋因之愚謂九月之霜不能殺草猶未足為異春秋何以動色而書之曰隕霜不殺草李梅實乎此夏正之冬何疑乃若書無冰而皆在春以冰政不舉而書耳詩七月二之日鑿冰冲冲謂十二月取冰三之日納於凌隂謂正月藏冰四之日其蚤獻羔祭韭謂二月開冰周禮藏冰開冰與之略同春秋於桓十四年春正月成元年春二月襄二十八年春三月書無冰皆為冰政不舉書以譏之耳書螽有在夏秋者為其賊苗而書有在冬者則以陽氣不斂蟄出為災耳哀十二年冬書螽十三年冬又書螽皆記異也窮冬沍寒閉蟄已久而螟蝗生焉其為異大矣左傳乃託夫子答季孫之語歸過於司厯之失閏春秋為記異而書豈為厯乎宣十五年秋螽而冬蝝亦謂之失閏可乎莊七年秋大水無麥苗傳者謂周七月為夏五月故以無麥苗為災非也中原之地種麥最早故月令仲秋勸種麥令曰無或失時是嵗以大水之故種麥失時故曰無麥苗非謂已熟之麥而言也莊二十八年冬大無麥禾謂嵗終計公私所儲蓄而言不然麥熟在夏禾熟在秋何以書無麥禾於此際乎此春秋所書寒暑災變合於夏時者也外是亦有一二之疑皆可以義例而通要以不害於大體之合皆具述於經本文之下生乎千載之後而尚論千載以前事容有未能盡合者質之聖人而無悖考之五經而可證斯可謂之合何必盡求其合而後謂之合乎必欲變易四時錯亂分至以從周正之說則非吾之所敢知也或曰如爾所云詩書易二禮皆用夏時則周人固知夏正之為正矣而周家猶建子以為嵗首何哉曰周禮一書成於周公之手始終皆用夏時而前輩以為中年遭變未及施用於天下故其間制度與當時所行多不能同使其書獲施用於成王之世吾知周公亦併嵗首革而從夏時矣夫子之道周公之道也夫子之心周公之心也學者以是求之後此而秦建亥為嵗首年之下繫之以冬十月而春正乃在一嵗中彼務與古為異而四時十二月次猶從夏時而不敢變豈有三代聖人而貿亂四時紛革月次曰吾以是新民聽者哉右述春秋所書蒸嘗災異合於夏時者及辨左傳雜引周夏正初無一定之說原夏正下頃年里居客有持天台商季文正朔變來示者乃謂夫子作春秋特出新意以子丑寅為春以建子月為正月諸儒有取其說為之序其首愚竊惑焉夫變易四時以從二代之正朔此孔鄭釋經既往之誤前輩辨之審矣季文果何所見更謂夫子作春秋特出新意而為此然則顔子為邦之問夫子夏時之訓皆虛語乎在南方嘗為之辨前二篇所言是也今復疏為下篇以盡前義季文謂夫子將作編年史以一嵗不可為兩冬故特出聖意以子丑寅為春以建子月為正月吁有是哉古之史虞夏商周是也紀年紀月紀日者有之而年之下不皆紀時也或有書時者槩一時而言如秋大熟未穫之類未詳其月故止書時惟春秋以行夏之時故特於年之下紀春而後紀月以見正必在寅而後為正夫豈為兩冬之避乎季文又謂魯舊史以元年十一月書公即位孔子作春秋以公即位之書不可繫之前公之末兼一嵗不可兩冬故不得不改正朔是又不然春秋書元年者國君即位之次年因魯史之舊文也書公即位者春秋所以垂王法也禮國君始立稱子不稱君必先君既葬請命於王王命之為君然後始君其國周之既東此義頓廢父死子立即以國君自居甚者以篡弒得國天子不能討方伯不敢問而人倫幾於掃地故聖人明王法以正之於元年春王正月之下而特書即位或不書即位以見其得國之正否故有上不稟命於天王內不承國於先君則不書即位以正之亦有弒君賊自立與為弒賊所立則書即位以絶之春秋十二公書即位而無貶者五公耳春之與正固皆夏時斯乃春秋垂世之法夫豈為即位之書不可繫之前公而革冬為春以循之乎季文又指左傳書事在冬而春秋書於正月者以證其革冬為春之說不思經傳之相符者千百其不同者二三豈得以二三之不同而致疑於千百之同乎今以經後於傳者為聖人革冬為春之證其有經先於傳者又將何說以處之乎此乃傳疑傳信之有異或諸國來告之遲速故書有先後豈得據此小疑遂謂聖人革冬為春冬之不可為春猶寒之不可為暑傳注考之未精先儒辨者已衆而季文更謂夫子特出新意以冬為春其誣經也豈不甚哉其說本無深解専取杜厯以為據依謂其間有與春秋命厯序相符者厯之為藝解者絶少然亦未有久而不差之厯命厯序者術家以為孔子修春秋用殷厯使其數可傳於後明厯者考其蝕朔不與殷厯合以為漢哀平間治甲寅元厯者託之非古也季文亦未嘗精通厯術學僻而論怪初不必為之辨以一二老學為之序引若有取焉恐其浸傳易以惑人故復著之下篇云右辨商季文之舛明五始元年春王正月公即位傳者所謂五始也然是五者或因魯史之舊文或出聖人之新意書元年魯史之舊文也書春王正月公即位夫子特筆所以垂王法於後代讀春秋者所當首辨也人君即位之始年曰元年初見伊訓愚意夏商以前堯舜而上莫不以即位之始年為元年其來逺矣但元者始乎物者也大哉乾元萬物資始天道所以始萬物君道法焉是故體元居正天子事也諸侯居人臣之位而得紀元是僭天子之元其可哉愚以為三代盛時必無此制王道衰而國始自為元矣夫子魯人因魯史而修春秋不存魯之元年無以紀事非謂魯得紀元而特為之書元年也元年之下繼之以春行夏時也正月之上冠之以王大一統也大一統者正所以革諸侯外夷之僭制為公羊之學者推致師說乃云惟王者然後改元立號春秋託新受王命於魯故因以録即位其意謂春秋與魯以紀元則魯當繼周而王故得用王禮此黜周王魯之說所從之始也愚以為出於何休之推致未必皆公羊之本㫖公羊知王正月之為大一統必不至以魯為周謬誕不經至於如此蓋公榖者雖授學於聖門髙弟皆口以傳授不為之書至漢興以後裔孫門人始為之書以傳於世有失真者矣宣十六年成周宣榭火公羊曰外災不書此何以書新周也何休因是以為夫子上黜把下新周黜把云者謂降公爵為伯新周云者謂以周為王者之後比宋為新其意謂魯得紀元故為此說謬誕不經豈聖人意哉或又變易四時以春之三月為子丑寅之三正為其為二代之正故皆加以王字尤非知春秋者也夫子志行夏時豈有今日修春秋而併舉三王之正者乎當周之既衰天下無王夫子作春秋以垂一王法所謂一王法者百王公共之法非時王法也夫子抱堯舜禹湯文武之道而無位以行其道故託經以垂世若曰後有作者必如是乃可以王天下云耳夫豈魯之云乎亦豈周之云乎或曰如子所言王非謂魯也亦非謂周也亦非謂三代之王也而春秋以王繼春而加於正何哉曰豈惟加正蓋加乎春之三月也謂夏正寅卯辰正月有可書之事則以王加正月正月無可書之事則以王加二月二月復無可書則以王加三月止於春而不及夏者所以正夏時之春也春正而三時皆正矣此春秋奉天時垂王法大一統之義也黎氏謂春秋書王特以繫一時之事以為書春書正皆魯史之舊文何其忽與繼春加王乃春秋一大條貫其義甚博可易言哉若夫書公即位固正始也繼有以書即位為正始者有以書即位為貶絶者篡賊書即位有以不書即位為譏斥者其微辭奧義隨事而見殆未可以一律觀也大率書元年為魯史之舊文書春王正月公即位為夫子之特筆明乎此則識經意矣或曰子謂春秋行夏之時為夫子平日之志是固然矣元年春王正月公即位云者即位於夏之正月乎周之正月乎周之諸侯而以夏正即位其可乎曰周未嘗以建子為正月吾固辨於前矣公即位者春秋所以明王法非舊文也魯君固於柩前即位矣今踰年而書即位者春秋因其紀元而正其即位之禮何周正之有哉禮國君始立稱子於其國不稱君也必先君既葬類見於王王錫之命命之為君夫然後正名體以君其國臣子其民逮周之衰諸侯放恣父死子立不俟踰年即以君位自居春秋為是譏故於魯君即位之明年因其僭紀元而正其即位之禮立以正繼以禮先君既葬夫然後許之以即位若立不正則不書即位繼故而立則不書即位明王法以正之也其有弒君賊自立與為弒賊所立則書即位以絶之絶之於名教所以大誅黜之也此春秋行法之始事特出聖筆非因魯史之舊也魯十二公得書即位者八公而八公之間桓宣二篡以貶絶而書定為亂臣所立書不以嵗首亦貶也隱不書即位正之也莊不書即位有深㫖存焉是豈魯史官所能及哉彼不明此義而謂魯君於明年正月始行即位之禮者舛矣故魯君立未踰年而卒者皆書子諸侯立未踰年而預於㑹盟亦書子觀夫立未踰年而書子則知既踰年而書即位春秋所以垂法之意矣或曰此諸侯之事也王者正始之義同乎否乎曰自天子至於諸侯立未踰年皆不得以君位自居也是以先王立制君諒隂百官聽於冢宰王命未得通於天下春秋於悼王之立書劉單以王猛居於皇其卒也書王子猛卒此天子立未踰年不以君位自居之明證若乃體元居正以即位之踰年為元年則王者之所獨異乎諸侯之事蓋始立稱子不稱君天子與諸侯同踰年正始大一統天子與諸侯異評三傳上公羊榖梁聖人之作經也其大經大法所以垂示千載者門人髙弟蓋得之難疑答問之際退而各述所聞逮至暮年復以授其門弟子公榖氏其最著者也以為派出子夏更戰國暴秦以及漢興其門人裔孫始集所聞為傳前史泝其傳授由漢而上達乎洙泗具有本末其大條貫炳如日星三代而下有國有家者所恃以扶綱常植人極皆春秋之大法而公榖所傳也當漢家盛時經生學士立乎人之本朝決大謀議往往據依公榖其有功於世教甚大其間固有擇焉而不精謂祭仲逐君為行權衛輒拒父為尊祖妾以子貴得僭夫人之類則其流傳之誤也然使後人得知春秋大一統之義內京師而外諸夏內中國而外吳楚尊王抑霸討賊扶善以存天理而遏亂源皆自公榖發之而何休治公羊傳外多生支節失公羊之本㫖范寧治榖梁而知榖梁之非視休為長此則何范之優劣也自是而後衆說蝟興每觀諸儒議論於二傳之是者則置而不言或掠之如自其口出於二傳之非者則毁訾無遺力直謂傳為可廢吁經與傳固並行者也聖人作經初不期後儒為之作傳然經必有傳所從來逺矣春秋傳肇自聖門髙弟迄於漢興其事則左氏紀之其宏綱奧㫖則公榖傳焉不觀左傳無以知當時之事不讀公榖無以知聖人垂法之意彼謂三傳為可束髙閣者夸言也非篤論也愚於春秋取三傳之能得聖人意者列之篇端傳有不能盡兼採諸儒之說諸儒所未及者然後述其鄙見不敢因人之所長又從而毁之也評三傳下左傳昔者夫子因魯史而修春秋始者春秋魯史並傳於世學者觀乎魯史可以得聖人作經之意其後立春秋而戰國魯史散佚不傳左氏採托一時之事以為之傳將使後人因傳而求經也左氏者愚意其世為史官與聖人同時者邱明也其後為春秋作傳者邱明之子孫或其門弟子生後洙泗而其淵源所漸有自來矣故有經著其略傳紀其詳經舉其初傳述其終雖未能盡得聖人褒貶意而春秋二百四十二年之行事恃之以傳何可廢也齊太史子餘曰天其以夫子為素王乎蓋言無其位而託王法以行其誅賞也後人因謂仲尼為素王邱明為素臣以其能輔翼聖經垂之來世耳但其書雜引諸國史及以所聞附而益之往往近誣而失實兼其書不出一人之手前後自為矛盾學者以是惑焉漢儒謂公榖之傳自子夏惟邱明親見聖人在七十二弟子之列然當時皆口傳授不為之書至其子孫門弟子始述其若祖若父若師之意以為之書故雜以秦漢間官名制度此說得之矣吁使左氏不為此書後之人何所考據以知當時事乎不知當時事何以知聖人意乎近世有科場小生専排左氏妄以己意揣摩當時事而為之說進取之士利其新竒可以中舉文之程度相與宗之其蠧春秋誤後學甚矣學者觀乎左傳取其有補於經者而革其舛誣可也一切盡廢而從陋儒揣摩之說則春秋罪人爾明霸邵子曰五霸者功之首罪之魁也又曰春秋之間有功者未有大於四國有過者亦未有大於四國愚謂邵子立論髙矣美矣而五霸之行事實未可以槩言也孔門所謂霸齊桓晉文而已矣孟子曰五霸三王之罪人說者以齊桓晉文宋襄楚莊秦穆為五一說謂夏伯昆吾商伯大彭豕韋周伯齊桓晉文為五邵子所云功之首罪之魁謂衰周之五霸愚以為是五君者功罪不同復有貴賤內外之辨殆未可以槩言也蓋齊桓晉文則中國之諸侯以尊天子扶王室而為號者楚莊則荆蠻僭王而為列國患者也桓文用心固未必純乎為善而楚莊則志乎僭純乎利與中國為水火者其處心行事可得與桓文同日語乎蓋春秋未嘗輕與諸侯以霸尤不輕與荆蠻以霸厯觀二百四十二年中其內外之辨至為嚴謹未有豫荆蠻而霸中國者也後儒為傳義所惑謂春秋與楚莊以霸而桓文與莊襄穆並列為五此愚霸辨所以作善讀春秋者宜知所去取矣當周之既東號令賞罰不行於天下楚僭王楚首叛鄭莊王之卿士而侵犯王略鄭又叛王人子突救衛五國敵王而納朔諸侯大率皆叛矣幸而齊桓者出仗義尊王內正諸華外卻戎狄天下始復知有王晉文踵其行事德雖小不及功則過之方是時天若不生二霸則蒼姬之卜世殆未可知也夫子論齊桓晉文之譎正未嘗及秦宋楚及修春秋於二霸之行事有褒有貶有激有揚權衡衮斧若造化之無私也秦穆固賢君而其功烈不及於中夏特以不吝改過為聖門所取不以霸言也宋襄者當齊桓之既殁晉文之未興能抗荆楚而敵之故春秋於鹿上之盟盂之㑹長宋而賤楚與其有志於中國望其能霸而卒無所成君子無以議為也及若楚莊則南蠻傑者觀兵中原問鼎之大小推其無忌憚之心將何所不為是豈可與齊桓晉文俱以霸稱乎若曰桓文為功之首楚莊為罪之魁庶乎其可也外此則有繼其父祖而霸者焉晉襄也晉悼也襄能保文公之業幹父用譽者也悼得國羣卿之手假之以權漸至不制復以媚悅其卿者媚悅諸侯之大夫鄭人弒君於㑹明知而不敢問衛人逐君立君不惟不討又從而寵奬之甚至諸侯在㑹而與大夫為盟既亂己之君臣復亂人之君臣於是諸侯之大夫並起而抗其君霸國紀綱自茲始壞後以襲鄢勝之餘威復借援强吳以牽制荆楚楚內懼於吳不暇與晉為敵僥幸少安何霸之足言左傳備載晉國諂史率多諛辭後儒窮經不具眼雷同稱譽甚者謂悼優於文愚每為憤歎用不能已於言自是而後有若平昭頃者庸暗不君舉霸業而遜之荆楚中國愈不競至於晉定卿權益尊霸政掃地不復能主夏盟矣齊景公在位日久當晉政衰亂楚熖中撲有可霸之機而其才其志皆不足以有為桓文之業至是始俱掃地無存臣干君强吞弱大併小春秋降為戰國階於此矣外此又有蠻荒之霸於其國者吳闔閭夫差也吳本太伯之後而乃干王略同楚之僭闔閭猶有攘楚一節之可書夫差用兵不戢自底滅亡然以削去僭名自同列國故春秋於黃池之㑹特示奬進與晉俱書然亦正其始封之號而已矣春秋所謂霸齊桓晉文之二君餘不録也或曰若子所言春秋未嘗輕與人以霸而孟子乃謂仲尼之門無道桓文之事者其㫖同乎否與曰春秋主垂法孟子主明道命德討罪春秋教也貴王賤霸孟氏教也當孟子之世王道益逺士論益卑扶而植之其用力與春秋同功其言曰五霸三王之罪人今之諸侯五霸之罪人公平正大足以盡王霸之實後之立言者纍千百不能及此也讀春秋者試以是觀之明凡例聖人之經有常法而不可以定例求也自三傳以來諸儒百家不原書法以求聖人之意每以凡例而律聖人之法其失甚大讀春秋者所當首辨也姑以一二端而言春秋褒善貶惡初不在於書名與字之間如公子友之歸髙傒仲孫湫之來春秋書季子髙子仲孫云者褒之僅見者也天子宰以名書如宰咺賵妾宰渠下聘逆人則貶之僅見者也不可以此律春秋之常法且名之與字千載之下本不可深辨傳者因名以求其貶因字以求其褒害義實甚如孔父荀息仇牧與其君俱死於難春秋之書之録死節也杜氏於孔父則曰內不能正其閨門外取怨於百姓故以名書於仇牧則曰不警而遇盜於荀息則曰從君於昏故皆名之夫荀息固當有責而孔仇大義凜然無瑕可指徒以書名之故强求其罪豈聖人録死節之意哉又如祭仲為宋所執脅而盟之使歸逐君以書法而觀罪實在仲蓋强臣外交鄰國逐君立君罪不容於死公羊乃以為春秋賢仲是以字而不名此以書字之故强求其善至顚倒是非而莫之恤豈聖人誅亂賊之本㫖乎又如泄冶直諫而死春秋之書之以著陳之亂亡肇於殺諫而杜氏以為冶直諫於淫亂之朝以是取死故不為春秋所貴而書其名是直諫死者不為春秋所貴必緘默自全乃為春秋所貴乎名之與字本不可深辨乃以此而定春秋之褒貶此說經之大弊也又如大夫卒或日或不日盟戎盟諸侯或日或不日諸侯遇弒與外國君之遇弒或日或不日公榖所謂月以謹之日以信之者皆拘也春秋褒貶初豈在是然亦有因月日而寓譏貶如公伐宋一月之間敗人之師取人之邑又取其邑非書日無以見其為暴又如御廩災甫三日而遂嘗非書日無以見其為失禮若此之類則為因日以見義以此盡律其餘則不然也又如㑹盟征伐或書爵或書人有書爵而為褒者有書爵目其人而貶之者有列國僭王書爵而正其本號者不専以褒也有書人而為貶者有書人而非貶者有書人槩國人而言者有吳楚預於㑹盟始進之而人之者不専以貶也若因爵而必求其褒因人而必求其貶則貿亂取與而失春秋垂訓之㫖矣凡伐而戰書某及某戰所以别異主客而公榖二傳或以書及為春秋所與或以書及為春秋所譏本無定論至近代諸儒遂執主兵為定例凡書及者皆為貶故有勤王尊周削平外患大有功於中國亦强求其過以應主兵之例者是豈春秋勸功沮罪之意哉春秋固無義戰而彼善於此權度存焉豈容不為别白若霸主之攘僣竊與强暴之慿陵諸夏一皆以為非義而貶之則叛國之兵僣國之兵霸國之兵混而無别春秋書法果安在哉又如救之一字有列國諸侯為强鄰所侵暴而盟主救之此善其能救也有列國諸侯去順效逆盟主伐之同惡救之是其為救豈春秋所與乎又如次之一字有觀釁之次有逗撓之次及之一字有以尊及卑之及有降尊從卑之及有兩微者㑹之為及有我欲之之為及入之一字有入而弗有之為入有入而遂有之為入是數者其事不同其例可得同乎又如猶之一字僖三十一年書不郊猶三望言魯人僭郊之非禮既不郊而猶三望可已而不已也文六年閏月不告朔猶朝於廟言閏不告朔之為失禮猶幸其能朝於廟此一猶字而於僭郊閏朔所施不同其可以例觀乎又如同盟二字自于幽而始本以褒其能同然有天王崩未幾日而諸侯㑹盟而書同盟者有王人與諸侯偕盟而書同盟者則譏也而可以例言乎或曰謂之變例可乎曰變例云者先儒求以通其例之不可通者耳而愚也竊妄謂以變例而求春秋不若以常法而求春秋蓋春秋屬辭比事之書也或聨書以著其義或纍書以盡其義有一嵗而始終惟書一事者有一事而厯數歲屢書以見其義者學者欲求聖人之意必反復究觀而後能有得苟執例以求經是猶有司者執例以廢法其可行乎或又曰書法全同其不可以為例乎曰春秋美惡不嫌同辭有書法全同而不可據以為例者有書法雖異而可以為同者若以書法同異而律春秋抑又拘矣此事之不同而不可以例求也又有時之不同而不可以例觀者焉如㑹盟征伐之事在桓文未興以前諸侯各自為㑹擅兵相侵皆貶之也及桓文既興則有尊王室內諸夏以為盟㑹者有奉王命而伸霸討者春秋猶有取焉逮至定哀之間晉既失霸齊宋魯鄭衛動兵相侵其無道干紀復有甚於春秋之始年者聖人皆所不與凡見之書法皆貶也此所謂時之不同而不可以例言者也既各述於經本文之下復著其大略於篇首俾觀者先有考焉春秋集傳詳說綱領
