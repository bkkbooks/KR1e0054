body:
  text: 春秋集傳詳說卷二十五宋家鉉翁撰昭公三周景王二十年晉頃公元年十有七年春小邾子來朝夏六月甲戌朔日有食之莊二十五年六月辛未朔日食鼓用牲于社左傳云惟正陽之月慝未作日食用幣伐鼓以是月非正陽之月不當舉正陽之禮則此月乃夏正之六月無疑矣至是六月甲戌朔日食傳乃載太史之言以此六月為正陽之月請用幣與莊二十五年所言如出兩人之手以是知左傳雜引諸說初無一定之論後人惑於左氏不根之言而廢春秋經世之法此病甚大不可以莫之辨也蓋春秋自中世以後平桓僖而降王政益壞厯紀廢缺積不頒朔於諸侯夏國之人莫知適從如綘老之年虢童之謡與今兹魯太史叔孫昭子季孫意如各執一說莫能相下由厯紀壞亂閏法不修時序紛錯有以使之然爾太史氏既知過分而未至為正陽之月則正陽當在首夏今乃指其所謂秋者為夏四時可屢變乎四時可變何分至之有哉此一節左氏之子孫門人假異說以符合隱元年書周正之誤誣矣秋郯子來朝郯己氏少皥之後傳言郯子來朝叔孫昭子問以少皥氏鳥名官何故郯子曰吾祖也我知之黃帝以雲紀炎帝以火紀共工以水紀太皥以龍紀少皥以鳳紀自顓頊以來乃為民師而命以民事仲尼聞之見於郯子而學焉告人曰天子失官學在四夷按孔子之意不過謂當時言周魯俱衰典章闕壞而逺方小國之君乃知前古官名之㳂革蓋録之也所謂夷者如孟子所謂舜為東夷之人文王為西夷之人為言逺也或者遂以郯為夷國失之矣八月晉荀吳帥師滅陸渾之戎胡文定曰林父之於潞氏士㑹之於甲氏荀吳之於陸渾皆滅之也而林父士㑹稱人荀吳舉其名氏何哉內外當别陸渾密邇王室非所以别內外荀吳滅之與闢土服逺以圖富强者異以為春秋無貶愚以為書名氏書滅謂之非貶不可僖二十五年秦晉遷陸渾之戎于伊川蓋以二强國之力迫而遷之非戎人侵犯王略自外而竊居於內也先是楚伐陸渾春秋謂其侵逼王畿書以惡之陸渾甚微寄跡內地厯嵗滋久不聞為王室患而荀吳忽用詐計謬言有事于雒而襲滅其國慘矣若謂其二於楚則中國諸侯莫不皆二晉實使之何獨於陸渾而有伐蓋晉之為政者利其富饒襲而取之春秋所深惡也趙木訥更云荀吳有肅清中原之功夫憑陵中夏者楚也晉斂手下氣而不敢問乃以滅陸渾為肅清中原不亦誣乎或曰則將存之乎曰徙而逺之不使近王畿其可矣滅無罪之國焉得無貶冬有星孛于大辰公羊曰彗也其言于大辰何在大辰也大辰者何大火也大火為大辰伐為大辰北辰亦為大辰何以書記異也左傳曰孛于大辰西及漢北辰者是為天極天之中也帝座居之妖氣孛辰為變大矣若為心為伐亦除舊布新之象申須梓慎裨竈以為兆諸侯之火災其言雖中亦巧發善億未為真知天者也後五年王室亂劉單立王猛尹召以子朝篡或是其應楚人及吳戰于長岸榖梁曰進楚子故曰戰此以書一人字之故謂春秋進楚殆不然歟吳之書吳楚之書人有自來矣非始進始貶於此日也吳之志常在於輔翊中國楚之志常在於憑陵諸夏春秋每有取於吳為中國而録之耳今戰于長岸傳以為吳伐楚大敗不書敗録其向內之心也以其為兵首故書吳十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災公羊曰異其同日俱災也外異不書此何以書為天下記異也愚謂火災未足為孛之應也當時知天象者以星孛之後繼之四國之火往往傅㑹而為之說豈知星孛之應逺者十年近者數嵗示人以象使之知所警懼安可指一事之偶應而遂謂上天譴告止於是而已哉是時諸夏亂亡已兆世卿强族脅制其上胥為不軌周室寖微大亂將作春秋降為戰國此其兆也夫豈四國火災之謂歟申須梓慎裨竈之言在後世則為諛將使人主以火災塞天變無復恐懼修省之實矣六月邾人入鄅併見下宋伐邾秋葬曹平公冬許遷于白羽成十五年許遷于葉是後以葉為都昭九年遷于夷傳又謂楚靈嘗徙之于荆平王復之為葉今又遷白羽蓋五遷矣昔齊桓公遷邢及衛不惟遷之而又有以存之衛文公亦能勤儉苦節以自强其國至是猶存今許五遷而國益危傳謂葉為楚地楚人以晉鄭方睦恐以是召冦迫而遷之自是又遷容城不二十年許為鄭所滅楚固大不義許棄中國而從于楚卒以是亡其亦有以自取矣十有九年春宋公伐邾凡書爵而書侵伐者多貶此繼邾人入鄅而書宋公伐邾則與宋公之能討有罪也是時晉已失霸强陵弱大侵小莫之或禁邾蕞爾小國間鄅人之不備襲入其國執其君據有其土晉不能治而宋治之伐邾盡歸鄅俘春秋以是故褒夏五月戊辰許世子止弒其君買趙盾之弒其君許世子止之弒其父傳者比而言之事實霄壤黑白之不同也盾秉政穿弒靈公盾亡不越境反不討賊史臣歸其罪於盾宜也若許止則異於是父非不慈於其子子非失愛於其父非若楚商蔡般逞廢黜之憾而成滔天之惡也而春秋何至加以弒君之罪乎聖人秉法至公而存心忠厚一不嘗藥而遂坐以弒君之罪必無是也歐陽子嘗論及斯事以操刃而殺與不躬進藥進而不嘗三者坐當殊科深有疑於傳家之說而胡文定不以為然愚謂聖人之修春秋多因舊史之所已書而加以筆削趙盾許世子之弒蓋皆舊史已書聖人因之而不改所以垂法於後世也有如許止之事意當時有疑其為弒者魯史得之傳聞著之於䇿聖人修經因舊史而不之革使夫為人臣為人子者謹於視膳嘗藥之事不敢以易心臨之所以垂事親之法夫豈謂不嘗藥者可坐以弒君之罪乎是故書弒於前復書葬于後公羊曰書弒是君子之聽止也書葬是君子之赦止也春秋之法賊不討不書葬今書弒書葬明止本無弒罪因侍疾不謹以陷于大惡公羊兩言盡之矣若夫孟子所謂兼愛之無父為我之無君此以言異端之學末流之弊必至於此胡氏持以證春秋用法之意其不得同歟蓋傳所謂春秋無將將而必誅者為其有欲弒之心而其事未成如公子牙慶父之所為是其事也夫豈非弒而目之曰弒如後儒之擬議春秋者乎蓋魯史官因一時之傳聞加止以弒君之罪是時夫子年已長得之親見聞既因魯史而書弒于前復以身所見聞而書葬于後皆所以垂訓示後與趙盾弒君大不可同日語矣胡氏解春秋每每拈起意誅二字謂止有忽君父之心以為篡弒之萌故加以大惡而不得辭此鞅斯腹誹之誅流毒至於漢而未已其非春秋垂訓之本㫖與蘇潁濵又引律文和御藥不如法者死此必非堯舜三代之法尤不可以證春秋學者於歐陽公之言胡文定蘇潁濵之說願加深思以求聖人之意己卯地震秋齊髙發帥師伐莒冬葬許悼公義已見上榖梁釋書葬之義曰許世子止不知嘗藥纍及許君其意謂不授子以師傅使不知嘗藥之義故纍及之此論雖正然春秋所以書弒書葬如公羊之說而已矣或曰蔡般之弒景與許止之弒悼皆書葬同乎否乎曰其弒異其葬烏得而同二十年春王正月夏曹公孫㑹自鄸出奔宋公羊曰奔未有言自者此其言自何畔也畔則曷不言其畔為公子喜時之後諱也喜時即子臧君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱劉原父以㑹為待放古者大夫有罪待放於其境三年君賜之環則還賜之玦則去㑹蓋待放而非叛也公羊善善及子孫惡惡止其身有益於世教然施之於叛者則恐未然當從劉氏之說㑹蓋待放于鄸君不復之而奔賢於臧武仲之據防以求為後於魯是故春秋録之秋盜殺衛侯之兄縶縶則公孟義初見隱七年齊侯使其弟來聘舊說盜賤者也襄十年盜殺鄭公子騑公子發盜則尉止之徒皆賤者故以盜書今殺縶者齊豹等輩豹為司冦位從大夫而亦書盜賤之也左傳謂齊豹求名而不得以為豹欲求不畏强禦之名為衆人除害而以身當之春秋不與之以名是故書盜愚以當時之事而觀豹實怒公孟之奪其官邑率羣失職之人起而為亂殺縶逐君彼自快其私怒耳何名之求哉此舊說也胡文定以春秋歸獄宗魯是以書盜其義精當從之宗魯者始因齊豹而事公孟豹將作亂語宗魯使之先去宗魯不能去亦不以告其主既而乃與公孟俱死於齊豹之難彼自謂忠於縶信於豹而於二者皆失之知公孟之惡而事之不能早去耽祿也聞齊豹將作亂而不以告其主不忠也雖與公孟俱死而死不足録所謂求名而不得者也琴張聞其死欲往弔之夫子語之曰齊豹之盜孟縶之賊汝何弔焉蓋齊豹犯上作亂之罪顯而易見宗魯食姦受亂之罪微而難見曰齊豹之盜孟縶之賊猶言齊豹所以為盜孟縶所以見賊殺皆宗魯之為豹不足誅而宗魯深可誅胡氏之說有得於聖人之意傳注不能及此矣縶者衛侯之母兄以疾故不得立預聞國政怙權而召亂以是殺身書衛侯之兄譏衛侯不能間制其兄使之預於國政縶見殺衛侯幾以是失國縶不足責其責在衛侯冬十月宋華亥向寧華定出奔陳案左傳宋元公無信多私而惡華向三大夫謀曰亡愈於死先諸乃誘羣公子盡殺之公如華氏請弗許遂劫公取太子及母弟以為質公亦質華向之子已而討之華向奔陳春秋書三卿同日而奔不惟誅華向其君亦有責焉耳華氏自督以來世為亂族鮑之篡弒諸華之力居多挾功專橫黨與盤錯虎視中國蓄謀在亂宋君又以無信多私啓之致三叛同日而作幸而討之克華向俱奔而公又入多僚之讒將加誅於無罪者致諸華內外合勢以叛春秋先書三卿出奔著君臣之俱失道及華向入於南里始以叛書十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛春秋未嘗加人以叛逆之罪至衛孫林父之入戚始以叛書華向繼之自是始有書叛者書入書叛誅姦之極典春秋不輕用也華亥向寧華定首禍於國討而奔奔而復乃挾吳楚之援將以覆其宗國叛狀既著春秋始以叛書若魚石欒盈雖自外而入原其始本無欲亂之心春秋不以叛辟而加之也彼為意誅之說者欲以不叛為叛非弒為弒非聖人意也南里宋國城中之里叛者內外合勢入而居之莫之能禁至於城舊鄘以為守宋其危矣前是魚石入于彭城不書宋彭城今華向入于南里書入宋南里危宋也叛者入其腹心討之而不克則宋為華氏有矣是故危之秋七月壬午朔日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚榖作東義又見二十三年案左傳東國者隱太子之子平侯廬之弟朱之叔楚有讒臣曰費無極取貨於東國諭蔡人使出朱而立東國朱訴於楚楚子不能正也東國繼往又歿焉春秋後先書之閔蔡也榖梁子曰王父死焉父死焉已不能仇又從而奔之春秋書以貶其義正二傳不能及公如晉至河乃復今夏士鞅來聘叔孫為政季氏欲惡諸晉使有司以齊鮑國歸費之禮為士鞅鞅怒以為卑已故公如晉復為所卻明年而執叔孫皆以是故蓋季氏久蓄無君之心故外交强國以脅制其上是時晉頃愈弱大夫之權愈盛魯之强家晉之列卿比而為惡皆叔末之世也二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚晉悼公之討魚石也以諸侯之師圍彭城春秋書以美之今華向為亂晉荀吳齊苑何忌衛公子朝皆以師救宋共討華向于南里而春秋略之不書為其有畏于楚討之不能力叛者皆得逸去也晉楚交兵百有餘年宋人為之出力弭兵楚得以竊霸權號召天下今宋大夫為亂於內楚乃從而羽翼之背施忘義利人之難而伐取其國謂楚非夷不可也先書叛繼書奔楚罪楚之納叛臣也然宋之强族華魚向鱗自彭城以來世為亂再有討芟翦幾無存者而宋得以少事視魯之季齊之田晉之智韓趙魏日為亂而其君付之無可奈何者有間矣春秋詳著三叛之始末嘉宋討叛有成功也大搜于昌間公作姦義已見十一年比蒲之搜夏四月乙丑天王崩六月叔鞅如京師葬景王三月而葬不及期也不及期不如禮也王葬不書此一不如禮而遂書以景王不蚤定繼嗣身死而亂作是故特為之書所以貶也不書葬義已見隱三年王室亂前此子頺之亂子帶之亂春秋不以亂書今而書王室亂此出於聖人之特筆非因舊史而書也蓋有變生於一時而不足以致亂者春秋之所略也變生於一時而足以致亂是故聖人變色而書之曰王室亂夫豈特識叔鞅之言而已哉王猛以太子母弟而立子朝以長庶而求襲位名體淆亂諸夏莫適所從當是時周有兩天子其為亂與頺帶之事異矣蓋劉單之所守者禮律之正而尹召所挾者景王之邪志以邪志而為治命是故亦足以惑人非劉單之所守堅確介衆之人惟義是輔成周之亂將底于亡此春秋所以變常法而為之書也劉子單子以王猛居于皇秋劉子單子以王猛入于王城胡氏曰尊不以乎卑貴不以乎賤大不以乎小劉單臣也曷為能以王猛乎其曰以能廢立之也又曰劉單蓋挾天子以令諸侯而專國柄者也書之未足故再書以著上下之舛逆論固正矣愚以當時之事而觀似非經意之所在也下不以上卑不以尊者其常也下之以上卑之以尊事之變其常者也自昔聖賢處世或蹈其常或嬰其變各盡其職分之所當為期為不失其正而已矣劉單者王朝之大臣守正而不撓者也景王崩繼嗣未定尹召探其君之邪心欲立子朝劉單據禮經立太子之母弟猛劉單所擁者為正則尹召所立者為邪春秋書劉子單子以王猛居于皇又書劉子單子以王猛入于王城與其居天下之至難任天下之至重變而能不失其正也周公之于成王伊尹之于太甲以其所當以也以其所當以乃大臣職分之所當為而以為擅廢立挾天子專國柄愚以為非春秋意也愚非擬劉單于伊周以為大臣當艱難之秋任託孤之寄當以伊尹周公為法也若夫未踰年之君而書王成猛之為王也成其為王而必名以著之當是時不得不名也不名無以見其為立之正而示别於子朝也居于皇出也而不書出王者無外在皇猶在國也出不書入而書入不書入無以奠王於位也或曰君以名見臣以子書何歟曰天子之宰不以名見者常也始立之君而書王書名變也宰不名與其以天下自任也君必名著天位非庶孽之所可干也君以名見臣以子書常從其常變從其變之義也王城者槩洛城而言也已入王城未能正天子之位王與子朝分國而處也餘義見下敬王入于成周冬十月王子猛卒悼王也敬王立義見下居狄泉三年之喪通喪也故天子諸侯未踰年皆稱子皆名皆卒此春秋垂世之法也杜氏謂悼王未即位故書王猛誤也蓋已即位未踰年景王雖葬不及期而葬亦未得以先君既葬為說故悼之居皇也書王猛其卒也書王子猛卒不書王無以示别於爭立之朝書王而名之子之以其立未踰年故也十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼元年叔孫豹㑹諸侯之大夫于虢季氏伐莒取鄆莒人訴于㑹樂王駙求貨於叔孫使請帶焉豹召使者裂裳帛而與之曰帶其褊矣卒無所與婼豹之子也至是坐邾訴為晉所執范獻子求貨使請冠焉取其冠法而與之兩冠曰盡矣吏人與叔孫居請其吠犬弗與及將歸殺而與之食之其父子所守如此亦可嘉矣烏乎魯有賢大夫如此而魯昭不與共圖國事坐視賊臣之脅制以至於死亡亦可哀矣晉人圍郊案左傳去年冬晉籍談荀躒帥九州之戎及焦瑕溫原之師納王于王城此始書晉人圍郊郊者近畿之地子朝據之晉為王討而圍之此王事也而春秋書辭若此何哉蓋是時王猛死敬王立中外未知立之當否晉師在郊莫有為王致力者子朝乘之而入是秋敬王有狄泉之出書晉人圍郊譏用師之不力也夏六月蔡侯東國卒于楚楚靈之滅蔡忍於為惡者也楚平之復蔡僞於為善者也復之而猶專制其國其志猶在於利可取則將復取之矣朝吳之奔朱與東國之死皆平所為蔡雖復猶不復也春秋備書以著楚人之亡狀王父誘而殺焉父執而用焉大讎未復而朱與東又入楚而不返蔡之受屈于楚亦極矣其後昭侯亦以事見拘久之乃免事吳以求報卒以吳師入郢復其父祖四世不共戴天之讎朱與東愧之矣秋七月莒子庚輿來奔義已見十四年郊公之立正也而庚輿篡之今庚輿為國人所逐而郊公復入春秋於郊公之出之入皆略而不書微之也在喪不戚亂臣持以為之過而逐之不能君而可微者也或曰忽突相為出入春秋猶備書之今郊公之出入皆略而不書何邪曰忽突之出入非為其可書而書因事垂法不得不書也録意恢為其死也奔庚輿著其虐也略郊公以其不能君而微之皆所以垂法也戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧吳伐楚次于雞父雞父楚地也楚以頓胡沈蔡陳許六國之師禦之未陳吳出其不虞以諼敗之夫頓胡沈三國楚黨也蔡陳許三國同盟之國也乃相率而附于楚故春秋擠之于頓胡沈之下以貶之賤其為楚役也蓋是役也楚為戎首驅六國之君以禦吳春秋略楚而不書不與楚以主中國之諸侯也或曰䖍既主之于前日今不與棄疾之主奈何曰䖍求之于晉而晉許之責在晉也今棄疾未嘗求之于晉而强驅諸侯以前是故春秋惡之略而不書若六國之君自與吳戰所以誅楚焉制諸侯也凡諸侯之師衆敗必纍數之齊師宋師衛師燕師敗績是也而此不復數一之于楚耳胡沈之君以戰死于外國安得滅今不書卒而書滅不與之以死難也且不書滅胡沈而書胡子髠沈子逞滅若以自滅為文也陳夏齧以獲書貶也或曰春秋前既進吳書吳人矣今而以號舉何哉曰為中國患者楚也今未能翦楚之豪末而先殺二小國之君亦春秋之所惡也天王居于狄泉王猛卒劉單復立其母弟丐是為敬王至是立已踰年尹氏乘其不戒挾子朝自外入王居狄泉以避之是時嫡孽兩爭一王城之內而有東王西王之分名體不正將無以一海內之歸趨故敬王雖失位而春秋猶書天王而無所貶所以别子朝之為僭王也不書劉單以王所以釋劉單之權也以者獨任其事不假他人力之稱也前日王在諒隂劉單獨任天下之重外無諸侯之援則劉單之以王事之不獲已而不得避者也今王立踰年晉師又興則劉單外假大國之援以成其功不得言以春秋所以釋劉單之權也後之為大臣者有挾定䇿功久專國柄以此致禍敗而殺其身纍其家如霍光徐羡之等輩由不明此義也尹氏立王子朝書尹氏立朝尹氏一人之私也尹氏以世卿預聞國政不書其官不著其爵而以尹氏書氏云者一人之私也王位天下之公器惟正惟嫡得在此位尹氏以其所私而立朝是為尹氏之朝而非億兆人之所同戴是故敬王雖在狄泉春秋正其名體曰天王居于狄泉子朝雖得入王城竊大號春秋削其名體曰尹氏立王子朝母弟之立為正則孽子之立為邪春秋於是二者之居之入之立之奔書法詳而不厭垂大公以示後云耳八月乙未地震冬公如晉至河有疾乃復公羊曰何言乎有疾乃復殺耻也昭公七如晉至河乃復者五意如實譖之也而昭公不知引賢人以自近深思所以為保位之計乃數如晉而不嫌其為卑數為所卻而不自以為耻身墮强臣術中而未悟者也然春秋之書之不惟貶公實亦責晉由晉君不君而季氏得以售其險謀肆行而罔忌晉深為可責也二十有四年春王二月丙戌仲孫貜卒婼至自晉公羊書叔孫舍至自晉今從之意如見執於晉以莒故也叔孫見執於晉以邾故也意如在晉譖其君以免其身叔孫在晉抗節不撓晉之諸大夫敬而憚之旋亦歸之其執雖同所以得釋則異故意如至自晉春秋去其氏所以誅也叔孫至自晉春秋書氏以别於意如蓋褒之也是時魯國猶有一叔孫大節凛然足為社稷之衛使昭公能舉國以聽之必不至有乾侯之禍劉原父亦有取於公羊之書氏曰可褒而褒乃聖人修經之本㫖吕東萊乃不以為然謂原父為鑿夫春秋以一字為褒貶叔孫與意如俱執于晉其歸也或氏或否此書法之顯然可見者豈得謂之鑿乎夏五月乙未朔日有食之秋八月大雩丁酉杞伯郁釐卒冬吳滅巢書吳滅巢或曰貶乎曰有書滅而非貶者此類是也為其能復諸樊門矢之仇而録之也諸樊之死春秋書法特異録其為中國故死於難也死難者見録則滅巢者必無貶嗟夫吳以中國之故父子兄弟厯三世與楚為敵自晉人苟求宴安以霸權委楚而吳之敵楚者不為之而下也今而滅巢乃異時入郢之漸巢之滅楚所以亡也使晉人能於此時赫然發憤合力以圖楚則攘楚之功不在吳而在晉矣論者謂書滅巢為貶故不得不辨葬杞平公春秋集傳詳說卷二十五
