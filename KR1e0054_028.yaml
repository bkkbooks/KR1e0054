body:
  text: 春秋集傳詳説卷二十八宋家鉉翁撰定公下敬王十九年晉定十一年九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓寶玉大弓者魯公受之成王以有魯國是之謂分器前此季氏逐君取之以為己之私有其志在於篡而已矣今天奪其魄身既殞而家臣亂於內寶玉大弓乃得歸於公府春秋書竊於前書得於後著季氏可翦而國之大權將復歸於公是以拳拳書之喜之也六月葬鄭獻公秋齊侯衛侯次于五氏五氏晉地也齊衛伐晉次于五氏書次不書伐不與之以伐也陳止齋謂外會書次自厥貉以來未之有也於是再見何中國無霸也齊衛伐晉則其不書伐何春秋重絶晉也愚謂厥貉之次楚莊窺中國也五氏之次齊景圖繼霸也其書次若同而所以為次則異荆楚之窺中國與霸國子孫之圖繼霸不可同日語也然春秋所以譏意蓋有在晉德既衰中夏莫與主盟春秋固幸齊桓子孫猶克自振庶幾託以討賊之事今焉後其所先伐晉次于五氏又伐晉次于垂葭睨晉國之衰而欲掩有其霸業霸業在家而不在晉也是故不書伐而書次非以諸侯不當叛晉即齊而重絶於晉也背盟即楚是之謂叛去晉即齊奚其為叛晉自平公舉中國霸權而遜之於楚春秋固已無望於晉今晉益不競諸侯各擇所從從齊不猶愈於從楚乎使景公能修桓公之業攘楚尊周救災恤患惟義是與則中國所賴春秋方將與之五氏之次可與厥貉之次同日語乎自是再次皆譏也秦伯卒冬葬秦哀公十年春王三月及齊平夏公會齊侯于夾谷公至自夾谷昭七年暨齊平叔孫婼如齊涖盟暨者齊欲之非魯志也此書及齊平公會齊侯于夾谷魯欲之而求之於齊也書暨書及抑揚褒貶之所繫也自襄昭以來季氏外交晉卿以遂其犯上專國之計定八年猶為晉侵齊者再今未三嵗忽及齊平此亦季氏以便其私非為魯國忠計也是時陽虎謀去季氏事不克奔齊請兵以伐魯將以除季氏季斯以是懼汲汲解仇於齊為此會以紓目前之禍亦以晉定無能有為舍而去之耳威福在晉則屈節以事晉利害在齊則背約而從齊此春秋所惡故書及齊平以卑之觀前日之暨平見今日及平之為譏矣是行公親會齊侯于夾谷齊人窺見魯之內有所迫急於得平反以是肆暴犂彌之姦萊夷之劫良以是故耳使非吾聖人相禮動容貌出辭氣有以格齊人之強暴則定公幾不獲免而魯之危甚矣以地至危之也晉趙鞅帥師圍衛七年衛始叛晉為沙之盟八年晉士鞅侵鄭遂侵衛衛侯復欲與晉為盟趙鞅不善撫納乃使賤者盟以辱之衛侯怒遂絶晉而即齊九年偕齊侯為五氏之次伐晉夷儀固恥也晉不能治齊而圍衛以報愈貽誚於諸侯而叛者自是益衆書圍不書伐不與其伐也齊人來歸鄆歡龜隂田此汶陽田魯舊疆也成二年晉人命齊以歸之魯書取汶陽者是也其後晉人使韓穿來言復以與齊魯不之與也故昭公之出齊人取鄆居公末年鄆潰齊人因而取之定七年齊以歡陽關歸魯為陽虎所據虎敗地復歸齊及是齊人以歸然汶陽之壤甚闊僖公以賜季氏為采邑者又在此外也春秋書歸疆見之書法者前後每不同齊人歸我濟西田也宣十取汶陽田也成二取邾田自漷水也襄十九齊人來歸鄆歡龜隂田也定十齊人歸歡及闡田也哀八經凡五見取汶陽取漷水歸疆也書取不書歸以其仗大國而得歸是故書取歸濟西歸歡及闡歸疆也言歸不言來歸以其請之而後得非彼自以歸也惟鄆歡龜隂之歸書齊人來歸言齊人自以故疆來歸非假兵力智計而得之是之謂自歸視其他歸疆有不得同也嗚呼聖人道化所感強暴為之革心有莫知其然而然者左傳所載兹無還之對陋矣雖然聖道功用豈止若是而已哉故必有堯舜湯武之君而後能得臯稷伊吕之佐周室既衰諸侯皆庸夫妄人復脅制於強悍不軌之卿族是豈聖人行道之時而功化因事而見者惟夾谷之會與魯疆之歸耳學者讀春秋至是可以信聖人之道不為空言儒者之學非無實用特患乎克拓有所未至耳夫豈申韓鞅斯以刑名法術劫制天下強人以必從而謂之治效者哉叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈郈叔孫氏之邑也公若為之宰州仇以私怨殺之公若之黨侯犯據郈而叛既而以邑奔齊齊人受侯犯而以郈歸之魯前既歸汶陽此復歸郈此聖人道化之所感不然齊何有於叔孫哉或曰郈之叛叔孫其得謂之叛乎曰此實以邑叛也若南蒯陽虎始皆以公室為辭其後事不成或以邑叛或以盜終而其心迹乃著與郈之叛差不同耳宋樂大心出奔曹宋公子地出奔陳春秋每於一國之事而再三書者深致意焉耳自此兩年間書宋事凡五見而大夫公子母弟奔者三罪皆纍於上春秋所以責景公也樂大心宋之舊臣本無大罪樂溷譖焉宋景不察而遽逐之以豎子之讒逐一大夫罪纍上一也公子地有馬公取之與嬖臣向魋地怒扶魋公怒地奔以嬖臣之故翦其公族罪纍上二也公弟辰母弟也為地請留而公不許辰怒率仲他石彄俱奔其意亦欲君之留之而公復不為止以嬖臣而奔母弟罪纍上三也奔者固皆有罪而宋景所以待其大夫公族母弟者抑亦少恩甚矣君人者人倫風化之所自出己居其厚猶恐其薄居其薄無所往而非薄宋公以嬖臣豎子之故使其母弟公族一朝俱奔考其事過皆在公是故春秋始終備書之不加貶斥而義自見矣至於辰與地之本罪則於下文見之皆以叛書冬齊侯衛侯鄭遊速會于安甫前此齊與鄭衛盟于鹹盟于沙矣今而三國復共為此會無所憚於晉矣前此魯受命於晉而以兵加衛今而受盟夾谷棄晉不復顧矣然而諸侯雖散於晉而不復能翕然並合於齊晉雖衰而齊亦卒不能霸無人焉爾若其有人率諸侯奬王室救災恤患為桓公之所為是亦桓公而已矣惜哉有其機而無其志叔孫州仇如齊宋公之弟辰暨仲他石彄出奔陳國君之母弟奔而書弟其例不一或譏兄之不友或譏弟之不弟今宋公之弟暨仲他石彄出奔陳則譏宋公之不友辰之不弟而仲他石彄以人臣而私事母弟又春秋之所深責也公子地以嬖魋之故為禮而奔辰為之請止宋公弗聼辰怒亦奔辰於君為母弟地則衆公子也辰以地故而自絶於其兄己為不可而又率仲他石彄與之偕行仲他石彄身為卿佐有君不事而與母弟俱奔兄不友弟不悌臣不忠是皆名教之罪人此一書而並貶者也或曰魯宣之母弟叔肸衛獻之母弟鱄宋景之母弟辰或奔或否而其事有相類者於辰也亦何誅曰否叔肸不義宣公之篡弒不食其祿亦不棄其親春秋所深與也鱄以獻公失信於寧殖報德以刑怒而奔終身不向衛國而坐春秋義之而不深責也若辰者以一朝之忿棄其君兄與亂臣為伍春秋所誅是故以叛書可與肸鱄同日語乎十有一年春宋公之弟辰及仲他石彄公子地自陳入于蕭以叛自入春秋母弟之為亂者鄭叔段其首也春秋書克段而不以弟書此書弟書叛何也曰此春秋用法輕重之權衡也段據京以叛志在於篡不言弟絶之於天倫所以誅也辰之出也非有不軌之謀直憤激不平而出故其罪下於段仍書公弟然所以書叛為其結黨而入據邑以叛實叛也前書暨此書及暨者不得已之辭及者從之者也得已而不已者也劉氏曰事君者可貧可賤可殺而不可使為亂夏四月秋宋樂大心自曹入于蕭辰為首惡而仲他石彄公子地樂大心其從也春秋於辰之奔也書暨仲他石彄出奔至其入蕭也書及仲他石彄公子地自陳入蕭以叛嚴首惡之誅逭脅從之戮也又繼書樂大心自曹入于蕭而不書叛叛非樂大心之始謀其罪又下於彼三人觀乎此見春秋用法絲銖無爽必有是罪而後加之以是刑彼意誅云者非春秋垂法之旨也冬及鄭平叔還如鄭涖盟六年以晉命侵鄭取匡此及鄭平以解前日之怨故傳曰始叛晉也自文公之霸魯事晉惟其常中間雖即楚即齊而不敢顯然與晉絶去年及齊平今又及鄭平既背晉不得不樹黨以自固焉耳或曰晉必不可畔乎曰否惟義所在而已季氏昭公之賊晉大夫季氏之死黨定公者親昭公之弟絶晉而誅季氏定公之所得為也前也不能絶之而卑躬以事之今而絶之以利害為向背者也是故有譏前書及齊平此書及鄭平及云者魯欲之也十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈公羊傳曰孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是帥師墮郈墮費而左傳乃云仲由為季氏宰將墮三都於是叔孫氏墮郈季氏墮費成不克墮如左傳所言則墮三都者強家之所欲家臣據邑以叛大夫不能制故墮其城之過制者以塞絶亂源本不出於夫子之意郈費之所以墮以公山不狃侯犯故耳成之不克墮孟氏猶欲為自保計是以攻之不克夫大都耦國古人所戒公羊所謂家不藏甲邑無百雉之城者先王之制也始城費城郈強族所以抗其君今墮郈墮費強族所以自去其疾蓋費郈有叛者故二氏假君命以墮之而成之守者猶事孟氏而不替故何忌猶不受命非吾聖人所欲墮也若聖化所感固有不待兵而從者夫豈不克墮而遂已乎衛公孟彄帥師伐曹晉為盟主衛石買伐曹曹人訴于晉晉人執石買而討焉此盟主之所宜為也今齊以盟主自居衛公孟彄再以師伐曹齊人不敢問則何以盟主為哉此及十三年再書衛彄伐曹著中國之無盟主非獨責衛亦以責齊也季孫斯仲孫何忌帥師墮費義見上墮郈秋大雩冬十月癸亥公會齊侯盟于黃前年會齊侯夾谷今復為此盟皆強家所欲為也前日倚晉大夫為外援以抗其君今晉政不綱外侮交至舍而從齊猶懼齊之來伐是以為此盟也先是陽虎奔齊勸齊侯以兵加魯其意實在季氏齊未能用侯犯復繼往焉故強家者以是懼專意從齊甫盟于夾谷又盟于黃使乘絡繹而不以為繁為是故耳使齊景公能因虎犯公山之釁奉辭以討季氏為魯國去有年之蟊賊猶為義舉足以大服人心而景志不在逺姑藉以市恩強家不惟不能討又從而養成之嗚呼齊之景魯之定其無以大相逺乎十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成成魯之邑也非若外國圍之不能下而遂釋之也魯墮三都郈費已從命成獨負固而未服致其君自將臨之卒不受令而止此皆何忌之所為是之謂叛其可已乎書公圍成公至自圍成內叛而不能討何以為國若定者亦擁虛位而已矣十有三年春齊侯衛侯次于垂葭齊衛次于五氏次于垂葭案傳皆以伐晉春秋惟書次而不書伐不與其伐也非謂晉不可伐也晉既失霸則凡中國諸侯能舉方伯連帥之事者皆可以修明霸業號召天下初不必求之於晉也為景公者當請命于周而遍告于諸侯之國曰晉比嵗多故夏盟無主諸侯強吞弱大併小弗問臣逐君下陵上弗恤夷狄滅同盟之國視非己責弗救諸夏罔所依憑吾承王命將攘楚遏亂以修方伯連帥之職辭直而義壯孰不我從乃今日會某明日盟某又明日次于某其末也復悉力以救晉大夫之叛者愈行而愈陋欲以圖霸豈不難哉夏築蛇淵囿大搜于比蒲搜軍政也魯自宿意如盜竊兵柄舉國中丘甸卒乘皆為己之私有昭公不能君以是故也今意如死陽虎繼亂三家之勢少戢正魯君可以有為之日而定公庸且弱苟安目前而不能為魯國深長慮兵柄可收而不能收政權仍在季氏公室自是遂卑無復興起之望矣亂在內而不能討日搜何益哉書大搜所以貶也衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛晉趙鞅歸于晉人臣不忌其君未有不終於為亂者也晉大夫不忌其君為日久矣衛孫林父逐君晉大夫從而羽翼之魯季氏逐君晉大夫又從而羽翼之羽翼他人之亂臣者皆有欲為亂之心也而其君冥然無所悟一聼其所為及是而三卿俱叛夫豈一夕之故哉趙鞅專殺荀寅士吉射擅興其罪不同所以不忌其君則同也鞅挾晉陽之甲將以內向此叛也寅吉射據朝歌外交齊狄以抗其君亦叛也鞅之交在內故不旋踵而得入寅吉射之交在外故事危而難成春秋於入晉陽入朝歌皆以叛書惟其公也荀躒韓不信魏曼多黨趙鞅為之請復惡寅吉射攻而去之各私其私也春秋先書鞅叛繼書鞅歸言已叛之人非所得歸而歸也非謂鞅無罪而歸之於晉也公羊子乃曰鞅取晉陽之甲欲以誅君側之惡人夫鞅與寅吉射均為有罪均皆當討而云取晉陽之甲欲以除君側之惡此因鞅歸而立為此義其誤甚矣吕東萊曰春秋之世大義不明據城以要其君者皆叛也臧武仲以防求為後于魯則亦叛而已矣此論太過夫以魚石欒盈之據邑而春秋猶不加以叛之罪臧武仲豈欲叛者邪夫子只言其要君要君之罪與叛不同春秋豈妄加人以罪乎諸儒求經之過恐失本旨薛弒其君比三傳不言其所以弒之故以書法而言與晉弒厲公州蒲之例同州蒲之弒衆弒之也薛弒其君當視州蒲之例泰山孫氏謂以國弒者言舉國之人皆可誅此求經之過耳儒者辨理未詳立論失中其流弊將如秦漢之用法一人為非流毒一州一道者非獨法家之罪亦學者用意刻深有以濟其為惡不可不謹也十有四年春衛公叔戍來奔衛趙陽出奔宋左傳謂公叔戍將去夫人之黨夫人訴之曰戍將為亂衛侯逐戍併其黨故趙陽奔宋北宫結來奔夫人南子也衛靈不君南子不婦比而為惡亦既稔矣公叔戍以宗國之老起而正之乃戍之所得為而非戍之所能為也人臣欲正其君者必先自正其身其身既正而後可以格君心之非而措之於善今戍也怙冨而驕素無國中之譽乃欲以正君自任事不濟而速禍宜也春秋書三大夫之奔所以著衛亂之所從始二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸楚為中國患百有餘年至是始戢諸侯無從楚者而陳之從之不替怙惡愈堅頓本楚之與國嘗與夏盟召陵之會頓子在焉其不屈於楚正也陳以盛德之後當荆楚既衰猶比而從之不釋真無人心者矣春秋書楚結陳他連兵滅國誅楚而罪陳也凡國亡不能死而見執者皆名夏衛北宫結來奔義見前公叔來奔五月於越敗吳于檇李公作醉里越書於越卑之也吳雖用夷禮而太伯之後且有攘楚之功春秋於柏舉之戰固嘗褒之矣越以楚故襲吳而入之吳不能竟攘楚之功者越議其後耳是故昭十三年始書越至定五年入吳而書於越賤其為楚用也或曰柏舉之戰吳固爵矣今其敗而以國書何歟曰勝而驕驕而敗敗而遂亡是故夷之耳吳子光卒此闔廬也敗于檇李傷而死子夫差立厲志復讎使人立於庭苟出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越夫以闔廬為父而夫差為子皆有英才俊識足以當大任太伯之後其將興矣而安於固陋不能登進忠賢崇尚周禮倐興而乍偃惜哉公會齊侯衛侯于牽義併見會于洮公至自會秋齊侯宋公會于洮自齊景規霸衛鄭魯既與之同盟宋猶未忍絶晉至是始及齊為此會蓋始從於齊也左傳謂于洮于牽之二會皆謀救范中行若爾齊宋魯衛相率而預於亂者也春秋初年諸侯連兵助亂而不以為恥及桓公之霸明分義以示天下此風自是頓革今齊景欲纘成乃祖之霸業而率三國之君往輔人之叛者彼三國之君冥然與之俱而不知黨叛輔逆之為不可世道至是一變春秋降為戰國景公亦有責焉聨書二會皆貶也天王使石尚來歸脤公羊謂石尚天子之士是故以名書愚以為譏也齊桓之霸也襄王使宰孔賜之胙曰天子有事于文武使孔賜伯舅胙此殊禮也嘗施之于葵丘之會自是以來諸侯非有大功不受此賜定公受位于賊臣不以王命立其罪當討周室衰亂不能正辟則已而天子遽遣使以脤來歸以襄王所以寵桓公者而施之魯定彼以何德而應受此賜乎若謂每祭必歸則為常禮春秋何以書此以王寵濫加而特書以譏之耳是故王使以名見衛世子蒯瞶出奔宋左傳載蒯瞶謀殺夫人南子事不克而奔劉氏權衡曰蒯瞶雖不善謀安有此事哉且殺夫人蒯瞶獨得全乎蓋蒯瞶聞野人之歌將以告之于君夫人懼其斥己之短因太子來朝啼而走曰太子將殺余靈公惑於南子之譖不為之辨以是逐太子此其真也又蒯瞶奔宋宋南子之家也蒯瞶負殺南子之名而其奔也又入其家此必不然愚少讀左傳即有疑於此後見劉公權衡乃知前輩已有是言蓋靈公夫人雖淫亂不道初不聞動搖家嫡如驪女宋芮之所為彼蒯瞶縱強愚無知亦豈有以道路不根之語挾刃入宫蹈必死無赦之罪如傳者之所云乎蓋蒯也欲以野外所聞為其君告而輕淺不善為謀反為夫人所先以是而逐春秋不去其世子之號以是故耳自入春秋衛國再亂始以宣公納伋妻終以靈公溺南氏綱淪法斁內憂外患相乘而起以是知一身一家一國理亂脈絡相為流通聖賢六經所以垂戒殆非虛語春秋先書三大夫之奔至是遂書大子逐衛亂已成而靈公猶不悟其後子據國而抗其父臣稱兵以伐其君大亂幾亡可不懼哉可不戒哉衛公孟彄出奔鄭宋公之弟辰自蕭來奔義見前大搜于比蒲邾子來會公髙郵孫氏曰比蒲之搜未還而邾子來會公是知搜者公也不書公政在三桓也棠魚郎狩地逺則譏政自公出故皆書公自昭之紅搜政在三桓搜田之禮雖公自行而政之所出實由三桓故皆曰大搜而不曰公所以見公之不得為政而大夫專也此説甚善公在國中國人惟知有季氏公在軍中士卒惟知有三家定之不能君亦甚矣春秋不書公實有深意城莒父及霄城兩邑譏勞民與城諸及鄆同例搜之後繼之以城皆譏也魯國之禍在三家而不在敵國是時三家少戢為定公者當復軍制之舊以丘甸卒乘歸之公室而魯無事矣而乃懷賊臣立己之私恩撫機而不能斷國之大權仍在季氏搜何益哉城何益哉哀公不沒於魯定實為之附見是嵗無冬闕文耳何休云是嵗孔子以大司寇攝相事齊人饋女樂孔子去不書冬者貶也又曰冬隂也臣之象也去冬以見無臣道此休等牽合之説聖人豈以去位之故缺冬不書乎缺文何疑十有五年春王正月邾子來朝邾魯不相為下有自來矣今中國無霸諸侯擅兵魯之強家且將不利於邾故邾子以去年來會為未成禮此復來朝未幾奔魯之喪其卑屈抑亦甚矣而哀二年季氏卒興師夷其國春秋備書之責魯也鼷鼠食郊牛牛死改卜牛義見僖三十一年二月辛丑楚子滅胡以胡子豹歸召陵之會頓胡之君皆在曰以侵楚也是後楚有吳患不能報去年滅頓今年滅胡所以報召陵之恥蓋不能報之於中國而吞噬小國以快其宿憾春秋之書之閔之也正如江黃二國慕中國而來從其後楚人加之以兵霸者坐視其急而莫之救後先皆亡春秋以是而責齊晉今胡頓以從於伐楚後先見滅春秋閔而書之晉既衰亂不足責矣胡氏惑於左傳之浮辭乃謂胡子實有自取滅亡之罪故楚子書爵胡子書名安有滅人之國而無貶而更爵之者乎爵之目其人也胡子不能死難是故名夏五月辛亥郊義見僖三十一年壬申公薨于髙寢當定公之世聖人道化既行於魯國未幾去之謂定公而不知聖人則夾谷之相儒效宣昭自是而為司寇攝相事若將舉魯國而聼之者卒之去而公不留行是孰使然哉聖人之道不與強家之政對峙而並行也方家臣為亂季氏懼而自戢定公猶得以少伸其志及費郈既墮三家之氣勢完復如舊而聖人之身不能一日安於魯正由定公用心不剛向道不篤故羣醜得以復出為害道之將廢與命也於定乎何誅鄭罕達帥師伐宋宋公子地奔鄭鄭人為之伐宋取地以處之鄭為戎首春秋是以貶齊侯衛侯次于渠蒢或曰此齊衛之三次一五氏二垂葭三渠蒢皆伐也而春秋以次書何哉曰知義之當為而為之不勇貶也知義之不可而為之不已亦貶也五氏垂葭以救范中行知義之不可既進而次此救宋知義之當為而為之不力書次皆所以貶也乃若齊桓伐楚次陘當伐而伐當次而次者景不足以知此邾子來奔喪義見九月滕子會葬秋七月壬申姒氏卒定公之妾哀公之母義併見下葬定姒八月庚辰朔日有食之九月滕子來會葬自入春秋未有書來奔喪會葬者今書奔喪會葬譏也禮天王崩諸侯相率奔喪逺者躬會葬周衰小國以事王者而事大國魯君嘗奔齊晉之喪會楚之葬春秋不書諱之也邾滕之君來奔喪會葬而皆書者非嘉其來志其禮之僭也丁巳葬我君定公雨不克葬戊午日下昃乃克葬左傳曰雨不克襄事禮也榖梁曰葬有日不為雨止禮也不克葬葬不以制也二説不同左傳之意若曰送終人子之至痛雨而葬必有不能盡人之情者故以翼日而葬為得禮榖梁之意謂國君之喪塗車蓑笠不能具以為非制然權二者之宜在乎孝子慈孫之誠敬何如耳近世名儒禮家亦有講於此事者有謂雨而無害於力役者雖葬可也其或天變駭異雨甚水至不可以即土汲汲焉葬反為不可追之悔則左氏之説亦未為失然春秋之書將以垂法於後國君之葬宜無所不備然以雨故不克葬明日乃克葬謂之無貶不可也辛巳葬定姒姒氏之卒不稱夫人其葬也不書小君則定姒非嫡夫人何疑公羊曰定姒何以書葬未踰年之君也有子則廟廟則書葬公羊之意以定姒為哀公妾母哀公立未踰年故僅書其卒葬云耳蓋成風敬嬴以妾母而稱夫人小君而卒葬者以僖宣居位久既尊之為夫人事之以母其卒也以夫人薨葬告於同盟之國袝於祖姑而不袝於妾祖姑是故成其為夫人之禮夫子作春秋於魯國小君之名號不得而削之故因而書之耳今哀公立未踰年子尚不得稱君妾母豈得而僭夫人小君之號故書定姒薨葬定姒其得書薨葬明其為君母也不書夫人小君著其為妾母也春秋於魯之妾母著義甚精雖不削其夫人之號亦未嘗輕與之以夫人之名特傳者求之未精耳冬城漆冬而城時也所以書必有其故左傳乃云不時告也實以秋城魯知其不時及冬而後告于廟其未然歟漆閭者邾庶其之叛邑城他國之叛邑以為已邑是故書以譏春秋集傳詳説卷二十八
