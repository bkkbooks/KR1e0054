body:
  text: 春秋集傳詳説卷六宋家鉉翁撰莊公中是嵗荘王十三年齊桓公二年十年春王正月公敗齊師于長勺此敵讐也讐伐我而敗之我之所得為也左氏詐戰之例本不可用而況以此施之敵讐之師乎胡氏曰齊師伐魯經不書伐責魯也詐戰為敗敗之者為主故書魯為主以責之愚謂胡氏以左氏記事之常辭而律春秋經世之大法非聖人意也齊於魯為不共戴天之讐魯荘孱不能報更為之納亡公子焉此春秋所為甚閔欲其自強而不可得者也乾時敗歸齊人得志取子糾而殺之魯復不敢校而桓公挾其殺糾之餘怒以兵加魯魯之師直桓之師曲春秋書法坦然易見也幸魯有君子曰曹劌明義正色與之争於是有長勺之勝春秋幸魯荘能與讐國為敵而又勝之書曰公敗齊師于長勺喜之也胡氏乃律以詐戰之例謂春秋有責于魯吁曹劌陳義如此謂之詐可乎春秋書法如此謂之貶可乎明於復讐大義者而後可語之以此讐雖殞讐國無時而可忘也自是魯及齊宋三戰三勝春秋皆以直敗書直敗者僅能郤而去之耳必如傳例是三戰皆及其未陳無是理也盖大崩曰敗績小勝則書敗某師二月公侵宋三月宋人遷宿遷國之始自荘公立宋魯久息兵至是以争宿而有隙宿者介于宋魯之間小國也宋欲屬之魯亦欲屬之宋将遷宿以自近魯出師與争春秋聨書之責宋也亦責魯也怙強以遷人之國宋固有罪大讐未報而以末節細故與鄰國構兵春秋所以為魯責也遷國之例榖梁曰遷者猶未失其國家以往者也遷有三義有自遷者有為人所遷者有怙其強大而遷人之國以為彼附庸者宋人遷宿齊人遷陽怙強而遷之也春秋貶而人之有為外宼所廹而盟主為之遷之者邢衛之遷是也春秋予之又如蔡遷州來吳人遷之許遷葉楚人遷之則是王政不行天下無伯而不能撫之者也惟邢衛之遷在春秋二百年中遷之最善者後莫有繼之者矣夏六月齊師宋師次于郎公敗宋師于乘丘齊桓公既殺子糾再以師加魯又挾宋而與之俱此桓公初年之過舉春秋書齊師宋師次于郎見其兵勢之盛止而未進者其謀叵可測耳魯荘乃能自將以禦之敗宋而郤齊齊仇也宋仇之黨也敗仇人之黨與殺仇亦等耳左氏不明春秋立義之所在每以直敗為詐戰魯荘初年敵仇之兵四戰三勝吾以為春秋幸其能如此無貶也齊之師曲又連宋與俱則貶也木訥乃云齊桓不忍闘其民全師而反聖人許之吁有是哉齊桓既得國敗魯兵殺子糾忿心未巳又為長勺之役至是又與宋俱出師侵魯此豈不忍闘其民者乎霸者所為未能純乎天理初年之齊桓與中年以後之齊桓有若兩人當與而與當責而責聖人書法公如天地學春秋者不必為傳例所惑據檀弓上篇乘丘之戰乃敗而非勝此亦經之疑也姑存于此秋九月荆敗蔡師于莘以蔡侯獻舞歸義已見桓二年蔡鄭㑹于鄧按杜氏注曰荆者楚之本號榖梁傳曰荆者楚也何為謂之荆聖人立必後服天子弱必先叛故曰荆推其意若春秋之書荆書楚聖人顯寓褒貶者然而公羊亦有漸進之說愚則謂杜氏之說是也葢荆者楚之本號宣王之詩曰蠢爾蠻荆大邦為讐魯頌曰戎狄是膺荆舒是懲詩所謂荆即楚也當時固以荆而目之豈其初得封之本號歟及東遷以後兼并羣蠻斥地漸廣有熊通者求進爵於周天子弗許遂僭號為王其革號為楚亦當在此時僖元年春秋既書楚人伐鄭而頌猶以荆舒為言中國之人未盡知之耳公羊以為州不若國國不若氏氏不若人謂春秋以漸進之其不然歟如吳如越如戎如狄其號始終惟一不以革號為進退襃貶也春秋先書荆後書楚亦因魯史之舊文紀其實耳若夫書荆而不及其爵不齒之以人則春秋所以外之也為其僭王而有憑陵中夏之心是故外之徐與吳越皆以是故擯於春秋非特一楚也劉原父曰吳太伯之後楚祝融之後徐伯益之後越大禹之後其上世皆有元徳顯功通乎周室與中國冠帶之君本無以異惟其僭王是以外之然猶不欲遂絶其類是以書號則列其本封辨爵則黜其僣竊推之可逺引之可來此聖人慎絶人也此論固美然既以其僭號而外之必其能削去僭號自同於齊晉之尊王夫然後可以引而進之且是時戎有姜姓之戎狄有姬姓之狄皆自以為先代之後不特吳楚越為然春秋雖欲進之彼安於故習有不得而漸進也不書戰而書敗乃所以略之也著不書獲蔡侯而書以歸者不與楚以擅執諸侯之權也公羊之説固深有契於春秋之㫖矣若死難而見執於强楚也此春秋辨内外之始故法度尤嚴其後楚患日深書法與此少異皆為中國憂非以進之也義又見荘二十三年荆人來聘僖元年楚人伐鄭冬十月齊師滅譚譚子奔莒公羊曰滅者亡國之善辭上下之同力凡書滅罪在滅之者不在亡者此聖門遺訓公羊子有所授矣此滅譚及十三年滅遂再書滅皆以著齊桓滅國之罪方是時桓之功烈未聞於天下而先以其私怒滅兩國焉春秋烏得無貶木訥乃引仲虺之誥謂弱不自存則兼之亂不足治則取之有亡形則侮之有亡道則推而亡之以為成湯仗義以正天下所存者大所亡者輕齊桓之滅譚將以示威於楚聖人予其示威於楚是以書師吁有是哉行一不義殺一不辜而得天下湯武不為也仲虺以佑賢輔徳顯忠遂良對兼弱攻昧取亂侮亡而言上文以言善善下文以言惡惡非乘其弱昧欺其亂亡而取之也而況齊桓以私怒滅譚滅譚不已又滅遂聖人特書以示貶木訥駕空立説謂其滅譚以威楚聖人予之非但不得春秋之意又加誣於成湯之行事以此釋經實誤後學愚不得不辨若夫譚子奔而不名猶存其爵正所以著齊桓滅國之罪為其滅無罪之國故不名云耳自是國滅而其君奔者不名楚滅弦狄滅温是也誅在滅者不在其君徐子章羽則以先服後奔之故名以貶之盖以國滅而奔者義不事讐志存興復是以猶為春秋所予國滅而不能奔甘於事讐而不以為恥或為所執以歸尤春秋之所賤惡者也以此示後世猶有國亡不能死甘於為愍懐為叔寳為皓為禪者吁可歎哉魯滅國義見隠二年滅夷狄義見宣十三年十有一年春王正月夏五月戊寅公敗宋師于鄑左氏謂師未陳而薄之曰敗某師大崩曰敗績諸説多本之愚謂魯荘及齊宋三戰三勝春秋皆書公敗某師于某豈三戰皆未陳而薄之也盖書敗績者大崩曰敗績是也書敗某師于某者僅能郤敵自救而已必持此一例以律其餘則窒礙而不可通矣魯弱國也荘公孱君也積為齊人所欺有父之讐而不敢報今焉稍克自振春秋喜其能立是以書是役也宋以齊故再以師侵我魯敗宋猶敗齊也故無貶秋宋大水外災不書此所以書録魯荘之能恤災也魯與宋比嵗交兵然猶不廢弔恤之義春秋嘉之是以書冬王姬歸于齊義已見元年冬此魯莊受命于王再為齊人主姬之昏書法不與元年同者仇人已殄故也孫泰山曰羣公受命主王姬者多矣唯元年與此書者惡公忘父之仇再與齊接昏姻也孫公之論正矣然是時魯荘且将請昏于齊惟恐其不能得則於奉命主昏復何所恤春秋詳記而備書著魯荘忘親事仇之罪耳十有二年春王三月紀叔姬歸于酅叔姬者伯姬之娣紀亡伯姬卒齊人𦵏之因是見叔姬者愚意其從紀侯大去其國至是紀侯死歸于酅盖以紀之宗廟在焉故也杜氏以為自魯歸酅非也是時紀既亡矣而春秋猶書紀叔姬者録叔姬也録叔姬是以存紀於既亡之後叔姬婦節不與紀俱亡也公羊謂歸于酅者歸于其叔叔其可歸乎盖紀之宗廟在焉義當歸也夫死無子而終於父母家者非正也終於夫家正也紀侯雖死於他國亦當祔于酅廟從其祖此禮之變其亦甚可哀矣夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧春秋書弑君而及其大夫者凡三人皆所以録死節也杜氏以名字為襃貶乃曰仇牧不能豫警而遇盜無善可襃是以書名大夫死君之難而曰無善可襃其誤甚矣公羊子於仇牧而曰不畏強禦有得於聖人襃録死節之意傳注每因書名而求其所以書名之故曲為之説以貶之因書字而求其所以書字之故曲為之説以襃之其病甚大讀春秋者不可不知也仇牧名也君前臣名禮之大節劉氏之義正矣或曰左傳太宰督亦死於此難奚以不得書曰督者即前日弑殤公殺孔父之人身負弑君未討之罪今復為盜所殞此亂臣迄天討不可以死節言矣舊史固與仇牧同書聖人削之愚意修經之際一筆一削似此更多宋萬南宫萬也以討故去其族餘義見桓二年宋督之弑冬十月宋萬出奔陳宋萬魯囚也佚獲而歸以一朝之忿弑其君更立君焉彼非當國大臣素執權持要之人而弑君立君國人靡然從之甚矣宋國之無政而閔公之不君也案左傳蕭叔大心及戴武宣之族舉兵討賊南宫萬奔陳猛獲奔衛宋人皆取以歸正其典刑立公子御説為君其事與衛人殺州吁相類而春秋不書良有故也宋荘與華督内外合謀弑殤公而簒有其國周無王不能正其戮也今宋荘雖倖免而嗣子卒以弑死華督首惡乃為南宫萬所殺此天討之加于亂賊者也萬雖有弑君之罪而所殺者乃殤之賊故春秋不與督以死節而萬之討亦併廢不書示督與萬俱有當討之罪也賊討不書𦵏宋不告魯不㑹也附見是嵗荘王崩僖王立王崩重事也魯史廢而不書春秋因之貶在王矣人君之身風化之所自出荘王尊為天子即位七年乃克𦵏親不子不君無以逭名教之責春秋於其崩也削不書所以著其緩𦵏之罪而垂法於後世十有三年春齊侯宋人陳人蔡人邾人㑹于北杏此齊桓創霸之始傳曰㑹以平宋亂春秋與之齊侯書爵襃也諸侯書人著衆望之所同屬也或曰孟子謂仲尼之門無道桓文之事者而春秋於齊之始霸爵桓公而人諸侯謂聖門賤霸豈其然乎曰孟子談王道於衰世故霸功在所不録春秋垂王法以示萬世命徳討罪賞善罰惡如元氣之行乎四時洪纎髙下各遂其性而共由乎王道之中法即道也非王道之外復有王法也孟子謂聖人之門無道桓文之事者言聖人之門不學為此等事非盡廢天下之功而弗録也而況霸者伯也古者分天下屬之左右二伯八州侯牧咸聽命焉周召分陜乃三代相承之制周衰二伯不建已乆方伯有能以尊王室正諸侯攘㓂亂為事者是所謂伯也王道盛明中國尊安固何事乎伯王綱陵夷諸侯恣擅猶幸天下之有伯故夫子平日議論間有取於齊桓為其能以尊王室正諸侯攘㓂亂為事也及脩春秋於北杏之㑹惟齊侯書爵諸侯在㑹者皆書人書爵貴之也書人示衆望之所同屬也自周室之東威令久廢楚僭王而楚首叛猶曰蠻荆不足多責鄭荘周之卿士侵犯王畿射王中肩鄭又叛齊襄率宋魯陳蔡敗王人救衛之師而五國皆叛矣環視四方莫有能倡義尊王者桓僖之際周之不亡者幾希幸而桓公出焉毅然以天下自任文武成康之業所以未墜於地桓之功居多春秋之爵之豈徒然哉胡氏乃謂桓非受命之伯諸侯自相推戴以為盟主是為無君故四國稱人以誅始亂齊桓稱爵其與之也又曰誅諸侯正也與桓公權也必若此是權與正判然為二也其首者見爵其從者有誅是春秋略其首而治其從必不然也而況齊自始封為方伯國桓公之興始㑹始伐皆以王命行之王人董之謂非受命不可且自入春秋以來宋齊魯衛鄭之君今日而㑹明日而盟惟以黨簒怙亂為事今齊桓之為此㑹曰以平宋亂南宫萬猛獲逃之未幾旋伏厥辜皆霸討之所及也自是數十年間簒弑之事頓息中國有所恃夷狄知所畏謂非桓公創霸之力不可故北杏之㑹春秋貴之無貶也因見陳止齋説有曰春秋始年諸侯猶知尊君親上及齊霸而諸侯不知有王論固美矣矯枉過直非事之實聊述此以附于諸賢之後附見春秋之所謂霸惟齊桓晉文而已左傳言五霸或以為商周之五霸或以為齊桓晉文宋襄秦穆楚荘為五霸愚謂襄欲霸而未能穆霸於戎者不可與桓文同日而語楚荘僭王而猾夏奚霸之足言故自桓文之外春秋皆不與之以霸已于綱領及之茲舉其略夏六月齊人滅遂左氏謂齊為北杏之㑹以平宋亂遂人不至齊滅而戍之㑹而不至者固為有罪罪未至於滅國也霸者假公義以濟私欲滅譚矣又滅遂此不過為拓土開疆之計先王之有天下也以興滅繼絶為事而霸者滅國不忌是之謂無王滅譚貶矣滅遂又貶齊無所逃罪春秋於三年之間聨書二滅以著齊桓之罪功過不相掩也秋七月冬公㑹齊侯盟于柯胡氏曰敵惠敵怨不在後嗣魯於齊襄為仇今既易世可以平矣是以春秋皆爵之而無貶愚謂敵怨不在後嗣者謂疆場小忿可以釋怨於易世之後若不共戴天之仇怨無時而可釋如公羊子所陳者春秋之義也魯荘於齊襄之未死也不以為仇而莫之報春秋責之屢矣及齊襄既死因納糾之怨與齊屢戰敗之於長勺又敗宋却齊於乘丘聖人喜其能自強書以録之猶望其能伸復讐之義也盖魯荘至是始壮而有知苟能因是二勝伸大義於讐人已死之後猶足有辭於千載曽未幾日而為柯之盟矣聖人前日責之甚深望之甚切及是而無責始以㑹盟之常書之非與之也曰公曰齊譏公與齊始特為㑹盟也諸侯皆在而魯預猶曰以從王事㑹盟之公也今齊魯特為盟㑹自是遂解讐釋怨請昏于齊朝夕奔走於讐國之庭而不以為媿盖自柯之盟始謂春秋無譏不可也春秋為魯君頻弑臣子不能討賊而始為平王荘公不能復父讐而始故以齊襄之無道能復世讐則與之蔡昭之微弱能復父祖世讐摧強楚而入郢則大書以襃之夫豈為讐人之身已死而怨可釋乎胡氏謂柯之盟春秋爵之無譏而以公羊子復讐之論為不然所關甚大不得不辨公羊所載曹子手劒脅盟事皆傳聞之誕辭非經意所繫故略十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋案左傳宋人背北杏之㑹齊以諸侯伐宋請師于周王使單伯㑹之自東遷以來諸侯擅與兵相侵伐不復知有王室今齊桓用師于宋必待王人與俱彼非不足於力也以為征伐當自天子出必如是而後有以服天下之心霸政之所先也公榖諸儒因元年送王姬之誤以單伯為魯大夫失春秋書㑹伐之㫖矣魯大夫出預㑹盟征伐不書字也此單伯乃畿内諸侯周之著姓即元年送王姬之人非魯大夫也於霸政有關不得不辨或曰宋當伐乎曰自入春秋宋魯衛鄭皆有無王之心皆嘗黨簒賊而違王命計其罪類當討也而宋為大國所當先治今奉王命而往雖未造其國都而彼已知懼餘皆從風而靡矣曰北杏之㑹齊書爵此書人何哉曰此春秋責備賢者之道也前日北杏之㑹不請于王今宋人背北杏之㑹乃請于王而伐之故雖與其尊王而書人以少之惟其與之以霸是故責之也備自是齊書人而序之宋之下者再三皆貶也責備覇者之道也秋七月荆入蔡荆以號舉初見十年秋九月魯桓二年書蔡侯鄭伯㑹于鄧左傳曰始懼楚也是時楚氛未張鄧人三甥已有亡國之憂至荘十年敗蔡于莘以獻舞歸及是入蔡又明年伐鄭十年遂滅鄧兵始於鄧侵及於蔡遂伐鄭而憑陵中國春秋書之著楚人强盛之漸是行也入蔡而不有其以齊桓創霸猶有所憚而不敢肆歟冬單伯㑹齊侯宋公衛侯鄭伯于鄄書單伯㑹諸侯以王命而㑹諸侯也序齊侯于宋公之上以王命予齊以霸諸侯也霸與伯同侯為二伯序于公上其來舊矣齊之霸自此㑹始木訥謂單伯為魯大夫四命之卿是以不名僻説也魯大夫豈有書字而㑹諸侯者乎僖八年公㑹王人諸侯于洮九年公㑹宰周公諸侯于葵丘公在㑹也今此公不在㑹而王人出㑹諸侯豈得強指單伯為魯大夫乎十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄冬甫㑹鄄春又㑹焉春秋書以譏之也桓之意若曰去年之㑹王人臨之今日之㑹我尸其尊夫如是而後謂之霸抑亦卑矣吁桓公管仲而果知尊王胡不及茲始霸率諸侯朝王取周召分陜故事而一施置之是亦二伯而已矣不知出此而以尸㑹為尊其後晉文繼之霸終于不朝而坐致天王于踐土跡桓之所為也是㑹也左氏以為始霸非也十四年冬王人在㑹齊先宋始霸也夏夫人姜氏如齊姜氏即文姜也曩以如齊之故而遺禍於魯國齊桓所當逺嫌弗即以示儀于諸侯乃猶聽其來歸置往愆而弗問婦人有寧親之禮無寧兄弟之禮姜不足責而齊桓可責甚矣遂使文姜益無所忌十九年二十年比嵗如莒煽淫風於魯國哀姜之遺患再世桓有責焉秋宋人齊人邾人伐郳前已序齊侯于宋公之上今以宋先齊貶也案傳郳乃宋之附庸叛宋而宋討之齊桓以始霸之威而為宋摟邾以伐郳将以結宋彼蕞爾小國摧敗槁落尚何以自存乎序宋齊上不與之以霸討也鄭人侵宋冬十月十有六年春王正月夏宋人齊人衛人伐鄭或曰宋齊衛合而伐鄭鄭可伐乎曰可伐可伐則何以序齊於宋之下曰伐之不以其罪也鄭昭以嫡子君國突與強臣合而簒之昭得返國突又與強鄰合而撓之據櫟之堅以號召兇黨昭以弑死突之為也齊桓始霸謂當聲突前罪請于王明正其戮宣示逺近足以大警羣聽今為宋而伐鄭非名也故貶之序於宋下不與之以霸討也秋荆伐鄭是嵗荆始伐鄭鄭荘之有國也四鄰不敢䙝視楚朝夕睥睨莫如之何也荘死嗣子不克負荷姦臣執其國命出君立君繫於掌握内亂仍作衰政畢露齊伐其北楚闖其南左撫右動幾無寧嵗使荘公不以祭仲遺其子鄭國之禍豈至是哉鄭之衰亂姦臣孽子比而為之也冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽公羊有公㑹宇今從之盟非盛世之美事有能公天下而為之盟尚春秋之所與也自齊桓創霸一㑹王人再㑹諸侯皆㑹而不盟至是始為之盟小大畢至人心所趨頓異於前日盖信而後盟不苟盟也是以聖人特書同盟以奨之在易同人初九出門同人旡咎桓公其庶幾乎前日之為盟者同宗之吝不足言也木訥援周禮衆見曰同衆同而盟於方岳之下是謂同盟雖證得同盟二字但王巡守之禮不可施於霸國幽之同盟乃春秋特筆創義不必援周禮為證然同盟有變例時之不同其義亦異此兩幽之同盟襃其同也及晉霸既衰楚氛日熾當成靈景厲悼之際凡書同盟皆幸其猶能同乎中國非盟之盛者也又有天王崩不奔喪而為盟與王人下預於列國之盟及其他義不應盟而為盟者皆以同盟書則同盟之變例所以貶也學者隨事而觀可以得聖人之意是㑹也既襃其能同必不以公預為諱當從公羊作公㑹邾子克卒邾儀父以附庸之國而得列諸侯傳者謂齊桓為之請于周而命之曲沃武公以支宗而簒有晉國王亦以是嵗命之為侯邾子見録於春秋而武公者名不登於簡牘其舊史缺書乎抑聖人以其簒竊不道削之而不録之乎是時周雖浸衰而人心猶知戴上爵命必自天子出而後足以臨制其臣民而僖惠不君乃以侯爵而加之簒賊先自壊其法紀而王室之號令慶賞愈不行于天下矣嗟夫儀父之命出於齊桓之請而當時莫有議其非者當也曲沃之命出于天王之自為而諸侯用是益解體逆也此霸權所以益張而王綱所以愈替有國有家者其可不以是為監乎附見是嵗僖王崩崩𦵏皆不書於春秋論者類以為天子不告諸侯不㑹故不書是時禮教雖壊鄰邦小國之喪𦵏魯猶使大夫往㑹豈有於天王而慢若此乎盖周室東遷至於僖王愈不能君矣只以一事而言曲沃武公父子三世作逆弑君簒國有不可勝誅之罪而僖王乃于是嵗将終之時命之以一軍為晉侯前史謂武公滅晉盡以其寳器獻之僖王而得封王所為若此謂天下事至是必不可為殆不然也先正司馬文正公著資治通鑑始於周威烈王三十三年命魏斯趙籍韓䖍為諸侯以為是時周雖微弱名分尚存今晉大夫暴蔑其君剖分晉國天子既不能討又寵秩之使列於諸侯是區區之名分復不能守而併棄之先王之禮於斯盡矣司馬公之論甚大其實壊法亂紀崇奨簒賊命之以為諸侯自僖王命曲沃始威烈王之命韓魏趙乃其末流之弊也周自僖王而後愈不能君職此之故舊史不書崩𦵏春秋因之良有以也或曰曲沃武公固簒國之君詩無衣何以猶有善辭聖人於唐風而取之於春秋而斥之詩春秋之去取其不同歟曰子善問無衣之詩盖刺武公而非美之也其言曰豈曰無衣七兮不如子之衣安且吉兮言其未受王命而先僭諸侯之車服乃未受封以前之刺詩也序者誤以為美辭不可不辨也盖唐風十六篇前後多刺惟無衣序獨以為美詩人用心正大豈有專刺失國之君獨有取一簒賊乎詩序固不可廢亦有元本無序後人以己意而強補足之要當辨也十有七年春齊人執鄭詹是嵗惠王立公榖皆以鄭詹為鄭國之佞人必有所本左氏以鄭不朝而執詹愚謂鄭去年預于幽之盟曽幾何時不應遽執其使盖鄭國佞人為突所信任桓因其來而執之耳愚以春秋下文書逃來而知此執為春秋所與榖梁謂人者衆辭以人執與之辭也但春秋凡執皆書人其執也有是與否不可槩以書人為辭要當隨事而求書法之㫖夏齊人殱于遂遂者亡國之遺民也齊人戍之恃其強大以陵暴遺民遂之五族饗齊戍醉而殱之幾盡穀梁曰無遂而言遂存遂也言遂猶有人也魯荘以千乘之國甘於事讐而不恥遂之遺民鼓其餘勇猶足以殄滅齊戍春秋特為之書義之也亦以為忘親事讐者之媿秋鄭詹自齊逃來前稱人以執執之是否猶未見也繼書鄭詹逃來而後知執之為是為春秋所與也逃者有罪而逃刑之辭鄭詹自齊逃魯魯輙受詹之逃而不以為非魯亦有責焉耳齊人之執為是則魯人之受為非魯與齊雖為世讐而罪人逋逃非魯之所當受霸國執之而列國逃之罪在列國無可疑矣何休以鄭詹見用于魯却恐未然魯之用事者不聞有鄭詹也冬多麋杜注多而害稼故書孫氏曰以有為災而書者􅈮是也以多為災而書者麋是也麋常有之物今以其多而害稼故書以記異耳十有八年春王三月日有食之榖梁曰不言日不言朔夜食也鄭氏曰一日一夜合為一日今朔日日有虧傷之處未復故知以夜而食夜食則屬前月之晦愚謂夜食云者必在丑寅之間故晨興而猶可見則亦屬朔日之朝謂之晦日其不可歟夏公追戎于濟西左氏曰不言其來諱之也杜注戎來侵魯魯人不知去乃追之故諱不言其來此一説也公羊曰其言追何大其為中國追也榖梁曰于濟西者大之也何大焉為公之追之也左氏主戎備無素而言公榖主公自追而言前此公盟戎㑹戎皆不為春秋所與今追戎以書法而言與公之能追公榖之説是也公若使大夫帥師以往則為具文逐賊不足言矣今公自将而追之至于濟西書公追戎者嘉公之能自将而追戎也有國有家者以禦侮為重事諸侯為天子守土疆躬擐甲胄跋履山川踰越險阻敵王愾以固吾圉此職分之所宜為也諸侯若諉之大夫大夫復諉之士卒則皆望風退郤而國非其國矣追有二追之速雖不能與戰春秋無譏此是也追之緩不能及春秋所譏僖二十六年公追齊師至于酅弗及弗及云者追之緩不能及也秋有􅈮榖梁曰射人者也杜注短狐也含沙射人為災䟽云一名射景謂其伏水中射人之影而人不悟其後慶父通于哀姜隂蓄異謀而公不能察以召末年之禍􅈮為之先矣冬十月十有九年春王正月是秋周有子頽之難惠王出居于鄭之櫟春秋不書義見二十一年夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊曰諸侯娶一國則二國往媵之以姪娣從姪者兄之子也娣者弟也諸侯一聘九女諸侯不再娶又曰大夫無遂事此其言遂何聘禮大夫受命不受辭出竟有可以安國家利社稷則專之可也左䟽謂鄄衛地陳娶衛女為婦魯使公子結送媵至鄄聞齊宋為㑹将伐魯故權事之宜去其本職與二君㑹盟合此二説而經意見矣夫媵女事之常而盟者國之重事況於盟霸主而可以遂事往乎盖結也送媵至鄄適聞齊宋為㑹謀将伐魯故遂事而往盟将以伐二國之謀反以速二國之來伐其心則是於禮則僭是以有貶然細味經㫖貶之中猶有與焉或謂結以僭盟召宼不然也大夫出疆有可以安國家利社稷則專之乃古義也公羊子有所授矣或曰公子遂㑹趙盾于衡雍遂㑹雒戎與此孰是愚謂結知齊宋将伐魯而往盟之忠也雒戎未嘗為魯患而遂也擅盟之專也豈可以例觀乎夫人姜氏如莒此文姜也比嵗再如莒春秋書之非特責魯亦責齊也魯荘不能防閑其母猶有望於齊桓之正之前此姜氏如齊齊不能討遂使肆然罔所忌憚蕩遊及莒非唯魯之辱亦齊之辱也冬齊人宋人陳人伐我西鄙齊桓之霸也魯獨㑹之後讐國可無㑹也其後及齊人戰又及齊人宋人戰讐國可與戰也又其後同盟于幽矣而齊宋乃復為此來説者以為魯受鄭詹之故或又以公子結遂盟有以召之夫結知齊宋之謀不利我故盟以伐其謀非結之召之也然春秋之書之責齊也是嵗成周有子頽之亂衛師燕師稱兵伐周而立子頽天子播遷于外桓公不能討乃以三國伐魯前日創霸假王命以服諸侯今王室有難而不能以兵勤王是春秋所責也故三國皆人以貶之二十年春王二月夫人姜氏如莒夏齊大災外災何以書為魯弔故特書秋七月冬齊人伐戎榖梁作伐我公羊左氏作伐戎伐我貶齊也伐戎亦貶齊也是時成周有子頽之亂五大夫以衛師燕師伐周而立子頽惠王出居于鄭之櫟齊桓身為盟主若罔聞知明年鄭伯虢公胥命于弭以兵討叛殺子頽及為亂者王入于王城齊不能預也王室傾覆則坐視而不救戎未嘗為中國大患伐非所先也去年伐魯今年伐戎大率皆逐利而自私于王室何有春秋人之所以貶也二十有一年春王正月據左傳十九年成周有子頽之亂惠王出居于鄭之櫟至是鄭伯虢公以師納王殺王子頽及五大夫之為亂者王入于王城春秋不書是必有意而傳者缺焉嘗究觀周之所以亂前後如出一轍幽王寵襃女而廢申后逐太子申侯以犬戎作亂周是以東遷再傳為荘王周之衰也滋甚而荘王復以嬖姚女寵子頹而召亂惠王播遷越三載乃復而惠王之身復為惠后所惑寵叔帶幾欲動揺元子賴齊桓為之正之而帶卒挾狄師為亂于他日比至景王又以寵子朝故馴致大亂前車之覆後車之戒幽王以是失國喪身而子孫不戒亂生嫡庶至于再三而未巳嗟夫文武周公詒厥孫謀者若此而後世猶以是覆亡相踵愚意聖人脩經至頽帶朝之事重為之太息書不書皆以寓戒厥㫖微矣義詳見僖二十四年天王出居于鄭夏五月辛酉鄭伯突卒自鄭突之入于櫟春秋蓋絶之矣及其殺子儀而君鄭春秋不書其歸為其簒國至再不與之以為君也今而死書鄭伯突卒及其𦵏書𦵏鄭厲公夫豈無其故哉周惠王以子頽之亂出居于櫟諸侯勤王者獨鄭與虢耳厲公雖有簒國之罪亦有勤王之功是以春秋於其卒與𦵏而復録之秋七月戊戌夫人姜氏薨冬十有二月𦵏鄭厲公二十有二年春王正月肆大眚王正月而下而書肆大眚此周肆大眚也惠王以子頹之亂播遷于櫟去年春虢鄭納之以國之未靖復為虢之狩至冬而復歸成周於是為肆大眚以安反側非魯肆眚也為榖梁之學者以為文姜罪應誅絶春秋書肆眚而後書𦵏明王法以示後世其不然歟盖春秋必有事而後為是書法未有當時無肆眚之事而創為之書者也此周眚何疑程子不以後世肆眚為然愚謂眚災肆赦盛世之美事然亦赦其罪之可赦者耳至後世有肆大眚者焉則舉天下之人與之蕩滌垢瑕大布維新之治非古者眚災宥罪之意然在後世有不得不然者矣古之為治也刑以輔教不主于殺至周衰羣后放肆殺人族人皆出乎典章之外降而秦漢之世專用重典以毒天下雖欲不赦其可得乎論者每與孔明大徳小惠之語謂赦為不然吁使當盛明之世刑罰無頗何以赦為惟亂世多淫刑故不得不赦此救弊仁民之要務亦與其殺不辜寧失不經之意也癸丑𦵏我小君文姜文姜親弑其夫淫奔于齊惡聲被于宇内律以常典有不可勝誅之罪屬周天子肆大眚適當𦵏時聖人書肆眚書𦵏比事以見義言天王失討有罪使之得以禮𦵏云耳或以為齊君請于周赦其罪而後𦵏者非也肆大眚不專為魯也婦人從夫之諡至于末世有自為諡荘姜定姒從夫也魯桓之夫人文姜襄之母定姒景王之后穆后自為諡也宋共姬則又以節行彰著而獨得美名者也要以從夫為正魯有兩定姒襄之妾母自諡哀之妾母從夫諡陳人殺其公子御寇左氏以御寇為太子劉氏曰以為大夫非大夫也以為世子非世子也然而書者知其為君之嫡也君之嫡雖未誓為世子未可以稱世子然而巳有可以為世子之端矣故不可不重愚案春秋殺大夫公子例有三有書殺大夫者焉有書殺公子者焉有書殺其大夫公子某公孫某者焉殺大夫譏專殺也殺公子公孫譏骨肉之相殘也殺大夫公子某公孫某又譏其不當使公族世其官復以罪而殺之也然此乃春秋之常法而變例則隨事見焉不可執一例而求此陳人殺其公子左氏以為太子必有所本然不從目君之例則國亂無政為衆人所殺非其君之罪胡氏之說得之不稱世子當立而未命夏五月春秋年之四時雖或無事必書首月以紀時變無以仲月首時者何休謂譏荘公取讐女不可以事先祖奉四時祭祀猶五月不可以首時鑿矣杜氏以為文誤或曰五月之下有脫事秋七月丙申及齊髙傒盟于防公羊曰此齊之貴大夫曷為就吾微者而為盟也榖梁曰不書公髙傒伉也魯人忘君父之大讐請昏于讐國齊既許之而使髙傒為之先要魯以盟其傲魯也亦甚矣春秋之書之責齊也雖為魯諱亦責魯也以下文書公如齊納幣見春秋之責魯深矣夫讐國以傲而加我不惟不怒反更屈千乘之尊與其臣伉盟又躬如齊納幣彼固無所恤春秋為之諱之乃所以存其羞惡之心而垂法於後焉耳或曰文二年及晉處父盟與此同否曰其事雖同其伉不同彼時公身在晉晉君不與公盟使其臣及公盟故春秋深責晉人之無状去處父族以示貶此則齊魯均責焉耳盖諱之中而有權度存焉不可以一律觀也又有諸侯之大夫來魯涖盟及魯大夫與諸侯為盟者不皆為伉必如處父髙傒而後為伉耳要當隨事而觀以求聖人之意冬公如齊納幣凡納幣不書此所以書母喪未再期請昏于齊又棄宗社之重往從讐女為淫是故書以譏之不一譏也是行公羊子目為陳佗其亂常無别有不可道者矣或曰魯與齊既為㑹盟春秋無責今而通昏不亦可乎曰主夏盟者齊桓也今納幣而請昏者齊襄之女讐女也盟讐人之弟猶曰為其霸也諸侯皆在不得不與於盟娶妻豈無他族必讐女而後娶其何以奉粢盛入先君之廟乎吁文姜親弑魯桓罪未討而死今桓之子娶姜之姪蹈覆轍而不以為戒其愚不仁亦甚矣厥後哀姜通于共仲般以是死閔以是弑皆跡文姜之所為荘公實有以致之自作孽不可活豈不信哉春秋集傳詳説卷六
