body:
  text: 春秋集傳詳說卷十三宋家鉉翁撰文公上名興僖公子母聲姜以襄王二十六年立是嵗晉襄二年元年春王正月公即位書即位義見閔元年或曰春秋之法先君旣葬踰年而書公即位此未葬而踰年亦書即位何哉曰此所謂不可曠年而無君者也即位必以嵗首改元亦必以嵗首若嵗首不書即位而餘月書之則非元年正始之義故雖未葬而書欲臣民之有君亦正始之義也然服皆未葬之服未成其爲君二月癸亥日有食之公羊有朔字天王使叔服來會葬或曰此天子所以厚諸侯之終春秋喜而書之乎曰否禮加於有德是以書之無貶耳桓公之薨王使榮叔錫命春秋譏焉王不稱天爲追命簒賊而貶也成風之葬召伯來㑹王亦不稱天以其用夫人之禮於妾母而譏之也今僖公之葬書天王使叔服來葬無貶也禮加於有德是故無貶襄王東遷令主僖公魯國之賢君王以僖有德寵之於將葬僖以其德而蒙王寵於身後是故爲春秋所貴焉耳夏四月丁巳葬我君僖公僖公在位久值二霸繼興四裔有所憚而不敢肆故僖也粗克自保不爲外侮之所憑陵詩稱其務農重榖春秋書閔雨喜雨以見其有志於民雖謂之賢君可也但其始立德季氏保護之勞思所以厚報之繋以大邑假之威福遂養成異日之患公子遂繼秉政不學無知兇悖滋甚魯之危亂實自此始烏乎如僖公之賢加以剛毅自立政自己出不以權任假借強宗末流之弊豈至是乎魯初年國之賢臣更迭爲政亦有奮於野舉於士而在卿大夫之位者至僖公之世季氏用事仲叔繼興世爲政於魯賢人君子始無位以行其志自兹以降政日趨於下國無人焉耳天王使毛伯來錫公命諸侯薨告喪于王王使人省其終事命嗣子繼世爲君所謂承國于父禀命于王者也成周盛時諸侯建世子必請於王王不命之立不敢立也君薨世子當代王不命之爲君不敢以君道臨其臣民也自東遷此義頓廢諸侯建世子不請及爲君又不請甚者以簒竊得國王不能討因命之者有矣今僖公告終襄王使叔服㑹其葬又使毛伯錫命命其嗣子爲諸侯此盛時曠典僅見於衰世者是以春秋書之又書貴王命也公羊廼以錫命爲加服嗣子斬然在疚何加服之有胡文定因是援禮諸侯喪畢以士服見天子已見賜之黻冕圭璧今文公繼世喪制未終而王錫之命服以爲非禮愚謂失禮在文公而不在天王也春秋錫命有以始立而錫命者有以有功而錫命者有以加服而錫命者此以僖公既葬而命其嗣子為諸侯書法坦然甚明非賜服也春秋以僖公事君盡禮襄王遇臣有恩兩得其道故再書之無貶文公除喪而不徃拜王命則有貶也始得國而錫命晉武公也有功而加晉文公也已死而追錫命魯桓公也錫之命使之討諸侯之無王者齊桓公也立八年而後錫命魯成公也事不同而皆曰錫命春秋或書或不書公羊以加服為言以唐風無衣為天子錫命加服之詩故也此方即位在喪何加服之有哉晉侯伐衞案左傳文公之季年諸侯皆朝衞成公獨不徃使孔達侵鄭伐緜訾及匡晉襄公既祥使告於諸侯而伐衞及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王於温先且居胥臣伐衞如傳所言晉侯之伐衞可謂有禮矣自文公殁諸侯擅相侵伐衞之侵鄭非有宿憾不可解直趨利耳晉侯伐之不為無辭乃能用先且居之請率先朝王是故春秋爵之其後衞伐晉春秋書人以示貶則知晉侯伐衞為春秋所與是故書爵云叔孫得臣如京師得臣如京師拜錫命也或曰禮歟曰天王使上大夫來錫命命以為君也是時魯侯在喪不能躬拜使其臣徃猶之可也及除喪之後當以士服朝王受黻冕之賜然後於禮為盡而文公循習舊事卒不能徃也天子以優禮待諸侯而文公慢不能荅是之謂不臣厥罪當削春秋備書其事不待貶而義見衞人伐晉自齊桓之殁衞即通㛰於楚自以為楚之私也及文公之興伐而入之國幾亡文殁未幾衞即復從楚出兵侵鄭晉之伐之盖霸討也衞人復之以兵有所侮而動也晉取戚田又從而疆理之何以服衞人之心書衞人伐晉言晉有以召其伐也秋公孫敖㑹晉侯于戚左傳謂晉侯疆戚田故公孫敖㑹之或曰此常事耳春秋何以書曰為貶晉故書耳衞小國也晉以其貳於楚而伐之衞人不知引咎以求免廼更以兵伐晉伐盟主也人謂晉侯必将赫然發怒㑹諸侯聲其罪而討焉晉襄略不以介意方且合諸侯之大夫而疆理戚田知以得田為喜不知以受伐為愧其亦鄙矣春秋之譏譏在晉也冬十月丁未楚世子商臣弑其君頵公榖作髠楚人卒葬春秋不書楚頵見弑於其子於是始書討元凶著大惡不以蠻荒而廢此春秋所以用法也或曰舊史書之聖人因之乎曰否亂臣賊子弑君而自立為君必不號於人曰我實弑君諸侯史官亦必不敢以傳聞之辭筆之於史及聖人修春秋誅亂賊於既死其事始著春秋未作以前史之缺略不書者多矣烏乎君臣父子之際所謂天之經地之義民之行舟車所至人跡所通未有無父無君無臣無子之國也而乃有子不父其父大亂相賊殺如商臣者是人道之反其常也人道之反其常夫豈一朝一夕之故其所由來者漸矣初成王将以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也且是人也蠭目而豺聲忍人也不可立也子上盡言無隱忠矣語洩反為商臣所譖以死由是内外左右知有太子而不知有其君亂階既成乃更議所立是以及於禍使楚成能用子上之言辨之貴早豈有是乎楚商臣隋煬帝宋元兇劭所以濫觴滔天後先一轍皆由積習之漸有以至此有國有家者視此可不知所戒乎或曰商臣負覆載所不容之罪卒以無討何歟曰楚擯南服帝王風化之所不及則亦姑舍之而已矣然春秋所討不以擯于王化而廢汙瀦之典是故書法無所貸公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績或曰殽之戰晉書人彭衙之戰晉書爵何也曰非爵也秦以大夫将兵而來晉襄乃躬率師徒以禦之書晉侯及秦師戰于彭衙譏晉襄之好戰也夫秦故有大惠於晉不可忘也前日秦人乗晉之喪而襲鄭襄懼其争諸侯遂伯中國急於自救墨衰絰以即戎事其勿獲已也幸而勝以保其霸業當亟遣一介之使陳先君舊好以求成於秦穆公賢君其必許之而襄公徳量未洪狐趙諸人無正救之力致孟明以忿兵再至彼以大夫臨戎此以國君禦敵甚矣晉襄之好戰春秋於是始責之矣城濮之役文公退三舍以避楚子玉不為止然後及之戰今晉襄負氣好戰身御戎行以怨報徳雖以是百戰百勝君子不與也或曰人以師伐我我及之戰是為應兵春秋其無議乎曰文公退三舍以避楚師之所當報義之所不容己也秦之惠尤大於楚而晉襄亟戰而莫之恤不惟背惠實忘親也春秋以是貶及戰之義已見莊二十八年凡某及某戰或以别内外或以明客主或以見先後襃貶予奪初不在是彭衙之戰書晉侯及秦師戰晉為主而秦為客也秦伐晉晉受伐也丁丑作僖公主公羊曰虞主用桑練主用栗用栗者藏主也作僖公主何以書譏不時也欲久喪而后不能也禮作練主當用十二月文公亂聖人制欲服喪三十六月十九月作練主又不能卒竟故以二十五月也愚謂魯文公惰人也恐不能有志久喪盖是時逆祀有萌議論未定緩於作主以是故也禮既葬而作主欲神靈之有所憑依也於是奉主反虞虞而祔孫從於祖既祔仍特祭於寢終喪祫乃以入廟此禮之常節有不待考而知者縁文公欲躋僖於閔之上又妄欲以兄弟自為昭穆所以緩於作主當祔而不知所祔故也及是羣下並從邪議乃始作主而依神明年大事大廟遂躋僖於閔之上而行祔廟之禮春秋先書作主次書逆祀言緩於作主廼逆祀之端耳三月乙巳及晉處父盟榖梁曰不言公非處父伉也為公諱也左傳云晉人以公不朝來討公如晉晉人使陽處父盟公以恥之愚謂春秋不惟為公諱盖深責晉襄之無禮也是以處父去族貶處父所以貶晉侯也是時魯君未除喪而晉責之以朝魯君當執禮以拒之嚴兵以待之不當畏威而動冒喪而朝所以愈受欺於彊國晉襄驟勝而驕用事者多麤暴小人所為僣上春秋所以去處父之族非特為魯諱實責晉也義已見莊二十二年及髙傒盟夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴公榖作垂歛晉襄再敗秦師驕矜見於行事使處父盟魯君又使士縠㑹諸侯驕矜僣上有二霸所不敢為春秋比事而書所以誅也左傳謂是㑹晉謀討衛陳侯為衞請而免之而何氏公羊注曰謀共誅商臣雖不能誅以疾惡故為春秋所取二說未知孰是然討衛細故也謀討商臣天下之大義也商臣負天地所不容之罪中國之人胥聽其亂無有明討賊之義者環視海内力足以辦此惟一晉而已晉之君臣苟知此義當請於王率天下諸侯奉辭以伐之何患不濟今僅遣一卿㑹諸侯于垂隴其亦無志於此矣天子至尊命上公出董諸侯之成此東遷以後之變禮已非盛時所行今晉襄挾其屢勝之威倨坐國中使其臣出盟公侯自是遂為例春秋書之以懲其僣自十有二月不雨至于秋七月榖梁於僖三年正月不雨夏四月不雨曰閔雨有志於民也六月雨曰喜雨有志於民也至是則厯時而書不雨文不憂雨也不憂雨者無志於民也深得春秋垂訓之㫖人君之職莫大於養民僖公務農重榖憂樂在民而文公廼反是比事而觀春秋之書法見矣八月丁邜大事于大廟躋僖公公羊曰大事者何大祫也大祫者何合祭也其合祭何毁廟之主陳于大祖未毁廟之主皆升合食于大祖五年而再殷祭躋者何升也升僖公譏逆祀也先禰而後祖也君子不以親親害尊尊春秋之義也左傳曰躋僖公逆祀也案禮人君除喪而祫毁廟之主五廟之主皆升合食於大祖是之謂大祫僖公薨至此甫及二十一月而遽講祫祭之禮欲躋僖公於閔之上故不待喪畢而豫行之書大事于大廟躋僖公此一書而再譏也僖公于閔雖為庶兄嘗事閔為之臣今夏父弗忌官為宗伯輒發邪議以諂其君躋僖公於閔之上亂君臣之分是之謂逆魯之諸臣豈無知禮者知而弗正諂也臧文仲當時賢大夫坐視不諫故聖人尤深責之筆之春秋曰大事于大廟躋僖公大事于大廟未當祫而祫也躋僖公非所當躋而躋也是之謂一書而再貶也三傳推明逆祀之意皆已得之但謂閔僖昭穆各自為世者恐非經意不可不辨左傳因夏父以躋聖賢為明非之曰子雖齊聖不先父食久矣宋鄭不以帝乙厲王徳薄而祖之此設諭而言臣之於君猶子之於父不以賢不肖而為先後非謂閔公為文公之祖也公羊乃云先禰而後祖也榖梁又云逆祀無昭穆也無昭穆則無祖也疑榖梁之說本之左傳公榖之書成於漢初左傳之書自戰國有矣胡文定廼曰臣子一例三傳同以閔公為祖是以僖公父事閔公也父死子繼兄終弟及名號雖不同其為世一也愚三復此說實有未諭若以閔僖為父子則莊為文之㑹祖乎桓為文之髙祖乎祫饗之序昭穆兄為昭而弟為穆乎昭穆既紊何以謂之祫乎杜元凱於此義却自見得明白其說曰僖是閔兄不得為父子嘗為臣位應在下今居閔上逆也孔穎達釋之曰父子異昭穆兄弟昭穆同僖閔不得為父子同為穆耳閔當在僖上今升僖先閔此二公位次之逆非昭穆亂也若兄弟相代即異昭穆設令兄弟四人皆立則祖父之廟即以從毁知其禮必不然此說發明杜意頗詳盡但兄弟自為穆當於穆位竝作二廟乎及其祫也於穆位以二穆相從先君而後臣乎夫如是而後合于禮若以兄弟各為一世則紊昭穆之序斷斷有所不可行矣或曰閔二年譏吉禘以其未終喪而禘也此大事于大廟亦吉禘也春秋不以吉書何哉曰閔二年之禘未當吉而吉譏在從吉今此之祫非所當躋而躋譏在逆祀各於其重者而譏之耳冬晉人宋人陳人鄭人伐秦春秋之義有復仇有報徳父仇當報父之徳亦不忘也魯莊忘父之仇及齊為好春秋深責之晉襄敵父之惠與秦屢戰春秋亦深責之仁人孝子苟能不死其親則父仇不可忘而父之所徳亦必報之而後於義為盡也殽之戰晉不克避秦而勝之彭衙之戰晉復不能避秦而再勝之為晉襄者苟有禮義之心則引咎於秦以求息肩可也廼更率三國之師以為此役忘父之徳逞己之憾犬豕不食其餘春秋自是始誅斥之矣故四國皆書人以示貶公子遂如齊納幣公羊曰納幣不書此何以書譏喪娶也娶在三年之外則何譏乎喪娶三年之内不圖昬僖公之喪至此未滿二十五月故也左傳乃曰凡君即位好舅甥修㛰姻娶元妃以奉粢盛孝也春秋譏納幣而左氏乃以為得禮豈不失之逺乎三年春王正月叔孫得臣會晉人宋人陳人衞人鄭人伐沈沈潰左傳莊叔會諸侯之師伐沈以其服於楚也愚謂翦除兇逆以伸大義于天下霸者所當身其責也或當為而不為或不必為而為之失其所以霸之道矣楚商臣負弑逆滔天之罪于今二年天人之望咸屬于晉前日垂隴之會人謂其有志於謀楚使晉襄仗義而前師壯辭直天下諸侯孰不鼔勇而從縱未能汙瀦其宫楚人必能以商臣為戮更立君而聼命於中國晉之霸業有光於前人矣乃視非己事使楚之為逆者得以樹其羽翼脅從諸小國以抗衡中夏懐貳者豈獨一沈哉而襄公舍其大而議其細以諸侯伐沈而潰之置逆商之大惡議蕞爾沈之微罪避豺虎而獵狐兔雖潰百沈何益於成敗之數乎故春秋自晉以下五國皆書人以貶之自是楚知晉之無能為始動兵伐江晉僅出偏師具文為救而江滅矣霸者之器小而易盈召陵告旋城濮既勝俱足以變其素守况如晉襄者於二伯又何能為役夏五月王子虎卒王臣卒初見隠三年尹氏卒公羊傳曰以其新使乎我也故卒之榖梁曰以其嘗執重以守也左傳曰王叔文公卒赴弔如同盟胡文定以為人臣無外交卒之而不爵譏之也愚謂自周綱之替王臣外交諸侯死無不赴者矣而春秋皆削不書今王叔文公卒而書之録其賢也自晉文之霸天子辭命多出於虎嚴重而有法得天王訓誥諸侯之體其王朝公卿之賢有徳者歟榖梁謂天王出居于鄭虎任守國之責是以特書此說得之公羊以為嘗會葬於魯者私說也使魯者多矣未聞以來使而特卒之者左傳以翟泉會盟故以為赴弔如同盟王人董盟者多矣未聞從諸侯同盟之例而卒之者故知卒之者録之也春秋二百四十二年王臣三卒經之疑也虎與卷夾輔天子於艱難危困之中有人臣所難者是故春秋書卒以録之義又見定二年劉卷卒秦人伐晉彭衙之勝趙衰言於諸大夫曰秦師又至將必避之懼而修徳不可當也至是秦穆自將而來取王官及郊晉師不出遂自茅津濟封殽尸而還夫晉之避秦以報秦惠也當發使喻之境上曰吾以是報先君之舊徳非敢與君敵也秦若有禮必當引還今廼閉壁不出聽其殘民以逞晉之用事者亦未為知體也或曰秦誓見録於聖門而春秋所書無襃何歟曰是役也晉人既不出秦人亦當歛兵而歸廼猶濟河逞忿是以春秋人之雖然如穆公之賢功不及晉文徳則過之嘗觀秦誓一篇懲艾懇惻眞有動心忍性之意孟明再敗而公惟知引咎自責不委罪於握兵之人視楚人每敗輒殺其卿者有間矣曰然則敗軍之將其不可誅乎曰臨難而苟免可誅也臨敵而退避可誅也意孟明之為人有忘身殉國之心不以得喪利害為前郤是以尤為秦穆所厚歟司馬昭敗於東關問左右曰近日之敗誰執其咎王儀對曰罪在元師昭曰司馬欲歸過於孤乎引出斬之觀亂臣逆賊所以恕己責人逞忿殺諫然後知秦穆之引咎自責後世實未易多得愚謂秦所以有天下之實自穆公積累中來更商鞅李斯棄禮義而任刑罰以斬刈穆公之澤故雖混一區宇二世而亡穆公開之鞅與斯壞之鞅與斯其穆公之罪人歟先後誅死非不幸也宜也秋楚人圍江江黃楚之與也而志在中國齊桓之伯慕義請盟楚人憾之黃坐是滅齊不能救也及晉文繼興江人不以黃之既覆楚人方盛猶事晉不倦視陳蔡衞鄭朝晉暮楚出入乎中外之兩間者有間矣今為楚所攻自今年秋迄於明年夏首尾幾一嵗晉僅能遣偏師以赴之而江又滅矣春秋志二國之初從中國與於會盟侵伐以至為楚所滅而齊晉不能救書法詳而不厭所以襃二國之固盟守義之死不悔亦以愧陳蔡衞鄭之君而責齊晉為甚矣或曰是役也何以知其責晉曰春秋於秦人伐晉之後繼書楚人圍江見晉所以不能赴江之急為秦兵之日擬於其後也以是而觀晉搆怨於秦乃楚人之所願而非中國之福自是秦楚遂合楚所以强大益不可制由秦人為之羽翼而晉襄背惠好戰實有以失秦故春秋深譏之雨螽于宋外災不書此何以書記異也趙子曰自空而下有如雨雨血雨毛雨土皆此類冬公如晉十有二月己巳公及晉侯盟案左傳晉人懼其無禮於公也請改盟公如晉及晉侯盟此盟於晉之國都也自桓文之霸威力雖足以控諸侯而㑹盟不于其地不欲諸侯旅至其國懼僭王也晉襄襲父餘威志得而驕前日垂隴之盟以為無禮則當㑹於魯晉之間以救前日之失乃復邀公親至其國而為此盟長傲而遂非罪莫大焉春秋書公及晉侯盟為公諱深責晉晉陽處父帥師伐楚以救江公羊曰此伐楚也其言救江何為諼也其為諼奈何伐楚為救江也救江而伐楚所謂攻其所必救亦兵家之常耳但偏師而往具文而出豈足以震動楚人而解危國倒懸之急此亦為諼而已矣嗟夫黃以齊故亡江以晉故亡江黃不負齊晉齊晉實負江黃可為悲慨也矣四年春公至自晉夏逆婦姜于齊榖梁曰其曰婦姜為其禮成于齊也其逆者誰也親逆而稱婦或者公歟何其速婦之也曰公也其不言公何也非成禮于齊也婦有姑之辭也其不言氏貶之也夫人與有貶也三傳不同榖梁之義為正女在父母家稱女不稱婦今而稱婦未嫁而配好合于齊也魯君前乎此常講親迎之禮逆于齊則書公如齊逆女逆于境則書公㑹齊侯于某今而親徃亦親迎耳而春秋變文書逆婦姜于齊不書公逆為其配不以禮變文而書以存其羞惡之心凡以垂法于後焉耳姜以婦稱著姜亦有罪也女在父母家制于父母魯君逆婦不以禮齊人亦有罪焉去氏貶姜也亦貶齊也不書入不書至皆以是故其義甚明公羊以娶乎大夫故略之恐未然書婦姜凡三義又見宣元年成十四年皆貶狄侵齊秋楚人滅江義見晉處父救江秦人入鄀晉侯伐秦去年夏秦伐晉晉師不出曰以報秦惠也尚文公避楚之意也愚謂晉人自是厭兵與秦講解以休兩國之民而今也乃復以兵加於秦曰報王官若晉襄者其文公之罪人歟況是時江圍方急日夜求救於晉而晉曽不軫同盟之義合諸侯以赴之乃復動以伐秦是師也移而救江雖無及於亡猶足以慰諸夏之心而晉襄惟知治己之私不復顧江之急春秋書楚人滅江晉侯伐秦責其當救而不救不當伐而伐罪晉深矣書晉侯非爵之貶之也目其忘親背惠亟戰而不知戢也秦自是不復報晉兩國兵禍得以暫息是以聖人終有取於秦列其誓於書篇之末衞侯使甯俞來聘冬十有一月壬寅夫人風氏薨三傳皆以為僖公之母莊公之妾春秋書夫人風氏薨因魯史而書志禮之變也或曰隱元年天王歸惠公仲子之賵何以不稱夫人曰事不同也仲子者惠公之妾公子允之母允桓公也隱公探惠公之邪志欲讓國於允尊仲為夫人蓋以父之妾而配其父亂名悖禮之甚者故春秋絀之書惠公仲子今成風者則異於是僖公之妾母文公之妾祖母也僖公之始立其嫡母哀姜以罪見討於齊僖公於是自以己之私恩尊其母為先君夫人禘而薦之於廟蓋僣也國人因以夫人稱之舊史既書夫人薨聖人于魯先君之母無由黜其已僭之號故書夫人風氏薨是烏可與公子允之母例言哉木訥以九年秦人歸僖公成風之襚與惠公仲子書法略同引之以證成風為僖公之妾何誤之甚耶訥不信左傳專以己意為異說遂至指僖公之母為僖公之妾此何禮耶春秋書法有相似而不同者惠公仲子者公子允之母允未為君豈容書之桓公仲子故從其君而書惠公仲子成風廼僖之母僖致之於廟以為夫人故從其子而書僖公成風詎容引彼證此乎廼若九年書秦人歸僖公成風之襚此因異國之歸襚而正之耳異國不知魯人尊成風為夫人故但以妾母稱之聖人因其歸襚以魯之僭名是以書夫人於前書成風於後各因其實而書之而僭名之實見矣五年春王正月王使榮叔歸含且賵併見召伯會葬三月辛亥葬我小君成風王使召伯來會葬王不稱天義己見莊元年此亦襄王所以厚於諸侯也春秋於叔服之會葬毛伯之錫命則喜而書之至是歸成風之含賵會成風之葬則王皆不稱天此春秋所以垂法於後著義甚明也蓋天子之于諸侯有會葬之禮既葬之而命其子襲位為諸侯亦王寵之所宜施于禮無悖也今也妾母之喪含而賵之又命大夫會其葬所以成妾母為夫人寵洊加而不以其禮故春秋于榮叔召伯之來再書而再貶王皆不稱天比事而觀五年之間後先兩會葬一襃一貶著義豈不甚明乎雖然此亦魯人赴於周故天王特為之加禮是以春秋先書喪夫人葬小君繼書王朝大夫之再辱魯以是赴王以是命魯亦有責焉耳喪服傳庶子為父後者為其母緦與尊者為一體不敢私其親也自僖公致妾母為夫人文公喪之以小君之禮而漢以後庶子為君者遂持以為口實隆妾母以尊名而匹其父者舉皆是矣夏公孫敖如晉秦人入鄀左傳鄀叛楚即秦又貳于楚秦人伐而入之愚謂霸國之君左右望而罔市利可取則取之不復顧義之所在齊桓之滅遂降鄣秦穆之滅滑入鄀是也晉文公平子帶之難納王于京其事義矣而請隧弗許則受温原攅茅之田其人不服至以兵圍而取之與取畿内之地何異是三君者天理人欲常徃來於方寸之間所以僅能為霸學道君子每羞稱焉春秋或書或不書皆所以貶秋楚人滅六臯陶庭堅之後至是千有餘年國雖小而猶存蓋武王有天下訪尋先代帝王聖賢之後俾皆紹其始封盛徳事也周綱陵遲楚人恣擅先代之後蠶食幾無餘若滅夔滅六滅蓼之類是也冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳季友孫秋季孫行父如晉八月乙􅕀晉侯驩卒明年晉靈公立冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父晉狐射姑出奔狄射姑偃子賈季陽處父為亂臣所殺非晉殺之也而春秋稱國以殺何哉曰春秋為誅亂賊而作權臣柄國臣下附從此作姦罔上弑君簒國之漸春秋之所深惡也初襄公使狐射姑將中軍趙盾佐之陽處父成季之屬黨於趙氏謂射姑不可使將襄公從其言以趙盾將中軍射姑佐之盾由是為政於晉擅廢立專生殺其末流遂有弑君之事實自處父發之射姑以私怨殺一大夫其罪固當誅死而處父以私意黨趙氏夫豈無責春秋於處父之死不書盜殺而書國殺所以為權臣擅國羣下附從之戒或曰若是者處父為不當言乎曰否言而私乃其罪也趙盾賈季皆勲舊之子賢否相若也處父謂賈季不可使當公舉晉國之賢人使在此位不當以其所黨者復之于君此處父之私也是故春秋不與義又見令狐之戰閏月不告月猶朝于廟公羊曰曷為不告朔天無是月也閏月矣何以謂之天無是月是月非常月也夫氣盈朔虚而為閏乃自然之理謂之天無是月不可也日行積三百六十五日有竒而與天會是一歳日行之數二十四氣所以為盈也月行盈三百五十四日有竒而與日會是一歳月行之數十二朔所以虚也積日之有餘以就月之不足而成歳于是閏生焉所謂閏者廼天地自然之理故雖閏月亦告朔意當時或者不深曉此謂閏月廼厯家所為天無是月故導其君以廢朔是以春秋譏焉猶朝于廟者幸其猶存朝廟之禮與不郊猶望之猶不同也不郊猶望可已而不已也猶朝于廟幸其猶朝也義詳見僖二十一年七年春公伐邾三月甲戌取湏句遂城郚伐邾取湏句初見僖二十二年据傳既反其君矣今又伐而取之以封邾文公之子邾之叛人也置湏句子何地乎徃皆書伐書取非襃也今又書伐書取書遂城尤非襃也是時晉有喪未定立君霸政少弛魯乗其間躪藉小國又因師出城郚重勞民力春秋書以貶之夏四月宋公王臣卒宋成公卒不書葬責嗣子之不能君也輕舉召亂以致葬不如禮詳見下文宋人殺其大夫稱國殺其大夫貶諸侯專殺也稱人殺大夫衆作亂而殺之或為權臣用事者所殺皆不出於其君故書人此書宋人殺其大夫衆作亂而殺之也衆作亂而殺何以不言盜殺亂自君致也昭公始立謀去羣公子穆襄之族率國人以攻公殺公孫固公孫鄭于公宫大夫死由君之故大夫亦有責耳國君嗣位之始未能布徳行惠以懷輯其臣民首以芟夷公族為事其大夫必有以晉士蔿之邪謀賛其君為此者書宋公王臣卒宋人殺其大夫見昭公立而亂作亂廼昭公所致也大夫死不名死者衆不容悉書也此皆君之私人衆怒而殺之君尋及焉不著其名不與之以死節也然則作亂者其無誅乎曰亂者之誅豈待貶斥而後見乎宋殺其大夫凡三見皆不名僖二十五年文七年八年戊子晉人及秦人戰于令狐令狐之戰曲在晉春秋專責晉也案左傳晉襄公卒靈公幼晉人以難故欲立長君趙盾主公子雍使先蔑逆之於秦秦康公為之出師納雍及境而盾變初計立靈公潛師禦秦敗之令狐甚哉趙盾之險詐而不仁也秦晉自殽以來戰争相尋兵端未解晉人求君於秦秦人不疑晉之無信為之納之非秦君自以其意求納亡公子也趙盾苟知舍嫡嗣之為不可當以國中議論馳告于秦秦康素賢必能為之反斾今廼以先人奪人為心遽出師襲而敗之秦之受詐抑亦甚矣故春秋專責晉而不及秦何以言之莊九年魯納子糾納而敗者也春秋書公伐齊納子糾于乾時僖十八年宋納齊孝公納而勝者也春秋書宋公曹伯衞人邾人伐齊戰于甗齊師敗績書伐書戰書敗兩責之辭也今此秦人以師及晉境不書秦人伐晉晉實召秦非秦之來寇也敗不書敗著晉人挾詐而勝秦以不疑而敗責晉深矣或曰秦晉之得失是固然矣當是時立長之為是乎立嫡之為是乎曰立嫡正也國家無大變故舍嫡嗣而外求君非計也盾始與衆合謀立長事非而心則是欲宗社之有主也已而背先蔑立靈公事雖是而心則非利幼君而柄其國也蓋立長者衆人之所同立嫡者趙盾之所獨當是時廢君立君惟盾之意受人託孤之寄而反覆若此其得謂之純臣乎厥後晉靈既長惡盾之專且將殺之為盾所先禍端亂本實兆於此日或曰廢立之事其非人臣所得專乎曰伊尹周公之所行天下後世為人臣寄國命者所當知也廼若趙盾霍光徐羨之謝晦立君廢君皆自為其身計事幸而濟足以全身保家否則禍敗不旋踵䧟於首惡之名為大臣輔幼主者當以伊尹周公之心為心以趙盾霍光徐羨之謝晦為戒可也晉先蔑奔秦公羊作先昧有以師字或曰先蔑奔秦不書出奔以其自外而奔故歟曰否先蔑自秦先歸趙盾變計立靈公廼使先蔑與已俱将兵禦秦欲示秦人以不疑且將襲之先蔑不義其所為且懼晉君他日以逆雍為罪廼犯難而奔秦春秋憫其為盾所詐無可出之罪故不例之於出狄侵我西鄙秋八月公會諸侯晉大夫盟于扈此晉靈初立趙盾秉政始會盟諸侯也前此垂隴之會序諸侯而别士縠於其末貶晉襄以大夫而會諸侯也今此公㑹諸侯齊宋衞陳鄭許曹八國之君皆在而趙盾以晉卿而董盟僭也春秋所以不序諸侯而曰公會諸侯晉大夫者抑趙盾之僭也盾内專廢置威行國中外合諸侯以為此盟幾以君位自居諸侯之與大夫分守截然故春秋書諸侯晉大夫以辨君臣之分盾不著名抑盾也或曰是時晉靈方在襁褓故盾以上卿而尸其事其不可歟曰盾以上卿而主盟當合諸侯之大夫共為此盟今八國之君來會而盾以晉卿臨之臣不可以伉君故書晉大夫冬徐伐莒公羊以為春秋狄徐初見僖十五年然齊桓之季年書齊人徐人伐英氏不皆狄也公孫敖如莒涖盟八年春王正月夏四月秋八月戊申天王崩襄王也頃王立冬十月壬午公子遂會晉趙盾盟于衡雍王崩至是累月魯文不奔王喪復不遣大夫修賻問之禮而以常事使公子遂㑹晉大夫不共王喪而諂于事強國之大夫不臣也自此以下再三書皆以是貶左傳以為扈之盟公後至晉人來討公子遂復為此會愚謂扈之盟春秋既書公㑹諸侯晉大夫盟矣謂公不得與盟不可也今而公子遂復為此盟此自為其私計耳魯大夫締交強國之卿以專魯國而抗其君自公子遂始春秋不與也乙酉公子遂㑹雒戎盟于暴義已見莊十九年左傳謂春秋襃遂之盟戎以為出疆能利其國愚以為春秋著遂之專再書其名罪之非與之也㑹于衡雍猶有君命會雒戎而為盟則專也文公不君惰於為政權移臣下公子遂外交大國挾援以專魯既㑹趙盾遂盟雒戎犯上作亂漸不可長春秋比事而書為魯國隱憂孰云其襃乎木訥謂遂之跡雖專實有功於魯以為春秋與其遂會誤矣莊十九年公子結媵陳人之婦聞齊宋將伐魯遂專與之盟猶曰出疆之義此雒戎不聞為魯之患而遂與之盟是之謂外交也盖春秋防微杜漸聯書二會再書遂名所以垂法於後何善之有哉公孫敖如京師不至而復丙戌奔莒王之喪魯侯不能躬徃預哭臨使其臣徃又不能選擇而使廼俾淫亂之人銜命如京師不至而奔以從於淫敖之罪固當誅魯侯亦有責焉襄王於僖公母子之喪拳拳用情王人将命者絡繹于道而魯侯於天王之喪漫不加意國中豈無一介臣可使而以淫大夫尸其事敖當誅文公當削春秋書法見矣螽宋人殺其大夫司馬宋司城來奔初見七年夏四月此宋人再為亂殺君之大夫司馬律以春秋之法當書盜殺大夫司馬縁宋襄夫人預於亂是以書宋人殺其大夫司馬不著名者左氏以為衆故不悉書劉原父以為稱官者不能其官此說是也大夫司馬司城皆國之柄臣穆襄之族連嵗怙亂固昭公有以致之然嘗殺大夫而免於討為大夫司馬司城者當思所以為防患之計乃置之弗戒彼負罪自疑乗釁再作大夫司馬死司城來奔朝廷為之一空由昭公信任非人蕩意諸公子卬等輩以私暱寵臣布在列位既不能慮患於平日復不能制變於臨時雖握節以死委節以奔而其不勝任甚矣是故春秋不與之以死莭死者奔者皆書官而不書名其義明白而易見也吕氏廼云其人他無可稱獨死其官為可録是以書官不書名於義未通胡文定曰公子卬蕩意諸皆以官舉者見主兵者不能其官至於見殺守土者不能其官至於出奔而其君卒亦遇弑無臣焉耳此說為正與原父同九年春毛伯來求金公羊曰毛伯不稱使天子當喪未君也踰年矣何以謂之未君即位矣而未稱王也以諸侯踰年即位亦知天子之踰年即位以天子三年然後稱王亦知諸侯於其封内三年稱子也踰年稱公矣則曷為三年稱子縁臣民之心不可一日無君縁終始之義一年不可二君不可曠年無君縁子之心則三年不忍當也愚讀魯論三年無改於父之道諸說不同皆未得其當及讀公羊春秋傳而得其說三年無改於父之道者稱子之義也君薨太子立既為君矣而猶稱子於其國中既葬而後稱爵以子道終喪不忍代君所以為孝也推其不忍代君之心則事死如生喪亡若存而其為孝無所不在矣是時襄王未葬故毛伯不稱使求金非特責周王有大喪諸侯不致賻天子使人求金諸侯之罪大矣與求賻之意同夫人姜氏如齊義并見至自齊二月叔孫得臣如京師辛丑葬襄王義初見隱三年春秋十有四王書葬者六王諸說不同愚既著其義於隱三年矣不書葬者譏不反葬舊京不成其葬也書葬譏失禮也或以緩葬譏或以速葬譏惟襄王之葬所以書專為責魯故僖之喪成風之喪王用禮於魯甚勤今王崩文公不能躬徃預哭臨遣淫大夫又不能成禮今而葬復以命得臣春秋書叔孫得臣如京師葬襄王貶也或謂萬乗之國至衆封疆之守至重天王之喪諸侯不得越竟而奔是大不然魯尚奔齊晉楚之喪且㑹其葬豈有王喪而不能躬會之理而況王禮用其厚魯禮從其薄是重可責焉耳晉人殺其大夫先都義併見殺士縠箕鄭父三月夫人姜氏至自齊或曰夫人歸寜常事也先是書出不書至今曷為書至曰以正夫人之體也姜氏始歸於魯不氏不以夫人至貶也今歸寜于齊書夫人姜氏如齊又書夫人姜氏至自齊始正其夫人之體繫之以氏既貶之於前復正之於後皆所以垂法也夫人與國君儷體其出其至皆書者辨上下之分示衆妾不與夫人等因歸寜而見義非為歸寜而得書也文公無正家之法強臣僭妾比而為姦庶子奪嫡有萌而君不悟春秋特書以正之晉人殺其大夫士縠及箕鄭父陽處父為亂臣所殺春秋書晉殺其大夫陽處父先都等以作亂而誅春秋書晉人殺其大夫先都士縠及箕鄭父書法雖不同然皆主於抑強臣扶弱主不與趙盾以專殺也案左傳晉襄公将登箕鄭父先都而使士縠梁益耳将中軍先克曰狐趙之勲不可廢也從之故箕鄭父先都士縠為亂而殺先克三人之罪固無所逃而先克黨於強宗亦有以致之也狐趙氏自文公之伯父子相踵得君用事羣臣孰有出其右者而先克不惟賢是舉必曰狐趙黨强宗也狐氏既以作亂逐趙氏遂柄晉國擅廢立專生殺靈公卒以弑死正由羣下附從黨與衆盛之故而趙盾徳先克之揚已為之討賊据傳凡殺五人是五人者信有罪而盾殺之則私也論者以一大夫之死而殺五大夫趙盾之用刑亦頗矣是故稱人以殺不去其官箕鄭父書及言其濫也楚人伐鄭公子遂會晉人宋人衞人許人救鄭左傳范山言於楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭鄭及楚平公子遂會晉趙盾宋華耦衞孔達許大夫救鄭不及楚師卿不書緩也以懲不恪論者謂書救未有不善此則書救而譏之也趙盾與諸侯之大夫並稱人所以譏也楚自莊公之中世入侵蔡鄭漸有憑陵諸夏之心齊桓遏其方張之萌晉文撲其燎原之熖中國以尊王室以安文公雖殁楚人猶不敢䙝視及趙盾秉政自為怙權之計不復以圖伯安夏為己任范山覘知其無能有為首勸楚商興狼淵之師其志不在小而盾也徐合諸侯之大夫具文徃救無及於事威望頓挫不數年間諸侯皆服從於楚而晉之霸業隳矣文公以救宋而興趙盾以緩於救鄭而屈春秋人四國貶其救之緩也趙盾何以辭責夏狄侵齊秋八月曹伯襄卒九月癸酉地震榖梁曰地不震者也震故謹而日之也疏引周語伯陽父曰陽伏而不能出陰廹而不能烝於是以有地震孔晁云陽氣伏於陰下見廹於陰故不能升以至於地動是地道安静以動為異也此數語論地震最為明切冬楚子使椒來聘義已見莊二十三年荆人來聘或曰子謂春秋明内外之分未嘗漸進楚人春秋前書荆人來聘楚人使宜申來獻㨗今書楚子使椒來聘非漸進之乎曰否春秋於楚使之三至每書輒異者著楚人之漸盛将必為中國患也先書荆人來聘疑其所以來也繼書楚人使宜申來獻捷憂其遂為中國患也今書楚子使椒來聘目其君而去椒之族著楚氛之禍已廹中國之人猶有未悟者也椒去未幾孟諸之田繼之五國之君奔走受命僅而獲免先儒以其有悔過慕義之心春秋進之悔過者顧如是乎慕義者固如是乎或有重難予者曰楚本明徳之後守其茅土世長南服子為是說無廼絶之已甚乎曰春秋所以外楚為其僭王大號有窺伺中原之心耳楚有賢君削去僭名自同於中國之諸侯共奨王室夫然後可進春秋豈終絶之哉若彼身行大不義而録其來使之小謹以是進之必不可也秦人來歸僖公成風之襚義已見四年夫人風氏薨葬曹共公春秋集傳詳説卷十三
