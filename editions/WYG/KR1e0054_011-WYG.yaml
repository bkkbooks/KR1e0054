body:
  text: 春秋集傳詳說卷十一宋家鉉翁撰僖公三是歳襄王十二年宋襄十一年十有九年春王三月宋人執滕子嬰齊此宋襄圖伯之始事也宋雖先代之後爵維公未嘗受命於周居幹方之任今欲踵齊桓之行事當請命天子號召四方同奬王室諸侯或有未至懐而輯之待其自至齊桓之已行可視以為則也今以自命之伯而致討於人名之不正言之不順誰其信我此所以終於無成春而執滕子與是秋圍曹皆不待王命而行春秋之書之所以貶也然滕子書名是亦有罪焉耳齊桓之始伯滕嘗一預於㑹今宋襄繼桓之業諸小國皆㑹滕可以至而不至是亦有以自取春秋書名以執兩責之也亦見聖人拳拳望宋之意凡書執有執之而為伯討者有執之而為擅命者宋襄非受命之伯而執滕子又不歸之京師是之謂擅命其後晉人尸伯事執諸侯不當其罪則有貶當其罪而不歸之京師亦有貶被執者或書名或不書名則又以見其罪有輕重執有當否晉厲公執曹伯負芻治其簒國之罪執而歸之京師執之正歸之亦正特為春秋所與書晉侯執曹伯論者以晉厲不克終疑以侯執伯為僭是不然此伯討也惟事理之所在焉耳夏六月宋公曹人邾人盟于曹南或曰曹南之盟宋公書爵春秋其與之以伯乎曰望之也非與之也當桓公之既没狄伐衛鄭即楚諸侯之㑹者皆散天下不可一日而無伯也宋襄起而有為春秋蓋深望其有成也何以言之北杏之㑹桓公獨書爵諸侯皆人曹南之㑹襄公獨書爵諸侯亦皆人有以識聖人望宋之意矣始望之卒之無成楚用是横行於天下春秋與其始不保其終鄫子㑹盟于邾己酉邾人執鄫子用之公榖皆以為邾人執鄫子用之左氏以為宋襄使邾人執鄫子于次睢之社欲以屬東夷子魚諫不聽愚竊有疑焉宋襄之為人吾固未知其胷懐本趣然槩觀其平日則好名而畏義者也方其為太子以讓國聞其後與楚人戰欲以不擒二毛不鼓不成列而取仗義之名豈有今日而用同盟國君於滛昬之社無道若此者乎何休謂魯本許嫁季姬于邾季姬滛泆使鄫子請已而許之二國因是交忿宋襄為此盟以解之反為邾所欺執用鄫子休必有所本存之足以垂戒於後世且春秋書法全不及宋故公榖以為非宋之罪髙郵孫氏亦云邾鄫世仇之國宣八年又戕鄫子于其國其相仇之事不見于經惟無道之甚乃書之耳孫氏似亦有見乎此存之秋宋人圍曹此宋襄用師之始也伯者以王命征不服是之謂伯討春秋所與也苟無王命則為擅兵相攻春秋之所惡也北杏之㑹宋背盟而桓公伐之必請師於周與單伯俱彼非力之不足也示有所尊也今宋襄執滕子而不歸之京師伐曹又不禀命於王是謂其力之可以服人也推是以徃其何能濟是以春秋於曹南則爵之於圍曹則人之義蓋在此未有無王命而能成伯功者也或曰宋之圍曹是固非矣然在當時孰為當務之急乎曰鄭入滑狄侵衛魯伐邾以中國無伯而動也宋襄苟能治其所當治則義聲暢而伯業成矣此春秋所望於宋襄者也故比事以見義衛人伐邢冬㑹陳人蔡人楚人鄭人盟于齊此楚人㑹盟諸侯之始也公預於夷㑹不書為公諱也公固不以是為諱為公諱者所以存其羞惡之心也盟于齊齊侯實預盟不書齊侯預盟為桓公諱也齊伯國也地大民衆且桓公之威德在人嗣子勉自樹立猶未至遽出楚下今昭也惑於陳人邪諂招引異類共歃為盟於其國中厥父以攘夷而植伯功厥子乃事夷而不以為恥是固不足深責春秋為桓公諱是以畧昭而不書非與其為是盟也序陳人為首陳倡盟也序鄭人于末鄭首叛也此楚人始㑹故書法特為謹嚴不與裔夷以主中國之㑹盟此聖人意也或曰是㑹也春秋為公諱不書公㑹後此二年㑹盟于薄亦夷㑹也何以不為公諱乎曰是亦為公諱也薄之㑹楚人在焉書公㑹諸侯盟于薄釋宋公畧楚人不書若魯公之自主此盟是亦為公諱也凡諱有二有國惡之諱為國隱也有君過之諱君不自以為過為之諱之乃所以志其一時之失而垂法於後也梁亡榖梁曰梁亡自亡也梁亡鄭棄其師我無加損焉正名而已矣公羊曰梁亡此未有伐之者其言梁亡自亡也魚爛而亡也案左傳梁伯好土功亟城而弗處民罷而弗堪以是召亂秦襲而取之陸氏曰秦人肆其强暴取人之國沒而不書者滅國之罪易見也乘危之惡易知也自取滅亡其意微矣春秋所以明微二十年春新作南門榖梁曰作為也有加其度也言新有故也非作也南門者法門也劉氏曰南非一門庫門天子臯門雉門天子應門天子諸侯皆南靣而聽政門必嚮南其來舊矣今新之新其舊也新其舊而書新作是必有僭制焉榖梁所謂有加其度者是也胡氏曰僖公嘗修泮宫復閟宫矣奚斯董其役史克頌其事而經不書者宫廟以事祖考學校以教國之子弟二者國之先務雖用民力不可廢也是故不書夏郜子來朝郜姬姓國富辰所云郜雍曹滕文之昭者是也惟此一見或曰隱十年公敗宋師取郜取防即是此郜郜之滅已乆今來朝者魯以其地别封之為附庸耳蓋宋滅之而魯封之聖人書于此以見僖公繼絶之善或然五月乙巳西宫災公羊曰小寢也小寢人君燕私之地災見於是警戒深矣人君之過不在朝路臨涖之時而常在於深宫燕處之際天之示譴豈徒然哉其後魯僖殁于小寢鄭人入滑自齊桓公殁諸侯動兵相侵弱小漸被其毒宋襄苟欲踵前人伯業當禀王命㑹諸侯伸要束今而後有擅兵相侵者糾其罪告于王而懲之如鄭人入滑當先糾者也糾而弗率則奉辭以討之孰不曰然舍是弗為而執滕圍曹強人之從已烏能有成秋齊人狄人盟于邢甚哉齊昭之愚無知也桓公征楚而服之已乃與之盟于國桓公攘狄而郤之已乃與之盟于邢反常逆理乃至于是傳曰厥父菑厥子乃弗克播厥父基厥子乃弗肯堂其齊昭之謂乎春秋儕齊于狄亦所以惡齊也廉耻道喪則人欲肆而天理愈亡矣冬楚人伐隨二十有一年春狄侵衛為中國患者狄與楚也楚強大未易治狄悍而微自桓公之殁再侵衛彼謂衞人失伯國之援而可欺也宋襄與其盟楚而求諸侯曷若伐狄以寧諸夏能治狄而伯政舉矣顧乃舍其力之所可及義之所當為而為其所不可為狂躁害之宋人齊人楚人盟于鹿上十九年楚始盟諸侯魯公預盟春秋諱之桓公之不才子昭主是盟春秋亦為桓公諱之猶幸宋襄介然獨立蔡陳鄭交誘而不為動也今鹿上之盟此為何盟而乃求厠身於其間是之謂亂羣否之六二小人吉大人否亨象曰不亂羣也齊鄭陳蔡之從楚小人也隂類也不足多責宋襄所志何事乃預於是盟實蹈亂羣之戒能無辱乎然春秋猶序宋於齊楚之上不以伯權假荆楚也愚意舊史必以楚先齊宋聖人修經特序宋為首垂法嚴矣夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂楚始書子或曰元年伐鄭而書楚人春秋所以憂中國也今盂之㑹楚執宋公以伐宋而春秋乃於是始書楚子其爵之歟曰彼執宋公而春秋以楚子書序于宋公之下知非爵也蓋春秋正名之書也楚自熊通以來妄自尊大遂僭王者之隆名春秋毎毎號而舉之不使之得與列國諸侯齒今楚益強盛合諸侯詐以執宋公春秋一大變也春秋以楚子書夫豈進而爵之乎名器不可假人彼革號僣王以兵猾夏春秋序以子爵所以正其始封之名辨上下之分孰云其漸進之也乎自是而後楚漸進書子正名也或曰如子所言始何以書荆人今何以書楚子乎曰始其來聘僣號於國中耳春秋姑以號舉今㑹于齊盟于鹿上諸侯畏其強大有以事王者而事之春秋於是正其始封之名書之曰子示天王之尊乃天下共主非楚人所得干也自是而後楚之慿陵無不書子何爵之有哉是㑹宋楚爭長春秋先宋公而後楚子實用趙武屈建宋盟之例初不以其受欺於楚遂廢而不錄也執宋公以伐宋宋為先代之後作賓王家楚乃南服之徴而敢於執其君以伐其國楚之罪不可逭矣然宋為諸夏之表倡舍已分之所當為自卑其身以取執辱之侮宋亦有罪焉耳昔桓公之霸也深惟天下之患在强楚之僭王是以控大國掖小國共為㑹盟以一人心之所趨惟恐其折而從于惡也最後率之以伐楚楚服而天下之勢以定宋襄繼之志大而慮淺将修明伯功以尊天子而正諸夏乃與僣王之楚共為鹿上之盟以為未足復預於盂之㑹卒墮狡焉之謀身見執國㡬亡使宋㐮能以齊桓之心為心先天下之所難求以服人而勿求人之來服楚滅黄我則訪其後而存之狄伐衞我則率諸侯以拯之凡齊桓暮年未及為者我則為之雖未與楚戰楚必知所畏避而諸侯之未至皆將至矣而㐮也不明乎先後之序汲汲焉求諸侯以為伯求之而未得乃與桓公前日攘斥而不使預夏盟者共歃而為之盟首亂先王之大戒自招侮辱反以長荆楚方強之勢其亦可咎之甚矣或曰宋實未能伯而春秋於鹿盟盂㑹猶序宋為首無乃紊名實乎曰否當是時列國諸侯自齊而降皆俯首帖耳受令於楚而不以為恥挺然特立不出楚下者惟宋㐮一人耳春秋首宋次齊次楚長宋公以尊諸夏抑荆楚之狂僣而不使之居中國諸侯上也宋㐮顛沛百罹繼之以死而夫子列齊楚之上與其有志於列國也後儒以成敗論事不亦鄙乎冬公伐邾義併見明年伐邾取須句三十三年伐邾取訾婁楚人使宜申來獻捷榖梁曰不曰宋捷不與楚捷于宋也公羊曰不書捷于宋為宋公諱也宋以乘車徃㑹楚伏兵車以執之執其君而伐其國楚之無道甚矣而又獻捷于魯以威魯也春秋書楚人使宜申来獻捷卑楚也前此齊獻戎捷今此楚獻宋捷不書宋捷非特為宋諱實為中國諱也胡氏謂魯不能拒楚使聲其罪而討之以為春秋有責于魯不書宋捷為魯諱也論固正矣魯僖孱君躬預其㑹而不以為恥責其拒楚而聲罪無乃非所當責歟當是時舉中國之大無有能辦斯事者晋文不興楚之禍中國亦何所不至乎十有二月癸丑公㑹諸侯盟于薄釋宋公此楚㑹諸侯而釋之書公㑹諸侯于薄釋宋公不與楚人得以執上國之諸侯也蘓氏曰凡諸侯見執而不失國者於歸名之書曰某侯某歸于某此其不名而言釋何也以為執之釋之皆在諸侯若是而尚可以求諸侯乎蘓氏此論似未得春秋之意聖人之書法若曰㑹諸侯而釋之非夷狄之釋之所以存中國之體而宋公亦不得為無罪矣故以五等之公而書執書釋雖爵之亦貶之也二十有二年春公伐邾取須句左氏須句風姓實司太皡與有濟之祀邾人滅之須句子來奔因成風也公伐邾取須句反其君焉審如是謂之崇明祀保小寡春秋所與也然魯之憾邾有自來矣其伐邾不自須句始矣邾本魯之附庸至齊桓公之伯請于周而封之為子國自是不復附庸于魯魯以是為憾檉之㑹反未及國而敗其師今桓公殁魯釋憾于邾連嵗再伐春秋不與魯以伐是故書伐書取奚其襃夏宋公衞侯許男滕子伐鄭義併見下戰于泓秋八月丁未及邾人戰于升陘魯連嵗用兵于邾至是有升陘之敗其自取之也内戰不書敗書戰即敗矣為内諱者亦以貶内也是時楚方得志于中國宋弗克自振齊已屈而從楚公不知自治其國而輕用兵以加無罪之邾以此取敗春秋書及不書公雖為公諱實貶也冬十有一月己巳朔宋公及楚人戰于泓宋師敗績或曰宋以三國之師伐鄭楚人救鄭而有此戰春秋於其伐而書三國及戰而敗惟書宋公何邪曰與三國之從宋而罪宋公之輕於戰而致敗也三國不以宋公見執于楚猶各帥其師從宋伐鄭問其叛盟即楚之罪三國之君可嘉也是故春秋皆爵之若宋公之身則春秋於是始責之矣宋不自受重預於盂之盟以此取辱又不能内省已過養威持重思為後圖忿而求戰以此致敗故春秋雖與三國之從宋及戰而敗則責宋公以是故也或曰楚子以詐而執宋公又敗其師楚其無罪乎曰是役也楚子身在軍中而春秋書宋公及楚人戰崇宋而卑楚所以明貴賤之分其罪楚至矣榖梁抑宋而與楚其説甚陋公羊取之而所取非所當取乃以其不迫人于險不鼓不成列者為王者之師夫王者行事在未戰之前安有兵刃交接以假仁譎義而陥百姓於死者哉以是取宋襄又非春秋之意二十有三年春齊侯伐宋圍緡齊昭非宋㐮之力則齊之一亡公子耳宋㐮不忘齊桓臨終之託為昭盡力昭所以有國甗一戰之功也今乘其敗而伐之蓋以是諂于强楚求為自全之計以怨報德刑戮之民也或曰何以猶爵曰春秋有書爵以襃者有目其人之身而書某公某侯以著其罪者若齊昭之書侯謂其身受宋公之大德而忍於為不義故目其人而誅之書伐書圍皆所以貶夏五月庚寅宋公兹父卒宋襄有圖伯之志而不克遂兵敗身䘮春秋悼焉書卒不書𦵏以為無臣子也泓之戰襄傷於股未㡬以死楚實宋仇而嗣子成公躬造楚國卑屈以求成視呉夫差有愧多矣春秋以無臣子例書責之深矣秋楚人伐陳案左氏陳穆公請修好于齊以無忘桓公之德而齊之㑹楚人亦得列于其間名為修齊桓舊好其實自結于強楚今楚人乃以其貳於宋而伐之何邪蓋當時之諸侯實恥于從之而迫于兇威有不容自己者陳也介于二者之間猶欲自附于宋不忍遽從于楚是以楚疑而伐之若蔡若鄭則甘于從楚而不悔無復羞惡之心矣冬十有一月杞子卒杞入春秋稱侯莊二十七年稱伯至此稱子或謂惡其廢禮從而貶之然當時諸侯反道敗常有若齊㐮衞宣者實甚矣而春秋未嘗絀其爵今杞子之廢禮當必不至如齊㐮衛宣之甚春秋胡為再三絀之乎此亦經之疑耳姑置二十有四年春王正月是春晋文公入義見夷吾卒夏狄伐鄭案左氏鄭人伐滑王使伯服游孫伯如鄭請滑鄭伯不聽王命而執二子王怒使頽叔桃子出狄師伐鄭取櫟如傳所言鄭實叛也不聽王命而復執其使非叛而何王怒而討之亦理所當然而春秋但書狄伐鄭不書鄭之叛狄之所以伐何哉曰鄭當伐也王命方伯連帥董師以問鄭人之罪齊魯宋衛豈無為王敵愾者今乃命狄人出其師以伐同姓之國失所以表正天下之道矣故春秋書狄伐鄭繼書天王出居于鄭以見禍本亂源實在於此後世有以外蕃之兵而平内亂者亂未平而我已隂受其禍而不之覺可不謹哉秋七月冬天王出居于鄭先是王命狄人有討於鄭狄侵鄭取櫟王德之以狄女為后是為隗氏王子帶者有寵于惠王后后欲立之未及而崩子帶奔齊王復之通于隗氏王替隗氏子帶因是作亂以伐王敗周師王出適鄭處于汜榖梁曰天子無出書出失天下也居者居其所也雖失天下莫敢有也愚謂王者無外春秋一大條貫也王者以薄海内外為家其出也不言出而謂之狩自虞夏以来固然今㐮王之出春秋不以狩書而以出書其為貶也大矣王内不能正其家以是啓釁於狄悖弟亂臣犯上干紀王不能制失位而奔㡬至亡國其得罪于宗廟甚大謂春秋無貶不可也蜀人趙君木訥引易王用出征書王出郊天乃反風等語以排傳家天子無外之説其論鄙淺本不足深辨但其末云叔帶者惠王陳媯之所愛故襄王寧出而避之於鄭其心以為文武之靈未泯諸侯必有勤王者若不得已而遜于叔帶是亦文武之子孫吾何慊乎哉上以存孝下以存悌孝悌王者之至德尚以貶㐮王乎以上皆木訥語此説害義特甚前軰或取之愚恐其誤後學不容己於言夫人主之位天位也惟賢惟嫡乃得在此位非賢非嫡父不能以予其子兄豈得以予其弟乎而況子帶者王室之不才子襄王儻篤同氣之愛貴其身可也豈當假之以權以為召亂之階縱謂左氏所載㐮王出狄師事為不可信㐮王亦豈無失位之責乎尊為天子身荷祖宗付託之重不能防微杜漸以遏亂源致為悖弟亂臣所逐乃云帶亦文武之子孫欲舉以授之位天位也舉而棄之不才子以危其宗社孝悌之道顧如是乎舜非不愛象也封之有庳亦富貴之而已天下者帝王授受之天下舜舉以予象而曰我以是為孝以是為悌舜必不爾也木訥蜀之老儒號為知春秋者而率意高論殊欠講明似此不一端初學幸毋惑焉春秋二百四十二年天王三出荘二十年惠王以子頽之難出居于鄭踰年而虢鄭納王其出其歸春秋皆不書僖二十四年㐮王以叔帶之難復出春秋書天王出居于鄭明年晋侯納王春秋不書王入昭二十二年王子朝作亂王猛出悼王也未成君故名春秋書葬景王王室亂劉子單子以王猛居于皇又書劉子單子以王猛入于王城其冬王猛卒母弟敬王立復以難故出春秋書天王居于狄泉尹氏立王子朝二十六年又書天王入于成周尹氏召伯毛伯以王子朝奔楚觀天王三出春秋書法詳略各異知聖人於成周之盛衰存亡深注意焉恵王之出之入皆不書者猶為周諱也王者無外不可以出言也至㐮王復不能自植以召狄難春秋於是始書天王出居于鄭不以狩書而以出書春秋不得為㐮王諱矣然猶書出不書入至悼敬之出入春秋始變例而書曰𦵏景王王室亂自是五六年間悼敬子朝更出迭入春秋記之不遺閔周室之傾覆内難仍作將無以為國不得已而遂書也定六年敬王再出春秋不復書知其無可興復之望重為憂歎非若初年諱而不書矣晉侯夷吾卒惠之入春秋不書㣲之也文公之入春秋亦不書公羊以為為文公諱其不然歟齊桓晉文均有功於中夏桓之入也不為之諱文之入何為而獨諱盖書不書皆有微旨存焉桓之入所以書為其殺子糾書以貶之文之入位乃其所宜有然懐公既避位而去文猶殺之春秋所惡其在是乎始納懐嬴已為失道今又殺懐之身重失道也不著其入貶也非為之諱或曰懷公之立正乎曰懐公承國於其父厥父惠公弟也而先其兄文公以入春秋不與其入不宜君者也今文公之入晋人受之自卿大夫以至三軍之士倒戈而逆之宜為君而遂君之若懐公者廢之放之而毋殺不亦可乎二十有五年春王正月丙午衛侯燬滅邢公羊曰何以名滅同姓也榖梁曰惡其伐本而滅同姓也故名凡滅國未有名者滅同姓如晋之滅虞滅虢無道甚矣而不名惟衛滅邢而名之諸儒皆未有定論木訥謂下文書衛侯燬卒此以連文之故傳錄之誤而燬字襃貶不在是愚以此説為然夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦杜氏注伯姬魯女為宋大夫蕩氏妻自為其子來逆稱婦姑存之辭婦人越竟逆婦非禮故書榖梁曰婦人既嫁不踰竟宋蕩伯姬來逆婦非正也其曰婦緣姑言之之辭也愚謂此書逆婦未知所逆者公之女乎先君之女乎聖人所以見書法者以姑逆婦為非禮而特書以垂戒焉耳禮有親迎婦從夫也今屈尊者以逆卑者而亦謂之逆亂婦姑之分不可以為訓是故特書以譏之宋殺其大夫榖梁曰以其在祖之位而尊之也其意謂夫子為其祖諱而不名此乃魯國之史夫子因之以修春秋安得為其私諱公羊曰何以不名宋三世無大夫内娶也其意謂禮不臣妻之父母宋三世娶其大夫女故殺之而不名尤非通論案曹人殺大夫而不名殺者非一人是以不書以譏其殺之之濫其事猶有可考今宋殺其大夫左氏無紀載意者舊史佚其名春秋因之歟自是而後宋殺大夫凡三見皆不名此及文七年宋公王臣卒宋人殺其大夫八年宋人殺其大夫司馬宋司城来奔皆臣下為亂而殺之不書名死者衆也春秋因舊史而書不容強為之說秋楚人圍陳納頓子于頓二十三年楚人伐陳傳言討其貳于宋遂取焦夷城頓而還至是春秋書楚人圍陳納頓子于頓傳注遂謂陳逼逐頓子楚人納之蓋納頓乃圍陳之遂事既圍陳又納頓言其不恤民力一舉而治二事所以譏也陳先代之後頓楚之與國楚虐陳而輔頓是於中國何有論者以為春秋有襃楚殆不然歟葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮去年宋㐮公死諸夏愈無所統一至是公與衛子為洮之盟春秋嘉之莒魯本有宿憾獲挐衛侯為之求成既盟于洮明年春又盟于向魯不以望國自尊而及莒慶為盟故莒子復請盟而躬至于㑹春秋庶㡬諸侯之復合是以嘉之凡諸侯未𦵏先君而出㑹書子今衛成已葬其親而亦書子先儒謂衛文欲平莒于魯未終而薨故衛子尋父之志魯人由此亦修文公之好此孝子之至感而人情之所篤故成公雖已𦵏其親猶以未葬自名經隨而書子善之也此論甚美有益世教今備載之附見據傳其年春晋文公以師納王夏四月丁巳王入于王城取大叔于温殺之于隰城晋侯朝王經不書其事先儒為説不一前軰有謂王出居之後無有能納王者王之還京師當在城濮郤楚之時愚謂晋文納王乃創伯之第一事不容廢之春秋所以不書必有其故晉文挟功上僭請王章不得而受温原攅茅之田周家土疆所存能㡬而文公忍于受之春秋削其功而不録其以是故及救宋敗楚中國賴以再安然後錄之與齊桓等于中而猶有責備之意此春秋用法之權衡也二十有六年春王正月己未公㑹莒子衛甯速盟于向齊人侵我西鄙公追齊師至酅弗及齊人以魯僖嘗援無虧以兵加魯左氏以為討莒衛之二盟二盟於齊孝有何關乎此齊侯自出春秋再書齊人譏其無道一嵗再用師伐人之國也追有二莊十八年夏公追戎於濟西與公之能追戎也此齊人侵我西鄙公追齊師至酅弗及譏公追之緩而不能及也榖梁曰弗及者可以及而不敢及也夏齊人伐我北鄙衞人伐齊春而侵我西鄙公具文追之可以及而不能及愈為齊人所侮是以又興北鄙之師衛之大不及魯衛之强不及魯今猶能為魯出師以伐齊而魯之君臣專事畏縮國之不競良有以也夫齊與魯强相若也當荘公之世三家未張國猶有人齊来侵覆之長勺齊宋合而又来翦之乘丘三戰而再勝魯未嘗出齊下也至僖以後敵至不能禦望風歛郤求救於強國苟為自全之計國無人焉耳由三家用事據權要以拒士大夫賢者無路以進魯自是始衰使僖公不專任季氏得賢大夫如曹劌者與之謀國魯之削豈至是乎公子遂如楚乞師書乞師譏也魯求援于晉凡再不書乞師今求援于楚而書乞師譏即楚以求苟安也春秋初年中國諸侯視楚為異國鄙之而莫即也及齊桓既殁宋㐮告敗楚盛兵以刼制中國於是小大畢從魯亦預於楚之㑹猶曰有所迫而不能自已也今齊昭小豎子將兵来侵魯之力自足以抗之何至遽乞師于逺用楚兵以伐與國乎春秋書乞師卑魯也嗟夫詩不云乎荆舒是懲周公所以造周而魯之家法也僖公自即位以來㑹楚凡再今又以小小利害下楚以求苟安其不為周公魯公之羞乎或曰魯人不自愛重有求于楚是固可貶楚人朝受乞師之請夕以兵赴之其不謂之義舉乎曰否楚之出師利而為之耳魯為中國之望諸夏所視儀而聽倡者也楚前此窺伺中國必聘魯以為之先及㑹于盂使人獻捷于魯以要公之来㑹其欲得魯所以致諸侯也魯忽以乞援為請楚人幸其自来為之出師惟恐或後彼非有救災恤患之心利魯之来服為諸侯倡耳春秋何取焉乞師有二望國乞外兵以自救書乞師卑之也伯國用諸侯之師亦書乞師見於晋厲公之世抑之也卑之乃所以激而進之抑之乃所以裁而約之垂法於後焉耳秋楚人滅夔以夔子歸公羊作傀子左傳夔子不祀祝融與鬻熊楚子伐而滅之諸侯之祀其先祖具有常典祝融楚之始祖鬻熊楚之逺祖熊繹又其始受封之祖夔與楚同其所自出至熊摯别封于夔熊摯者乃夔國始受封之祖夔子當祀熊摯為始祖祝融鬻熊非其所當祀矣楚以不祀為辭伐而滅之楚當有滅同姓之罪故夔子見執而不名專罪楚也冬楚人伐宋圍緡榖梁作圍閔宋成公忘父之仇既適楚而與之平矣及晋文公入去楚而即晋遂為楚所伐或者乃謂宋成不屈於楚楚憾而伐之反以左氏為誣過矣夫楚之暴彼謂繼齊而伯者無過於宋必欲翦滅之而後已夫豈一屈身而可遏其暴乎臣子復讐之義有戰而死無苟而生宋成之通楚無益於自免而有害於復仇使晋文不興則宋之為宋豈不殆哉公以楚師伐齊取榖公至自伐齊義見公子遂如楚乞師或曰魯以楚師伐齊春秋惡之蔡以呉師伐楚春秋與之均乞師于逺而襃貶異何哉曰事有近似而不同者此是也夫楚之僣王大號慿陵中國魯從而乞師以伐其同盟義之必不可者也吳雖僣號自同於楚而太伯之後也與楚人為水火中國賴焉蔡以其師伐楚是為以強國伐亂國義之猶可行者也厥後呉去王號以為黃池之盟春秋以二伯書是未可與楚人同其貶斥故魯用楚師而貶蔡用吳師而不譏二十有七年春杞子來朝義併見下入杞夏六月庚寅齊侯昭卒弟潘立是為昭公史記世家昭卒弟潘殺嗣子而自立為君此簒也經傳皆不書疑有缺文秋八月乙未𦵏齊孝公乙巳公子遂帥師入杞春秋正名之書也其書名書字書氏固褒貶之例若列國之爵則命之天子聖人雖撡筆削之權必不敢以布衣而當王者黜陟之事也審然則是孔子先犯僭王之罪又何以正人乎杞之書子愚竊疑之杞二王後公也入春秋稱侯荘二十七年稱伯或曰紀而非杞至此又貶而為子百年之間凡四貶爵獨于一杞而見之時王貶之邪伯主請于周而貶之邪或書傳之殊邪或如左氏之説以廢禮貶之邪此經疑也姑存以俟考冬楚人陳侯蔡侯鄭伯許男圍宋十有二月甲戌公㑹諸侯盟于宋此楚伐也而中國諸侯與之俱伐此楚㑹也而中國諸侯皆預于㑹列國之恥也春秋之法盟主爵而諸侯人者有矣未有盟主人而諸侯爵者也人楚子而爵諸侯不與楚子以主諸夏之盟也亦以正諸侯從楚之罪也雖然楚始㑹諸侯伐國而晉文之伯業興矣蓋泓敗之明年而文公入于晋楚圍陳之明年而文公以兵勤王威聲氣熖已動於海内楚之君臣頑冥不靈猶謂伯功可以力致遂㑹諸侯圍宋以為宋亡而海内無復可伯之國孰知宋圍方急晋救旋至反以是開文公之伯業乎嗚呼周室不競天開二伯以整齊中原撲楚人之狂熖齊桓基之於前晋文繼之於後天實為之豈人力所能致哉齊之盟春秋為公諱而不書公預薄之盟春秋又為公諱而不書楚子在㑹今宋之盟不復為公諱矣以㑹盟為未足又從而乞師公之卑屈於楚者亦甚矣不為公諱著僖公不以下楚為恥其責公深矣春秋集傳詳說卷十一
