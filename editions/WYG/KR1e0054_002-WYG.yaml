  - {type: page-break, offset: 0, content: '', id: KR1e0054_WYG_002-1a, image: WYG0158/WYG0158-0050a.png}
body:
  text: 隱公下桓王元年四年春王二月莒人伐杞取牟婁榖梁曰傳曰言伐言取所惡也諸侯相伐取地於是始故謹而志之公羊曰外取邑不書此何以書疾始取邑也諸侯擅興兵侵伐罪也伐人之國而取其地重有罪也是故伐而取者其罪又加於伐一等或曰文三年秦人伐晉傳稱取王官及郊襄二十三年齊侯伐晉傳稱取朝歌書伐不書取此伐取並書何哉曰杞二王之後也至是與周俱衰不得自同於宋莒以蕞爾小國介居東陲伐杞而取其地莒有罪矣聖人於二王後書法拳拳每致其意此書伐國取地以莒為首戮哀先代之後浸以衰微而重有誅於莒也戊申衞州吁弑其君完衛州吁齊無知弑君而自立為君實兼簒弑之罪春秋首絶其屬籍書名書弑及其誅也書衞人殺州吁齊人殺無知不與之以為君名其為賊示國人皆可殺此春秋誅討亂賊之上刑也蓋舊史猶書公子州吁聖人脩經始削之以垂訓於州吁無知見之然亦有弑君簒國罪與州吁無知同及其以弑而死猶得書君如齊懿楚靈之類則以其既定於位於其臣民有君臣之分久而後見殺不容用削奪之例非略之也削屬籍云者伊川謂自古簒弑多出公族蓋自謂先君子孫可以為君國人因而奉之春秋於此明大義以示後世故初年弑君多不稱公子公孫此義已正胡氏乃謂州吁削屬籍以國氏罪莊公不待以公子之道使預聞政事主兵權而當國也愚謂此方誅討弑賊未當追議莊公既往之咎莊公者完州吁之父也莊公寵州吁之過固有以基亂而去族大刑所以治弑君賊非治其父也或曰魯有史諸侯之國皆有史亂臣賊子之誅必待春秋而後正何與曰春秋非史也史者記事之書而春秋之作聖人所以垂法於後世非史之謂也故春秋書弑君有以國書有以國人書或著弑賊之名氏或略弑賊之名氏或實弑而書卒或實卒而書弑君不君而陷於弑亂臣不臣而麗於首惡權衡輕重定於聖人之筆削夫豈史之謂哉而況弑君賊非國之大臣世卿則貴介公子之用事者彼弑其君自立為君或為政於國必不號於人曰我實弑君而鄰國史官得之傳聞亦未敢遽書或又畏其强大不敢直書其失書者多矣及聖人作經然後以所聞所見裁而正之聖筆一脩議論乃定孟子謂春秋成而亂臣賊子懼豈虚言哉餘義見莊八年齊無知弑君夏公及宋公遇于清遇始見遇者公羊以為不期而㑹杜氏謂草次之期曰遇二國各簡其禮若道路之相遇也當從杜氏隱公聞衞有亂與宋平公草次為遇謀討衞人之弑君者書公及内為志也宋殤乃因以為利摟衞之弑賊與俱伐鄭而去其所逼公之志不獲伸矣於是宋陳蔡衞連兵伐鄭而隱不與也春秋於州吁簒弑之後繼書此遇嘉公之有志而惜其不勇比事而觀可以見聖人之意餘義見下兩伐鄭宋公陳侯蔡人衞人伐鄭誅兵首例始見此春秋初年諸侯㑹兵伐國之始是時齊晉尚微宋魯為望國諸侯視儀聽倡於此乎在使宋殤公明於大義即清之遇稟命于王與魯俱出師討衞人之弑其君者則足以大服諸夏之心宋其興矣乃不其然從州吁之邪謀合三國兵伐鄭以除其所惡不稟王命擅興兵連諸侯黨逆人而定其位宋之罪大矣故是役也本衞之志而春秋序宋為首青宋深矣宋公書爵目其人而貶之也衞州吁書人不與之以君衞也秋翬帥師㑹宋公陳侯蔡人衞人伐鄭翬者公子翬也不稱公子去族之誅也桓之弑隱翬為首惡故當隱世去其族以正其弑君之罪及桓世而仍其公子之號明其與桓同惡也此春秋誅討亂賊始見於魯事者也甞謂春秋書法有不待左氏而見者清之遇鄭之伐翬之擅兵是也州吁之亂公實有討賊之心宋殤利於伐鄭而黨州吁以成其簒公志不獲伸而殤遂率陳蔡衞以為此役一以成衞之亂一以去已之逼宋殤之不仁甚矣無功而還斯可以止怙終不悛復來乞師公之辭之猶清志也而羽父力請以其師㑹公不能禁於是㑹宋陳蔡衞復伐鄭春秋聯書清之遇鄭之伐翬之帥師首惡之人與逆黨並著而累見衞主兵而以宋為首誅亂賊必先治其黨與此春秋法也烏乎清之遇魯隱仗義之心不能勝宋殤趨利之心猶曰二國之君人自為謀乃若宋來乞師魯君猶知畏義而不敢從其臣乃勇於輔逆而不可禁蓋翬也有無君之心而後動於惡寪氏之禍實權輿於擅兵伐鄭之時是以聖人探其用心而誅之於其始帥師即去其族以示貶其立義精矣其垂戒嚴矣或曰諸侯㑹伐皆春秋所惡曰春秋始年凡㑹伐者皆擅兵無王怙黨逐利此五國伐鄭以宋為兵首疾始㑹伐也迨二霸既興則有㑹諸侯攘荆楚如召陵城濮之事與初年之㑹伐不同春秋猶或與之此所謂其時不同其例不同者也九月衞人殺州吁于濮陳地也此春秋誅討亂賊之始事也書衞人善衞人之能討賊也書于濮善陳人之能討衞賊也案左氏州吁偕石厚如陳石碏使告於陳曰此二人者實弑寡君請即圖之陳人執之而請涖於衛衛使人如陳涖殺之討賊者衞人也然非陳人聽衞人之討其賊則州吁豈能遽正大刑故春秋書于濮以善之及宋萬之弑宋人求賊于陳慶父之弑魯人亦求賊于莒皆責賂而後與無討鄰賊之義矣或曰此石碏殺之不書碏何哉曰討賊者公法也衆望之所同也若書衞石碏殺州吁則是一人之私討而不見其從衆望討其罪故惟書衞人言衞國猶有人能以討賊為事也書人有二例弑君人人皆得討而殺之書人以殺此與齊無知是也又有國亂無政衆共殺之亦書人者隨事而觀可見之餘義見桓六年蔡人殺陳佗冬十有二月衞人立晉春秋二百四十二年亡公子自外入而得國者多矣如齊小白入于齊突歸于鄭赤歸于曹陽生入于齊之類或書入或書歸皆不以立書也惟衞宣公晉之入春秋不書入不書歸而變文書衞人立晉公羊立者不宜立者也衆雖欲立之其立非也近代諸儒則以為衞人不稟王命而立君是故春秋不與其立論固正大但春秋之世大夫立君如季友之立僖襄仲之立宣宋督之立馮齊髙國之立小白晉趙盾之立黒臀欒書中行偃之立周齊陳乞之立陽生皆不稟命于王不承國於父而立者春秋何以不書其立而獨此之書乎蓋春秋書法有褒而寓貶責備賢者之道也有貶之而未絶開小人以自新之途也春秋於四國伐鄭之後繼書衞人殺州吁于濮又繼書衞人立晉再書衞人者褒衞人能不以簒賊為君相與仗大義而誅之所以不書入不書歸而變文書立以表異之亦以見其討之難立之尤難惜其不能稟於王命而立之是所謂褒之中而見責備之意者也當是時四國連兵而來為簒賊植黨州吁之勢成矣而石碏以告老大夫非有權位之可倚毅然以討賊自任不動聲氣元惡即誅彼四國之師逡廵引退乃逆晉於邢而立可謂居人臣之甚難是故春秋變文特書以示别異而中見責備之意非石子之賢聖人不以是望之謂之責備則可謂之直貶則斷斷乎非春秋意也或曰若子所言春秋何以不書石碏之名氏而惟曰衞人立晉乎曰立君從衆望也非一人所得而私立也若書石碏立晉是一人之私也其可哉昭二十三年書尹氏立子朝言王位已定而尹氏以一人之私而立朝所以誅也觀尹氏立子朝之為誅則衞人立晉之意可識矣曰若是晉何以去公子之號惟書晉乎曰於石碏無貶於晉則有貶也衞人以晉為賢而立之而晉也得志而驕晩焉獸行新臺之刺作焉是以春秋於其始立而去公子不書以見衞亂之從始五年春公矢魚于棠春秋書蒐狩者有矣若講行時事之常則為常事不得書其書者皆譏也書蒐狩而言公者譏在公也春秋五蒐皆不書公惟桓四年狩于郎莊四年及齊人狩于禚書公此矢魚于棠書公譏公之從事於遊畋非其時復非其地也隱公初年謹守法度猶賢君也及是浸驕矢魚于逺臧僖伯諫弗聽春秋之書之譏之也亦危之也棠在宋魯之間無故而輕出寪氏之禍其兆於此乎僖伯之諫曰君將納民於軌物者也不軌不物謂之亂政亂政亟行所以敗也其憂深思逺有周公告成王無淫于觀于逸于遊于田之意賢人之言哉夏四月葬衞桓公諡義已見元年公及邾盟及三年葬宋穆公凡弑而賊不討不書葬無臣子也此弑而葬以州吁即刑録衛之臣子能葬其君也易名者加之諡也不易其爵也春秋諸侯在其國稱公臣子以美名加於君非爵也及其死而諡之乃遂以公繫之於諡亦猶大夫以子繋之於諡美名也而非爵若其僭爵春秋必削之矣諡者因乎行者也子不得以私其父臣不得以私其君所謂名之曰幽厲孝子慈孫百世而不改者也衞桓以弑死雖無過之可疵而桓之為義諡法所謂闢土服逺而為桓者也以此加之身弑之君是之謂溢美其何足為死者之榮乎自是而後如齊襄衞宣晉獻皆淫佚失道之君而類得美諡魯隱宋殤晉之靈厲則亂臣賊子追仇其君因諡見逆其亦重可誅矣皆由不請之於王私自為諡其弊遂至此耳秋衞師入郕書師之例衞宣當州吁暴亂之後入而君國不以惜民保境為事而輕動大衆以入人之國書以貶之耳此入郕入而弗有也十年齊鄭又入郕故知此入之非有非其力之可以取而不取蓋懼强國來討故雖入之而不敢遂有之耳書師之例胡氏曰紀其用衆而立義不同有矜其盛而稱師者如齊師宋師曹師城邢之類是也有著其暴亂而稱師者楚滅陳蔡公子棄疾主兵而稱楚師之類是也有惡其無名不義而稱師者次于郎以俟陳蔡及齊師圍郕之類是也胡氏之說固為正大然有以書師而褒者有以書師而貶者褒貶在事而不在師也如僖元年書齊師宋師曹師次于聶北救邢繼書齊師宋師曹師城邢初之書次譏其兵盛而救緩也繼之書城美其能用大師以救危亡之國也此一書而前譏之後美之即事而觀乃見耳又如莊八年師次于郎以俟陳人蔡人繼書師及齊師圍郕又書師還此公自將以出例當書公而初書師次而不言公次繼書師及而不言公及又繼書師還而不書公至自圍郕蓋一書屢譏也以其動大衆黨仇國伐同姓故譏至於再三而不以為繁耳又如僖二十八年書晉侯齊師宋師秦師及楚人戰于城濮此晉侯宋公在而惟晉侯以爵書貴晉侯也以晉侯能用三國之師却楚師而安諸夏故變文獨書爵以示褒此皆隨事而見傳者師例何可拘乎故曰褒貶在事而不在師九月考仲子之宫隱為桓築宫以祭其母也諸侯無二嫡孟子入惠公之廟仲子無祭享之所隱欲譲國於桓故為其母立廟以祭之仲子之卒已久至是而始立廟者隱欲以是見其欲讓之志耳或曰禮與曰非禮也榖梁曰禮庶子為君為其母築宫使公子主其祭也於子祭於孫止必庶子為君而後其母得築宫以祭其祭也又以公子主之君不親祭尊宗廟也今也桓未為君而隱為之築宫以祭其母此召亂之道也曰春秋之書之何與曰譏失禮也宫廟有定制循其制之常無書也非禮之禮非制之制於是乎書若曰公子允之母非魯君所宜為之立廟也前書天王歸仲子之賵非所宜歸也隱以夫人告而王為之賵之也此書考仲子之宫隱以公子為君之禮而為之考之仲子之宫非隱所宜考也春秋之書之譏也合禮無譏無譏則不書之矣初獻六羽初獻六羽用之仲子之廟也左氏考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二公從之於是初獻六羽蓋是時有司者將以萬舞施之仲子之廟隱公欲裁酌其宜不欲以先君廟樂之舞而施之公子之妾母是以用六羽而去其干焉耳春秋之書之不但譏其考宫之未當抑亦譏其獻羽之非制也公羊以為侯國當用四今僭而用六僭諸公也是故書以譏之魯固僭天子禮樂孰云隱公而始用六羽乎榖梁引尸子之說謂當時諸侯僭天子之禮皆用八佾初獻六羽始厲樂矣厲之為言謂魯於是而始降用六不敢與周擬非也此用之仲子之廟不敢與魯之先君同其僭其後季氏之庭至於用八使魯知其為僭而殺之流弊之極何至陪臣而僭八乎尸子之說其不然與案明堂位周公有大勲勞於王室成王賜魯公以天子禮樂俾祀周公先儒以為成王之賜魯公之受皆非其論定久矣劉原父乃云魯惠公之世禮壊樂崩請於周命史角往自是魯始用天子禮樂陳止齋引祝鮀之言衆仲之說深有取焉愚以為周之東遷名器既濫齊桓晉文有夾輔之大功周家所以寵異之者不過平世之常典請王章尚不許魯惠公者有何功徳之可稱而遽賜之以天子之禮樂乎原父以為惠公僭天子之禮當時猶多强國不聞其敢僭魯惠何敢冒不韙至如是乎意惠公之世禮壊樂崩請於周而脩復之耳非始請也然原父之學亦可謂悖矣邾人鄭人伐宋邾小國而序于鄭之上兵首也案左氏宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道則是役也邾為之先序之鄭上著其為兵首所以貶也或曰宋人取邾田宋實啓釁而邾應之邾其無罪乎曰邾見侵於宋應之義也當告之天王請之方伯聲其罪而治之不當間鄭宋之隙而偕鄭以伐宋因彼之憾復己之私春秋所不與也是故邾為首鄭次之鄭以伯爵而序於邾之下亦所以貶也兵首例初見四年宋陳蔡衞伐鄭與此少異故讀春秋不可例拘當求屬之意辭比事螟宇宙之内一事之違其常一物不得其所日星示異水旱螟蝗告災皆人君責也自一國而言亦國君責也故春秋變見於上必書災見於民亦必書示人君職分之當謹耳哀十二年冬螽傳者歸過於司歴之失閏此諛臣所以蔽災而託為聖人之言豈春秋書水旱螽螟之㫖哉冬十有二月辛巳公子彄卒義已見元年公子益師卒公子彄者臧僖伯也左氏載隱公之語曰叔父有憾於寡人寡人弗敢忘葬之加一等胡氏曰書日見恩禮之厚隱公不能用僖伯之諫而於其死眷焉不能忘其亦可謂有君人之量矣然書日不日不係乎褒貶宋人伐鄭圍長葛榖梁曰伐國不言圍邑此言圍何也久之也注謂此冬圍之至六年冬乃取之古者師出不踰時重民之命乃暴師經年而後克無惻隱之心志在逐利故圍伐兼舉以著其罪然亦有暴師非久而書伐書圍書取者大率皆貶而貶之中有權度焉隨事而觀可也宋穆公受國於宣公及其卒也復挈國以歸宣公之子而使己子馮出居於鄭可謂能以禮讓終始者矣殤公不仁日以殺馮為事疑鄭人欲納馮輒率諸侯伐鄭以有東門之役自是兵連不解宋殤實為禍首書伐書圍責其暴也明年冬書宋人取長葛蓋頓兵鄭地一年而後得之春秋深著其黷武之罪特書以示貶而宋殤末年之禍卒以兵不戢為内賊所乘有國者視此知所懲矣六年春鄭人來渝平公榖作輸平平始見平者脩好而不為盟誓者也渝平者左氏釋為更成來渝平者鄭人不憚屈而求成於魯魯乃降心以從鄭兩善之辭也隠之為公子也與鄭戰于狐壤止焉公固有怨於鄭及清之遇宋人志在黨州吁而伐鄭以除己之逼公毅然不從忘怨而就義公於此可謂賢矣翬之擅兵本非公意鄭豈不知之去年秋鄭人伐宋入其郛宋求救公復不為出師公此時此心但知以靖國保民為事雖非為鄭而鄭實徳公故於此遂來渝平渝之為言如易所謂不克訟復即命渝之渝盡棄夙憾相與共由於義理之正不為盟詛而信義相約是故春秋貴之書法特異於它日厥後宋及楚平燕暨齊平魯及齊鄭平其事皆不與此同故知來渝平為春秋所貴公榖作輸平釋輸為墮以為墮敗其已成鄭人苟欲敗成何用來告於義未通故當從左傳作渝平陳止齋謂鄭人有志叛王而合諸侯於是渝平愚觀是時周已衰不能號召海内鄭欲叛王何用渝平於魯陳氏喜為髙論於當時事情頗有未切此渝平之渝只當從左傳夏五月辛酉公㑹齊侯盟于艾盟義已見元年于蔑二年于密三年于石門或曰諸侯私相為盟固非春秋之所與諸侯相與為㑹講信脩睦春秋其許之乎曰有王者㑹諸侯霸國㑹諸侯與諸侯兄弟甥舅之國嵗時相為㑹者未可槩言也周家盛時岐陽之蒐酆宫之朝東都之㑹王者事也及霸國興奉王命合諸侯有所謂兵車之㑹玉帛之㑹者亦王事也春秋猶或許焉此公㑹齊侯乃兄弟甥舅之國交相見之禮春秋無譏若乃㑹而黨凶害善趨利伐國如春秋初年宋齊魯衞之所為則春秋之所深誅而不以貸者也㑹而盟皆非所取義見于蔑秋七月義見綱領明夏時公羊曰此無事何以書春秋雖無事首時過則書首時過何以書春秋編年四時具然後為年愚謂此夫子所以見行夏時之意也春必首正月夏必首四月秋必首七月冬必首十月此皆夏正月之次非周正月次也言天時在此孟月在此故雖無事而必書以見四孟月之必不可改也冬宋人取長葛此宋人取鄭長葛不書鄭責鄭也亦責宋也宋圍長葛且一嵗其虐民黷武甚矣鄭之力可以救而不救乃更以是嵗夏出師侵陳掠獲以為功内喪其邑外取於人春秋是以併責之故宋以人貶而長葛不係之鄭責鄭之不能保有土地圖功於逺也春秋有去年冬事與今年連文而不再書某國某土者省文也此圍長葛取長葛相距一年不係之於鄭夫豈無譏七年春王三月叔姬歸于紀杜氏曰叔姬者伯姬之娣待年於父母之國不與嫡俱行至是乃歸何休公羊注曰媵賤不書此何以書終有賢行故也紀為齊所滅紀季以酅入於齊叔姬歸之能處隱約竟全婦道故録之蘇潁濵亦曰媵不書此所以書賢之也莊十二年紀叔姬歸于酅是時紀已為齊所滅宗廟在酅叔姬歸奉其祀不以存亡虧婦道春秋是以賢之蓋本之何注而為之說得春秋之㫖矣賈逵謂紀貴叔姬故書以刺之其義舛滕侯卒義已見三年宋公和卒膝侯卒不名不葬諸說不同或以為未同盟或以為微國不録愚謂卒而不名史失其名也無故而不葬魯不往㑹史佚其諡是以失書不容鑿為之說胡氏曰宋殤齊昭告亂書弑不書葬是討其賊而未葬也晉主夏盟在景公時告喪書日矣而經不書葬是諱其辱而不葬也宋公盟㑹未嘗不同而三世不葬是治其罪而不葬也呉楚之君書卒者十亦有親送於西門之外者而經不書葬是避其號而不葬也怠其禮而不往弱其君而不㑹無其事闕其文魯史之舊也討其賊而不葬諱其辱而不葬治其罪而不葬避其號而不葬聖人所削春秋之法也胡氏之說備矣愚謂春秋之葬不葬不可以定例求也蓋甞考之君殺賊不討不葬固春秋所以垂法然有賊討而不書葬者宋魯二閔公是也有賊不討而書葬者魯桓鄭僖是也有世子弑君如蔡般之弑景許止之弑悼書弑書葬雖同而其事實有不可得而同者以例而求則失之矣此外有敗國殄民以死而不録其葬者晉惠夷吾之類是也有廢嫡立庶以亂而不予之以葬者晉獻詭諸之類是也有始逆終順而特予之以葬者鄭伯突也有既逐復歸而特去其葬者衞侯朔也隨事而求乃見書法之㫖若夫楚之不葬避僭王也秦穆之賢卒葬不書秦景哀惠之卒缺其名其葬也皆以謚書則以逺故或告或不告或㑹或不㑹是以或書或略非褒貶之所在也如滕侯宿男之不葬則魯人微之而不往㑹史因失書初無他義强求其故則鑿矣夏城中丘城初見凡城有以城非其地而書者有以城非其時而書者有以屢城勞民而書者有城守要害而特書以紀之者左氏專以時不時為言拘矣此以盛夏興役書譏也木訥乃曰周之夏今之春方春東作之時而役民事城民失其業是以有譏夫夏而城固非其時然以周之夏為夏之春則誤甚矣三代之王雖建子丑寅以為嵗首而時皆夏時厯萬古而不易也孔鄭釋詩書誤謂三代之世時與正俱改先儒固甞辨而正之意木訥未之見耳愚既於綱領明夏時而詳著其義兹不重述齊侯使其弟年來聘母弟例初見榖梁曰諸侯尊弟兄不得以屬通其弟云者以其來接我舉其貴者也愚謂屬之不通以明君臣之分也而兄弟天倫之愛豈以分故而遂廢之乎諸侯之弟或稱公子或稱弟公子其本稱弟因事之稱也而稱弟之中書法復有不同說者謂不書公子而書公弟皆貶殆不然也齊侯使其弟年來聘鄭伯使其弟語來盟使其弟云者為其親於魯特使其弟故不書公子公孫而曰使其弟無貶也若夫衞侯之弟黒背帥師侵鄭則譏其使弟典兵也衞侯之兄縶見殺則譏其使兄預政也衞侯之弟鱄出奔秦伯之弟鍼出奔則譏其失友于之愛也宋公之弟辰出奔既而入于蕭以叛書奔譏兄之不友書叛誅弟之為逆書法昭然可見至於宣公之弟叔􅆄卒書公弟叔􅆄云者貴其盛徳髙節特書公弟以寵之若曰公有弟如此又何貶之有哉胡氏曰僖公私其同母寵愛異於他弟施及其子猶與嫡等而襄公絀之遂成簒弑之禍故聖人於年來聘特變文書弟以示貶吁有是哉年之子無知自以簒誅謂聖人於其父之聘魯而為之貶三復經㫖書法而知聖人決無是心也入春秋為㑹為盟為遇皆非盛時之常典惟聘禮近古王制之所得為也然聘不皆書惟天王使下聘不以小大皆書大國之使來不皆書有故則書列國之使來不悉書有所褒貶則書魯大夫之聘列國亦不悉書有故則書秋公伐邾春秋譏魯隱背蔑之盟以兵加邾也左氏乃曰宋及鄭平七月庚申盟于宿公伐邾為宋討也杜氏云公距宋而更與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以求宋以邾鄭前年同伐宋故也此亦傅㑹之說魯不為宋屈也十年遂偕齊鄭伐宋魯豈懼宋而為之伐邾乎春秋書公伐邾譏背盟也元年方及儀父盟今遽加之以兵而又自將以前此春秋所為譏也或曰凡公自將伐國皆有譏乎曰當伐而伐惟義所在不皆譏莊十八年公追戎于濟西二十六年公伐戎戎來侵我公追之不能及既而伐之義之所不能已也觀前之追觀後之伐而知春秋之無譏此方及邾盟而遽伐之觀前之盟觀後之伐而知其以背盟故譏不加貶而義見者也是以謂比事見義春秋書法大率類此冬天王使凡伯來聘戎伐凡伯于楚丘以歸公羊曰凡伯者天子之大夫也來聘聘于魯也其書伐之何執之也執之則其言伐之何大之也曷為大之不與外裔之執中國也執者執下之辭也不言戎執而言戎伐以天子之使見執於外裔而為之諱也孫泰山曰于楚丘者責衞不能救難録以歸者惡凡伯不死其位耳是固然矣然天子之使戎得以邀而執之天子不命之討方伯連帥復不能為王敵愾春秋書之以見周室微弱下得慢上諸侯無王小雅盡廢四裔交侵其在斯時乎凡伯畿甸諸侯之為卿大夫者故書爵義又見九年南季來聘八年春宋公衞侯遇于垂遇義初見四年是遇也與清之遇同特簡其禮為草次之期耳愚以王人見執於戎則衞將伸其方伯連帥之職與宋公亟為此遇連兵討戎免凡伯於難而左氏乃云齊侯將平宋衞有㑹期宋公請與衞侯相見故遇于犬丘此亦常事耳奚以遇為哉天王使過衞之境不能謹次舍遏寇攘使凡伯辱於楚邱復不能躬帥師徒追擊勦蕩為王刷恥乃以私故與宋人為此遇捨職分所當共而從事於私是故春秋聨書以責之不然列國自為遇無關於周魯之故何足汚春秋之簡牘乎善讀春秋者當觀聖人屬辭比事之意不可以例拘三月鄭伯使宛來歸祊庚寅我入祊左氏曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田書鄭伯使宛來歸祊不祀泰山也諸說大率本此愚意左傳所以為此說不過以桓公初年鄭人有璧假許田之事因附㑹而為易田之義甞三復經㫖是嵗歸祊與桓元年之璧假許田自是二事左傳合而言之恐非春秋垂訓之本㫖蓋春秋書歸有例如歸濟西田歸鄆讙龜隂田歸讙及闡皆歸舊疆也此書鄭伯使宛來歸祊庚寅我入祊言非其所當歸而歸非其所當入而入書法重在歸字入字上非以田易田之謂也鄭人與宋有隙前嵗及魯渝平是也而以祊來歸則非也彼謂泰山在魯境内祊亦魯境故以為歸而不知名山大川不以封泰山非魯所當有祊者鄭人受命於周以祀泰山之田乃王略也鄭豈得歸之於魯魯豈得受之於鄭書歸書入魯鄭皆有罪焉耳乃若璧假許田鄭莊乘魯桓負簒弑之罪脅而取之當歸祊之時實未有求許之意不然祊既入於魯終隱之世不以許田與鄭鄭更持璧求假於桓之元年果何說乎學者試以是觀宛不書族鄰國之未賜族大夫也義見二年無駭帥師入極夏六月己亥蔡侯考父卒卒義已見隱三年宋公和卒辛亥宿男卒不書名史之失也不葬魯微之而不㑹也詳見滕侯卒秋七月庚午宋公齊侯衞侯盟于瓦屋榖梁曰外盟不日此何以日諸侯之參盟於是始故謹而日之也愚謂榖梁謹日之說拘矣然參盟於是始春秋之書之貶也齊强大而以宋為首責宋也春秋初年有兩國相為盟者魯盟邾盟宋紀莒之密齊鄭之石門惟兩國為盟也今而參盟宋為首責在宋也春秋初年有兩國自相攻伐者莒入向無駭入極鄭伐衞莒伐杞惟兩國自相伐也前年宋陳蔡衞合兵以伐鄭於是始有四國之伐宋為首責亦在宋也是時東遷之始諸侯猶有未叛王者而宋連四國之兵盟三國之侯不以王命行事春秋於參盟㑹伐皆以宋為首正其無王之戮也或曰據左氏是盟也齊人以平宋衞連年攻伐之怨宋其無責乎曰否考之經鄭實不預盟三國之怨實未得釋又明年魯齊鄭㑹于中丘合兵以伐宋齊為之首齊既能平之於前而又伐之於後何耶以是知瓦屋之盟非以平怨左氏所紀其未然與大率春秋初年諸侯之㑹盟征伐各為其私而參盟㑹伐多推宋為長以其為二王後故而宋殤因是得以逞其志卒取不戢自焚之禍亦可閔矣八月葬蔡宣公義見葬宋穆公衞桓公及膝侯卒九月辛夘公及莒人盟于浮來凡公與强國之大夫為盟不書公及諱强國之以無道加於公也與小國之大夫為盟則不諱公及以公自欲與之為盟非彼小國之大夫要公必欲為此盟也齊髙傒晉處父强國之大夫也浮來之莒人小國之大夫也魯莒自春秋以來有未平之怨前此紀人為之平之而魯莒之好卒未合也今隱公欲降心以消二國之患而莒之君卒不至乃及其臣為盟以望國之君而盟小國之臣謙而不中於禮者也是故不為公諱此一及字所施不同及邾儀父及髙傒及宋人及莒人一書而一義要當以事而觀不可以例而求也螟義已見上冬十有二月無駭卒左氏曰羽父請諡與族公問族於衆仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字絶句為諡因以為族官有世功則有官族邑亦如之公命以字為展氏說者謂因其所由生而賜姓若舜由媯汭故陳為媯姓胙之以土而命氏則曰陳諸侯位卑不得賜姓故其臣因氏其王父字或使即先人之謚因以為族如衞齊惡宋戴惡之類是也或取其舊官舊邑之稱以為之族舊官如晉之士氏舊邑如韓魏趙之類是也諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏無駭公子展之孫故為展氏諸說大率本此說者又曰諸侯之子稱公子公子之子稱公孫公子公孫繋公之常言非族也其或以貶故而去公子公孫之號亦與去族同至於公孫之子不復得稱公曽孫無駭輩以名行及其死則賜之族以王父字為族是也公曽孫死後乃得賜族亦有未死賜族者僅一二見公子公孫於身無賜族之理經書季友叔􅆄仲遂者皆是以字配名連言之其傳云立叔孫氏臧僖伯臧哀伯叔孫戴伯之徒皆傳家據後追書之耳宋督戴公之孫未死而賜族生立華氏彼弑君懼討求為此非例也其公之曽孫𤣥孫以外爰及異姓有新升為卿君賜之族以此卿之字即為此族者亦有雖為卿而竟不賜族者挾柔溺之後無聞者是也此春秋初年事也是時周制猶有存者故有未賜族之大夫其後大夫世其官無不賜族而周制㡬於掃地矣九年春天王使南季來聘天王使書氏書字之始榖梁曰聘問也聘諸侯非正也案周禮天子時聘以結諸侯之好殷覜以除邦國之慝間問以諭諸侯之志歸脤以交諸侯之福賀慶以賛諸侯之喜致禬以補諸侯之災皆天子用禮於諸侯者則天子下聘於諸侯有自來矣或曰子謂周禮雜出於漢儒則是聘也安知非漢儒之傅㑹乎曰否秦漢之為禮務在尊君卑臣此詳致待遇臣下之道是三代之遺意不可併廢也曰然則榖梁以為非正何哉曰榖梁為當時諸侯言耳隱公立九年不朝於王今新天子即位六年于茲魯未甞脩時事之禮而凡伯南季後先來聘冠履倒置分守陵夷春秋為是故書之以責魯天子大夫下聘列國書氏書字自此始凡伯書爵畿内諸侯之為王卿大夫者也三月癸酉大雨震電庚辰大雨雪此夏正三月也雷已發電已見則雪不當復降夏正三月而大雨雪此所以書災榖梁曰八日之間再有大變隂陽錯行故謹而日之也雷已發電已見而雪乘之此强臣干主之兆允翬逆謀已成上天示異惜隱公之未悟也挾卒義見無駭入極夏城郎義見城中丘秋七月義已見六年秋七月冬公㑹齊侯于防㑹義已見六年于艾左氏曰宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬㑹于防謀伐宋也愚謂左氏雜記所聞而後儒多議其誣者此類是也鄭宋之仇也今摟齊要魯以伐宋而曰以王命討縱有王命亦假王命以復其私仇耳左氏遽謂宋公不王鄭伯為王卿士以王命討也是子鄭以方伯連帥討伐之事豈不失實之甚耶蓋魯與宋未甞有遺憾齊與宋又為同盟今魯啗于歸祊之利齊背瓦屋之盟連兵而伐與國内揣有愧故相與假王命以興伐宋之師非王意也春秋書公㑹齊侯于防誅始謀也其後霸主挾天子以令諸侯實昉于此十年春王二月公㑹齊侯鄭伯于中丘夏翬帥師㑹齊人鄭人伐宋冬甫㑹齊侯于防及春又㑹于中丘惟利是趨春秋聨書之所以貶也隱公初年秉志蹈義殆非當時諸侯比故聞州吁弑其君則與宋公草次為㑹欲以討之此時此心為何如哉既而動於祊利背宿之盟㑹齊鄭以伐宋前日翬擅兵而公不能制今也遣將㑹伐所使者乃前日擅兵不可制之人遣翬以為未足復親往焉惽于利而失其本心隱之謂矣翬去族不稱公子誅也終隱之篇皆去其族隱之賊也至桓而書族以明其與桓同惡也書法明甚或者乃以為與挾柔溺無駭同例其可得而例觀乎六月壬戌公敗宋師于菅辛未取郜辛巳取防公羊子曰取邑不日此何以日一月而再取甚之也内大惡諱此其言甚之何春秋録内而略外於外大惡書小惡不書於内大惡諱小惡書愚謂公羊書日之例在他事為拘惟此得春秋之意但内惡有為之諱者有不必為之諱者聖人之心公如天地其為魯諱公也其不為魯諱亦公也必如公羊之說則拘矣魯於宋本無纎芥之隙徒以祊賂之故為鄭所役翬既率師㑹二國公復自出竒兵以襲人之虚而取其二邑一月再取春秋書日所以著其暴辭婉而義見者也嗟夫方宋之伐鄭而乞師也義所不可固請而公不從及鄭之伐宋而求魯也利之所動一言而公即聽是以君子貴乎辨義利義利之辨不明出此入彼蓋有䧟溺而不自知者矣秋宋人衞人入鄭宋人蔡人衞人伐戴鄭伯伐取之孟子曰善戰者服上刑連諸侯者次之此春秋初年用法之意也若鄭莊宋殤者可以當此刑矣鄭自克段以來汰於用武伐衞伐宋入許敗王師皆極其兵力所至今也用竒一舉而取三國之師其不曰善戰可乎宋二王之後固當為諸侯之倡而不稟王命擅合諸侯之兵為參盟之首其不當麗連諸侯之罰乎春秋書二國入鄭三國伐戴又書鄭伯伐取其師兩有責焉耳木訥乃以為兵端在宋今又連兵入鄭伐戴鄭伯出兵乘之一舉而取三師三國之敗非不幸也聖人舉而人之以誅兵首鄭以竒取則以爵書所以異於宋愚謂春秋固人宋亦未甞與鄭也書鄭伯云者目其人也善戰者服上刑奚爵之有哉若以兵首言鄭欲納馮而宋加之以兵鄭亦何以致宋之師不得謂之非首也或爵或人關係春秋條貫不容無辨取師者全軍俱殱無得遺也哀九年宋取鄭師于雍丘鄭復取宋師于嵒是其例也冬十月壬午齊人鄭人入郕五年衞入郕至是齊鄭又入之此一郕而六年之間再為强暴所侵陵為小國者亦難矣左氏乃謂宋公不王鄭伯以王命致討郕人不㑹是以伐之此傅㑹之說前巳辨之矣鄭自復其私怨齊自從而逐利於王何有哉春秋治諸侯擅兵無王之罪而左氏曲為之說曰以王命討不庭何以垂信於後世乎不書伐而書入掩其不備而入之也然郕尚在文十二年郕太子來奔書郕伯來奔者是也十有一年春滕侯薛侯來朝榖梁曰天子無事諸侯相朝正也考禮脩徳所以尊天子也諸侯來朝時正也犆言同時也累數皆至也范注若榖伯綏來朝鄧侯吾離來朝不俱至也累數若滕侯薛侯來朝同時俱至也愚謂周家盛時諸侯有嵗相問殷相聘世相朝之禮曰相云者亦往復之義非若諸侯之朝天子相率而旅朝也至於衰世諸侯大國未甞朝王而小國乃相率而朝大國大國倨受其朝而不以為僭如滕薛之朝魯是所謂累數俱至也春秋初年魯最强大又以得用天子禮樂之故是以受小國之旅朝而不自以為僭厥後齊晉稱霸責禮於諸侯從可想矣夏公㑹鄭伯于時來㑹義已見六年于艾秋七月壬午公及齊侯鄭伯入許甚矣隱之動於利也得祊之餌而偕鄭伐宋得宋之郜與防而利心愈熾復偕鄭入許義利之辨不明則將何所不至矣鄭於許有疆場之怨故汲汲於伐魯何與焉而興師逐利入人之國都直欲夷其宗社其為惡亦大矣是役也鄭為謀主許復為鄭所有而春秋書公㑹公及責公深矣使時來之㑹公力拒其請鄭必不敢獨行齊亦必不為鄭出師惟公勇往而後齊鄭連兵以前許不能國矣不書公及齊師鄭師入許而書公及齊侯鄭伯入許所謂目其人而貶之也或以為褒其得國不取殆為左氏浮辭所惑也冬十有一月壬辰公薨公羊子曰公薨何以不書葬隱之也何隱爾弑也弑則何以不書葬春秋君弑賊不討不書葬以為無臣子也子沈子曰君弑臣不討不書葬以為不繫乎臣子也何以不地不忍言也此春秋垂世之法公榖有所授矣據傳弑隱公者桓公及公子翬也春秋於公薨不地不書葬所以見其為弑也或曰人臣而弑其君惡之大者春秋不直正其罪而微見其㫖何哉曰弑君者亦魯之先君舊史為之諱之夫子魯人不得不為魯先君諱是以微見其義以示後世所謂不討之討施之魯事大率皆然也或曰胡氏陳氏謂魯史官固書公子翬弑公于寪氏聖人脩之曰公薨諱國惡也其說然與曰否諱國惡者謂君所為失道而悖義為之諱也婉其辭以見義若賊弑其君惡在賊而不在君史官書公子翬弑其君于寪氏書之即所以討之而謂春秋諱而削之是春秋為賊諱惡而佚先君之賊其必不然也蓋史官不以弑書而春秋為之白之也晉之董狐齊之南史衰世不常有前是脩魯史者率多與弑賊為隱如桓與翬共弑隱公桓君魯翬秉政史不得不為之諱又如文姜預弑其夫姜君之母且挾强齊為援史復不得不為之諱非為君諱實為弑君者諱自是而後魯之為史官者於閔之弑赤之弑皆循此例及夫子脩春秋於魯之先君小君不容例之以列國之討前史既諱之夫子不得不因之然亦不盡為之諱也故書公薨而不著其地復不書葬微發其弑逆之狀即所以正其弑逆之戮非舊史已能直書翬弑其君而聖人削之而不録也愚甞聞之師春秋初年衞州吁與魯桓皆弑其君而簒有其國春秋於州吁去其族以匹夫討書曰衞人殺州吁于濮討賊之常刑也及書魯桓弑君其辭略然討衞之刑即討魯之刑學者比事而觀可得聖人意矣春秋集傳詳說卷二
