body:
  text: 春秋集傳詳説卷二十四宋家鉉翁撰昭公二周景王十二年晉平公二十五年九年春叔弓會楚子于陳繼滅陳而書譏也楚爲無道乗陳有亂而盛兵以臨之遂滅人之國天下諸侯所當同嫉宋魯鄭衞畏其凶威皆遣大夫以㑹之魯獨見書譏也以望國倡諸侯預於夷㑹是故譏許遷于夷已見成十五年又見昭十八年夏四月陳災公羊作火公羊曰陳已滅矣其言陳火何存陳也存陳之義盡矣春秋於陳之亡書法深致其嚴謹自去年春書陳亂夏書楚殺陳行人秋書留奔過死冬遂書楚滅陳放招殺奐葬陳哀公一年之間專書陳事夫陳已亡而猶葬之者示陳之未亡也及是陳已爲楚所縣俾其臣僭爵以居之而猶書陳災者以盛德之後見翦於夷特著義存之耳不與楚得陳也或曰陳已亡無告災者魯史安得而書之乎曰此聖人因陳災而著存陳之義夫豈舊史所能及乎是時夫子年既長見而知之不皆据舊史也秋仲孫貜如齊冬築郎囿冬而築時也所以書則譏築囿也桓四年公狩于郎莊三十一年築臺于郎今復築郎以爲囿其以爲游觀之地乎其以爲講武之處乎是時三家用事魯君僅擁虚器而猶興築囿之役為季氏敺民耳十年春王正月夏齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒鞌之戰四卿俱書譏季氏以其私怒出而諸卿皆從也今伐莒而三卿俱行譏季氏所欲爲而二卿奔走後先惟命之承非但誅其伐國誅其無君也胡氏曰前已舎中軍此復三卿並將以出季氏爲主將二子各率一軍爲副則三軍固在以爲復古者非也但叔弓非叔孫氏乃臨事所置之帥耳舎中軍非復爲二軍乃析三軍以爲四季氏獨將二軍兵愈多權愈重此所以遂至不可制階此爲亂而昭公孫于齊矣戊子晉侯彪卒平公也昭公立九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡公羊曰楚子䖍何以名絶曷爲絶之爲其誘討也此討賊也雖誘之曷爲絶之懷惡而討不義君子不與也或曰蔡般負覆載所不容之罪楚子討之春秋以名書與般俱名何也曰仗大義以行其大不義仗大信以行其大不信春秋所甚惡也䖍利陳之亂而滅其國既得滅國之利復以謀陳者謀蔡誘般殺之襲取其國詐以滅陳又詐以滅蔡又用蔡世子於淫昬之社狂暴險恣無復一分人理是故春秋特變例而名之與般俱以名書不與䖍以討賊之義也榖梁以爲夷狄之君誘殺中國之君故謹而名之愚謂弑父與君夫人皆得而誅之中國不能治夷狄治之亦春秋所許但䖍利人之難而滅其國故特正其罪而名之耳使䖍於討般之後謀之於晉請之於王更立君以定蔡已無所利焉則春秋猶將許之何遽至於名之乎五月甲申夫人歸氏薨昭公之母襄之妾敬歸之娣也妾母僭夫人自成風以來春秋皆有譏至是始無譏非無譏也僭禮之罪在僖宣後之子孫率循弊典有不足責焉耳然直書其事而無所隱乃所以責之也大蒐于北蒲是月也君母歸氏薨蒐事不爲之中卻晉大夫叔向聞之曰國有三年之喪而無一日之慼國不忌君公室且將卑矣春秋繼夫人薨而書大蒐以其同在此一月之内也歸氏雖非嫡母魯君既尊之以夫人之禮則當從大喪之制今也蒐不爲輟言強家之不忌君是以知公室之將卑乾侯之禍不旋踵而作或曰喪不可蒐歟曰蒐常事也喪變事也當變而常是故爲不可非謂國有喪武備不可講也仲孫貜會邾子盟于祲祥喪不貳事禮也前既蒐于北蒲此復爲祲祥之會春秋皆繫之五月之下所以貶也或曰春秋不爲魯諱與曰魯不諱喪而講行常事春秋不得爲之諱也秋季孫意如㑹晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人杞人于厥憖案左傳謀救蔡也或曰蔡當救乎曰般可討而蔡不可滅也今般已死而䖍之兵猶頓於蔡下必欲乗其危亂而取之此盜賊之兵中國諸侯共起而擊逐之義之所得爲也爲晉君者當使人諭之楚責以違載書擅興兵滅與國之罪彼䖍雖頑㝠不靈國中猶有人豈不畏義而恥而晉之用事者庸猥無能乃使人卑詞爲蔡請盟爲夷所侮辱而蔡遂滅矣厥憖之會欲以何爲既乃逡巡而引退晉君猶有知韓起其不爲首戮乎九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之書楚師滅蔡繼書執世子以歸用之誅楚之無道著世子以不屈而死也孫泰山曰世子云者未立之名胡文定謂世子守節而死故爲春秋所録合二說而書法見矣般固有當討之罪父死而子立世子宜立者也世子不敢遽以君位自居亦未甘出夷楚之下嬰城固守以待外救晉不能救而國亡身死視紀季以酅入齊苟爲自全之計者逺過之矣位乃世子之位父雖殞命於夷子猶不敢遂居其處視齊世子光乗其父之篤疾殺父之嬖而簒有其國者萬萬不侔矣是故春秋特存其世子之名而錄其爲宗社死公羊以爲父坐弑誅子不得有其國者是亦一說使世子而不能死社稷以國與楚春秋於是乃有誅矣十有二年春齊高偃帥師納北燕伯于陽左傳作唐公羊伯于陽公子陽生也子曰我乃知之矣在側者曰子苟知之何以不革曰知爾所不知何左傳曰納北燕伯欵于唐因其衆也公羊迃僻當從左傳北燕伯入于陽與獻入于夷儀其事略相類皆以亂臣迫逐而出因大國之力以歸入於其邑而未至其都皆不名所以正其君臣之分衞獻返國而始名之者則所以結正其失國之罪或名或不名皆有深意或曰齊景公爲北燕出師至再春秋其許之乎曰霸者之欲霸也皆有身任天下之志景公有可霸之資當晉政既衰有可霸之時而不能以天下自任前伐北燕受賂而回此伐北燕半途而返非其力之不足用心不剛也厥後魯昭孫於其境子家羈知景公無信不足仗勸使改圖良以是故三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復榖梁曰季孫不使遂乎晉也而左傳則以魯伐莒取郠莒人愬之晉故辭公夫伐莒至於再又受其叛臣叛邑魯實有罪然皆季氏之所爲明年晉人執意如亦知罪之所在而公每至晉輒爲所卻豈晉之諸臣曲爲季氏之地公有辭不能以自伸歟榖梁之說必有所本五月葬鄭簡公楚殺其大夫成熊左傳或譖成熊於楚子成熊知之而不能去以是故及䖍以猜忌殺無罪之大夫故以累上書成熊懷寵耽禄見幾不作以及於難亦有責焉秋七月冬十月公子憖出奔齊左傳憖與南蒯叔仲小謀誅季氏懼不克而奔事詳見明年叔弓圍費楚子伐徐晉伐鮮虞榖梁曰其曰晉狄之也不正其與夷狄交伐中國故狄稱之注謂鮮虞爲姬姓之狄居於中山故曰中國愚以爲未得經意晉自平公舉霸權而遜之楚遂使中國諸侯北面夷狄之庭人有左衽之憂及是楚滅陳滅蔡伐呉圍徐中國之人延頸企踵以望晉人出師一大創治之晉之君臣懵然一無所問方且加兵於弱小無罪之國爲逐利自私之計是故狄之陳止齋曰春秋之狄秦以晉故也狄鄭亦以晉故也則其狄晉何晉之君臣無中國志也楚䖍簒國之賊而執齊慶封放陳招殺蔡侯般假討賊之名以劫制諸夏而晉連年有事於鮮虞呉入郢於越入呉晉猶圍鮮虞未已無志於中國也於是狄晉此說得之吕氏乃曰事有大小則記有詳略晉伐鮮虞略辭也故書楚書吳皆略之之辭以爲逺者有不可得而詳事之小者亦然皆非所以爲襃貶輕重此說疎與春秋以一字爲襃貶凡狄晉狄秦之類皆書法條貫之所在烏可忽乎義又見十五年伐鮮虞十有三年春叔弓帥師圍費或曰此南蒯叛季氏而叔弓以兵圍之不書蒯叛何也曰家臣而知尊公室未爲罪也家臣託尊公室而自爲其私計夫然後爲叛矣南蒯之始謀爲此號於人曰吾以尊公室其心跡未著春秋烏得而正其罪卒之以費奔齊其叛狀乃著於是爲叛矣曰家臣而尊公室於義可乎曰可諸侯之臣皆天子之臣也大夫之臣皆諸侯之臣也諸侯叛王大夫與之俱叛不可也大夫叛諸侯家臣與之俱叛不可也諸侯之臣叶諸侯以尊天子大夫之臣叶大夫以尊諸侯正也魯季氏秉政五世至宿意如犯上作亂無所不爲使爲之家臣者知大義之所在勉季氏以忠約季氏以禮舉兵權而歸之公上固魯國之令臣也奚其叛而南蒯之心則非純乎爲國者既以告公未幾乃以費叛歸于齊則魯之叛臣矣當時有謂家臣不當言強公室者乃亂賊之黨同惡相濟之悖辭而傳者猶有取焉愚竊不敢謂然也且以後世之事而揆之如王莽曹操司馬懿父子之謀爲不軌與唐藩鎮之稱兵犯上皆有腹心爪牙輔成其惡則家臣之類也知有所事不知有國莫不以叛臣目之至於家臣輔大夫爲逆則不以爲非然則莽操懿之臣猶得爲忠於所事乎春秋書叔弓圍費不書叛蓋有深意後儒不能深識惟曰家臣不當叛大夫誤矣大夫所爲正而家臣叛之是之謂叛大夫叛而家臣正之奚其叛義又見定八年盜竊寳玉大弓夏四月楚公子比自晉歸于楚弑其君䖍于乾谿据左傳所載不能盡得經意今從公榖爲斷䖍與公子比公子棄疾皆共王之子郟敖之死公子比奔晉公子棄疾事䖍爲蔡公䖍無道暴師乾谿以圖非望之福棄疾因民之怨召比於晉而立之公羊曰公子棄疾脅比而立之令於乾谿曰比既立矣衆散而䖍以縊死此其實也比自晉而歸實預初議左傳乃謂觀從獨爲此謀矯棄疾之命召比於晉强與之盟然後襲蔡蔡公始覺愚以爲區區一觀從豈能獨辦此事蓋棄疾與比内外合謀而爲之也棄疾始爲此謀而春秋歸獄於比以比自晉而入主於代䖍比入而䖍死䖍死而比立則弑君之罪當在比矣左傳以爲比不知始謀歸國而後知之必無是也書自晉歸于楚榖梁以爲晉有奉者是也或曰䖍非簒國之賊乎曰始䖍之簒有能仗大義而殺之求郟敖之後而立之則殺者爲義簒者爲賊從州吁無知之討例可也及今而後殺之又代君其處其得謂之討賊乎或曰比未嘗事䖍爲君而坐之以弑君之罪何歟曰䖍兄也比弟也䖍君楚國比自外歸弑其兄而已自爲君不曰弑君可乎使比於䖍之既死固執子臧之節從衆望而立君則不可以弑言矣蓋賊可討而不可代也代之則與之俱爲簒弑之人春秋之義必有所不容矣楚公子棄疾殺公子比棄疾立是爲平王二傳作殺公羊作弑當從公羊弑者下戕其上之名楚䖍之死棄疾弑之公子比之立棄疾立之立之則君之矣君之而又殺之則弑也比不成爲君則稱公子比棄疾既嘗君比則加之首惡之名所以正棄疾弑比之罪比未嘗事䖍爲君而猶以弑書棄疾實已君比豈得不謂之弑諸儒多從二傳爲殺其擇之未精乎秋公會劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘公不與盟同盟義已見成十七年自晉楚爲成晉之君臣自謂天下無事媮惰苟安無復自強之志楚由是竊霸權虎視中夏晉君臣鼠伏而不敢出幾二十年今楚䖍罪盈惡稔自底覆亡晉昭乃復爲會于平丘號召諸夏如病痱沉痼之人精采銷鑠殆盡強自支拄人之見之者知其無能有爲是會也齊不肯受盟晉人治兵邾南大陳戎馬脅而與之盟晉亦可鄙甚矣書同盟譏王人不當下同列國之盟且譏晉人不當以兵脅諸侯而與之同盟是所謂一書再譏也或曰公不與盟魯之恥也而春秋不諱何哉曰春秋於魯事之當諱者或以責魯或以責外沙隨之會書晉侯不見公責在晉也平丘之㑹書公不與盟責在魯也魯乗晉人之衰侵暴邾莒受其叛人入其土地復加之以兵春秋前此備書之皆貶也至是晉人伸其霸討辭公於㑹而執意如晉之所行者是故其責在魯書公不與盟若公之自不與盟雖爲公諱亦責公也胡文定乃以是責晉以爲信蠻夷之訴絶兄弟之歡其未然歟蓋書同盟所以貶晉書公不與盟則不可以言貶晉春秋有一事再書而前後取與不同者此是也晉人執季孫意如以歸魯人暴莒亦甚矣然皆季氏之所爲非其君責晉人豈不知之苟欲伸其霸討當治意如之罪豈惟爲莒執之抑亦爲魯治之可也夫以人臣而據兵權擅侵伐不有君命陵蔑小國怙終不改至于再三肆之市朝夫豈爲過前此晉平庸闇公欲訴而無路今晉昭始立必有以季氏無狀告之者故辭公于㑹而執意如執之是也當究其罪之所在顯示誅斥而晉昭開明之天理終晦蝕於羣下之私情是年冬公如晉復見卻而意如乃得無事以歸公不得見意如得歸是君之辭終不能勝於其臣而晉之無政猶前日也公至自會蔡侯廬歸于蔡陳侯呉歸于陳公羊曰此皆滅國也其言歸何不與諸侯專封也愚謂陳蔡之滅楚䖍滅之也今其復之者楚平棄疾也國固成周之建國何專封之有哉然春秋以自歸爲文者其著義自有所在蓋陳蔡者中國之諸侯而爲外夷所滅今復爲外夷所存中國無盟主諸夏無方伯始其滅也不能救今其復也無所預此中國之恥也故春秋於陳蔡之歸皆以自歸爲文者爲中國諱也不言復而言歸國固其國幸其亡而得存去而復來是故皆爵以歸之與鄭突曹赤之爲歸異矣冬十月葬蔡靈公楚蔡之仇也大讎未報仇人已殞春秋之義不葬者也今以國復而葬亦變例耳或曰楚䖍滅蔡而棄疾復之春秋書葬所以釋其不共戴天之憾曰不共戴天之憾而可釋乎爲公羊之學者謂晉人會于平丘欲爲陳蔡討楚楚懼而亟復二國雖復其名猶制其實是其爲憾可得而釋乎昭侯柏舉之役大義所當伸也公如晉至河乃復呉滅州來州來呉楚中間要害處或以爲楚之附庸成七年呉人入之當撫而有之以爲外屏亦控楚之一䇿也乃不能然今又五十載復以兵入之遂從而殘毁之其地卒歸於楚呉不能有也十九年傳楚人城州來不言取而言城見呉人之不能有十有四年春意如至自晉春秋書公如晉至河乃復繼書意如至自晉見魯君與意如相出入於晉也傳謂意如譖其君使不得遂於晉此其實也如晉昭辭公於㑹而執意如人猶冀其明正强臣專兵之討俄而得釋季氏愈張魯君愈削乾侯之禍作矣春秋書意如至自晉誅也自意如執至此間事隔歲而書名不書族去族求免其身而陷其君是以有誅二十三年叔孫婼見執及其歸也書叔孫婼至自晉比事而觀可以識聖人之意三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒郊公去疾之子不書葬魯不往會也魯人侵莒取其地晉修霸討執意如而辭昭公于會魯莒因是有怨不往㑹其葬是以闕書冬莒殺其公子意恢郊公以子代父正也庚輿以弟繼兄簒也蒲餘侯首亂者也公子意恢君之黨必莒之舊臣也蒲餘侯與公子鐸比而爲亂殺意恢逐郊公逆庚輿于齊而立之意恢之死爲君故耳春秋不書郊公之奔庚輿之入郊公不能君庚輿由是以簒也繼莒子卒而書意恢死意恢受託孤之寄而不能其事者也君在喪而已爲政國之安危休戚於是乎寄郊公居喪不慼而不能正之以禮蒲餘與鐸謀爲亂而不能豫爲之防身雖爲國而死何益哉故不書死難而書見殺曹莒無大夫故不書大夫義又見二十三年庚與來奔十有五年春王正月呉子夷末卒公作夷昧謁餘祭夷昧季子同母兄弟也約以位相讓迭爲君謁死餘祭立餘祭死夷昧立夷昧死季子避而去之於是夷昧之子僚立焉未幾爲謁之子闔廬所殺論者謂季子不當辭位而召亂非知季子者也亦非深識當時事者也季子之讓已著於平日非夷昧死而後讓也爲夷昧者當明季子之讓節以國授之闔廬是謂以嫡繼長宋穆公之與夷是也顧不能然乃俾僚冒以位自處以致殺身而召亂闔廬固當坐首惡之罪夷昧實有責焉耳二月癸酉有事于武宫籥入叔弓卒去樂卒事公羊曰君有事於廟聞大夫之喪去樂卒事大夫聞君之喪攝主而往大夫聞大夫之喪尸事畢而往榖梁曰君在祭樂之中大夫有變以聞可乎大夫國體也古之人重死君命無所不通公榖以告爲合禮啖氏曰宗廟大事大夫卒小事以理言應待祭畢乃告諸說多從之愚以衞栁莊魯叔弓二事而觀而知禮意之所在矣祭者主於誠慤不貳事者也故當祭雖大夫之喪不得以聞衞臣栁莊疾革其君必使以告爲之變其常也及聞其死請於尸而往而釋服遂以賻之不但撤樂併撤祭而往慼大臣之意過於尊祖非禮之正謂之失禮可也今叔弓之喪据傳叔弓預於祭涖事猝有疾死則君爲之撤樂卒事其可也若叔弓自殁於其家如栁莊之比則當待祭畢而後告不當以卑而廢尊春秋書之記禮之變其常耳此與襄仲之死去籥禮例不同不可引以爲證武宫者或以爲成六年所立之武宫非也魯用天子禮樂有兩世室魯公爲文世室武公爲武世室爲不毁之廟茲因大祭有事于武宫叔弓當此時而暴卒故爲之去樂夏蔡朝吳出奔鄭楚平即位未幾反䖍之虐存陳與蔡若有古人之風然以傳之所紀蔡雖存不能國也朝呉蔡之舊人楚平自爲蔡公與之善及得國仍俾居蔡費無極者讒人也害其寵而傾之以是故奔其後蔡之二君入楚而不復昭侯又將見畱以賂而免卒復大讎義見於朱之奔東國之死柏舉之戰六月丁巳朔日有食之秋晉荀呉帥師伐鮮虞或曰鮮虞之伐前則狄之後則否何歟曰狄之者變常法而狄之君及大夫咸有貶焉耳書某帥師伐某責將也鮮虞之伐始倡其議者荀吳也其後再伐三伐卒滅其國而後已者皆荀呉也是以貶或謂春秋以荀呉不受鼓之叛人是以無貶夫伐鮮虞伐同姓無罪之國又動兵至於再三乃大不義春秋豈以細故小節而遂貸其貶乎存大節而略細故春秋法也録細故而置大罪於不問夫豈聖人垂法之意春秋於伐鮮虞一事深有貶於晉冬公如晉義見至自晉十有六年春齊侯伐徐徐之封在齊南鄙桓公之霸也楚成伐徐桓躬帥諸侯動大師以救之盟于牡丘次于匡又出偏師伐厲以攻其所必救非但爲徐計亦自爲齊計爲中國計蓋懼楚師之浸淫而有震鄰之憂耳今齊景睥睨晉霸而不能志其逺者乃伐徐以爲左右望之計視桓公之存徐有愧多矣傳言齊師至于蒲隧徐人賂以鼎與之盟而歸春秋書伐國而云某侯伐某是皆有意讀者謹之楚子誘戎蠻子殺之公羊曰楚子何以不名夷狄相誘君子不疾也曷爲不疾若不疾乃疾之也此比類䖍之誘蔡而爲言也蓋誘一也䖍以施之中國而棄疾用之蠻夷故春秋誅䖍而略棄疾然書誘書殺蓋亦罪之深特不名耳楚大蠻小皆以子稱又以見四夷雖有大小强弱之不同而於周班皆爲子不得擅相侵陵況誘而殺之乎夏公至自晉左傳正月公在晉晉人止公不書諱之也平丘之會晉人辭公而執意如討其侵莒取地執之是也已而意如得釋罰不加毫毛今公如晉晉復止公踰歲涉三時之久乃得還由晉昭昬孱大夫強恣故意如與魯君相出入於晉意如實陷其君也其後昭公憤激不能平興兵以討之勢有不容已而所任非人卒以致敗論者謂魯昭伐季氏爲啓釁非深知當時事者也秋八月己亥晉侯夷卒子服昭伯從公如晉歸語意如曰晉之公室其將遂卑矣君幼弱六卿強而奢傲將因是以習習實爲常能無卑乎子服回可謂善覘國者矣晉之衰始于平成于昭頃以迨于亡強大夫實爲之也九月大雩季孫意如如晉冬十月葬晉昭公春秋集傳詳説卷二十四
