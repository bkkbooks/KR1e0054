body:
  text: 春秋集傳詳説卷二十一宋家鉉翁撰襄公三周靈王十六年晉平二年十有七年春王二月庚午邾子牼卒公榖作􅗎是時魯邾交惡不以葬告不會故不書宋人伐陳陳叛中國久矣晉不能治而宋忽興師以伐之為中國撓楚也宋雖非強國自襄公以來世與楚人為水火楚忌之宋亦不出楚下十一年楚鄭伐宋以撓晉也今宋人伐陳亦以撓楚是故春秋貴之夏衛石買帥師伐曹義見晉執石買秋齊侯伐我北鄙圍桃高厚帥師伐我北鄙圍防齊環三年之間五用師於魯春秋之書之以著其不戢自焚之禍明年諸侯同圍齊又明年環死矣自鞍之戰齊常屈於晉無役不從而內懷不平每欲釋憾於魯以致晉師今君臣異道而進藝亦險矣魯三家束手無能惟晉侯之拯已晉而不救魯之宗社將為墟乎春秋不惟責齊亦閔魯也九月大雩宋華臣出奔陳冬邾人伐我南鄙十有八年春白狄來義已見僖二十九年介葛盧來公羊曰白狄者白狄之君也何以不言朝不能朝也劉原父謂蕃服於中國世一見諸侯雖善其交際不得而通是以春秋不與其朝原父之論固為據正但春秋之世所謂蠻夷戎者多錯居九服之內又自以為先代之後明德之裔戎有薑戎狄有姬狄莫不負恃強大有陵犯上國之心魯之盟戎會戎苟求無事而已今白狄慕義願朝固非周制之所許拒而絶之有不可得故春秋之義會戎盟戎則有譏介葛盧來白狄來之類則直著其事不與其朝辨分而無絶也夏晉人執衛行人石買劉氏曰稱人以執非伯討也衛孫蒯淫獵於曹曹人詬之孫蒯怒使石買帥師伐曹曹人訴之於晉石買以事至晉晉人執之晉知石買伐曹為惡而不知孫蒯父子逐君為大惡是故不與之以霸討劉説善矣但稱人以執亦有不盡譏者要當觀前後事以求春秋之意此執石買是也秋齊師伐我北鄙榖作齊侯冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊前是霸討或伐或侵或圍或入未有以同書者此特書諸侯會而同圍齊榖梁曰諸侯同疾之也或曰鞍之戰晉為魯衛而伐齊春秋不與也今晉平為魯而伐齊而春秋與之何也曰事有似同而實異者兩伐齊是也鞍之戰雖曰為魯衛出師其實大夫逞其私憾春秋不與也今兹伐齊則以齊靈背盟好歲以兵加于魯晉為之合諸侯以問齊人憑陵與國之罪從衆望而出師非為其私也故書同圍齊此出於聖人之特筆非因乎舊史者也木訥好以揣摩議古謂劉夏之逆王后也乃魯人諂晉而賣齊告于王使薄其納后之禮以微者逆故齊侯怒而伐之晉當併治齊魯之罪先執魯侯歸之京師然後伐齊乃為兩盡考之傳劉夏逆后乃王使之不當魯實無所預似不必鑿為之説此近世科場春秋之大弊愚竊不謂然也曹伯負芻卒于師楚公子午帥師伐鄭案左傳鄭伯從晉侯伐齊鄭子孔將叛晉而起楚師使告于楚故公子午伐鄭有純門之役既而子孔謀泄楚師告還吁使子孔邪謀獲逞則鄭簡不為僖公者幾希榖梁子前謂鄭人以蠻荆之民加於中國之君者公子騑也今騑已殞而鄭之卿大夫從夷之心猶未盡革子孔又將為子駟之所為正由晉人不能討鄬會之賊養成其惡以至今日悼公者何以辭其責十有九年春王正月諸侯盟于祝柯自同圍齊至此間事隔年而諸侯不再序者不與晉以盟諸侯也諸侯同怒齊而伐之邾子身預戎馬驅馳之間又預于祝柯之盟縱有罪亦當少損其罰況邾魯以疆事搆爭晉既討而執之今自齊來返當敘勤閔勞之時乃復執其君而取其地晉之用事者狂恣甚矣故繼是盟書執邾子取邾田責晉也晉人執邾子公至自伐齊取邾田自漷水榖梁子謂與人共事或執其君或取其地譏晉也亦譏魯也言邾子預於圍齊之役與晉魯同其險艱還未及境執其君而取其地春秋備書所以貶也左傳謂疆我田取邾田自漷水歸之于我曰疆我田復舊疆也曰取邾田自漷水言魯人因復舊疆而挾霸國之威多取田於邾也或曰鞍之戰晉命齊歸我汶陽之田書取汶陽田不言取某汶陽田今書取邾田其非魯之故疆歟曰傳謂疆我田取邾田者得聖人書法之旨矣魯因復舊疆而侵取邾田是故書以譏之耳公羊謂魯與邾本以漷為境因漷移入邾界魯隨而有之故坐以取田之罪其義亦明季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒靈公也莊公立齊靈廢嫡於兵敗國危之時齊光篡父於病篤垂死之際靈之暴光之逆所謂凶德參會萃於一時者也然迹其事之所從來正由高厚崔杼貪於得權以成此禍耳厚贊其君伐本幹樹疣櫱已為之傅思久於其位也孰知崔杼隂拱其傍為謀更深一朝輔光以篡殺厚而兼其室遂相齊而志猶未饜復殺光以自媚於晉亂臣賊子苟以患失為心其禍至於殺身喪邦覆其族而後已也晉士丐帥師侵齊至榖聞齊侯卒乃還公羊曰還者何善辭也何善爾大其不伐喪也此受命乎君而侵齊則何大乎其不伐喪大夫以君命出則進退在大夫也榖梁乃曰君不尸小事臣不專大名士丐外專君命故非之宜墠帷而反命乎介二説不同公羊正矣夫伐喪春秋之所甚惡也此書士丐侵齊至榖聞齊侯卒乃還善其已入齊境而能為之旋師也當是時諸侯無義戰入人之境聞其有喪必將疾馳而往以為逐利之計士丐之師非不強也乃能為喪而亟返是故春秋録之墠帷反命未出疆之禮今既及榖當進則亟進退則亟退境外非俟命之地書其還善之耳何疑八月丙辰仲孫蔑卒齊殺其大夫高厚厚齊之世臣也齊靈廢其太子而樹孽子牙為嗣厚不能諌又從而傅之靈將死崔杼挾光以篡盡殺其父之黨厚亦死焉光與杼罪固當誅而厚亦有以自取矣春秋書齊侯環卒繼書齊殺其大夫高厚著光逆也厚不去官以其為君故死歟然其死視荀息則有愧不可以死節言矣鄭殺其大夫公子嘉案左傳鄭人以西宫之難公子嘉知其謀楚純門之師亦嘉所召故殺之如傳所云殺之是也而春秋以纍上書嘉不去官則其事猶疑也豈非罪狀未白子展子西志於分有其室誣以罪而殺之歟冬葬齊靈公城西郛叔孫豹會晉士丐于柯襄陵許氏謂晉君微弱政在大夫動則列國事之非正也愚謂諸侯之大夫所以諂事晉卿者非為國也植黨以伉其君耳晉大夫所以深結諸侯之大夫者亦非為其國也同惡相濟云耳是故春秋深著人臣外交之戒城武城城西郛城武城皆所以備齊也晉為魯大舉伐齊齊雖困而未服故魯人所以為備者如此或曰春秋其與之乎曰不與也國不能用賢紀綱陵遲百度廢弛寇有不至至則危矣雖多城何益二十年春王正月辛亥仲孫速會莒人盟于向夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵或曰自雞澤以來皆書同盟是盟齊人始服何以不書同盟曰著晉人之不能討有罪也齊靈廢嫡立庶世子光與崔杼內外合謀乘厥父疾革自外歸殺父之黨而代其位靈以悸死位固世子之所宜有迫而奪之則篡也篡而未定懼諸侯之有討是以亟預此盟晉人有志於霸當暴白光罪執而歸之京師孰曰不然今幸光之來不度於義汲汲與之為盟曽無一語問及其父所以死彼所以得立之故又安用盟主為哉故春秋於此不與其同盟也不與其能服齊也秋公至自會仲孫速帥師伐邾此譏魯之叛盟伐國而晉不能討也晉人以魯之故執邾子取邾田歸之于魯此前歲事耳今會于澶淵公甫至而仲孫遽以兵加邾襄公孱君也豈知為此蓋季氏挾晉大夫之援以陵暴小國為逐利自豐之計耳其罪當討晉平不能及此惜哉蔡殺其大夫公子燮蔡公子履出奔楚案傳楚人使蔡無常公子燮欲奉文侯之遺言求成於晉不克而死燮可謂得其死矣春秋稱國而不去其官録之也蔡人害燮者皆楚之同惡耳左傳乃云書蔡殺其大夫公子燮言不與民同欲左氏固不明於聖人修經之旨而劉原父乃有取焉曰非其力也而任之非其民之欲也而強之燮之智足以殺其身而已不類原父平日議論殆其舛歟公子履燮之母弟不奔中國而出奔楚不與其兄同志書所以貶陳侯之弟黃出奔楚母弟義初見隱元年據傳二慶讒之于楚以為與蔡司馬同謀事晉二慶讒諂小人不足深責陳侯身為國君生殺豫奪一制於臣下有母弟而不能庇之其亦可責矣黃不奔他國而奔楚則托身非所矣書奔楚亦以貶叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔此傳所謂三叛人之一也雖賤必書著其地叛也或曰諸侯之臣自外歸而據其邑猶以叛書如孫林父宋華亥宋辰等輩皆書某入於某邑以叛此及莒牟夷邾黑肱皆以邑叛奔異國其罪浮於據邑以叛者不書叛何也曰為魯諱納叛人也雖不以叛書而去其族繫之於國著其以地叛君之罪所以誅也繼公如晉而書則以見季氏專輒不請責不在公也左傳載庶其之來季氏以公姑姊妻之其從者皆有賜於是魯多盜季孫謂臧武仲曰子盍詰盜曰不可詰也子召外盜而禮焉何以止吾盜夫上之所為民之所歸也上所不為民或為之是以加刑罰而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎善乎臧孫之言知庶其之為盜知季氏為受盜之主其言有合於夫子異日所以語季康子者是可併書也嗟夫晉為盟主執心不平邾伐魯則執其君而取其地魯受邾叛人土田則併置不問何以服諸侯之心晉所以失霸此其一端也義又見昭三十一年黑肱以濫來奔夏公至自晉秋晉欒盈出奔楚欒氏之稔惡有自來矣弒晉厲覆趙宗滅三郤書皆有力焉至盈之身則未有大咎據左傳盈之母士丐之女與其老州賔通懼盈之有討訴諸其父士丐也謂盈謀不利於范氏其父信之以此貶欒氏逐盈而殺其黨國中良士以盈故死者甚衆士丐實為亂首晉自是始多故矣或曰如傳所言盈實無罪春秋去其爵而奔之何歟曰盈之奔也雖無可坐之罪計其平日事親之道或有未至焉耳欒祁雖有淫行而婦人之仁未有不愛其子者也盈欲防間其母豈無其道今使其母以淫故而覆夫氏之宗盈所以事其親者必有未至焉耳春秋去爵而書奔旨或在是九月庚戌朔日有食之冬十月庚辰朔日有食之連月日食義併見下二十有四年曹伯來朝公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任晉自悼公得國於羣卿之手曲示優容而羣下暴橫不可制范丐者始年號賢大夫猶有父祖之風至是驕蹇無狀受其家人女子之讒逞私怒逐欒盈而盡斃其黨叔向之賢幾不克免餘怒未己復為此會曰以錮欒氏既逐之又錮之入春秋以來大夫奔而極其所往未有若此之甚者也為平公者人非木石亦當詢之於衆曰欒盈其有罪乎為無罪乎黃淵箕遺靖邴為可殺乎為不可殺乎乃以一人之讒毁空一國之良士曽不問其罪狀之何若君之不君有若晉平者乎左傳謂是會也齊侯不敬齊之叛晉此其端也蓋有所侮而後動十一月庚子公榖書孔子生二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨公至自會案左傳亦以錮欒氏也盈奔楚自楚適齊晉人恐其為齊用復為此會以重錮之明年欒氏入于曲沃齊納之也及秋齊侯大出師伐晉專為欒氏故二會之錮錮何益哉楚巫臣以罪奔晉子反請以重幣錮之楚子曰止彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉此士丐自治其私晉平為之會諸侯者再視楚共有愧多矣楚殺其大夫公子追舒追舒為令尹寵觀起未益祿而有馬數十乘楚人患之殺追舒而轘觀起楚之用刑亦慘矣罪未至死故稱國以殺是時中國無政晉齊魯衛之大夫皆竊主之權漸不可制而楚人猶能控御臣下令尹以罪而死者相踵春秋之書之抑楚之太甚奬晉之不及垂戒於後耳使晉君能施此刑於范丐父子及諸不軌之人則晉其庶幾乎二十有三年春王二月癸酉朔日有食之三月己巳杞伯丐卒夏邾畀我來奔義已見二十一年庶其來奔畀我者庶其之黨也魯既受庶其與其二邑復納其叛人天王不問方伯無討春秋再書三書責魯也責晉也三叛無討見晉不綱魯之強臣得以肆行而無忌也葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黃自楚歸于陳導陳侯以叛晉即楚者二慶也奔母弟黃于楚者亦二慶也今二慶以陳叛楚人討而殺之納黃于陳二慶之誅黃之復楚皆專之春秋書法如此若陳人之自殺之自復之不與楚人以專制中國也晉欒盈復入于晉入于曲沃春秋有一書而見二義者欒盈復入之類是也盈挾齊之援復入于晉將不利於宗國非晉臣矣春秋猶書晉欒盈復入于晉一以明君臣之分而討之亦閔欒氏為晉國世臣未遽絶之于晉耳宋魚石挾楚之援入于彭城非宋臣矣而春秋猶書宋魚石入于彭城正與此同例然皆不以叛書以其始本無罪為華元士丐所陷以至此極猶有可原之情也及其興曲沃之甲犯國之都與其君敵春秋於是始誅絶之書晉人殺欒盈秋齊侯伐衛遂伐晉齊侯伐衛遂伐晉伐衛猶可伐晉甚矣目齊侯書遂伐以著齊光之不韙亦以見晉無政有以召齊之侮也或曰齊光之為是伐以報平隂之役辭曰修先君之怨春秋之不與何哉曰光固齊靈之賊也篡父得國其罪當討前日預於會愚謂晉人當聲其罪而執之明正典刑而晉不能也靈之怨非光之所可復也然則晉所以召侮於齊者何哉欒盈本無罪范丐父子以其私憾譖而逐之為兩會以錮之齊光覩其政亂輔盈以讎丐實有所侮而動也然輔人之臣以敵其君名之不正言之不順豈惟不能有濟禍罰踵之矣八月叔孫豹帥師救晉次于雍榆救一也而例或不同未可以槩觀也前此楚伐鄭而晉救之以大拯小救之善者也如狄救齊楚救鄭之類則強暴之救同惡視中國之救同盟不得同也今晉人以霸國而受兵魯出師以援之事非至於甚急而春秋遽書救者譏晉無政召侮而失霸也此救之一字隨事而在不可例觀也晉為盟主數世自秦楚之外未有興兵伐晉深入其國耀武而徐還如此役者雖未能敝晉而為晉之恥亦甚矣國必自伐然後人伐之豈不信哉救而書次言力不足姑具文而往以自結於盟主亦譏也己卯仲孫速卒孟莊子也冬十月乙亥臧孫紇出奔邾季宿之納邾盜也臧孫紇所與言者為何如今乃以媚道自結於季孫迹其所為亦何以異於盜如紇者亦截截善諞言者也季宿自亂已之嫡庶復亂人之嫡庶又以是為紇之罪而逐之紇固有罪宿之恣睢不度抑亦甚矣晉人殺欒盈自欒盈之奔春秋閔其無罪未遽絶之至是始書晉人殺欒盈則以其挾齊光之援興曲沃之甲入絳都而與其君為敵於是始明正其罪不繫之于晉而誅之春秋豈輕加人以誅斥之戮哉是時晉比無賢君羣下互相吞噬以兼併其爵邑亡同括者欒郤也而欒郤之族未幾皆覆敗欒氏者士丐也而士丐之族不再世而亦亡晉君昏愚無知縱臣下以覆人之族而晉之宗社亦不能長矣春秋為此事六見之特書著晉國之亂從此始矣齊侯襲莒齊人伐晉曰以報平隂之役師猶有名也還自晉不入襲莒無名之師也師出無名又為盜竊之計潛行以襲人書曰齊侯襲莒著爵而書襲賤其以大國之君而行盜竊之事也二十有四年春叔孫豹如晉仲孫羯帥師侵齊孟孝伯夏楚子伐吳自鄭服於晉逮今幾年而楚不敢爭者吳為之內懼也是時楚共既殞嗣子始立未遑與晉爭諸侯故鄭得以從晉而無南顧之憂論者歸功晉悼之三駕可謂不深識當時之事者矣今楚始復伐吳未幾又復伐鄭蓋其嗣君漸更世故是以來耳秋七月甲子朔日有食之既義已見隱三年二十一年九月十月朔此年七月八月連月書日食疏家引厯術謂古無連月告食之事以為秦火以來後人傳寫之誤其説謂交前十五度交後十五度並是食竟去交逺則日食少去交近則日食多正當交則日食既若前月在交初一度日食則至後月之朔日食猶在交之末度未出食竟月行天既匝來及於日或可更食今七月日食既八月又食必無此理其意以為日食未有在交初一度二度者故以為古無連月日食之事然漢高祖三年文帝前三年日皆頻食此皆秦火之後以為傳寫之誤不可竊妄謂天度有時而變常若執一定之律而忽無窮之變恐失春秋記災示警之意新唐書亦拳拳論及此此處無從見之他日更當詳考齊崔杼帥師伐莒大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭據傳會于夷儀將以伐齊以大水不克齊侯聞有晉師使陳無宇如楚乞師故楚子伐鄭以救齊諸侯還救鄭或曰是役也晉伐齊楚伐鄭以救齊晉書會而不書伐楚書伐而不書救何也曰齊晉楚皆有責也齊光之始立事晉惟恐其不至平不能君政在羣下光鄙而去之又從而伐之晉實有以自取乃為此會曰將以伐齊春秋不與也鄭事楚幾年矣楚人內困於吳外懼於晉朝夕自救之不給鄭舍之而從晉豈其獲已楚不能於晉乃伐鄭以救齊亦非春秋之所與也齊光知事晉之為恥不思去晉而從楚事楚之恥又甚於事晉尤非春秋之所與也故書會不書伐不與晉以伐也書伐不書救不與楚以救也晉侯楚子以下皆以爵書非爵也以見當時列會之君皆無以大相逺也公至自會陳針宜咎出奔楚叔孫豹如京師左傳齊人城郟穆叔如周聘且賀城襄陵許氏曰自宣九年仲孫蔑如京師其後五十餘年叔孫豹始再往以罕書也自是不書聘王愚謂春秋此一書奬齊也亦以愧晉齊莊雖無道猶知翊戴天子為王城成周晉主夏盟日尋干戈惟事鬭略未嘗以尊周為意春秋因豹如京師特為之書奬齊而愧晉也大飢穀梁曰五榖不升為大飢是歲秋書大水冬復書大飢書災而書大災必有異於平常書飢而書大飢民之流亡困躓亦必有異於平常襄公微弱強家用事民政不講國無比年之蓄春秋書以譏之春秋集傳詳説卷二十一
