body:
  text: 春秋集傳詳説卷十五宋家鉉翁撰宣公上名接文公子匡王五年立是嵗晉靈十三年元年春王正月公即位榖梁曰繼故而書即位與聞乎故也或曰桓宣二公篡弒同而在位十八年書王不書王之有異何歟曰先儒評此者多矣桓公之弒東遷初年王道之不行未久也聖人於其在位十八年書王者四不書王者十有四猶望天王以討賊之事也至宣公則王道之不行百有餘年霸政至是亦弛無與任討賊之事者故遂書王明王法以示萬世此論固已得之但桓宣之事亦有不得同者不必以例求也昔者魯慶父哀薑比而弒閔齊桓公赫然發怒二人者咸底于辟自是中國無篡弒之禍者四十餘年皆桓公威德之所覆也今襄仲敬嬴比而弒赤乃以是謀之齊惠惠入其賂田而許之仲歸遂弒嗣君併殺君之母弟立嬴之子接是為宣公仲與嬴固當坐首惡之戮使齊惠能率厥考桓公之遺訓拒而絶之彼賤妾賊臣何敢肆無所忌至於此是故春秋專討齊惠自子赤之卒及宣公之篡前後八書齊不間以他事著其罪而討之此二弒書法所以不同也或曰若是者宣其無討乎曰繼弒君而書即位坐首惡也使宣公於得國之後正襄仲弒君之戮厚子赤之終葬以君禮則首惡之罪猶可少逭今受位于賊臣以賊臣為恩已而莫之討葬君復不以禮又迫逐嫡母而歸之齊首惡之罪復何所逃故書即位以討之此則從魯桓弒隱之例也公子遂如齊逆女春秋書公即位繼書公子遂如齊逆女著大惡也國君繼世之初斬然在疚而首遣大夫如齊逆女所遣者又同惡之大夫春秋書之所以著敬嬴襄仲弒君篡國之本謀亦以見齊元無道黨其臣而使之弒君也蓋請婚割地魯所以自結於齊者皆在遂與得臣如齊之時故即位甫爾而襄仲隨有遣遂逆女之行未幾又以割地而出春秋書即位書逆女書遂以夫人婦薑至自齊書齊人取濟西田著魯人結齊之援以弒其君著齊人輔魯之篡俾弒其君蓋明王法以治齊魯之罪二國皆有討也嗟夫如齊稟命而歸弒其君者公子遂也如齊逆女亦公子遂也如齊割地以賂者亦公子遂也春秋備書以見請婚割地弒君篡國始終其事者此一賊之所為誅齊也治魯也誅襄仲也治宣公也學者備觀前後書法而識春秋之旨所謂不加誅斥而義自見者也春秋雖為魯諱而篡弒之惡亦不為之隱也春秋書遂如齊逆女遂以夫人婦薑至自齊討遂也亦以治宣公也而左傳乃曰稱族尊君命舍族尊夫人何求經之淺耶左傳不明春秋用法之意類此三月遂以夫人婦薑至自齊榖梁曰婦不言氏喪未畢故略之也其曰婦緣姑言之之辭公羊曰夫人何以不稱薑氏貶也曷為貶譏喪娶也其稱婦有姑之辭也愚謂夫人非大夫所得而以也遂挾齊以弒其君娶齊女為篡君之婦魯之國家實制於遂書以者著其罪也喪娶固當譏而罪有大於喪娶者棄母於齊娶婦於齊是春秋所以誅也母哀薑也左傳目為出薑哀薑文公夫人宣公之嫡母今所納婦薑之嫡姑也哀薑雖見棄于齊賊臣悖妾之棄之非得罪於宗廟見棄於先君則猶魯夫人也故春秋於子卒之後繼書夫人薑氏歸于齊於宣公始立而書公子遂以婦薑至自齊言婦有姑之辭姑哀薑也傳者乃目敬嬴為姑大失春秋辨分之意而左傳至名哀薑為出薑是賊臣悖妾逆子可以出先君之夫人左傳不明大義往往類此嗟夫此一齊也受人之出母而與之以妻此一魯也棄母於齊而娶齊女以為之婦絶滅天理敗亂倫教遂使周公太公之國而胥為無禮無義之歸此春秋中年魯國一大變也是以聖人於文宣之際特書屢書十見之經誅魯之君臣而必及於齊蓋敬嬴襄仲雖蓄篡弒之謀非齊惠為之羽翼無以成其惡也嘗泝魯國禍亂之源自桓莊以來家法壞亂妃妾私事權臣共謀為逆如莊薑之淫於慶父謂莊公夫人也敬嬴之私事襄仲其始也不過相從於淫其極也遂至共謀為篡般閔赤三君之死職夫人嬖妾淫亂之故有國有家者其可不以是為鑒乎夏季孫行父如齊案傳如齊納賂請會也昔者魯莊將終季友受託孤之寄鴆叔牙戮慶父立僖公魯之宗社賴以再安行父其孫也襄仲弒君叔仲惠伯死之行父乃為賊使齊而歸先君之母今又為之再使納賂請會有忝厥祖多矣晉放其大夫胥甲父于衛或曰自入春秋稱國以殺大夫者皆為專殺今稱國以放大夫者亦謂之專歟曰殺之與放其事異也殺大夫是為專生殺上侵人主之操柄故為不可若放大夫放之使之念咎久將還之不為專也但河曲之戰趙穿胥甲不肯薄秦軍于險若以是為罪二人皆當逐今甲放而穿免趙盾實私之也胡文定謂桃園之弒盾與穿同志兆於此也公會齊侯于平州左傳曰會于平州以定公位愚謂魯君之位非齊惠所得而定也前此諸侯有為會而奬篡賊者皆無預於弒者也魯宣齊惠同惡相濟周有王晉有霸二君皆當相從於戮魯宣之位豈齊惠所能定哉書公會齊侯著其罪而討之也公子遂如齊六月齊人取濟西田公羊曰外取邑不書此何以書所以賂齊也為弒子赤而賂也榖梁曰內不言取言取授之也以是賂齊也或曰魯桓之弒君也入許田於鄭以求逭討春秋書鄭伯以璧假許田魯宣之弒君也入濟西田於齊以求外援春秋書齊人取濟西田書法所以不同何歟曰魯桓之弒君鄭不預也魯畏其來討以是為賂故書璧假諱之也魯宣之弒君謀雖出於襄仲事實成於齊惠故聖人直書其事誅魯之割地而逭討誅齊之受賂而黨賊其曰公子遂如齊齊人取濟西田兩討之辭也或曰此與之彼受之經以取書與侵伐取地之取其無别乎曰濟西之取其罪有大於侵伐之取矣田者先祖受之於王魯國之封疆也宣公既篡人之國又割先祖所受之土疆以為齊賂齊惠既輔人之篡又受其賂田以為已有此所謂盜竊之公取視以兵取其罪又加數等矣秋邾子來朝或曰桓公之篡國也滕侯以二年來朝春秋猶降其爵而稱子今宣之篡也邾子即以元年來朝春秋何以獨無貶乎曰罪有大於此者故其小者未暇責也宣之篡弒齊惠實使之為之復妻之以女受其土田之賂而為之外援周若有王齊惠當為首戮今未有能討之者則小國之朝何誅譬之大盜據要會法當先討彼穿窬者姑置勿問焉耳楚子鄭人侵陳遂侵宋或曰楚子書爵鄭伯書人非一褒一貶之所係乎曰鄭書人貶也楚書爵非褒前年冬宋鮑弒君篡國晉以諸侯之師伐之取賂而還鄭穆公知晉之不足與遂受盟於楚若穆者可謂知所好惡異乎他人去華而即楚者矣使其從楚之後能以楚師伐宋聲罪致討宋人必能以鮑為戮更議立君則穆公不失其從楚之初志今乃與楚子俱侵陳遂侵宋此抗衡中夏之師非討亂之師也故鄭伯書人以貶其後穆公卒能自以兵伐宋有大棘之勝春秋與之楚書爵正其始封之子號義已見僖二十一年盂之盟晉趙盾帥師救陳傳言趙盾帥師救陳及宋春秋惟書救陳與其能救陳也不書救宋不與其救宋也宋負弒君大惡晉人受賂不能討而楚伐之雖楚之存心未必皆純於為義然弒君之賊夫人皆得而討之也楚討之晉救之是故春秋不與其救與宋公陳侯衛侯曹伯會晉師于棐林伐鄭不言晉會四國于棐林而言四國之君會晉師于棐林嘉四國之來會也晉靈不君內忌其臣之專恣其臣不臣復內憂其君之作難亂將作矣前日救陳意不在陳假兵權以自救也今日伐鄭意不在鄭假兵權以自衛也比嵗諸侯多散而從楚而四國之君自能堅守監約非晉靈趙盾足以來之也嘉四國所以愧晉君臣也然晉猶盟主雖惡趙盾而未嘗絶晉也冬晉趙穿帥師侵崇案左傳晉欲求成于秦趙穿曰我侵崇秦急崇必救之吾以求成焉穿侵崇秦不與成吁晉計若是之拙何歟晉欲求成於秦發一乘之使述先君之好而秦成合矣今伐崇以求之秦愈怒而兵愈不可解矣蓋穿者志於作難託伐崇以專兵不然何拙謀之若是當國者略不裁而正之也晉人宋人伐鄭或曰今年秋諸侯會伐鄭春秋爵之今晉及宋復伐鄭春秋人之何哉曰此一事而前後貶褒不同之例也鄭叛晉即楚諸侯會晉而討之公也晉受宋賂而輔之以篡今復偕宋伐鄭私也前日之爵諸侯褒諸侯也不及晉今而人晉及宋俱貶之也宋負弒君之大惡不能討而楚討之為趙盾者當內知自愧乃更率弒賊以伐鄭春秋是以有貶蓋鄭可伐也為宋而伐鄭則不可也故伐鄭則爵之為宋而伐鄭則人之此一事而有先後褒貶之義者也論者乃謂晉數出兵不能有成以是為貶非春秋經法之所在也二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元春秋諸侯不恥不仁不畏不義求得則喜爭欲則怒喜怒之以正者鮮矣若鄭穆公者可謂知所怒而怒是以為春秋所録始晉人以諸侯伐宋討子鮑之弒君既乃受賂而還穆公怒而去之即楚將以楚師討宋怒得其正者也楚不能為之特出師而率之與俱侵陳及宋穆之志未獲伸今自以其兵伐宋敗其師獲其命卿之為主帥者鮑所與共為逆之人也當時諸侯見善之明為之之勇如鄭穆者幾人哉春秋書敗書獲録鄭人之能討鄰賊也左傳以為鄭受命于楚而為此役此以一時事傅會為之説耳蓋討宋者鄭穆之初意不盡出於楚秦師伐晉胡文定曰晉用師於崇乃趙穿私意無名之師也故書侵秦人為是興師以報晉則問其與師無名之罪故書伐此言書侵書伐之為褒貶但春秋侵伐所以起義本謂輕兵淺攻為侵全師深入為伐然亦有動大師伐國而僅以侵書者貶其用師之無名而少之耳有輕兵淺攻而以伐書者著其出師之仗義而能有成功也如晉人合十八國之師以伐楚伐也而書侵楚次于召陵貶其無能有成也又如衛人以孤軍侵晉實侵者而書伐晉為不義有以召其伐也似此類甚多夏晉人宋人衛人陳人侵鄭或曰據左傳四國大夫侵鄭以報大棘之役報之是乎不報是乎曰鄭叛華侵之可也以報大棘之役則不可也大棘之戰鄭穆公毅然以討鄰賊為事勇於義者也晉不知自愧猶欲為宋報鄭春秋是以貶四國之大夫皆書人亦貶之也是時晉靈已長頗惡趙盾之專有意除之盾託為伐國久據兵權故棐林之役楚囚解揚晉師即還是役也與鬬椒遇即謬為之辭曰彼宗競於楚殆將斃矣復去之盾本無欲戰之情姑擁兵自為衛耳由是觀之盾不弒君君必殺盾左傳乃曰晉侯侈趙盾驟諫不入是以不競於楚何失實之甚邪秋九月乙丑晉趙盾弒其君夷臯靈公也成公立春秋為誅亂賊而作也弒君惡之大者人莫有非弒君而春秋加之以弒君之罪者也初晉襄將終託其孤於趙盾曰此子也才吾受子之賜不才吾惟子之怨其屬於盾者為何如盾乃與諸大夫共謀求君於秦已而復自變其初説禦秦兵而立靈公盾謂晉靈德已不知其反以為憾也於是君臣相疑交相為備堂上之甲方興桃園之攻隨至彼靈固己在趙氏置網之內雖欲無亡得乎愚謂趙氏所以謀其君者非一朝一夕之故矣齊商宋鮑篡國弒君晉為盟主所當治也靈公幼弱盾為政合諸侯將有討於齊宋已而受賂不惟不討又為之定篡竊之位靈未有知盾實陷之於惡耳愚於扈之會盟知盾有他志不能事其君矣義又詳見昭十九年許世子弒君冬十月乙亥天王崩匡王也定王立三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望此魯宣除喪始郊而天示之譴也春秋自僖公以後書卜郊不從者有之矣今一書十有六言辭煩而不厭者著始郊而天示之譴異乎常郊之卜不吉者矣天道雖逺稽之人事而可知宣公弒君篡國歸嫡母於齊娶齊女以為婦逆理亂常肆行罔忌持是饗帝亦有譴而已矣公羊曰養牲養二卜帝牲不吉則板稷牲而卜之帝牲在滌三月於稷者唯具是視郊則曷為必祭稷王者必以其祖配自內出者無匹不行自外至者無主不止注謂天道暗昧必推人道以接之不以文王配者重本尊始之義公羊謂配饗之甚善但諸儒之論多謂魯以文王為所自出之祖以周公為始祖惟明堂位所言謂魯人郊天亦以稷配姑存於此更考之義又見僖公三十一年葬匡王桓七年而後葬譏緩也匡王四月而亟葬譏速也緩葬慢也速葬簡也春秋是以書餘崩義見隱公三年楚子伐陸渾之戎楚蓄僭王之心為日久矣陸渾近于伊洛去王城不逺不聞其為王室患也而楚一旦伐之其志不在於戎假伐戎以窺周室也傳謂其觀兵中原問鼎之大小輕重蓋乘晉國衰亂夏盟乏主將以求其所大欲春秋書楚子伐陸渾之戎為中國憂也為王室慮也論者謂楚子使椒來聘為春秋漸進之然則伐陸渾問周鼎亦謂春秋漸以進之可乎義又見文公九年楚使椒來聘夏楚人侵鄭此鄭復從晉為楚所侵也晉靈不君惟貨是徇由是失鄭今成公始立雖未有大過人而鄭遽舍楚而即晉蓋去逆效順人心義理之同然非威驅勢迫所能得也不然趙盾之合諸侯之師以伐鄭略無成功今息兵踰年鄭何為而自至乎春秋繼伐陸渾而書楚子侵鄭惡楚莊圖霸之急也秋赤狄侵齊赤狄始見自桓文創霸南之楚北之狄有所憚而不敢肆今晉霸既衰楚狄復交為中國患而狄也忽分為二有赤狄焉有白狄焉皆踴躍用兵不相統一而實有向衰之漸春秋於此著赤狄白狄之號言其勢既分其力亦將弱也其後晉人滅赤狄潞氏殘其氏族因其分也漢唐之邉患大率皆以分而弱弱而敗亡先儒有以赤狄為唐叔之子孫似未然詳見下十五年晉滅潞氏宋師圍曹宋武氏奉昭公子將有討於鮑事不克昭公子復為鮑所殺於是盡逐武穆之族武穆之放以曹師伐宋至是宋圍曹以報之宋鮑負篡弒之大惡晉人尸霸而不能討討之者鄭也曹也故大棘之戰春秋書以録鄭之功宋師圍曹春秋書以著宋之罪或曰何以見春秋之罪宋曰春秋諸侯侵伐圍入其事實繁有傳書之而經略之者傳略之而經書之者皆有深意存焉宋有大罪未討而以兵伐人春秋書之即所以惡之不待貶斥而見矣冬十月丙戌鄭伯蘭卒自僖三十三年立凡中國會盟征伐無不預也至文十七年晉以諸侯之師討宋人之弒君者受賂而還蘭於是去而從楚晉屢伐而不為之下也今楚伐陸渾窺伺中夏問鼎之大小有僭王之心蘭即舍之而從晉意其為人知義而有勇故能於楚莊盛強之日自拔以從中國可謂得正而斃矣葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向春秋之法有事大而書之略者有事小而書之詳者事小而書之詳將以垂法於後也此書公及齊侯平莒及郯莒人不肯公伐莒取向辭煩而不厭蓋示後人以持平救偏正義辨利之要惟學問君子而後可語也以此聖人亦因莒郯之事而垂訓焉耳夫莒郯所以爭為不平故耳齊魯欲求其平髙者抑之下者舉之以我之平而平彼之不平庶乎其可也而魯之於莒積不相下徒挾齊人之威力而要莒以必從莒之不肯宜哉而宣公遽以兵加莒而取其一邑以已之不平而求人之平況又因以為利其無道赤甚矣春秋書公及齊侯平莒又書公伐莒取向則此事自初迄終皆出魯宣之意書之所以責之也以濟西賂齊而取償於莒此宣公之本心也秦伯稻卒秦之卒葬不盡通諸夏故史之書也略或名或不名或葬或不葬秦不以告而史缺書也夏六月乙酉鄭公子歸生弒其君夷陸淳曰公子宋弒君之賊其惡易見歸生從其為惡罪莫大焉書之以為首惡所以教天下之人臣者也春秋之作聖人所以明微蓋為此也胡文定曰歸生與公子宋俱為貴戚之卿同執國政歸生又嘗總大師握兵權聞公子宋之逆謀不能舉覺又懼譖而從之故春秋坐之以首惡之罪合二説而經旨見矣但左傳於此而為之著例曰凡弒君稱君君無道也稱臣臣之罪也其意謂稱國以弒唯書君名為君無道明著弒君者之名氏為臣有罪諸家多引用其説愚以為春秋誅亂賊之書弒君而名賊者十之八九書國書人者十之一二然亦因一時之事而為權衡君雖不君臣必如湯武之聖哲而後為仗義苟惟不然終無以逭首惡之罪左傳著義未備懼為後人之惑故不得不辨義又見成十八年晉厲公之弒赤狄侵齊秋公如齊公至自齊胡氏曰宣公比年如齊而皆至者危之也愚謂宣所以篡齊輔之也既得國而免於討齊庇之也割地以賂之卑躬以事之靡所不至而齊之責報殊未已也明年公復如齊髙固使齊侯止公請叔姬危且辱不得避也自是公五如齊春秋皆備書之非惟危公亦以正齊侯黨篡受地脅昏之罪冬楚子伐鄭或曰三年夏楚人侵鄭春秋不與也今楚復伐鄭春秋若與之何哉曰三年之侵爭諸侯於中國也今年之伐則異是鄭歸生弒其君當討也晉宋齊魯皆黨弒其君者視海內之惡思相為濟故歸生之弒諸侯大國莫有過而問者而楚人忽以兵加之彼雖不為討賊而來而春秋治亂賊之法夫人皆得而討之楚於此時而討鄭以兵故不待以外國憑陵之例惜其具文出師不能明正亂賊弒君之典春秋無深褒也五年春公如齊夏公至自齊義見去年秋九月齊髙固來逆叔姬公榖作子叔姬子叔姬者或以為同母姊妹或以為時君之女二者必一於此矣義已見文公十二年榖梁曰諸侯嫁子於大夫主大夫以與之來者接內也不正其接內故不與夫婦之稱也諸侯有嫁女於大夫者矣而髙固之求昏魯女則以迫脅而得之也公如齊髙固使齊侯止公如齊止之而求昏止之云者止而脅之也閭巷之人為強有力者脅之而昏且猶不受而況於堂堂之魯國乎脅而求昏已為不可而又以鄰國之大夫而伉禮於望國之君其所以陵暴魯國者至矣宣公因齊之力篡弒得國固不以是為辱魯之宗社重為之辱矣烏乎以千乘之國出涕女于吳且猶羞之而況於女鄰國之大夫者乎春秋書髙固來逆子叔姬又書髙固及子叔姬來責魯也責齊也正髙固陵犯人之罪也叔孫得臣卒冬齊髙固及子叔姬來來逆叔姬猶曰親迎但不當以臣伉君春秋是以書今禮成未幾復與叔姬俱至傳曰來反馬也杜注禮送女留其送馬謙不敢自安三月廟見遣使反馬髙固遂與叔姬俱寧蓋反馬不躬至歸寧無並行髙固列國之卿非有公事而挾婦俱來齊惠小人實使之為此耳前日以臣伉君猶以為未足更使之挾婦俱來以要魯宣固無所慊魯之朝廷宗廟實重為之辱春秋是嵗自春徂冬才書此事可以見聖人意矣楚人伐鄭據左傳楚子伐鄭陳及楚平晉荀林父救鄭伐陳或曰書楚伐不書晉救其不與晉以救乎曰然鄭歸生弒君晉當為鄭出師討弒君賊今既更歲因楚師之來而以兵救鄭是當討而不當救也晉人苟能為鄭討賊即所以存鄭楚師將不禦而自去何勞救乎六年春晉趙盾衛孫免侵陳此責晉也或曰陳叛晉即楚晉之討之亦有弗獲已焉耳春秋何責乎曰陳之叛晉即楚以鄭故耳鄭穆公之暮年棄楚弗事而託身於中國亦望晉人有以大拯其危急曾未期年鄭有歸生之亂晉坐視莫之顧陳之叛而即楚良以是故耳是時晉成始立孱君也政在趙氏豈能為鄭討賊然陳鄭每相視以為向背鄭賊之不討無以服陳人之心陳雖受伐而終不為晉屈也夏四月秋八月螽冬十月七年春衛侯使孫良夫來盟左傳曰孫桓子來盟始通且謀會晉也魯宣因齊而得篡不事晉幾年矣晉將有討衛人知之是以來告欲魯之預于會也因而為此盟或曰大夫來盟諸侯僭乎曰否彼以善意來因而為此盟非若齊晉之大夫挾其強大脅魯國而求盟者比也是故無譏夏公會齊侯伐萊義併見大旱秋公至自伐萊大旱狄為齊患齊不能伐萊何負於齊而伐之不過為逐利計耳而又要魯人俱出師由前日伐莒取向有以召之耳取向魯之利也伐萊齊之利也齊魯交征利而百姓坐受其毒去年秋螽今兹大旱而為鄰國興無名之師伐無罪之國以自戕其人春秋繼伐萊而書大旱志其不恤天災而輕用民力所以貶也冬公會晉侯宋公衛侯鄭伯曹伯于黑壤或曰是會也據左傳王叔桓公臨之春秋不書何也曰王人董會所以光霸業也晉自新城以來君侈而臣專政亂於內威褻於外霸權盡削諸侯散而他從楚行師中原而不敢問齊倔強東夏而不能正成公新立政猶在趙氏乃強合四國之君以為此會屈王叔下臨欲以踵桓文之盛烈多見其不知量也左傳謂晉成之立公不往朝晉人止公于會以賂而免夫晉成尚不能朝王而責望國以朝已僭也晉襄嘗責衛侯之不朝而其臣勸使朝王于溫夫然後以兵加于衛所惡於下無以事上霸國所當知也晉成孺子不足深責斯皆為政者之罪也春秋不為公諱誅晉也八年春公至自會夏六月公子遂如齊至黃乃復公羊曰譏有疾乃復也大夫以君命出聞喪徐行而不反何休云以喪喻疾也喪尚不反徐行以俟君使人代已而況於疾乎蓋古有奉君命出疆遇疾而死以尸將事者故諸説多從之愚觀春秋所以書蓋著襄仲之死於齊也仲之罪在齊今死於齊天也後八日敬嬴亦死天人之際豈不甚可畏哉春秋明天討以正亂賊之罪其不為有疾而復歟辛巳有事于大廟仲遂卒于垂翬弒君去族示貶此春秋誅亂賊之常典也自仲遂弒君春秋雖纍著其事而未之討也今因其死始明正其罪去其族而誅之以垂示後世是義也惟公榖知之公羊子曰遂何以不稱公子為弒子赤貶曷為不於其弒焉貶於文則無罪於子則無年是以於其死乃貶榖梁亦曰此公子也其曰仲者何疏之也何為疏之是不卒者也不疏則無用見其不卒二説得春秋之意矣胡文定乃以為季友仲遂皆生而賜氏所以季友仲遂之卒書季書仲愚竊惑焉夫季友仲遂之於僖宣二公雖皆有援立之功而季友以忠勤見稱仲遂則弒君賊也二君雖以私情厚於二臣而春秋録善誅姦之筆判乎不同恐不得執季友之例蓋仲遂之誅所就者少所損者大其非春秋之意乎壬午猶繹萬入去籥或曰子謂仲遂卒于垂為春秋去其公子之號以示疏絶固也既誅之于前而復戚之于後而書壬午猶繹萬入去籥何哉曰去公子而疏絶之春秋之公法也萬入去籥宣公之私恩也在禮公族有罪致刑于甸人公素服不舉為之變如其倫之喪此誅之而猶戚之厚之至也聖人之意若曰祭而必繹禮也繹而必樂亦禮也今去籥而為萬不成萬矣不成萬則不成繹矣與其不成繹曷若請于尸去繹以示變蓋公法行而私恩不廢者春秋忠厚之意非為仲有援立之勞特為之厚也戊子夫人嬴氏薨公榖作熊氏或曰僖公成風與宣公敬嬴之僭號夫人同乎否乎曰均為僭而其事異莊之正妃曰哀薑以淫亂弒君死于齊喪雖歸不得祔為其得罪于宗廟也僖於是禘于大廟而尊其母為夫人以配其父此僭也然非哀薑不終則僖公亦未敢遽為此今敬嬴之事則異于是文公之夫人子赤之母宣公之嫡母也敬嬴以嬖妾私事襄仲而屬其子焉文公卒仲為亂弒嗣子赤而立敬嬴之子接是為宣公又與仲共謀逐嫡母歸齊而已僭夫人之位號與僖公致其母為夫人其事殆不同也蓋哀薑得罪宗廟義不得祔而文公夫人無罪于魯為賊臣悖妾所逐義不得絶豈得與莊薑同例而嬴與其子弒君逐母僭號夫人亦不得與成風偶春秋之書法輕重不同也烏乎使遇齊桓則敬嬴襄仲皆當比而誅死王室不競中國無霸彼得以肆行而無所忌孰知天道禍盈至是八年仲使齊死于路後八日嬴隕于魯與哀薑慶父先後即誅其事相類但有天討人刑之異耳春秋書之不加貶斥其義自見此春秋奉天討行王誅之事也或曰春秋為誅亂賊而作也敬嬴惡如此猶得僭夫人之稱乎曰夫子魯人於魯先君之母義不容廢黜然仲與嬴之死前後聨書討仲所以討嬴也前既書子卒夫人薑氏歸于齊公子遂以婦薑至自齊則婦姑之分已定薑雖歸于齊猶魯夫人也逆妾豈得而僭其名號哉莊公夫人哀薑也文公夫人亦稱哀薑左傳不明大義目之曰出薑今正其名曰文公夫人庶以别於莊夫人之哀薑餘義又見僖公之成風桓公之仲子晉師白狄伐秦殽之戰曲在秦令狐之戰曲在晉中間兩國俱息兵而趙穿輒興伐崇之師是致秦人復以兵加晉趙盾不知自反乃率白狄伐秦狄方肆其強暴晉又從而羽翼之罪在晉矣秦雖介處西戎穆公餘化在人且有大德於晉強臣無狀率白狄以伐之春秋不與也是故書晉師白狄伐秦不復以及字偶晉於狄深惡之也楚人滅舒蓼荆舒為中國患其來逺矣荆日盛舒日微乃復屬于荆僖三年徐人取舒為中國撓楚也比吳之興舒往來叛服於吳楚之間種類不一有所謂舒蓼舒鳩舒庸者焉傳注以為文五年楚滅六與蓼蓼即舒蓼乃臯陶之後既滅而復興今又為楚所併其後成十七年楚滅舒庸襄二十五年又滅舒鳩春秋書之不遺豈以其為明德之後書以著楚人滅國之罪乎秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬榖梁曰葬既有日不為雨止禮也雨不克葬喪不以制也左傳曰雨不克葬禮也卜葬先逺日辟不懷也二説不同然春秋所以書非特譏喪不如制亦紀變異垂訓戒也胡文定以敬嬴弒嗣君立其子逐嫡母篡夫人之位葬而雨以著咎徴於是知有天道而木訥引定公葬而雨文薑葬而不雨以非之此亦強為異耳夫凶人作凶事而咎徴隨之者理之常也亦有不盡然者理之不可常者也聖人惟其常不惟其不可常如敬嬴者罪盈惡稔幸而得沒於牖下及其葬雨不克葬凶德與咎徴參會非譴而何訥何庇焉或曰葬而雨遂葬乎其當且止乎曰國君之葬其親潦車蓑笠所以備雨者有司之常事夫豈不能辦然當變異驟至亦有非人力所能勉強而就事者與其誠信不至自愧悔於他日不若稍止而緩定庶無遺憾焉耳故左傳之説有不容盡廢城平陽城有不時而書者亦有城要害之地而書者初不必專以時不時為拘也城平陽左傳曰書時也但謂王正為周王正月者左傳也言水昏正而栽者亦左傳也此十月城平陽若以周正為斷乃是今之八月是時水星不應昏正何以謂之得時若以夏正為斷則此十月正是北方七星昏正之時以是而觀見左傳元不能守周正之説而春秋行夏時也審矣楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師胡氏曰屬辭比事春秋教也當歲首月公朝于齊夏使大夫聘于京師此皆比事可考不待貶絶而惡自見者也宣公嗣世九年於周才一往聘其在齊則再朝矣經於如齊每行必至深罪之也下逮戰國時周衰益甚齊威王往朝於周天下皆賢之而況春秋時乎而宣公不能也故聘覲之禮廢則君臣之位失諸侯之行惡而倍叛侵陵之敗起矣此經書君如齊臣如周之微意而特書王正月以表之胡公之説善矣以其發明春秋比事之旨故備録之齊侯伐萊秋取根牟公羊以根牟為邾邑魯取之取邑也杜氏以為東夷國琅邪有牟鄉是其處魯取之為滅國矣二説不同木訥謂伐萊取根牟皆齊事但中間隔一秋字耳此説固可通須得東萊境內有牟鄉牟縣之類夫然後為信要之此亦經疑姑置義又見隱公二年無駭入極及成六年取鄟八月滕子卒九月晉侯宋公衛侯鄭伯曹伯會于扈晉荀林父帥師伐陳胡文定謂春秋所書乃與晉罪陳之辭會于扈以待陳而陳侯不會然後以諸侯之師伐之則幾於自反而有禮矣愚諦觀經旨實不見聖人有與晉罪陳之意自晉成之立諸夏聳觀冀其必能改紀為政一反前人之所為討宋魯之弒君以風厲天下修文襄之霸業以懷來諸侯義聲所加齊楚自當畏服今不能然惟以爭陳鄭為當務之急夫陳鄭豈樂於背晉即楚正以楚師日夜至懼不克自保焉耳晉不能制楚惟欲服陳鄭不能拯人之急惟欲人之從已此亦不義之至而胡公許之以自反而有禮愚不知其説也蓋晉楚之爭陳鄭十有餘年春秋皆所不與蓋春秋于楚每致其薦食之憂晉故盟主也春秋每望之以攘楚之事攘夷所以安夏非爭諸侯也夫豈暴殘小國朝夕用師以求其我從如荀林父趙盾郤缺等輩之所為乎辛酉晉侯黑臀卒于扈成公也景公立魯宣藉齊之力以篡其君專意事齊嘗為晉人所辱黑壤之會既不預盟扈之會遂與晉絶不書葬魯不會也冬十月癸酉衛侯鄭卒衛侯鄭衛之罪人也初奔而歸殺叔武再執而歸殺子瑕已不能君而戕骨肉以逞其廢辱之憾削其葬所以貶也宋人圍滕是秋滕子卒曾未數月宋人圍滕乘其喪而伐之耳非惟乘滕之喪亦乘晉之喪晉政不競諸侯擅相侵伐貶宋亦以譏滕也楚子伐鄭晉郤缺帥師救鄭或曰楚三伐鄭或書爵或書人何也曰書爵以正其始封之號而抑其僭名彼其勢方盛擬於王不得不抑之非進之也書人其君不出其臣帥師以來耳蓋書爵書人以為褒貶者中國諸侯之例楚既僭號自王書子乃所以抑之四裔雖大曰子奚其褒乎曰五年楚伐鄭荀林父救之春秋不書救今而書救何也曰楚之初伐鄭也人謂其討鄭人之弒其君者必將以歸生為戮既而再以兵加鄭但欲鄭之歸已於弒賊皆無所問則其伐鄭自為其私耳鄭人告急晉於義不得不救且黨惡之盾已老今為政而救鄭者乃郤缺也故於是而許之以救陳殺其大夫泄冶左傳及榖梁皆謂泄冶以直諌而死春秋之書之以見陳侯平國見弒及楚人滅陳之端所以録忠諌也而杜氏乃曰泄冶直諌於淫亂之朝以取死故不為春秋所貴而書其名此以書名書字為拘至於貶忠諌以從凡例説經之大弊也胡文定似有取其説乃曰仕於昏亂之朝若異姓者如宋子哀潔身而去可也其貴戚邪不食其祿如叔肸善矣如此則同姓異姓立人之朝者皆全身逺害而去諌諍之官可以無設矣至於木訥則又甚焉曰言於君而無益徒自取禍不若括囊無咎無譽也又言薦圭璧於泥塗固已疏矣而觸虎狼以取死庸得為智乎此泄冶之死聖人所以名之大率皆執書名之例而強求聖人之意夫泄冶立乎人之朝位為大夫以為無官守言責不可也陳靈與孔寧儀行父宣淫于朝冶之諫之亦盡其職分之所當為不幸見殺死於忠也杜氏乃謂冶直諫亂朝以取死故為春秋所名是亂朝不可直諫必治朝而後可諫乎自古以直諫而死者如龍逢比干多在昏亂之朝亦謂二子不當以直諫而死為不知乎三仁所以並録於聖門以其所行皆合於義耳夫豈以死者為不知必全身逺害而後為知乎此不過因書名書字之例而曲為之説愚恐士大夫持此為全身逺害之張本故備論之大率泄冶非世族大夫之以名字見者非名無以傳且名之與字在當時已不容深辨況千載之後欲以此求春秋貶褒之意豈非説經之一大弊乎春秋集傳詳説卷十五
