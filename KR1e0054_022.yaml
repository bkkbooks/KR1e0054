body:
  text: 春秋集傳詳説卷二十二宋家鉉翁撰襄公四靈王二十四年晉平十年二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光莊公也景公立或曰光之立也迫其父而奪之位蓋簒也今其死迄正天討於例當稱國以弑乃獨著弑賊之名何邪曰光固有當討之罪而非崔杼所得而討也導光以簒者杼也今聞其有怨於大國又從而弑之蓋光因杼而得立不假杼以權杼實憾焉辭曰爲晉弑君以自解於衆本非爲晉也是故坐以首惡之罪左傳謂太史書崔杼弑君崔子殺之其弟嗣書而死者二人其弟又書乃捨之南史氏聞太史盡死執簡以往聞既書乃還以是知春秋之世人臣之弑其君者猶欲掩覆其事史臣若齊太史晉董狐奮筆以書死亡不避者能幾人哉蓋晉楚齊之弑其君皆惡子强臣世大夫之所爲彼既不以其實來告諸國之史又不敢自以所聞而直書其事亦有已書而未能盡得其實者及聖人修經始爲裁而正之故曰春秋成而亂臣賊子懼彼謂隱桓之弑舊史書之聖人爲之隱之愚竊不敢謂爲然也公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀齊人以五月弑君晉人以是月出師弑君者未知晉師之來伐齊者亦未知齊君之弑崔子既弑莊公聞諸侯之師及境持是自解於國人且以重賂求成于晉杼之罪大矣泰山孫氏謂晉人當以合諸侯之兵力聲杼之罪而討之以定齊國之亂不當受其賂而及之盟故春秋先書崔杼弑君繼書諸侯爲㑹爲盟責晉深矣愚謂前日齊光簒父晉不能討而及之盟今崔杼弑君晉復不能討而受賂與之盟而定其位齊固不競而晉之爲晉日趨於下亡形見矣孫氏之學簡而嚴有得經意六月壬子鄭公孫舎之帥師入陳前年楚子陳侯伐鄭當陳隧者井堙木刋鄭人怨之以爲此役既入其國陳幾亡矣鄭人復舉以歸之司徒致民司馬致節司空致地乃還入之有禮者也故春秋無貶辭餘義又見是冬公孫夏再伐秋八月己巳諸侯同盟于重丘同盟變例義已見襄三年晉㑹諸侯于夷儀曰將伐齊齊人以弑君爲說晉之君臣納其重賂爲之止兵而要諸侯以爲此盟春秋所惡也凡書同盟變例有三前已及之同外楚同尊中國而書同盟者正也會之不以其禮盟之或爽於義當觀前後事以求聖人之意如天王崩而書同盟王人在會而書同盟與鄭人弑君於㑹晉不討賊而爲之盟齊人弑君立君晉不惟不能討又受賄而與之盟書同盟皆所以貶也晉所爲不義諸侯與之同諸侯亦有責焉耳或曰同病楚恐非公至自會衞侯入于夷儀春秋之世内外二君者鄭忽與突也衞衎與剽也忽之君國正也而祭仲以突簒之衎之君國亦正也而孫林父以剽簒之其逆順之辨較然可見其後忽既復位而突自外入突乃賊也是故突之入櫟以名入内外不二君也衎既入于衛地而剽猶居位剽乃賊也是故衎入夷儀而不名内外不二君也及剽死而衎入夫然後名衎所以結正其失國之罪剽既死則無嫌於二君矣楚屈建帥師滅舒鳩舒巳見僖三年宣八年舒鳩去楚而從呉從之正也楚不能制呉而殘暴小國以逞其敗衂之憾春秋不與也是故國雖小而必著其亡以聲楚人滅國之罪冬鄭公孫夏帥師伐陳陳叛而從楚幾年于兹晉人置而不問曰鞭之長不及馬腹也鄭自比歲爲政者皆國之良一歲再出師伐陳克捷有功春秋之書之襃也鄭與陳始皆從楚今鄭既自拔歸晉又能伐陳以撓楚春秋所以襃也十有二月呉子遏伐楚門于巢卒公作謁諸樊也劉氏謂呉子入人之境而不假道以此死乃畏厭溺之類其義非是榖梁曰以伐楚之事門于巢卒諸侯不生名取卒之名加之伐楚之上見以伐楚卒也得春秋書法之旨愚謂呉太伯之後非楚比也以僭王而外之自壽夢以來知尊中國預于夏盟與楚爲敵今以伐楚之故門于巢卒春秋録其死事變常法而書爲其以攘楚而死也巢與楚禦呉而戕之巢可罪也二十有六年春王二月辛夘衞甯喜弑其君剽或曰衞甯殖孫林父逐其君而立剽逆也今殖之子喜殺剽而復其君於位尚足以蓋前人之愆而春秋名喜爲弑何哉曰據傳殖自知逐君之爲非臨死命其子以納君而掩已之惡彼其心曰衎吾之君也剽者吾之所立簒也我立之我不得而廢之汝爲我廢之而納吾君焉則吾死目瞑矣而不知此事在他人爲之則順而易在甯氏爲之則逆而難蓋立之以爲君事之以爲君又從而害之此所以爲不可而喜也又以利心臨之此所以不能蓋其父愆而身反陷於大惡而春秋以弑君書矣稽之傳喜受命于父之臨終五六年矣及是衞君入于夷儀使人語喜啗之以利其言曰苟得返國政由甯氏祭則寡人於是喜攻孫林父殺剽而納衞君喜事剽五六年一聞子鮮之餌躍然而從之此豈純乎爲義忠其君而成父之志者哉亦爲利而已矣以利而納舊君以利而殺所事之君不曰弑可乎然則將何如而可曰漢去古未逺儒者猶明于春秋之義霍光立昌邑王而事之矣及其廢之也委曲安全曰無使我負殺主名于天下蓋當時明經大儒共定䇿者爲之深思光不能及此也南宋徐羨之謝晦廢營陽王未及殺之遂陷于弑君之罪此後世之事有類於古者也故衎之入剽之廢乃事理之當然當廢剽而歸之京師可也不可殺也則爲弑矣曰甯喜所以自處者則將若何曰衎既復於位喜辭國政而勿預避權逺勢闔門終其身如是可以成父志而免取大惡之名亦無後日之禍矣衞孫林父入于戚以叛或曰宋魚石入于彭城不書入于彭城以叛晉欒盈入于曲沃不書入于曲沃以叛而孫林父乃以叛書何哉曰春秋用法未有不原其初者也魚石本無罪華元陷之欒盈本無罪士匄陷之故聖人原其初非有叛意特不書叛示華元士匄爲禍之首也若孫林父則叛之者也以一朝之忿稱兵犯上逐其君於外十有二年甯殖之子喜納君而逐林父喜麗於弑林父麗於叛春秋比而誅之惟其公也甲午衞侯衎復歸于衞榖梁曰日歸見知弑也范甯曰衎實與弑故録日以見之榖所言猶未甚失甯以與弑爲言則大誤不得不正之衞衎君也剽臣也簒國賊也衎入而剽誅正也衎之所得爲也春秋坐甯喜以弑以父子既事之爲君而又殺之在喜則爲弑非謂衞衎不得戮剽也以爲與弑是人君不得而誅簒賊豈不誤之甚哉蓋春秋於國君之奔多不名之及其反國而後以名書所以正其失國之罪如僖二十八年衞侯鄭曹伯襄之反國是其例也衞衎之奔不得爲無過而非有大過故其出不名今而歸結正其罪名而復之春秋書法大率如此以與弑爲言則失之逺矣夏晉侯使荀呉來聘孫林父據戚以叛晉人以兵戍之黨叛臣也衞人伐戚殺晉戍三百人晉不知自反乃會諸侯謀有討於衞侯荀呉來召公當晉平之世强臣僭横倒行逆施卒以此失諸侯此本范匄之罪是時趙武爲政而不能反之亦懵矣公㑹晉人鄭良霄宋人曹人于澶淵左傳公㑹晉趙武宋向戌鄭良霄曹人于澶淵以討衞疆戚田取衞西鄙懿氏六十以與孫氏嗚呼晉平之爲此會率天下之人臣使之盡叛其君者也霸者無他職事以主張名分而爲職晉自悼公務以聲音笑貌而諂諸侯之大夫奬大夫而伉其君而上陵下替之禍幾徧于中原而晉亦坐受其弊矣孫林父作亂逐君人謂悼公必將討而戮之乃反列于會而爲之定簒君之位衞獻流落在外十有二年而晉莫之恤也今剽死獻復入謂晉平必將召林父而戮之以蓋厥考輔簒之愧乃更受賊臣之譖而摧辱其君止獻公囚甯喜取衛田以益林父吁平固甚愚亦何利而爲此由晉之諸臣各爲其私計羽翼諸侯之大夫使之交起爲亂以爲彼等剖分晉國之地而其主不悟良可喟也悼猶然而況於平之愚乎是會也諸侯各懷憤嫉㑹者僅四國之大夫惟魯公爲季氏所驅而出春秋書公㑹晉人鄭良霄宋人曹人于澶淵晉卿不名而鄭良霄獨以名書卑晉之用事者貶之也宋向戌不名據傳以其後至吁晉所爲無道若此其能久而不亡乎魏斯趙籍韓䖍三分晉國悼與平實有以啓之耳秋宋公殺其世子痤才禾切晉獻之戕其子獨與驪姬謀之耳宋平雖寵芮棄本無殺痤之心而棄也内連宦寺外結大臣共造讒而殺之吁可畏哉而芮棄之寵愛向戍之權任不爲之衰更立棄之子爲太子此人道之大變春秋謹而識之曰宋公殺其世子痤公榖所謂目其君以著其惡者也傳者謂痤美而狠佐惡而婉婉者巧於自結狠者疎於自謀佐日以親痤日以疎以至於死故居近君之地者自處爲難隋煬所以傾勇其事似之勇則痤也楊素則左師向戌也獨孤后惡其子楊素從而陷之及隋文疾革乃悟則已無及身死人手爲天下笑由明不足以察姦内外相煽而爲讒故也晉人執衞甯喜據傳晉人執甯喜以其殺晉戍之在戚者甚矣晉之不能自反也夫戚衞叛臣盜竊以居晉當爲衞討而夷之乃反戍之以兵黨叛臣而伉其君何以爲盟主衞人之殺晉戍宜也乃以是仇其君以及其臣蓋甯喜可執坐林父之訴而執之則悖也是時趙武爲政叔向爲之謀晉無一事可稱二子者崇虚譽而無實亦何益於人國乎八月壬午許男甯卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公許靈公如楚請伐鄭卒于楚楚子爲之㑹陳蔡伐鄭師還乃葬許靈公楚之求諸侯亦勤矣是以卒得志於中夏而晉平昬庸不君惟諸大夫之所欲爲晉其替矣春秋書許男卒楚伐鄭葬許靈公以警晉也讀春秋者謹之二十有七年春齊侯使慶封來聘景公也齊靈莊以狠暴相繼魯北鄙受兵幾無寧歲今景公立不待魯使至而慶封實來齊魯自是始通好賢君所爲固與庸人異春秋書以美之景公者靈公子其母魯女夏叔孫豹會晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋宋向戍善於楚令尹子木又善於晉趙武欲弭諸侯之兵告於晉楚齊秦而爲此會其名則善矣而未知所以爲弭兵之說也宋牼以秦楚搆兵欲告之以不利使皆罷兵而孟子所以語之者則有仁義而已矣今向戍弭兵與宋牼罷兵事有相類者謂弭兵爲非不可也而所以弭兵者則未得其說强楚之勢自是而愈張夫豈中國之利哉蓋征伐天子事也晉楚及其與國雖有内外之辨而皆天子之建國也向戍而欲弭兵當先稟命京師已而馳告晉楚俾各率其與國朝王而受命焉盟于王庭自今以往有罪當討王命之討而後討强暴内侵王使之伐而後伐一如周家盛時之制夫如是兵庶可弭矣今徒以弭兵爲說俾晉楚之從交相見而中國諸侯一朝爲楚人役而天下乃有二霸趙武向戌豈非中國之罪人乎或曰如子之說晉人猶知有尊王之義其如楚之弗率何曰楚自用兵以來令尹死者三四人内困於呉外困於晉其力已憊矣徒以恥出晉下是以日尋干戈而不得息今使之聽命於王而南北罷兵亦楚國之福彼胡爲而不從不從則奉王命以臨之我則有辭矣是之謂弭兵之說餘義又見豹及諸侯大夫盟衞殺其大夫甯喜剽簒君者也他人可殺而甯喜嘗事之以爲君不得殺也故書弑以正其罪喜納君者也他人可殺而衞獻因之以入不得殺也故稱國以殺不去其官累上故也或曰子謂魯定公當誅季氏以正其逐君之罪今乃云甯喜非衞獻之所可殺何歟曰事不同也昭公魯君爲季氏所逐死於外定公立能不以季氏爲恩已討而誅之正也若剽者衞之簒君而非君也獻公則衞君也衞君命其臣誅簒賊既誅之而旋殺之是謂失信是謂食言其可行乎但甯氏既事剽爲君又從而殺之當坐弑君之罪非衞獻所可殺也衞侯之弟鱄出奔晉鱄衞獻之母弟也衞獻非鱄不得返國今甫奠于位而不能安鱄之身衞獻之不友甚矣書衞侯之弟譏不友也或曰鱄之奔是乎否邪曰鱄始銜其君兄之命與甯喜固許之以專衞國之政今以其專而殺之在衞獻爲食言鱄自以失信於死者逃其兄而去之此古烈士之風故春秋録之書曰衞侯之弟鱄出奔晉榖梁乃曰鱄喜之徒與人之臣謀弑其君是亦弑君者也前以爲弑此以爲謀弑傳者釋義不精乃至於此鱄以君命諭喜使誅剽所誅者簒國之賊而鱄則忠於其君者也何謀弑之有哉春秋以喜事剽爲君而又殺之所以正君臣之分名之曰弑於鱄何有哉秋七月辛巳豹及諸侯之大夫盟于宋胡氏曰此一地也曷爲再言宋書之重辭之複其中必有大美惡存焉是會楚屈建請晉楚之從交相見自是中國諸侯南向而朝楚及申之會蠻方之君簒弑之賊大合十有一國之衆而用齊桓召陵之禮聖人哀人倫之滅傷中國之衰而其事自宋之盟始也故會盟同地而再言宋者貶也胡氏之說善矣愚謂中國之於荆楚有内外之分此帝王之治亦春秋之法也今諸侯來集楚人遽求爲長趙武畏其盛兵衷甲苟求無事遂長楚人春秋爲中國惜故先晉夫豈與晉之能讓哉況㑹盟於中國之境而荆楚長之無内外之分亂先王之制啓戎心而召後患趙武叔向無以辭其責也書諸侯之大夫無盟主也或曰兩不相下遂不爲之盟其可乎曰前固言之矣晉當率諸侯朝王盟于天子之庭晉楚俱不得長所謂公天下而與之盟楚尚復何辭榖梁乃謂自是列國諸侯無侵伐者八年春秋善之諸儒或從其說愚竊惑焉晉君臣懷一時之晏安分霸權以遜于楚楚人蓄銳伺隙大逞於後當䖍之世凡我同盟之君俱被其毒晉坐視莫如之何由宋盟故也冬十有二月乙亥朔日有食之二十有八年春無冰夏衞石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔慶封崔杼之黨也杼既弑莊公而崔慶共爲政其必預於弑矣去年杼以家難而死慶封當國其權任可謂專矣而莊公之倖臣曰盧蒲癸王何者乃共謀討之殺其子慶舎慶封田而歸戰弗克遂來奔齊人乃出崔杼之尸而戮之改葬莊公莊公之死也倖臣與之俱死者十人今爲之討賊亦倖臣也身爲國君以倖臣爲羽翼莊固可鄙矣而卿大夫無能爲君討賊復讎者而倖臣乃能之亦卿大夫之恥也十有一月公如楚義并見下公在楚公至自楚十有二月甲寅天王崩靈王也景王立乙未楚子昭卒康王也杜注是月無乙未日胡文定曰甲寅至乙未相去四十二日則閏月之騐也然不以閏書見喪服之不數閏齊景公葬書閏月則明殺恩之非禮也范甯謂閏承前月而受其餘日故書閏月之日繫前月之下乃史冊之常體其說亦可通二十有九年春王正月公在楚夏五月公至自楚公如晉或逾年而返或厯時而返或歲首在外春秋惟書公出公至而不書公在今而書公在楚此春秋書法之一變也或者以公在楚與乾侯書法相類曰以季氏取卞之故公危不得入故書愚謂公在乾侯以内外言也公在楚幾于辱在泥塗矣向戌售其邪說屈中國而伸荆楚俾中國諸侯相率而朝于楚公如楚復爲强暴所侮辱久乃得歸春秋所爲大戚是以特書公在楚閔中國諸侯之爲荆楚屈也公如晉遇歲首不書公在晉今公如楚遇歲首必書公在楚外楚也蠻荆朝内理之常也中國諸侯旅朝于蠻反常也春秋於事之反常者每變例而特書此類是也庚午衞侯衎卒閽弑呉子餘祭榖梁曰閽門者也寺人也不稱名姓閽不得齊於人不稱其君閽不得君其君禮君不使無恥不近刑人舉至賤而加之呉子呉子近刑人也左傳以爲越俘之典門者弑之春秋所以書言禍生於所忽也愚觀呉之諸君易而無體往往以此蹈禍遏卒于巢猶曰以戎事故餘祭死于閽僚死于專諸直死于刑人刺客之手春秋之書之良以垂戒示後焉可仲孫羯會晉荀盈齊高止宋華定衞世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞城杞貶也以已事而僭王事是以貶事有闗乎中國繫乎王室如城虎牢城成周之類公也事有闗乎救災恤患如城邢城縁陵城楚丘之類亦公也若是者合諸侯而城之夫誰曰不然今晉平爲其母家城杞事之私者也乃以煩諸侯是以已事而僭王事其在文武成康之世則誅矣平王不撫其民人逺戍母家詩猶有刺而況區區霸國勞諸侯以城母家者乎春秋之書之貶也晉侯使士鞅來聘杞子來盟義見桓二年滕子來朝杞二王後自入春秋爵屢升降或伯或侯或子左傳以爲惡無禮故貶之榖梁則以爲時王之所黜諸儒有以爲春秋所貶者有以爲簡冊傳録之誤者誤固有之何獨見于杞之一國乎或曰是歲晉以其私親合諸侯而城杞春秋貶晉亦貶杞也不能自治其國而藉力于女子之從人者是固可鄙然當時諸侯之罪更有大於此者何獨杞一國屢見升黜乎姑闕疑吳子使札來聘公羊曰呉無君無大夫此何以有君有大夫賢季子也何賢乎季子讓國也榖梁曰呉稱子何也善其能使延陵季子故進之也諸儒爲說不同榖得之荆人來聘楚人使宜申來獻捷春秋皆從君臣同辭之例久而後書使椒君臣俱見今呉使始至於我而書君書大夫爲其能使賢故貴之耳胡文定乃以爲札者呉之公子不稱公子貶也讓國而生亂札爲之故因其聘貶之以示法胡公此論非所以施之季子亦非所以論春秋也季子非位居嫡長矯激而辭位者其兄弟四人季子爲季三兄更相讓次第君呉諸樊已死夷末之子皆有得國之心季子避而去之尚太伯之風春秋何貶焉世淪俗斁中國禮義所自出而臣弑其君子簒其父下陵其上不奪不饜而季子獨以讓國聞聖人嘉其爲中國而來將使簒君之賊僭上之人觀感而内愧必不以讓而少之胡公持論太偏恐爲後來惑不得不辨木訥又謂楚椒吳札皆以窺覘中國而來舛抑又甚矣椒何如人而可與季子同日語乎季子讓國之賢古今之所同仰聖人嘗大書以表其墓是豈窺覘中國之人乎或曰不書公子何哉曰呉使始通中國即用君臣俱見之例許之至矣不稱公子不書大夫正所以著其高讓之節奚貶焉楚椒秦術之例不與此同秋九月葬衞獻公齊高止出奔北燕據左傳齊公孫蠆公孫竈放其大夫高止於北燕書曰出奔罪高止也許氏謂大夫而放於君可也臣放大夫是無君也不可以訓故以出奔書許氏之義正冬仲孫羯如晉三十年春王正月楚子使薳罷來聘夏四月蔡世子般弑其君固左傳蔡景侯爲太子般娶于楚通焉太子弑景侯榖梁曰不日者子奪父政也又按何休注公羊亦曰不日者爲中國隱痛有子弑父之禍故不忍言其日愚謂楚商蔡般皆負覆載所不容之惡春秋書之䇿即所以正其大戮有不待貶斥而見者日不日非誅斥之所存有不必論矣嗟夫般之惡景之禍其積習有自來矣人莫不有義理之心去逆効順者所謂義理之心夫人所同也蔡與陳鄭本皆諸夏之與國中間爲楚所迫叛而從楚去來無常惟蔡自厥貉之會甘於從楚去而不復者七十餘年其習於楚久矣般之逆殆爲商臣所染其積習蓋有自來趙主父始變服而終有子禍人莫大乎反常反常其禍不旋踵而立至此理之必然又何怪乎五月甲午宋災宋伯姬卒公榖無下宋字榖梁曰取卒之日加之災上見其以災卒也婦人以貞爲行伯姬之婦道盡矣詳著其事賢伯姬也愚案伯姬宋共公之夫人宋平公母也以魯成八年歸於宋至是垂四十年蓋亦老矣當火災之作必待傅姆而後避恪守婦節以逮於死先儒以爲女中之伯夷其清風勁節足以風厲千古春秋是以表而出之書宋災宋伯姬卒然宋平身爲國君其母以逮火而死何以逭不孝之罪愚觀春秋書法於宋平有深責焉天王殺其弟佞夫王子瑖奔晉奔例已見成十二年殺世子母弟而直書其君者甚之也陳止齋曰凡王殺不書莊王殺周公黒肩敬王殺召伯盈尹固之類是也雖王世子不書惠王殺子頽是也甚者母弟亦不書襄王殺母弟帶是也必殺無罪而後書於是靈王崩景王立儋括作亂欲立王子佞夫佞夫弗知也尹氏劉氏殺佞夫括奔晉傳曰天王殺其弟佞夫罪在王也木訥曰鄭伯克段于鄢段不書弟段不弟也則誅段爲重鄭伯爲輕今天王殺佞夫書弟則非佞夫之不弟過在兄也此二說皆得經意王子瑕奔晉不言出奔自周無外也義已見成十六年周公出奔晉秋七月叔弓如宋葬宋共姬公羊曰其稱諡何賢之也左傳杜注則曰從夫諡也蓋以宋其公之故謂夫人從其夫諡耳春秋之世夫人皆有諡伯姬獨從其夫猶古也傳謂國君之喪大夫弔卿葬夫人之喪士弔大夫葬以此命卿爲過禮蓋魯人高共姬之節其禮視舊爲優耳鄭良霄出奔許自許入于鄭鄭人殺良霄諸侯之大夫奔而復復而作亂於其國中如宋之魚石晉之欒盈及此鄭良霄春秋之書之非特責亂者蓋責其國君與其執政之臣實有以召亂焉耳魚石之禍罪在華元欒盈之禍罪在范匄父子良霄之事雖非執政有以激之而執政者不善處事亦有責焉良霄固有沈湎之罪而公孫黒輒以私怒伐而焚之逐之黒之罪當誅奚疑子產畏駟罕之强略無所問遂使伯有自討之及駟氏戰于國中以死春秋書之責鄭國之無政也於良霄乎何誅及昭二年黒又爲亂以爭室之故幾欲兵其從兄由鄭國無政使無忌憚至此此子產之責也冬十月葬蔡景公春秋之義君弑賊不討而不書葬者以爲復讎臣子之責必復讎而後可葬也君弑賊不討而書葬者無臣無子也臣弑其君子弑其父臣子親爲逆則無臣子之可責也魯隱不書葬猶望魯之臣子起而討賊也魯桓書葬則子非其子臣非其臣無與任討賊之事者故蔡景之弑子弑之也子弑父而自立爲君無子也無臣也而蔡復事於楚中國諸侯莫有過而問焉者則賊終無可討之日春秋於是始以葬書與魯桓書葬之例實相似弑而葬亦所以討也晉人齊人宋人衞人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故劉氏傳㑹未有言其所爲者此言其所爲何晉人與諸侯十二國之大夫㑹于澶淵凡爲宋災故謀之也曰更宋之所喪雖死者不可復生其財復矣非務也何言乎非務蔡侯弑其君而不謀宋災而謀之微矣又曰災雖諸侯之所當救然一時之變一國之禍也非所爲天下憂彼弑君者臣弑君也子弑父也如是則大亂也雖有粟吾得食諸此論偉矣劉氏始發之自入春秋㑹而書所以爲㑹之故惟桓二年魯齊陳鄭會于稷書以成宋亂及此㑹于澶淵書宋災故貶之之深而明著其事此出於聖人之特筆非因舊史而書者也則將奚貶曰責晉也晉爲盟主視天下有弑君者從而掩覆之有逐君者從而羽翼之由悼迄平妄尸霸權不復以主張風敎爲事今蔡般親弑其父罪大惡極中國所未嘗有也乃亦置而不問以宋災故勤十二國之大夫以爲此會舎人倫之大變治天災之常事此春秋所爲深責特書宋災故夷晉大夫與諸侯之大夫一以人書貶之深矣或曰蔡屬於楚其非中國諸侯之責乎曰蔡諸姬也安可與荒逺小國從於楚者同日語乎晉人能仗大義而討蔡亦足以愧楚而服中國諸侯之心舎此不爲乃使楚䖍特爲異日滅蔡之兵端晉君臣愚無知亦甚矣三十有一年春王正月夏六月辛巳公薨于楚宫先是公朝于楚好其宫及歸以爲範而作之至是殁於楚宫杜氏云不居先君之正寢而安於所樂失其所也秋九月癸巳子野卒左傳以爲過毁而卒不薨不地不書葬未逾年之君也己亥仲孫羯卒孟孝伯冬十月滕子來會葬或曰諸侯之喪諸侯㑹之禮歟曰諸侯㑹諸侯之葬此周衰之變禮魯嘗行此於齊晉者也今滕子來會而春秋書之譏也魯君未嘗㑹天王之葬而滕子來會魯葬滕之來魯之受皆有貶也癸酉葬我君襄公十有一月莒人弑其君密州義已見文十八年春秋書莒弑君者二文十八年莒弑其君庶其左傳以爲莒紀公生太子僕又生季佗愛季佗而出僕且多行無禮於國僕因國人以弑紀公愚不能無疑既辨之於前矣此書莒人弑其君密州左傳亦以爲莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之展輿因國人以攻莒子弑之如左傳所紀二大惡俱在莒竊觀春秋書法必不然也豈非二事適相類訛以傳訛史氏記録之未審歟楚商蔡般之爲逆春秋直著其罪曷嘗歸過其父遂隱弑賊之名而不書乎左傳乃云書莒人之弑其君罪之有在也置其子之大惡歸過於其父春秋必不然蓋犂比公虐國人作亂而弑之展輿既廢於父見立於國人故有以弑之罪而加之者使展輿能討賊於既立之後庶乎可以逃此名矣趙氏謂其文當曰展輿因國人之攻莒子弑之乃立而後來傳寫之誤以之字爲以字其亦有見於此乎春秋集傳詳説卷二十二
