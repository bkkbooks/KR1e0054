body:
  text: 春秋集傳詳説卷二十六宋家鉉翁撰昭公四敬王三年晉頃九年二十有五年春叔孫婼如宋夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父此為王室而會不書譏其無勤王之實也案左傳會于黃父命諸侯輸粟于周期以明年納王卒不聞晉侯踵二文鄭虢勤王故事躬御戎馬展義王室晉之不能亦甚矣而其事亦有不可同日而語者子頺子帶之亂皆在惠襄踐位之後王位既定頺帶特為亂耳亂而討之夫誰曰不然今悼敬之立皆在危疑之秋特以太子母弟之故揆禮宜立劉單奉以為君而中外未能盡孚也晉人至使士景伯涖問周故立于乾祭而詢于介衆欲以知二立之當否衆論惟允乃辭子朝不納其使晉尚然而況於海內之人乎劉單處此豈不謂之甚難乎主少國疑外無晉鄭虢三國之援內有毛召尹三族之爭後先五年更勝迭負使劉單不能以宗社自任中事斂却則子朝之羽翼成而敬王之位危矣論者猶以挾天子令諸侯少之愚不知其説有鸜鵒來巢公羊曰記異也非中國之禽宜穴而巢故書或曰鸜鵒來巢事之細者必書何邪曰禽鳥逐氣而遷戾氣所至妖亦至焉魯之地素無鸜鵒今而有焉是隂類之爽其常者也先儒以天津杜鵑而豫知曲學之禍天下則春秋書鸜鵒來巢之意也秋七月上辛大雩季辛又雩左傳曰再雩旱甚也公羊曰又雩者非雩也聚衆以逐季氏也此以公孫于齊連文故言聚衆以逐季氏雩不必用衆用衆所以戒武何事於雩九月己亥公孫于齊次于陽州或曰魯昭將討季氏子家以為不可既而果敗然則季氏必不可討乎曰天下事固有必不可為者亦有猶可為而不得不為者若魯昭之討季氏猶可為而不得不為者也意如內專魯國之兵柄外交晉之強大夫視篡弒猶覆手耳昭之討之實有不容己者徒以所任非人是以致敗若謂其無故啓釁自取覆亡則不然也曰否則將何如而可乎曰顧所任何如耳意如雖恣睢不道而叔孫昭子剛毅挺特不與季孟同其歸趨魯國之望於是乎在使昭公推誠而任之舉國而聼之則季氏之權可收也權可收則亦可討也而公所與謀者皆左右親昵與季氏素為仇者志在報復其私慮不及逺何以能濟子家懿伯雖魯之賢公子未嘗預聞國事公將討季氏驟以語之子家以為不可宜也蓋季氏當討而非郈孫公若公為侍人柤所能討也由昭公所任非人是以取敗若曰政在季氏久遂付之無可奈何而聼國事之日趨於下則非忠臣之言也故季氏當討非昭公所能討齊侯唁公于野井書齊侯唁者再非與其能唁也譏其無救災恤患之實也昭公自始即位季氏即間之於晉五及河而不得入及是失位去魯知晉人之不足仗故孫于齊次于陽州深有望於齊侯之拯也而景公徒行虛禮之唁今日取鄆明日圍成又明日為鄟陵之會卒不能為公圖所以入非其力之不足誠不在焉故耳人以窮歸我我答之以偽如是更四寒暑髙張再唁禮意頓衰幾欲麾而却之公乃之晉景之不仁甚矣冬十月戊辰叔孫婼卒昭公之伐季氏也昭子如闞叔孫氏之司馬鬷戾帥徒以助季氏而禦公孟氏繼之公徒奔敗鬷戾所為也以傳考之蓋三家合其力以逐君昭子毅人也必不與聞其議而家教不行於司馬致其助亂此昭子所以內慊祈死而即死胡不戮司馬以明己志更為公思所以為返國計乎嗟夫使斯人而不死與子家共謀納公必不至遂殞于行天實為之謂之何哉春秋繼公孫而書婼卒言婼之為公死也十有一月己亥宋公佐卒于曲棘宋元公以魯昭故如晉卒于行春秋之書之録其有討亂之心也齊晉二大國坐視季氏逐君恬不加恤而元公乃能為魯昭特為此行將以其前日誅逐華向者而誅魯之強家非天資明毅視天下之惡猶已之惡豈能及此晉頃齊景視此當有愧色據傳意如嘗妻元公之女相與為姻婭而公毅然欲為魯討賊不顧其私親尤人之所難此所以見録於春秋歟卒于封內而猶地録之也十有二月齊侯取鄆齊侯取鄆以居昭公春秋不書為公故取諱之也夫以魯之君居魯之邑而鄆人不受命必待齊人為之取之也此春秋所以諱也是時晉政已衰霸權未有所屬齊景有意修桓公之業當請命天王號召與國納公于魯戮意如以示天下而霸政舉矣乃以取鄆為首務姑塞已責前以此而誤燕今復以是而紿魯勇於義者不爾也或謂春秋嘉其取鄆是故爵之此目其人而貶之也奚其爵義又見三十一年取闞二十有六年春王正月葬宋元公三月公至自齊居于鄆居于鄆志公之失位也失位矣而猶書至書居所以存魯君而抑亂賊也自是每嵗書至書居凡五見焉及鄆潰乃書公在乾侯亦所以存公而繫魯國臣民之望也鄆魯境故書居乾侯晉地故書在胡文定乃曰昭公出奔經書次于陽州見公于魯未絶而季氏逐君為不臣及書齊侯取鄆則見公已絶於魯而逐於季氏為不君吁論則髙矣而非春秋存公之本旨也君雖不君臣不可以不臣季氏既逐其君春秋又從而絶之是逐君者無罪而君可絶也蓋次于陽州為公諱奔而亂臣之罪有不待誅斥而見矣然以自孫自次為文者亦譏公有以自取也書齊取鄆見魯君之失民心待強國之力而後得之非絶公也書公居于鄆公在乾侯正所以存公于魯而繫臣民之心而曰公已絶於魯而逐於季氏為不君無乃非聖人書法之本旨乎夏公圍成成魯孟氏邑也而公用齊師以圍之圍之而得猶為不武圍之而不得其恥滋甚春秋書公圍成著公之急近利而昧逺圖首禍者意如預於亂者孟氏為昭公之計當貸畔徒以離季氏之黨今乃先以成為討所以堅二家附賊之意而公無返國之日矣蓋齊人取貨於季氏巧為此謀景與昭墮其計而不之悟秋公會齊侯莒子邾子杞伯盟于鄟陵或曰衛獻公甫去國孫寧即立剽而預于會今魯昭公雖失位而意如不復敢為已甚其猶有悔罪之意乎曰否以季氏平日之無忌憚亦何所不為而周公魯公自樹立其國者典章猶在亂臣雖欲為孫寧之所為勢有所不得也或以為齊景取鄆圍成會鄟陵有以伐其無忌憚之謀是不然齊景儒而少斷豫奪制於臣下彼季氏固有以知其無能為奚憚焉今為此會辭曰以公故亦藉是延引嵗月魯賄朝入齊師夕旋用心不剛為善不勇故嬖幸之臣得以入其邪説是行合三小國會且有盟欲何為哉魯君所以栖遲于鄆困躓于乾侯齊景之聲音笑貌有以誤之也春秋備書以譏之公至自會居于鄆九月庚申楚子居卒平王也昭王立冬十月天王入于成周二十三年書天王居于狄泉尹氏立王子朝言王位已定尹氏所立者篡而非正也至是書天王入于成周尹召毛以王子朝奔楚言王入而朝出以一入一出而辨內外明正篡春秋所以存周也不書京師而書成周京師以衆大言成周以朝廷言敬王由狄泉而成周故書法謹嚴若此或曰狄泉在王城之內王未嘗出也而書天王入于成周何歟曰成周者王者之居朝廷所在也自朝廷而言則狄泉為外書入所以奠王於位也始書王室亂著亂之始至此書入著亂之平入王于周而諸夏始有所宗矣嗟夫劉單二子之所遇亦難矣乎當王猛之始立二子以王出入難矣而未甚也及王猛立未幾而卒又立其母弟名體未白中外猶疑二子獨以身而當之存亡安危繫於一髮不謂之甚難可乎當周之既衰大臣以宗社自任若劉單者幾人哉春秋始書劉單以王猛居于皇以王猛入矜其所遇之難所任之重書以與之非責之也及是書天王居于狄泉天王入于成周不言劉單之以之所以正嗣王之名體釋劉單之重權以為時當艱難則當自任以天下之重而不為嫌王位既定則當退安人臣之分而思所止前後書法輕重抑揚皆出聖人之特筆其垂法示後之意深矣杜元凱謂敬王繼子朝之亂自王城徙下都下都者瀍水東也傳不見有徙都之明文蓋王城者洛陽城也前此王猛雖入于洛城與子朝分東西而處今子朝遁去敬王乃得奠王位正朝廷之體故言入于成周王城槩洛都而言成周以朝廷而言初無徙都之事大率王城成周乃京師之異名入于王城未能正天子之位故曰入于王城既正天子之位即云成周入于成周正王位也義又見三十二年城成周尹氏召伯毛伯以王子朝奔楚劉單之以王猛以之正者也以居于皇以入于王城春秋矜其難而許之以大臣之節尹召之以王子朝以之不以正者也故其立書立其奔書奔立之罪之也立之而又挾與俱奔春秋所以誅也此書法一以字在劉單則為褒在尹召則為誅特以其所輔者正與不正而已苟立之正者謂其挾天子以令諸侯而責其專廢立則立之不正者又何以加之罪乎奔義己見成十二年周公出奔言周之篡賊楚不當受也二十有七年春公如齊公至自齊居于鄆義己見前公居于鄆夏四月吳弒其君僚公子光弒之光即闔廬弒僚者公子光也而稱國以弒何哉吳讓國也僚獨不讓以是召亂故稱國以弒此稱國以弒之變例也吳雖越在蠻夷猶有太伯之風壽夢之子長諸樊欲以位而讓其季弟札為其序在季乃以授之次弟餘祭將使餘祭授之夷末夷末授之季子夷末未終季子逃而去之則夷末當以授之諸樊之子則光也夷末負長兄之夙約而私以與其子僚之立雖有父命實乃篡也於是光弒僚而代之光雖有弒君之罪而位乃其位故春秋略弒賊之名氏併見夷末父子取非其所當有其著義甚明也烏乎以此垂訓猶有受位於其兄而殺其兄之子併及其弟而以天位私於其子者豈不痛哉楚殺其大夫郤宛此讒人費無極所為也楚平事虔而弒虔立比而弒比懼羣下之圖已爾費無極使之伺察羣臣自太子以下國中之良無得免者昭王繼之猶不悟其姦郤宛又以是死殺無罪之大夫且夷其族楚是以有入郢之禍秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈是會也據左傳令諸侯戍周且將納公范鞅取貨於季氏辭小國而以難告愚謂戍周王事也不當與魯事俱出令納公霸討也不當與王事俱會諸侯晉比無賢君權移于強族之大夫既不能翊成周之危復不能拯魯君之困姑合二事以為會誠不在也亦徒具文而已矣春秋於晉宋衛三大夫皆名以序之言其罪之有在也宋衛之君鋭意納公而祁犂北宫為士鞅惡言所怵逡巡引還此所以皆在可責三小國無能有為故皆人之人之者微之也嗟夫齊景為鄟陵之盟而梁丘入季氏之錦晉頃為扈之會而士鞅納季氏之貨二君懵然無所知以為魯之休戚無關於我孰知田常韜禍於齊六卿伏憂於晉厝火積薪不悟抑亦愚矣使二君能為魯討賊亦足以讋內盜之膽而齊晉之祚猶可延也冬十月曹伯午卒邾快來奔邾庶其畀我來奔季孫宿始納之今邾快又來奔意如復納之宿意如世濟其凶不君其君又誘人之臣使之叛其君而已為之逋逃主罪可勝誅乎夫快邾之賤者不足録也春秋所以録之而無所遺誅季氏之無君也是時公孫于齊居于鄆諸侯之人莫不切齒季氏之逐君意如乃待討之人略不知戒懼納諸叛人以濟厥父之惡三十一年黑肱以濫來奔復受之而不疑推其無忌憚之心亦何所不至故春秋書納叛人書叛人以地來非誅叛人實誅季氏也公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯自公孫于齊次于陽州繼書公居于鄆者凡四公在乾侯者凡五如齊者三如晉者再皆出於聖人之特筆所以存公于魯而繫臣民之望正季氏無君之戮亦以大責天下方伯連帥而不能為魯討賊者也舊史乃魯人諂季氏之史著公之罪絶公於魯豈能拳拳屢書以存公為事以為因魯史之舊文者過矣書公如晉次于乾侯責晉也齊不能納公猶能致其恤患之文至晉則拒而不受晉尚謂盟主乎厥後六卿敢于分晉蓋其所由來者漸矣夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公公如晉次于乾侯野井之唁虛禮也鄆之取成之圍鄟陵之會虛惠也公猶朝夕立於齊庭而弗悟及飲公酒使宰獻而請安公於是始悟其卑已至是髙張來唁稱主君以致命比公於大夫公始去之而之晉其去亦已後矣嗟夫晉之諸大夫亦齊之梁丘據晉頃之懦而無立視齊景有過之無不及焉去齊而之晉去晉而復適諸侯必無有為魯君討賊者矣此春秋之叔世降而愈下桓文之轍迹掃地無餘豈惟魯之病之舉天下之人皆病之矣夏四月庚子叔詣卒秋七月冬十月鄆潰鄆之潰季氏為之也季氏間公如乾侯誘其民使之潰而歸已春秋之書之誅季氏也論者多歸咎昭公之失民愚曰不然昔司馬氏以篡竊之餘過江百年而民之思晉者如舊魯以周公魯公之遺澤豈不足以固結其民昭公在鄆曽幾何時而百姓忍於叛而去之此季氏凶威之所脅非民之罪也亦不可以此盡責其君三十年春王正月公在乾侯榖梁曰存公也或曰前此居于鄆嵗首不書公在今而書之何邪曰鄆魯鄆也公猶在魯之境內是故嵗首不書必如齊如晉至而後書如公之至於國中也今鄆為賊臣所誘以去公露居齊晉之間於是嵗首始書公在乾侯不與季氏以頒朔也嵗序更新吾君失守宗祧越在他國之境書公在乾侯若公之猶在國中也所以教天下後世為人臣者當國家多難人主播遷常如威顔之咫尺其上盜賊亂竊不能為之移奪夫然後無愧於人臣之常分夏六月庚辰晉侯去疾卒秋八月葬晉頃公定公立冬十有二月吳滅徐徐子章羽奔楚徐介于中國東陲之間桓公之霸也嘗為中國用非楚之與國吳闔廬既弒其君又怨徐人之納亡公子以是伐而滅之吳實無道與王僚之滅巢其事異矣書滅徐貶也徐子章羽不能死以守逆而求免焉凡國滅而奔者不名徐子以名書為其不能死社稷而逆吳奔楚僅為偷生計耳三十有一年春王正月公在乾侯季孫意如會晉荀躒于適歷意如魯之賊臣也晉人欲伸其霸討乃先與之為此會春秋之書之責晉也誅荀躒也晉自悼公因羣卿而得國好惡豫奪悉出羣下孫林父逐君立君身負天下之大惡悼既不能討乃更列之於會直置其君而不復顧自是以來諸侯之大夫不復知有君犯上作亂益無所憚重以平昭頃庸弱相繼晉遂失霸失其所以維持世道之具也若季氏者自宿及意如外交晉大夫倚以為援專制魯國怙亂逐君魯昭在外六七年晉人復以奬林父者而奬意如悼實啓之晉定公者不知其何如主傳謂其將以師納公其亦有志於名分者范鞅荀躒復從而沮止之意如魯之罪人晉將伸其霸討躒也乃與之為會既會之而後與俱見公黨亂臣而抑其君昭公之辭愈無以自伸卒死于行矣愚每謂春秋降為戰國始於晉悼成於平昭極於頃定名分掃地國與之俱悼實始之夫既亂人之君臣已之君臣亦從而俱亂悼何以辭其責讀春秋者惑於左氏之浮辭譽悼過其實不得不辨夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯晉頃為扈之會將謀納公沮於范鞅晉定始立即欲以師納公沮於荀躒荀范惟貨是徇而二公不能斷以已意赫然發憤召會諸侯與俱問意如之罪非其力之不足權移於下動為所制有志不獲伸也或曰意如之往乾侯也子家子勸公與之俱歸衆從者持不可是時意如身至乾侯既伏其罪公可以歸乎曰此躒意如之本謀也公在外請於一二大國猶將有討一歸魯國則意如掌握中物雖歸不能君矣傳載子家所以告其君者乃曰一慙之不忍終身慙乎夫以一乘入於魯死生禍福皆制于賊臣是豈特一慙而已矣以慙而歸尚可得而歸乎此魯史諂辭未必果出於子家秋葬薛獻公冬黑肱以濫來奔義己見襄二十一年昭五年邾庶其莒牟夷邾黑肱以地來奔左傳所謂三叛人名者也黑肱不書邾闕文也賤而書名所重在地此傳者之説愚謂春秋有書名以著其節者有書名以著其罪者以地叛君惡之大者故書名去族以正其罪非重地也正其以地叛君之罪也不以叛書為魯諱也左傳謂或求名而不得或欲蓋而名章以齊豹殺公孟春秋書盜為求名而不得三叛人以地來奔為欲蓋而名章豹志於為亂本無求名之心三叛人以地來奔彼固不求其名蓋春秋書名以正其罪耳然是二言者實有得于春秋用法之意在當時固有求名而不得欲蓋而名章者矣如宋督從君于死而不與之以死節之名求名而不得名之類也趙盾預弒其君欲避首惡之名而卒麗于首惡之罪欲蓋而名章者也此類甚多不悉舉乃若公羊所紀邾婁叔術之事謂春秋通濫為國以存賢者之後齊東野人語耳姑置十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞杜氏謂在乾侯遣人誘闞而取之不用師徒闞者魯羣公墓之所在公不得奉宗廟祭祀逮今六年因謁闞遂入之先公墳墓所在而以取書志賊臣拒命公欲入而不能得至用衆以取之耳前書取鄆圍成此書取闞皆所以著賊臣據國拒君之罪屢書特書皆致其討於季氏也夏吳伐越此著吳越之迭為盛衰也吳方抗衡荆楚睥睨中夏而越己議其後矣自是吳楚越鼎立不相為下乃中國自治之嵗月而齊晉二大國皆為強臣所操蓋自是而後天下之患在強臣矣秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周此諸侯之大夫奉王命而城成周霸政之僅克舉者也榖梁曰天子微諸侯不享覲天子之在者惟祭與號故諸侯大夫相帥以城之變之正也義盡於此諸儒之論有以為貶者恐未然也蓋京師之與成周皆尊名也自周家盛時已有成周之號髙郵孫氏乃云不書京師所以見王室之衰同於列國此以王風黍離降從國風之説詩春秋取義不同不必強求其合春秋之作主於尊王諸侯城成周亦人臣職分之所當為夫豈以是故而同周於列國乎或曰一京師也而春秋所書曰王城曰成周曰京師何歟曰自諸夏尊天子而言謂之京師自天子臨制萬國而言謂之王城自朝廷百官王宫宗廟所在而言謂之成周隨所施而當京師王城成周一而已矣似非褒貶之所在或又謂瀍水東為下都敬王既定子朝之亂遷都瀍東是為成周前已辨之敬王遷都傳家初無明文成周者京師之異名何下都之有哉十有二月己未公薨于乾侯昭公習於周旋揖讓之儀當時有以為知禮者而在喪不戚娶同姓而不以為嫌大本不立浮文雖勝於禮何有哉乃若忿季氏之專魯思欲一創治之固人君當為之分以是為過則不然也當是時宋之華向魯之意如皆世大夫盤錯而不可治者宋元討之而克宋以無事魯昭討之而不克坐是失國出奔終於不復蓋有幸不幸存焉二君中才庸主初無以大相逺也又以後世之事而言髙貴鄉公之討司馬昭元魏敬宗之戮爾朱榮與後周髙祖之誅宇文護皆奮自獨斷不謀之臣下彼非不知其事甚難有濟與否而迫於宗社之存亡死有不避後周討之而克天也元曹以是殞厥身蓋亦有幸不幸存焉故君子不以成敗論事使昭公能正身端本委任忠賢不與近習小人共其謀慮季氏猶可鋤也必謂意如秉政數世有臣有民徑欲置之不問則非為人子孫纘祖承家之道也愚觀夫子平日言論與春秋始終書法于昭公之討季氏尚有取焉蓋深責晉人之奬亂臣而抑其君使昭公至于此極也胡氏謂書圍成書取鄆為絶昭公于魯吾不知其説春秋集傳詳説卷二十六
