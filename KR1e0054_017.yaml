body:
  text: 春秋集傳詳説卷十七宋家鉉翁撰成公上名黑肱宣公子魯世家以為穆薑子疏疑其非定王十七年立是歲晉景十年元年春王正月公即位二月辛酉葬我君宣公無冰此夏正之二月當薦冰而無冰是以書譏冰政不舉而廢禮也月令仲春之月鮮羔開冰先薦寢廟詩豳風七月二之日鑿冰沖沖謂十二月取冰三之日納于凌隂謂正月藏冰四之日其蚤獻羔祭韭謂二月開冰春秋書無冰者三而皆在正月以冰政不舉藏冰薦冰之月而無冰故書以譏之或指此為周正之二月非也三月作丘甲此譏成公初政之悖謬也國君即位之始輕變先王制度求多於民此春秋所為譏也丘甲之説三傳不同公榖謂古者士農工商各有其業甲非人人所得而為也今課丘民自為之甲非正也此説似未得經意杜氏謂古者四丘為甸甸出甲士三人步卒七十二人今魯使一丘之人而出一甸之甲是以譏雖粗釋丘甲之義而一丘之人豈能出一甸之甲成公雖未有知其用事者求多於民亦未至若是之甚也案周禮及司馬法九夫為井四井為邑四邑為丘四丘為甸五百七十六夫共出甲士三人步卒七十二人今作丘甲云者使每丘而出一甲云爾每丘而出一甲則一甸而出四甲視舊增多一甲庶乎其可行如杜氏之説使丘出甸賦四邑十六井百四十四夫而出三甲是一甸而出甲士十有二人視舊增多三倍斷乎難行只如前説每丘出一甲庶得丘甲之義蓋古者自邑而丘賦以馬牛自丘而甸乃賦以甲今丘出一甲是每乘增甲士一人古兵制始壞於此矣又案司馬法甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人今作丘甲者牛馬之數皆如舊惟每甸多增一甲耳每甸多增一甲即每乘多增一甲而李靖所以告太宗者又若不同其説謂周制一乘步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人則其釋甲字之義又若與前説有異若魯人每甸而增一甲則一甸之中共百人為兵視舊又增甲士徒兵二十五人矣杜氏謂一甸增甲士九人為十二人者尚不可行此欲增二十五人以成百人之數尤恐難行不若甸增一甲之為酌中當時所增不過如此而已諸儒有援李靖之説為言者故因講之及哀公十二年用田賦馬牛視舊頓增三倍甲士視此亦必增始作俑者其成公乎夏臧孫許及晉侯盟于赤棘先是襄仲之子歸父為宣公使晉謀挾晉援以去三桓使未及返晉大夫泄其謀以為市於三家宣公驟薨歸父為三家所逐於是魯始專意事晉晉人亦欲懷魯故不憚親屈而為此盟是行三家不往會而使臧孫自行者猶懼晉人或入歸父之言有討於彼及赤棘既盟三家者安意肆志益無所憚矣春秋中世以後諸侯之大夫多自結於強國魯之季氏衛之孫氏宋之華氏皆結於晉者也不特外交其君又賄以結其大夫故君常見疏於大國臣反挾大國之援以脅制其君亂亡所從始也是故春秋深著人臣外交之戒秋王師敗績于茅戎公榖作貿戎榖梁曰不言戰莫之敢敵也為尊者諱敵不諱敗為親者諱敗不諱敵尊尊親親之義也尊謂王親謂魯此義正矣但公榖皆以為晉敗王師則無是也左傳謂晉侯平戎于王單襄公如晉拜成劉康公徼戎而伐之敗績于徐吾氏此其實也不言及戰而曰王師敗績于茅戎非王之敵以王自敗為文所以明尊卑之分也或曰桓五年五國從王伐鄭敗也不書敗莊六年王人救衛師無功而朔入亦敗也不書敗此伐戎不書伐而書敗何邪曰鄭諸侯也而稱兵侵犯王略齊宋陳蔡亦諸侯也抗王師而納出君皆叛也春秋不書敗諱中國之有叛臣也茅戎王者風化之所不及又何責焉是故不諱敗然所以書譏王朝無用武之素備既和戎而又伐之以此取敗威令愈不振矣冬十月二年春齊侯伐我北鄙此齊人爭魯於晉也前日魯宣專意事齊晉莫如之何也今魯人去齊而即晉赤棘朝盟齊師莫至若齊頃者真冒不韙之愚夫哉書齊人伐我所謂目其人而貶之也傳者謂季孫與郤克俱使齊為頃公所侮辱以是起兵端夫既辱晉使又以兵加於魯則其志在於與晉為敵及晉魯衛合兵以來乃敗遁不旋踵好戰而不度力其頃公之謂矣夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績及戰之例前已屢見兹不復重述比齊人既伐魯取龍乘勝以伐衛衛人出師禦之而敗蓋新築衛地故也左傳謂衛侯使孫良夫石稷寧相向禽將侵齊似謂衛人啓釁非其實也宣公季年衛世子臧偕晉侯伐齊故齊為此以報之胡氏謂春秋使衛主戰責在衛蓋春秋多以被伐者為主而褒貶初不在是前日伐我北鄙與今新築之戰皆責齊著齊頃陵暴小國之罪見鞍師所從起也六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績或曰鞍之戰晉為魯衛出師伐齊抑強盛扶微弱亦義師也而春秋書法如此何邪曰師以魯衛為名實則郤克季孫逞其私忿耳初郤克季孫俱使于齊為頃公所侮辱郤克歸而怒請伐齊晉君嘗與衛世子臧伐齊受盟而歸齊既服矣而郤克之怒未已齊復侵魯伐衛魯衛求救於晉皆主郤克於是晉人大興師以魯衛為辭其實郤克季孫共憤前辱思一洗之耳魯前日受欺於齊多矣商人無道弒其君執我叔姬又以兵加於魯至再三魯之君臣一以隱忍為事今而四卿俱行傾國以出甚矣夫季孫之怒也晉人前年戰楚于邲自荀林父而下皆逗撓自私望敵奔北今郤克獨將而前敗齊師幾獲其君東侵薄海受盟于袁婁乃還甚矣夫郤克之怒也是怒也純為國歟抑亦為其私歟使郤克季孫無前日之辱其憤怒激壯能若此乎故齊可伐也晉為魯衛而伐齊非無名也然非郤克行父之怒則師不大出卿不皆行戰亦不如是之力則是役也所就者小所損者大矣是故春秋不之與凡內大夫帥師惟主帥得書今而四卿俱書以見羣下知有季孫而不知有公室勝齊不足喜三家自是愈專而公室微矣晉賞鞍之戰作六軍而六卿專晉之漸亦見矣衛孫氏秉政世為卿良夫之子林父實為亂首逐君立君而衛幾於亡矣書曰臣無有作福作威害于而家凶于而國郤克季孫良夫是矣魯諸卿俱帥師又見昭十年伐莒哀二年伐邾邾之事又與此異三家專兵不假它族為助丘甸卒乘悉為三家所有其君孤立於上國益不可為而春秋終矣鞍之戰乃魯三卿擅兵之始秋七月齊侯使國佐如師已酉及國佐盟于袁婁榖梁作爰婁或曰齊國佐如師與楚屈完來盟一也然陘之役春秋書楚屈完來盟于師盟于召陵鞍之役則書齊侯使國佐如師及國佐盟于袁婁何也曰此所謂強者抑之下者舉之春秋一與一奪之權衡也召陵之師諸侯皆在兵力甚壯而桓公乃能以不戰服楚春秋是之是故書屈完來盟于師盟于召陵志桓公退師而與之盟也鞍之戰郤克既敗齊師極其兵力之所至追奔逮于袁婁去國都五十里乃與之盟春秋惡之是故抑之書及國佐盟于袁婁志郤克進師將及其城下而與之盟也退而盟盟之以其禮也進而盟盟之以其力也春秋褒貶在是焉耳未幾齊從於楚反倡諸夏而為蜀之盟見其雖敗而未服此春秋書召陵之盟與袁婁之盟一字褒貶所以深切而著明也八月壬午宋公鮑卒庚寅衛侯速卒速公羊作邀取汶陽田取汶陽田與濟西田其事同春秋之書法亦同義已見僖三十一年蓋濟西本魯田為曹所侵晉人取以歸魯汶陽亦魯田為齊所侵晉人命以歸魯皆魯侵疆也今而得歸春秋不以為歸而以為取為其因霸國之力而得之也霸國復不稟命於王分正疆理而擅其豫奪此所以書取若此田非魯之舊疆必繫之於齊不直書取汶陽田書法坦然可見也説者以八年晉侯使韓穿來言汶陽之田歸之於齊疑此田為齊封內之田晉取以與魯是不然汶陽之歸晉實無道以此失諸侯不足言也義又見定十年冬楚師鄭師侵衛楚共始立晉既敗齊于鞍宜楚人之知畏而楚鄭乃反連兵侵衛何哉曰齊固有罪晉伐之又伐之齊窮無所歸遂歸命于楚以為自全之計楚於是始大得志矣蓋中國諸侯若宋若魯若衛皆微削不能自存惟齊秦為大國楚先巳得秦得鄭得陳至是得齊而諸侯大國無不為之用遂侵衛以動諸侯魯人素無立志及是怖於鄰震往預嬰齊之會遂儕蜀盟由是觀之晉之伐齊為楚人驅諸侯耳十有一月公會楚公子嬰齊于蜀晉以魯衛之故大舉伐齊以治其憑陵之罪晉可謂有德於魯轍未及息遽為此行成公幼無所知凡皆季氏所為耳書公會楚公子嬰齊著其敗盟背德以望國之君而屈於楚之公子魯之辱也衛猶以被兵而服魯未嘗被兵直為虛聲所脅是故春秋責之深不復為之諱自楚人僭王其公子亦僭而稱王子久矣今書楚公子嬰齊春秋之削之也木訥乃謂楚降王稱子以自通於中國故嬰齊以公子稱楚方怙其強大逞凶威以陵脅諸侯謂其能自降損必無是也凡讀春秋而有取於莊共之行事者講明未到焉耳丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀或曰前此晉敗于邲楚莊猶不得以號召諸侯今晉勝于鞍楚共乃能會十一國之君大夫為蜀之盟其故何也曰強人之憑陵中國未有無釁而動者也晉以郤克季孫之怒大舉伐齊敗之鞍盟之袁婁少伸前日屈辱之憾而齊頃遂與楚合導之以為此來晉欲禦楚懼齊人之議其後欲更伐齊而懼楚人之乘其間坐視莫如之何楚既入中原侵衛脅魯大會諸侯莫敢不至是以為此盟正由得齊故也是故春秋於此會責魯罪齊遍責中國之諸侯為其甘心從楚而不以為悔也春秋之義為魯諱惡今魯君預於盟會而不為之諱責之深矣齊霸國也每序在諸侯之上亞於晉今而降之於陳衛鄭之下罪之深矣以魯君之親行知宋以下諸小國之君必皆預盟今自宋以下至於薛鄫一以人書所以遍責一時預會之諸侯而坐之以從逆之辟書法至為嚴謹是出於聖人之特筆夫豈舊史所能及哉嗟夫楚以一公子用師於中原而十一國之君大夫奔走聽命惟恐其後不知晉人之可憚也而左傳以是盟為匱盟謂諸侯畏晉而竊與楚盟竊之云者不欲人之知之也十一國之君大夫為此盟而謂之竊盟可乎晉實知之而不敢問晉之氣於是餒矣或曰是會也楚先諸侯其得謂之霸乎曰此劫諸侯而與之盟非所謂霸也晉雖不競猶足自植春秋豈遂奪之晉而與之楚乎故繼是盟則書公會四國存晉也存晉所以繫諸侯也三年春王正月公會晉侯宋公衛侯曹伯伐鄭或曰三國之大夫方盟楚于蜀而其君乃會晉伐鄭盟楚伐鄭事之不得兼者今而兼之春秋不以為貶何哉曰存晉霸也春秋於晉每致拳拳其之意故楚橫行中原脅從諸夏秦齊宋魯皆預盟盛矣而非春秋所與晉會諸侯僅三國從弱矣而春秋嘉之為中國喜也伐鄭所以攘楚攘楚所以尊中國魯宋衛去強盛之楚而從衰削之晉以伐有罪之國是春秋所以嘉也觀前之會十有一國君大夫皆預一以人書此四國僅從而書爵見春秋權衡衮斧之意為晉幸即為天下幸也彼謂春秋與莊共以霸者豈不陋哉鄭自邲之敗專意事楚不與晉通楚之與國也或曰宋衛未葬亦得預於會乎曰此金革之變禮不得已而用之春秋與其會晉伐鄭不與其純吉從戎也當是時楚勢方盛而三君自拔以從晉春秋録其守義不屈特用金革變禮列之於會不書子而爵貶其用吉從戎非與之也曰魯君身預於楚之會盟復從晉為此伐其可許乎曰貶其可貶與其可與也書會嬰齊著其以望國之君會楚之公子而不以為伉也書及盟于蜀著其先為特會繼預旅盟而不以為恥也猶幸從晉伐鄭稍足以補前過耳辛亥葬衛穆公穆公羊作繆二月公至自伐鄭甲子新宫災三日哭榖梁曰新宫者禰宫也三日哭哀也其哀禮也迫近不敢稱諡恭也恭且哀以成公為無譏公羊曰新宫者宣公之宫也宣宫則曷為謂之新宫不忍言也其言三日哭何廟災三日哭禮也常山劉氏引丹桓宫楹為比曰此不言宣者主未遷入也不當哭書哭所以譏愚竊以公榖之義為正也三年之喪通喪也二十有七月而終宣公薨至是二十八月則主已入廟此入廟之始也主方入廟而廟災焉此人情之戚成公三日哭可謂知所哀而哀也春秋變文書新宫所以識天變之駭異道公所戚之故也焚先人之廬猶三日哭今先君神主始入廟而廟為火所燬人子之痛切為甚三日哭而謂之不合於禮失春秋所以書之旨矣喪與其哀不足而禮有餘不若禮不足而哀有餘此雖非居喪愚以為當用喪禮而哭乙亥葬宋文公左傳文公卒始厚葬益車馬重器備君子謂華元樂舉於是乎不臣胡氏曰天子七月而葬諸侯五月而葬大夫三月士踰月以隆殺遲速為禮之節不可亂也文公之卒國家無事越禮踰時逮乎七月而後克葬故知華元樂舉之棄君於惡不以諸侯禮而喪其君是之謂不臣左傳有所授矣夏公如晉諸侯既除喪而入見于王受黻冕之賜然後成其為君自東遷此禮頓廢然亦未有除喪而入見大國以事王之禮而事大國者也魯宣挾強齊之援弒君篡國凡可以諂齊而求説者無不為矣未除喪而會既除喪而朝雖僭事王之禮有弗避也今成公借援於晉勝齊於鞍本為季孫雪恥而所以事晉者乃率循宣公之舊是除喪入見之禮不用之於王而施之於晉其無王之罪大矣春秋書公如晉公至自晉所以譏也鄭公子去疾帥師伐許義并見下兩伐公至自晉秋叔孫僑如帥師圍棘左傳謂取汶陽棘不服故圍之棘者汶陽邑也春秋所以書譏魯人不當用師而取也土吾土民吾民前日為強暴所侵陵民之戴魯未嘗忌今而故疆復歸固百姓之所願特齊人在棘者猶為其國守非百姓罪也遽興師以臨之如攻境外之寇故春秋以為譏大雩晉郤克衛孫良夫伐牆咎如咎古刀反討赤狄之餘也克與良夫得志于鞍不知自戢更為此舉春秋之書之誅善戰也楚方躪藉中原晉人不務修明霸業圖其逺者大者既滅赤狄又伐留吁以為未快復興此役此逐利之師也春秋惡之屢書皆所以貶杜注謂傳文有牆咎如潰四字而經文無之以為經文有缺愚謂春秋譏晉人用師之不戢是以書夫豈謂狄失民而譏乎四字非缺冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟或曰此聘而尋舊盟春秋書法有異於它日何邪曰春秋先書晉侯使荀庚來聘衛侯使孫良夫來聘其聘者君命也繼書丙午及荀庚盟丁未及孫良夫盟其尋盟者魯人求與之為盟也成公既與楚嬰竊盟懼晉人知之將以為討故因荀庚之來求與之盟以示其不敢二晉既盟晉不得不盟衛春秋書兩及盟見是盟出於魯意而荀庚專以行之也若十一年郤犫之聘之盟則與此異大率強國之來聘而盟以臣伉君春秋多所不與列國來聘尋舊好而為盟不為伉交聘而互為盟故也義又見襄七年孫林父來聘尋盟鄭伐許或曰鄭自邲之役專意事楚不通中國春秋未嘗與楚同貶辭今伐許而貶之何邪曰為伐許而貶之也春秋之義先祖為善未竟子孫緒而成之是謂述事先祖有惡自知其非而改之矣子孫逐利而終成之是謂濟惡述事者人心天理之所存濟惡者無人心鄭莊先以滅許自知其大不義置之而去其悔過自咎之意見之傳藹然可述也今鄭襄公堅者怙楚人為已之覆以兵加許歲至于再是必欲覆其宗社而後已鄭莊有悔過之心而其裔孫利人之土疆而濟其惡自是許卒為鄭所併堅實啓之春秋貶鄭良以是故或謂楚因鄭而得霸是故貶之其不然歟楚之強盛由晉君世庸大夫世專坐是日趨于削於鄭乎何誅四年春宋公使華元來聘三月壬申鄭伯堅卒杞伯來朝義併見明年歸叔姬夏四月甲寅臧孫許卒公如晉葬鄭襄公秋公至自晉左傅謂晉侯見公不敬公至自晉欲求成于楚而叛晉季文子諫而止甚哉魯成中無所主逐變而屢遷也始與晉人連兵伐齊以有鞍之勝謂當與晉為睦曾未幾日率先諸侯躬受盟於楚猶幸晉人之無討也去年如晉今年又如晉正所以救其前日匱盟之過一不為所禮又將叛而即楚不能自治其國使在我者隱然可恃是故楚之強足以動之晉之慢足以移之春秋於魯成之從楚適晉備書而無所諱貶也冬城鄆鄆公羊作運此魯鄆也莒之别邑亦曰鄆九年楚人入鄆是也魯自有二鄆文十二年城諸及鄆此東鄆莒魯所爭者也成十六年傳晉人執季文子公待于鄆此西鄆昭公所出居者也今此所城西鄆也杜以為魯欲叛晉故城此為備恐未然魯謀叛而未果何遽至城以為備此為齊耳春秋譏魯人不務安靜而輕於用民力鄆雖城何益哉鄭伯伐許此鄭悼始立而伐許也父死未踰年動兵伐國以君道自居無復在喪之戚是故不書子何氏謂如其志以著其惡是也或曰伐許非父志乎曰父之所為義已之繼之為孝父挾強楚之援陵暴小國歲再用師其子繼世而不能改是之謂濟惡庸得謂之孝乎不書子而書爵絶之於名教也五年春王正月杞叔姬來歸去年春杞伯來傳曰歸叔姬故也杜氏謂將出叔姬先修禮於魯焉故諸説多本之愚謂春秋之世倫分廢缺夫婦之道乖矣然亦有歸而未絶者見之經傳間可考也聖人立教有以出而允於義者有以出而悖於禮者未嘗不開其改過遷善之門夫豈以遂非而不復者為是乎杞伯來朝之明年而後叔姬乃歸此與它悖義之出不可同日語矣必叔姬自不安於杞或以疾而求歸非杞之絶之也故其卒杞復逆喪以葬見同穴之義有以知其非悖義之絶愚觀書法前後而見聖人之意其歸也其卒也叔姬猶繫於杞至其逆喪許之以逆而無貶辭義未絶也疏引雜記諸侯出夫人以夫人之禮行至以夫人入故春秋於叔姬之歸猶書杞義亦通然杞伯之於叔姬實歸而未絶當以書法為斷義又見九年逆叔姬之喪仲孫蔑如宋夏叔孫僑如會晉荀首于穀梁山崩山崩川竭變之大者故僖十四年沙鹿崩與此梁山崩雖皆晉地而不繫之於晉為天下記異也穀梁具載伯宗所以告其君者以為伯宗掠路人之美以為已能孔子聞之曰伯宗其無續乎攘善也其實伯宗以道路鄙淺之言而復之於君失晉侯懼災之意夫子必無是言也春秋於沙鹿梁山二大異動色而書之以見天丁之治亂中國之離合自是而始彼具文應變何足言哉或曰是固天下之異而皆發于晉何邪曰周自東遷賴二霸以存齊既衰獨有晉在而比歲以來君庸臣貪坐隳霸業晉之削中國之憂也意舊史必書晉梁山崩春秋削之惟書梁山崩實為天下記異也秋大水冬十有一月己酉天王崩定王也簡王立十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢于幽之同喜其同也盟之盛也新城斷道而亦書同盟幸其猶能同乎中國也至是書同盟則例之變也天王崩告命已行於天下而諸侯不戚不奔相與為此盟無王之罪大矣春秋於王崩之後繼書同盟貶也或以為鄭久叛而始服齊既預於蜀之盟兹復躬預此會喜其同外楚故是以書同愚謂齊鄭之服非心服也是時諸侯實兼事晉楚晉人明知而不悟何有於同義又見十七年柯陵六年春王正月公至自會二月辛已立武宫案左傳季文子以鞍之功立武宫非禮也聽於人以救其難不可立武立武由已非由人也如傳文則立武宫者立此宫以誇示功伐如楚潘黨請築武軍之類耳公羊子以為立武公之廟禮明堂位魯用天子禮魯公為文世室武公為武世室則武公廟乃魯國世世不毁之廟何待今日而始立之乎杜氏謂築武軍又作先君武公宫以告成事兼取二説愚以春秋書法而觀立者不宜立者也禮大傳記云牧之野武王之大事也既事而奠於牧室傳者以為作新宫而奠祭蓋即戰勝之處作宫以告成事楚莊邲之勝祀於河作先君宫告成事而還此雖僭禮然不過草次作宫非立宫也意季氏有取於此乃於師還飲至之後立宫國中以告成事而名之曰武宫非必武公之宫也書立武宫譏非所當立而立也與立煬宫辭同而義異取鄟春秋書滅國誅其滅人之國也故傳者以為亡國之善辭魯滅國或書入或書取為魯諱也無駭入極乃滅國書入之例此取鄟及襄十三年取邿乃滅國書取之例僖十七年滅項直言以公在會季氏擅兵滅國直書以貶之惟宣九年取根牟諸説不同衛孫良夫帥師侵宋據左傳諸侯謀復會宋公辭以難晉伯宗衛孫良夫鄭人及伊雒之戎陸渾蠻氏侵宋經惟書衛不與晉人率蠻戎而攻中國也去年冬宋實預蟲牢之盟今一辭會而遽加之以兵以為未快復命魯人繼之前日楚莊圍宋歷三時之久國幾斃而晉不能救但曰鞭長不及馬腹今宋人一辭會而伐之至再晉景惛而愚諸大夫狠而肆事多類此春秋聮書魯衛二侵責晉深矣夏六月邾子來朝公孫嬰齊如晉叔肸子子叔聲伯壬申鄭伯費卒悼公也未葬而有楚師喪不如禮舊史闕言葬聖人因之秋仲孫蔑叔孫僑如帥師侵宋春秋聮書魯衛之兩侵固責晉也叔仲帥師俱行又所以責魯也晉為不道既命衛人戎蠻侵宋復命魯人繼之魯固為晉所迫不獲已而為此行止當持偏師以往姑塞晉意不當用大兵命二卿俱將以出是魯亦有責焉耳春秋並書二帥所以貶也楚公子嬰齊帥師伐鄭鄭之襄悼繼世加兵于許楚人討之執其二大夫執之是也鄭以為憾去楚而從晉中國諸侯叛而復歸固所當受然亦當稍示警戒使楚人聞之知中國之猶有政令今受之而與之盟大會諸侯而矜耀其至所以致楚師也或曰楚伐鄭喪春秋其無譏乎曰楚於僣王無忌何有鄭喪故無責焉耳冬季孫行父如晉晉欒書帥師救鄭公羊作侵鄭非或曰春秋之義救而次者皆有貶是役也晉與楚遇軍帥之欲戰者衆三卿荀首士燮韓厥獨持不可欒書因之以還春秋許之以救其無逗撓之責乎曰據左傳晉與楚先遇于繞角楚師還則鄭既免矣晉移兵指蔡復與楚遇于桑隧楚欲戰晉乃引還則蔡亦免矣如傳所云鄭以晉救而免蔡以楚救而全故雖逗撓而春秋無責非取其遇敵而避之也鄭人去楚即晉託國於我者也若每遇輒避而惟責小國之必從於我夫豈春秋所善乎胡氏引舜格苗文王降崇事為言論則髙矣美矣其如危國之望救何以師救人遇敵而避之春秋所以責也七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛魯之郊愚於僖三十一年既詳著其義矣春秋於魯郊或譏失禮或以紀異僖之始卜譏失禮也宣三年成七年定十五年哀元年四書牛傷則以記異也榖梁子所謂展道既盡而猶不免有傷者也此郊牛再食不皆在正月內春秋聮書以著上天示異之意許氏曰小害大下賊上食而又食三桓子孫繼作之象也宣公有虞三桓之志成始弗戒矣吳伐郯吳始見經吳太伯之後也而以號舉貶之也為其踵楚僭名竊王大號故與楚同貶聖人作春秋垂世之法也或曰案國語吳本伯爵後益強以子書亦不與之以伯爵其春秋之法仲尼之制歟曰否春秋諸侯犯上干紀罪有大於吳者不聞有所降黜獨於太伯之後黜伯從子國語之説其不然乎吳與楚為敵其來已久春秋不書今伐郯而始書志其始為中國患也郯太皡之後國雖小尚有典刑昭十七年郯子來朝聖人訪之以官名尚有取焉異時修春秋書吳伐郯貴之也貴郯而賤吳惡僣王也夏五月曹伯來朝不郊猶三望三望義已見僖三十一年啓蟄而郊郊而後耕此郊用夏正之意也魯人每郊必卜春而卜不從則以夏夏而卜不從則以秋蓋自知其為僭故卜之而後敢行耳而是郊也復與前異春而牛死免牛則不郊矣至夏五月而忽講三望之禮非郊之時復非望之時可無講而猶講春秋書之所以譏也秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵此合諸侯救鄭因以同盟幸諸侯之猶同也晉前此救鄭皆以大夫帥偏師以行楚人止而索戰則皆逡巡引避自以為得計意其君亦悟至是合九國之師自將以行春秋爵諸侯而書救鄭褒之也春秋為中國慮晉人稍能自振則動色以褒之荆楚盛兵憑陵則屢書以斥之諸説謂春秋與楚以霸非知春秋者也是役也不書戰而言盟楚避晉也重以吳入州來故楚人奔命自救不暇蓋中國自治之機公至自會吳入州來吳伐郯春秋所憂也入州來又春秋所喜也州來楚邑或以為楚之附庸直書州來以其為要害之地吳楚所必爭吳得之可以制楚為中國之喜也亦猶諸侯城鄭虎牢不書鄭以其為中國要害之地城之而鄭服楚不敢爭也楚莊共乘晉政之不競竊霸威以脅制諸夏不虞太伯之後忽有興者於是吳入州來楚始知懼蒼姬之福祚未艾良以吳故而君臣上下悉均不知秉周禮以同於齊晉所以終於無成春秋雖欲進之於中國有不可得也冬大雩衛孫林父出奔晉春秋中年諸侯之大夫外交強國以伉其君衛之孫魯之季其尤者也林父自結於晉之權臣為日久矣至是奔晉挾盟主以抗其上未幾返國值衛衎繼世不能君林父乘而作亂稱兵犯上逐其君而立已所善之公子卒之入戚以叛為衛國患者幾四十年晉實主之衛事晉無違而晉之昏君強大夫黨其叛臣為之羽翼何以勸人臣之事君者衛獻魯昭所以失國晉實為之也八年春晉侯使韓穿來言汶陽之田歸之于齊春秋之義莫大於正名名不正則言不順晉侯之使韓穿是也夫汶陽魯之土田受之於王者先為齊所侵晉挾魯衛伐齊取其侵地以歸之于魯魯之舊物本非齊有也晉既已歸之于魯復命魯人返之于齊愚不知晉侯之使韓穿何以為之辭也春秋書晉侯使韓穿來言汶陽之田歸之于齊見其名之不正言之不順而難乎其為言也歸之于齊非所歸而歸也或謂季文子陳義以拒穿故經於齊無取田之文以為晉雖來言魯卒不與此則未可知也晉欒書帥師侵蔡蔡楚之與也晉人侵蔡攻楚之與國亦所以報其伐鄭也然蔡近於楚服楚之日多從晉之日少與陳鄭異晉未能制楚而務侵小國以為功春秋不與也是故欒書此出以侵書公孫嬰齊如莒宋公使華元來聘夏宋公使公孫夀來納幣昏禮不稱主人義見隱公二年紀裂繻來華元之來聘共姬也宣公女伯姬公孫夀之來納幣也昏禮不稱主人此再書宋使譏也義詳見紀裂繻之來然宋之請昏於魯用禮甚勤前所未有也昏禮有所謂下達者禮之始也華元來聘乃宋公始使請昏俾上卿通其意禮所謂下達者也此媒氏之事今使命卿宋所以尊魯而重昏也魯既許之公孫夀繼至納幣再以卿行禮亦重矣公羊曰納幣不書此何以書録伯姬也以宋人篤於用禮而備書之傳者謂宋三世內娶故卿權伉於君今而結昏於魯宋共殆有意於正家者也書公使大夫雖若有譏而再書命卿之來則録其重昏之意春秋於內女之適人其謹如此晉殺其大夫趙同趙括同括之死以左傳而言死於欒郤莊姬之譖不以其罪但史記載屠岸賈事謂岸賈為司寇追論趙盾弒君之罪殺同括誅滅趙氏公孫杵臼程嬰匿武而免之諸儒多不取其説愚以當時之事而觀二説當兼取晉成景之世諸侯互相吞噬意者欒郤欲兼并趙氏假手於屠岸賈而為此耳是時晉卿怙權必不容踈逺之臣專行誅戮蓋莊姬欒郤譖之於內而岸賈以司寇行其戮於外同括實無罪晉景惛於讒而殺之春秋不與諸侯之專殺大夫而況一朝殺無罪之兩大夫乎稱國以殺殺無罪也厥後厲公之殺三郤實效景之所為此殺無罪彼殺有功於是羣下盡叛起而圖之厲以弒死晉之政權下移於卿以迄於亡景實啓之耳秋七月天子使召伯來賜公命公穀作錫命天王錫命於魯凡三見莊王使榮叔錫命桓公王不稱天譏錫命於篡賊也襄王使毛伯錫命於文公初嗣位而命之為君春秋若無譏今成公即位八年未嘗朝周復無勞能之可録簡王忽使召伯來賜之命王稱天子春秋不無譏矣或曰天子天王王者之通稱其非貶歟曰天王者尊名也春秋特為此名示人君之尊與天同其大以别異於僭王今變文而書天子寧無譏乎若錫命與賜命其義均也劉氏引戴記三公一命卷若有加則賜也以為次國之君不過七命今而加賜服過其爵愚以為成公方在童年周人未應加賜亦始命之為君耳成立時尚幼今而稍長請命於周王賜之耳冬十月癸卯杞叔姬卒義已見五年又見明年逆喪晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯左傳晉士燮來聘言伐郯也以其事吳故公賂之請緩師士燮不可乃俾僑如以師會七年吳伐郯晉不能救力屈而事吳豈其得已晉遽興三國之師以伐之晉無道矣不能制楚而惟欲服鄭不能制吳而欲責郯當其救則逡巡而引還當其伐則勇往而弗忌晉之君臣無能甚矣先書吳伐郯此書三國會伐郯不能救之又伐之著晉之罪所以貶也衛人來媵自入春秋內女之適它國者有矣諸國之來媵者亦多矣而春秋不書至是伯姬將歸于宋衛人晉人齊人皆來媵春秋特為書著伯姬有賢行諸國樂以其女為媵也古者諸侯娶嫡夫人及左右媵各以姪娣來從是謂一娶九女所以廣繼嗣也然小國有不能備媵焉今齊晉之大忘其勢而以其女為伯姬媵春秋屢書而不厭其煩貴之也左傳曰諸侯嫁女同姓媵之異姓則否以齊人之媵為非禮劉氏謂必同姓而後可則嬴姒媯弋之國有不能備媵者矣但此三國來媵合嫡夫人之姪娣則為十有二女春秋所以備書抑亦譏其過制以為宋人當援禮制以辭譏在宋也九年春王正月杞伯來逆叔姬之喪以歸夫婦大倫以義而合者也有過而出事之必不獲已者也而禮有所謂無子而出者則禮之疑也檀弓載孔氏不喪出母又經之疑也聖人之身天下萬世所視以為準的者安有簡薄倫類如檀弓之所載者乎愚觀春秋書叔姬之事而見聖人厚倫之意檀弓所言出於漢儒附會決無是也而又託為子思之言謂道隆而隆道汚而汚語意不瑩重為後人之惑衰世薄俗有不足於夫婦者每藉是以文其過其害甚大昔年讀禮嘗著論以非之然未有以深闢其説兹因杞姬之事而知檀弓所載之為誣也審矣叔姬之歸傳不言其故而自始歸至于卒以及逆喪皆繫之於杞春秋與之能歸而為之書也自是以來見之史傳去婦復還者多矣是皆孔氏之遺訓蓋有出而復者未聞既出而遂絶既絶而不可復者也彼謂子思不喪出母者齊東傳聞之説子思子重受其誣不得不辨公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲公至自會或曰是會也左傳云為歸汶陽故諸侯二於晉故晉人為此會以尋盟則是盟也其不得為同盟乎曰春秋書同盟有喜其能同而書同盟者有幸其能同而書同盟者自清丘斷道以來楚兵橫行中原晉政日趨於亂而春秋猶書同盟幸其猶能自同於中國云耳非夫同心一德以尊天子而奬王室如桓文盛時事矣二月伯姬歸于宋伯姬歸宋自始至成禮七見之經貴之也彼與鄫子遇使來請已者春秋不以其汚簡册而猶書之賤之也此貴之彼賤之所以垂法於後焉耳夏季孫行父如宋致女禮婦入三月廟見婦禮乃成則女家使大夫聘問謂之致女所以篤昏姻之好齊仲年之來傳言致夫人在它國則以聘書在魯國則言致女宋始者以命卿蔣事故於禮之成也亦以命卿致女胡氏謂致女使卿非禮也愚觀春秋書法似無譏晉人來媵義見前秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭書晉人執鄭伯專罪晉也左傳謂楚以重賂求鄭鄭伯會楚公子成于鄧夫楚強國也而云以賂求鄭論者疑焉蓋楚非輸賂之國鄭必不以宗社之存亡貪得賂而為人役也良以晉景愚暗不君舉動乖舛無以大服諸侯之心而又取魯之汶陽以市恩于齊諸侯因此懷二鄭之叛去端以是故耳據傳鄭伯如晉晉人執之是鄭伯猶未忍告絶于晉晉遽執其君以伐其國晉政舛矣執諸侯而不歸之京師兼有無王之罪故書人書伐書執誅晉也冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆春秋責莒之不治亦責晉也左傳載莒子答巫臣之言自以僻陋在夷不為繕完之計楚人乘之浹辰之間三都皆隳春秋書潰書入責莒之不能撫民且無素備也然楚之伐莒以救鄭也莒同盟諸夏馬陵及蒲皆預晉坐視其危亡而莫之恤春秋所惡也鄭盟楚則執其君而伐之莒危亡則置不問盟主之道固如是乎春秋不責晉而誰責秦人白狄伐晉宣八年春秋書晉師白狄伐秦譏晉也然晉猶書師也今秦狄伐晉書秦人白狄伐晉儕秦於狄貶秦也則奚貶乎以其黨於楚而為之出師也前日秦晉交兵自為其私曲直猶有所在今也楚人爭鄭正急出師潰莒以撓晉而乃率白狄戰其東欲使晉人不知所備而置鄭以去其為楚謀善矣然舍中國而甘為楚人之役秦之所以自處者卑陋甚矣是故貶鄭人圍許鄭伯在晉鄭之臣子出師圍許曰將以歸君而春秋不與也傳言公孫申之謀曰我出師圍許為將改立君者而紓晉使晉必歸君吁以是為歸君之謀則可以是為事君之道則不可也晉惠在秦晉人雖征繕以輔孺子而使乘絡繹以歸君為請秦卒歸君烏在其為詭謀也城中城中城者左傳杜注以為魯邑在東海廩丘西南榖梁曰非外民也范注謂春秋譏公恃城自固不復能衛其人民自以中城為國中之城而定公六年又書城中城曰三家張也以是觀之城中城者城國中之城耳魯人以楚潰莒之故不無震疊之恐故城中城以自固非杜氏所謂廪丘者矣春秋之書之譏其不務撫民城雖固誰與守春秋集傳詳説卷十七
