body:
  text: 春秋詳說原跋至元丙子宋亡以則堂先生歸置諸瀛者十年卒成此書書成自瀛寄宣託於其友肅齊潘公從大藏之蓋久而綱目十篇學士大夫已盛傳於世矣泰定乙丑宣學以廪士之贏刋大學疏義等書取諸潘氏鋟梓於學凡三十卷其曰春秋集傳詳說蓋俟夫說約者得經旨焉此先生著述意也先生之祖大酉以成都府教授列於朱文公學黨之籍其源流有自云髙郵龔璛跋
