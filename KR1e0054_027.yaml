body:
  text: 春秋集傳詳説卷二十七宋家鉉翁撰定公上名宋襄公之子昭公之弟敬王十一年立是嵗晉定三年元年春王榖梁曰不書正月定無正也定之無正何也昭公之終非正終也定公之始非正始也昭無正終故定無正始不言即位喪在外也胡文定曰季氏廢太子衍及務人而立公子宋者昭公之弟其主社稷非先君所命而專受之意如者也故不書正月見魯國無君定公無正或曰子惡之弑宣公之立襄仲立之也春秋猶書正月今昭卒定立季氏立之而春秋不書正月何哉曰正月者天王以頒朔於諸侯諸侯受之而頒於國中者也惡死宣簒是雖為簒而魯猶有君今昭公之喪未返公子宋未立魯無君也魯無君而季氏自以為君頒朔於廟如常禮春秋黜之是故書王不書正書王明王法以治季氏也不書正明正朔非季氏所得而頒也前此公雖在外而嵗首必書公在存公也存公是故頒朔今公已卒於外嗣子為賊臣所廢魯國無君是故不書正月見魯國無正王朔在廟非賊臣所得頒也此春秋特立之變例前所未有也公羊謂定哀之間多㣲辭主人習其讀而問其傳則未知己之有罪焉耳愚謂春秋明義討賊終始如一豈有習其讀而不知其罪者哉三月晉人執宋仲幾于京師晉人合諸侯之大夫城成周仲幾不受功執之是也而春秋有貶辭何哉榖梁曰不正其執人於尊者之所也愚謂霸討當用之於外而不可施之京師魏舒韓不信當以仲幾之罪告於王王命之執乃執之而歸於司寇夫然後盡人臣之義今執之京師不請於王不歸之司寇此用霸討於天王之側無王也仲幾之不受功無王也晉大夫不以王命執仲幾亦無王也是故不以城為王事而略晉大夫之罪此聖人之特筆非因乎舊史者也前日書㑹諸侯書城成周言諸侯各率其職而城王城也今執宋仲幾而書京師尊京師而正晉大夫無王之討也京師衆大之區天王在焉陪臣專戮而弗請是故書京師以正之彼謂定哀多微辭其不然歟夏六月癸亥公之喪至自乾侯戊辰公即位一年不二君者常也一年二君者變也昭公之喪以是月稅輤定公即以是月即位是一嵗而二君也故春秋書前公之喪至與後公之入立以示其變著魯國非常之禍亦以見定之立非所當立而立也春秋之義繼故而書即位者以為預聞乎故桓宣是也若昭公之薨於外雖非弑死而其禍視弑無以相逺謂之正終不可也定公之立不書即位正也今而書即位以其簒君之子受位於賊特書即位以正之也意如逐君君既死於外又廢君之子而立其弟廢其所惡立其所善廢立由已罪大惡盈中國無王莫之討之而定公之立則非所當立而立也定公而能執子臧季札之讓逃而去之夫然後於義為盡今也受位於賊臣曽不曰先君有嫡子在我不敢當偃然自以為己之所當得是與簒亦何逺哉春秋書公即位從桓宣之例絶之名敎夫豈與之以即位之正哉喪至六日而後即位見予奪遲速惟賊臣之意春秋書之亦以誅之也沈子以為正棺兩楹之間然後即位此其常也定所以立非此之故秋七月癸巳葬我君昭公吕氏曰葬本國之君稱葬某君足矣必曰葬我君某公者隆君臣之恩盡忠愛之義資乎事父有父之道焉故必曰我君以明之也此道也常時無事不見特於昭公為大有警動於其臣下者此論得春秋書我君之意為人臣子者當有味於斯言也九月大雩立煬宫公薨於外魯之大戚而意如以為獲神靈之祐為煬立宫煬者伯禽之子廟之毁久矣賊臣以其私而立之推其無忌憚之心其何所不為使定公强於自立登進忠賢與之共謀魯國意如猶可翦也叔孫昭子不以䜿牛恩已殺之如孤豚定公視叔孫其亦有愧矣冬十月隕霜殺菽傳者以此十月為夏正之八月以冬為秋必不然也古今地力無以相逺五榖成熟之時大率相似夏正八月稻粱稑穜之在田未收者尚多隕霜何以不殺他稼而獨能殺菽乎如使今兹八月隕霜稻之華而未實者皆損必無專殺豆苗不及餘榖之理以是而觀則此十月當是夏正之十月菽豆也孔穎達疏以為耐霜之榖夫所謂耐霜云者為其見冬而猶存今楚蜀之地豆有得霜而飽熟者正穎達所謂耐霜之榖穎達魯人其言如此是知中原之地有此耐霜之菽為十月霜所摧以是為異耳丙戌九月十二日瀛野降霜屋主人趙器之兄弟自野外而歸云霜降蚤豆盡損予問云豆何以至今未收曰此豆方欲結實被霜所損今不復可實予又問云此豆結實當在何時可收器之兄弟云若不損十月半可收予因書其事示諸朋友俾知穎達之言信而可徵二年春王正月夏五月壬辰雉門及兩觀災此雉門災延及兩觀也魯國僭天子之制雖成王所賜而夫子每不謂然是故修春秋明王法數致意於此如卜郊用羽及新作雉門及兩觀之類皆是也子家語昭公曰諸侯之僭天子久矣設兩觀乗大輅朱干玉戚以舞大夏八佾以舞大武皆天子制也不言成王所賜蓋所賜而得用者特郊廟之事及後世子孫無所不僭蓋有出於成王所賜之外者矣書雉門及兩觀災因災而著其僭制也秋楚人伐吳冬十月新作雉門及兩觀榖梁曰言新有舊也作為也有加其度也書災於上書新作於下言當天災之後宜加貶損而又増崇之是以譏也定公受位於賊臣舉國以聼賊臣之所為君不能君者也天示之異災及雉門兩觀諸侯所以臨涖其臣民者一朝化為煨燼變亦駭矣乃又從而新之有加於其舊是謂天變為不足畏也書新作貶之深矣三年春王正月公如晉至河乃復三傳皆不言其故說者謂意如不請之於晉而立定公故晉怒而辭公及河乃復愚以為未得其情也夫意如所以死昭公於行擁定公以簒皆晉大夫為之羽翼晉君木偶人耳豈能以意如為怒辭魯君而復之乎蓋公如晉至河乃復者意如所以操縱其君使之一切惟已之聼昭公惟不能堪所以陷於大禍定公俛首下氣苟焉以君位自居僅克自全而國非其國矣至河乃復者意如之所為也二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔邾子即位未踰年甫葬其先君即與魯大夫為㑹迫於魯而出非獲已也三十二年黒肱以濫來奔邾日益蹙是以為此盟魯君不躬往而使大夫㑹之是將為叛盟計耳春秋書邾人之喪繼以仲孫之盟責魯也四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚春秋有以書侵書伐而見襃貶者齊晉兩召陵之師也齊桓以八國之師伐楚而書伐大桓公攘亂之功也晉定以十八國之師伐楚而書侵鄙晉定之無能有為也蓋奉辭伐罪仗義而必往夫然後稱其為伐師雖衆義雖直而逗撓因循無以副衆人之公望是雖伐而不足言伐故書侵以微之是㑹左傳以為蔡侯所請是時王命不行已久晉政亦衰列國之君翕然來集者十有七國此出於人心同外楚之意而晉君不能君其臣各為其私計有虚十有六國來㑹之意春秋深致其貶義甚明也是冬蔡侯以吳師入郢成攘楚之大功春秋貴之學者知柏舉之為襃則知召陵之為貶也附見聞之師曰蔡昭侯隐太子之子明於復讎之義故為春秋所與是㑹也序之宋公之次諸侯之上及柏舉之戰書蔡侯以吳子貴蔡侯也是義也榖梁知之故於東國之入楚而曰王父誘而殺焉父執而用焉已復奔之春秋是以貶正謂大讎未報而朱與東以楚為歸是以責之知朱東事楚之為非而後知昭侯敵楚之為是此春秋微㫖之所在論者不過謂滅蔡者楚䖍復蔡者棄疾今不當報之棄疾之子殊不知楚之復蔡復其名而制其實大讎未報朱與東又繼死於楚昭侯亦將不免此其所以勵復讎之志春秋所深與也平王不能致憾於犬戎魯莊不能致憾於齊襄春秋所深責以是起義而垂訓故復九世之讎者滅國也而不以滅書蔡先君受毒於楚若是其烈為人子孫者所當自力以圖報夫豈曰事已易世而非已之責乎左傳謂昭侯以覊留之憾而有請於晉吳以為是役失春秋録蔡之本㫖故不得不辨義又詳冬柏舉之戰及五年歸粟于蔡夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之此蔡人以晉之命伐沈而滅之也春秋書於㑹之後盟之前責蔡也亦責晉也晉大㑹諸侯辭曰伐楚不能損楚之毫毛乃以沈子不㑹命蔡伐之伐之猶可而蔡為不道乗其未及設守襲而滅之慘矣哉故書滅書殺以正其滅國之罪或曰沈子惟不屈是以死社稷名之何哉為其從夷也沈為夷役舊矣今諸侯皆向中國而沈獨附楚名之所以夷之也然蔡不自知其危滅人之國而殺其君為晉之快不仁甚矣其後雖有大功於中國而不獲令終良以是夫五月公及諸侯盟于臯鼬由又反晉人大合諸侯而不能成尺寸之功書侵楚所以微之也但前乎此王人與於㑹者皆與諸侯同盟此劉子與㑹而不與盟故書公及諸侯盟于臯鼬志劉子不下與于諸侯之盟得王人與㑹之體也杞伯成卒于㑹六月葬陳惠公許遷于容城秋七月公至自㑹許氏曰不致侵楚譏無功也諸侯無故逺涉敵境危之故以月致劉卷卒案左傳卷即蚠也自王室有難以來劉單皆書子實行宰相事今其卒乃以名書春秋必不然疑脱一子字陳止齋曰劉子定内難復辟於周而楚納子朝於是合十八國之師伐楚俄而劉子卒春秋蓋深悲之王卿士不卒有闗於天下之故則卒之於襄王之難有王子虎焉於敬王之難有劉子卷焉春秋特書其卒所以襃也愚謂合十八國未必皆出於王命然劉子當艱難之秋擁立二君外排羣醜卒安宗社是以有大功於王室入春秋二百四十年周家大臣未見其比故特書其卒葬葬杞悼公楚人圍蔡義併見下柏舉之戰晉士鞅衛孔圉帥師伐鮮虞昭十二年楚滅陳蔡晉不能救而用師于鮮虞春秋既貶之矣自是以來楚勢少戢而晉終不能以安中國為事今三以師伐鮮虞棄百年之霸業逐一方之小利若晉君臣可謂無復羞惡之心矣或曰春秋於其始伐而貶之於再伐三伐而不復貶之何歟曰下文書蔡侯以吳子及楚人戰崇蔡侯進吳子所以黜晉霸而儕之於列國也葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績是役也吳子興師救蔡春秋不以救蔡書為其所闗者大救蔡之義不足以盡之也亦猶晉文救宋而不書救以城濮之戰闗於中夏之盛衰救之義不足以盡之也書蔡侯貴蔡侯也書吳子進吳子也書楚人賤之也城濮之戰柏舉之師春秋襃之而無貶也論者以一及字而為拘妄引傳文汨經㫖殊失春秋攘夷安夏襃功罰罪之意故不得不辨或曰吳强國也蔡弱國也小不以大弱不以强今吳敗楚師而春秋書蔡侯以吳子及楚人戰何哉曰此大蔡侯攘楚之功而黜晉霸也晉合十七國之君上勤天子之老無成績之可書而蔡昭侯一念之烈志復世讎請于晉不遂請于吳遂以吳師伐楚敗而入之為中國刷數十年之積憤為蔡先君復三世不共戴天之讎其功大矣其事偉矣春秋特見之書法曰蔡侯以吳子及楚人戰非録蔡侯而何非進吳子而何春秋書以師者三惟蔡昭侯以吳師伐楚為襃桓十四年宋以三國伐鄭僖二十六年魯以楚師伐齊皆貶也雖然蔡非吳之與國所以一請而遂從則以子胥故耳子胥欲復其父兄之讎蔡昭侯亦欲復其父祖之讎其精意至義足以動人悟物是以闔廬信之為之空國以行吳師雖强非眧侯子胥挾其大勇以為之先豈能建立成就如此之偉乎或曰昭侯隐太子之子憤楚人之殺其祖戕其父毁其國起而圖之固義之所不容已然禍蔡者楚䖍復蔡者楚平事歴三世讎其可解乎曰父之讎子必報無時而可解也况楚平之復蔡雖復其號隂制其國蔡之二君曰朱與東入楚而不返昭侯亦見拘三年以賂得釋復之之徳輕以虚滅之之禍重以酷仇人之身雖殞而仇國猶在不報之於楚將誰報乎傳者謂昭侯以一裘一佩之故為楚所拘返而沈璧于河誓言必報此非深知昭侯愚觀春秋書法所以録昭侯者甚大為其能挾大義復世讎為中國攘楚刷恥有晉人所不能為者是故貴之若曰逞羈留之憾志於必報是特一朝之忿一夫之勇春秋何取焉學者試以是觀之楚囊瓦出奔鄭自楚昭繼世舉國付之囊瓦黷貨無厭殺人不忌以至内外離畔莫有鬬心楚由是有入郢之禍今國破君逃囊瓦不能死又不能與君俱行奉頭鼠竄以為偷生之計罪不可勝誅矣春秋於柏舉既敗之後繼書囊瓦出奔誅大臣之敗國事而以身免也庚辰吳入郢前書吳子襃之也此書吳入郢舉其號以貶之也榖則謂其入郢之後君居其君之寢大夫居其大夫之寢盖有欲妻楚王之母者不正其乘敗人之績而深為利有甚於楚之入陳故惡而貶之之後不與楚同楚則斷無可霸之理矣吳猶可霸也使其入郢之後止兵休掠命蔡昭子胥之徒分定楚地撫輯其民人請命于周明正楚莊共靈以來憑陵諸夏之罪削而奪之以其地封有功諸侯而吳不自以為有聲動于逺近霸業可成雖以繼齊桓晉文可也而吴之君臣志不在大驕心易生故敗不旋踵良可惜矣五年春王三月辛亥朔日有食之夏歸粟于蔡歸粟于蔡喜諸侯之能歸粟亦喜蔡人有以受諸侯之粟也歸之為言出於人心之所同不待勸勉而各以粟歸也蔡出攘楚之大功諸夏敬而服之因其饑且以備楚之故國内虚咸致粟焉前此諸侯有災盟主為之㑹諸侯如澶淵歸宋財之比者有矣然必待盟主命之非出於人心之所同今歸粟于蔡小大一心人無異意春秋是以貴之杜氏以為魯歸蔡粟非也當從榖梁義於越入吳杜氏以於越為𤼵語聲非也范氏曰於越俗稱也春秋即其所以自稱者而書之見其不能慕中國故以本俗自通愚謂於越者越人之本號書於越賤之也前此昭五年三十二年越見於經不書於越自是至春秋終皆書於越賤其為楚用也吳以中國之故興師伐楚越乗其虚而入之實為楚故是以為春秋所賤據傳秦人大興師救楚使子蒲子虎將而前不書亦外之也論者謂凡救皆善其義疏矣蓋伐楚天下之大義攘之者國雖小而必録附之者國雖大而必誅此春秋遏㓂亂之常法或者以越人自更號如楚之前荆後楚是不然楚之名大于荆其僭而更之也於越之名陋于越乃俗稱之本號討之是故賤之六月丙申季孫意如卒或曰翬之死不書討之也遂之死去族亦所以討也意如之罪視翬遂無以相逺而卒之以常禮何哉曰志定公不能為其君兄討賊而遇意如加厚翬之弑隱遂之弑惡桓與宣預聞乎弑故不以討賊責之而書即位以絶之今定公之立雖非預聞乎逐君者而懐賊臣之私遇忘君兄之大讎不惟不能討而所以飾其終者加厚於他人故春秋卒意如以大夫之常所以志魯定黨賊忘君之惡不貶之貶乃所以深貶之也秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞義見四年六年春王正月癸亥鄭游速帥師滅許以許男斯歸自許鄭為鄰國鄭人朶頤於許幾二百年矣蓋自隐十一年鄭莊率齊魯伐許入之猶懼王誅之或加入之而不敢遂以為有㑭其臣與許叔分國而處將以有待也未幾鄭有内亂許叔因之以復其宗社許之毒於鄭其來逺矣成三年鄭人一嵗再伐許春秋外之書鄭伐許今中國無盟主諸夏罔所依憑鄭人肆其不道滅同盟之國翦大嶽之後鄭之罪大矣春秋前既外之此復重有討焉或曰春秋於滅國皆罪滅之者不罪滅者蔡之滅沈鄭之滅許皆兩坐之何也曰滅國者固可罪而從楚者亦可罪也許與沈皆始終從楚而不自以為恥者也書名以歸義其在是二月公侵鄭公至自侵鄭案左傳周儋翩率王子朝之徒因鄭人將以作亂于周鄭為出師蹂王畿之六邑晉人命魯討之則玉事也而春秋書公侵公至其隱略殆有貶也初鄭莊得許以讓隐公公不敢受鄭亦不敢以為己有今鄭人以許為滅公之侵鄭實為争許計其不專為王事出師歟既不能拯許於己亡亦不能為王敵愾憧憧往來何益哉而斯與何忌乃如晉獻俘以王命征不庭不獻俘於王而獻於晉又春秋所惡也吁鄭人滅同盟之國又與亂黨侵陵郊畿舉中國之大莫有能聲其罪而討之者世變之降遽至於此然後嘆齊桓晉文之烈為春秋不可無之人也附見是嵗天王避儋翩之亂居于姑蕕明年劉單以晉師納王王入于王城春秋不書豈無意乎東遷而後天王四出始者惠王以子頽之難而出其出其入皆不書為王諱也及襄王以子帶之難而出書出不書入悼敬二王以子朝之難再出再入春秋詳記而備言之且曰王室亂言其亂形己兆猶幸其出而能入也至敬王以儋翩之亂再出遂不復書始之不書諱之也終之不書非諱也蓋閔之甚憂之甚知其終不能以自振於是為之廢書是時中國失霸强暴並興强臣世大夫怙亂相煽晉齊魯宋皆有危亡之證而王國大亂相仍無以表正中夏春秋胥為戰國矣夏季孫斯仲孫何忌如晉義己見上秋晉人執宋行人樂祁犂春秋書執行人皆罪其非所當執而執也臯鼬之盟無能有為諸侯皆散惟宋事晉不改於舊乃反執其使蓋晉之諸卿惟賄是從賄所不及禍隨之耳然使祁犂挺然自立如叔孫婼之在晉彼范鞅雖賄若我何哉冬城中城榖梁以為三家張公懼而修内城夫三家所以專魯非由城郭之不治甲兵之不繕正由君失其民季氏收而有之亂作於内無以為扶救䇿雖繕完何益哉今家臣内叛蕭牆之患少戢魯君欲收其威柄在於任賢植本布徳宜民城非所先也春秋書城中城譏也季孫斯仲孫忌帥師圍鄆取鄆以居公本齊景之善意鄆潰而取以自歸則為利也齊之取鄆固非而仲季之圍亦非也為定公者當以善辭告之齊曰我先君失守宗祧君取鄆以居之魯國實受君賜今鄆潰矣寡人欲復舊疆敢以請之執事以景公之賢必將歸之不應遽用師明年國夏伐西鄙自是交兵連嵗季仲實為之也春秋書圍鄆不書伐齊為景公諱耳景公不以鄆為己有卒而歸之魯春秋所録也季仲氏同惡相濟則春秋之所惡也比而書之所以誅也義又見八年九月七年春王正月夏四月秋齊侯鄭伯盟于鹹于鹹于沙此齊景圖霸之始事也是時晉君不君六卿為政霸權盡失楚敗幾亡吳雖勝而無紀環視一世可與言霸者景公一人耳而景也見義不為乃欲乗機以襲霸無是理也夫所謂盟主上而尊王次而救災恤患先天下之所難然後有以服人而成其霸業魯昭為强臣所逐景公雖為之取鄆圍成為鄟陵之㑹辭曰納公卒不能有所為而遂己今天王避儋翩之難出居姑蕕且二年矣景復不能伸勤王之義乃今日求之鄭盟于鹹明日求之衞盟于沙皆强人之從我非其心悅誠服豈能小大翕然不期而俱至乎蓋景公之賢大夫惟一晏子雖從容進規多所補益而未嘗身任國事豈能如管仲之於桓公狐趙之於晉文君臣同心以安中夏尊周室為己任乎齊人執衞行人北宫結以侵衞齊侯衞侯盟于沙以經而言執其行人加之以兵脅而與之盟脅盟也以傳而言齊求于衞衞侯畏晉私於齊侯俾執其行人以侵之而後與之盟蓋盜盟也脅盟且猶可鄙而況於盜盟者乎齊以詐而求盟于衞衞以詐而同盟若是而得諸侯曷如其已也嗚呼若景公者徳不及秦穆而才智出晉襄之下雖天資和雅可與為善而朝無一君子共圖國事欲踵桓公之遺烈難矣大雩齊國夏帥師伐我西鄙義併見公兩侵齊魯昭流離顛沛惟齊景是依如是五六年卒不能為之出偏師向魯鄙問意如之罪今昭死定立意如己迄天誅乃忽興無名之師而加于魯當為而不為與不必伐而伐失其所以為方伯之道矣是時齊人已得鄭衞欲求魯而不可得是以為此役春秋繼鹹沙二盟而書國夏伐我皆貶也九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊或曰齊人已得鄭衞欲求魯而不可得是以興西鄙之師啓釁者齊也公之報之亦是理之當然而春秋自正月至三月再書公侵公至若有貶焉何哉曰齊之伐我争諸侯於晉也我之侵齊至于再將以是深交於晉也伐者固非侵者亦未為是也前日昭公在難齊猶能為之取鄆圍成㑹鄟陵稍見其恤災之意晉人漫不加省黨季氏而死其君於外者晉也定公與其從齊不猶愈於從晉今也自正月至於三月再以師侵齊此以遂季氏之私於國何有而況是時意如已死斯之羽翼未成定公儻能倚齊以為外援季氏可翦而魯國猶可為也不知出此而汲汲焉事晉惟季氏之所欲為而强家之燄暫戢而復張矣惜哉義又見齊侯衛侯次于五氏曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦公至自瓦或曰是役也晉人興師救魯春秋不書救何哉曰夫所謂救者仗大義以拯人之急者也魯昭栖遲乾侯之境困亦甚矣晉之諸卿惟賄是狥黨臣而抑君今齊師之來初非存亡危急之㑹而晉三卿亟以兵赴之此以内交於季氏而非為魯國宗社計也春秋是故不與之以救秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衞霸者之師所貴奉辭伐有罪伐其所當伐則受伐者伏其辜而諸夏為之聳動當伐而坐視不必伐而輕舉則適所以召侮焉耳鄭有大罪二滅許也儋翩之亂乗而侵犯王畿無王也晉人視非已事不復加詰今以其從齊動大師以伐之又因而及衞皆以從於齊故當王事則屬之魯當已事則親帥以前是故春秋不與之以霸討動大師而書侵貶也葬曹靖公九月葬陳懐公季孫斯仲孫何忌帥師侵衞始逐君者季孟氏也公在鄆而伐鄆者亦季孟氏公已歿而侵齊圍鄆者亦季孟氏也今為晉侵衞斯與何忌復共緫兵以前春秋前後聨書以見二氏比而為惡共握兵權以脅制其君不若叔孫氏猶有昭子之風不盡同於季氏也其後陽虎執季斯復以孟氏之救而免若何忌者其季斯之死黨春秋比而書之厥有㫖也冬衞侯鄭伯盟于曲濮從祀先公左傳謂陽虎欲去三桓順祀先公而祈焉公羊亦曰文公逆祀去者二人定公順祀叛者五人皆以為正僖公之逆祀愚竊有疑焉蓋自僖至定凡五世矣謂陽虎欲以升閔降僖而從衆人之望似非時事之所先且從之為言以後從先之義謂從祀為順祀亦未必合春秋書法之㫖蜀前輩馮公山獨為之說謂昭公薨於外季氏喪之不以禮既絶其兆域使不得同於先君其主久未得從昭穆而袝於廟及是陽虎將有討於季氏始以昭公主從祀太廟蓋欲著季氏之罪戮之以快魯人之所同欲是故書從祀此馮公山說也得春秋從祀之㫖矣或曰從祀正也陽虎為之正乎曰季氏追仇其君於既死之後葬不以禮袝不以禮定公不能正舉國之人皆不能正虎以家臣而正之使其心純乎為義而非有他志固聖門之所許而虎之志則在於為亂是故春秋書從祀于前無譏也而繼書盗竊寳玉大弓於是乎以虎為戮矣盜竊寳玉大弓或曰子前謂家臣亦魯國之臣季氏為非家臣得而正之是不可以畔言也今陽虎以盜書何邪曰家臣而正大夫固不可以畔言也不能正大夫而踵大夫之惡則不得謂之非盜也左傳謂陽虎公山不狃叔孫輒謀去三桓而更其處已執季斯且將殺之孟氏救之而免陽虎戰不利入公宫竊寳玉大弓以出遂據讙陽以叛公羊則云季氏逐君之後取寳玉大弓藏於家陽虎執季孫奪而取之意如竊之於公虎又竊之於季氏虎實踵意如之惡春秋所謂盜意如與虎皆是也意如以死故略虎以賤故不名此一事自常情而觀必以家臣執大夫賤人謀國為事之最重而當書而聖人惟書竊寳玉大弓而季斯之執之釋略而不書蓋以季氏實有當討之罪惜陽虎非討賊之人耳虎得寳玉大弓不以歸之公府而欲載之以奔是以知其志不在公室亦盜而已矣春秋集傳詳說卷二十七
