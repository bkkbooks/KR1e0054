body:
  text: 春秋集傳詳説卷五宋家鉉翁撰莊公上名同桓公之子母文薑周莊王四年即位元年春王正月三月夫人孫于齊莊公不書即位夫人薑氏去族而孫于齊所以明王法伸大義於天下也莊公者子同是也子同生聖人特見之書法非為桓喜也為魯國懼也穀梁曰疑故志之時曰同乎人也公羊於桓之遇弒也亦曰夫人譖公於齊侯公曰同非吾子齊侯之子也齊侯怒與之飲酒於其出也使公子彭生乘而殺之則桓之死坐子同故聖人既明著其事於猗嗟序及修春秋又特書子同生以見意是可不思其故耶蓋父有國而傳之於子子必嫡且長而後得在此位庶孽猶不得以干正而況於嫌疑之不謹遺謗國中百姓盡知之曰此非吾君之子厥父又因是以死而猶得竊居此位揆之人心天理天下大義斷斷乎有所不容是以春秋書王正月不書公即位而夫人薑氏去族而孫于齊明子同不得有魯國而薑氏之罪當討也然則當是之時孰為當繼孰為當討曰方魯桓之死於齊也魯有大臣必將上請于王下請于方伯連帥廢子同而立隱公之子夫然後正薑氏預弒之罪則繼世有其人元惡誅大仇復而王法得伸魯國無事矣今子同挾強齊之援襲居篡位薑氏孫齊而旋返賊不討讐不復天經地義幾於泯滅而無餘由立非所當立魯無大臣故也春秋不書即位不與魯莊以君魯也夫人去族而孫絶之於宗廟為魯桓討賊也夫豈繼故不書即位而已哉或曰如子所言春秋其不為魯諱乎曰春秋天子事也所秉之法百王之公法也魯人小惡固為之諱此其惡甚大有關於宗社之存亡絶續若併為之諱無以垂法於天下後世然其辭微隱則亦為之諱矣南軒張子嘗評武后中宗之事謂武氏唐之大賊當討中宗不能君當廢中宗廢而後武氏之刑乃克正有得於春秋用法之意士不通春秋不足以當大事夏單伯送王姬公穀作逆王姬今從左傳秋築王姬之館于外公穀以單伯為魯大夫天子召而使之左氏無傳杜預曰天子之卿也單采地伯爵也王將嫁女于齊使魯為之主故單伯不稱使其義正矣單伯畿內諸侯為王朝卿大夫奉命而來耳若魯大夫當以名書不當云單伯穀梁子明於復讐之義謂魯君見弒於齊使魯主昏與齊為禮義不可受又曰仇讐之人非所以接昏姻衰麻非所以接辨冕不言齊侯之來逆不使齊侯得與吾為禮也陳義據正又二傳所不能及也或曰天王嫁女使魯主之其來舊矣此何以書曰譏周也責魯也魯與齊為不共戴天之讐莊王知此義則改命他國可也單伯乃於此時奉命送王姬於魯魯當陳義力辭不受亦未至得罪于王而魯莊幼弱無知不明復讐之義輒受王命為讐國主昏彼非以共王命也內逼於其母外脅於強齊故為此耳春秋常事不書此特書單伯送王姬不稱王使譏以非理之禮強使諸侯也又書築王姬之館于外責魯人忘大讐主嘉禮館雖築于外而禮實主於魯忘讐之罪終不可逭也又其後娶讐女以為妻躬如齊納幣尸女苟可事讐者無不為矣由莊公自以為齊出故知有母與舅而不知父讐之當報愚故謂子同不廢則魯無以伸大義於天下此春秋不書即位之意也冬十月乙亥陳侯林卒王使榮叔來錫桓公命錫命之禮在春秋屢見而其事不同或即位而見錫或歷年乃加錫或已死而追錫魯桓衛襄死而錫者也襄之沒也王使成簡公追命之曰叔父陟恪在我先王之左右以佐事上帝豫敢忘髙圉亞圉䇿書之辭也魯桓錫命亦當倣此榮叔之來王不稱天貶也何休謂魯桓弒逆之人王法所宜誅絶而錫命於已殞之後悖亂天道故王不稱天此公羊學也范寧乃以為非貶之所在踈矣春秋以一字為豫奪安有王不稱天而非貶乎或曰自宰糾而後王使至於魯者幾人矣王未嘗去天今榮叔之來王始不稱天其故何也曰桓之篡也前王既不能討使之幸保首領以沒今王又從而奬之已為不可而況文薑者預弒其夫罪大惡極王復不能討而為之錫命死者既釋逆桓以往之戮又貸文薑必不可貸之罪王綱盡弛何以臨制萬國春秋於是去天以示貶孰云其非貶乎義又見文五年王使榮叔召伯歸含會葬王姬歸于齊堯之女舜也書曰釐降二女于媯汭詩序言王姬適諸侯而曰下嫁於諸侯曰降曰下猶有自上而下之意至春秋垂法則曰王姬歸于齊與列國女嫁諸侯者無異辭此出於聖人之特筆所以見隂從陽夫倡婦乃天地之大義不以天子女至貴而紊居室之大倫其慮後世逺矣由秦漢以來務在尊君抑臣列侯尚主夫屈於婦甚至降其父母下從弟昆不使以尊行而臨帝女千有餘年相承及我朝列聖始明下詔旨俾公主下嫁者修婦道如禮經其春秋之教歟齊師遷紀郱鄑郚紀薑姓也與齊同所自出據傳齊與紀為世讐連嵗用師必欲墟其國而後已紀自知危亡不復能與齊戰但欲齊存其宗社而勿毁是以有入酅之議故齊人遷是三邑而紀付之不校以入酅之議既定於前故也遷其民虛其地因遂亡其國暴橫至甚春秋所深貶也書師書遷言用大衆迫而遷之耳公羊以為不言取者為齊襄諱以其志在復讐也復讐之論有益世教但此遷三邑春秋所貶不為之諱也以齊人而遷紀之邑非戰爭攻伐而得是之謂取非其有而取之事類於盜不待貶而自見矣義又見三年入酅與四年大去其國及葬紀伯姬二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘於餘丘者或以為國或以為邾婁之邑邑不言伐言伐則國也時莊公年方十五而慶父擅兵伐國漸不可長故春秋書以示戒或曰主少其不可以動師歟曰主少國疑外有強敵存亡安危於是乎繫大夫以身殉國持兵遏敵死生以之正也今餘丘者附庸一小國耳要不能為魯患而慶父出師逐利此自為私計稔成末年再弒之禍正由久擅兵權威行國中則無不為矣秋七月齊王姬卒禮檀弓齊告王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服即此是也此一事也自單伯送王姬至齊王姬卒春秋凡四書之曰王姬歸于齊曰齊王姬卒者繫之齊以著魯為讐國主昏之罪孫泰山曰莊公忘父之讐既主其嫁又主其卒不子之甚也冬十有二月夫人薑氏會齊侯于禚薑氏身負弒君未討之誅甫除喪而往會其兄齊襄方有王姬伉儷之戚未踰時而出淫其妹此天下之大惡覆載之所不容聖人為是故筆之春秋聨書之比而誅之也趙子曰此薑氏齊侯之惡亦以病公也曰子可以制母乎曰夫死從子通乎上下況國君乎若莊公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行哀戚之不至耳魯莊是時年及弱冠亦可以自強趙子之責甚當乙酉宋公馮卒三年春王正月溺會齊師伐衛未賜族例見隱二年無駭入極榖梁曰溺者公子溺也其不稱公子惡其會仇讐而伐同姓故貶而名之此論固正但春秋始年未賜族之大夫不皆有所貶此會齊伐衛則貶也不必以去族言書齊則父讐也書衛則同姓也會仇讐而伐同姓不加貶斥而義自見者也或曰衛朔在齊此會齊納朔非成父志乎曰納朔者父惡也不能復父之仇而成父之惡滋不孝也是時莊年十有六固未可責以舉兵向讐國而寢苫枕戈弗與共戴天者子之志也既為之主昏禮復與之連兵伐人則悖之甚矣烏得無貶夏四月葬宋莊公五月葬桓王書崩不書葬義初見隱三年天王不書葬義已見隱三年至是桓王書葬責嗣君也王崩七年乃葬傳者以為郤尸而求諸侯是時周家無大變故而天王之喪緩葬至是嗣君不克負荷從可想見矣匹夫莫不葬親匹夫而不能葬其親曰生無以養死無以葬以為人生之大戚周室雖衰王畿之內幅貟千里有臣有民乃緩葬其親至於七年之久不子不君無以自立於覆載之內故莊王崩葬春秋皆削不書著其不能葬親之罪也秋紀季以酅入于齊傳者於春秋書父書仲書季輒目為書字既目為字遂謂春秋之不名之所以褒也於是曲為之説以求其可褒之善坐是故失春秋之旨者多矣此紀季者名與字不可知而公羊以為春秋不名之者賢之也為其請後五廟以存姑姊妹後儒多祖其説愚三復經旨見其為貶而非褒也齊人連嵗攻紀諸侯莫有救之者紀於是大蹙乃俾厥弟季先以酅入于齊冀宗社之猶血食耳此亦甚不獲已而以為春秋賢之必無是也夫遷國以圗存者古有之而宗社則危而猶存也割地以苟生身為匹夫而依仇讐之國初無寸善之可書徒以君命往何異乎以邑叛者而傳者賢之後儒因之大率以季為字而求其所以不名之故甚者謂季自辱其身以全其兄之髙辱則有矣不能保有宗社去為匹夫奚有於髙愚恐後之人生當國家危亂之際率先叛去苟事仇人以圗朝夕之安者以紀季藉其口是以不得不辨耳然則子何以知其為有貶乎曰春秋書法凡諸侯大夫公子奔而返國曰入猶皆有貶此以紀之邑而入于齊書曰入者惡其入也如鄭莊以鄭之祊而歸之於魯謂之為褒可乎非歸而言歸非入而言入是所謂貶奚褒然則鄭之歸紀之入亦有異乎曰鄭以賂而進言歸罪之也紀以急而入言入言其有所迫而後入弗獲已焉耳冬公次于滑此謀救紀也救而書次不與之以救也紀自桓之始年即依魯以為自全之計魯不能為之深思逺慮反摟之以敗齊搆怨愈深至是為齊所併莊於義當救而童年未有立志父讐且未暇問而況於拯他人之危急乎春秋書次于滑言其無往救之實徒次而已四年春王二月夫人薑氏享齊侯于祝丘穀梁曰饗甚矣甚之為言以前者會于禚而無討今復饗于祝丘播淫於通道大都天王不討方伯不問人理絶矣或曰夫人之孫也既去其氏今而會饗乃復其氏何也曰非復也去氏所以誅其逆加氏所以著其淫齊襄出而薑往會焉禽獸之無别也春秋前去其族今與之以氏蓋示之以有别亦所以討其亂倫之罪三月紀伯姬卒此紀裂繻先所逆內女也穀梁曰外夫人不卒此其言卒何吾女也適諸侯則尊同以吾為之變卒之也范注禮諸侯絶旁期姑姊妹女子之嫁於國君者尊與己同則為之服大功九月蓋以其匹於國君尊與己同故不以絶論若嫁大夫則無服無服則不書卒考之經內女嫁於諸侯而書卒者七人其間復有出而歸者焉至於卒葬皆書則紀伯姬及叔姬與宋共姬三人耳伯姬以國亡為齊所葬愍而書之叔姬伯姬之娣國亡夫死守節於酅特録其葬非例也共姬則遇災而終節行顯著是以卒葬皆書後之傳烈女者其春秋之遺意乎夏齊侯陳侯鄭伯遇于垂是時鄭有二君突在櫟子儀在鄭此遇于垂者或以為突或以為子儀以愚觀之在櫟者僅同旅瑣安能與諸侯遇必子儀也然則此二君者其孰為正曰皆非正突為甚突之立以弟而篡兄王法所必誅也昭公既返國突乃入櫟以叛未遑討而昭公為亂臣所弒祭仲逆子儀於陳而立之子儀君鄭十有四年人無異辭以其得之於外非有求而得異突之為篡耳為子儀者當請之天王謀之方伯連帥思所以自定其位者而十有四年僅擁虛器烏在其為君也春秋於垂之遇而書鄭伯非遇之也示在櫟之篡耳非君也乃若衛衎與剽其事與此相似而不同紀侯大去其國公羊曰大去者何滅也孰滅之齊滅之曷為不言齊滅之為襄公諱也春秋為賢者諱何賢乎襄公復讐也哀公烹乎周紀侯譖之九世矣九世猶可復讐乎雖百世可也復讐之義大矣公羊子於此發之此孔門髙弟得之於聖人而傳以示後世公羊子有所授矣諸説多不取愚甚惑焉蓋滅國者春秋所惡也齊襄滅紀自初迄終春秋不從滅國之例則以齊襄所仗者復仇之義異乎其他滅人之國者耳紀侯所以為善非為其以酅入于齊也以去之三年而民之從者未畢猶有太王去邠之風民猶戴君故聖人不忍遂以滅書凡皆以垂法於後世耳大去云者永去之辭如婦人不終于夫家以絶為大歸亦豈以大歸為褒哀其去而不可復返耳胡氏謂聖人與其不爭而去不與其去而不存夫不爭而去去而遂不復存聖人何取直與其得民未忍絶之耳六月乙丑齊侯葬紀伯姬前輩謂滅人之國而葬其妻豺狼之行婦人之仁是固然矣然此春秋書齊襄滅紀之終事愚三復經旨不見其有貶辭則公羊子所傳信乎其有所授矣嗚呼齊襄躬獸行負天下之大惡而春秋猶不沒其復讐之善所以愧乎為人臣為人子不明復讐之義忘君親而事仇者耳周幽王死於申侯之亂而平王親申侯而不以為嫌魯桓公死於齊襄之殺而莊公事齊襄而不以為怨春秋明復讐之義正惟二君故其可忽諸秋七月冬公及齊人狩于禚公羊曰此齊侯也其稱人何諱與讐狩也前此者有事矣後此者有事矣則曷為獨於此焉譏擇其重者而譏焉莫重乎與讐狩也讐者無時焉可與通通則為大譏不可勝譏故將一譏而已榖梁曰此齊侯而曰人卑公之敵所以卑公也何為卑公不復讐而怨不釋刺釋怨也春秋於魯莊之世揭復讐大義以示天下惟公榖知之故於襄之滅紀莊之會齊而拳拳焉後之言復讐者實昉乎此故愚謂春秋垂世之經法自公榖而發之孔門髙弟親得於聖人者也彼謂束三傳於髙閣者用其學而廢其言者也五年春王正月夏夫人薑氏如齊師既會既饗其無憚亦甚矣茲復往會於師不言與齊侯會于師而曰如齊師師者用武之地是時齊侯出師何向而薑往會之豈非懼四鄰之有討而挾齊師以為逭死之計與蓋曰會曰饗所以著其淫此其言如齊師者變文也秋郳黎來來朝郳附庸也其上世出於邾未王命故名之其後數從齊桓會盟尊周室王命為小邾子邾與郳為同姓皆附庸小國儀父若字傳者以為貴之是以字之黎來若名説者以為外之是以名也儀父初無可書之善黎來亦無可名之惡此因名字之異而強生褒貶其實名歟字歟在當時已難深辨而況於千百年之後乎若附庸當字則儀父與黎來皆謂之字可也若當名則皆名也不可以此為褒貶愚於孔父祭仲既詳辨之冬公會齊人宋人陳人蔡人伐衛六年春王正月王人子突救衛書王人之始榖梁曰人諸侯所以人公也人公以其逆天王之命也又曰王人卑者也稱名貴之也善救衛也救者善則伐者不正矣愚謂救固善也而王師不言救諸侯相攻而諸侯救之外域內侵而方伯連率以兵救之可以言救今諸侯擅兵伐國王不能令而以兵救之救非所以施於王也蓋伐之為言天子事也而諸侯以之救之為言諸侯事也而天子以之以見當時諸侯之無王而名分幾於掃地聖人作經垂訓于諸侯之伐則削其爵而人之于子突之救則正其名而王人之所以明君臣之分而正五國無王之戮其義精矣王人不獨微者凡書王人皆以責諸侯之抗王也僖二十九年王子虎及諸侯之大夫盟于翟泉虎非微者責諸侯大夫之抗王人故以王人書是役也五國伐衛將以納朔王人救衛為黔牟也或曰衛朔以父命而立黔牟以王命而立是二人者皆有所稟其孰為正曰奉王命者君也拂王命者逆也諸侯有國雖受之於父而其厥父若祖實受之於王故諸侯世子之立必稟命于王其或無嫡子而以庶孽為嗣亦必王命之而後得繼承於其國朔者衛宣麀聚之孽譖殺其兄而篡居其位本無得國之望衛宣死朔立旋為國人所逐公榖二傳則謂朔實得罪於王以奔而黔牟之立嘗請命于王而王許之以立矣夫以康叔之裔奉王命而君國豈不愈於麀孽之為篡者乎今五國悖義亂常王所與則伐之王所黜則輔之卒敗王師而納朔於衛放黔牟於周是之謂逆明王在上五國之君皆當誅也故春秋人五國而尊王人所以明君臣之分而正五國無王之戮而衛朔之罪亦無所逃於斧鉞之下矣自入春秋諸侯再叛鄭莊侵伐王略及王戰與此五國連兵伐衛而抗王師皆叛也是謂初年之二叛夏六月衛侯朔入于衛公羊曰衛侯朔何以名絶曷為絶之犯命也其言入何篡辭也榖梁曰不言伐衛納朔何也不逆天王之命也入者內弗受也何用弗受也為以王命絶之也朔之名惡也朔入逆則出順矣朔出入名以王命絶之也愚謂春秋書王人救衛以見黔牟之立王實命之黔之立為正則朔之入為逆書名以入著違命之戮也若只以入之一字定其豫奪豈能盡春秋之意秋公至自伐衛榖梁曰惡事不致此其致何也不致則無用見公之惡愚謂出而至必告于廟禮也今公之是行輔朔之篡而納之于衛又敗王師以歸一舉而二罪從之將何辭以告書至自伐衛不與其至也螟冬齊人來歸衛俘榖作衛寶諸侯連嵗伐衛其志在於得賂耳此歸衛俘三傳皆以為寶蓋齊人取衛之寶分以與四國書魯人受賄而四國併見矣桓莊二公皆黨篡逆以要厚賂宋之鼎衛之俘其事之尤著者也聖人為魯諱故於郜鼎則曰取之宋言宋人以歸于魯非魯取之於衛寶則曰齊人來歸言齊人以歸于魯非魯取之皆諱賂之辭所以存其羞惡之心而垂訓於後世榖梁曰以齊首之分惡於齊也使之如下齊而來我然得書法之旨矣七年春夫人薑氏會齊侯于防夫子刪詩齊風存者十一篇而襄之內亂獨居其四南山敝笱載驅猗嗟是也敝笱譏魯桓不能防間其妻猗嗟刺魯莊不能防間其母防間其妻事之順而易者魯桓不能謹之於始防間其母事之拂而難者魯莊豈能制之於終方是時莊以童稚之年挾強齊之援臨制其臣民雖欲防間其母其道無繇故愚謂子同不廢則魯無以伸大義於天下夫子於齊風而存四詩於春秋而書薑與齊侯為會為饗凡六見焉皆所以示王法之誅而垂訓於後世是嵗薑及齊侯又會于榖惡亦稔矣明年有無知之禍夏四月辛卯夜恆星不見夜中星隕如雨三傳解釋不同左氏榖梁得之左氏曰恆星不見夜明也星隕如雨與雨偕也杜注辛卯乃四月之五日月光尚微無雲而恆星不見由日光不以昏沒故也如雨之如而字也夜半乃有雲星落而且雨也榖梁夏四月辛卯昔恆星不見日入至於星出謂之昔不見者可以見也竊詳左氏榖梁之旨蓋日沒至於星出之時恆星不見日光猶存也至夜半星隕而又有雨也啖氏以為星隕衆多而如雨於義亦通此天所以大警當時僭竊暴慢之諸侯而扶周德於未墜也日君象也夏時四月乃正陽之月日光欲入而尚明此周德雖衰而天命未墜之證恆星者諸侯人臣之象是時齊宋魯鄭之君黨篡賊稱兵犯上有欲叛之萌而荆楚復僭王之大號有憑陵中國之心天不見恆星所以警䇿諸侯之叛者且將示以譴罰故恆星不見至夜半星隕而雨誅其尤無良者也明年齊諸兒始迄天討桓公入率諸侯尊天子攘僣亂以安諸夏豈非畏天戒而修臣職者歟秋大水無麥苗此夏時之七八九月也以是秋大水失於種麥是以田無麥苗杜氏以為夏正之五月周之秋平地出水漂蕩熟麥及五稼之苗非也或曰秋而種麥無乃太蚤計乎曰月令以仲秋勸種麥母或失時則課種麥乃秋八九月事秋而失種是以田無麥苖彼謂春秋用周正者以為大水漂蕩熟麥及苗於義未通冬夫人薑氏會齊侯于榖春秋一饗三會禚榖齊地薑往會也祝丘防魯地齊侯來會也此淫會也當時蝨行鼠伏亦豈謂人皆知而良史書其時書其地有不容掩焉者聖人因以誅姦而垂法於後世八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還此一書自嵗首迄于秋暮傳者皆以為為伐郕之故愚竊疑焉夫郕小國也前此為齊鄭所入浸微浸弱不能國矣而魯莊次于郎以俟陳蔡又治戎整軍若將臨大敵其必不為伐郕也而聖人所以聨書而不厭其煩者殆有意焉而傳者亦未知之也魯莊之生至是二十有一年彼自以為出於齊倚齊為援無復為父報讐之志而聖人猶望之以復讐之事春而師次于郎以俟陳人蔡人不言師所向也甲午治兵猶意其整軍經武將有所為也自春徂夏暴露師徒卒之及仇國伐同姓復為仇所賣無功而還乃書以貶之凡公自將必書此三見之書法皆不書公次于郎不書公次及齊圍郕不書公及師還不書公至而書師還皆所以貶也愚觀當時之事意魯人次郎以待陳蔡其君臣始謀將以有為不為圍郕之故而次而俟而治兵也因陳蔡失期不至是夏乃及齊圍郕改計而圍郕非其始所經畫故郕降于齊仲慶父請伐齊師猶有憤激未平之氣豈非魯人至是不堪仇襄之無道始有出而謀之者其事祕史闕書不容強求其説故公羊於乾時之戰以為臣下有復仇之志而公獨不許其必有所本嗟夫莊公知有母而不知有父隱忍事仇未幾而仇亦殄滅無復仇之日矣惜哉此一節其始也次于郎以俟陳人蔡人其後乃及齊圍郕其中又治兵春秋殆有深意而傳所不載不容強求其故姑闕疑冬十有一月癸未齊無知弒其君諸兒或曰諸侯以無道見弒春秋或稱國以弒或稱國人以弒言其有以自取也齊襄淫亂不道今而見弒亦天討也春秋為之從州吁弒之例削無知族以正其弒君之罪何哉曰稱國以弒稱國人以弒彼弒君者無竊位之心也無知弒君自立為君君雖無道而無知志存乎篡罪在不赦若之何無討故從州吁之例去其族而以賊討之胡氏乃云無知不稱公孫而以國氏罪僖公也僖公不以公孫之道待無知使之恃寵而當國以此召亂故罪僖公愚三復此説殆所未喻也使無知者當子少國危之際弒君篡國歸罪於僖公猶可也今齊襄居位既久威福自己無知者亦既廢絀不用彼因齊襄荒淫不度乘間伺隙而殺之豈得復歸罪於僖公乎春秋去逆人之族而曰貶在其先君以此為澄源端本恐持論太過而不能得聖人之意九年春齊人殺無知春秋初年三罪三討衛人殺州吁也蔡人殺陳他也齊人殺無知也皆名其為賊不以為君此出於春秋之特筆非因舊史而書也或曰齊之商人楚之虔弒其君自立為君及其死也不從州吁無知之例何耶曰州吁無知之篡不為國人所君旋即大刑故書衛人殺州吁齊人殺無知善衛人齊人之能討賊也乃若齊之商人楚之虔曠嵗歷年然後假手他人以迄天討既為臣民所君雖欲用州吁無知之例名之曰賊以匹夫討有不可得也公及齊大夫盟于蔇齊襄之存也魯莊幼弱不但無復讐之志而強弱之不敵猶有以藉其事讐之口今襄也既迄天誅魯有可乘之釁伸大義而伐之尚能馘讐人於既死而魯莊屈國君之尊而及齊大夫盟將納糾焉是不過為植黨市恩之計於復讐乎何有書及齊大夫盟以國君而盟讐國之大夫貶之也夏公伐齊納子糾齊小白入于齊公榖於下文皆有子字經書子糾凡再曰子云者當立而未成君之名耳杜注以子糾為兄小白為弟公羊曰其稱子何貴也其貴奈何宜為君也榖梁曰齊人殺無知而逆公子糾于魯公子小白不讓先入又殺之故曰齊小白入于齊惡之也聖人之經以一字定豫奪糾再書子著其於序為長此春秋豫奪之所繫也小白雖繫之齊而不以子稱者所以示别於子糾不稱公子著其殺兄之罪也糾與白皆僖之子襄之弟也襄以淫亂得弒縱有嫡嗣於義當廢黜而立賢立弟正也立弟而以長亦正也由魯人納之也緩而小白以內援自莒先入據有齊國昭十三年傳曰桓公有國髙以為內主故入之易而出師以拒兄既敗魯兵遂推刃於同氣此人倫之大變春秋書齊人取子糾殺之所以著桓公殺兄之罪論者以前史有齊桓殺弟之語遂謂糾為弟而桓之殺之為以兄殺弟愚以春秋再書子與公榖二傳所載及史記世家而知糾於次當立糾兄也桓弟也桓公殺兄之罪與攘夷之功各不相掩聖人於春秋著其罪於論語録其功似不必以彼而廢此以後世之事而言如唐太宗之為君自是曠代之英主其平定海內之功與殺兄之罪亦不相掩建成與太宗更相忌害為太宗所戕猶不免於清議之僇子糾既敗不過為奔亡之公子桓公必取而殺之乃已其用心慘甚視鄭莊克假過之謂春秋無誅可乎納字之例有三有書伐而納者此是也有書納而不書伐者晉人納捷災于邾不克納是也有書帥師而納者趙鞅納蒯聵是也是皆以兵而納納之正否經之褒貶不繫乎一納字要當觀其所以納而後識書法之深旨若執一納字而定褒貶則拘矣入字亦然有以內援入者有以外援入者有當入而入者有不當入而入以篡而入者褒貶亦不專繫於一入字許叔入于許入之善也小白之入陽生之入突之入入雖同而所以貶者則異觀經之全文與上下文乃見以一入字而定褒貶亦拘矣餘義見下文齊人殺子糾秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績齊仇國可伐也以復仇而伐之魯莊之所得為也今以納糾而興師意不在復仇也仇有釁而不討乃為仇國納公子焉納公子豈無他國非魯國所宜納也此公自行不書公貶也此一説也公羊以為魯人是行以納糾為名而伸復仇之義公自行不言公復仇者在下也以臣下欲復仇而魯莊無其志是故貶之公羊必有所本此又一説或曰春秋為魯諱敗乾時之敗獨不諱何哉曰先儒以為及仇戰而敗雖敗亦榮是故不諱愚謂列國相戰爭一勝一負亦事之常本非國惡何有於諱而況敵讐而敗雖敗無傷也春秋必不以敗為諱三復經傳是時魯人不堪齊之侵暴蓋有欲與之戰者故自是而後長勺乘丘再戰再勝憤悱之所成九月齊人取子糾殺之前書納子糾糾所以稱子明糾於序為長而當立也此書齊人取子糾而殺之明弟殺兄之為不義也此桓公殺之而書齊人殺子糾以路人絶之絶之於天倫所以大誅斥之也魯不能納糾又舉以畀其不義之弟使受而甘心焉魯亦有罪矣榖梁曰十室之邑可以逃難百室之邑可以隱死以千乘之魯而不能存子糾以公為病矣得春秋之意齊桓始年之三過殺子糾也滅談遂也降鄣遷陽也春秋書法功罪各不相掩亦是責備賢者之意學者不必曲為回護有害春秋垂世之公法冬浚洙齊讐國也浚洙所以備齊也春秋幸其能與讐為敵故於浚洙而書之以此為絶警之漸耳春秋集傳詳説卷五
