body:
  text: 春秋集傳詳說卷九宋家鉉翁撰僖公一名申莊公子閔公庶兄母成風惠王十八年即位是嵗齊桓公二十五年元年春王正月齊師宋師曹師次于聶北救邢夏六月邢遷于夷儀齊師宋師曹師城邢公羊曰救不言次此其言次何不及事也不及事者邢已亡矣孰亡之蓋狄滅之曷為不言狄滅之為桓公諱曷為為桓公諱上無天子下無方伯天下諸侯有相滅亡者桓公不能救則桓公耻之據經狄伐邪齊人救之不謂邢為己滅左氏曰邢潰奔師師遂逐狄人具邢器用而遷之邢蓋潰而未滅也齊桓公存三亡國惟救邢最力而春秋書次于聶北救邢猶若為緩譏在次也使桓公疾驅而往尚能存之於未潰惟其有聶北之次而邢遂潰矣然衛之亡也狄既入之毁其宗社國君死焉謂之非亡不可邢則其君尚在率百姓而去之謂非救之功不可故先書次以譏其緩繼書救書城再敘三國美其救褒其城不沒其實也若城楚丘則書法異於是譏其城之緩也義又見城楚丘秋七月戊辰夫人姜氏薨于夷齊人以歸左氏以齊人之殺哀姜為己甚女子從人者也有罪非父母家所得而討其說未為不然但姜齊女也前日文姜弒夫所以終于無討者挾齊援耳今哀姜與慶父此而戕二君亦挾齊援耳齊若不討魯烏得而討之然姜所戕者齊之甥也而姜則桓公之兄女也今桓公以甥放而治其姪以子故而致辟於其母義雖無爽實齊魯之家事也不當以霸討行當歸之京師聼司寇所以處王命之殺而後可殺不得專也下文喪至夫人去氏此不去者不與桓公以專殺也義又見敗邾師葬哀姜楚人伐鄭義又見莊十年荆敗蔡師及莊二十三年荆人來聘荆革號為楚有自來矣及是始聞於中國舊史書之聖人因而存之著南蠻漸盛為中國憂也論者於荆人來聘謂春秋嘉其慕義而進之今彼革其始封之號而以兵加乎中國亦謂春秋進而人之可乎或曰彼更號僭也春秋因而與之何哉曰非與之也是亦外之而已矣中國諸侯之始封也莫不受命於王未聞有私立名號而自稱於中國者蠻荒以號自名見之經傳有所謂玁狁獯鬻昆夷趙囊驪戎白狄之類豈必三代之建國楚之革號亦若是而已矣彼以號自名春秋因而名之不以責中國諸侯者而責之也八月公㑹齊侯宋公鄭伯曹伯邾人于柳案左氏盟于犖謀救鄭也犖即柳經言其㑹傳言其盟蓋其㑹也謀所以救鄭其盟也與諸侯定要束將伐楚問其憑陵之罪召陵之師權輿於此是故春秋皆爵之九月公敗邾師于偃杜氏謂邾人既送哀姜于齊齊人殺之邾於是戍虛丘欲以侵魯魯人要而敗之則其責在邾服䖍云邾之於魯本無怨惡僖公奔邾則為之外主國亂則戍其內邑無故而敗其師其責在魯二說不同愚以一時之事而觀其曲在魯出以為外主入又同柳之盟曾幾何時遽敗其師春秋繼柳之㑹而書公敗邾師責魯之棄信而忘義也杜氏謂僖公以邾人送姜氏于齊為齊所殺是以親將而敗其師愚謂哀姜與慶父比而弒二君魯人疾之之深必不以姜氏之死致怨于邾杜氏以傳言僖公請姜氏之喪而葬之因為此說非其實也冬十月壬午公子友帥師敗莒師于酈獲莒拏左氏先書季友以賂求共仲于莒至是又書莒人來責賂豈求之無厭遂至於戰乎愚觀春秋書法斯戰也責在莒陳人之殺州吁蔡人之殺陳他為鄰國討賊也今魯人以賂求共仲仲既即刑而莒復以兵至辭曰責賂其無陳蔡之風矣春秋嘉魯之能敗莒是故敗師獲拏莒無義故也十有二月丁巳夫人氏之喪至自齊公羊曰夫人何以不稱姜氏貶曷為貶與弒也然則曷為不於弒為貶貶必於重者莫重乎其以喪至也或曰有譏於魯奚其譏齊人之殺姜義之不容己也僖公之請其喪恩之不容己也善乎劉氏意林之言曰齊以公義誅之而魯以私情請之是魯之不忍也而不可通乎春秋故去姜氏以見意焉又曰文姜弒夫雖臣子皆得絶之哀姜殺子終不可以子故仇母唯霸主得行焉耳愚謂姜氏固有罪然乃齊魯之家事不當以霸討行當歸之京師聼天王所以處乃若僖公請姜氏之喪葬之以夫人之禮厚於嫡母所以為孝也是故春秋與之義又見葬姜氏二年春王正月城楚丘公羊曰城衛也曷為不言城衛滅也孰滅之狄滅之曷為不言狄滅之為桓公諱也曷為為桓公諱上無天子下無方伯天下諸侯有相滅亡者桓公不能救則桓公之恥也然則孰城之桓公城之曷為不書桓公城之不與諸侯專封也公羊於城邢城楚丘皆曰天下諸侯有滅亡者而桓不能救乃桓公之耻其責望霸主之意甚大得春秋之意但以城邢城衛為專封則愚之所未喻夫邢衛皆周家之建國今為狄所滅而周之封爵則自若夷儀楚丘乃邢衛故土齊桓城而遷之此方伯職分之所當舉奚専封之有哉此公羊之舛妄而胡氏深有取焉以為伯者擅天子之大權專封亡國其不然歟城楚丘不曰衛楚丘衛未遷也邢遷而城衛城而遷故書法不同但興滅存亡事之善者而春秋於城邢則辭繁而不厭於城楚丘則其辭甚略以其緩於城衛而少之也狄入衛在閔二年君死國亡經涉三載至是齊桓始為㑹諸侯城楚丘衛先亡而後城邢後亡而先城用是見桓公於二國有厚薄之間春秋眀大公以埀法邢衛同時滅亡而桓公所以救衛者不能如救邢之例是故略之以見意學者觀城邢城衛書法之詳略而識修經之㫖矣胡氏謂桓公封衛衛國忘亡有功於中華甚大為利於衛人甚溥而春秋之法正其義不謀其利眀其道不計其功仲尼之徒無道桓文之事者是故無美辭論則髙矣矯枉過正亦甚矣聖賢之治天下莫不皆有盛德大烈垂之當時被之後世但本乎道純乎義不為近功淺利是謀耳霸者行事固不可望之以此然存三亡國乃其職分之所當為概以功利目之其無乃非經意之所在歟且救邢城邢再三書以美之何獨於救衛而鄙之以為功利廢而不録乎此為齊人施於邢衛者有厚薄公私之不侔故以一詳一略而見褒貶亦責備伯者之道云爾夏五月辛巳葬我小君哀姜哀姜得罪於宗廟不當以夫人禮葬春秋葬哀姜善僖公之能尊事嫡母也齊人自伸其霸討魯人自喪其嫡母義與恩各不相掩是故春秋録之與敬嬴襄仲弒嗣君出嫡母歸之於齊者其事實霄壤之不侔矣吁若僖公者其處父子兄弟之際亦可謂賢矣虞師晉師滅下陽榖梁曰下陽者虞虢之塞邑也滅下陽而虞虢舉矣諸儒多從其說但春秋書滅國者多矣未有克其要害之地而書為滅者且虢之亡尚在數年之後此先以滅書與其他書滅特異豈無其故嘗考之紀載虢有二國虢仲封下陽虢叔封上陽其一虢先亡今所存者下陽也公羊以為其君在焉謂虢公都下陽下陽滅而國從之義其在是乎虢公為政於周天子之三公也今一旦為强暴所伐假道於虞以掩其不僃襲而滅之故其亡也速傳者謂虢公奔京師非奔也復于其位聼王所以命故不言奔凡書滅亡國之善辭罪在滅之者虢之滅書滅虞之滅不書而書執虞有致滅之道也或曰虞以賂故坐首惡是固當然晉實滅人之國晉其無罪乎曰晉自篡國以來猶未登春秋之簡牘今以滅國之故始書之以著其罪滅同姓之國執天子三公是謂無王春秋書滅於前書執於後討晉也是雖討晉而王有責焉齊亦有責焉狄滅邢衛而齊桓救之以其為同盟之國也晉滅虞虢皆姬姓之諸侯又天子之上公王不命霸主以救霸主亦復視非己責自是四年而虢虞并亡春秋於城楚丘之後而書虞晉滅下陽責齊桓之不能救也周室東遷諸侯恣擅曲沃武公以支宗篡晉負恃强大并兼諸小國以自廣詭諸繼之是謂獻公凶悖滋甚連虞伐虢道虢襲虞執天子上公而有其土實周之叛侯王誅所必加而不以赦者也愚謂桓公當率諸侯奉辭以伐之縱未能致詭諸於戮而虞虢猶可存也今但知邢衛為己之同盟而當救置虞虢不問愚以為春秋於桓有責也義又見五年晉執虞公秋九月齊侯宋公江人黃人盟于貫榖梁曰貫之盟不期而至者江人黃人也江人黃人者逺國之辭也中國稱齊宋逺國稱江黃以為諸侯皆來至也公羊說同江黃楚之與國今慕齊桓之德聲而逺至胡氏謂二國來定盟楚人失其右臂者是也桓公伐楚之計至是始決召陵之師豈輕易嘗試而僥幸萬一者哉冬十月不雨并見明年正月四月不雨六月雨楚人侵鄭并見下或曰㑹于柳謀救鄭今楚人比嵗侵鄭㑹而復㑹師之不出何哉曰自東遷至今歷四王外寇內侵莫之能禦諸侯僭叛莫之敢詰王師不討有罪幾百年矣奉王命伸霸計孳孳以伐楚為先務可謂躬天下之所難謹之又謹必萬全而後動此霸業所為獨優也明年楚又伐鄭師乃出春秋不以緩救而為譏矜其難也三年春王正月不雨夏四月不雨榖梁曰十月不雨正月不雨勤雨也夏四月不雨一時言不雨閔雨也閔雨者有志乎民者也至六月得雨曰喜雨也喜雨有志乎民也春秋書不雨見於莊三十一年文十年十三年有纍月不雨而一書者有一時不雨而一書者書之頻以僖公勤雨閔雨而為之書也總一時纍月而一書者以莊與文無意於民不念雨也魯僖在春秋之世雖無赫赫可紀之功而見之於事者溫雅平實猶有周家盛時氣象如勤雨閔雨務農重榖與詩頌有駜泮水閟宫所述其氣象可以想見是故聖人獨有取焉徐人取舒徐國在下邳舒今廬江相望絶逺徐人以師取舒蓋越國千里而後至其地雖取之而未能有之以舒服屬於楚得之而不能守旋復棄去是以不書滅謂之非取不可魯頌曰荆舒是懲舒與荆比而為中國患其來久矣徐人伐舒為中國撓楚也十五年楚伐徐齊桓率諸侯之師救之以是知徐人蓋受命於齊齊之制楚其用力難矣其為謀審矣蓋算無遺䇿而後動是以春秋貴之六月雨秋齊侯宋公江人黃人㑹于陽榖左氏曰謀伐楚也榖梁曰陽榖之㑹桓公委端搢笏而朝諸侵諸侯皆喻乎桓公之志言諸侯之睦於齊可用之以臨大事也善乎齊桓之伐楚所謂慮勝而動好謀而成者也宋魯鄭衛同盟已久桓猶未敢聲楚人之罪必江黃至而後定計出師去年盟江黃今年㑹江黃皆為伐楚計也諸侯之師當其前江黃之師擬其後楚將腹背受敵有不戰戰必勝矣故師次陘而楚遂服是以春秋於貫之盟陽榖之㑹而謹書之冬公子友如齊涖盟公羊曰涖盟者何往盟乎彼也來盟者何來盟乎我也案左氏齊侯為陽榖之㑹定計伐楚其來尋盟乃戒師期定要束非常事之盟也此一大事齊桓始與宋公遇于梁丘諏詢其可而諸侯皆不預也今將出師復與宋公為陽榖之㑹而諸侯無預議者其鄙我豈不甚哉或以為亦嘗召公而僖不能往使季友為此行若然則其責在魯非桓之責矣是行乃霸主與楚交兵之始魯望國而不得預其議魯之耻也季友涖盟欲何為哉愚以為春秋有譏楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚齊桓公自北杏始㑹至是二十有六年所以安中夏尊周室功之大事之偉者惟服楚而已矣夫子發微管仲之歎亦專為是左傳乃謂蔡姬蕩公于囿公怒歸之而未絶蔡人嫁之於是㑹諸侯侵蔡蔡潰遂伐楚然則齊桓之侵蔡為私怒而發其伐楚乃侵蔡之遂事殆不然也蓋齊距楚南北相望數千里樓諸侯動大衆跋履險阻久而後涉其境楚得以為僃勝負未可知也故桓公先侵蔡道蔡以及楚所謂兵從天而下楚欲聚而保險已無及矣欲出而求戰知弗敵矣乃使屈完如師乞盟未戰而氣已索於是齊桓兵不血刃坐收服楚之功此桓公管子所以熟謀豫圖萬全而後動非因蔡潰而僥幸萬一以為此舉也是時狄氛起於北楚焰張於南桓公救邢存衛少遏狄人之鋒而楚之驕盈日以滋甚謂僭王為未足而革號為楚謂服蔡為未足而放兵伐鄭至於再三諸夏延頸企踵望齊桓之伸威於楚人莫不有是心也一旦合七國之師涉其境而問罪焉其事甚難又能以不戰服人雍容紆徐受盟而退此春秋之所甚貴故自齊侯以下皆爵而無貶或謂楚雖暴橫憑陵上國齊不請王命擅合諸侯春秋書遂伐楚以譏其專是不然齊自始霸事之大者皆以王命行之是役也責包茅之不貢問昭王之不復皆以王事為奉辭必其禀命而後行特史氏略之耳既侵蔡遂伐楚紀其出師之次第其不為專伐譏歟次于陘或曰侵而伐計也伐而次其亦有所畏而不敢遽前歟曰蘇氏之說得之其言曰桓文之師求以服人而已非若後世必以戰勝為功也二十八年晉楚戰于城濮晉文公退三舍而避楚得臣從之不得已而復戰方晉退而楚亦旋則文公安用更戰由此觀之桓文之用兵皆求服人而不求必勝也蘇氏立論平實深得桓文之用心故僃録焉夏許男新臣辛楚屈完來盟于師盟于召陵春秋之世以城下盟為諱桓公既許楚盟乃退師而後及之盟盟之以其禮也胡文定曰齊師雖强桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕庶幾乎王者之事矣或謂屈完來盟于師與成公三年晉敗齊師于鞍齊侯使國佐如師及國佐盟于袁婁書法略相似其同歟否歟曰召陵之盟不戰而服楚者也袁婁之盟齊戰敗而乞盟也不戰而服上也故書來盟見其心服而求盟戰敗而後乞盟力屈而非心服也故書法之輕重詳略如此齊人執陳轅濤塗執鄭詹與其執也執鄭國之佞人也執陳轅濤塗不與其執也轅濤塗忠於其國齊人執之又從而侵之伐之齊君臣於是始驕矣或曰何以見春秋之或與或否曰執鄭詹繼書逃來見春秋之罪鄭詹執轅濤塗繼書伐陳者再見春秋之不與齊秋及江人黃人伐陳八月公至自伐楚葬許穆公冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳夫子大齊桓之功而小管仲之器愚於伐楚之役而見之蓋規模宏大者憂樂吉凶不足以動其方寸而識量淺狹者勝負得喪足以移其常心斯王霸之所以辨而伊尹周公與管仲狐趙事業所以分也當桓公之始霸管仲佐之謙以處巳和以遇物諸侯小國㑹不㑹朝不朝不深責也仁聲暢於逺近小大具孚遂率之伐楚楚服其罪以諸侯之睦於齊也還自召陵君臣俱驕憂喜易位轅濤塗從伐楚而有功者也謀避軍道以紓其國於齊未大有所損執其人命諸侯之師伐之以伐為未足又從而侵之楚無亡矢遺鏃之費而陳先被侵陵之禍志得而驕猖狂妄行管仲曾不能諫則仲與桓俱墮驕盈之域由其識量淺狹如貧人之家一朝獲千金而莫知所措故是行也責楚以尊王而楚之無王自若欲服蔡而蔡卒不與於㑹本以救鄭未幾而逃盟雖稍伸中國之威終不能大挫强楚之焰正由驕心易生諸侯之睦者漸乖合者漸離楚得以窺其間於是滅弦伐許使中國自救之不暇而桓之霸業浸衰矣惜哉春秋於其伐楚也爵以褒之於其侵陳伐陳也人以貶之其著義明矣五年春晉侯殺其世子申生榖梁曰目晉侯斥殺惡晉侯也公羊曰殺世子母弟直稱君甚之也愚謂申生處人道之變雖欲不死不可得也論者惑於左傳語謂其愛父以姑息而陷之於不義以為大仁之賊過矣晉獻殘忍不君溺於內嬖所與朝夕潛圖密慮不過樹建庶孽以為身後之計耳方東山臯落之伐豈無他人乃以命冡嗣狐突先友於是時固洞見公之肺肝而勸太子以行太子之禍不待歸胙於君人皆知其不免矣及今難作乃曰我辭姬必有罪是太子猶可以有言於君而不言以陷其父於惡豈其情也哉此蓋傳者紀載之浮辭諸儒信為事實故疵世子以為賊仁夫獻公狼疾人也所以陷溺其心豈一朝一夕之故天倫之愛至是泯滅而無餘夫豈一聞申生之訴幡然為之悔而致姬於罪者乎先正蘇公論扶蘇戾太子事謂始皇武帝鷙悍忍於誅殺為之子者知必無可回之理故寧死寧動兵而不敢以請是得其情矣戾太子不足言扶蘇之事有類於恭世子故因蘇公之論而發之杞伯姬來朝其子榖梁曰諸侯相見曰朝以待人父之道待人之子非正也伯姬來朝其子杞伯失夫之道矣愚謂甥見於舅亦人情之常而春秋書來朝其子必魯君待甥之禮僭於其父是故有譏夫世子預㑹盟禮猶有殺而况未為世子用朝禮見之乎夏公孫兹如牟此叔牙之子也大夫非其君命不越境公孫兹娶婦于牟假公事以行春秋書以貶之亦防微杜漸之意叔孫自此始見公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟榖梁子曰及以㑹尊之也何尊焉王世子云者唯王之二也又曰諸侯盟于首止無中事而復舉諸侯何也尊王世子而不敢與盟也盟者不相信也不敢以不信而加之尊者也桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王世子不子則其所善何也是則變之正也天子微諸侯不享覲桓控大國扶小國統諸侯不能以朝天子亦不敢致天王尊王世子於首止乃所以尊天王之命也世子含王命㑹齊桓亦所以尊天王之命也世子受之可乎是亦變之正也天子微諸侯不享覲世子受諸侯之尊己而天王尊矣左氏曰㑹于首止謀寧周也杜氏注惠王以惠后故將廢太子鄭而立王子帶故齊桓率諸侯㑹王世子以定其位二傳不同榖梁眀變正之義有功於世教左傳之說愚有疑焉桓公㑹王世子于首止以經而言尊王也以傳而言蓋定世子之位定世子亦所以寧周而其事乃有不然者傳曰鄭伯將如㑹王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜於王命懼不朝於齊乃逃歸杜氏謂惠王將廢太子而立帶恨桓公定世子之位故召鄭伯使叛齊審如是則惠王之不君甚矣而世子所以事其親無乃有未安乎夫率諸侯㑹王世子必請於王王許之而後如㑹有父在焉世子烏得而外交諸侯乎世子外交無乃非春秋所許乎書㑹王世子于首止無譏也春秋無譏則世子之㑹諸侯乃王命也王果有憾於桓公定世子之位何必召鄭伯而使之逃盟一鄭伯之逃盟於周世子之定否若無大相關王必使鄭逃之於王之私亦復何有愚不知杜氏有他援證乎或臆度而為此說據經不見有此義也只當從榖梁之說然以當時之事而觀惠王之於齊未必無遺憾焉子頽之亂齊既霸而不能納王納王者鄭伯虢公也自召陵而返齊志既驕率諸侯伐無罪之陳且執其大夫惠后陳出也能無忿於齊乎王所以召鄭伯使之叛齊意或在此未必由世子出盟諸侯之故後人因子帶之亂傅㑹而為之說若世子不禀王命出㑹諸侯是為世子外交霸國以脅制其君春秋必當有貶今是㑹無貶故疑杜氏之說不然或曰鄭伯以王命之故不與首止之盟春秋以逃盟書何罪之深耶曰君能制命為義齊桓㑹諸侯朝王世子尊世子所以尊王命也而惠王以私怒諭鄭使之叛齊所謂制命之不以義者也鄭伯當陳義於王力言其不可必待既盟乃去夫然後於義為盡安有執王之私命逃諸侯而遂去者乎春秋書逃著其自逃王不能使之逃也楚人滅弦弦子奔黃左氏謂江黃道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡愚謂召陵之役江黃實張犄角之勢江黃之睦於中國非楚之利也故滅弦以孤之使齊人是時能出偏師合江黃以為之聲援弦必不亡而黃與江亦無後日之患惜哉九月戊申朔日有食之冬晉人執虞公春秋書滅國必曰某滅某國其國君奔某所或見執必書滅而後書執今虞虢之亡皆變例而書豈無其故案左氏僖公二年晉假道於虞取號下陽春秋不書取而書滅又五年晉滅虢師還襲虞滅之如傳所載虞虢之滅皆在五年是嵗春秋不書晉滅虞虢但書晉人執虞公二國之滅有其義而亡其辭傳之所載其有未盡信者歟諸儒皆未有確論木訥謂虞虢皆寰內諸侯下陽虢之采邑曰虞曰虢如周公祭公耳虢非國也虞晉滅下陽是滅虢也晉執虞公是滅虞也以地言之重在地以人言之重在人不得其地無以滅虢故以地言之既執其君則其地舉矣故書執虞公其實皆滅也木訥之說辨矣謂執其君其地舉者近之謂虞虢為寰內諸侯之有采邑者則非也諸書所載虞虢皆成周初年之建國虞乃大王之子虢亦文王之弟其始封甚眀豈得謂之非國蓋虢有二虢仲虢叔為文王卿士一封於東一封於西一在上陽一在下陽春秋不書滅虢而書滅下陽以别乎上陽耳意者虢公居於下陽先為虞晉所破下陽既破而上陽亦從之亡與或以為上陽之亡在春秋以前此則未見明證傳者以鄭莊嘗言虢叔死于制疑為鄭所滅耳若虞公者外為諸侯入為天子三公者也晉詭諸以篡弒之餘孽用詐計逞凶暴滅虞而執其君是執天于之三公也春秋書晉人執虞公討晉也執天子之公其罪大於滅國故舉其重而言而虞公受賂致寇自底滅亡其罪亦并見矣胡氏乃謂虞公貴為諸侯身為獨夫書晉人執虞公執獨夫之辭必若此是聖人與晉以滅國滅國且不可而况滅同姓之國執天子之三公者乎春秋人晉而不去虞公之爵所以討晉人執天子三公之罪論者專責虞而不治晉豈春秋意哉或曰戎伐凡伯于楚丘以歸與此同乎否乎曰否不足責也故茅戎之敗於天子無諱辭晉侯滅同姓執天子之三公不惟滅國且有犯上之罪是當討而必不可赦者也六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城秋楚人圍許諸侯遂救許冬公至自伐鄭桓公之伐楚數其無王之罪此尊王也然自始謀以至出師皆以鄭故鄭當一意中國勿復萌他志可也乃於首止之㑹逃盟以歸彼豈共於王命疾馳而去惟恐或後者蓋其心以為齊之强不若楚楚之伐近而易齊之救遲而難是以勇於叛華不復顧逆順之所在蓋中國之諸侯首叛者齊之伐之義所不容已故自齊侯以下皆爵而無貶楚欲救鄭而不敢乃圍許以救鄭齊侯復以諸侯之師赴之伐鄭義也救許亦義也移伐鄭之師以救許所謂權時之宜而合乎義者也故書諸侯遂救許美其救之之速而許賴以存也齊桓前日驕心一萌而以私怒侵陳諸侯之合者幾散今而救許伐鄭伐其所當伐救其所當救夫然後大服人心是以復有葵丘之㑹七年春齊人伐鄭鄭未服而桓公自以其兵伐之所以固中國諸侯之心而逆折强楚憑陵之焰義之所不容己也春秋人之何哉前日爵之今日人之謂春秋無責不可也申侯者楚産也而仕於鄭背濤塗之忠告以自結於齊因是有虎牢之獲此以訟受服者也齊桓一受其譖陳人惡之鄭人疾之而申侯者始無以自容於鄭矣今齊師壓境鄭乃巧為辭說而歸前罪於申侯必曰申侯楚産而勸鄭以從楚殺之以求說焉齊侯果為之退師吁信申侯之譖而罪濤塗者齊桓也信鄭人之讒而殺申侯者亦齊桓也眀知申侯之無罪而以是為退師之名齊亦鄙矣故春秋人之夏小邾子來朝此郳黎來也與邾同所自出始受王命列為子男之國是以來朝自周之東諸侯以篡弒得國王不能討因而命之者多矣如曲沃武公并兼宗國以賂獲封比及其死姓名不登於簡牘不與其封也邾小邾後先得封春秋皆存而不削傳者謂其從齊伐楚有功是故春秋録之學者觀乎此見聖人黜陟之大公矣鄭殺其大夫申侯榖梁曰稱國以殺大夫殺無罪也於里㔻之死則又曰稱國以殺罪纍上也其殺之不以其罪也公羊曰稱國以殺者君殺大夫之辭也愚考之經稱國以殺者多矣不皆無罪有衆人殺之不皆出於其君者亦有稱國以殺而非纍上者不可以一例拘蓋春秋所惡者諸侯專殺大夫而不請於王耳而殺之是否又當隨事而觀以求春秋之意申侯背濤塗之忠告而諂盟主以得邑陳人疾之鄭人忌之誣以其罪而殺之申侯固有罪而殺之者不以其罪春秋不與也觀濤塗所以見執陳所以受侵與申侯所以受虎牢之賜而殺之是否可得而知公榖之例不必拘也秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寧母棄左傳是㑹也謀鄭以鄭未服故然子華以聼命於㑹則有服之漸矣管仲言於桓公曰招攜以禮懷逺以德德禮不易無人不懷齊侯修禮於諸侯受其所貢天子方物而歸之於周諸侯於是知事上之禮鄭子華欲去三大族而為內臣於齊管仲極言不可桓曰諸侯有討於鄭未捷今苟有釁從之不亦可乎對曰君若綏之以德加之以訊辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣子華為太子而求介於大國以弱其宗國其必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉是冬鄭伯請盟嗟夫管仲可謂以禮服人者矣桓公亦可謂樂從諫知自克者使桓公從子華之言以詐而服鄭事未必濟且失諸侯今示之以禮綏之以德鄭不旋踵而請盟是以寧母之㑹聖人爵之所取其在此乎曹伯班卒公子友如齊冬葬曹昭公春秋集傳詳說卷九
